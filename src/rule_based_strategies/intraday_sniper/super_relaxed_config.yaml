strategy_name: "DIAGNOSTIC"
instrument_id: "BTCUSDT-PERP.BINANCE"
bar_type: "BTCUSDT-PERP.BINANCE-1-MINUTE-LAST-INTERNAL"
initial_capital: 100000
logging_level: "INFO"

indicators:
  bollinger_bands:
    period: 20
    stddev: 2.0
  adaptive_multi_dim_compression:
    indicator_config:
      compression_window: 10
      volatility_window: 3
      volume_window: 3
      entropy_window: 3
      compression_tdigest: 50.0
      minimum_tdigest_warmup: 3
      duration_bonus_window: 15
      pre_breakout_silence_window: 1
      internal_price_density_window: 2
    weight_config:
      compression_atr: 0.20
      compression_volume: 0.20
      structural_compression: 0.15
      momentum_convergence: 0.10
      direction_ordered: 0.10
      volatility_dense: 0.10
      duration_modifier: 0.05
      pre_breakout_silence: 0.05
      internal_price_density: 0.05
    threshold_config:
      compression_atr_threshold_quantile: 0.1
      compression_volume_threshold_quantile: 0.1
      structural_compression_body_ratio: 0.3
      structural_compression_atr_ratio: 0.5
      momentum_convergence_price_threshold: 1e-5
      direction_ordered_entropy_threshold: 0.4
      volatility_dense_threshold: 0.1
      compression_confidence_threshold: 0.05
      expansion_confidence_threshold: 0.01
      volatility_buffer_base_threshold: 0.005
      pre_breakout_silence_atr_threshold_quantile: 0.05
      internal_price_density_threshold: 0.1
  cvd:
    window_size: 3
  order_flow:
    delta_ma_window: 1

breakout_quality_scorer:
  weights:
    price_breakout: 0.15
    volume_spike: 0.15
    cvd_momentum_strong: 0.10
    cvd_momentum_weak: 0.05
    volume_and_cvd_aligned: 0.075
    order_absorption_bar: 0.05
    order_absorption_tick: 0.05
    high_liquidity_time: 0.05
    compression_bonus: 0.05
    poc_direction_up: 0.025
    poc_direction_down: 0.025
    pre_break_proximity: 0.025
    first_breakout_bar: 0.025
    volume_dominant: 0.075
    pre_breakout_silence: 0.10

risk_management:
  risk_per_trade: 0.05
  target_r_ratio: 1.2
  initial_capital: 100000.0
  min_breakout_score: 0.1  # 降低阈值以便测试

stop_loss:
  atr_period: 14
  trailing_stop_atr_mult: 1.5

session:
  start: "00:00"
  end: "23:59"

event_filter:
  cooloff_after_event: 30