<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>订单 · MLBot Console</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="page-orders">
  <header class="toolbar">
    <h1>业务控制台</h1>
    <nav class="app-nav" id="appNav"></nav>
    <nav class="ext-links" id="extLinks"></nav>

    <div class="module module-data">
      <span class="module-label">筛选</span>
      <label>Symbol
        <select id="symbolSelect"></select>
      </label>
      <label>状态
        <select id="statusFilter">
          <option value="">全部</option>
          <option value="filled">filled</option>
          <option value="pending">pending</option>
          <option value="canceled">canceled</option>
          <option value="expired">expired</option>
        </select>
      </label>
      <label class="chk-pill"><input type="checkbox" id="hideExpired" checked /> 隐藏 expired</label>
      <label class="chk-pill"><input type="checkbox" id="hideCanceled" checked /> 隐藏 canceled</label>
      <label class="chk-pill"><input type="checkbox" id="hideRejected" checked /> 隐藏 rejected</label>
      <label class="chk-pill"><input type="checkbox" id="hidePending" checked /> 隐藏 pending</label>
    </div>

    <div class="module module-accounts">
      <span class="module-label">账户层</span>
      <label><input type="checkbox" id="layerTrend" checked /> B·Trend</label>
      <label><input type="checkbox" id="layerSpot" checked /> A·Spot</label>
      <label><input type="checkbox" id="layerMultiLeg" checked /> C·Multi-leg</label>
    </div>

    <button id="refreshBtn" type="button">刷新</button>
    <a class="toolbar-link" href="/account">账户总览</a>
  </header>

  <div id="ordersSummaryStrip" class="orders-summary-strip muted"></div>

  <main class="orders-main">
    <section class="panel orders-page-panel">
      <h3>订单列表 <span id="ordersCount" class="muted"></span></h3>
      <p class="muted orders-hint">点击行查看详情；表头右缘可拖动调整列宽（会记住设置）；有标记时可跳转 <a href="/trade-map">交易地图</a> 定位。</p>
      <div class="orders-table-wrap orders-table-full">
        <table id="ordersTable" class="orders-table orders-table-resizable">
          <thead>
            <tr>
              <th data-col="account">账户层</th>
              <th data-col="symbol" id="ordersThSymbol">交易对</th>
              <th data-col="time">时间</th>
              <th data-col="side">方向</th>
              <th data-col="status">状态</th>
              <th data-col="qty">数量</th>
              <th data-col="price">价格</th>
              <th data-col="tp">止盈价</th>
              <th data-col="sl">止损价</th>
              <th data-col="pnl">盈亏</th>
              <th data-col="order_id">订单号</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="10" class="muted">加载中…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
    <aside class="orders-detail-aside">
      <section id="orderDetailPanel" class="panel">
        <h3>订单 / 标记详情</h3>
        <div id="orderMapLink" class="order-map-link"></div>
        <div id="orderDetailBody" class="order-detail-body muted">选择一行查看详情</div>
      </section>
    </aside>
  </main>
  <script src="/static/console-shell.js"></script>
  <script src="/static/trade-map/core/00-constants.js"></script>
  <script src="/static/trade-map/core/10-ohlcv.js"></script>
  <script src="/static/orders-page.js"></script>
</body>
</html>
