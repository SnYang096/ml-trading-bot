<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>策略信号 · MLBot Console</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="page-signals">
  <header class="toolbar">
    <h1>业务控制台</h1>
    <nav class="app-nav" id="appNav"></nav>
    <nav class="ext-links" id="extLinks"></nav>

    <div class="module module-data">
      <span class="module-label">筛选</span>
      <label>特征周期
        <select id="timeframeSelect">
          <option value="2h" selected>2h</option>
          <option value="15min">15min</option>
          <option value="1d">1d</option>
        </select>
      </label>
      <label>回看
        <select id="lookbackSelect">
          <option value="7" selected>7 天</option>
          <option value="14">14 天</option>
          <option value="30">30 天</option>
        </select>
      </label>
    </div>

    <button id="refreshBtn" type="button">刷新</button>
    <span id="statusLine" class="status">—</span>
  </header>

  <main class="signals-main">
    <p class="muted signals-hint">
      全 universe 策略信号一览；点击「地图」进入该 symbol 的 K 线交易地图。
    </p>
    <div class="signals-table-wrap">
      <table id="signalsTable" class="signals-table">
        <thead>
          <tr>
            <th>Symbol</th>
            <th>最新 Bar</th>
            <th>1m 行数</th>
            <th>地图</th>
            <th>B·Trend</th>
            <th>最近 Trend</th>
            <th>A·Spot</th>
            <th>C·Multi-leg</th>
            <th>最近 Multi-leg</th>
          </tr>
        </thead>
        <tbody id="signalsBody">
          <tr><td colspan="9" class="muted">加载中…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
  <script src="/static/console-shell.js"></script>
  <script src="/static/signals-page.js"></script>
</body>
</html>
