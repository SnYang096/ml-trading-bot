<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>账户总览 · MLBot Console</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="page-account">
  <header class="toolbar">
    <h1>业务控制台</h1>
    <nav class="app-nav" id="appNav"></nav>
    <nav class="ext-links" id="extLinks"></nav>

    <div class="module module-data">
      <span class="module-label">筛选</span>
      <label>Symbol
        <select id="symbolSelect"></select>
      </label>
      <label>回看
        <select id="lookbackSelect">
          <option value="0" selected>全部</option>
          <option value="7">7 天</option>
          <option value="14">14 天</option>
          <option value="30">30 天</option>
          <option value="90">90 天</option>
          <option value="365">365 天</option>
        </select>
      </label>
    </div>

    <button id="refreshBtn" type="button">刷新</button>
    <a class="toolbar-link" href="/orders">订单列表</a>
    <span id="statusLine" class="status">—</span>
  </header>

  <main class="account-main">
    <section id="kpiRow" class="account-kpi-row muted">加载中…</section>

    <div class="account-grid">
      <section class="panel account-panel">
        <h3>账户层汇总</h3>
        <div id="scopesTable" class="account-table-wrap muted">—</div>
      </section>
      <section class="panel account-panel">
        <h3>策略汇总</h3>
        <div id="strategiesTable" class="account-table-wrap muted">—</div>
      </section>
    </div>

    <section class="panel account-panel">
      <h3>已实现盈亏（按日）</h3>
      <div id="dailyChart" class="daily-pnl-chart muted">—</div>
      <p id="accountNotes" class="account-notes muted"></p>
    </section>
  </main>
  <script src="/static/console-shell.js"></script>
  <script src="/static/account-page.js"></script>
</body>
</html>
