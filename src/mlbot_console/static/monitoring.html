<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>漂移监控 · MLBot Console</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="page-monitoring">
  <header class="toolbar">
    <h1>业务控制台</h1>
    <nav class="app-nav" id="appNav"></nav>
    <nav class="ext-links" id="extLinks"></nav>
    <button id="refreshBtn" type="button">刷新</button>
    <span id="statusLine" class="status">—</span>
  </header>

  <main class="monitoring-main">
    <p class="muted monitoring-hint">
      自动调度 <code>mlbot monitor schedule</code> 写入
      <code>results/monitoring/index.json</code>；ALERT 会发 Telegram（业务漂移，非仅 systemd 失败）。
    </p>
    <section id="summaryBanner" class="monitoring-banner muted">加载中…</section>
    <div id="cadenceCards" class="monitoring-cards"></div>
    <section class="panel monitoring-events-panel">
      <h3>策略级 ALERT（最近一次各 cadence 运行）</h3>
      <div class="signals-table-wrap">
        <table class="signals-table" id="alertsTable">
          <thead>
            <tr>
              <th>Cadence</th>
              <th>来源</th>
              <th>策略</th>
            </tr>
          </thead>
          <tbody id="alertsBody">
            <tr><td colspan="3" class="muted">—</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="/static/console-shell.js"></script>
  <script src="/static/monitoring-page.js"></script>
</body>
</html>
