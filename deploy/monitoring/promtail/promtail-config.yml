server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: systemd_quant
    journal:
      max_age: 168h
      labels:
        job: systemd-journal
    relabel_configs:
      - source_labels: ["__journal__systemd_unit"]
        target_label: unit
      - source_labels: ["__journal__hostname"]
        target_label: host
      - source_labels: ["unit"]
        regex: "(quant-.*)\\.service"
        action: keep

  # Business CMS (Trade Map) — docker compose mlbot-business-console, not quant-* systemd
  - job_name: docker_cms
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/mlbot-business-console"
        action: keep
      - source_labels: ["__meta_docker_container_name"]
        target_label: container
      - target_label: unit
        replacement: quant-business-console.service
      - target_label: service
        replacement: cms

  - job_name: audit_feature_bus
    static_configs:
      - targets: [localhost]
        labels:
          job: audit
          log_type: audit
          process: feature_bus
          __path__: /logs/trend_bus/feature_bus_audit.log*

  - job_name: audit_trend
    static_configs:
      - targets: [localhost]
        labels:
          job: audit
          log_type: audit
          process: trend
          __path__: /logs/trend_bus/trend_live_audit.log*

  - job_name: audit_multi_leg
    static_configs:
      - targets: [localhost]
        labels:
          job: audit
          log_type: audit
          process: multi_leg
          __path__: /logs/multi_leg/multi_leg_audit.log*
