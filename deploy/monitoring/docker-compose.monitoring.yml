# 监控栈: Prometheus + Grafana + Loki + Promtail + sqlite-web（只读 SQLite）
# 用法: cd deploy/monitoring && docker compose -f docker-compose.monitoring.yml up -d
# Telegram 告警: 复制 .env.example → .env，填入 GRAFANA_ALERT_TELEGRAM_BOT_TOKEN（勿提交 git）
#
# Prometheus: http://localhost:9091
# Grafana:    http://localhost:3000  (admin / admin) — 默认首页 System Health
# Loki:       http://localhost:3100 （Grafana Explore / quant-logs 看板）
#
# sqlite-web（coleifer/sqlite-web 一单库一进程；order/multi_leg 目录需 RW 挂载，详见各 service 注释）
#   live_monitor.db        → http://<host>:8871  （stats_15min）
#   order_management.db    → http://<host>:8872  （quant-trend-swing：`MLBOT_ORDER_MANAGEMENT_DB_PATH` 默认对应宿主 ``/opt/quant-engine/data/order_management.db``，不是 highcap/data/db 下那份拷贝）
#   multi_leg_order_management.db → http://<host>:8873
# 无外置鉴权，勿对公网裸奔；建议安全组仅限内网或使用 SSH 隧道。
#
# 指标：quant-feature-bus → 宿主 9192；quant-trend-swing → 宿主 9190；quant-hedge-multileg → 宿主 9191（见 prometheus.yml）。
# 若 Grafana 面板无数据，检查 systemd docker run 是否已 -p 上述端口。

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: mlbot-prometheus
    restart: unless-stopped
    ports:
      - "9091:9091"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.listen-address=:9091"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=1GB"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:2.9.8
    container_name: mlbot-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml

  promtail:
    image: grafana/promtail:2.9.8
    container_name: mlbot-promtail
    restart: unless-stopped
    user: root
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/quant-engine/live/highcap/data/logs:/logs/trend_bus:ro
      - /opt/quant-engine/data/multi_leg_live/state/logs:/logs/multi_leg:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.1
    container_name: mlbot-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/quant_system.json
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
      # Telegram（compose 从同目录 .env 做 ${} 替换后注入容器）
      - GRAFANA_ALERT_TELEGRAM_BOT_TOKEN=${GRAFANA_ALERT_TELEGRAM_BOT_TOKEN:-}
      - GRAFANA_ALERT_TELEGRAM_CHAT_ID=${GRAFANA_ALERT_TELEGRAM_CHAT_ID:--1002004555233}
    volumes:
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana-provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  sqlite-web-live-monitor:
    build:
      context: ./sqlite-web
      dockerfile: Dockerfile
    image: mlbot-sqlite-web:0.6.6
    pull_policy: never # 仅存本地 build，compose pull 不要去 Docker Hub 拉此 tag
    container_name: mlbot-sqlite-web-live-monitor
    restart: unless-stopped
    ports:
      - "8871:8871"
    volumes:
      # 与 systemd quant-trend-swing 挂载一致（宿主机）
      - /opt/quant-engine/live/highcap/data/db:/db/trend:ro
    command:
      - "-H"
      - "0.0.0.0"
      - "-p"
      - "8871"
      - "-r"
      - "-x"
      - "/db/trend/live_monitor.db"

  sqlite-web-order-mgmt:
    image: mlbot-sqlite-web:0.6.6
    build:
      context: ./sqlite-web
      dockerfile: Dockerfile
    pull_policy: never
    container_name: mlbot-sqlite-web-order-mgmt
    restart: unless-stopped
    ports:
      - "8872:8872"
    volumes:
      # 与容器内 cwd=/app、`init_order_manager_from_env` 默认 `data/order_management.db`
      #（宿主 /opt/quant-engine/data/order_management.db）一致；不要用 highcap/data/db 里那份易空的库。
      - /opt/quant-engine/data:/db/qe_data
    command:
      - "-H"
      - "0.0.0.0"
      - "-p"
      - "8872"
      - "-r"
      - "-x"
      - "/db/qe_data/order_management.db"

  sqlite-web-multi-leg:
    image: mlbot-sqlite-web:0.6.6
    build:
      context: ./sqlite-web
      dockerfile: Dockerfile
    pull_policy: never
    container_name: mlbot-sqlite-web-multi-leg
    restart: unless-stopped
    ports:
      - "8873:8873"
    volumes:
      # 同上：需 RW：`sqlite_web` 打开 WAL 库
      - /opt/quant-engine/data:/db/engine_data
    command:
      - "-H"
      - "0.0.0.0"
      - "-p"
      - "8873"
      - "-r"
      - "-x"
      - "/db/engine_data/multi_leg_order_management.db"

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
