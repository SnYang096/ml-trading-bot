# 监控栈: Prometheus + Grafana
# 用法: cd deploy/monitoring && docker compose -f docker-compose.monitoring.yml up -d
#
# Prometheus: http://localhost:9091
# Grafana:    http://localhost:3000  (admin / admin)
#
# 指标：quant-feature-bus → 宿主 9192；quant-trend-fattail → 宿主 9190；quant-hedge-multileg → 宿主 9191（见 prometheus.yml）。
# 若 Grafana 面板无数据，检查 systemd docker run 是否已 -p 上述端口。

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: mlbot-prometheus
    restart: unless-stopped
    ports:
      - "9091:9091"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.listen-address=:9091"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=1GB"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.4.1
    container_name: mlbot-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/quant_home.json
    volumes:
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
