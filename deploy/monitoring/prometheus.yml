# Prometheus 配置 — 抓取交易机器人 /metrics
#
# 三进程架构：
#   quant-feature-bus 监听 Binance WebSocket 并写磁盘 Feature Bus；
#   quant-trend-swing 与 quant-hedge-multileg 分别消费磁盘 bus，且各自使用独立账户。
# systemd 需在宿主机映射（见 deploy.yml）：
#   9192→feature-bus，9190→trend/swing，9191→hedge multi-leg，9193→spot_accum_simple。
# 注意：Prometheus 运行在 Docker 内，不能抓取只绑定宿主 127.0.0.1 的端口。
# monitoring 栈通过 host.docker.internal 访问宿主（compose 已为 prometheus 配 extra_hosts）。

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/reconciliation_alerts.yml
  - /etc/prometheus/rules/disk_alerts.yml

scrape_configs:
  - job_name: "quant-feature-bus"
    static_configs:
      - targets: ["host.docker.internal:9192"]
        labels:
          instance: "live"
          workload: "market_ws_publisher"
    # publisher 只代表行情 WebSocket / 进程健康，不承载交易账户或策略决策指标。
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "^(mlbot_ws_connected|mlbot_cpu_percent|mlbot_memory_mb|mlbot_memory_rss_mb|mlbot_uptime_seconds|mlbot_disk_used_percent|mlbot_disk_free_gb|mlbot_dir_size_gb|mlbot_pipeline_data_age_seconds|mlbot_pipeline_data_fresh)$"
        action: keep

  - job_name: "quant-trend-swing"
    static_configs:
      - targets: ["host.docker.internal:9190"]
        labels:
          instance: "live"
          workload: "trend_swing_consumer"
    # 与 hedge 对齐：显式保留 Strategy Map / 账户 / 进程指标；丢弃 multi_leg 专用序列。
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "^(mlbot_reconciliation_.+|mlbot_strategy_symbol_bar_ohlc|mlbot_strategy_feature_value|mlbot_strategy_event_total|mlbot_strategy_event_price|mlbot_dashboard_catalog|mlbot_funnel_total|mlbot_direction_total|mlbot_gate_rejected_total|mlbot_gate_reject_reasons_total|mlbot_gate_reject_rate|mlbot_bars_processed_total|mlbot_orders_total|mlbot_signals_total|mlbot_account_balance|mlbot_account_margin_ratio|mlbot_unrealized_pnl_total|mlbot_account_update_success|mlbot_account_update_age_seconds|mlbot_position_notional_usdt|mlbot_position_qty|mlbot_cpu_percent|mlbot_memory_mb|mlbot_memory_rss_mb|mlbot_uptime_seconds|mlbot_feature_bus_snapshot_age_seconds|mlbot_last_bar_age_seconds|mlbot_system_mode|mlbot_positions_active|mlbot_ws_connected|mlbot_funding_rate|mlbot_mark_price|mlbot_open_interest_usd|mlbot_disk_used_percent|mlbot_disk_free_gb|mlbot_dir_size_gb)$"
        action: keep

  - job_name: "quant-hedge-multileg"
    static_configs:
      - targets: ["host.docker.internal:9191"]
        labels:
          instance: "live"
          workload: "hedge_multileg_consumer"
    # hedge multi-leg 使用独立账户：保留多腿专用、OHLC、账户和进程健康指标；其余趋势同名策略指标丢弃。
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "^(mlbot_multi_leg_.+|mlbot_reconciliation_.+|mlbot_strategy_symbol_bar_ohlc|mlbot_strategy_feature_value|mlbot_strategy_event_total|mlbot_strategy_event_price|mlbot_dashboard_catalog|mlbot_funnel_total|mlbot_orders_total|mlbot_signals_total|mlbot_account_balance|mlbot_account_margin_ratio|mlbot_unrealized_pnl_total|mlbot_account_update_success|mlbot_account_update_age_seconds|mlbot_position_notional_usdt|mlbot_position_qty|mlbot_cpu_percent|mlbot_memory_mb|mlbot_memory_rss_mb|mlbot_uptime_seconds)$"
        action: keep

  - job_name: "quant-spot-accum"
    static_configs:
      - targets: ["host.docker.internal:9193"]
        labels:
          instance: "live"
          workload: "spot_accum_simple_consumer"
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "^mlbot_multi_leg_.+"
        action: drop

  # Prometheus 自身
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9091"]
