<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>交易地图 · MLBot Console</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body class="page-trade-map">
  <header class="toolbar">
    <h1>业务控制台</h1>
    <nav class="app-nav" id="appNav"></nav>
    <nav class="ext-links" id="extLinks"></nav>

    <div class="module module-data">
      <span class="module-label">数据</span>
      <label>Symbol
        <select id="symbolSelect"></select>
      </label>
      <label>周期
        <select id="timeframeSelect">
          <option value="2h" selected>2h</option>
          <option value="15min">15min</option>
          <option value="1min">1min</option>
          <option value="1d">1d</option>
        </select>
      </label>
    </div>

    <div class="module module-accounts" title="账户层 A/B/C：控制主图成交标记">
      <span class="module-label">账户层</span>
      <label><input type="checkbox" id="layerTrend" checked /> B·Trend</label>
      <label><input type="checkbox" id="layerSpot" checked /> A·Spot</label>
      <label><input type="checkbox" id="layerMultiLeg" /> C·Multi-leg</label>
      <label><input type="checkbox" id="layerPending" /> Pending</label>
    </div>

    <div class="module module-subcharts">
      <span class="module-label">附图</span>
      <label><input type="checkbox" id="paneVolume" /> 成交量</label>
      <details class="feature-picker" id="featurePickerDetails" open>
        <summary>特征列 <span id="featurePickerHint" class="muted"></span></summary>
        <div id="featureColumnList" class="feature-column-list muted">加载中…</div>
      </details>
    </div>

    <button id="refreshBtn" type="button">刷新</button>
    <span id="statusLine" class="status">—</span>
  </header>

  <main class="trade-map-main">
    <div class="chart-stack">
      <div id="chart" class="chart-pane main-pane" title="主图：K 线 + 所选账户层成交标记"></div>
      <div id="subchartStack" class="subchart-stack"></div>
      <section id="detailPanel" class="marker-detail-drawer hidden">
        <div class="drawer-head">
          <h3>标记详情</h3>
          <button type="button" id="detailCloseBtn" class="drawer-close">关闭</button>
        </div>
        <pre id="detailBody"></pre>
      </section>
    </div>
  </main>
  <script src="/static/console-shell.js"></script>
  <script src="/static/trade-map-core.js"></script>
  <script src="/static/trade-map.js"></script>
</body>
</html>
