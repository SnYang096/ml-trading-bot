# ============================================================
# EML：单月 fast_month 快速出「交易地图」
#
# threshold_calibration.enabled=false 时，fast_month 会跳过 train prepare 长步骤，
# 直接从 config/strategies/bad-candidates/eml 拷贝策略并跑 event_backtest → trading_map_*.html
# ============================================================
# 其它字段与 prod_train_pipeline_2h_turbo_eml_only.yaml 一致。

dates:
  start_date: "2022-08-01"
  end_date: "2026-03-31"
  holdout_months: 26
  validation_months: 3

global_toggles:
  locked_threshold_tuning_enabled: true

rolling:
  mode: turbo_fixed_features
  windows:
    calibration_months: 6
    structure_lookback_months: 12
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    disable_feature_search: true

fast_loop:
  disable_model_training: true
  step_months: 1
  threshold_calibration:
    enabled: false
  prefilter:
    # false：保持仓库 archetypes/prefilter 的 EMA 死区+斜率语义，不把 meta KS 区间叠进实验副本
    optimize: false
  symbol_threshold_calibration:
    enabled: true
  execution_opt:
    enabled: false
  pcm_eval:
    enabled: false
  direction_tuning:
    enabled: true
    compare_features: false
    promote_after_validate: false

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap
data_path: data/parquet_data
download:
  enabled: false
  data_dir: data/agg_data
  parquet_dir: data/parquet_data
strategies:
  eml:
    config: config/strategies/bad-candidates/eml
    side: both
    timeframe: 120T
    features_gate: features_gate.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.005
        min_rows: 10
        target_trades_min: 4
        target_trades_max: 120
        trade_penalty_low: 0.002
        trade_penalty_high: 0.002
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: false
          mode: auto_if_locked
          skip_if_cached: false
          max_cases: 12
          min_trades_target: 8
          trade_penalty: 0.0020
          target_trades_min: 4
          target_trades_max: 120
          trade_penalty_low: 0.002
          trade_penalty_high: 0.002
          stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
      entry_filter:
        meta_algorithm: false
        archetype_plateau: true
        significance_p: 0.12
        significance_min_trades: 3
        plateau_window: 4
        archetype_scoring_method: distribution_ks
        target_trades_min: 4
        target_trades_max: 120
        trade_penalty_low: 0.002
        trade_penalty_high: 0.002
        stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        min_score_improvement: 0.003
      gate:
        require_positive_effect: false
        min_combined_pass_rate: 0.15
      backtest:
        min_trades: 4
      deploy:
        min_trades: 4

event_backtest:
  enabled: true
  map_extra_months: 4

output:
  history_dir: results/eml/turbo-rolling-sim
  latest_dir: results/eml/turbo-latest
