#
# Alpha101-CS (cross-sectional rank) pipeline example (4H).
#
# Flow:
#   1) Build FeatureStore cache:
#      mlbot cross-section build-store --factor-set crypto_alpha101_cs_rank --features-store-layer cs_alpha101_cs_rank_4h_v1 ...
#   2) Run pipeline:
#      mlbot cross-section pipeline --config config/cross_sectional/pipeline_alpha101_cs_rank_4h_feature_store.yaml --no-docker
#
output_root: results/cross_sectional/pipeline_alpha101_cs_rank_4h

panel:
  source: feature_store
  feature_store:
    root: feature_store
    layer: cs_alpha101_cs_rank_4h_v1
    timeframe: 240T
    # symbols should be comma-separated USDT symbols
    symbols: BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT,AVAXUSDT,LINKUSDT,DOTUSDT,LTCUSDT,BCHUSDT,TRXUSDT,TONUSDT,ATOMUSDT,ETCUSDT,FILUSDT,XLMUSDT,XTZUSDT,NEARUSDT,APTUSDT,SUIUSDT,SEIUSDT,INJUSDT,ARBUSDT,OPUSDT,UNIUSDT,AAVEUSDT,MKRUSDT,COMPUSDT,FTMUSDT,MANAUSDT,SANDUSDT,RUNEUSDT,STXUSDT,ICPUSDT,DYDXUSDT,GMXUSDT,LDOUSDT,CRVUSDT,SNXUSDT,IMXUSDT,GALAUSDT,ENAUSDT,TIAUSDT,JUPUSDT,JTOUSDT,PYTHUSDT,ZKUSDT,STRKUSDT,DOGEUSDT,WIFUSDT,BOMEUSDT,BRETTUSDT,POPCATUSDT,MEWUSDT,PONKEUSDT,TURBOUSDT,NEIROUSDT
    start_date: 2025-07-01
    end_date: 2025-12-31

factor_eval:
  horizon: 12
  min_assets: 12
  quantiles: 5
  fee_bps: 2.0

  factor_set_yaml: config/cross_sectional/cs_factor_sets_crypto.yaml
  factor_set: crypto_alpha101_cs_rank

select:
  enabled: true
  min_assets: 12
  per_category_top: 3
  global_top: 20
  ic_threshold: 0.01
  ranking_stat: ic

report:
  enabled: true
  output: fama_macbeth_report.md
  horizon: 12
  winsor: 3.0
  max_lag: 5
  periods_per_year: 2190
  zscore: true
  crypto_factors: false
  skip_na_drop: true

train:
  enabled: true
  output_dir: train
  model: boosting
  horizon: 12
  winsor: 3.0
  zscore: true
  crypto_factors: false
  periods_per_year: 2190
  split:
    train_ratio: 0.7
  backtest_cfg:
    # both supported: long_only, market_neutral
    mode: long_only,market_neutral
    holding_period_bars: 12
    execution_lag_bars: 1
    top_k: 10
    bottom_k: 10
    gross_leverage: 1.0
    max_weight: 0.10
    turnover_limit: null
    cash_buffer: 0.10
    equity_mode: compound
    fee_bps: 2.0
    slippage_bps: 0.0
    funding_bps_per_bar: 0.0
    borrow_bps_per_bar: 0.0
    min_assets: 12


