#
# Example CS pipeline config (crypto, 4H).
#
# Option A (recommended for reproducibility): build a panel parquet first, then run pipeline on that panel:
#   mlbot cross-section build-panel --symbols ... --timeframe 240T --horizon 12 --feature-type comprehensive --no-docker
#   mlbot cross-section pipeline --config config/cross_sectional/pipeline_example_crypto_4h.yaml --no-docker
#
output_root: results/cross_sectional/pipeline_demo_crypto_4h

panel:
  source: parquet
  # produced by `mlbot cross-section build-panel`
  path: results/feature_exports/cs_panel.parquet

factor_eval:
  horizon: 12
  min_assets: 8
  quantiles: 5
  fee_bps: 2.0

  factor_set_yaml: config/cross_sectional/cs_factor_sets_crypto.yaml
  factor_set: crypto_ts_compatible_core

select:
  enabled: true
  min_assets: 8
  per_category_top: 2
  global_top: 12
  ic_threshold: 0.01
  ranking_stat: ic


