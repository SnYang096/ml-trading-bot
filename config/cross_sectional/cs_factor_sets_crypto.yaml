#
# Recommended factor sets for cross-sectional (multi-asset) research.
#
# Notes:
# - Prefer scale-invariant / cross-asset comparable columns.
# - The `cs_crypto_*` factors are produced by `add_crypto_cross_sectional_factors(panel)`.
# - You can evaluate them on panels generated by `mlbot cross-section build-panel --feature-type comprehensive`.
#
factor_sets:
  crypto_cs_core:
    # Relative momentum (demean/zscore/rank)
    - cs_crypto_return_rel_12_zscore
    - cs_crypto_return_rel_12_rank
    - cs_crypto_return_rel_36_zscore
    - cs_crypto_return_rel_36_rank
    - cs_crypto_return_rel_72_zscore
    - cs_crypto_return_rel_72_rank

    # Relative volatility
    - cs_crypto_vol_rel_36_ratio
    - cs_crypto_vol_rel_36_rank
    - cs_crypto_vol_rel_72_ratio
    - cs_crypto_vol_rel_72_rank

    # Dominance / cross-section context
    - cs_crypto_return_dominance

    # Liquidity / dominance by volume
    - cs_crypto_volume_share
    - cs_crypto_volume_rank
    - cs_crypto_turnover_ratio
    - cs_crypto_turnover_rank

    # Order-flow spreads (require taker_buy_ratio / cvd in panel)
    - cs_crypto_taker_buy_spread
    - cs_crypto_taker_buy_rank
    - cs_crypto_cvd_spread
    - cs_crypto_cvd_rank

  # A curated subset of TS-style features which are still meaningful in CS:
  # - unitless / bounded / normalized (cross-asset comparable)
  # - OHLCV-only (no ticks)
  # Source of truth: `config/feature_dependencies.yaml` output_columns.
  crypto_ts_compatible_core:
    # Momentum / trend (unitless/bounded)
    - rsi
    - roc_5
    - trend_r2_20
    - trend_r2_50
    - slope_consistency_score
    - trend_volatility_alignment
    - path_curvature

    # Volatility regime (unitless/bounded)
    - atr_percentile
    - volatility_cone_position
    - bb_width_normalized
    - bb_position
    - range_ratio_5bar
    - volatility_reversal_score
    - atr_ratio
    - natr_14

    # Candle structure (bounded/zscore)
    - wick_upper_ratio
    - wick_lower_ratio
    - price_range_symmetry

    # Liquidity (unitless)
    - volume_anomaly
    - obv_normalized

    # MACD normalized by ATR (unitless)
    - macd
    - macd_signal
    - macd_histogram

  # TS-adapted Alpha101 shortlist (OHLCV-only, no ticks).
  # CS Alpha101 (original cross-sectional rank variants).
  # Columns are produced by CS build-store mode (multi-asset monthly compute).
  # Naming convention: alpha101_cs_<alpha_id> (e.g., alpha101_cs_002).
  crypto_alpha101_cs_rank:
    - alpha101_cs_001
    - alpha101_cs_002
    - alpha101_cs_003
    - alpha101_cs_006
    - alpha101_cs_007
    - alpha101_cs_008
    - alpha101_cs_009
    - alpha101_cs_010
    - alpha101_cs_012
    - alpha101_cs_013
    - alpha101_cs_014
    - alpha101_cs_015
    - alpha101_cs_016
    - alpha101_cs_017
    - alpha101_cs_018
    - alpha101_cs_020
    - alpha101_cs_101


