# ============================================================
# 上线前训练流水线 (2H only, BPC-only)
# 基于 prod_train_pipeline_2h_turbo_2024bull_thresholds_only
# 仅保留 bpc-short-120T / bpc-long-120T
# ============================================================

dates:
  start_date: "2023-01-01"
  end_date: "2024-12-31"
  holdout_months: 15
  validation_months: 3

global_toggles:
  locked_threshold_tuning_enabled: true
rolling:
  mode: turbo_fixed_features
  windows:
    calibration_months: 6
    structure_lookback_months: 12
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    disable_feature_search: true

fast_loop:
  # 快变量月度校准链的全局开关: true=每层都禁用树模型训练
  disable_model_training: true
  step_months: 1
  threshold_calibration:
    enabled: true
  prefilter:
    optimize: true
  symbol_threshold_calibration:
    enabled: true
  execution_opt:
    enabled: false
  pcm_eval:
    enabled: false
  # 方向调优默认每月执行；若需降成本可设 cadence_months: N（每 N 个 rolling 月跑一次）
  direction_tuning:
    enabled: true
    # cadence_months: 1  # 默认 1；勿与 rolling.windows.calibration_months（标定窗口长度）混用
    # true：跑 direction_strict_validation --compare-features --temporal（工作区 features_direction.yaml）
    # false：仅 Phase1/2 验证 archetypes/direction.yaml，不读候选特征表
    compare_features: false
    # false：不 --promote；阈值已由 macro_epsilon_grid 写入，本步只做验证、不产生 YAML 变更
    promote_after_validate: false
    # dual：epsilon_grid；BPC single_position_band：epsilon_grid 视为 inner_abs 候选；
    # 显式两边：inner_abs_grid + outer_abs_grid（笛卡尔积，需全程 inner < outer）
    #     前选优目标是 median(forward_rr × direction) 在 direction≠0 子集上尽量大，不是「非零越多越好」。
    # 有时 收窄中间带（更挑剔）会丢掉很多 bar，但剩下子集质量更高，中位数反而更好。
    # 一句话：界大不大取决于校准窗里哪组带通让「按方向算的收益」中位数最好，不是牛市启发式；outer 大确实倾向于让更多点进中间带，但优化目标不是覆盖率。
    macro_epsilon_grid:
      enabled: true
      # patch_workspace 省略：dual 默认同步 features_direction；band 默认只写 archetypes
      inner_abs_grid: "0.01,0.03,0.05,0.07,0.09"
      outer_abs_grid: "0.1,0.2,0.3"

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap
data_path: data/parquet_data
download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data
strategies:
  bpc:
    config: config/strategies/bpc
    timeframe: 120T
    features_gate: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.05
        min_rows: 10
        target_trades_min: 35
        target_trades_max: 260
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: false
          mode: auto_if_locked
          skip_if_cached: false
          max_cases: 12
          min_trades_target: 60
          trade_penalty: 0.0025
          bpc_pullback_score_min_values: 0.40,0.45,0.50
          bpc_pullback_depth_max_values: 0.55,0.60,0.65
          bpc_recovery_min_values: 0.50,0.55,0.60
          target_trades_min: 35
          target_trades_max: 260
          trade_penalty_low: 0.002
          trade_penalty_high: 0.0011
          stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
      entry_filter:
        meta_algorithm: false
        archetype_plateau: true
        # Entry archetype plateau: z-test 仍必须显著才 promote；略放宽 p / 样本与高原窗
        significance_p: 0.10
        significance_min_trades: 4
        plateau_window: 4
        archetype_scoring_method: distribution_ks
        target_trades_min: 35
        target_trades_max: 260
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        min_score_improvement: 0.005
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.3
      backtest:
        min_trades: 50
      deploy:
        min_trades: 50
    simple_execution:
      sl_r: 4.0
      tp_r: 8.0
      timeout_bars: 500

# 事件回测 / 交易地图：VWAP·EMA 可向前用更多 1m 历史计算；图上只画回测窗（见 event_backtest.py）
event_backtest:
  # 建议显式声明 enabled，避免依赖默认值导致误跑/误停
  enabled: false
  map_extra_months: 3

output:
  history_dir: results/bpc/turbo-rolling-sim
