# ============================================================
# 上线前训练流水线 (2H only)
# 目标: 稳健优先, 平坦高原阈值搜索, 生产候选版本训练
# ============================================================

dates:
  start_date: "2024-01-01"
  holdout_months: 12
  validation_months: 4
training:
  seeds:
    - 42
  seed_selection: best_sharpe
global_toggles:
  locked_threshold_tuning_enabled: true
strategy_scope:
  # all | long | short
  # 控制 --all 时参与训练/回测的策略方向范围
  direction: all
rolling:
  mode: slow_realistic
  windows:
    calibration_months: 3
    structure_lookback_months: 12
  slow_realistic:
    cadence_months: 3
    triggered_retrain_enabled: true
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    disable_feature_search: true

# rolling_sim 实际读取 rolling.slow_realistic.*；下方 slow_loop 仅供运营/文档契约对照，
# load_pipeline_config 可校验其与 slow_realistic 是否一致（不直接驱动 rolling_sim）。
slow_loop:
  cadence_months: 3
  triggered_retrain:
    enabled: true
  freeze_outputs:
    enabled: true
    keep_latest: 3
fast_loop:
  step_months: 1
  threshold_calibration:
    enabled: true
  symbol_threshold_calibration:
    enabled: true
  execution_opt:
    enabled: true
  pcm_eval:
    enabled: true
symbol_policy:
  mode: hybrid_carry_forward # global_only | symbol_only | hybrid_carry_forward
  carry_forward_ttl_months: 2
  enable_threshold: 0.0
  min_symbol_trades_soft: 10
  carry_forward_hard_fail_rules:
    min_sharpe_r: -0.25
direction_stack:
  mode: ema200 # ema200 | vwap_long_anchor | ensemble
  ema_debounce_bars: 3
  vwap_window_days: 20
slot_allocation:
  mode: quality_ranked
  max_symbols_per_side: 2
  reserve_slots_for_secondary_symbols: 1
  slot_opportunity_penalty: 0.001
  quality_score_weights:
    history_edge: 0.55
    now_strength: 0.45
  quality_lookback_months: 3
stitching:
  enabled: true
  metrics: [sharpe, max_drawdown, total_r, near_stop_rate, slot_full_rate]
  export_trade_map_html: true
event_backtest:
  enabled: true
  promote: true
  # execution 对称调优: initial_r=activation_r=trail_r
  # bpc 趋势骑乘: 给更宽的止损/追踪空间; fer/me: 更紧止损
  sym_r_default: "1.0:1:6.0"
  sym_r_by_family:
    bpc: "2.0:1:6.0"
    fer: "1:1:4"
    me: "1:1:4"
  # execution 参数选择目标:
  # - 默认仍用 Sharpe
  # - 对 me 家族启用 risk_aware，惩罚近-1R密集触发与过大回撤
  exec_objective_default: sharpe
  exec_objective_params:
    near_stop_threshold_r: -0.9
    near_stop_penalty: 0.0
    max_dd_penalty: 0.0
    min_trades_soft: 0
    undertrade_penalty: 0.0
  exec_objective_by_family:
    me:
      objective: risk_aware
      near_stop_threshold_r: -0.9
      near_stop_penalty: 0.45
      max_dd_penalty: 0.02
      min_trades_soft: 60
      undertrade_penalty: 0.002
pcm_slot_grid:
  # 在 Step 9.5 PCM 联合回测后，自动做 slot 网格对比
  enabled: true
  # 平坦区定义：score >= best_score - plateau_delta
  plateau_delta: 0.03
  # 软约束：交易数过低会被扣分（防止只靠极少交易抬 Sharpe）
  min_trades_soft: 80
  penalties:
    # 综合分数:
    # score = sharpe - max_dd_penalty*max_drawdown_r
    #               - slot_full_rate_penalty*slot_full_rate
    #               - undertrade_penalty*undertrade_gap
    max_dd_penalty: 0.02
    slot_full_rate_penalty: 0.20
    undertrade_penalty: 0.001
  # 可按策略家族/方向自由扩展，不限 short-only
  cases:
    - name: baseline
      slots:
        slot_count: 4
        risk_per_slot: 0.01
      per_strategy_limits:
        bpc-short:
          max_slots: 1
        fer-short:
          max_slots: 1
        me-short:
          max_slots: 1
    - name: short_2_1_2
      slots:
        slot_count: 5
        risk_per_slot: 0.008
      per_strategy_limits:
        bpc-short:
          max_slots: 2
        fer-short:
          max_slots: 1
        me-short:
          max_slots: 2
    - name: short_2_2_2
      slots:
        slot_count: 6
        risk_per_slot: 0.007
      per_strategy_limits:
        bpc-short:
          max_slots: 2
        fer-short:
          max_slots: 2
        me-short:
          max_slots: 2
universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap
data_path: data/parquet_data
download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data
strategies:
  bpc:
    config: config/strategies/bpc-long-240T
    timeframe: 240T
    dates:
      holdout_months: 12
      validation_months: 4
    features_gate: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: false
    kpi_gates:
      prefilter:
        min_pass_rate: 0.05
        min_rows: 10
        target_trades_min: 35
        target_trades_max: 260
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: false
          mode: auto_if_locked
          skip_if_cached: false
          max_cases: 12
          min_trades_target: 60
          trade_penalty: 0.0025
          bpc_pullback_score_min_values: 0.40,0.45,0.50
          bpc_pullback_depth_max_values: 0.55,0.60,0.65
          bpc_recovery_min_values: 0.50,0.55,0.60
          target_trades_min: 35
          target_trades_max: 260
          trade_penalty_low: 0.002
          trade_penalty_high: 0.0011
          stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
      entry_filter:
        target_trades_min: 35
        target_trades_max: 260
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        min_score_improvement: 0.005
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.3
      backtest:
        min_trades: 50
      deploy:
        min_trades: 50
    simple_execution:
      sl_r: 4.0
      tp_r: 8.0
      timeout_bars: 500
  fer:
    config: config/strategies/fer-long-240T
    timeframe: 240T
    dates:
      holdout_months: 12
      validation_months: 4
    features_gate: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: false
    kpi_gates:
      prefilter:
        min_pass_rate: 0.05
        min_rows: 300
        target_trades_min: 40
        target_trades_max: 240
        trade_penalty_low: 0.0021
        trade_penalty_high: 0.0012
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: false
          mode: auto_if_locked
          skip_if_cached: false
          max_cases: 12
          min_trades_target: 70
          trade_penalty: 0.0025
          fer_eff_pct_lower_values: 0.0,0.05
          fer_eff_pct_upper_values: 0.30,0.40
          sr_strength_min_values: 0.45,0.55
          dist_to_sr_atr_max_values: 0.8,1.0
          sqs_quality_min_values: 0.50,0.60
          target_trades_min: 40
          target_trades_max: 240
          trade_penalty_low: 0.0021
          trade_penalty_high: 0.0012
          stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.3
        stat_fallback_on_empty: true
        stat_fallback_max_rules: 3
        stat_fallback_min_source_features: 2
      entry_filter:
        target_trades_min: 40
        target_trades_max: 240
        trade_penalty_low: 0.0021
        trade_penalty_high: 0.0012
        stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        min_score_improvement: 0.005
      backtest:
        min_trades: 50
      deploy:
        min_trades: 50
    simple_execution:
      sl_r: 3.0
      tp_r: 6.0
      timeout_bars: 120
  me:
    config: config/strategies/me-long-240T
    timeframe: 240T
    dates:
      holdout_months: 12
      validation_months: 4
    features_gate: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: false
    kpi_gates:
      prefilter:
        min_pass_rate: 0.05
        min_rows: 200
        target_trades_min: 30
        target_trades_max: 200
        trade_penalty_low: 0.0022
        trade_penalty_high: 0.0013
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: false
          mode: auto_if_locked
          skip_if_cached: false
          max_cases: 12
          min_trades_target: 55
          trade_penalty: 0.0025
          atr_lower_values: 0.45,0.55
          atr_upper_values: 0.88,0.92
          me_accel_abs_min_values: 0.10,0.14
          me_cvd_min_values: 0.55,0.65
          target_trades_min: 30
          target_trades_max: 200
          trade_penalty_low: 0.0022
          trade_penalty_high: 0.0013
          stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        deny_rate_max: 0.97
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.2
      entry_filter:
        target_trades_min: 30
        target_trades_max: 200
        trade_penalty_low: 0.0022
        trade_penalty_high: 0.0013
        stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        min_score_improvement: 0.005
      backtest:
        min_trades: 50
      deploy:
        min_trades: 50
    shap_override:
      stability_threshold: 0.5
      top_k: 25
shap_feature_selection:
  enabled: false
  n_folds: 8
  top_k: 20
  stability_threshold: 0.8
  min_stable_features: 1
  protected_nodes:
    - atr_f
    - fer_failure_signals_f
  apply_to:
    - features.yaml
comparison:
  min_trades: 30
  sharpe_adopt_ratio: 0.7
  sharpe_reject_floor: 0.0
  threshold_drift_warn: 1.0
retrain_triggers:
  schedule_days: 90
  sharpe_decay_ratio: 0.5
  consecutive_losses: 8
  max_data_age_days: 120
  leading_indicator_decay: 0.5
deploy_gate:
  trigger_sharpe_improve: 0.05
  trigger_drift_level: HIGH
  min_sharpe_change: 0.03
  require_adopt: true
  min_trades: 50
  require_human_confirm: true
data_flow:
  model_predictions: predictions.parquet
  gated_logs: logs_gated.parquet
  step_inputs:
    prefilter: predictions.parquet
    gate_train: predictions.parquet
    gate_apply: predictions.parquet
    execution: logs_gated.parquet
    backtest: logs_gated.parquet
output:
  history_dir: results/prod_train_history
