# Canonical calendar segments for backtest / promote windows.
#
# - Dates here are the source of truth for segment labels.
# - variant-grid YAML must copy start_date / end_date manually (no loader yet).
# - `recent` overlaps `高位震荡/回落` on purpose: promote holdout vs segment diagnosis.
#
# Usage (examples):
#   bull_2023_2024: 2023-01-01 → 2025-01-01  (ETF rally main bull)
#   recent:          2025-04-01 → 2026-04-01  (standard promote holdout)

segments:
  - id: bear_2022
    label: Bear
    start_date: "2022-01-01"
    end_date: "2023-01-01"
    purpose: 熊市基线

  - id: bull_2023_2024
    label: Bull
    start_date: "2023-01-01"
    end_date: "2025-01-01"
    purpose: 牛市主段（含 ETF rally）

  - id: 高位震荡/回落
    label: Bear
    start_date: "2025-01-01"
    end_date: "2025-07-01"
    purpose: 高位震荡/回落

  - id: recent
    label: Recent
    start_date: "2025-04-01"
    end_date: "2026-04-01"
    purpose: promote 标准 holdout
