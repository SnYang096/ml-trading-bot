# 统一报告Schema
# 基于order_management/models.py，统一backtest和live的报告格式

# Position字段
position_fields:
  - position_id: str  # 仓位ID
  - symbol: str  # 交易对
  - side: str  # LONG/SHORT
  - entry_time: datetime  # 开仓时间
  - exit_time: datetime  # 平仓时间（可选）
  - entry_price: float  # 开仓价格
  - exit_price: float  # 平仓价格（可选）
  - initial_size: float  # 初始仓位大小
  - current_size: float  # 当前仓位大小
  - total_cost: float  # 总成本
  - total_value: float  # 当前总价值（可选）
  - unrealized_pnl: float  # 未实现盈亏（可选）
  - realized_pnl: float  # 已实现盈亏
  - status: str  # OPEN/CLOSED/PARTIAL
  - stop_loss_price: float  # 止损价格（可选）
  - take_profit_price: float  # 止盈价格（可选）
  - trailing_stop_config: dict  # 追踪止损配置（可选）
  - exit_reason: str  # 平仓原因（可选）
  - strategy_id: str  # 策略ID（可选）
  - notes: str  # 备注（可选）

# Operation字段
operation_fields:
  - operation_id: str  # 操作ID
  - position_id: str  # 关联仓位ID
  - operation_type: str  # entry/add_on/reduce/stop_loss_move/take_profit_move/exit
  - operation_time: datetime  # 操作时间
  - size: float  # 操作数量
  - price: float  # 操作价格
  - pnl: float  # 本次操作盈亏（可选）
  - cumulative_pnl: float  # 累计盈亏（可选）
  - stop_loss_price: float  # 操作后的止损价（可选）
  - take_profit_price: float  # 操作后的止盈价（可选）
  - reason: str  # 操作原因
  - order_id: str  # 关联订单ID（可选）
  - notes: str  # 备注（可选）

# 扩展字段（用于backtest和live统一）
extended_fields:
  - archetype: str  # TC/TE/FR/ET
  - regime: str  # TREND/MEAN/NO_TRADE
  - gate_decision: str  # allow/veto
  - gate_reasons: dict  # Gate否决原因
  - reflexivity_features: dict  # 反身性特征
    - ofci_pct: float
    - shd_pct: float
    - lfi_pct: float
  - execution_intent: bool  # 是否执行意图
  - execution_submit_order: bool  # 是否提交订单（live only）

# 报告格式
report_format:
  backtest:
    source: "pipeline"
    fields: ["position_fields", "operation_fields", "extended_fields"]
    output_formats: ["json", "markdown"]
  
  live:
    source: "live_trading"
    fields: ["position_fields", "operation_fields", "extended_fields"]
    output_formats: ["json", "markdown", "grafana_json"]

# Grafana数据源格式
grafana_format:
  type: "timeseries"
  fields:
    - time: datetime
    - symbol: str
    - position_id: str
    - operation_type: str
    - price: float
    - size: float
    - pnl: float
    - reason: str
