# Weekly rule-stack monitor manifest (see config/monitoring/README.md).
# Remote: bus-only current windows (no train_final, no monitor-time prepare).
#
# Window keys: near / deep = lookback depth (NOT trading long/short).
monitor_id: weekly_rule_stack
output_dir: results/monitoring/weekly_rule_stack/{run_ts}

windows:
  near:
    source: feature_bus_export
    lookback_days: 7
    timeframe: 120T
    # symbols: omit = all symbols present on bus (align keys with live/highcap/universe.yaml)
    parquet: results/monitoring/window/{run_ts}/features_current_7d.parquet
  deep:
    source: feature_bus_export
    # Regime plateau: use bus rolling depth (~5000 x 120T bars). 0 = full bus file.
    lookback_days: 0
    timeframe: 120T
    # symbols: same set as near when refreshing baseline; must match Tier-0 reference
    parquet: results/monitoring/window/{run_ts}/features_current_deep.parquet

strategies_source: constitution
strategies_layer: pcm
constitution: live/highcap/config/constitution/constitution.yaml
strategies_root: live/highcap/config/strategies

# Shared watchdog tuning (per-step keys override these).
# psi_features: explicit monitoring contract columns (not full features.yaml); see README § PSI.
watchdog_defaults:
  ic_baseline_json: config/monitoring/factor_ic_baseline_tpc_20260611.json
  psi_features: ema_1200_position,adx_50,vol_persistence,vol_leverage_asymmetry
  psi_tol: 0.25
  ic_flip_min_abs: 0.02
  bull_share_tol: 0.10
  trigger_drift_tol_rel: 0.50

steps:
  - export-window: { window: near }
  - account-equity-snapshot: {}
  - validate-window: { window: near }
  - export-window: { window: deep }
  - validate-window: { window: deep }
  - watchdog:
      window: near
      baseline: config/monitoring/regime_watchdog_baseline.json
  - drift:
      window: deep
      emit_rd_loop_suggestions: true
