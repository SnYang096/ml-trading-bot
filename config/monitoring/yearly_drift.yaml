monitor_id: yearly_drift
output_dir: results/monitoring/yearly_drift/{run_ts}

windows:
  deep:
    source: feature_bus_export
    lookback_days: 0
    timeframe: 120T
    parquet: results/monitoring/window/{run_ts}/features_current_full.parquet

strategies_source: constitution
strategies_layer: pcm
constitution: live/highcap/config/constitution/constitution.yaml
strategies_root: live/highcap/config/strategies

steps:
  - export-window: { window: deep }
  - drift:
      window: deep
      emit_rd_loop_suggestions: false
