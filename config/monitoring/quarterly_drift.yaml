monitor_id: quarterly_drift
output_dir: results/monitoring/quarterly_drift/{run_ts}

windows:
  short:
    source: feature_bus_export
    lookback_days: 30
    timeframe: 120T
    parquet: results/monitoring/window/{run_ts}/features_current_30d.parquet
  long:
    source: feature_bus_export
    lookback_days: 0
    timeframe: 120T
    parquet: results/monitoring/window/{run_ts}/features_current_full.parquet

strategies: [bpc, tpc, me, srb]

steps:
  - export-window: { window: short }
  - export-window: { window: long }
  - watchdog:
      window: short
      baseline: config/monitoring/regime_watchdog_baseline.json
  - drift:
      window: long
      emit_rd_loop_suggestions: true
