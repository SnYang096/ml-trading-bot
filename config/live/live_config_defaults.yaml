# Live config: read at startup from this file. No database; single source of truth.
version: 1
name: "live_config_defaults"

# List of enabled archetypes (all 6 archetypes from execution_archetypes.yaml).
# Use "ALL" to automatically enable all registered archetypes.
enabled_archetypes:
  - BreakoutPullbackContinuation
  - HTFBiasLTFEntry
  - MomentumExpansion
  - FailedBreakoutFade
  - LiquiditySweepRejection
  - AuctionExhaustionReversal

# Per-archetype size multipliers (relative to base trade_size).
# Values < 1.0 reduce position size (more conservative).
# Values > 1.0 increase position size (more aggressive).
size_multipliers:
  BreakoutPullbackContinuation: 1.0    # 趋势延续：标准仓位
  HTFBiasLTFEntry: 1.0                  # 趋势延续类：标准仓位
  MomentumExpansion: 1.0                 # 趋势扩张：更克制（"火箭、一次只来一个"）
  FailedBreakoutFade: 1.0                # 失败突破：标准仓位
  LiquiditySweepRejection: 1.0          # 流动性扫荡：标准仓位
  AuctionExhaustionReversal: 0.5         # 拍卖衰竭：小仓位（"医生"：条件极端才用）

# Unified window (minutes) for decision + orderflow feature window.
# This replaces the old check_interval_minutes and orderflow_window_minutes.
window_minutes: 15

# Cooldown between order submissions (minutes).
# Safety mechanism to prevent rapid-fire orders.
min_order_interval_minutes: 10

# Online inference config (optional).
# Set enabled: true and provide model_path to enable real-time inference.
nnmultihead_inference:
  enabled: false
  model_path: "results/runs/tier01_highcap6_2024H1_20260114_024127/nnmh_config_train_multi_240T/model.pt"                        # Path to trained model.pt (e.g., "results/runs/tier01_highcap6_2024H1_20260114_024127/nnmh_config_train_multi_240T/model.pt")
  config_dir: "config/nnmultihead/path_primitives_4h_80h_min"  # Feature/config directory for the model
  device: null                          # "cpu" | "cuda" | null (auto-detect)
  timeframe: "240T"                     # Used by incremental feature computer key names
