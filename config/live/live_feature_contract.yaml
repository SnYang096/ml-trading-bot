version: 1

# Live Feature Contract v1
# Goal: validate that timer-driven decisions are based on credible inputs.
# If not satisfied, the strategy must degrade to NO_TRADE and record reasons.

required:
  # Must exist for *any* decision attempt.
  # (Note: this is a minimal v1. We will expand keys as we make live features
  # consistent with training feature nodes.)
  keys_any:
    # Orderflow presence baseline (tick pipeline working).
    # MetaRouterStrategy uses IncrementalFeatureComputer.get_orderflow_features()
    - vpin
    - imbalance
    - total_vol

nn_inference:
  # If online nnmultihead inference is enabled in live config,
  # these model outputs must be present in the feature dict.
  required_pred_keys:
    - pred_dir_prob
    - pred_mfe_atr
    - pred_mae_atr
    - pred_t_to_mfe

policy:
  on_violation: NO_TRADE

