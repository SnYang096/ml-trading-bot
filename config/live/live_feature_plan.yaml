version: 1
description: "Live feature plan (base training plan + gate auto-detect)"

# Reuse training feature plan for consistency.
base_feature_plan: "config/nnmultihead/path_primitives_4h_80h_min/feature_plan.yaml"

# How to interpret base plan:
# - minimal_required_cols: use feature_plan.feature_contract.minimal_required_cols
# - tiers: expand tiers_enabled -> tier_feature_files -> output_columns
base_feature_plan_mode: "tiers"

# Overlay is optional. Gate-dependent features are now auto-detected from
# execution_archetypes.yaml (when_then_rules) and merged into the feature set.
# Use overlay only to add extra live-only columns/nodes not in base or gate.
overlay:
  add_features: []
  add_feature_nodes: []
