name: feature_indicators
description: >
  Feature indicators visualization configuration.
  When --strategy-config is provided, feature groups are auto-derived from the strategy's
  requested_features/invert_features (via feature_dependencies.yaml).
  This file only controls display and output settings.

# Display settings
display:
  # Show feature statistics in the report
  show_statistics: true
  # Show sample values
  show_samples: true
  # Number of sample values to show
  sample_count: 5
  # Group features by type
  group_by_type: true
  # Generate time-series charts for each feature type
  show_plots: true
  # Max series per chart (subplots if more columns)
  max_columns_per_chart: 6
  # Chart height in pixels (per subplot row)
  chart_height_per_row: 200

# Output settings
output:
  # Include data quality metrics
  include_quality_metrics: true
  # Include feature correlation matrix
  include_correlation: false  # Can be enabled for detailed analysis

