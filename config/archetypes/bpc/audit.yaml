# BPC Archetype 审计配置
name: bpc
archetype: BreakoutPullbackContinuation

description: |
  BPC 策略审计配置。
  使用 Outcome-Based 方法验证 7 条可证伪假设。

# 数据集配置
datasets:
  long:
    direction: long
    label_function: compute_forward_rr_label
    label_params:
      direction: long
      horizon: 50
    description: "做多方向的 BPC 数据集"
    
  short:
    direction: short
    label_function: compute_forward_rr_label
    label_params:
      direction: short
      horizon: 50
    description: "做空方向的 BPC 数据集"

# 审计流程
audit_pipeline:
  steps:
    - name: train_shallow_tree
      config:
        model_type: lightgbm
        max_depth: 3
        num_leaves: 8
        min_data_in_leaf: 500
        
    - name: extract_negative_rules
      config:
        delta_rr_threshold: -0.2
        min_coverage: 0.02
        min_samples: 100
        
    - name: validate_stability
      config:
        time_splits: 5
        perturbation_pct: 0.05
        n_perturbations: 10
        
    - name: map_to_hypotheses
      config:
        hypotheses_file: hypotheses.yaml
        
    - name: generate_report
      config:
        output_dir: reports/audit/bpc

# 负规则到假设的映射规则
rule_to_hypothesis_mapping:
  # 如果负规则涉及某些特征，则映射到对应假设
  feature_patterns:
    - pattern: "bb_width|atr_percentile|volume_ratio"
      hypothesis: H1
      
    - pattern: "trend_r2|path_efficiency|price_dir_consistency|sma"
      hypothesis: H2
      
    - pattern: "sr_strength|dist_to_nearest_sr"
      hypothesis: H3
      
    - pattern: "vpin|ofci|delta"
      hypothesis: H4
      
    - pattern: "rsi|macd"
      hypothesis: H5
      
    - pattern: "regime|volatility"
      hypothesis: H6
      
    - pattern: "bars_since|time_decay"
      hypothesis: H7

# 报告配置
reporting:
  output_dir: reports/audit/bpc
  formats:
    - yaml
    - json
    - html
  include:
    - hypothesis_status
    - negative_rules
    - veto_gates
    - archetype_health
