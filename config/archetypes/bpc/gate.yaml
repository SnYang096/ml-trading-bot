# BPC Archetype Gate 配置
# 通过审计后的 veto 规则写入此处

name: bpc
description: |
  BPC 策略的 Gate 配置。
  包含通过稳定性检验的 veto 规则。

# Gate 执行逻辑
gate_logic:
  veto_hard:
    action: reject
    description: "绝对禁止交易"
    position_multiplier: 0.0
    
  veto_soft:
    action: reduce
    description: "仓位减半"
    position_multiplier: 0.5

# Veto 规则（由审计流程自动填充）
veto_rules:
  veto_hard: []
  veto_soft: []

