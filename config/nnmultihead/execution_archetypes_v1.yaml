version: 1
name: "execution_archetypes_v1"

# Archetype-first (per docs/architecture/克制的设计策略.md):
# - Mean <= 3
# - Trend <= 3
# ExecutionStrategyId MUST be one of these archetype names.

regimes:
  TREND:
    archetypes:
      BreakoutPullbackContinuation:
        required_conditions:
          - structure_breakout
          - healthy_pullback
          - rr_geq_2
        required_evidence: [has_orderflow, has_trend_context, has_volatility]
        evidence_rules:
          - name: has_orderflow
            kind: value_gt
            key: vpin
            threshold: 0.05
            on_missing: error
          - name: has_trend_context
            kind: any_key_contains
            any_key_contains: ["sma_200", "trend_r2", "macd", "hurst", "hilbert"]
          - name: has_volatility
            kind: any_key_contains
            any_key_contains: ["atr", "bb_width", "volume_ratio", "spectrum"]

      MomentumExpansion:
        required_conditions:
          - ttm_above_threshold
          - vol_expansion
          - no_reverse_absorption
        required_evidence: [has_orderflow, has_volatility]
        evidence_rules:
          - name: has_orderflow
            kind: value_gt
            key: vpin
            threshold: 0.05
            on_missing: error
          - name: has_volatility
            kind: any_key_contains
            any_key_contains: ["atr", "bb_width", "spectrum"]

      HTFBiasLTFEntry:
        required_conditions:
          - htf_trend_confirmed
          - ltf_precision_entry
          - not_counter_trend
        required_evidence: [has_orderflow, has_trend_context]
        evidence_rules:
          - name: has_orderflow
            kind: value_gt
            key: vpin
            threshold: 0.05
            on_missing: error
          - name: has_trend_context
            kind: any_key_contains
            any_key_contains: ["sma_200", "trend_r2", "hurst", "hilbert"]

  MEAN:
    archetypes:
      FailedBreakoutFade:
        required_conditions:
          - breakout_failed_close_back
          - no_follow_through
          - absorption_present
          - ttm_break
        required_evidence: [has_orderflow, has_sr_quality]
        evidence_rules:
          - name: has_orderflow
            kind: value_gt
            key: vpin
            threshold: 0.05
            on_missing: error
          - name: has_sr_quality
            kind: any_key_contains
            any_key_contains: ["sr_", "sqs_", "poc_"]

      LiquiditySweepRejection:
        required_conditions:
          - stops_swept
          - high_volume_no_progress
          - rejection_close
        required_evidence: [has_orderflow, has_wick]
        evidence_rules:
          - name: has_orderflow
            kind: value_gt
            key: vpin
            threshold: 0.05
            on_missing: error
          - name: has_wick
            kind: any_key_contains
            any_key_contains: ["wick"]

      AuctionExhaustionReversal:
        required_conditions:
          - long_trend_late_stage
          - vol_climax
          - mfe_extreme
          - momentum_divergence
        required_evidence: [has_orderflow, has_volume_profile]
        evidence_rules:
          - name: has_orderflow
            kind: value_gt
            key: vpin
            threshold: 0.05
            on_missing: error
          - name: has_volume_profile
            kind: any_key_contains
            any_key_contains: ["volume_profile", "vp_"]

  NO_TRADE:
    archetypes: {}

# Optional overlay axis (Vol Mean) is implemented, but should NOT be enabled as mainline.
# It is intentionally not part of the 6 core archetypes.
overlays:
  VolMeanCompressionExpansionReversion:
    regime: MEAN
    required_conditions:
      - vol_compression_history
      - breakout_failed
      - trend_weight_zero
    required_evidence: [has_volatility, has_orderflow]
    evidence_rules:
      - name: has_volatility
        kind: any_key_contains
        any_key_contains: ["atr", "bb_width", "atr_percentile", "bb_width_percentile"]
      - name: has_orderflow
        kind: value_gt
        key: vpin
        threshold: 0.05
        on_missing: error

