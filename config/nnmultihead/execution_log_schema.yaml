schema_version: "v1"
description: "Split-stage execution logs + optional canonical aggregation"

stage_log:
  required_fields:
    - schema_version
    - stage
    - decision_id
    - decision_ts_ns
    - source
    - symbol
  optional_fields:
    - run_id
    - timeframe
    - strategy_name
    - instrument_id
    - timestamp
    - data
  stages:
    - features
    - preds
    - router
    - gate
    - evidence
    - execution
    - returns
    - observability

canonical_log:
  required_fields:
    - schema_version
    - source
    - symbol
    - timestamp
  optional_fields:
    - run_id
    - timeframe
    - strategy_name
    - instrument_id
  sections:
    features:
      description: "Merged feature snapshot at decision time"
      optional: true
    preds:
      description: "NN multihead predictions (pred_* columns)"
      optional: true
    router:
      description: "Router decision and thresholds"
      optional: true
      fields:
        mode: "NO_TRADE|MEAN|TREND"
        thresholds: "router thresholds used for decision"
        scores: "head_* derived scores if available"
    gate:
      description: "Gate decisions (contract / evidence / heuristics / rules)"
      optional: true
      fields:
        blocked: "boolean"
        decisions: "list of decision strings"
        reasons: "dict of sub-reasons (contract/evidence/heuristics/execution_rules)"
    evidence:
      description: "Evidence flags computed from features"
      optional: true
    execution:
      description: "Execution intent and order decision"
      optional: true
      fields:
        intent: "boolean (router decided to trade)"
        submit_order: "boolean (order submitted)"
        side: "BUY|SELL|null"
        qty: "float|null"
        price: "float|null"
        reason: "string|null"
    returns:
      description: "Counterfactual returns (pipeline only)"
      optional: true
      fields:
        ret_mean: "float|null"
        ret_trend: "float|null"
        drawdown: "float|null"
    observability:
      description: "Runtime diagnostics (tick gap, missing rate, entropy)"
      optional: true
