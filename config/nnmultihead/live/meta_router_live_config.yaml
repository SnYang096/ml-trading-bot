version: 1
name: "meta_router_live_config"

# One Nautilus Strategy hosts all archetypes; do NOT run one-strategy-per-archetype.
# [LEGACY] enabled_archetypes: Regime-based archetype selection has been removed.
# All archetypes are now evaluated through gate rules and evidence rules.
# This section is kept for backward compatibility but is no longer used.
enabled_archetypes:
  TREND:
    - TrendContinuationTC
    - TrendExpansionTE
  MEAN:
    - FailureReversionFR
  ET:  # NEW: ET_REGIME for ExhaustionTurnET
    - ExhaustionTurnET
  NO_TRADE: []

# Per-archetype size multipliers (relative to base trade_size).
size_multipliers:
  TrendContinuationTC: 1.0
  TrendExpansionTE: 0.6            # "火箭、一次只来一个" (默认更小、更克制)
  FailureReversionFR: 1.0
  ExhaustionTurnET: 0.5            # "医生": 小仓位、条件极端才用

# Vol Mean overlay (Mean Alpha #2): implemented but disabled by default.
vol_mean:
  enabled: false
  archetype_id: VolMeanCompressionExpansionReversion
  size_multiplier: 0.05

# Router thresholds (Rule 3-action) - optional overrides for live.
router_thresholds:
  preds_in_log1p: true
  mfe_min: 0.4
  eff_min: 1.05
  dir_conf_trend_min: 0.25
  mfe_trend_min: 0.8
  ttm_trend_min: 8.0
  eff_mean_min: 1.15
  ttm_mean_max: 12.0

# nnmultihead online inference (model produces preds_* used by rule router)
nnmultihead_inference:
  enabled: true
  model_path: "results/runs/tier01_highcap6_2024H1_20260114_024127/nnmh_config_train_multi_240T/model.pt"
  config_dir: "config/nnmultihead/path_primitives_4h_80h_min"
  device: null              # cpu|cuda|null(auto in torch)
  timeframe: "240T"         # used by incremental feature computer key names

# Streaming decision loop:
decision_loop:
  enabled: true
  check_interval_minutes: 10          # run router/execution decision every N minutes
  orderflow_window_minutes: 15        # when building orderflow features from ticks
  min_order_interval_minutes: 10      # cooldown between submits (safety)
