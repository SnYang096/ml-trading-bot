version: 1
name: "meta_router_live_config_smoke"

enabled_archetypes:
  TREND:
    - TrendContinuationTC
    - TrendExpansionTE
  MEAN:
    - FailureReversionFR
    - ExhaustionTurnET
  NO_TRADE: []

size_multipliers:
  TrendContinuationTC: 1.0
  TrendExpansionTE: 0.6
  FailureReversionFR: 1.0
  ExhaustionTurnET: 0.5

vol_mean:
  enabled: false
  archetype_id: VolMeanCompressionExpansionReversion
  size_multiplier: 0.05

router_thresholds:
  preds_in_log1p: true
  mfe_min: 0.4
  eff_min: 1.05
  dir_conf_trend_min: 0.25
  mfe_trend_min: 0.8
  ttm_trend_min: 8.0
  eff_mean_min: 1.15
  ttm_mean_max: 12.0

# Smoke run: disable inference to avoid model/feature mismatch.
nnmultihead_inference:
  enabled: false
  model_path: null
  config_dir: null
  device: null
  timeframe: "240T"

decision_loop:
  enabled: true
  check_interval_minutes: 10
  orderflow_window_minutes: 15
  min_order_interval_minutes: 10
