version: 3
name: execution_archetypes_when_then_v1
schema:
  phases:
  - safety
  - exclusions
  - preconditions
  - evidence
  - decision
  evaluation_order: safety -> exclusions -> preconditions -> evidence -> decision
  default_action: deny
  note: All rules use when-then. priority orders rules within phase.
archetypes:
  BreakoutPullbackContinuation:
    default_action: allow
    execution_constraints:
      allow_add_on: false
      min_order_interval_minutes: 60
      fixed_rr:
        stop_loss_r: 1.0
        take_profit_r: 2.5
        max_holding_bars: null
    direction_policy:
      direction_source: structure
      structure_direction:
        method: trend_sign
        lookback_bars: 5
        min_consistency: 0.6
    # ====== 特征分层定义（供报告/特征迁移使用） ======
    feature_layers:
      atomic:
        description: "原子信号（price, vol, cvd 分开）- 供树模型自由组合发现新规律"
        breakout:
          - bpc_price_breakout_strength   # 价格突破强度
          - bpc_vol_breakout_confirm      # 成交量确认
          - bpc_cvd_breakout_confirm      # CVD确认
          - bpc_vpin_breakout_confirm     # VPIN确认
        pullback:
          - bpc_pullback_depth            # 回踩深度
          - bpc_pullback_quality          # 回踩质量
          - bpc_vol_pullback_confirm      # 缩量确认
          - bpc_cvd_absorption            # CVD吸收
        continuation:
          - bpc_recovery_strength         # 恢复强度
          - bpc_momentum_confirm          # 动量确认
          - bpc_vol_continuation_confirm  # 放量确认
          - bpc_cvd_momentum              # CVD动量
          - bpc_vpin_rising               # VPIN上升
        neutral:
          - bpc_bb_compression            # 波动率压缩
          - bpc_vol_compression           # 成交量压缩
      composite:
        description: "组合信号（领域知识加权）- 体现领域知识，作为强先验"
        - bpc_score_breakout              # 突破综合分
        - bpc_score_pullback              # 回踩综合分
        - bpc_score_continuation          # 续行综合分
        - bpc_score_neutral               # 中性综合分
      contextual:
        description: "状态信号（方向/阶段/环境）- 提供上下文信息"
        - bpc_breakout_direction          # 突破方向 (1/-1)
        - bpc_direction_confidence        # 方向置信度
        - bpc_is_after_breakout           # 是否在突破后
        - bpc_was_in_pullback             # 是否经历过回踩
        - bpc_vol_ratio                   # 成交量比率
        - bpc_cvd_z                       # CVD z-score
    plateau_candidates:
    - bpc_path_efficiency_high
    - bpc_dir_consistency_high
    - bpc_compression_score
    rule_groups:
      safety:
      - bpc_reflexivity_shd_too_high
      - bpc_reflexivity_ofci_extreme
      exclusions:
      - bpc_jump_risk_too_low
      - bpc_jump_risk_too_high
      - bpc_atr_slope_too_high
      preconditions:
      - bpc_path_efficiency_high
      - bpc_dir_consistency_high
      - bpc_compression_score
      evidence:
      - bpc_orderflow_present
      - bpc_pullback_not_reversed
    when_then_rules:
    - id: bpc_reflexivity_shd_too_high
      phase: safety
      priority: 1
      reason: 反身性风险
      when:
        shd_pct:
          quantile_gt: 0.85
      then:
        action: deny
    - id: bpc_reflexivity_ofci_extreme
      phase: safety
      priority: 1
      reason: 反身性风险
      when:
        ofci_pct:
          quantile_gt: 0.85
      then:
        action: deny
    - id: bpc_jump_risk_too_low
      phase: exclusions
      priority: 2
      reason: regime:低跳空风险不利趋势续航
      when:
        jump_risk_pct:
          quantile_lt: 0.3
      then:
        action: deny
    - id: bpc_jump_risk_too_high
      phase: exclusions
      priority: 2
      reason: regime:跳空风险过高
      when:
        jump_risk_pct:
          quantile_gt: 0.6
      then:
        action: deny
    - id: bpc_atr_slope_too_high
      phase: exclusions
      priority: 2
      reason: regime:高波动不适合BPC
      when:
        atr_percentile:
          quantile_gt: 0.7
      then:
        action: deny
    - id: bpc_path_efficiency_high
      phase: preconditions
      priority: 2
      reason: 强语义:趋势结构有效（结构再次被市场证明）
      when:
        path_efficiency_pct:
          quantile_gte: 0.6
      then:
        action: require
    - id: bpc_dir_consistency_high
      phase: preconditions
      priority: 2
      reason: 强语义:方向一致性
      when:
        price_dir_consistency_pct:
          quantile_gte: 0.6
      then:
        action: require
    - id: bpc_compression_score
      phase: preconditions
      priority: 2
      reason: 强语义:结构压缩→解压（compression score > 0.75）
      when:
        path_efficiency_pct:
          quantile_gte: 0.55
      then:
        action: require
    - id: bpc_orderflow_present
      phase: evidence
      priority: 3
      reason: 证据:订单流支撑（pullback未被反向接管）
      when:
        vpin:
          quantile_gt: 0.55
      then:
        action: require
    - id: bpc_pullback_not_reversed
      phase: evidence
      priority: 3
      reason: 证据:反向单没有真的掌控订单簿（cvd_change_5_pct不极端负）
      when:
        cvd_change_5_pct:
          value_gt: 0.3
      then:
        action: require
  HTFBiasLTFEntry:
    default_action: allow
    execution_constraints:
      allow_add_on: false
      min_order_interval_minutes: 30
      fixed_rr:
        stop_loss_r: 0.8
        take_profit_r: 2.0
        max_holding_bars: null
    direction_policy:
      direction_source: structure
      structure_direction:
        method: trend_sign
        lookback_bars: 10
        min_consistency: 0.6
    # ====== 特征分层定义 ======
    feature_layers:
      atomic:
        description: "原子信号 - 供树模型自由组合发现新规律"
        htf_bias:
          - htf_trend_strength        # HTF趋势强度
          - htf_path_efficiency       # HTF路径效率
          - htf_dir_consistency       # HTF方向一致性
          - htf_vol_trend_confirm     # HTF成交量确认
        ltf_entry:
          - ltf_pullback_quality      # LTF回踩质量
          - ltf_wick_rejection        # LTF影线拒绝
          - ltf_vol_entry_confirm     # LTF入场成交量确认
          - ltf_cvd_entry_confirm     # LTF入场CVD确认
        alignment:
          - htf_ltf_dir_match         # 方向匹配
          - htf_ltf_momentum_align    # 动量对齐
          - htf_ltf_vol_sync          # 成交量同步
      composite:
        description: "组合信号（领域知识加权）"
        - htf_score_bias              # HTF偏见综合分
        - ltf_score_entry             # LTF入场综合分
        - htf_ltf_score_alignment     # 对齐综合分
      contextual:
        description: "状态信号（方向/环境）"
        - htf_direction               # HTF方向
        - ltf_direction               # LTF方向
        - htf_ltf_aligned             # 是否对齐
      failure:
        description: "失败信号 - 供树模型发现语义不成立的条件"
        - htf_trend_exhaustion        # HTF趋势力竭
        - ltf_false_entry             # LTF假入场
        - htf_ltf_divergence          # HTF/LTF背离
        - htf_ltf_failure_score       # 失败综合分
    plateau_candidates:
    - htf_path_efficiency_high
    - htf_dir_consistency_high
    rule_groups:
      safety:
      - htf_reflexivity_shd_too_high
      - htf_reflexivity_ofci_extreme
      exclusions:
      - htf_jump_risk_too_high
      preconditions:
      - htf_path_efficiency_high
      - htf_dir_consistency_high
      evidence:
      - htf_ltf_orderflow_ok
      - htf_ltf_wick_rejection
    when_then_rules:
    - id: htf_reflexivity_shd_too_high
      phase: safety
      priority: 1
      reason: 反身性风险
      when:
        shd_pct:
          quantile_gt: 0.85
      then:
        action: deny
    - id: htf_reflexivity_ofci_extreme
      phase: safety
      priority: 1
      reason: 反身性风险
      when:
        ofci_pct:
          quantile_gt: 0.85
      then:
        action: deny
    - id: htf_jump_risk_too_high
      phase: exclusions
      priority: 2
      reason: regime:跳空风险过高
      when:
        jump_risk_pct:
          quantile_gt: 0.6
      then:
        action: deny
    - id: htf_path_efficiency_high
      phase: preconditions
      priority: 2
      reason: 强语义:HTF趋势结构有效（大方向对）
      when:
        path_efficiency_pct:
          quantile_gte: 0.6
      then:
        action: require
    - id: htf_dir_consistency_high
      phase: preconditions
      priority: 2
      reason: 强语义:HTF方向一致性
      when:
        price_dir_consistency_pct:
          quantile_gte: 0.6
      then:
        action: require
    - id: htf_ltf_orderflow_ok
      phase: evidence
      priority: 3
      reason: 证据:LTF订单流一致（entry bar HTF方向一致，无反向主导imbalance）
      when:
        vpin:
          quantile_gt: 0.5
      then:
        action: require
    - id: htf_ltf_wick_rejection
      phase: evidence
      priority: 3
      reason: 证据:LTF反向wick被立即吸收
      when:
        cvd_change_5_pct:
          value_gt: 0.4
      then:
        action: require
  MomentumExpansion:
    default_action: allow
    execution_constraints:
      allow_add_on: false
      min_order_interval_minutes: 30
      fixed_rr:
        stop_loss_r: 1.2
        take_profit_r: 2.0
        max_holding_bars: null
    direction_policy:
      direction_source: structure
      structure_direction:
        method: breakout_sign
        fallback: recent_return
        lookback_bars: 10
        atr_mult: 0.3
    # ====== 特征分层定义 ======
    feature_layers:
      atomic:
        description: "原子信号 - 供树模型自由组合发现新规律"
        expansion:
          - me_atr_expansion           # ATR扩张
          - me_bb_width_expansion      # 布林带宽度扩张
          - me_range_expansion         # 区间扩张
          - me_vol_surge               # 成交量放大
        acceleration:
          - me_price_acceleration      # 价格加速度
          - me_vol_acceleration        # 成交量加速度
          - me_momentum_slope          # 动量斜率
        orderflow:
          - me_vpin_active             # VPIN活跃
          - me_cvd_directional         # CVD方向性
          - me_cluster_intensity       # 聚集强度
      composite:
        description: "组合信号（领域知识加权）"
        - me_score_expansion           # 扩张综合分
        - me_score_acceleration        # 加速度综合分
        - me_score_orderflow           # 订单流综合分
        - me_score_total               # 总综合分
      contextual:
        description: "状态信号（方向/环境）"
        - me_direction                 # 方向
        - me_is_expanding              # 是否在扩张
        - me_vol_ratio                 # 成交量比率
      failure:
        description: "失败信号 - 供树模型发现语义不成立的条件"
        - me_false_expansion           # 假扩张
        - me_vol_divergence            # 成交量背离
        - me_orderflow_exhaustion      # 订单流力竭
        - me_failure_score             # 失败综合分
      context:
        description: "上下文特征（Regime适合度）"
        - me_jump_risk_suitable        # 跳空风险适合度
        - me_reflex_risk               # 反身性风险
        - me_regime_suitable           # Regime适合度
    plateau_candidates:
    - me_jump_risk_high
    - me_atr_slope_high
    - me_range_expansion_high
    rule_groups:
      safety:
      - me_reflexivity_shd_too_high
      - me_reflexivity_ofci_extreme
      exclusions:
      - me_jump_risk_too_low
      - me_jump_risk_too_high
      preconditions:
      - me_atr_slope_high
      - me_range_expansion_high
      evidence:
      - me_orderflow_present
      - me_volume_surge
    when_then_rules:
    - id: me_reflexivity_shd_too_high
      phase: safety
      priority: 1
      reason: 反身性风险
      when:
        shd_pct:
          quantile_gt: 0.85
      then:
        action: deny
    - id: me_reflexivity_ofci_extreme
      phase: safety
      priority: 1
      reason: 反身性风险
      when:
        ofci_pct:
          quantile_gt: 0.85
      then:
        action: deny
    - id: me_jump_risk_too_low
      phase: exclusions
      priority: 2
      reason: regime:跳空风险不足（真钱正在加速流入）
      when:
        jump_risk_pct:
          quantile_lt: 0.6
      then:
        action: deny
    - id: me_jump_risk_too_high
      phase: exclusions
      priority: 2
      reason: regime:跳空风险过高
      when:
        jump_risk_pct:
          quantile_gt: 0.9
      then:
        action: deny
    - id: me_atr_slope_high
      phase: preconditions
      priority: 2
      reason: 强语义:波动扩张（动能×波动率告诉你钱在加速流入）
      when:
        atr_percentile:
          quantile_gte: 0.7
      then:
        action: require
    - id: me_range_expansion_high
      phase: preconditions
      priority: 2
      reason: 强语义:区间扩张（bb_width > percentile(80)）
      when:
        bb_width_normalized_pct:
          quantile_gte: 0.7
      then:
        action: require
    - id: me_orderflow_present
      phase: evidence
      priority: 3
      reason: 证据:订单流加速（连续方向性cluster，cluster间距缩短）
      when:
        vpin:
          quantile_gt: 0.55
      then:
        action: require
    - id: me_volume_surge
      phase: evidence
      priority: 3
      reason: 证据:成交量放大（单有没有来得越来越快）
      when:
        volume_ratio_pct:
          quantile_gt: 0.6
      then:
        action: require
  FailedBreakoutFade:
    default_action: allow
    execution_constraints:
      allow_add_on: false
      min_order_interval_minutes: 60
      fixed_rr:
        stop_loss_r: 1.0
        take_profit_r: 2.0
        max_holding_bars: 8
        min_holding_bars: 3
    direction_policy:
      direction_source: structure
      structure_direction:
        method: failed_breakout
        lookback_bars: 10
        atr_mult: 0.3
    # ====== 特征分层定义 ======
    feature_layers:
      atomic:
        description: "原子信号 - 供树模型自由组合发现新规律"
        false_breakout:
          - fbf_breakout_attempt       # 突破尝试
          - fbf_breakout_failed        # 突破失败
          - fbf_price_return_speed     # 价格回归速度
          - fbf_liquidity_void_risk    # 流动性真空风险
        rejection:
          - fbf_wick_upper_ratio       # 上影线比例
          - fbf_wick_lower_ratio       # 下影线比例
          - fbf_wick_exhaustion        # 影线力竭
          - fbf_vol_rejection          # 成交量拒绝
        fade:
          - fbf_reversal_momentum      # 反转动量
          - fbf_cvd_reversal           # CVD反转
          - fbf_sr_proximity           # SR接近度
      composite:
        description: "组合信号（领域知识加权）"
        - fbf_score_false_breakout     # 假突破综合分
        - fbf_score_rejection          # 拒绝综合分
        - fbf_score_fade               # Fade综合分
        - fbf_score_total              # 总综合分
      contextual:
        description: "状态信号（方向/环境）"
        - fbf_direction                # 方向
        - fbf_is_failed_breakout       # 是否假突破
        - fbf_near_sr                  # 是否接近SR
      failure:
        description: "失败信号 - 供树模型发现语义不成立的条件"
        - fbf_true_breakout_risk       # 真突破风险
        - fbf_weak_rejection           # 弱拒绝
        - fbf_sr_not_holding           # SR不守
        - fbf_failure_score            # 失败综合分
    plateau_candidates:
    - fbf_wick_scene
    - fbf_fp_scene
    - fbf_vpin_spike
    rule_groups:
      safety:
      - fbf_reflexivity_shd_too_high
      - fbf_reflexivity_ofci_extreme
      exclusions:
      - fbf_jump_risk_too_high
      preconditions:
      - fbf_false_breakout
      - fbf_volume_profile_rejection
      evidence:
      - fbf_wick_scene_long_wick
      - fbf_fp_aggressive_but_stuck
      - fbf_vpin_spike
    when_then_rules:
    - id: fbf_reflexivity_shd_too_high
      phase: safety
      priority: 1
      reason: 反身性风险，这里是太拥挤反而不做FR
      when:
        shd_pct:
          quantile_gt: 0.9
      then:
        action: deny
    - id: fbf_reflexivity_ofci_extreme
      phase: safety
      priority: 1
      reason: 反身性风险
      when:
        ofci_pct:
          quantile_gt: 0.9
      then:
        action: deny
    - id: fbf_jump_risk_too_high
      phase: exclusions
      priority: 2
      reason: regime:跳空风险过高
      when:
        jump_risk_pct:
          quantile_gt: 0.9
      then:
        action: deny
    - id: fbf_false_breakout
      phase: preconditions
      priority: 2
      reason: 强语义:假突破（突破尝试失败，价格回到SR附近）
      when:
        all_of:
        - liquidity_void_false_breakout_risk:
            quantile_gt: 0.6
        - dist_to_nearest_sr:
            quantile_lt: 0.7
      then:
        action: require
    - id: fbf_near_quality_sr
      phase: preconditions
      priority: 2
      reason: 强语义:靠近高质量SR（SR强度高且距离近）
      when:
        all_of:
        - sr_strength_max:
            quantile_gte: 0.5
        - dist_to_nearest_sr:
            quantile_lt: 0.3
        min_matches: 2
      then:
        action: require
    - id: fbf_volume_profile_rejection
      phase: preconditions
      priority: 2
      reason: 强语义:成交分布拒绝（wick exhaustion表示价格被拒绝）
      when:
        wick_exhaustion_score:
          quantile_gt: 0.4
      then:
        action: require
    - id: fbf_evidence_any
      phase: evidence
      priority: 3
      reason: 证据:至少满足一个证据条件（wick/cvd）
      when:
        any_of:
        - range_ratio_5bar:
            quantile_gt: 0.4
        - cvd_change_5:
            quantile_lt: 0.6
        min_matches: 1
      then:
        action: require
  LiquiditySweepRejection:
    default_action: allow
    execution_constraints:
      allow_add_on: false
      min_order_interval_minutes: 60
      fixed_rr:
        stop_loss_r: 1.0
        take_profit_r: 2.0
        max_holding_bars: 24
    direction_policy:
      direction_source: structure
      structure_direction:
        method: reverse_of
        base: sweep_side
        fallback: failed_breakout
        lookback_bars: 10
        atr_mult: 0.3
    # ====== 特征分层定义 ======
    feature_layers:
      atomic:
        description: "原子信号 - 供树模型自由组合发现新规律"
        sweep:
          - lsr_sweep_depth            # 扫深度
          - lsr_sweep_speed            # 扫速度
        rejection:
          - lsr_wick_rejection         # 影线拒绝
          - lsr_vol_spike              # 成交量尖峰
          - lsr_price_snap_back        # 价格弹回
          - lsr_liquidity_return       # 流动性回归
        reversal:
          - lsr_cvd_flip               # CVD翻转
          - lsr_momentum_reversal      # 动量反转
          - lsr_cluster_failed         # 聚集失败
      composite:
        description: "组合信号（领域知识加权）"
        - lsr_score_sweep              # 扫综合分
        - lsr_score_rejection          # 拒绝综合分
        - lsr_score_reversal           # 反转综合分
        - lsr_score_total              # 总综合分
      contextual:
        description: "状态信号（方向/环境）"
        - lsr_sweep_side               # 扫方向
        - lsr_near_sr                  # 是否接近SR
      failure:
        description: "失败信号 - 供树模型发现语义不成立的条件"
        - lsr_trend_continuation_risk  # 趋势延续风险
        - lsr_weak_rejection           # 弱拒绝
        - lsr_no_liquidity_return      # 无流动性回归
        - lsr_failure_score            # 失败综合分
    plateau_candidates:
    - lsr_liquidity_void
    - lsr_fp_scene
    - lsr_trade_cluster
    rule_groups:
      safety:
      - lsr_reflexivity_shd_too_high
      - lsr_reflexivity_ofci_extreme
      exclusions:
      - lsr_jump_risk_too_high
      preconditions:
      - lsr_liquidity_sweep_detected
      evidence:
      - lsr_liquidity_void_scene
      - lsr_fp_opposite_imbalance
      - lsr_trade_cluster_failed
    when_then_rules:
    - id: lsr_reflexivity_shd_too_high
      phase: safety
      priority: 1
      reason: 反身性风险
      when:
        shd_pct:
          quantile_gt: 0.9
      then:
        action: deny
    - id: lsr_reflexivity_ofci_extreme
      phase: safety
      priority: 1
      reason: 反身性风险
      when:
        ofci_pct:
          quantile_gt: 0.9
      then:
        action: deny
    - id: lsr_jump_risk_too_high
      phase: exclusions
      priority: 2
      reason: regime:跳空风险过高
      when:
        jump_risk_pct:
          quantile_gt: 0.4
      then:
        action: deny
    - id: lsr_liquidity_sweep_detected
      phase: preconditions
      priority: 2
      reason: 强语义:流动性扫止损检测（liquidity_void_scene.sweep_detected，被止损引出来的流动性）
      when:
        any_of:
        - jump_risk_pct:
            quantile_gt: 0.5
        - dist_to_nearest_sr:
            quantile_lt: 0.2
        min_matches: 1
      then:
        action: require
    - id: lsr_near_quality_sr
      phase: preconditions
      priority: 2
      reason: 强语义:靠近高质量SR（LSR需要SR作为反转锚点）
      when:
        all_of:
        - sr_strength_max:
            quantile_gte: 0.5
        - dist_to_nearest_sr:
            quantile_lt: 0.3
        min_matches: 2
      then:
        action: require
    - id: lsr_liquidity_void_scene
      phase: evidence
      priority: 3
      reason: 证据:sweep后立刻回到高流动区（liquidity_void_scene）
      when:
        range_ratio_5bar:
          quantile_gt: 0.5
      then:
        action: require
    - id: lsr_fp_opposite_imbalance
      phase: evidence
      priority: 3
      reason: 证据:sweep时单边aggressor，反转时opposite imbalance（fp_scene）
      when:
        cvd_change_5_pct:
          value_lt: 0.5
      then:
        action: require
    - id: lsr_trade_cluster_failed
      phase: evidence
      priority: 3
      reason: 证据:sweep位置单笔巨大但失败的cluster（trade_cluster_scene）
      when:
        volume_ratio_pct:
          quantile_gt: 0.7
      then:
        action: require
  AuctionExhaustionReversal:
    default_action: allow
    execution_constraints:
      allow_add_on: false
      min_order_interval_minutes: 60
      fixed_rr:
        stop_loss_r: 1.0
        take_profit_r: 2.0
        max_holding_bars: 24
    direction_policy:
      direction_source: structure
      structure_direction:
        method: reverse_of
        base: trend_sign
        lookback_bars: 10
        min_consistency: 0.5
    # ====== 特征分层定义 ======
    feature_layers:
      atomic:
        description: "原子信号 - 供树模型自由组合发现新规律"
        climax:
          - aer_vol_climax             # 成交量极值
          - aer_atr_climax             # ATR极值
          - aer_range_climax           # 区间极值
          - aer_vol_surge              # 成交量突增
        exhaustion:
          - aer_path_efficiency_mid    # 中等路径效率
          - aer_momentum_decay         # 动量衰减
          - aer_delta_without_progress # 无进展的Delta
          - aer_cluster_effort_waste   # 聚集努力浪费
        reversal:
          - aer_cvd_divergence         # CVD背离
          - aer_price_stall            # 价格停滞
          - aer_wick_absorption        # 影线吸收
      composite:
        description: "组合信号（领域知识加权）"
        - aer_score_climax             # 极值综合分
        - aer_score_exhaustion         # 力竭综合分
        - aer_score_reversal           # 反转综合分
        - aer_score_total              # 总综合分
      contextual:
        description: "状态信号（方向/环境）"
        - aer_trend_direction          # 趋势方向
        - aer_is_exhausting            # 是否在力竭
        - aer_path_length_sufficient   # 路径长度是否足够
      failure:
        description: "失败信号 - 供树模型发现语义不成立的条件"
        - aer_trend_continuation_risk  # 趋势延续风险
        - aer_not_exhausted            # 未力竭
        - aer_no_divergence            # 无背离
        - aer_failure_score            # 失败综合分
      context:
        description: "上下文特征（Regime适合度）"
        - aer_jump_risk_suitable       # 跳空风险适合度
        - aer_reflex_risk              # 反身性风险
        - aer_regime_suitable          # Regime适合度
    plateau_candidates:
    - aer_vol_climax
    - aer_path_efficiency_mid
    - aer_jump_risk_mid
    rule_groups:
      safety:
      - aer_reflexivity_shd_too_high
      - aer_reflexivity_ofci_extreme
      exclusions:
      - aer_jump_risk_too_low
      - aer_jump_risk_too_high
      preconditions:
      - aer_vol_climax
      - aer_path_efficiency_mid
      - aer_path_length_sufficient
      evidence:
      - aer_exhaustion_evidence
    when_then_rules:
    - id: aer_reflexivity_shd_too_high
      phase: safety
      priority: 1
      reason: 反身性风险
      when:
        shd_pct:
          quantile_gt: 0.85
      then:
        action: deny
    - id: aer_reflexivity_ofci_extreme
      phase: safety
      priority: 1
      reason: 反身性风险
      when:
        ofci_pct:
          quantile_gt: 0.85
      then:
        action: deny
    - id: aer_jump_risk_too_low
      phase: exclusions
      priority: 2
      reason: regime:跳空风险不足
      when:
        jump_risk_pct:
          quantile_lt: 0.2
      then:
        action: deny
    - id: aer_jump_risk_too_high
      phase: exclusions
      priority: 2
      reason: regime:跳空风险过高
      when:
        jump_risk_pct:
          quantile_gt: 0.5
      then:
        action: deny
    - id: aer_vol_climax
      phase: preconditions
      priority: 2
      reason: 强语义:波动极值（趋势末期的信仰充值）
      when:
        atr_percentile:
          quantile_gte: 0.85
      then:
        action: require
    - id: aer_path_efficiency_mid
      phase: preconditions
      priority: 2
      reason: 强语义:中等效率易衰竭（趋势没死，但信仰没油了）
      when:
        path_efficiency_pct:
          quantile_gte: 0.55
      then:
        action: require
    - id: aer_path_length_sufficient
      phase: preconditions
      priority: 2
      reason: 强语义:路径长度足够
      when:
        path_length_pct:
          quantile_gte: 0.6
      then:
        action: require
    - id: aer_exhaustion_evidence
      phase: evidence
      priority: 3
      reason: 证据:cluster变大但推进变小，能量峰值后衰减，imbalance仍在但delta不再带动价格
      when:
        any_of:
        - vpin:
            quantile_gt: 0.7
        - cvd_change_5_pct:
            value_lt: 0.3
        min_matches: 1
      then:
        action: require
