# NOTE (important, single-source-of-truth guidance)
# This `features.yaml` is the *base config template* for nnmultihead.
#
# If you run via TaskSpec-driven workflow (recommended):
#   - `mlbot nnmultihead pipeline-3action-e2e --task-spec ...`
#   - or `mlbot nnmultihead materialize-config-from-task-spec --task-spec ...`
#
# Then this file's `feature_pipeline.requested_features.required` is NOT the source of truth:
#   - It will be overwritten by the union of enabled Tier files:
#     `TaskSpec.feature_plan.tiers_enabled` + `TaskSpec.feature_plan.tier_feature_files`
#   - `feature_contract.minimal_required_cols` will also be rebuilt from those tier nodes.
#
# In other words:
#   - Tier files + TaskSpec = single source of truth for "required / what to compute & feed".
#   - This file keeps "template semantics": exclude_columns / optional_blocks schema / missingness policy.
#
# Legacy mode (not recommended): if you run scripts directly with `--config <this_dir>` and without TaskSpec,
# then `required` below becomes the default feature set.
description: |
  NN multi-head base (path primitives) - 仅使用已归一化特征
  
  特征归一化策略：
  - NN 模型对尺度敏感，必须使用归一化特征
  - 原始价格类特征（close, ema, macd等）已被替换为归一化版本
  - 详见 docs/architecture/FEATURE_NORMALIZATION_POLICY.md

feature_pipeline:
  # Keep `atr` in the dataframe for primitives labels/contract scale, but do NOT feed it into the MLP inputs by default.
  # (You can override in CLI for feature search via --exclude-columns, but config is the recommended default.)
  # TaskSpec-only: this value is overridden by TaskSpec.feature_plan.exclude_columns when materialized.
  exclude_columns: [atr]
  requested_features:
    # New structured format: classify features as required vs optional_blocks
    # All features will be computed, but optional_blocks will be masked during training
    # to make the model robust to missing feature blocks during inference.
    
    # Required features (single source of truth):
    # - In TaskSpec workflow, this list is always overwritten by enabled tier files.
    # - Keep it empty here to avoid duplicated definitions across config files.
    required: []
      # NOTE: When using TaskSpec tiers, this list is overwritten. Edit Tier files instead:
      # - config/nnmultihead/path_primitives_4h_80h_min/features_tier0.yaml
      # - config/nnmultihead/path_primitives_4h_80h_min/features_tier1.yaml
      # - config/nnmultihead/path_primitives_4h_80h_min/features_tier2.yaml (optional heavy pack)
      # === 已归一化的核心特征 ===
      

    # Optional blocks are defined in TaskSpec.feature_plan.optional_blocks_library,
    # and enabled via TaskSpec.feature_plan.optional_blocks_enabled.
    # In the *base template* we intentionally omit optional_blocks to avoid duplicated definitions.

  timeframe: 4H
  data_path: data/parquet_data

#
# Feature contract semantics are defined in:
# - `feature_plan_v1.yaml` (feature_plan.feature_contract)
# TaskSpec materialization will write the merged contract into the derived features.yaml, and overwrite
# `minimal_required_cols` with (baseline minimal + tier output_columns union).
