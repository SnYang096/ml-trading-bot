# BPC pullback lab — 极致「回撤不破」（唯一保留的实验根；原 ①②③ 分层 lab 已移除）
# - entry：bpc_pullback_depth / score_pullback / score_continuation / macro_tp_vwap_1200_position 精确定义（见该目录 entry_filters 头注释）
# - gate：收窄 VWAP 死区至 ±0.001，避免主线 ±0.005 挡掉贴锚回踩
# - prefilter：略松于 entry，与 ③ 同思路；skip_locked_prefilter_reanchor 保留手写 recovery/depth
# 策略根：config/strategies_pullback_lab_extreme_pullback/bpc（须先 ./scripts/repair_bpc_pullback_lab_symlinks.sh）

dates:
  start_date: "2023-01-01"
  end_date: "2024-12-31"
  holdout_months: 15
  validation_months: 3

global_toggles:
  locked_threshold_tuning_enabled: true
rolling:
  mode: turbo_fixed_features
  windows:
    calibration_months: 6
    structure_lookback_months: 12
  turbo_fixed_features:
    fixed_strategies_root: config/strategies_pullback_lab_extreme_pullback
    disable_feature_search: true

fast_loop:
  disable_model_training: true
  step_months: 1
  threshold_calibration:
    enabled: true
  prefilter:
    optimize: true
  symbol_threshold_calibration:
    enabled: true
  execution_opt:
    enabled: false
  pcm_eval:
    enabled: false
  direction_tuning:
    enabled: true
    compare_features: false
    promote_after_validate: false

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap
data_path: data/parquet_data
download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data
strategies:
  bpc:
    config: config/strategies_pullback_lab_extreme_pullback/bpc
    skip_locked_prefilter_reanchor: true
    timeframe: 120T
    features_gate: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.05
        min_rows: 10
        target_trades_min: 35
        target_trades_max: 260
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: false
          mode: auto_if_locked
          skip_if_cached: false
          max_cases: 12
          min_trades_target: 60
          trade_penalty: 0.0025
          bpc_pullback_score_min_values: 0.40,0.45,0.50
          bpc_pullback_depth_max_values: 0.55,0.60,0.65
          bpc_recovery_min_values: 0.50,0.55,0.60
          target_trades_min: 35
          target_trades_max: 260
          trade_penalty_low: 0.002
          trade_penalty_high: 0.0011
          stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
      entry_filter:
        meta_algorithm: false
        archetype_plateau: true
        significance_p: 0.10
        significance_min_trades: 4
        plateau_window: 4
        archetype_scoring_method: distribution_ks
        target_trades_min: 35
        target_trades_max: 260
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        min_score_improvement: 0.005
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.3
      backtest:
        min_trades: 50
      deploy:
        min_trades: 50

event_backtest:
  enabled: true
  map_extra_months: 4

output:
  history_dir: results/bpc/turbo-rolling-sim-pullback-lab-extreme-pullback
