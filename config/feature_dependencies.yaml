  footprint_basic_f:
    module: enhanced
    compute_func: compute_footprint_features
    dependencies: []
    required_columns:
    - open
    - high
    - low
    - close
    - volume
    output_columns:
    - fp_poc
    - fp_hvn
    - fp_lvn
    - fp_vah
    - fp_val
    - fp_delta_poc
    - fp_max_imbalance_price
    - fp_max_imbalance_ratio
    - fp_volume_skew
    - fp_delta_skew
    - fp_exhaustion_price
    - fp_exhaustion_zscore
    - fp_delta_divergence
    category: order_flow
    description: Single-bar footprint (POC/HVN/LVN/VAH/VAL + delta/imbalance/skew)
      computed from ticks inside each kline.
    compute_params:
      price_bin_method: fd
      price_bin_target_bins: 40
      value_area_pct: 0.7
      price_bin_size: null
      tick_size: null
      normalized: true
      output_normalization_map:
        # price-like levels -> ATR-distance (cross-asset comparable)
        fp_poc: atr_distance
        fp_hvn: atr_distance
        fp_lvn: atr_distance
        fp_vah: atr_distance
        fp_val: atr_distance
        fp_max_imbalance_price: atr_distance
        fp_exhaustion_price: atr_distance
        # long-tail flow -> log1p + rolling robust scaling (median/IQR)
        fp_delta_poc: log1p_robust_rolling
        fp_max_imbalance_ratio: log1p_robust_rolling
        # bounded transforms for stability
        fp_volume_skew: tanh
        fp_delta_skew: tanh
        fp_exhaustion_zscore: zscore_inbar
        fp_delta_divergence: bounded_0_1
    notes: '- 需要 ticks 数据：columns [''price'',''volume'',''side'']，DatetimeIndex；通过调用时传入
      ticks（不可从 df 推断）。

      - 分箱优先级：tick_size > price_bin_size > Freedman–Diaconis 自适应 > 固定目标 bin 数（均分 price
      range）。

      - 无 tick 的 K 线返回 NaN。

      '
