    dependencies: ["atr"]
    required_columns: ["dist_to_nearest_sr", "atr"]
    output_columns: ["sr_distance_normalized"]
    category: derived
    description: "SR 距离归一化（两个特征的比值：dist / atr）"
    pass_full_df: true
  
  dist_to_zz_high:
    module: enhanced
    compute_func: compute_dist_to_zz_high
    dependencies: []
    required_columns: ["close", "zz_high_value"]
    output_columns: ["dist_to_zz_high"]
    category: derived
    description: "到 ZigZag 高点的距离（两个特征的差值：abs(price - zz_high)）"
    pass_full_df: true
  
  dist_to_zz_low:
    module: enhanced
    compute_func: compute_dist_to_zz_low
    dependencies: []
    required_columns: ["close", "zz_low_value"]
    output_columns: ["dist_to_zz_low"]
    category: derived
    description: "到 ZigZag 低点的距离（两个特征的差值：abs(price - zz_low)）"
    pass_full_df: true
  
  dist_to_zz_high_atr:
    module: enhanced
    compute_func: compute_dist_to_zz_high_atr
    dependencies: ["dist_to_zz_high", "atr"]
    required_columns: ["dist_to_zz_high", "atr"]
    output_columns: ["dist_to_zz_high_atr"]
    category: derived
    description: "到 ZigZag 高点的距离（归一化到 ATR：dist / atr）"
    pass_full_df: true
  
  dist_to_zz_low_atr:
    module: enhanced
    compute_func: compute_dist_to_zz_low_atr
    dependencies: ["dist_to_zz_low", "atr"]
    required_columns: ["dist_to_zz_low", "atr"]
    output_columns: ["dist_to_zz_low_atr"]
    category: derived
    description: "到 ZigZag 低点的距离（归一化到 ATR：dist / atr）"
    pass_full_df: true
  
  cvd_slope_5:
    module: enhanced
    compute_func: compute_cvd_slope
    dependencies: []
    required_columns: ["cvd"]
    output_columns: ["cvd_slope_5"]
    category: derived
    description: "CVD 斜率（单个特征的滚动变换：滚动窗口的线性回归斜率）"
    compute_params:
      window: 5
    pass_full_df: true
  
  atr_ratio:
    module: enhanced
    compute_func: compute_atr_ratio
    dependencies: ["atr"]
    required_columns: ["atr", "close"]
    output_columns: ["atr_ratio"]
    category: derived
    description: "ATR 比率（两个特征的比值：atr / price）"
    pass_full_df: true
  
  bb_width_ratio:
    module: enhanced
    compute_func: compute_bb_width_ratio
    dependencies: []
    required_columns: ["bb_upper", "bb_lower", "bb_middle"]
    output_columns: ["bb_width_ratio"]
    category: derived
    description: "Bollinger Band 宽度比率（多个特征的组合：(upper - lower) / middle）"
    pass_full_df: true
  
  compression_score:
    module: enhanced
    compute_func: compute_compression_score
    dependencies: ["bb_width_ratio"]
    required_columns: ["bb_width_ratio"]
    output_columns: ["compression_score"]
    category: derived
    description: "压缩度分数（单个特征的变换：1 / (1 + bb_width_ratio)）"
    pass_full_df: true
  
  tbr_ma_5:
    module: enhanced
    compute_func: compute_tbr_ma
    dependencies: []
    required_columns: ["taker_buy_ratio"]
    output_columns: ["tbr_ma_5"]
    category: derived
    description: "TBR 移动平均（单个特征的滚动变换）"
    compute_params:
