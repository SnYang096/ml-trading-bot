    category: order_flow
    description: "Composite feature: keep backward-compatible name `vpin_features` while DAG computes vpin + trade_cluster blocks."
    pass_full_df: true
      
      特征说明：
      - VPIN 特征（28个）：
        * 基础特征：vpin（不平衡度，均值）、vpin_signed_imbalance（方向性，均值）
        * **多维对齐特征（关键改进，7个）**：对齐到K线时的多维统计，避免峰值信号被均值稀释
          - vpin_last：最新值（反映最新情绪）
          - vpin_max：峰值（捕捉极端知情交易，关键！避免均值稀释）
          - vpin_min：最小值
          - vpin_std：波动性（衡量VPIN在K线内的变化）
          - vpin_count：事件数（代理流动性，区分高VPIN是突发事件还是持续活跃）
          - vpin_signed_imbalance_last/max：Signed imbalance 的最新值和峰值
        * 滚动统计特征：移动平均、最大值、Z-score、分位数排名、波动率
        * 异常检测：spike_flag（基于 MAD）
        * 动量特征：vpin_momentum（捕捉不平衡加速）
        * 方向性特征：signed_imbalance_zscore（极端买卖压力）
      - Trade Clustering 特征（17个）：
        * 基础特征：最大/平均连续同向成交长度、run 数量、不平衡比率、方向熵
        * 衍生特征：run 比率、移动平均、方向熵的移动平均/Z-score/变化率
        * 与 VPIN 互补：VPIN 关注 volume-bucketed 净买卖差，Trade Clustering 关注连续同向成交的时序模式
        * 方向熵（Directional Entropy）：捕捉成交方向的混乱度
          - 低熵（接近0）= 高度聚集（如长期单边）
          - 高熵（接近1）= 频繁切换（混乱）
          - 即使 imbalance_ratio 相同，entropy 也能区分不同的模式
      
      所有策略建议全部加载，由模型自动选择有用特征。
  
