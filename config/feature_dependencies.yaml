# 特征依赖配置文件
# 定义所有特征及其依赖关系

features:
  # ========================================================================
  # 基础技术指标（无依赖）
  # ========================================================================
  atr:
    module: baseline
    compute_func: BaselineFeatureEngineer._compute_atr
    dependencies: []
    required_columns: ["high", "low", "close"]
    output_columns: ["atr"]
    category: technical_indicator
    description: "Average True Range"
  
  rsi:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_rsi
    dependencies: []
    required_columns: ["close"]
    output_columns: ["rsi"]
    category: technical_indicator
    description: "Relative Strength Index"
    compute_params:
      period: 14
    pass_full_df: false
    column_mappings:
      series: close
  
  macd:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_macd
    dependencies: []
    required_columns: ["close"]
    output_columns: ["macd", "macd_signal", "macd_histogram"]
    category: technical_indicator
    description: "MACD Indicator"
    compute_params:
      fast: 12
      slow: 26
      signal: 9
    pass_full_df: false
    column_mappings:
      series: close
  
  acceleration_3:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_acceleration_3
    dependencies: []
    required_columns: ["close"]
    output_columns: ["acceleration_3"]
    category: technical_indicator
    description: "Momentum acceleration: normalized ROC(3) difference (动量加速度)"
    pass_full_df: true
    compute_params:
      feature_shift: 0
  
  bb_width:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_bb_width_features
    dependencies: []
    required_columns: ["close", "high", "low"]
    output_columns: ["bb_upper", "bb_middle", "bb_lower", "bb_width", "bb_width_normalized"]
    category: volatility
    description: "Bollinger band width and ATR-normalized width"
    pass_full_df: true
  
  range_ratio_5bar:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_range_ratio_5bar
    dependencies: []
    required_columns: ["high", "low"]
    output_columns: ["range_ratio_5bar"]
    category: volatility
    description: "Short vs long term range ratio (5 vs 20 bar)"
    pass_full_df: true
  
  volatility_reversal_score:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_volatility_reversal_score
    dependencies: []
    required_columns: ["high", "low", "close"]
    output_columns: ["volatility_reversal_score"]
    category: volatility
    description: "ATR mean-reversion z-score"
    pass_full_df: true
  
  price_range_symmetry:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_price_range_symmetry
    dependencies: []
    required_columns: ["high", "low", "close"]
    output_columns: ["price_range_symmetry"]
    category: price_structure
    description: "Upper/lower shadow asymmetry score"
    pass_full_df: true
    compute_params:
      feature_shift: 0
  
  volume_anomaly:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_volume_anomaly
    dependencies: []
    required_columns: ["volume"]
    output_columns: ["volume_anomaly"]
    category: liquidity
    description: "Volume anomaly z-score (EWM based)"
    pass_full_df: true
  
  roc_5:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_roc_5
    dependencies: []
    required_columns: ["close"]
    output_columns: ["roc_5"]
    category: momentum
    description: "5-bar rate of change z-score"
    pass_full_df: true
  
  trend_r2_20:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_trend_r2_20
    dependencies: []
    required_columns: ["close"]
    output_columns: ["trend_r2_20"]
    category: trend
    description: "20-bar trend R² (log price)"
    pass_full_df: true
    compute_params:
      feature_shift: 0
  
  trend_r2_50:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_trend_r2_50
    dependencies: []
    required_columns: ["close"]
    output_columns: ["trend_r2_50"]
    category: trend
    description: "50-bar trend R² (log price)"
    pass_full_df: true
    compute_params:
      feature_shift: 0
  
  slope_consistency_score:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_slope_consistency_score
    dependencies: []
    required_columns: ["close"]
    output_columns: ["slope_consistency_score"]
    category: trend
    description: "EMA slope agreement (10/20/50)"
    pass_full_df: true
  
  atr_percentile:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_atr_percentile
    dependencies: []
    required_columns: ["high", "low", "close"]
    output_columns: ["atr_percentile"]
    category: volatility
    description: "Rolling ATR percentile (compression detector)"
    pass_full_df: true
    compute_params:
      window: 288
      shift: 1
  
  trend_volatility_alignment:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_trend_volatility_alignment
    dependencies: []
    required_columns: ["close", "high", "low"]
    output_columns: ["trend_volatility_alignment"]
    category: trend
    description: "Alignment of ROC sign and ATR percentile regime"
    pass_full_df: true
    compute_params:
      feature_shift: 0
  
  compression_to_breakout_prob:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_compression_to_breakout_prob
    dependencies: ["roc_5", "compression_duration"]
    required_columns: ["compression_duration"]
    output_columns: ["compression_to_breakout_prob"]
    category: compression
    description: "Compression duration weighted momentum proxy"
    pass_full_df: true
  
  # ========================================================================
  # WPT 重构价格（所有 SR 的基础）
  # 核心原则：所有 SR 均由 WPT 重构价格生成，实现天然多尺度对齐，无需 resample
  # ========================================================================
  wpt_price_reconstructed:
    module: enhanced
    compute_func: extract_wpt_features
    dependencies: []
    required_columns: ["close", "high", "low"]
    output_columns: ["wpt_price_trend", "wpt_price_fluctuation", "wpt_price_reconstructed"]
    category: wpt
    description: "WPT 重构价格（趋势 + 波动），用于生成多尺度 SR"
    compute_params:
      wavelet: "db4"
      level: 4
    notes: |
      所有 SR（POC、HAL、Swing、ZigZag）都应基于 WPT 重构价格计算，实现天然多尺度对齐。
      - 低频子带（'aaaa'）→ 长期 SR（周线级）
      - 中频子带（'aaad', 'aada'）→ 中期 SR（日线级）
      - 高频子带（'dddd'）→ 短期 SR（分钟级）
  
  # ========================================================================
  # SR 特征（依赖 WPT 重构价格）
  # 注意：所有 SR 特征都基于 WPT 重构价格，实现多尺度对齐
  # ========================================================================
  sqs_hal_high:
    module: baseline
    compute_func: compute_sqs_hal_high
    dependencies: ["atr", "wpt_price_reconstructed"]  # 依赖 WPT 重构价格
    required_columns: ["high", "low", "close", "volume", "atr", "wpt_price_reconstructed"]
    output_columns: ["sqs_hal_high"]
    category: sr_structure
    description: "Structure Quality Score for HAL high (基于 WPT 重构价格)"
    compute_params:
      sr_type: "resistance"
      window: 60
      tolerance_factor: 0.5
      poc_window: 160
      price_col: "wpt_price_reconstructed"
    pass_full_df: true
    notes: "基于 WPT 重构价格计算，实现多尺度对齐"
  
  sqs_hal_low:
    module: baseline
    compute_func: compute_sqs_hal_low
    dependencies: ["atr", "wpt_price_reconstructed"]  # 依赖 WPT 重构价格
    required_columns: ["high", "low", "close", "volume", "atr", "wpt_price_reconstructed"]
    output_columns: ["sqs_hal_low"]
    category: sr_structure
    description: "Structure Quality Score for HAL low (基于 WPT 重构价格)"
    compute_params:
      sr_type: "support"
      window: 60
      tolerance_factor: 0.5
      poc_window: 160
      price_col: "wpt_price_reconstructed"
    pass_full_df: true
    notes: "基于 WPT 重构价格计算，实现多尺度对齐"
  
  sr_strength_max:
    module: baseline
    compute_func: compute_sr_strength_max
    dependencies: ["atr", "sqs_hal_high", "sqs_hal_low", "wpt_price_reconstructed"]  # 依赖 WPT 重构价格
    required_columns: ["high", "low", "close", "atr", "wpt_price_reconstructed"]
    output_columns: ["sr_strength_max"]
    category: sr_structure
    description: "Maximum SR strength across all boundaries (基于 WPT 重构价格)"
    compute_params:
      window: 60
      tolerance_factor: 0.5
    pass_full_df: true
    notes: "所有 SR 边界都基于 WPT 重构价格计算，实现多尺度对齐"
  
  # ========================================================================
  # WPT 特征（无依赖，但可能需要基础数据）
  # 注意：WPT 用于过滤高频噪音，是 POC/HAL 等特征的前置依赖
  # ========================================================================
  wpt_price_fluctuation:
    module: enhanced
    compute_func: extract_wpt_features
    dependencies: []
    required_columns: ["close"]
    output_columns: ["wpt_price_fluctuation", "wpt_price_trend", "wpt_price_energy_low_ratio", "wpt_price_energy_mid_ratio", "wpt_price_energy_high_ratio"]
    category: wpt
    description: "WPT price fluctuation (用于过滤高频噪音，POC/HAL 特征的前置依赖)"
    compute_params:
      wavelet: "db4"
      level: 4
    notes: "WPT 过滤高频噪音，提高 POC/HAL 等 SR 特征的识别准确性"
  
  wpt_cvd_fluctuation:
    module: enhanced
    compute_func: extract_wpt_features
    dependencies: []
    required_columns: ["cvd"]
    output_columns: ["wpt_cvd_fluctuation"]
    category: wpt
    description: "WPT CVD fluctuation"
    compute_params:
      wavelet: "db4"
      level: 4
  
  # ========================================================================
  # 流动性特征（依赖 WPT 和基础指标）
  # 核心功能：识别流动性真空区、真假突破、VPVR 分析
  # ========================================================================
  wpt_vpvr:
    module: enhanced
    compute_func: compute_wpt_vpvr
    dependencies: ["wpt_price_reconstructed", "atr"]
    required_columns: ["close", "high", "low", "volume", "atr"]
    output_columns: ["vpvr_pvp", "vpvr_hvn_count", "vpvr_lvn_count", "vpvr_lvn_distance", "vpvr_volume_density", "vpvr_price_in_lvn"]
    category: liquidity
    description: "WPT 降噪的 VPVR（Volume Profile Visible Range）"
    compute_params:
      wavelet: "db4"
      level: 4
      vpvr_window: 100
      bins: 50
      feature_type: "vpvr"
    pass_full_df: true
    notes: |
      WPT 降噪后的 VPVR 能更清晰地识别关键支撑/阻力位：
      - PVP: Point of Control（最高成交量对应的价格）
      - HVN: High Volume Node（高成交量节点）
      - LVN: Low Volume Node（低成交量节点，流动性真空区）
  
  liquidity_void:
    module: enhanced
    compute_func: extract_liquidity_features
    dependencies: ["wpt_price_reconstructed", "atr"]
    required_columns: ["close", "high", "low", "volume", "atr"]
    output_columns: ["liquidity_void_detected", "liquidity_void_speed", "liquidity_void_volume_ratio", "liquidity_void_retracement", "liquidity_void_false_breakout_risk"]
    category: liquidity
    description: "流动性真空区识别（Liquidity Void / Gap Detection）"
    compute_params:
      lookback_window: 20
      speed_threshold_multiplier: 2.0
      volume_quantile: 0.2
      feature_type: "void"
    notes: |
      流动性真空区 ≠ 历史低成交量区域，而是当前订单簿深度缺失。
      特征：
      - 价格快速穿越（速度 > 阈值）
      - 成交量显著低于前后区间
      - 突破后 1~3 根 K 线内迅速回撤 >50%
  
  wpt_volume_energy:
    module: enhanced
    compute_func: extract_liquidity_features
    dependencies: ["wpt_price_reconstructed", "wpt_cvd_fluctuation"]
    required_columns: ["close", "volume"]
    output_columns: ["wpt_vper_low", "wpt_vper_mid", "wpt_vper_high", "wpt_energy_cascade", "wpt_multi_scale_consistency", "wpt_breakout_confidence", "wpt_false_breakout_risk"]
    category: liquidity
    description: "WPT + Volume 能量协同分析（VPER、能量下移、真假突破判断）"
    compute_params:
      wavelet: "db4"
      level: 4
      lookback_window: 20
      feature_type: "energy"
    notes: |
      WPT + Volume 能量协同分析：
      - VPER: Volume-Price Energy Ratio（量价能量比）
      - 能量下移（Energy Cascade）: 高频能量向中低频转移
      - 多尺度一致性: 至少两个中低频子带同时出现能量上升
      - 真假突破评分: 基于多尺度能量和 VPER 的综合评分
  
  # ========================================================================
  # Hilbert 特征（依赖 WPT 去趋势化）
  # 重要：Hilbert 相位分析必须使用 CVD（而不是 Volume）做相位领先分析
  # 原因：
  # 1. Volume 与 Price 同向共振，相位差≈0，无法区分"跟随"还是"引领"
  # 2. CVD 具有方向性（净买量），可以提前积累，Price 尚未反应时 CVD 已领先
  # 3. CVD 相位领先能够预测价格变化，Volume 相位差几乎无预测价值
  # 4. 必须去趋势化（使用 WPT），否则累积趋势会淹没相位动态
  # ========================================================================
  hilbert_phase:
    module: enhanced
    compute_func: extract_hilbert_features
    dependencies: ["wpt_price_fluctuation", "wpt_cvd_fluctuation"]
    required_columns: ["wpt_price_fluctuation", "wpt_cvd_fluctuation"]
    output_columns: ["hilbert_phase", "hilbert_phase_diff", "hilbert_cvd_leads", "hilbert_cvd_leads_strong", "hilbert_price_envelope", "hilbert_cvd_envelope", "hilbert_price_envelope_slope", "hilbert_cvd_envelope_slope", "hilbert_price_freq_stability", "hilbert_cvd_freq_stability"]
    category: hilbert
    description: "Hilbert phase analysis (必须使用 CVD，不能使用 Volume)"
    notes: |
      Hilbert 相位领先分析的关键要点：
      1. 必须使用 CVD（Cumulative Volume Delta）而不是 Volume
      2. 必须去趋势化（使用 WPT 过滤），否则趋势会淹没相位动态
      3. CVD 相位领先能够预测价格变化，Volume 相位差几乎无预测价值
      4. 只有当 CVD 包络放大 + 相位领先时，才视为有效信号
  
  # ========================================================================
  # Hurst 特征（无依赖）
  # ========================================================================
  hurst_price:
    module: enhanced
    compute_func: extract_hurst_features
    dependencies: []
    required_columns: ["close"]
    output_columns: ["hurst_price"]
  
  # ========================================================================
  # 订单流特征（VPIN）
  # ========================================================================
  vpin_features:
    module: enhanced
    compute_func: extract_order_flow_features
    dependencies: []
    required_columns: ["open", "close", "high", "low", "volume"]
    output_columns: ["vpin", "vpin_ma5", "vpin_ma10", "vpin_ma20", "vpin_max5", "vpin_max10", "vpin_max20", "vpin_change", "vpin_change_pct"]
    category: order_flow
    description: "VPIN (Volume-Synchronized Probability of Informed Trading) - 订单流不平衡指标"
    compute_params:
      vpin_n_buckets: 50
      vpin_adaptive: true
    pass_full_df: true
    notes: |
      VPIN 用于检测知情交易者行为：
      - 如果有 tick 数据，使用真实 VPIN
      - 如果有 buy_qty/sell_qty，使用真实买卖量
      - 否则使用代理 VPIN（基于 OHLCV）
  
  # ========================================================================
  # 特征组合交互（状态 × 动量）- 每个交互特征独立定义
  # ========================================================================
  liquidity_void_x_wpt_risk:
    module: enhanced
    compute_func: compute_liquidity_void_x_wpt_risk
    dependencies: ["liquidity_void", "wpt_volume_energy"]
    required_columns: ["liquidity_void_detected", "wpt_false_breakout_risk"]
    output_columns: ["liquidity_void_x_wpt_risk"]
    category: interaction
    description: "流动性真空 × WPT 假突破风险（SR突破、压缩区突破）"
    pass_full_df: true
  
  compression_energy_x_ofi_short:
    module: enhanced
    compute_func: compute_compression_energy_x_ofi_short
    dependencies: ["wpt_volume_energy"]
    required_columns: ["compression_energy", "ofi_short"]
    output_columns: ["compression_energy_x_ofi_short"]
    category: interaction
    description: "压缩能量 × 订单流强度（压缩区突破）"
    pass_full_df: true
  
  hurst_x_trend_r2:
    module: enhanced
    compute_func: compute_hurst_x_trend_r2
    dependencies: ["hurst_price"]
    required_columns: ["hurst_close_rolling", "trend_r2_20"]
    output_columns: ["hurst_x_trend_r2"]
    category: interaction
    description: "Hurst 指数 × 趋势 R²（趋势策略、SR突破）"
    pass_full_df: true
  
  evt_x_trend_r2:
    module: enhanced
    compute_func: compute_evt_x_trend_r2
    dependencies: []
    required_columns: ["evt_tail_shape", "trend_r2_20"]
    output_columns: ["evt_x_trend_r2"]
    category: interaction
    description: "EVT 尾部风险 × 趋势强度（SR反转、趋势策略）"
    pass_full_df: true
  
  vpin_x_compression:
    module: enhanced
    compute_func: compute_vpin_x_compression
    dependencies: ["vpin_features", "wpt_volume_energy"]
    required_columns: ["vpin", "compression_energy"]
    output_columns: ["vpin_x_compression"]
    category: interaction
    description: "VPIN × 压缩能量（压缩区突破）"
    pass_full_df: true
  
  sma_slope_x_price_pos:
    module: enhanced
    compute_func: compute_sma_slope_x_price_pos
    dependencies: []
    required_columns: ["sma_200_slope", "sma_200", "close"]
    output_columns: ["sma_slope_x_price_pos"]
    category: interaction
    description: "均线斜率 × 价格位置（趋势策略、SR突破）"
    pass_full_df: true
  
  vpin_x_wick_upper:
    module: enhanced
    compute_func: compute_vpin_x_wick_upper
    dependencies: ["vpin_features"]
    required_columns: ["vpin", "wick_upper_ratio"]
    output_columns: ["vpin_x_wick_upper"]
    category: interaction
    description: "VPIN × 上影线占比（SR反转策略）"
    pass_full_df: true
    notes: "高 VPIN + 长上影线 = 强卖压，可能反转"
  
  vpin_x_wick_lower:
    module: enhanced
    compute_func: compute_vpin_x_wick_lower
    dependencies: ["vpin_features"]
    required_columns: ["vpin", "wick_lower_ratio"]
    output_columns: ["vpin_x_wick_lower"]
    category: interaction
    description: "VPIN × 下影线占比（SR反转策略）"
    pass_full_df: true
    notes: "高 VPIN + 长下影线 = 强买压，可能反转"
  
  # Rank transform 版本（可选，如果需要）
  liquidity_void_x_wpt_risk_rank:
    module: enhanced
    compute_func: apply_rank_transform_to_interaction
    dependencies: ["liquidity_void_x_wpt_risk"]
    required_columns: ["liquidity_void_x_wpt_risk"]
    output_columns: ["liquidity_void_x_wpt_risk_rank"]
    category: interaction
    description: "liquidity_void_x_wpt_risk 的 rank transform 版本"
    compute_params:
      interaction_col: "liquidity_void_x_wpt_risk"
    pass_full_df: true
  
  compression_energy_x_ofi_short_rank:
    module: enhanced
    compute_func: apply_rank_transform_to_interaction
    dependencies: ["compression_energy_x_ofi_short"]
    required_columns: ["compression_energy_x_ofi_short"]
    output_columns: ["compression_energy_x_ofi_short_rank"]
    category: interaction
    description: "compression_energy_x_ofi_short 的 rank transform 版本"
    compute_params:
      interaction_col: "compression_energy_x_ofi_short"
    pass_full_df: true
  
  hurst_x_trend_r2_rank:
    module: enhanced
    compute_func: apply_rank_transform_to_interaction
    dependencies: ["hurst_x_trend_r2"]
    required_columns: ["hurst_x_trend_r2"]
    output_columns: ["hurst_x_trend_r2_rank"]
    category: interaction
    description: "hurst_x_trend_r2 的 rank transform 版本"
    compute_params:
      interaction_col: "hurst_x_trend_r2"
    pass_full_df: true
  
  evt_x_trend_r2_rank:
    module: enhanced
    compute_func: apply_rank_transform_to_interaction
    dependencies: ["evt_x_trend_r2"]
    required_columns: ["evt_x_trend_r2"]
    output_columns: ["evt_x_trend_r2_rank"]
    category: interaction
    description: "evt_x_trend_r2 的 rank transform 版本"
    compute_params:
      interaction_col: "evt_x_trend_r2"
    pass_full_df: true
  
  vpin_x_compression_rank:
    module: enhanced
    compute_func: apply_rank_transform_to_interaction
    dependencies: ["vpin_x_compression"]
    required_columns: ["vpin_x_compression"]
    output_columns: ["vpin_x_compression_rank"]
    category: interaction
    description: "vpin_x_compression 的 rank transform 版本"
    compute_params:
      interaction_col: "vpin_x_compression"
    pass_full_df: true
  
  sma_slope_x_price_pos_rank:
    module: enhanced
    compute_func: apply_rank_transform_to_interaction
    dependencies: ["sma_slope_x_price_pos"]
    required_columns: ["sma_slope_x_price_pos"]
    output_columns: ["sma_slope_x_price_pos_rank"]
    category: interaction
    description: "sma_slope_x_price_pos 的 rank transform 版本"
    compute_params:
      interaction_col: "sma_slope_x_price_pos"
    pass_full_df: true
  
  vpin_x_wick_upper_rank:
    module: enhanced
    compute_func: apply_rank_transform_to_interaction
    dependencies: ["vpin_x_wick_upper"]
    required_columns: ["vpin_x_wick_upper"]
    output_columns: ["vpin_x_wick_upper_rank"]
    category: interaction
    description: "vpin_x_wick_upper 的 rank transform 版本"
    compute_params:
      interaction_col: "vpin_x_wick_upper"
    pass_full_df: true
  
  vpin_x_wick_lower_rank:
    module: enhanced
