  # ---------------------------------------------------------------------------
  # BPC (Breakout-Pullback-Continuation) Soft Phase Features
  # ---------------------------------------------------------------------------
  bpc_soft_phase_f:
    module: bpc
    compute_func: compute_bpc_soft_phase_from_series
    dependencies:
    - atr_f
    - cvd_change_5_pct_f
    - vpin_features_f
    - ofci_pct_f
    - bb_width_normalized_pct_f
    - ema_1200_position_f
    required_columns:
    - close
    - high
    - low
    - atr
    - volume
    output_columns:
    # === ATOMIC: Breakout 原子信号 ===
    - bpc_price_breakout_strength
    - bpc_recent_breakout_strength
    - bpc_vol_breakout_confirm
    - bpc_cvd_breakout_confirm
    - bpc_vpin_breakout_confirm
    # === ATOMIC: Pullback 原子信号 ===
    - bpc_pullback_depth
    - bpc_pullback_quality
    - bpc_vol_pullback_confirm
    - bpc_cvd_absorption
    # === ATOMIC: Continuation 原子信号 ===
    - bpc_recovery_strength
    - bpc_momentum_confirm
    - bpc_vol_continuation_confirm
    - bpc_cvd_momentum
    - bpc_vpin_rising
    # === ATOMIC: Neutral 原子信号 ===
    - bpc_bb_compression
    - bpc_vol_compression
    # === COMPOSITE: 组合分数 ===
    - bpc_score_breakout
    - bpc_score_pullback
    - bpc_score_continuation
    - bpc_score_neutral
    # === CONTEXTUAL: 状态信号 ===
    - bpc_breakout_direction
    - bpc_direction_confidence
    - bpc_is_after_breakout
    - bpc_was_in_pullback
    - bpc_vol_ratio
    - bpc_cvd_z
    - bpc_semantic_chop
    - bpc_semantic_extension
    - bpc_semantic_chop_ts_q
    # bpc_semantic_ema_discount 已于 2026-04-22 从 BPC 输出移除
    # （与 pullback_depth / ema_1200_position gate 冗余，且在启动月归零导致 meta-algorithm 误用为 prefilter）
    category: bpc
    description: BPC soft phase scores with atomic/composite/contextual features for tree model exploration.
    pass_full_df: false
    compute_params:
      input_normalization_map:
        atr: price_unit
      lookback_breakout: 20
      breakout_atr_mult: 1.0
      pullback_decay: 0.3
      vol_ma_window: 20
      normalized: true
      # 2026-04-28: +bpc_semantic_chop_ts_q；2026-04-30: chop_ts_q 窗 1200×min150
      node_cache_version: "bpc_soft_phase_v4_chop_ts_q_1200"
      output_normalization_map:
        # ATOMIC: Breakout
        bpc_price_breakout_strength: bounded_0_1
        bpc_recent_breakout_strength: bounded_0_1
        bpc_vol_breakout_confirm: bounded_0_1
        bpc_cvd_breakout_confirm: bounded_0_1
        bpc_vpin_breakout_confirm: bounded_0_1
        # ATOMIC: Pullback
        bpc_pullback_depth: bounded_0_1
        bpc_pullback_quality: bounded_0_1
        bpc_vol_pullback_confirm: bounded_0_1
        bpc_cvd_absorption: bounded_0_1
        # ATOMIC: Continuation
        bpc_recovery_strength: bounded_0_1
        bpc_momentum_confirm: bounded_0_1
        bpc_vol_continuation_confirm: bounded_0_1
        bpc_cvd_momentum: bounded_0_1
        bpc_vpin_rising: bounded_0_1
        # ATOMIC: Neutral
        bpc_bb_compression: bounded_0_1
        bpc_vol_compression: bounded_0_1
        # COMPOSITE
        bpc_score_breakout: bounded_0_1
        bpc_score_pullback: bounded_0_1
        bpc_score_continuation: bounded_0_1
        bpc_score_neutral: bounded_0_1
        # CONTEXTUAL
        bpc_breakout_direction: discrete
        bpc_direction_confidence: bounded_0_1
        bpc_is_after_breakout: bounded_0_1
        bpc_was_in_pullback: bounded_0_1
        bpc_vol_ratio: ratio
        bpc_cvd_z: zscore
        bpc_semantic_chop: bounded_0_1
        bpc_semantic_extension: bounded_0_1
        bpc_semantic_chop_ts_q: bounded_0_1
    column_mappings:
      close: close
      high: high
      low: low
      atr: atr
      volume: volume
      cvd_change_5: cvd_change_5
      vpin: vpin
      ofci_pct: ofci_pct
      bb_width_normalized: bb_width_normalized_pct  # 使用 _pct 版本，值域 [0,1]
      ema_1200_position: ema_1200_position

