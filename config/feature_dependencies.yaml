  wide_sr_swing_f:
    module: baseline
    compute_func: compute_wide_sr_swing_from_series
    dependencies:
    - atr_f
    required_columns:
    - high
    - low
    - close
    - atr
    output_columns:
    - wide_sr_upper_px
    - wide_sr_lower_px
    - wide_sr_dist_atr
    - wide_sr_side
    - wide_sr_range_width_atr
    category: sr_structure
    description: |
      Large-scale SR (L3) proxy — rolling swing high/low over wide_window bars,
      shifted by anchor_shift to avoid self-containing the current bar. On the
      2H primary timeframe the defaults (240 bar, shift 12) correspond to a ~1
      month window anchored 1 day back.

      Outputs include both raw prices (wide_sr_upper_px / wide_sr_lower_px) and
      ATR-normalized summaries (dist/side/range_width). Upper/lower prices are
      the canonical "large-scale SR anchors" shared by FBF filters and SRB
      structural SL / entry guard; dist/side are useful as ML features.

      L1 (~1-2 day, narrow swing) and L2 (~2 week, POC/HAL) SR remain provided
      by `srb_regime.swing_sr_levels(20)` and `poc_hal_features_*_f` respectively.
