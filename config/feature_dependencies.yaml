  # GARCH 特征（波动聚集性和杠杆效应）
  # ========================================================================
  garch_features:
    module: enhanced
    compute_func: extract_garch_features_from_series
    dependencies: []
    required_columns: ["close"]
    output_columns: ["garch_volatility", "garch_persistence", "garch_leverage_gamma", "garch_alpha", "garch_beta"]
