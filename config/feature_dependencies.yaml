# 特征依赖配置文件
# 定义所有特征及其依赖关系

features:
  # ========================================================================
  # 基础技术指标（无依赖）
  # ========================================================================
  atr:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_atr
    dependencies: []
    required_columns: ["high", "low", "close"]
    output_columns: ["atr"]
    category: technical_indicator
    description: "Average True Range"
    compute_params:
      period: 14
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
  
  rsi:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_rsi
    dependencies: []
    required_columns: ["close"]
    output_columns: ["rsi"]
    category: technical_indicator
    description: "Relative Strength Index"
    compute_params:
      period: 14
    pass_full_df: false
    column_mappings:
      series: close
  
  macd:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_macd
    dependencies: []
    required_columns: ["close"]
    output_columns: ["macd", "macd_signal", "macd_histogram"]
    category: technical_indicator
    description: "MACD Indicator"
    compute_params:
      fast: 12
      slow: 26
      signal: 9
    pass_full_df: false
    column_mappings:
      series: close
  
  acceleration_3:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_acceleration_3
    dependencies: []
    required_columns: ["close"]
    output_columns: ["acceleration_3"]
    category: technical_indicator
    description: "Momentum acceleration: normalized ROC(3) difference (动量加速度)"
    pass_full_df: true
    compute_params:
      feature_shift: 0
  
  bb_width:
    module: baseline
    compute_func: compute_bb_width_features_from_series
    dependencies: []
    required_columns: ["close", "high", "low"]
    output_columns: ["bb_upper", "bb_middle", "bb_lower", "bb_width", "bb_width_normalized"]
    category: volatility
    description: "Bollinger band width and ATR-normalized width"
    pass_full_df: false
    column_mappings:
      close: close
      high: high
      low: low
  
  range_ratio_5bar:
    module: baseline
    compute_func: compute_range_ratio_5bar_from_series
    dependencies: []
    required_columns: ["high", "low"]
    output_columns: ["range_ratio_5bar"]
    category: volatility
    description: "Short vs long term range ratio (5 vs 20 bar)"
    pass_full_df: false
    column_mappings:
      high: high
      low: low
  
  volatility_reversal_score:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_volatility_reversal_score
    dependencies: []
    required_columns: ["high", "low", "close"]
    output_columns: ["volatility_reversal_score"]
    category: volatility
    description: "ATR mean-reversion z-score"
    pass_full_df: true
  
  price_range_symmetry:
    module: baseline
    compute_func: compute_price_range_symmetry_from_series
    dependencies: []
    required_columns: ["high", "low", "close"]
    output_columns: ["price_range_symmetry"]
    category: price_structure
    description: "Upper/lower shadow asymmetry score"
    pass_full_df: false
    compute_params:
      feature_shift: 0
    column_mappings:
      high: high
      low: low
      close: close
  
  # 影线占比特征（用于交互特征）
  wick_ratios:
    module: baseline
    compute_func: compute_wick_ratios_from_series
    dependencies: []
    required_columns: ["high", "low", "close", "open"]
    output_columns: ["wick_upper_ratio", "wick_lower_ratio"]
    category: price_structure
    description: "Upper and lower wick ratios (用于 VPIN × wick 交互特征)"
    pass_full_df: false
    column_mappings:
      open: open
      high: high
      low: low
      close: close
    notes: "上影线占比和下影线占比，用于衡量K线的上下影线长度"
  
  volume_anomaly:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_volume_anomaly
    dependencies: []
    required_columns: ["volume"]
    output_columns: ["volume_anomaly"]
    category: liquidity
    description: "Volume anomaly z-score (EWM based)"
    pass_full_df: true
  
  roc_5:
    module: baseline
    compute_func: compute_roc_5_from_series
    dependencies: []
    required_columns: ["close"]
    output_columns: ["roc_5"]
    category: momentum
    description: "5-bar rate of change z-score"
    compute_params:
      period: 5
    pass_full_df: false
    column_mappings:
      close: close
  
  trend_r2_20:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_trend_r2_20
    dependencies: []
    required_columns: ["close"]
    output_columns: ["trend_r2_20"]
    category: trend
    description: "20-bar trend R² (log price)"
    pass_full_df: true
    compute_params:
      feature_shift: 0
  
  trend_r2_50:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_trend_r2_50
    dependencies: []
    required_columns: ["close"]
    output_columns: ["trend_r2_50"]
    category: trend
    description: "50-bar trend R² (log price)"
    pass_full_df: true
    compute_params:
      feature_shift: 0
  
  slope_consistency_score:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_slope_consistency_score
    dependencies: []
    required_columns: ["close"]
    output_columns: ["slope_consistency_score"]
    category: trend
    description: "EMA slope agreement (10/20/50)"
    pass_full_df: true
  
  atr_percentile:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_atr_percentile
    dependencies: []
    required_columns: ["high", "low", "close"]
    output_columns: ["atr_percentile"]
    category: volatility
    description: "Rolling ATR percentile (compression detector)"
    pass_full_df: true
    compute_params:
      window: 288
      shift: 1
  
  trend_volatility_alignment:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_trend_volatility_alignment
    dependencies: []
    required_columns: ["close", "high", "low"]
    output_columns: ["trend_volatility_alignment"]
    category: trend
    description: "Alignment of ROC sign and ATR percentile regime"
    pass_full_df: true
    compute_params:
      feature_shift: 0
  
  compression_to_breakout_prob:
    module: baseline
    compute_func: BaselineFeatureEngineer.compute_compression_to_breakout_prob
    dependencies: ["roc_5", "compression_duration"]
    required_columns: ["compression_duration"]
    output_columns: ["compression_to_breakout_prob"]
    category: compression
    description: "Compression duration weighted momentum proxy"
    pass_full_df: true
  
  # ========================================================================
  # WPT 重构价格（所有 SR 的基础）
  # 核心原则：所有 SR 均由 WPT 重构价格生成，实现天然多尺度对齐，无需 resample
  # ========================================================================
  wpt_price_reconstructed:
    module: enhanced
    compute_func: extract_wpt_features
    dependencies: []
    required_columns: ["close", "high", "low"]
    output_columns: ["wpt_price_trend", "wpt_price_fluctuation", "wpt_price_reconstructed"]
    category: wpt
    description: "WPT 重构价格（趋势 + 波动），用于生成多尺度 SR"
    compute_params:
      wavelet: "db4"
      level: 4
    notes: |
      所有 SR（POC、HAL、Swing、ZigZag）都应基于 WPT 重构价格计算，实现天然多尺度对齐。
      - 低频子带（'aaaa'）→ 长期 SR（周线级）
      - 中频子带（'aaad', 'aada'）→ 中期 SR（日线级）
      - 高频子带（'dddd'）→ 短期 SR（分钟级）

  wpt_volatility_features:
    module: enhanced
    compute_func: extract_wpt_features
    dependencies: []
    required_columns: ["close", "high", "low", "volume"]
    # 包含所有 WPT 波动率相关特征（基础特征）
    output_columns:
      - wpt_price_trend
      - wpt_price_fluctuation
      - wpt_price_reconstructed
      - wpt_price_energy_low_ratio
      - wpt_price_energy_mid_ratio
      - wpt_price_energy_high_ratio
      - wpt_price_energy_mid_low_ratio
      - wpt_volume_energy_low_ratio
      - wpt_cvd_energy_low_ratio
      - wpt_vper
    category: wpt
    description: "WPT 波动率特征（完整版，包含所有能量比和 VPER）"
    compute_params:
      wavelet: "db4"
      level: 4
      window: 100
      return_reconstructed_price: false  # 返回所有特征，不只是重构价格
    notes: |
      用于波动率模型的 WPT 特征集合。
      包含价格、成交量、CVD 的能量比特征和 VPER（体积-价格能量比）。
      注意：增强特征（wpt_price_high_energy_ratio, wpt_price_fluct_l1_l2_ratio, wpt_vhph_sync）
      需要通过 enhance_wpt_vol_features 函数生成，可通过依赖关系自动处理。
  
  # ========================================================================
  # SR 特征（依赖 WPT 重构价格）
  # 注意：所有 SR 特征都基于 WPT 重构价格，实现多尺度对齐
  # ========================================================================
  # POC 和 HAL 作为独立的基础特征
  poc_hal_features:
    module: baseline
    compute_func: compute_poc_hal_features_from_series
    dependencies: ["wpt_price_reconstructed"]  # 依赖 WPT 重构价格
    required_columns: ["high", "low", "close", "volume", "wpt_price_reconstructed"]
    output_columns: ["poc", "hal_high", "hal_low", "hal_mid"]
    category: sr_structure
    description: "POC (Point of Control) 和 HAL (Value Area) 基础特征（基于 WPT 重构价格）"
    compute_params:
      poc_window: 160
      price_col: "wpt_price_reconstructed"
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
      volume: volume
      wpt_price_reconstructed: wpt_price_reconstructed
    notes: "独立的基础特征，可被其他特征复用，避免重复计算"
  
  sqs_hal_high:
    module: baseline
    compute_func: compute_sqs_hal_high_from_series
    dependencies: ["atr", "poc_hal_features"]  # 依赖 POC/HAL 基础特征
    required_columns: ["high", "low", "close", "volume", "atr", "hal_high"]
    # 注意：poc 和 hal_high 现在来自 poc_hal_features，不再作为副产品
    output_columns: ["sqs_hal_high"]
    category: sr_structure
    description: "Structure Quality Score for HAL high (基于 WPT 重构价格)"
    compute_params:
      sr_type: "resistance"
      window: 60
      tolerance_factor: 0.5
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
      volume: volume
      atr: atr
      hal_high: hal_high
    notes: "基于 WPT 重构价格计算，实现多尺度对齐"
  
  sqs_hal_low:
    module: baseline
    compute_func: compute_sqs_hal_low_from_series
    dependencies: ["atr", "poc_hal_features"]  # 依赖 POC/HAL 基础特征
    required_columns: ["high", "low", "close", "volume", "atr", "hal_low"]
    # 注意：poc 和 hal_low 现在来自 poc_hal_features，不再作为副产品
    output_columns: ["sqs_hal_low"]
    category: sr_structure
    description: "Structure Quality Score for HAL low (基于 WPT 重构价格)"
    compute_params:
      sr_type: "support"
      window: 60
      tolerance_factor: 0.5
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
      volume: volume
      atr: atr
      hal_low: hal_low
    notes: "基于 WPT 重构价格计算，实现多尺度对齐"
  
  sr_strength_max:
    module: baseline
    compute_func: compute_sr_strength_max_from_series
    # 依赖关系：
    # - atr: 边界强度计算必需
    # - poc_hal_features: 提供 hal_high, hal_low, poc 列（独立的基础特征）
    # - sqs_hal_high, sqs_hal_low: 可选，用于 SQS 值（如果需要）
    # - wpt_price_reconstructed: 用于计算边界（如果 hal_high/hal_low/poc 不存在时的后备方案）
    # 注意：poc, hal_high, hal_low 现在来自 poc_hal_features，不再作为 sqs_hal_high/sqs_hal_low 的副产品
    # compute_sr_strength_max 中的自动修复机制只是防御性措施（defensive programming）
    dependencies: ["atr", "poc_hal_features"]
    required_columns: ["high", "low", "close", "atr", "poc", "hal_high", "hal_low"]
    output_columns: ["sr_strength_max", "dist_to_nearest_sr", "direction_to_nearest_sr"]
    category: sr_structure
    description: "Maximum SR strength across all boundaries (基于 WPT 重构价格)"
    compute_params:
      window: 60
      tolerance_factor: 0.5
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
      atr: atr
      poc: poc
      hal_high: hal_high
      hal_low: hal_low
    notes: |
      所有 SR 边界都基于 WPT 重构价格计算，实现多尺度对齐。
      函数会自动确保 hal_high, hal_low, poc, atr 列存在，即使依赖特征未完全计算。
  
  # ========================================================================
  # WPT 特征（无依赖，但可能需要基础数据）
  # 注意：WPT 用于过滤高频噪音，是 POC/HAL 等特征的前置依赖
  # ========================================================================
  wpt_price_fluctuation:
    module: enhanced
    compute_func: extract_wpt_features
    dependencies: []
    required_columns: ["close"]
    # 注意：此特征输出包含 wpt_price_fluctuation 和 wpt_price_trend（与 wpt_price_reconstructed 重复）
    # 但还包含能量比特征，这些能量比特征不在 wpt_price_reconstructed 中
    output_columns: ["wpt_price_fluctuation", "wpt_price_trend", "wpt_price_energy_low_ratio", "wpt_price_energy_mid_ratio", "wpt_price_energy_high_ratio"]
    category: wpt
    description: "WPT price fluctuation + 能量比特征（用于 Hilbert 等需要去趋势价格的特征）"
    compute_params:
      wavelet: "db4"
      level: 4
    notes: |
      WPT 过滤高频噪音，提高 POC/HAL 等 SR 特征的识别准确性。
      注意：此特征与 wpt_price_reconstructed 都输出 wpt_price_fluctuation 和 wpt_price_trend，
      但此特征额外提供能量比特征（用于能量分析）。
      如果只需要 wpt_price_fluctuation，可以依赖 wpt_price_reconstructed（更高效）。
  
  wpt_cvd_fluctuation:
    module: enhanced
    compute_func: extract_wpt_features
    dependencies: []
    # NOTE: extract_wpt_features always computes price WPT first; it needs close (and uses
    # typical price if high/low exist). We still compute CVD WPT via cvd_col.
    required_columns: ["close", "high", "low", "cvd"]
    output_columns: ["wpt_cvd_fluctuation"]
    category: wpt
    description: "WPT CVD fluctuation"
    compute_params:
      wavelet: "db4"
      level: 4
      price_col: "close"
      cvd_col: "cvd"
      # keep other channels disabled
      volume_col: "volume"
  
  # ========================================================================
  # 流动性特征（依赖 WPT 和基础指标）
  # 核心功能：识别流动性真空区、真假突破、VPVR 分析
  # ========================================================================
  wpt_vpvr:
    module: enhanced
    compute_func: compute_wpt_vpvr_from_series
    dependencies: []
    required_columns: ["close", "high", "low", "volume"]
    output_columns: ["vpvr_pvp", "vpvr_hvn_count", "vpvr_lvn_count", "vpvr_lvn_distance", "vpvr_volume_density", "vpvr_price_in_lvn"]
    category: liquidity
    description: "WPT 降噪的 VPVR（Volume Profile Visible Range）"
    compute_params:
      wavelet: "db4"
      level: 4
      window: 100
      bins: 50
    pass_full_df: false
    column_mappings:
      close: close
      high: high
      low: low
      volume: volume
    notes: |
      WPT 降噪后的 VPVR 能更清晰地识别关键支撑/阻力位：
      - PVP: Point of Control（最高成交量对应的价格）
      - HVN: High Volume Node（高成交量节点）
      - LVN: Low Volume Node（低成交量节点，流动性真空区）
  
  liquidity_void:
    module: enhanced
    compute_func: compute_liquidity_void_features_from_series
    dependencies: ["atr"]
    required_columns: ["close", "volume", "atr"]
    output_columns: ["liquidity_void_detected", "liquidity_void_speed", "liquidity_void_volume_ratio", "liquidity_void_retracement", "liquidity_void_false_breakout_risk"]
    category: liquidity
    description: "流动性真空区识别（Liquidity Void / Gap Detection）"
    compute_params:
      lookback_window: 20
      speed_threshold_multiplier: 2.0
      volume_quantile: 0.2
    pass_full_df: false
    column_mappings:
      close: close
      volume: volume
      atr: atr
    notes: |
      流动性真空区 ≠ 历史低成交量区域，而是当前订单簿深度缺失。
      特征：
      - 价格快速穿越（速度 > 阈值）
      - 成交量显著低于前后区间
      - 突破后 1~3 根 K 线内迅速回撤 >50%
  
  wpt_volume_energy:
    module: enhanced
    compute_func: compute_wpt_volume_energy_features_from_series
    dependencies: []
    required_columns: ["close", "volume"]
    output_columns: ["wpt_vper_low", "wpt_vper_mid", "wpt_vper_high", "wpt_energy_cascade", "wpt_multi_scale_consistency", "wpt_breakout_confidence", "wpt_false_breakout_risk"]
    category: liquidity
    description: "WPT + Volume 能量协同分析（VPER、能量下移、真假突破判断）"
    compute_params:
      wavelet: "db4"
      level: 4
      lookback_window: 20
    pass_full_df: false
    column_mappings:
      close: close
      volume: volume
    notes: |
      WPT + Volume 能量协同分析：
      - VPER: Volume-Price Energy Ratio（量价能量比）
      - 能量下移（Energy Cascade）: 高频能量向中低频转移
      - 多尺度一致性: 至少两个中低频子带同时出现能量上升
      - 真假突破评分: 基于多尺度能量和 VPER 的综合评分
  
  volume_profile_volatility_features:
    module: enhanced
    compute_func: extract_volume_profile_volatility_features_from_series
    dependencies: []
    required_columns: ["close", "volume"]
    output_columns: ["vp_width_ratio", "vp_poc_deviation", "vp_skewness", "vp_entropy", "vp_lv_ratio", "vp_hv_ratio"]
    category: volatility
    description: "Volume Profile 波动率特征（从 WPT 降噪后的 Volume Profile 提取）"
    compute_params:
      window: 100
      wavelet: "db4"
      level: 4
    notes: |
      Volume Profile 波动率特征：
      - vp_width_ratio: Value Area Width / Full Range（市场共识强度）
      - vp_poc_deviation: 当前价格 vs POC 的标准化偏离
      - vp_skewness: 成交量分布偏度（趋势倾向）
      - vp_entropy: 信息熵（不确定性）
      - vp_lv_ratio: 低成交量区域比例（LVN）
      - vp_hv_ratio: 高成交量区域比例（HVN）
      这些特征与 vol_zscore、vol_slope_10 结合，可显著提升对"波动率拐点"的识别能力。
    pass_full_df: false
    column_mappings:
      close: close
      volume: volume

  footprint_basic:
    module: enhanced
    compute_func: compute_footprint_features
    dependencies: []
    required_columns: ["open_time", "close_time"]  # kline time boundaries; tick data must be provided at runtime
    output_columns: ["fp_poc", "fp_hvn", "fp_lvn", "fp_vah", "fp_val", "fp_delta_poc", "fp_max_imbalance_price", "fp_max_imbalance_ratio", "fp_volume_skew", "fp_delta_skew", "fp_exhaustion_price", "fp_exhaustion_zscore", "fp_delta_divergence"]
    category: order_flow
    description: "Single-bar footprint (POC/HVN/LVN/VAH/VAL + delta/imbalance/skew) computed from ticks inside each kline."
    compute_params:
      price_bin_method: "fd"          # Freedman–Diaconis by default
      price_bin_target_bins: 40       # fallback bins when fixed_bins or FD fallback
      value_area_pct: 0.7             # VAH/VAL coverage
      price_bin_size: null            # optional explicit bin width
      tick_size: null                 # optional per-symbol min price increment (highest priority)
    notes: |
      - 需要 ticks 数据：columns ['price','volume','side']，DatetimeIndex；通过调用时传入 ticks（不可从 df 推断）。
      - 分箱优先级：tick_size > price_bin_size > Freedman–Diaconis 自适应 > 固定目标 bin 数（均分 price range）。
      - 无 tick 的 K 线返回 NaN。
  
  # ========================================================================
  # Hilbert 特征（依赖 WPT 去趋势化）
  # 重要：Hilbert 相位分析必须使用 CVD（而不是 Volume）做相位领先分析
  # 原因：
  # 1. Volume 与 Price 同向共振，相位差≈0，无法区分"跟随"还是"引领"
  # 2. CVD 具有方向性（净买量），可以提前积累，Price 尚未反应时 CVD 已领先
  # 3. CVD 相位领先能够预测价格变化，Volume 相位差几乎无预测价值
  # 4. 必须去趋势化（使用 WPT），否则累积趋势会淹没相位动态
  # ========================================================================
  hilbert_phase:
    module: enhanced
    compute_func: extract_hilbert_features
    # 注意：依赖 wpt_price_fluctuation（而不是 wpt_price_reconstructed），
    # 因为 Hilbert 分析需要去趋势后的波动分量，wpt_price_fluctuation 提供这个
    dependencies: ["wpt_price_fluctuation", "wpt_cvd_fluctuation"]
    required_columns: ["wpt_price_fluctuation", "wpt_cvd_fluctuation"]
    output_columns: ["hilbert_price_env", "hilbert_cvd_env", "hilbert_cvd_price_env_ratio", "hilbert_price_env_slope", "hilbert_cvd_env_slope"]
    category: hilbert
    description: "Hilbert envelope analysis (改进版：只提取包络，EMA 平滑，无未来信息)"
    notes: |
      Hilbert 包络特征工程的关键要点：
      1. 只提取 Hilbert 包络（envelope）作为特征，放弃瞬时相位和频率
      2. 使用滚动窗口计算，避免未来信息泄露
      3. EMA 平滑包络序列，提升稳健性
      4. 提取实用衍生特征（包络比值、斜率等）
      5. 必须使用 CVD（Cumulative Volume Delta）而不是 Volume
      6. 必须去趋势化（使用 WPT 过滤），否则趋势会淹没波动动态
      7. 包络比值（CVD/Price）可捕捉资金流与价格的背离或加速
  
  # ========================================================================
  # Hilbert 高级功能特征（分位数标准化 + 成交量融合）
  # ========================================================================
  hilbert_advanced:
    module: enhanced
    compute_func: extract_hilbert_features
    # 注意：依赖 wpt_price_fluctuation（而不是 wpt_price_reconstructed），
    # 因为 Hilbert 分析需要去趋势后的波动分量，wpt_price_fluctuation 提供这个
    dependencies: ["wpt_price_fluctuation", "wpt_cvd_fluctuation"]
    required_columns: ["wpt_price_fluctuation", "wpt_cvd_fluctuation", "volume"]
    output_columns: ["hilbert_price_env", "hilbert_cvd_env", "hilbert_cvd_price_env_ratio", "hilbert_price_env_slope", "hilbert_cvd_env_slope", "hilbert_price_env_qnorm", "hilbert_cvd_env_qnorm", "hilbert_volume_env", "hilbert_env_price_vol_ratio", "hilbert_triple_divergence"]
    category: hilbert
    description: "Hilbert envelope analysis with advanced features (分位数标准化 + 成交量融合)"
    compute_params:
      use_quantile_normalize: true
      quantile_window: 252
      use_volume_fusion: true
    notes: |
      高级功能：
      1. 分位数标准化：跨品种可比，支持多品种统一模型
      2. 成交量融合：结合价格、资金流、成交量，识别背离信号
      3. 三元背离信号：价格新高 + CVD 未新高 + 成交量下降 → 强烈背离
      4. 价格/成交量包络比：识别无量假突破
  
  # ========================================================================
  # Hurst 特征（无依赖）
  # ========================================================================
  hurst_price:
    module: enhanced
    compute_func: extract_hurst_features
    dependencies: []
    required_columns: ["close"]
    output_columns: ["hurst_price_rolling"]
    compute_params:
      rolling_window: 50
      update_freq: "auto"  # 自动根据数据频率调整（高频用5，中频用3，低频用1）
      clip_pct: "auto"     # 自动根据品种波动特性调整（高波动放宽，低波动收紧）
    description: "Hurst 指数特征（生产优化版）- 价格收益率的滚动 Hurst，严格因果、高效计算"
    notes: |
      Hurst 指数特征工程的关键要点：
      1. 严格因果：滚动窗口仅使用 [t-W, t-1] 数据
      2. 高效计算：支持 update_freq 控制更新频率
      3. 保留 NaN：不填充 0.5，由模型处理缺失
      4. 统一使用 DFA（更稳健）
      5. 极端值保护：clip_pct 参数裁剪异常收益率
      6. 最小有效点数：至少需要 3 个有效尺度点
  
  hurst_cvd:
    module: enhanced
    compute_func: extract_hurst_features
    dependencies: []
    required_columns: ["cvd"]  # 只需要 cvd 列，不需要 close（CVD Hurst 计算本身不需要价格数据）
    output_columns: ["hurst_cvd_rolling"]
    compute_params:
      rolling_window: 50
      update_freq: "auto"
      clip_pct: 0.5  # 使用固定值，因为 CVD 不需要价格数据来调整 clip_pct
      cvd_col: "cvd"  # 指定 CVD 列名
    description: "Hurst 指数特征 - CVD 单期变化的滚动 Hurst，捕捉资金流的持续性"
    notes: |
      CVD (Cumulative Volume Delta) Hurst 特征：
      1. 捕捉资金流的持续性（趋势 vs 均值回复）
      2. 高 Hurst (>0.5)：资金流持续流入/流出，趋势性强
      3. 低 Hurst (<0.5)：资金流快速反转，均值回复
      4. 与价格 Hurst 结合，可以识别价格与资金流的背离
      5. 注意：CVD Hurst 计算本身不需要价格数据，只需要 CVD 列
  
  hurst_volume:
    module: enhanced
    compute_func: extract_hurst_features
    dependencies: []
    required_columns: ["close", "volume"]  # 需要 volume 列
    output_columns: ["hurst_volume_rolling"]
    compute_params:
      rolling_window: 50
      update_freq: "auto"
      clip_pct: "auto"
      volume_col: "volume"  # 指定 volume 列名
    description: "Hurst 指数特征 - 成交量收益率的滚动 Hurst，捕捉成交量的持续性"
    notes: |
      成交量 Hurst 特征：
      1. 捕捉成交量的持续性（放量趋势 vs 缩量震荡）
      2. 高 Hurst (>0.5)：成交量持续放大/缩小，趋势性强
      3. 低 Hurst (<0.5)：成交量快速波动，震荡市场
      4. 与价格 Hurst 结合，可以识别量价背离
  
