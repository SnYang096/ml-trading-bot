    compute_params:
      window: 120  # 增加窗口大小，减少过拟合
      garch_p: 1
      garch_q: 1
      use_gjr: true
      use_figarch: false
    pass_full_df: true
    notes: |
      GARCH 特征用于：
      - garch_volatility: 预测的下一期波动率
      - garch_persistence: α+β，波动聚集性强度（0.95+表示波动会持续）
      - garch_leverage_gamma: 杠杆效应系数（下跌时波动上升更快）
      - 窗口大小增加到120，减少过拟合
      - 需要安装 arch 包：pip install arch
  
  # ========================================================================
