  hilbert_phase_f:
    module: enhanced
    compute_func: extract_hilbert_features
    dependencies:
    - wpt_price_fluctuation_f
    - wpt_cvd_fluctuation_f
    required_columns:
    - wpt_price_fluctuation
    - wpt_cvd_fluctuation
    output_columns:
    - hilbert_price_env
    - hilbert_cvd_env
    - hilbert_cvd_price_env_ratio
    - hilbert_price_env_slope
    - hilbert_cvd_env_slope
    category: hilbert
    description: Hilbert envelope analysis (改进版：只提取包络，EMA 平滑，无未来信息)
    compute_params:
      # Use rolling rank transformation for cross-asset comparability and stable NN inputs
      use_quantile_normalize: true
      quantile_window: 252
      replace_env_with_qnorm: true
      normalized: true
      output_normalization_map:
        hilbert_price_env: rank_rolling
        hilbert_cvd_env: rank_rolling
        hilbert_cvd_price_env_ratio: log_robust_rolling
        hilbert_price_env_slope: bounded_-1_1
        hilbert_cvd_env_slope: bounded_-1_1
    notes: 'Hilbert 包络特征工程的关键要点：

      1. 只提取 Hilbert 包络（envelope）作为特征，放弃瞬时相位和频率

      2. 使用滚动窗口计算，避免未来信息泄露

      3. EMA 平滑包络序列，提升稳健性

      4. 提取实用衍生特征（包络比值、斜率等）

      5. 必须使用 CVD（Cumulative Volume Delta）而不是 Volume

      6. 必须去趋势化（使用 WPT 过滤），否则趋势会淹没波动动态

      7. 包络比值（CVD/Price）可捕捉资金流与价格的背离或加速

      '
  hilbert_advanced_f:
    module: enhanced
    compute_func: extract_hilbert_features
    dependencies:
    - wpt_price_fluctuation_f
    - wpt_cvd_fluctuation_f
    required_columns:
    - wpt_price_fluctuation
    - wpt_cvd_fluctuation
    - volume
    output_columns:
    - hilbert_price_env
    - hilbert_cvd_env
    - hilbert_cvd_price_env_ratio
    - hilbert_price_env_slope
    - hilbert_cvd_env_slope
    - hilbert_price_env_qnorm
    - hilbert_cvd_env_qnorm
    - hilbert_volume_env
    - hilbert_env_price_vol_ratio
    - hilbert_triple_divergence
    category: hilbert
    description: Hilbert envelope analysis with advanced features (分位数标准化 + 成交量融合)
    compute_params:
      use_quantile_normalize: true
      quantile_window: 252
      use_volume_fusion: true
      replace_env_with_qnorm: true
      normalized: true
      output_normalization_map:
        hilbert_price_env: rank_rolling
        hilbert_cvd_env: rank_rolling
        hilbert_cvd_price_env_ratio: log_robust_rolling
        hilbert_price_env_slope: bounded_-1_1
        hilbert_cvd_env_slope: bounded_-1_1
        hilbert_price_env_qnorm: rank_rolling
        hilbert_cvd_env_qnorm: rank_rolling
        hilbert_volume_env: rank_rolling
        hilbert_env_price_vol_ratio: log_robust_rolling
        hilbert_triple_divergence: bounded_0_1
    notes: '高级功能：

      1. 分位数标准化：跨品种可比，支持多品种统一模型

      2. 成交量融合：结合价格、资金流、成交量，识别背离信号

      3. 三元背离信号：价格新高 + CVD 未新高 + 成交量下降 → 强烈背离

      4. 价格/成交量包络比：识别无量假突破

      '
  hurst_price_f:
    module: enhanced
    compute_func: extract_hurst_features
    dependencies: []
    required_columns:
    - close
    output_columns:
    - hurst_price_rolling
    compute_params:
      rolling_window: 50
      update_freq: auto
      clip_pct: auto
      normalized: true
    description: Hurst 指数特征（生产优化版）- 价格收益率的滚动 Hurst，严格因果、高效计算 (normalized/unitless
      or similarity score)
    notes: 'Hurst 指数特征工程的关键要点：

      1. 严格因果：滚动窗口仅使用 [t-W, t-1] 数据

      2. 高效计算：支持 update_freq 控制更新频率

      3. 保留 NaN：不填充 0.5，由模型处理缺失

      4. 统一使用 DFA（更稳健）

      5. 极端值保护：clip_pct 参数裁剪异常收益率

      6. 最小有效点数：至少需要 3 个有效尺度点

      '
  hurst_cvd_f:
    module: enhanced
    compute_func: extract_hurst_features
    dependencies: []
    required_columns:
    - cvd
    output_columns:
    - hurst_cvd_rolling
    compute_params:
      rolling_window: 50
      update_freq: auto
      clip_pct: 0.5
      cvd_col: cvd
      normalized: true
    description: Hurst 指数特征 - CVD 单期变化的滚动 Hurst，捕捉资金流的持续性 (normalized/unitless or
      similarity score)
    notes: 'CVD (Cumulative Volume Delta) Hurst 特征：

      1. 捕捉资金流的持续性（趋势 vs 均值回复）

      2. 高 Hurst (>0.5)：资金流持续流入/流出，趋势性强

      3. 低 Hurst (<0.5)：资金流快速反转，均值回复

      4. 与价格 Hurst 结合，可以识别价格与资金流的背离

      5. 注意：CVD Hurst 计算本身不需要价格数据，只需要 CVD 列

      '
  hurst_volume_f:
    module: enhanced
    compute_func: extract_hurst_features
    dependencies: []
    required_columns:
    - close
    - volume
    output_columns:
    - hurst_volume_rolling
    compute_params:
      rolling_window: 50
      update_freq: auto
      clip_pct: auto
      volume_col: volume
      normalized: true
    description: Hurst 指数特征 - 成交量收益率的滚动 Hurst，捕捉成交量的持续性 (normalized/unitless or similarity
      score)
    notes: '成交量 Hurst 特征：

      1. 捕捉成交量的持续性（放量趋势 vs 缩量震荡）

      2. 高 Hurst (>0.5)：成交量持续放大/缩小，趋势性强

      3. 低 Hurst (<0.5)：成交量快速波动，震荡市场

      4. 与价格 Hurst 结合，可以识别量价背离

      '
