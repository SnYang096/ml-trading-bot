    dependencies: []
    required_columns: ["close"]
    output_columns:
      - "spectrum_price_high_freq_ratio"  # 核心：突破时噪声检测，真突破时不应飙升
      - "spectrum_price_low_freq_ratio"   # 核心：压缩期能量蓄势，low_freq 高 = 慢速资金主导
      - "spectrum_price_flatness"         # 辅助：压缩期结构识别
    category: spectrum
    description: "压缩区突破策略专用频谱特征（精确选择：high_freq_ratio, low_freq_ratio, flatness）"
