  # ========================================================================
  # DTW 特征（形态匹配）- 改进版
  # ========================================================================
  # 通用DTW特征（包含所有模板）- 用于需要全部模板的场景
  dtw_features:
    module: enhanced
    compute_func: extract_dtw_features
    dependencies: ["sr_strength_max"]  # 需要SR特征来计算dist_to_nearest_sr
    required_columns: ["close", "dist_to_nearest_sr", "atr"]
    # 注意：多窗口模式下，实际输出列名会包含 _w{window} 后缀
    # 例如：dtw_hammer_w20_dist, dtw_hammer_w30_dist, dtw_hammer_w40_dist
    # 单窗口模式下，列名不带后缀：dtw_hammer_dist
    output_columns: []  # 动态列名，由函数返回的DataFrame决定
    category: pattern
    description: "DTW (Dynamic Time Warping) 形态匹配特征（改进版）- 支持多窗口、反向模板、距离归一化"
    compute_params:
      window: [20, 30, 40]  # 多窗口：自动生成不同窗口的特征（会生成 _w20, _w30, _w40 后缀）
      compute_only_near_sr: true
      sr_dist_col: "dist_to_nearest_sr"
      sr_threshold: 1.5  # 仅在距离SR < 1.5 * ATR时计算
      normalize_distance: true  # 距离归一化，使不同窗口的特征可比
      warping_window: 0.1  # 限制扭曲范围（10%），提高匹配质量
      use_c: true  # 使用C实现加速
    pass_full_df: true
    notes: |
      DTW 改进版特性：
      - 多窗口支持：自动生成不同窗口的特征（window=[20,30,40]）
        * 输出列名格式：dtw_{template}_w{window}_dist（多窗口）或 dtw_{template}_dist（单窗口）
        * 例如：dtw_hammer_w20_dist, dtw_hammer_w30_dist, dtw_hammer_w40_dist
      - 距离归一化：normalize_distance=true，使不同窗口的特征可比
      - 扭曲限制：warping_window=0.1，防止过度扭曲，提高匹配质量
      - 反向模板和随机模板：通过create_dtw_templates()自动生成，用于负样本对比
        * 反向模板：{template}_inverse（如 hammer_inverse）
        * 随机模板：random_{length}（如 random_15, random_20, random_30）
      - 仅在SR附近（dist_to_nearest_sr < 1.5 * ATR）计算，提高效率
      - 需要安装 dtaidistance 包：pip install dtaidistance
      
      模板列表：
      - 反转形态：hammer, head_shoulder_bottom, double_bottom, bullish_engulfing,
                  shooting_star, head_shoulder_top, double_top, bearish_engulfing
      - 中继形态：bull_flag, bear_flag, triangle, decline_consolidation
  
  # SR 反转策略专用DTW特征（只包含反转形态 + 反向模板 + 随机模板）
  dtw_features_reversal:
    module: enhanced
    compute_func: extract_dtw_features
    dependencies: ["sr_strength_max"]
    required_columns: ["close", "dist_to_nearest_sr", "atr"]
    output_columns: []  # 动态列名
    category: pattern
    description: "DTW 反转形态特征（SR反转策略专用）- 只包含反转形态及其反向模板"
    compute_params:
      window: [15, 20, 25]  # 反转形态通常在1-5根K线内完成，关键反转点集中在最后10-20根K线
      template_filter: ["hammer", "head_shoulder_bottom", "double_bottom", "bullish_engulfing",
                        "shooting_star", "head_shoulder_top", "double_top", "bearish_engulfing"]
      compute_only_near_sr: false
      sr_dist_col: "dist_to_nearest_sr"
      sr_threshold: 1.5
      normalize_distance: true
      warping_window: 0.1
      use_c: true
    pass_full_df: true
    notes: |
      只包含反转形态模板及其反向版本，用于对比学习：
      - 反转形态：hammer, head_shoulder_bottom, double_bottom, bullish_engulfing,
                  shooting_star, head_shoulder_top, double_top, bearish_engulfing
      - 自动包含这些模板的反向版本（用于负样本对比）
      - 自动包含随机模板（用于负样本对比）
      - 在所有位置计算 DTW features（compute_only_near_sr=false），让模型自行判断是否使用
  
  # SR 突破策略专用DTW特征（只包含突破形态）
  dtw_features_breakout:
    module: enhanced
    compute_func: extract_dtw_features
    dependencies: ["sr_strength_max"]
    required_columns: ["close", "dist_to_nearest_sr", "atr"]
    output_columns: []  # 动态列名
    category: pattern
    description: "DTW 突破形态特征（SR突破策略专用）- 只包含突破形态及其反向模板"
    compute_params:
      window: [30, 40, 50, 60]  # 突破形态通常需要较大窗口
      template_filter: ["head_shoulder_bottom", "head_shoulder_top", "double_bottom", "double_top"]
      compute_only_near_sr: false  # 突破可能在SR附近或远离SR
      sr_dist_col: "dist_to_nearest_sr"
      sr_threshold: 2.0  # 放宽阈值，捕捉更多突破机会
      normalize_distance: true
      warping_window: 0.1
      use_c: true
    pass_full_df: true
    notes: |
      只包含突破形态模板及其反向版本：
      - 突破形态：head_shoulder_bottom, head_shoulder_top, double_bottom, double_top
      - 自动包含这些模板的反向版本（用于负样本对比）
      - 自动包含随机模板（用于负样本对比）
  
  # 压缩区突破策略专用DTW特征（只包含中继形态）
  dtw_features_compression:
    module: enhanced
    compute_func: extract_dtw_features
    dependencies: []
    required_columns: ["close"]
    output_columns: []  # 动态列名
    category: pattern
    description: "DTW 中继形态特征（压缩区突破策略专用）- 只包含中继形态及其反向模板"
    compute_params:
      window: [20, 30, 40, 50]  # 对称三角形20-50根K线，旗形10-30根，压缩阶段通常<30根（去掉60避免包含突破后走势）
      template_filter: ["triangle", "bull_flag", "bear_flag", "decline_consolidation"]
      compute_only_near_sr: false  # 压缩区可能不在SR附近
      normalize_distance: true
      warping_window: 0.1
      use_c: true
    pass_full_df: true
    notes: |
      只包含中继形态模板及其反向版本：
      - 中继形态：triangle, bull_flag, bear_flag, decline_consolidation
      - 自动包含这些模板的反向版本（用于负样本对比）
      - 自动包含随机模板（用于负样本对比）
  
  # 趋势跟踪策略专用DTW特征（只包含中继形态）
  dtw_features_trend:
    module: enhanced
    compute_func: extract_dtw_features
    dependencies: []
    required_columns: ["close"]
    output_columns: []  # 动态列名
    category: pattern
    description: "DTW 中继形态特征（趋势跟踪策略专用）- 只包含中继形态及其反向模板"
    compute_params:
      window: [25, 35, 45]  # 旗形理想窗口15-30（旗杆5-10+旗面10-20），三角形可到40，25-45更平衡
      template_filter: ["bull_flag", "bear_flag", "triangle"]
      compute_only_near_sr: false
      normalize_distance: true
      warping_window: 0.1
      use_c: true
    pass_full_df: true
    notes: |
      只包含中继形态模板及其反向版本：
      - 中继形态：bull_flag, bear_flag, triangle
      - 自动包含这些模板的反向版本（用于负样本对比）
      - 自动包含随机模板（用于负样本对比）
  
  # ========================================================================
  # EVT 特征（尾部风险预警）
  # ========================================================================
  evt_features:
    module: enhanced
    compute_func: extract_evt_features_from_series
    dependencies: []
    required_columns: ["close"]
    output_columns: ["evt_tail_shape", "evt_tail_shape_left", "evt_tail_shape_right", "evt_scale", "evt_var_99", "evt_es_99", "evt_scale_left", "evt_var_99_left", "evt_es_99_left", "evt_scale_right", "evt_var_99_right", "evt_es_99_right"]
    category: risk_management
    description: "EVT (Extreme Value Theory) 极值理论特征：尾部风险预警（聚焦左尾暴跌风险）- 用于风险管理/仓位控制，不用于波动率预测"
    compute_params:
      window: 120
      threshold_quantile: 0.1  # 左尾阈值（10%分位数），用于捕捉极端暴跌
      min_excesses: 10
      separate_tails: true
      var_confidence: 0.99  # 99% VaR/ES
    pass_full_df: false
    column_mappings:
      close: close
    notes: |
      EVT 用于尾部风险预警和风险管理（聚焦左尾暴跌风险）：
      
      核心特征（左尾 - 暴跌风险）：
      - evt_tail_shape / evt_tail_shape_left (ξ): 左尾形状参数，反映极端事件概率分布
        * ξ > 0: 重尾分布（金融数据通常如此）
        * ξ > 0.3: 极高尾部风险（黑天鹅风险高）
        * 0.1 < ξ ≤ 0.3: 典型金融重尾（常见范围，金融收益率通常在此区间）
        * ξ ≤ 0.1: 相对较轻尾部
        * ξ > 0.5: 方差无限（极端罕见，理论极限）
      - evt_scale / evt_scale_left (σ): 左尾尺度参数
      - evt_var_99 / evt_var_99_left: 99% VaR估计（负值，表示预期最大损失）
      - evt_es_99 / evt_es_99_left: 99% Expected Shortfall估计（负值，表示超过VaR的平均损失）
      
      可选特征（右尾 - 泡沫风险，仅当separate_tails=true时）：
      - evt_tail_shape_right: 右尾形状参数
      - evt_scale_right: 右尾尺度参数
      - evt_var_99_right: 右尾99% VaR（正值，表示预期最大涨幅）
      - evt_es_99_right: 右尾99% ES（正值）
      
      改进说明：
      - 聚焦左尾风险：VaR/ES基于左尾GPD拟合，正确反映暴跌风险
      - 修正公式：使用标准EVT公式计算VaR/ES，正确处理ξ的不同情况
      - 阈值调整：threshold_quantile=0.1（10%分位数）用于左尾，更准确捕捉极端事件
      
      应用场景：
      - 控制离场：当 ξ_left > 0.3 或突增时，提前离场避免黑天鹅
      - 不加仓：当尾部风险高时（ξ_left > 0.3 或 evt_var_99_left 更负），避免加仓
      - 风险管理：使用 evt_var_99_left 和 evt_es_99_left 进行仓位控制
      - 不用于波动率预测：EVT特征描述极端事件概率，而非波动率水平
      
      注意：金融收益率 ξ 通常在 0.1~0.3 之间，ξ > 0.3 表示极高尾部风险
      
      需要 scipy 包（通常已安装）
  
