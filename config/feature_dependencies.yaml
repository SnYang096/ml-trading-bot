features:
  atr_f:
    module: baseline
    compute_func: compute_atr_from_series
    dependencies: []
    required_columns:
    - high
    - low
    - close
    output_columns:
    - atr
    category: technical_indicator
    normalized: false
    description: Average True Range (ATR) in *price units* (not normalized). Used as
      the canonical scale column `atr` for label normalization and for converting
      normalized SR distances back into raw price units. For cross-asset comparable
      volatility, prefer `atr_ratio` (atr/close), `natr_14`, or `atr_percentile`.
    compute_params:
      period: 14
      # Normalization contract:
      # - `atr` is a scale column in price units (NOT cross-asset comparable).
      output_normalization_map:
        atr: price_unit
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
  rsi_f:
    module: baseline
    compute_func: compute_rsi_from_series
    dependencies: []
    required_columns:
    - close
    output_columns:
    - rsi
    category: technical_indicator
    description: Relative Strength Index
    compute_params:
      period: 14
    pass_full_df: false
    column_mappings:
      close: close
  macd_atr_f:
    module: baseline
    compute_func: compute_macd_from_series
    dependencies: []
    required_columns:
    - close
    - high
    - low
    output_columns:
    - macd_atr
    - macd_signal_atr
    - macd_histogram_atr
    category: technical_indicator
    description: MACD Indicator (normalized by ATR for cross-asset comparability)
    compute_params:
      fast: 12
      slow: 26
      signal: 9
      atr_period: 14
    pass_full_df: false
    column_mappings:
      series: close
      high: high
      low: low
      close: close
  acceleration_3_f:
    module: baseline
    compute_func: compute_acceleration_3_from_series
    dependencies: []
    required_columns:
    - close
    output_columns:
    - acceleration_3
    category: technical_indicator
    description: 'Momentum acceleration: normalized ROC(3) difference (动量加速度)'
    pass_full_df: false
    compute_params:
      feature_shift: 0
    column_mappings:
      close: close
  path_curvature_f:
    module: baseline
    compute_func: compute_path_curvature_from_series
    dependencies: []
    required_columns:
    - close
    output_columns:
    - path_curvature
    category: price_structure
    description: Path curvature (turning intensity) computed on returns; log1p + rolling z-score (causal, cross-asset comparable)
    pass_full_df: false
    compute_params:
      smooth_window: 5
      window: 5
      z_window: 200
      min_periods: 50
      normalized: true
      output_normalization_map:
        path_curvature: zscore_rolling
    column_mappings:
      close: close
  volatility_cone_position_f:
    module: baseline
    compute_func: compute_volatility_cone_position_from_series
    dependencies: []
    required_columns:
    - close
    output_columns:
    - volatility_cone_position
    category: volatility
    description: Volatility cone position = percentile rank of rolling vol within lookback window (causal; bounded [0,1])
    pass_full_df: false
    compute_params:
      window: 20
      lookback_days: 252
      normalized: true
      output_normalization_map:
        volatility_cone_position: bounded_0_1
    column_mappings:
      close: close
  bb_width_f:
    module: baseline
    compute_func: compute_bb_width_features_from_series
    dependencies: []
    required_columns:
    - close
    - high
    - low
    compute_params:
      # Cache invalidation hint:
      # bb_width_f output contract includes `bb_position`. Some old monthly caches were missing this column.
      # Bump this value whenever bb_width_f output schema/logic changes to force recompute.
      node_cache_version: "bb_width_v2_bb_position"
    output_columns:
    - bb_width_normalized
    - bb_position
    category: volatility
    description: Bollinger band features (normalized, no raw prices). bb_width_normalized
      is width/ATR, bb_position is close position within band [0,1]
    pass_full_df: false
    column_mappings:
      close: close
      high: high
      low: low
  range_ratio_5bar_f:
    module: baseline
    compute_func: compute_range_ratio_5bar_from_series
    dependencies: []
    required_columns:
    - high
    - low
    output_columns:
    - range_ratio_5bar
    category: volatility
    description: Short vs long term range ratio (5 vs 20 bar)
    pass_full_df: false
    compute_params:
      normalized: true
      output_normalization_map:
        range_ratio_5bar: zscore_rolling
    column_mappings:
      high: high
      low: low
  volatility_reversal_score_f:
    module: baseline
    compute_func: compute_volatility_reversal_score_from_series
    dependencies: []
    required_columns:
    - high
    - low
    - close
    output_columns:
    - volatility_reversal_score
    category: volatility
    description: ATR mean-reversion z-score
    pass_full_df: false
    compute_params:
      normalized: true
      output_normalization_map:
        volatility_reversal_score: zscore_rolling
    column_mappings:
      high: high
      low: low
      close: close
  price_range_symmetry_f:
    module: baseline
    compute_func: compute_price_range_symmetry_from_series
    dependencies: []
    required_columns:
    - high
    - low
    - close
    output_columns:
    - price_range_symmetry
    category: price_structure
    description: Upper/lower shadow asymmetry score (rolling z-score; normalized/unitless)
    pass_full_df: false
    compute_params:
      feature_shift: 0
      output_normalization: zscore_rolling
      normalized: true
    column_mappings:
      high: high
      low: low
      close: close
  wick_ratios_f:
    module: baseline
    compute_func: compute_wick_ratios_from_series
    dependencies: []
    required_columns:
    - high
    - low
    - close
    - open
    output_columns:
    - wick_upper_ratio
    - wick_lower_ratio
    category: price_structure
    description: Upper and lower wick ratios in [0,1] (normalized/unitless;用于 VPIN × wick 交互特征)
    pass_full_df: false
    compute_params:
      output_normalization: bounded_0_1
      normalized: true
    column_mappings:
      open: open
      high: high
      low: low
      close: close
    notes: 上影线占比和下影线占比，用于衡量K线的上下影线长度
  wick_scene_semantic_scores_f:
    module: enhanced
    compute_func: compute_wick_scene_semantic_scores_from_series
    dependencies:
    - wick_ratios_f
    - compression_score_f
    - trend_r2_20_f
    required_columns:
    - wick_upper_ratio
    - wick_lower_ratio
    - compression_score
    - trend_r2_20
    output_columns:
    - wick_compression_score
    - wick_ignition_score
    - wick_absorption_score
    - wick_exhaustion_score
    category: interaction
    description: 'Wick-based scene semantics (0..1): compression/ignition/absorption/exhaustion.'
    pass_full_df: false
    compute_params:
      normalized: true
      output_normalization_map:
        wick_compression_score: bounded_0_1
        wick_ignition_score: bounded_0_1
        wick_absorption_score: bounded_0_1
        wick_exhaustion_score: bounded_0_1
    column_mappings:
      wick_upper_ratio: wick_upper_ratio
      wick_lower_ratio: wick_lower_ratio
      compression_score: compression_score
      trend_r2_20: trend_r2_20
  volume_anomaly_f:
    module: baseline
    compute_func: compute_volume_anomaly_from_series
    dependencies: []
    required_columns:
    - volume
    output_columns:
    - volume_anomaly
    category: liquidity
    description: Volume anomaly z-score (EWM+rolling; normalized/unitless)
    pass_full_df: false
    compute_params:
      output_normalization: zscore_rolling
      normalized: true
    column_mappings:
      volume: volume
  roc_5_f:
    module: baseline
    compute_func: compute_roc_5_from_series
    dependencies: []
    required_columns:
    - close
    output_columns:
    - roc_5
    category: momentum
    description: 5-bar rate of change z-score (normalized/unitless)
    compute_params:
      period: 5
      z_window: 50
      min_periods: 5
      clip_quantile: 0.01
      output_normalization: zscore_rolling
      normalized: true
    pass_full_df: false
    column_mappings:
      close: close
  trend_r2_20_f:
    module: baseline
    compute_func: compute_trend_r2_20_from_series
    dependencies: []
    required_columns:
    - close
    output_columns:
    - trend_r2_20
    category: trend
    description: 20-bar trend R² (log price) in [0,1] (normalized/unitless)
    pass_full_df: false
    compute_params:
      feature_shift: 0
      output_normalization: bounded_0_1
      normalized: true
    column_mappings:
      close: close
  trend_confidence_f:
    module: baseline
    compute_func: compute_trend_confidence_from_series
    dependencies: []
    required_columns:
    - close
    output_columns:
    - trend_confidence
    - trend_direction_raw
    - trend_direction
    category: trend
    description: Multi-horizon return-sign agreement (dual_add_trend; unitless [0,1] confidence)
    pass_full_df: false
    compute_params:
      horizons:
      - 3
      - 5
      - 10
    column_mappings:
      close: close
  trend_r2_50_f:
    module: baseline
    compute_func: compute_trend_r2_50_from_series
    dependencies: []
    required_columns:
    - close
    output_columns:
    - trend_r2_50
    category: trend
    description: 50-bar trend R² (log price)
    pass_full_df: false
    compute_params:
      feature_shift: 0
      output_normalization: bounded_0_1
      normalized: true
    column_mappings:
      close: close
  slope_consistency_score_f:
    module: baseline
    compute_func: compute_slope_consistency_score_from_series
    dependencies: []
    required_columns:
    - close
    output_columns:
    - slope_consistency_score
    category: trend
    description: EMA slope agreement (10/20/50)
    pass_full_df: false
    compute_params:
      normalized: true
      output_normalization_map:
        slope_consistency_score: bounded_0_1
    column_mappings:
      close: close
  atr_percentile_f:
    module: baseline
    compute_func: compute_atr_percentile_from_series
    dependencies: []
    required_columns:
    - high
    - low
    - close
    output_columns:
    - atr_percentile
    category: volatility
    description: Rolling ATR percentile (compression detector)
    pass_full_df: false
    compute_params:
      window: 540
      shift: 1
      normalized: true
      output_normalization_map:
        atr_percentile: bounded_0_1
    column_mappings:
      high: high
      low: low
      close: close
  jump_risk_pct_f:
    module: baseline
    compute_func: compute_jump_risk_pct_from_series
    dependencies: [atr_f]
    required_columns:
    - close
    - atr
    output_columns:
    - jump_risk_pct
    category: volatility
    description: Percentile rank of jump_risk (microstructure stability, used in gate rules)
    pass_full_df: false
    compute_params:
      input_normalization_map:
        atr: price_unit
      window: 10
      percentile_window: 540
      shift: 1
      normalized: true
      output_normalization_map:
        jump_risk_pct: bounded_0_1
    column_mappings:
      close: close
      atr: atr
  path_length_pct_f:
    module: baseline
    compute_func: compute_path_length_pct_from_series
    dependencies: [atr_f]
    required_columns:
    - close
    - atr
    output_columns:
    - path_length_pct
    category: trend
    description: Percentile rank of path_length (rolling path length in ATR units, used in gate rules)
    pass_full_df: false
    compute_params:
      input_normalization_map:
        atr: price_unit
      window: 20
      percentile_window: 540
      shift: 1
      normalized: true
      output_normalization_map:
        path_length_pct: bounded_0_1
    column_mappings:
      close: close
      atr: atr
  path_efficiency_pct_f:
    module: baseline
    compute_func: compute_path_efficiency_pct_from_series
    dependencies: [atr_f]
    required_columns:
    - close
    - atr
    output_columns:
    - path_efficiency_pct
    category: trend
    description: Percentile rank of path_efficiency (net_displacement / total_path_length, used in gate rules)
    pass_full_df: false
    compute_params:
      input_normalization_map:
        atr: price_unit
      window: 20
      percentile_window: 540
      shift: 1
      normalized: true
      output_normalization_map:
        path_efficiency_pct: bounded_0_1
    column_mappings:
      close: close
      atr: atr
  price_dir_consistency_pct_f:
    module: baseline
    compute_func: compute_price_dir_consistency_pct_from_series
    dependencies: []
    required_columns:
    - close
    output_columns:
    - price_dir_consistency_pct
    category: trend
    description: Percentile rank of price_dir_consistency (rolling consistency of actual price direction, used in gate rules)
    pass_full_df: false
    compute_params:
      window: 20
      percentile_window: 540
      shift: 1
      normalized: true
      output_normalization_map:
        price_dir_consistency_pct: bounded_0_1
    column_mappings:
      close: close
  path_efficiency_slope_5_f:
    module: interaction
    compute_func: compute_path_efficiency_slope_from_series
    dependencies: [path_efficiency_pct_f]
    required_columns:
    - path_efficiency_pct
    output_columns:
    - path_efficiency_slope_5
    category: derived
    description: Slope of path_efficiency_pct over 5-bar rolling window. Negative values indicate efficiency is declining (trend weakening).
    pass_full_df: false
    compute_params:
      window: 5
      normalized: false
      output_normalization_map:
        path_efficiency_slope_5: unitless
    column_mappings:
      path_efficiency_pct: path_efficiency_pct
  price_dir_consistency_slope_5_f:
    module: interaction
    compute_func: compute_price_dir_consistency_slope_from_series
    dependencies: [price_dir_consistency_pct_f]
    required_columns:
    - price_dir_consistency_pct
    output_columns:
    - price_dir_consistency_slope_5
    category: derived
    description: Slope of price_dir_consistency_pct over 5-bar rolling window. Negative values indicate consistency is declining (trend weakening).
    pass_full_df: false
    compute_params:
      window: 5
      normalized: false
      output_normalization_map:
        price_dir_consistency_slope_5: unitless
    column_mappings:
      price_dir_consistency_pct: price_dir_consistency_pct
  trend_volatility_alignment_f:
    module: baseline
    compute_func: compute_trend_volatility_alignment_from_series
    dependencies: []
    required_columns:
    - close
    - high
    - low
    output_columns:
    - trend_volatility_alignment
    category: trend
    description: Alignment of ROC sign and ATR percentile regime
    pass_full_df: false
    compute_params:
      feature_shift: 0
      normalized: true
      output_normalization_map:
        trend_volatility_alignment: bounded_-1_1
    column_mappings:
      close: close
      high: high
      low: low
  compression_duration_f:
    module: baseline
    compute_func: compute_compression_duration_from_series
    dependencies: []
    required_columns:
    - high
    - low
    - close
    output_columns:
    - compression_duration
    category: compression
    description: 压缩持续时间（基于 ATR percentile，连续 bar 数）
    pass_full_df: false
    compute_params:
      percentile_window: 540
      compression_threshold_pct: 0.2
      normalized: true
      output_normalization_map:
        compression_duration: bounded_0_1
    column_mappings:
      high: high
      low: low
      close: close
  recent_compression_decay_f:
    module: baseline
    compute_func: compute_recent_compression_decay_from_series
    dependencies: []
    required_columns:
    - high
    - low
    - close
    output_columns:
    - recent_compression_decay
    category: compression
    description: "\u538B\u7F29\u8870\u51CF\u8BB0\u5FC6: \u6700\u8FD1\u662F\u5426\u7ECF\u5386\u8FC7\u538B\u7F29(\u6307\u6570\u8870\u51CF), ME prefilter \u6838\u5FC3\u7279\u5F81"
    pass_full_df: false
    compute_params:
      percentile_window: 540
      compression_threshold_pct: 0.2
      decay_rate: 0.97
      normalized: true
      output_normalization_map:
        recent_compression_decay: bounded_0_1
    column_mappings:
      high: high
      low: low
      close: close
  compression_energy_f:
    module: enhanced
    compute_func: compute_compression_energy_from_series
    dependencies:
    - wpt_volume_energy_f
    - bb_width_ratio_f
    required_columns:
    - wpt_energy_cascade
    - bb_width_ratio
    output_columns:
    - compression_energy
    category: compression
    description: 压缩能量（结合 WPT 能量和布林带压缩） (normalized/unitless or similarity score)
    pass_full_df: false
    column_mappings:
      wpt_energy_cascade: wpt_energy_cascade
      bb_width_ratio: bb_width_ratio
    compute_params:
      normalized: true
  compression_to_breakout_prob_f:
    module: baseline
    compute_func: compute_compression_to_breakout_prob_from_series
    dependencies:
    - roc_5_f
    - compression_duration_f
    required_columns:
    - compression_duration
    - roc_5
    output_columns:
    - compression_to_breakout_prob
    category: compression
    description: Compression duration weighted momentum proxy
    pass_full_df: false
    column_mappings:
      compression_duration: compression_duration
      roc_5: roc_5
    compute_params:
      normalized: true
      output_normalization_map:
        compression_to_breakout_prob: bounded_0_1
  wpt_price_reconstructed_f:
    module: enhanced
    compute_func: extract_wpt_features
    dependencies: []
    required_columns:
    - close
    - high
    - low
    output_columns:
    - wpt_price_trend
    - wpt_price_fluctuation
    - wpt_price_reconstructed
    category: wpt
    description: WPT 重构价格（趋势 + 波动），用于生成多尺度 SR (normalized/unitless or similarity score)
    compute_params:
      wavelet: db4
      level: 4
      normalized: true
      output_normalization_map:
        wpt_price_trend: price_unit  # 绝对价格值，跨品种不可比
        wpt_price_fluctuation: price_unit  # 绝对价格波动，跨品种不可比
        wpt_price_reconstructed: price_unit  # 绝对重构价格，跨品种不可比
    notes: '所有 SR（POC、HAL、Swing、ZigZag）都应基于 WPT 重构价格计算，实现天然多尺度对齐。

      - 低频子带（''aaaa''）→ 长期 SR（周线级）

      - 中频子带（''aaad'', ''aada''）→ 中期 SR（日线级）

      - 高频子带（''dddd''）→ 短期 SR（分钟级）

      '
  wpt_volatility_features_f:
    module: enhanced
    compute_func: extract_wpt_volatility_features_normalized
    dependencies: []
    required_columns:
    - close
    - high
    - low
    - volume
    output_columns:
    - wpt_price_trend
    - wpt_price_fluctuation
    - wpt_price_reconstructed
    - wpt_price_energy_low_ratio
    - wpt_price_energy_mid_ratio
    - wpt_price_energy_high_ratio
    - wpt_price_energy_mid_low_ratio
    - wpt_volume_energy_low_ratio
    - wpt_cvd_energy_low_ratio
    - wpt_vper
    category: wpt
    description: WPT 波动率特征（完整版，包含所有能量比和 VPER）
    compute_params:
      wavelet: db4
      level: 4
      window: 100
      return_reconstructed_price: false
      normalized: true
      output_normalization_map:
        wpt_price_trend: price_unit  # 绝对价格值，跨品种不可比，禁止直接用于训练
        wpt_price_fluctuation: price_unit  # 绝对价格波动，跨品种不可比
        wpt_price_reconstructed: price_unit  # 绝对重构价格，跨品种不可比
        wpt_price_energy_low_ratio: bounded_0_1
        wpt_price_energy_mid_ratio: bounded_0_1
        wpt_price_energy_high_ratio: bounded_0_1
        wpt_price_energy_mid_low_ratio: log_robust_rolling
        wpt_volume_energy_low_ratio: bounded_0_1
        wpt_cvd_energy_low_ratio: bounded_0_1
        wpt_vper: log1p_robust_rolling
    notes: '用于波动率模型的 WPT 特征集合。

      包含价格、成交量、CVD 的能量比特征和 VPER（体积-价格能量比）。

      注意：增强特征（wpt_price_high_energy_ratio, wpt_price_fluct_l1_l2_ratio, wpt_vhph_sync）

      需要通过 enhance_wpt_vol_features 函数生成，可通过依赖关系自动处理。

      '
  poc_hal_features_f:
    module: baseline
    compute_func: compute_poc_hal_features_from_series
    dependencies:
    - wpt_price_reconstructed_f
    required_columns:
    - high
    - low
    - close
    - volume
    - wpt_price_reconstructed
    output_columns:
    - poc
    - hal_high
    - hal_low
    - hal_mid
    category: sr_structure
    description: POC/HAL normalized as (level - close) / ATR. Typical range [-3, 3],
      cross-asset comparable.
    compute_params:
      poc_window: 160
      atr_period: 14
      price_col: wpt_price_reconstructed
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
      volume: volume
      wpt_price_reconstructed: wpt_price_reconstructed
    notes: 独立的基础特征，可被其他特征复用，避免重复计算。输出已归一化为 ATR 倍数。
  poc_hal_features_close_f:
    module: baseline
    compute_func: compute_poc_hal_features_from_series
    dependencies: []
    required_columns:
    - high
    - low
    - close
    - volume
    output_columns:
    - poc
    - hal_high
    - hal_low
    - hal_mid
    category: sr_structure
    description: POC/HAL normalized as (level - close) / ATR (close-based, no WPT).
      Typical range [-3, 3].
    compute_params:
      poc_window: 160
      atr_period: 14
      price_col: close
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
      volume: volume
    notes: 用 close 作为价格参考，适合 baseline-only 流程（不引入 WPT）。输出已归一化。
  sqs_hal_high_f:
    module: baseline
    compute_func: compute_sqs_hal_high_from_series
    dependencies:
    - atr_f
    - poc_hal_features_close_f
    required_columns:
    - high
    - low
    - close
    - volume
    - atr
    - hal_high
    output_columns:
    - sqs_hal_high
    category: sr_structure
    description: Structure Quality Score for HAL high (基于 WPT 重构价格)
    compute_params:
      sr_type: resistance
      window: 60
      tolerance_factor: 0.5
      normalized: true
      output_normalization_map:
        sqs_hal_high: unitless
      input_normalization_map:
        atr: price_unit
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
      volume: volume
      atr: atr
      hal_high: hal_high
