    - liquidity_void_speed
    - liquidity_void_volume_ratio
    - liquidity_void_price_impact
    - liquidity_void_retracement
    - liquidity_void_false_breakout_risk
    category: liquidity
    description: 流动性真空区识别（Liquidity Void / Gap Detection）
    compute_params:
      lookback_window: 20
      speed_threshold_multiplier: 2.0
      volume_quantile: 0.2
      normalized: true
      output_normalization_map:
        liquidity_void_detected: bounded_0_1
        # speed is "pct-change / (ATR/close)" => unitless; can be heavy-tailed but cross-asset comparable
        liquidity_void_speed: unitless
        liquidity_void_volume_ratio: volume_ratio
        # price_impact = (high-low)/volume => scale-heavy; treat as long-tail, robust rolling
        liquidity_void_price_impact: log1p_robust_rolling
        # retracement is pct over 3 bars => typically [0,1] but can exceed 1 in extreme; keep bounded-ish
        liquidity_void_retracement: bounded_0_1
        liquidity_void_false_breakout_risk: bounded_0_1
      input_normalization_map:
        atr: price_unit
    pass_full_df: false
    column_mappings:
      close: close
      volume: volume
      atr: atr
    notes: '流动性真空区 ≠ 历史低成交量区域，而是当前订单簿深度缺失。

      特征：

      - 价格快速穿越（速度 > 阈值）

      - 成交量显著低于前后区间

      - 突破后 1~3 根 K 线内迅速回撤 >50%

