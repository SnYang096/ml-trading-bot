      - "spectrum_price_flatness"         # 核心：市场结构识别，flatness 低 = 有结构，非白噪声
      - "spectrum_price_high_freq_ratio"  # 辅助：噪声水平，用于降权
    category: spectrum
    description: "趋势跟踪策略专用频谱特征（精确选择：low_freq_ratio, flatness, high_freq_ratio）"
    pass_full_df: false
    column_mappings:
