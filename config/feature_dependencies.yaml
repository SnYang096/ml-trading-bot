features:
  atr_f:
    module: baseline
    compute_func: compute_atr_from_series
    dependencies: []
    required_columns:
      - high
      - low
      - close
    output_columns:
      - atr
    category: technical_indicator
    description: Average True Range
    compute_params:
      period: 14
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
  rsi_f:
    module: baseline
    compute_func: compute_rsi_from_series
    dependencies: []
    required_columns:
      - close
    output_columns:
      - rsi
    category: technical_indicator
    description: Relative Strength Index
    compute_params:
      period: 14
    pass_full_df: false
    column_mappings:
      close: close
  macd_f:
    module: baseline
    compute_func: compute_macd
    dependencies: []
    required_columns:
      - close
    output_columns:
      - macd
      - macd_signal
      - macd_histogram
    category: technical_indicator
    description: MACD Indicator
    compute_params:
      fast: 12
      slow: 26
      signal: 9
    pass_full_df: false
    column_mappings:
      series: close
  acceleration_3_f:
    module: baseline
    compute_func: compute_acceleration_3_from_series
    dependencies: []
    required_columns:
      - close
    output_columns:
      - acceleration_3
    category: technical_indicator
    description: "Momentum acceleration: normalized ROC(3) difference (动量加速度)"
    pass_full_df: false
    compute_params:
      feature_shift: 0
    column_mappings:
      close: close
  bb_width_f:
    module: baseline
    compute_func: compute_bb_width_features_from_series
    dependencies: []
    required_columns:
      - close
      - high
      - low
    output_columns:
      - bb_upper
      - bb_middle
      - bb_lower
      - bb_width
      - bb_width_normalized
    category: volatility
    description: Bollinger band width and ATR-normalized width
    pass_full_df: false
    column_mappings:
      close: close
      high: high
      low: low
  range_ratio_5bar_f:
    module: baseline
    compute_func: compute_range_ratio_5bar_from_series
    dependencies: []
    required_columns:
      - high
      - low
    output_columns:
      - range_ratio_5bar
    category: volatility
    description: Short vs long term range ratio (5 vs 20 bar)
    pass_full_df: false
    column_mappings:
      high: high
      low: low
  volatility_reversal_score_f:
    module: baseline
    compute_func: compute_volatility_reversal_score_from_series
    dependencies: []
    required_columns:
      - high
      - low
      - close
    output_columns:
      - volatility_reversal_score
    category: volatility
    description: ATR mean-reversion z-score
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
  price_range_symmetry_f:
    module: baseline
    compute_func: compute_price_range_symmetry_from_series
    dependencies: []
    required_columns:
      - high
      - low
      - close
    output_columns:
      - price_range_symmetry
    category: price_structure
    description: Upper/lower shadow asymmetry score
    pass_full_df: false
    compute_params:
      feature_shift: 0
    column_mappings:
      high: high
      low: low
      close: close
  wick_ratios_f:
    module: baseline
    compute_func: compute_wick_ratios_from_series
    dependencies: []
    required_columns:
      - high
      - low
      - close
      - open
    output_columns:
      - wick_upper_ratio
      - wick_lower_ratio
    category: price_structure
    description: Upper and lower wick ratios (用于 VPIN × wick 交互特征)
    pass_full_df: false
    column_mappings:
      open: open
      high: high
      low: low
      close: close
    notes: 上影线占比和下影线占比，用于衡量K线的上下影线长度

  wick_scene_semantic_scores_f:
    module: enhanced
    compute_func: compute_wick_scene_semantic_scores_from_series
    dependencies:
      - wick_ratios_f
      - compression_score_f
      - trend_r2_20_f
    required_columns:
      - wick_upper_ratio
      - wick_lower_ratio
      - compression_score
      - trend_r2_20
    output_columns:
      - wick_compression_score
      - wick_ignition_score
      - wick_absorption_score
      - wick_exhaustion_score
    category: interaction
    description: "Wick-based scene semantics (0..1): compression/ignition/absorption/exhaustion."
    pass_full_df: false
    column_mappings:
      wick_upper_ratio: wick_upper_ratio
      wick_lower_ratio: wick_lower_ratio
      compression_score: compression_score
      trend_r2_20: trend_r2_20
  volume_anomaly_f:
    module: baseline
    compute_func: compute_volume_anomaly_from_series
    dependencies: []
    required_columns:
      - volume
    output_columns:
      - volume_anomaly
    category: liquidity
    description: Volume anomaly z-score (EWM based)
    pass_full_df: false
    column_mappings:
      volume: volume
  roc_5_f:
    module: baseline
    compute_func: compute_roc_5_from_series
    dependencies: []
    required_columns:
      - close
    output_columns:
      - roc_5
    category: momentum
    description: 5-bar rate of change z-score
    compute_params:
      period: 5
    pass_full_df: false
    column_mappings:
      close: close
  trend_r2_20_f:
    module: baseline
    compute_func: compute_trend_r2_20_from_series
    dependencies: []
    required_columns:
      - close
    output_columns:
      - trend_r2_20
    category: trend
    description: 20-bar trend R² (log price)
    pass_full_df: false
    compute_params:
      feature_shift: 0
    column_mappings:
      close: close
  trend_r2_50_f:
    module: baseline
    compute_func: compute_trend_r2_50_from_series
    dependencies: []
    required_columns:
      - close
    output_columns:
      - trend_r2_50
    category: trend
    description: 50-bar trend R² (log price)
    pass_full_df: false
    compute_params:
      feature_shift: 0
    column_mappings:
      close: close
  slope_consistency_score_f:
    module: baseline
    compute_func: compute_slope_consistency_score_from_series
    dependencies: []
    required_columns:
      - close
    output_columns:
      - slope_consistency_score
    category: trend
    description: EMA slope agreement (10/20/50)
    pass_full_df: false
    column_mappings:
      close: close
  atr_percentile_f:
    module: baseline
    compute_func: compute_atr_percentile_from_series
    dependencies: []
    required_columns:
      - high
      - low
      - close
    output_columns:
      - atr_percentile
    category: volatility
    description: Rolling ATR percentile (compression detector)
    pass_full_df: false
    compute_params:
      window: 288
      shift: 1
    column_mappings:
      high: high
      low: low
      close: close
  trend_volatility_alignment_f:
    module: baseline
    compute_func: compute_trend_volatility_alignment_from_series
    dependencies: []
    required_columns:
      - close
      - high
      - low
    output_columns:
      - trend_volatility_alignment
    category: trend
    description: Alignment of ROC sign and ATR percentile regime
    pass_full_df: false
    compute_params:
      feature_shift: 0
    column_mappings:
      close: close
      high: high
      low: low
  compression_duration_f:
    module: baseline
    compute_func: compute_compression_duration_from_series
    dependencies: []
    required_columns:
      - high
      - low
      - close
    output_columns:
      - compression_duration
    category: compression
    description: 压缩持续时间（基于 ATR percentile，连续 bar 数）
    pass_full_df: false
    compute_params:
      percentile_window: 288
      compression_threshold_pct: 0.2
    column_mappings:
      high: high
      low: low
      close: close
  compression_energy_f:
    module: enhanced
    compute_func: compute_compression_energy_from_series
    dependencies:
      - wpt_volume_energy_f
      - bb_width_ratio_f
    required_columns:
      - wpt_energy_cascade
      - bb_width_ratio
    output_columns:
      - compression_energy
    category: compression
    description: 压缩能量（结合 WPT 能量和布林带压缩）
    pass_full_df: false
    column_mappings:
      wpt_energy_cascade: wpt_energy_cascade
      bb_width_ratio: bb_width_ratio
  compression_to_breakout_prob_f:
    module: baseline
    compute_func: compute_compression_to_breakout_prob_from_series
    dependencies:
      - roc_5_f
      - compression_duration_f
    required_columns:
      - compression_duration
      - roc_5
    output_columns:
      - compression_to_breakout_prob
    category: compression
    description: Compression duration weighted momentum proxy
    pass_full_df: false
    column_mappings:
      compression_duration: compression_duration
      roc_5: roc_5
  wpt_price_reconstructed_f:
    module: enhanced
    compute_func: extract_wpt_features
    dependencies: []
    required_columns:
      - close
      - high
      - low
    output_columns:
      - wpt_price_trend
      - wpt_price_fluctuation
      - wpt_price_reconstructed
    category: wpt
    description: WPT 重构价格（趋势 + 波动），用于生成多尺度 SR
    compute_params:
      wavelet: db4
      level: 4
    notes:
      "所有 SR（POC、HAL、Swing、ZigZag）都应基于 WPT 重构价格计算，实现天然多尺度对齐。

      - 低频子带（'aaaa'）→ 长期 SR（周线级）

      - 中频子带（'aaad', 'aada'）→ 中期 SR（日线级）

      - 高频子带（'dddd'）→ 短期 SR（分钟级）

      "
  wpt_volatility_features_f:
    module: enhanced
    compute_func: extract_wpt_features
    dependencies: []
    required_columns:
      - close
      - high
      - low
      - volume
    output_columns:
      - wpt_price_trend
      - wpt_price_fluctuation
      - wpt_price_reconstructed
      - wpt_price_energy_low_ratio
      - wpt_price_energy_mid_ratio
      - wpt_price_energy_high_ratio
      - wpt_price_energy_mid_low_ratio
      - wpt_volume_energy_low_ratio
      - wpt_cvd_energy_low_ratio
      - wpt_vper
    category: wpt
    description: WPT 波动率特征（完整版，包含所有能量比和 VPER）
    compute_params:
      wavelet: db4
      level: 4
      window: 100
      return_reconstructed_price: false
    notes: "用于波动率模型的 WPT 特征集合。

      包含价格、成交量、CVD 的能量比特征和 VPER（体积-价格能量比）。

      注意：增强特征（wpt_price_high_energy_ratio, wpt_price_fluct_l1_l2_ratio, wpt_vhph_sync）

      需要通过 enhance_wpt_vol_features 函数生成，可通过依赖关系自动处理。

      "
  poc_hal_features_f:
    module: baseline
    compute_func: compute_poc_hal_features_from_series
    dependencies:
      - wpt_price_reconstructed_f
    required_columns:
      - high
      - low
      - close
      - volume
      - wpt_price_reconstructed
    output_columns:
      - poc
      - hal_high
      - hal_low
      - hal_mid
    category: sr_structure
    description: POC (Point of Control) 和 HAL (Value Area) 基础特征（基于 WPT 重构价格）
    compute_params:
      poc_window: 160
      price_col: wpt_price_reconstructed
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
      volume: volume
      wpt_price_reconstructed: wpt_price_reconstructed
    notes: 独立的基础特征，可被其他特征复用，避免重复计算

  # -------------------------------------------------------------------------
  # Baseline-only variants (close-based, no WPT dependency)
  # Use these when you want the entire dependency closure to stay "baseline".
  # -------------------------------------------------------------------------
  poc_hal_features_close_f:
    module: baseline
    compute_func: compute_poc_hal_features_from_series
    dependencies: []
    required_columns:
      - high
      - low
      - close
      - volume
    output_columns:
      - poc
      - hal_high
      - hal_low
      - hal_mid
    category: sr_structure
    description: POC/HAL 基础特征（close-based baseline，无 WPT 依赖）
    compute_params:
      poc_window: 160
      price_col: close
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
      volume: volume
    notes: 用 close 作为价格参考，适合 baseline-only 流程（不引入 WPT）。
  sqs_hal_high_f:
    module: baseline
    compute_func: compute_sqs_hal_high_from_series
    dependencies:
      - atr_f
      - poc_hal_features_close_f
    required_columns:
      - high
      - low
      - close
      - volume
      - atr
      - hal_high
    output_columns:
      - sqs_hal_high
    category: sr_structure
    description: Structure Quality Score for HAL high (基于 WPT 重构价格)
    compute_params:
      sr_type: resistance
      window: 60
      tolerance_factor: 0.5
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
      volume: volume
      atr: atr
      hal_high: hal_high
    notes: 基于 WPT 重构价格计算，实现多尺度对齐
  sqs_hal_low_f:
    module: baseline
    compute_func: compute_sqs_hal_low_from_series
    dependencies:
      - atr_f
      - poc_hal_features_close_f
    required_columns:
      - high
      - low
      - close
      - volume
      - atr
      - hal_low
    output_columns:
      - sqs_hal_low
    category: sr_structure
    description: Structure Quality Score for HAL low (基于 WPT 重构价格)
    compute_params:
      sr_type: support
      window: 60
      tolerance_factor: 0.5
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
      volume: volume
      atr: atr
      hal_low: hal_low
    notes: 基于 WPT 重构价格计算，实现多尺度对齐
  sqs_f:
    module: baseline
    compute_func: compute_sqs_combined_from_series
    dependencies:
      - sqs_hal_high_f
      - sqs_hal_low_f
    required_columns:
      - sqs_hal_high
      - sqs_hal_low
    output_columns:
      - sqs
    category: sr_structure
    description: 通用 SQS（结合 sqs_hal_high 和 sqs_hal_low，使用 max）
    pass_full_df: false
    column_mappings:
      sqs_hal_high: sqs_hal_high
      sqs_hal_low: sqs_hal_low
  sr_strength_max_f:
    module: baseline
    compute_func: compute_sr_strength_max_from_series
    dependencies:
      - atr_f
      - poc_hal_features_f
    required_columns:
      - high
      - low
      - close
      - atr
      - poc
      - hal_high
      - hal_low
    output_columns:
      - sr_strength_max
      - dist_to_nearest_sr
      - direction_to_nearest_sr
    category: sr_structure
    description: Maximum SR strength across all boundaries (基于 WPT 重构价格)
    compute_params:
      window: 60
      tolerance_factor: 0.5
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
      atr: atr
      poc: poc
      hal_high: hal_high
      hal_low: hal_low
    notes: "所有 SR 边界都基于 WPT 重构价格计算，实现多尺度对齐。

      函数会自动确保 hal_high, hal_low, poc, atr 列存在，即使依赖特征未完全计算。

      "

  sr_strength_max_close_f:
    module: baseline
    compute_func: compute_sr_strength_max_from_series
    dependencies:
      - atr_f
      - poc_hal_features_close_f
    required_columns:
      - high
      - low
      - close
      - atr
      - poc
      - hal_high
      - hal_low
    output_columns:
      - sr_strength_max
      - dist_to_nearest_sr
      - direction_to_nearest_sr
    category: sr_structure
    description: Maximum SR strength (close-based baseline，无 WPT 依赖)
    compute_params:
      window: 60
      tolerance_factor: 0.5
    pass_full_df: false
    column_mappings:
      high: high
      low: low
      close: close
      atr: atr
      poc: poc
      hal_high: hal_high
      hal_low: hal_low
    notes: baseline-only 版本：通过 poc_hal_features_close_f 生成 POC/HAL，从而不引入 WPT。
  wpt_price_fluctuation_f:
    module: enhanced
    compute_func: extract_wpt_features
    dependencies: []
    required_columns:
      - close
    output_columns:
      - wpt_price_fluctuation
      - wpt_price_trend
      - wpt_price_energy_low_ratio
      - wpt_price_energy_mid_ratio
      - wpt_price_energy_high_ratio
    category: wpt
    description: WPT price fluctuation + 能量比特征（用于 Hilbert 等需要去趋势价格的特征）
    compute_params:
      wavelet: db4
      level: 4
    notes: "WPT 过滤高频噪音，提高 POC/HAL 等 SR 特征的识别准确性。

      注意：此特征与 wpt_price_reconstructed 都输出 wpt_price_fluctuation 和 wpt_price_trend，

      但此特征额外提供能量比特征（用于能量分析）。

      如果只需要 wpt_price_fluctuation，可以依赖 wpt_price_reconstructed（更高效）。

      "
  wpt_cvd_fluctuation_f:
    module: enhanced
    compute_func: extract_wpt_features
    dependencies: []
    required_columns:
      - close
      - high
      - low
      - cvd
    output_columns:
      - wpt_cvd_fluctuation
    category: wpt
    description: WPT CVD fluctuation
    compute_params:
      wavelet: db4
      level: 4
      price_col: close
      cvd_col: cvd
      volume_col: volume
  volume_profile_vpvr_f:
    module: enhanced
    compute_func: compute_volume_profile_vpvr_from_series
    dependencies: []
    required_columns:
      - close
      - high
      - low
      - volume
    output_columns:
      - vpvr_pvp
      - vpvr_hvn_count
      - vpvr_lvn_count
      - vpvr_lvn_distance
      - vpvr_volume_density
      - vpvr_price_in_lvn
    category: liquidity
    description: Canonical VPVR (WPT-denoised volume profile) features
    compute_params:
      wavelet: db4
      level: 4
      window: 100
      bins: 50
    pass_full_df: false
    column_mappings:
      close: close
      high: high
      low: low
      volume: volume
  liquidity_void_f:
    module: enhanced
    compute_func: compute_liquidity_void_features_from_series
    dependencies:
      - atr_f
    required_columns:
      - close
      - volume
      - atr
    output_columns:
      - liquidity_void_detected
      - liquidity_void_speed
      - liquidity_void_volume_ratio
      - liquidity_void_price_impact
      - liquidity_void_retracement
      - liquidity_void_false_breakout_risk
    category: liquidity
    description: 流动性真空区识别（Liquidity Void / Gap Detection）
    compute_params:
      lookback_window: 20
      speed_threshold_multiplier: 2.0
      volume_quantile: 0.2
    pass_full_df: false
    column_mappings:
      close: close
      volume: volume
      atr: atr
    notes: "流动性真空区 ≠ 历史低成交量区域，而是当前订单簿深度缺失。

      特征：

      - 价格快速穿越（速度 > 阈值）

      - 成交量显著低于前后区间

      - 突破后 1~3 根 K 线内迅速回撤 >50%

      "
  wpt_volume_energy_f:
    module: enhanced
    compute_func: compute_wpt_volume_energy_features_from_series
    dependencies: []
    required_columns:
      - close
      - volume
    output_columns:
      - wpt_vper_low
      - wpt_vper_mid
      - wpt_vper_high
      - wpt_energy_cascade
      - wpt_multi_scale_consistency
      - wpt_breakout_confidence
      - wpt_false_breakout_risk
    category: liquidity
    description: WPT + Volume 能量协同分析（VPER、能量下移、真假突破判断）
    compute_params:
      wavelet: db4
      level: 4
      lookback_window: 20
    pass_full_df: false
    column_mappings:
      close: close
      volume: volume
    notes: "WPT + Volume 能量协同分析：

      - VPER: Volume-Price Energy Ratio（量价能量比）

      - 能量下移（Energy Cascade）: 高频能量向中低频转移

      - 多尺度一致性: 至少两个中低频子带同时出现能量上升

      - 真假突破评分: 基于多尺度能量和 VPER 的综合评分

      "

  wpt_scene_semantic_scores_f:
    module: enhanced
    compute_func: compute_wpt_scene_semantic_scores_from_series
    dependencies:
      - wpt_volume_energy_f
      - compression_score_f
      - trend_r2_20_f
    required_columns:
      - wpt_breakout_confidence
      - wpt_false_breakout_risk
      - wpt_multi_scale_consistency
      - wpt_energy_cascade
      - compression_score
      - trend_r2_20
    output_columns:
      - wpt_compression_score
      - wpt_ignition_score
      - wpt_absorption_score
      - wpt_exhaustion_score
    category: interaction
    description: "WPT scene semantics: compression/ignition/absorption/exhaustion (0..1), using WPT+compression+trend context."
    pass_full_df: false
    column_mappings:
      wpt_breakout_confidence: wpt_breakout_confidence
      wpt_false_breakout_risk: wpt_false_breakout_risk
      wpt_multi_scale_consistency: wpt_multi_scale_consistency
      wpt_energy_cascade: wpt_energy_cascade
      compression_score: compression_score
      trend_r2_20: trend_r2_20

  liquidity_void_scene_semantic_scores_f:
    module: enhanced
    compute_func: compute_liquidity_void_scene_semantic_scores_from_series
    dependencies:
      - liquidity_void_f
      - wpt_volume_energy_f
      - compression_score_f
      - trend_r2_20_f
    required_columns:
      - liquidity_void_detected
      - liquidity_void_speed
      - liquidity_void_price_impact
      - liquidity_void_retracement
      - liquidity_void_false_breakout_risk
      - wpt_breakout_confidence
      - compression_score
      - trend_r2_20
    output_columns:
      - liquidity_void_compression_score
      - liquidity_void_ignition_score
      - liquidity_void_absorption_score
      - liquidity_void_exhaustion_score
    category: interaction
    description: "LiquidityVoid scene semantics: compression/ignition/absorption/exhaustion (0..1), using void+WPT+compression+trend context."
    compute_params:
      speed_scale: 3.0
      impact_scale: 3.0
    pass_full_df: false
    column_mappings:
      liquidity_void_detected: liquidity_void_detected
      liquidity_void_speed: liquidity_void_speed
      liquidity_void_price_impact: liquidity_void_price_impact
      liquidity_void_retracement: liquidity_void_retracement
