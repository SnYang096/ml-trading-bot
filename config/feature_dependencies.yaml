    - dtw_double_top_dist_w15
    - dtw_bearish_engulfing_dist_w15
    - dtw_bull_flag_dist_w25
    - dtw_bear_flag_dist_w25
    - dtw_triangle_dist_w25
    output_columns:
    - dtw_reversal_bullish_score
    - dtw_reversal_bearish_score
    - dtw_continuation_bullish_score
    - dtw_continuation_bearish_score
    - dtw_compression_score
    - dtw_exhaustion_score
    category: interaction
    description: 'DTW Pattern Scene Semantic Scores (0..1): 将 DTW 形态距离转换为语义场景分数。 -
      reversal_bullish: 看涨反转形态（hammer/head_shoulder_bottom/double_bottom/bullish_engulfing）
      - reversal_bearish: 看跌反转形态（shooting_star/head_shoulder_top/double_top/bearish_engulfing）
      - continuation_bullish: 看涨延续形态（bull_flag） - continuation_bearish: 看跌延续形态（bear_flag）
      - compression: 压缩形态（triangle + compression context） - exhaustion: 衰竭形态（tops/bottoms
      + trend ending） '
    compute_params:
      dist_scale: 0.5
      sr_prox_threshold: 0.02
      normalized: true
      output_normalization_map:
        dtw_reversal_bullish_score: bounded_0_1
        dtw_reversal_bearish_score: bounded_0_1
        dtw_continuation_bullish_score: bounded_0_1
        dtw_continuation_bearish_score: bounded_0_1
        dtw_compression_score: bounded_0_1
        dtw_exhaustion_score: bounded_0_1
    pass_full_df: false
    column_mappings:
      dtw_hammer_dist_w15: dtw_hammer_dist_w15
      dtw_head_shoulder_bottom_dist_w15: dtw_head_shoulder_bottom_dist_w15
      dtw_double_bottom_dist_w15: dtw_double_bottom_dist_w15
      dtw_bullish_engulfing_dist_w15: dtw_bullish_engulfing_dist_w15
      dtw_shooting_star_dist_w15: dtw_shooting_star_dist_w15
      dtw_head_shoulder_top_dist_w15: dtw_head_shoulder_top_dist_w15
      dtw_double_top_dist_w15: dtw_double_top_dist_w15
      dtw_bearish_engulfing_dist_w15: dtw_bearish_engulfing_dist_w15
      dtw_bull_flag_dist_w25: dtw_bull_flag_dist_w25
      dtw_bear_flag_dist_w25: dtw_bear_flag_dist_w25
      dtw_triangle_dist_w25: dtw_triangle_dist_w25
      compression_score: compression_score
      trend_r2_20: trend_r2_20
      dist_to_nearest_sr: dist_to_nearest_sr
    notes: '语义化 DTW 形态特征： - 消除 raw DTW 距离的歧义（距离大/小的含义） - 按策略场景分组（反转/延续/压缩/衰竭） - 结合上下文门控（SR接近度、趋势、压缩度） '
