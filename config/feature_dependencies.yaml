      - evt_scale_left
      - evt_var_99_left
      - evt_es_99_left
      - evt_scale_right
      - evt_var_99_right
      - evt_es_99_right
    category: risk_management
    description: EVT (Extreme Value Theory) 极值理论特征：尾部风险预警（聚焦左尾暴跌风险）- 用于风险管理/仓位控制，不用于波动率预测
    compute_params:
      window: 120
      threshold_quantile: 0.1
      min_excesses: 10
      separate_tails: true
      var_confidence: 0.99
    pass_full_df: false
    column_mappings:
      close: close
    notes:
      "EVT 用于尾部风险预警和风险管理（聚焦左尾暴跌风险）：\n\n核心特征（左尾 - 暴跌风险）：\n- evt_tail_shape / evt_tail_shape_left\
      \ (ξ): 左尾形状参数，反映极端事件概率分布\n  * ξ > 0: 重尾分布（金融数据通常如此）\n  * ξ > 0.3: 极高尾部风险（黑天鹅风险高）\n\
      \  * 0.1 < ξ ≤ 0.3: 典型金融重尾（常见范围，金融收益率通常在此区间）\n  * ξ ≤ 0.1: 相对较轻尾部\n  * ξ > 0.5:\
      \ 方差无限（极端罕见，理论极限）\n- evt_scale / evt_scale_left (σ): 左尾尺度参数\n- evt_var_99 /\
      \ evt_var_99_left: 99% VaR估计（负值，表示预期最大损失）\n- evt_es_99 / evt_es_99_left: 99%\
      \ Expected Shortfall估计（负值，表示超过VaR的平均损失）\n\n可选特征（右尾 - 泡沫风险，仅当separate_tails=true时）：\n\
      - evt_tail_shape_right: 右尾形状参数\n- evt_scale_right: 右尾尺度参数\n- evt_var_99_right:\
      \ 右尾99% VaR（正值，表示预期最大涨幅）\n- evt_es_99_right: 右尾99% ES（正值）\n\n改进说明：\n- 聚焦左尾风险：VaR/ES基于左尾GPD拟合，正确反映暴跌风险\n\
      - 修正公式：使用标准EVT公式计算VaR/ES，正确处理ξ的不同情况\n- 阈值调整：threshold_quantile=0.1（10%分位数）用于左尾，更准确捕捉极端事件\n\
      \n应用场景：\n- 控制离场：当 ξ_left > 0.3 或突增时，提前离场避免黑天鹅\n- 不加仓：当尾部风险高时（ξ_left > 0.3 或\
      \ evt_var_99_left 更负），避免加仓\n- 风险管理：使用 evt_var_99_left 和 evt_es_99_left 进行仓位控制\n\
      - 不用于波动率预测：EVT特征描述极端事件概率，而非波动率水平\n\n注意：金融收益率 ξ 通常在 0.1~0.3 之间，ξ > 0.3 表示极高尾部风险\n\
      \n需要 scipy 包（通常已安装）\n"
