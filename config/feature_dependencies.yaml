    output_columns:
      - vp_width_ratio
      - vp_poc_deviation
      - vp_skewness
      - vp_entropy
      - vp_lv_ratio
      - vp_hv_ratio
    category: volatility
    description: Volume Profile 波动率特征（从 WPT 降噪后的 Volume Profile 提取）
    compute_params:
      window: 100
      wavelet: db4
      level: 4
    notes: 'Volume Profile 波动率特征：

      - vp_width_ratio: Value Area Width / Full Range（市场共识强度）

      - vp_poc_deviation: 当前价格 vs POC 的标准化偏离

      - vp_skewness: 成交量分布偏度（趋势倾向）

      - vp_entropy: 信息熵（不确定性）

      - vp_lv_ratio: 低成交量区域比例（LVN）

      - vp_hv_ratio: 高成交量区域比例（HVN）

      这些特征与 vol_zscore、vol_slope_10 结合，可显著提升对"波动率拐点"的识别能力。

      '
    pass_full_df: false
    column_mappings:
      close: close
      volume: volume

