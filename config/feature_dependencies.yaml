  # VPIN × Trade Clustering 交叉特征（捕捉订单流不平衡 + 成交聚集性的组合信号）
  vpin_x_trade_cluster_max_buy_run:
    module: enhanced
    compute_func: compute_vpin_x_trade_cluster_max_buy_run
    dependencies: ["vpin_features"]
    required_columns: ["vpin", "trade_cluster_max_buy_run"]
    output_columns: ["vpin_x_trade_cluster_max_buy_run"]
    category: interaction
    description: "VPIN × 最大连续买入长度（捕捉高订单流不平衡 + 连续买入聚集）"
    pass_full_df: true
    notes: "可能表示知情交易者的策略性连续买入"
  
  vpin_zscore_x_trade_cluster_max_buy_run:
    module: enhanced
    compute_func: compute_vpin_zscore_x_trade_cluster_max_buy_run
    dependencies: ["vpin_features"]
    required_columns: ["vpin_zscore_20", "trade_cluster_max_buy_run"]
    output_columns: ["vpin_zscore_x_trade_cluster_max_buy_run"]
    category: interaction
    description: "VPIN Z-score × 最大连续买入长度（用户建议的交叉项，可能有超加成效应）"
    pass_full_df: true
    notes: "捕捉异常高的订单流不平衡 + 连续买入聚集的组合信号"
  
  vpin_signed_imbalance_x_trade_cluster_imbalance:
    module: enhanced
    compute_func: compute_vpin_signed_imbalance_x_trade_cluster_imbalance
    dependencies: ["vpin_features"]
    required_columns: ["vpin_signed_imbalance", "trade_cluster_imbalance_ratio"]
    output_columns: ["vpin_signed_imbalance_x_trade_cluster_imbalance"]
    category: interaction
    description: "VPIN Signed Imbalance × Trade Clustering Imbalance（捕捉方向一致性）"
    pass_full_df: true
    notes: "两者方向一致时，信号更可靠"
  
  vpin_x_trade_cluster_entropy:
    module: enhanced
    compute_func: compute_vpin_x_trade_cluster_entropy
    dependencies: ["vpin_features"]
    required_columns: ["vpin", "trade_cluster_directional_entropy"]
    output_columns: ["vpin_x_trade_cluster_entropy"]
    category: interaction
    description: "VPIN × 方向熵（捕捉订单流不平衡 + 成交混乱度）"
    pass_full_df: true
    notes: "高 VPIN + 低熵 = 大单主导且有序（知情交易）；高 VPIN + 高熵 = 大单主导但混乱（可能假突破）"
  
  # ========================================================================
  # 通用组合特征（衍生特征）：单个特征的变换或两个特征的其他运算
