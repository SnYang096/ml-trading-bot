  # ========================================================================
  # Spectrum 特征（无依赖）
  # ========================================================================
  # 基础频谱特征（包含所有列，用于波动率模型等需要全部特征的场景）
  spectrum_features:
    module: enhanced
    compute_func: extract_spectrum_features_from_series
    dependencies: []
    required_columns: ["close"]
    output_columns:
      # 价格频谱特征（6个核心特征，总是生成）
      - "spectrum_price_has_dominant_freq"      # 是否存在显著主频（布尔，0/1）
      - "spectrum_price_flatness"                # 频谱平坦度（0-1），越低表示能量越集中（趋势/共振）
      - "spectrum_price_high_freq_ratio"        # 高频能量占比（0-1），越高表示噪声/流动性碎片化越强
      - "spectrum_price_low_freq_ratio"          # 低频能量占比（0-1），越高表示长期驱动/宏观因素主导
      - "spectrum_price_entropy"                 # 谱熵（0-1），越低表示系统有序性越高（如闪崩前的同步）
      - "spectrum_price_centroid"                # 频谱重心（Hz），能量集中在低频还是高频
      # 成交量频谱特征（如果提供volume列，可选）
      - "spectrum_volume_flatness"
      - "spectrum_volume_high_freq_ratio"
      - "spectrum_volume_low_freq_ratio"
      - "spectrum_volume_entropy"
      - "spectrum_volume_centroid"
      # CVD频谱特征（如果提供cvd列，可选）
      - "spectrum_cvd_flatness"
      - "spectrum_cvd_high_freq_ratio"
      - "spectrum_cvd_low_freq_ratio"
      - "spectrum_cvd_entropy"
      - "spectrum_cvd_centroid"
    category: spectrum
    description: |
      频谱分析特征（完整版，包含所有列）
      用于波动率模型等需要全部特征的场景
    pass_full_df: false
    column_mappings:
      close: close
    compute_params:
      rolling_window: 64

  # SR 突破策略专用频谱特征（精确选择）
  spectrum_features_sr_breakout:
    module: enhanced
    compute_func: extract_spectrum_features_from_series
    dependencies: []
    required_columns: ["close"]
    output_columns:
      - "spectrum_price_high_freq_ratio"  # 核心：噪声水平，假突破过滤
      - "spectrum_price_flatness"         # 核心：市场结构，突破质量
      - "spectrum_price_low_freq_ratio"   # 辅助：趋势驱动确认
      - "spectrum_price_entropy"          # 辅助：系统有序性
    category: spectrum
    description: "SR 突破策略专用频谱特征（精确选择：high_freq_ratio, flatness, low_freq_ratio, entropy）"
    pass_full_df: false
    column_mappings:
      close: close
    compute_params:
      rolling_window: 64

  # SR 反转策略专用频谱特征（精确选择）
  spectrum_features_sr_reversal:
    module: enhanced
    compute_func: extract_spectrum_features_from_series
    dependencies: []
    required_columns: ["close"]
    output_columns:
      - "spectrum_price_flatness"  # 核心：震荡市识别，flatness 高 = 白噪声
      - "spectrum_price_entropy"   # 核心：系统有序性，高 entropy = 市场随机，适合反转
