    description: >-
      ME 方向绕过 VWAP 带通：|me_accel_5k|≥阈值 或 连续三根 K 线 macro_tp_vwap_1200_position 同号（价在 VWAP 同侧）。
    pass_full_df: false
    compute_params:
      accel_abs_min: 1.0
      normalized: true
      output_normalization_map:
        me_vwap_structure_bypass_direction: bounded_-1_1
    column_mappings:
      me_accel_5k: me_accel_5k
      macro_tp_vwap_1200_position: macro_tp_vwap_1200_position

  me_failure_f:
    module: momentum_expansion
    compute_func: compute_momentum_expansion_failure_from_series
    dependencies:
    - atr_f
    - me_soft_phase_f
    required_columns:
    - close
    - volume
    - me_atr_pct
    - me_accel_5k
    - me_cvd_alignment
    output_columns:
    - me_false_expansion
    - me_vol_divergence
    - me_flow_exhaustion
    - me_failure_score
    category: momentum_expansion
    description: ME failure signals - expansion without follow-through.
    pass_full_df: false
    compute_params:
      lookback: 10
      normalized: true
      output_normalization_map:
        me_false_expansion: bounded_0_1
        me_vol_divergence: bounded_0_1
        me_flow_exhaustion: bounded_0_1
        me_failure_score: bounded_0_1
    column_mappings:
      close: close
      volume: volume
      me_atr_pct: me_atr_pct
      me_accel_5k: me_accel_5k
      me_cvd_alignment: me_cvd_alignment

  me_context_f:
    module: momentum_expansion
    compute_func: compute_momentum_expansion_context_from_series
    dependencies:
    - jump_risk_pct_f
    - shd_pct_f
    - ofci_pct_f
    required_columns:
    - close
    output_columns:
    - me_jump_risk_suitable
    - me_reflex_risk
    - me_regime_suitable
    category: momentum_expansion
    description: ME context features - jump risk suitability and reflexivity risk.
    pass_full_df: false
    compute_params:
      normalized: true
      output_normalization_map:
        me_jump_risk_suitable: bounded_0_1
        me_reflex_risk: bounded_0_1
        me_regime_suitable: bounded_0_1
    column_mappings:
      close: close
      jump_risk_pct: jump_risk_pct
      shd_pct: shd_pct
      ofci_pct: ofci_pct

  # --- ME Gate 层 ---
  me_gate_f:
    module: momentum_expansion
    compute_func: compute_me_gate_from_series
    dependencies:
    - me_soft_phase_f
    required_columns:
    - me_atr_pct
    - me_cvd_alignment
    - me_volume_surge
    output_columns:
    - me_gate_expansion_ok
    - me_gate_flow_ok
    - me_gate_volume_ok
    - me_gate_pass
    category: momentum_expansion
    description: ME Gate layer - energy + flow consistency + volume surge (no acceleration).
    pass_full_df: false
    compute_params:
      expansion_threshold: 0.6
      flow_threshold: 0.6
      volume_threshold: 0.5
      normalized: true
      output_normalization_map:
        me_gate_expansion_ok: bounded_0_1
        me_gate_flow_ok: bounded_0_1
        me_gate_volume_ok: bounded_0_1
        me_gate_pass: bounded_0_1
    column_mappings:
      me_atr_pct: me_atr_pct
      me_cvd_alignment: me_cvd_alignment
      me_volume_surge: me_volume_surge

  # ================================================================
  # P5 非平稳性: Regime State / OOD Score
  # ================================================================

  regime_state_f:
    module: baseline_features
    compute_func: compute_regime_state_from_df
    dependencies:
    - atr_percentile_f
    - oi_features_f
    - funding_rate_features_f
    required_columns:
    - atr_percentile
    - oi_zscore
    - funding_rate_abs_zscore_50
    output_columns:
    - regime_state
    category: regime
    description: "Regime state (0=NORMAL, 1=HIGH_VOL, 2=HIGH_LEVERAGE). Replicates RegimeDetector logic as a feature for Gate/Evidence tree models."
    pass_full_df: true
    compute_params:
      normalized: true
      output_normalization_map:
        regime_state: categorical_int

  ood_score_f:
    module: baseline_features
    compute_func: compute_ood_score_from_df
    dependencies: []
    required_columns: []
    output_columns:
    - ood_score
    category: regime
    description: "Out-of-distribution score: fraction of features outside training [q05, q95]. Higher = more OOD. Injected into Evidence so tree auto-downgrades OOD samples."
    pass_full_df: true
    compute_params:
      normalized: true
      output_normalization_map:
        ood_score: bounded_0_1

  # ═══════════════════════════════════════════════════════════════
  # Session & Microstructure Features
  # ═══════════════════════════════════════════════════════════════

  session_features_f:
    module: session_features
    compute_func: compute_session_features_from_series
    dependencies: []
    required_columns:
    - close
    output_columns:
    - session_id
    - hour_sin
    - hour_cos
    - is_session_overlap
    category: session
    normalized: true
    description: "Session liquidity map: session_id (Asia=0/EU=1/US=2/Late=3), hour cyclic encoding (sin/cos), EU-US overlap indicator. Token alpha decays fast; session timing matters for entry."
    pass_full_df: false
    column_mappings:
      close: close
    compute_params:
      output_normalization_map:
        session_id: categorical_int
        hour_sin: bounded_neg1_1
        hour_cos: bounded_neg1_1
        is_session_overlap: boolean_01

  bars_since_extreme_f:
    module: session_features
    compute_func: compute_bars_since_extreme_from_series
    dependencies: []
    required_columns:
    - high
    - low
    output_columns:
    - bars_since_local_high
    - bars_since_local_low
    category: session
    normalized: true
    description: "Bars since local high/low within lookback window, normalized. Low value = near extreme (chasing risk), high = in pullback. Entry filter: avoid chasing tops/bottoms."
    pass_full_df: false
    column_mappings:
      high: high
      low: low
    compute_params:
      lookback: 20
      normalize_window: 50
      output_normalization_map:
        bars_since_local_high: bounded_0_1
        bars_since_local_low: bounded_0_1

