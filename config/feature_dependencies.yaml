      - fp_exhaustion_price
      - fp_exhaustion_zscore
      - fp_delta_divergence
    category: order_flow
    description:
      Single-bar footprint (POC/HVN/LVN/VAH/VAL + delta/imbalance/skew)
      computed from ticks inside each kline.
    compute_params:
      price_bin_method: fd
      price_bin_target_bins: 40
      value_area_pct: 0.7
      price_bin_size: null
      tick_size: null
    notes:
      "- 需要 ticks 数据：columns ['price','volume','side']，DatetimeIndex；通过调用时传入
      ticks（不可从 df 推断）。

      - 分箱优先级：tick_size > price_bin_size > Freedman–Diaconis 自适应 > 固定目标 bin 数（均分 price
      range）。

      - 无 tick 的 K 线返回 NaN。

