layer: "nnmh_router_plateau"

# KPI Gate for Router threshold tuning robustness (plateau protocol).
# Input metrics: threshold-plateau `summary.json` (flattened into a metrics dict by kpi_journal).
#
# Notes:
# - Plateau metrics are *not* about profitability; they measure controllability/stability
#   across sub-windows and bootstrap resampling.

hard_fail:
  # If plateau_frac is ~0, you're likely on a sharp peak (overfit / unstable).
  plateau_frac_ge_95pct: {min: 0.02, max: 1.0}

warn:
  # Robust score is allowed to be negative (depending on costs/vol regime), so we don't gate on sign.
  best__win_score_p25: {min: -9999.0, max: 9999.0, optional: true}
  best__win_dd_mean: {min: 0.0, max: 0.50, optional: true}

