layer: "nnmh_primitives_model"

# KPI Gate for NN Path Primitives as Execution Intelligence.
# - The model outputs (dir/mfe/mae/mtt) control sizing + SL/TP + holding time.
# - Do NOT use Sharpe here (system-level KPI lives in execution/portfolio gates).
# - Source: e2e/counterfactual/metrics.json and optional calibration metrics.

hard_fail:
  # Ensure enough samples for execution-parameter diagnostics.
  router_diag__trade_n: {min: 30, max: 999999}
  # Trade density should be in a controllable range.
  router_diag__trade_rate: {min: 0.01, max: 0.50}

warn:
  # Basic execution-quality proxies (do not overfit to profitability).
  router_diag__trade_win_rate: {min: 0.40, max: 0.70}
  router_diag__trade_avg_ret: {min: -0.005, max: 0.010}
  router_diag__dir_conf_auc: {min: 0.50, max: 1.00, optional: true}
  router_diag__mfe_auc: {min: 0.50, max: 1.00, optional: true}
  router_diag__eff_auc: {min: 0.50, max: 1.00, optional: true}
  trade__rate: {min: 0.005, max: 0.80, optional: true}

  # Optional calibration metrics (if you export them).
  pred_dir_prob_ece: {min: 0.0, max: 0.20, optional: true}
  pred_mfe_atr_abs_err_p50: {min: 0.0, max: 0.50, optional: true}
  pred_mae_atr_abs_err_p50: {min: 0.0, max: 0.50, optional: true}
  pred_t_to_mfe_abs_err_p50: {min: 0.0, max: 12.0, optional: true}