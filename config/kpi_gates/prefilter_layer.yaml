layer: "prefilter"

# ================================================================
# Prefilter 层 KPI Gate — Meta-Algorithm 统计验证门槛
# ================================================================
#
# Prefilter 职责: 定义 archetype 语义边界 (数据空间可分性).
# 核心 KPI: KS 分布分离度 — pass/deny 两群体收益分布是否显著不同.
# 软约束: return_uplift >= -0.10 (不能主动伤害收益).
#
# 脚本读取路径:
#   analyze_archetype_feature_stratification.py --meta-algorithm
# ================================================================

# ── 统计验证门槛 ──
thresholds:
  # KS Distribution Separation (primary KPI)
  min_ks_statistic: 0.05
  max_ks_pvalue: 0.01

  # Return uplift soft constraint (don't actively harm)
  min_return_uplift_soft: -0.10

  # Hit rate uplift (disabled, kept for reference)
  min_hit_rate_uplift: -1.0

  # Robustness: time-fold KS 一致性 (0=全不一致, 1=全一致)
  min_robustness: 0.3

  # 相关性剪枝: deny_mask 相关性超过此值 → 去重
  correlation_threshold: 0.80

  # 最终规则数上限 (Prefilter ≤ 4 条规则)
  max_rules: 4

  # Deny rate 合法范围 (太小无意义, 太大误杀严重)
  deny_rate_min: 0.03
  deny_rate_max: 0.70

  # 通过率保底: 最少保留行数
  min_rows: 500

# ── LightGBM 训练参数 ──
lgb_params:
  num_leaves: 31
  learning_rate: 0.05
  min_child_samples: 50
  feature_fraction: 0.8
  bagging_fraction: 0.8
  bagging_freq: 5
  n_estimators: 200

# ── Holdout 验证参数 ──
holdout:
  ratio: 0.2
  n_folds: 3
  quantiles: [0.05, 0.10, 0.15, 0.20, 0.80, 0.85, 0.90, 0.95]

# ── SHAP∩Gain 参数 ──
shap_gain:
  top_n: 5
  compute_interactions: true
