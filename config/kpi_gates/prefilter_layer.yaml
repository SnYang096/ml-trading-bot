layer: "prefilter"

# ================================================================
# Prefilter 层 KPI Gate — Meta-Algorithm 统计验证门槛
# ================================================================
#
# Prefilter 职责: 定义 archetype 语义边界 (数据空间可分性).
# 核心 KPI: KS 分布分离度 — pass/deny 两群体收益分布是否显著不同.
# 返回约束: pass 组自身期望收益 > 0 (pass组不必胜过全量均密, 只要正向即可).
#
# 脚本读取路径:
#   analyze_archetype_feature_stratification.py --meta-algorithm
# ================================================================

# ── 统计验证门槛 ──
thresholds:
  # KS Distribution Separation (primary KPI for scoring_method: ks)
  min_ks_statistic: 0.05
  max_ks_pvalue: 0.01

  # bad_rate_lift KPI (primary KPI for scoring_method: bad_rate_lift)
  # deny 组 bad_rate / 全量 bad_rate 倍数门槛
  # 意义: deny 区域坏交易集中度, 找语义边界 (早期有效模式)
  min_bad_rate_lift: 1.05
  # allow 组 mean_rr - deny 组 mean_rr 差值门槛 (bad_rate_lift 模式辅助约束)
  min_effect: 0.02

  # Return uplift: pass 组自身期望收益 > 0 (不与全量均密比较, 避免趋势市场导致門槛失效)
  # 实现: 代码内直接判断 mean_return_pass > 0, 本字段仅保留供参考
  min_return_uplift_soft: 0.0  # deprecated: 不再使用, 代码已改为 pass组>0判断

  # Hit rate uplift (disabled, kept for reference)
  min_hit_rate_uplift: -1.0

  # Robustness: time-fold KS 一致性 (0=全不一致, 1=全一致)
  min_robustness: 0.3

  # 相关性剪枝: deny_mask 相关性超过此值 → 去重
  correlation_threshold: 0.80

  # 最终规则数上限 (含语义规则在内的总数, 自动规则数 = max_rules - 语义规则数)
  max_rules: 4

  # Deny rate 合法范围 (在语义子集内算比例: 太小无意义, 太大误杀严重)
  # 注意: 分析脚本内部用 deny_mask 扫描, deny_rate = 排除比例
  # 对应 pass_rate = 1 - deny_rate
  deny_rate_min: 0.15  # 单条规则至少 deny 15%; deny < 15% 说明阈值在数据极端尾部
  deny_rate_max: 0.85  # 单条规则最多 deny 85% (对应 pass_rate >= 15%)

  # 通过率保底: 最少保留行数
  min_rows: 500

# ── LightGBM 训练参数 ──
lgb_params:
  num_leaves: 31
  learning_rate: 0.05
  min_child_samples: 50
  feature_fraction: 0.8
  bagging_fraction: 0.8
  bagging_freq: 5
  n_estimators: 200

# ── Holdout 验证参数 ──
holdout:
  ratio: 0.2
  n_folds: 3
  quantiles: [0.05, 0.10, 0.15, 0.20, 0.80, 0.85, 0.90, 0.95]

# ── SHAP∩Gain 参数 ──
shap_gain:
  top_n: 5
  compute_interactions: true
