layer: "router_counterfactual"

# These are *example* gates.
# Replace keys with actual metrics.json keys you care about.

hard_fail:
  # Router-level *legal* KPIs (do NOT use Sharpe here).
  # These keys exist in counterfactual metrics.json (see src/time_series_model/rl/counterfactual_eval_3action.py):
  router_diag__trade_rate: {min: 0.01, max: 0.40}
  # Mode entropy is a "collapse detector": too low => stuck in one mode; too high => random flipping.
  # For 3-action entropy, typical max is ~log(3)=1.0986
  rule_avg_mode_entropy: {min: 0.15, max: 1.05}
  # If present, Rule+PCM should not collapse (optional so older reports won't fail).
  rule_pcm_avg_mode_entropy: {min: 0.05, max: 1.05, optional: true}

warn:
  # Drawdown is execution/system-facing; keep as WARN here (hard-fail belongs to PCM/portfolio gate).
  rule_avg_max_dd: {min: 0.0, max: 0.35}
  mean_only_avg_max_dd: {min: 0.0, max: 0.35, optional: true}
  rule_pcm_avg_max_dd: {min: 0.0, max: 0.35, optional: true}

  # Portfolio-assets diagnostics (optional)
  pa__trend_zero_rate: {min: 0.0, max: 1.0, optional: true}
  pa__avg_weight__GLOBAL_CASH: {min: 0.05, max: 1.0, optional: true}
  # Mean system survivability (optional)
  mean_system__viable: {min: 1.0, max: 1.0, optional: true}

