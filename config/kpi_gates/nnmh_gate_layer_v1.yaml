layer: "gate_layer"

# KPI Gate for Gate Layer (Tree/Rules / PCM).
# Uses counterfactual metrics.json (rule_pcm_*).

hard_fail:
  # Gate should reduce tail loss; cap DD at a reasonable level.
  rule_pcm_avg_max_dd: {min: 0.0, max: 0.35}
  # Optional stability check if available.
  rule_pcm_avg_mode_entropy: {min: 0.10, max: 1.05, optional: true}

warn:
  # Soft alerts only; profitability is system-level.
  rule_pcm_avg_total_return: {min: -0.05, max: 0.50, optional: true}
  rule_pcm_avg_switch_rate: {min: 0.0, max: 0.50, optional: true}
