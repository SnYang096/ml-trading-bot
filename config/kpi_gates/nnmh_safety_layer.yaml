layer: "safety_layer"

# KPI Gate for Safety Layer (survival-first).
# Uses counterfactual metrics.json (rule_* / rule_pcm_* / rule_survival_*).
#
# Goal: never allow "tail-risk masked by mean returns".

hard_fail:
  # Core survival limits (fail-closed if missing unless optional).
  rule_pcm_avg_max_dd: {min: 0.0, max: 0.35}
  rule_avg_max_dd: {min: 0.0, max: 0.45}
  rule_survival_avg_max_dd: {min: 0.0, max: 0.35, optional: true}
  pred_avg_max_dd: {min: 0.0, max: 0.45, optional: true}
  mean_only_avg_max_dd: {min: 0.0, max: 0.45, optional: true}

warn:
  # Soft risk signals (optional if not present in older runs).
  rule_pcm_avg_total_return: {min: -0.10, max: 0.50, optional: true}
  rule_pcm_ann_vol_mean: {min: 0.0, max: 0.80, optional: true}

# 已完成的改动
# 新增安全层 gate 配置：config/kpi_gates/nnmh_safety_layer.yaml
# kpi_journal.py 会加载 MLBOT_KPI_SAFETY_YAML（默认指向上面文件）
# kpi_journal 的 pipeline 阶段会产出 Safety Layer 报告块
# 如何“加”安全 KPI
# 在 config/kpi_gates/nnmh_safety_layer.yaml 里定义安全阈值
# 当前默认使用：
# rule_pcm_avg_max_dd
# rule_avg_max_dd
# rule_survival_avg_max_dd（可选）
# pred_avg_max_dd（可选）
# mean_only_avg_max_dd（可选）
# 如需覆盖默认 gate，设置环境变量：
# MLBOT_KPI_SAFETY_YAML=/path/to/your/safety_gate.yaml
# 怎么用（触发检查）
# 生成 counterfactual metrics 后跑 KPI journal：
# kpi_journal 会读取 run_dir/e2e/counterfactual/metrics.json
# 在输出里新增 Safety Layer 表格
# 也可以手动跑 gate 检查：
# mlbot diagnose kpi-gate --metrics-json <metrics.json> --gate-yaml config/kpi_gates/nnmh_safety_layer.yaml
# 怎么测试（危险数据集划分）
# 建议把“危险集”分为 真实历史极端区间 + 合成压力场景：
# 1) 历史极端区间（真实市场）
# 高波动期（ATR/realized vol 分位数 > 90%）
# 深回撤区间（rolling max drawdown > 20%）
# 低流动性期（成交额或 orderflow 断崖式降低）
# 快速反转期（趋势段末尾 1–2 周）
# 2) 合成压力场景（灭绝测试）
# 成本翻倍/翻三倍：在回测/评估里把费率 & 滑点乘 2~3
# 流动性崩溃：把成交量或可执行比例乘 0.3
# 单次极端跳空：随机插入 -10% ~ -30% gap
# 连续止损冲击：把连续 3~5 次亏损区间拼接
# 统计尾部抽样：抽取历史收益最低 5% 的窗口作为测试集
# 灭绝测试（Extinction Test）建议规则
# 目标：在“最坏 5% 情况”也不系统性死亡
# 推荐指标（你可以直接写入 safety gate）：
# rule_pcm_avg_max_dd ≤ 0.35
# rule_avg_max_dd ≤ 0.45
# rule_survival_avg_max_dd ≤ 0.35（若有）
# 再加一个 “回撤持续时间” 的软阈值（如果有该指标）
# 如果你希望我把 Safety KPI gate 接入到更多命令（比如 CLI diagnose 或 task_spec），或补充一份 “危险数据集构造脚本模板”，我可以直接加。