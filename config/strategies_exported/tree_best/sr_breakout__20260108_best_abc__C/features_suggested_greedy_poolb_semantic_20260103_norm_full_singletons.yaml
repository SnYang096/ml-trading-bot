name: sr_breakout__suggested
description: 'SR breakout strategy focusing on breakout quality, momentum persistence,
  and liquidity void confirmation using WPT/Hilbert/Spectrum features.

  '
feature_pipeline:
  requested_features:
  - atr_f
  - poc_hal_features_close_f
  - sma_200_f
  - trade_cluster_absorption_scene_score
  ensure_signal_column:
    name: signal
    default_value: 0
  invert_features:
  - dtw_double_top_dist_w30
  - dtw_double_top_dist_w40
  - dtw_double_top_dist_w50
  - dtw_double_top_dist_w60
  - dtw_head_shoulder_bottom_inverse_dist_w60
  - dtw_head_shoulder_top_dist_w30
  - dtw_head_shoulder_top_dist_w40
  - dtw_min_dist_w40
  - dtw_min_dist_w50
  - dtw_min_dist_w60
  - dtw_random_15_dist_w60
  - dtw_random_20_dist_w50
  - liquidity_void_price_impact
  - liquidity_void_retracement
  - liquidity_void_speed
  - trade_cluster_max_buy_run
  - trade_cluster_max_buy_run_zscore_50
  - trade_cluster_max_run_ratio
  - trade_cluster_max_sell_run
  - trade_cluster_max_sell_run_zscore_20
  - trade_cluster_net_runs_ma10
  - trade_cluster_total_run_length
  - wpt_cvd_fluctuation
  - wpt_price_fluctuation
feature_group_search:
  base_strategy_dir: /workspaces/ml_trading_bot/config/strategies/sr_breakout
  objective: Sharpe_mean
  min_trades: 10
  seeds:
  - 1
  - 2
  - 3
  - 4
  - 5
  selected_groups:
  - poolb__sma_200_f
  - trade_cluster_scene__absorption
  stop_reason: no_improvement
  base_features:
  - atr_f
  - poc_hal_features_close_f
  final_features:
  - atr_f
  - poc_hal_features_close_f
  - sma_200_f
  - trade_cluster_absorption_scene_score
  groups_source: groups_yaml:auto:config/feature_groups_sr_breakout_semantic.yaml
  groups_yaml_auto: true
  pool_b_yaml: /workspaces/ml_trading_bot/results/pools/sr_breakout/pool_b/20260103_norm_full_singletons/features_pool_b.yaml
  pool_b_merged_singletons: true
  feature_blacklist: []
