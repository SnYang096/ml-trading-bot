name: compression_breakout__suggested
description: 'Compression breakout strategy combining compression strength, trigger,
  and direction confirmation signals across WPT/VPVR/Spectrum domains.

  '
feature_pipeline:
  exclude_columns:
  - atr
  requested_features:
  - compression_duration_f
  - atr_f
  - volume_ratio_f
  - liquidity_void_f
  - trend_r2_20_f
  ensure_signal_column:
    name: signal
    default_value: 0
  invert_features:
  - hurst_cvd_rolling
  - hurst_price_rolling
  - macd_signal
feature_group_search:
  base_strategy_dir: /workspaces/ml_trading_bot/config/strategies/compression_breakout
  objective: CV_mean
  min_trades: 10
  seeds:
  - 1
  - 2
  - 3
  selected_groups:
  - kline_core__volume_ratio_f__volume_ratio_f
  - poolb__liquidity_void_f
  - poolb__trend_r2_20_f
  stop_reason: completed
  base_features:
  - compression_duration_f
  - atr_f
  final_features:
  - compression_duration_f
  - atr_f
  - volume_ratio_f
  - liquidity_void_f
  - trend_r2_20_f
  groups_source: groups_yaml:/workspaces/ml_trading_bot/results/feature_group_search/compression_breakout_pipeline_poolb_semantic_20260108_best_abc_A/shortlist_groups_A.yaml
  groups_yaml_auto: false
  pool_b_yaml: /workspaces/ml_trading_bot/results/pools/compression_breakout/pool_b/20260108_best_abc/features_pool_b.yaml
  pool_b_merged_singletons: true
  feature_blacklist: []
