owner: "dev"
created_at: "2026-01-27"

universe:
  timeframe: "240T"
  symbols:
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
    - SOLUSDT
    - XRPUSDT
    - ADAUSDT
  # Optional metadata (for audit + scale control, NO runtime logic):
  # - `symbols` = the concrete universe used in THIS task run (actual truth, used by code)
  # - `universe_layer` = which "stage" this universe belongs to (U1/U2/U3)
  #   - U1: Core2 (BTCUSDT + 1 representative, e.g., ETHUSDT) - validate mainline pipeline
  #   - U2: HighCap6 (BTC/ETH/BNB/SOL/XRP/ADA) - feature convergence + cross-asset sanity
  #   - U3: Top9/Top10 - add symbols one-by-one and measure marginal contribution
  #   - Purpose: CI naming, report grouping, avoiding accidental "Top10+Tier3" runs
  # - `group_tag` = behavior group label (HighCap/Alt/Meme) for grouping ablations/reporting
  #   - HighCap: high liquidity, thicker orderbook, lower impact cost (baseline environment)
  #   - Alt: medium liquidity, narrative rotation, different volatility structure
  #   - Meme: stronger jumps, frequent volume spikes/gaps, higher slippage/impact
  #   - Purpose: report grouping, ablation analysis, human understanding
  # See: docs/guides/FEATURE_COMPLEXITY_LAYERS_CN.md for detailed universe layering strategy
  # See: docs/architecture/4H_TOKEN_UNIVERSE_GROUPS.md for HighCap/Alt/Meme grouping rationale
  universe_layer: "U2"  # U1|U2|U3 (optional, metadata only, NO runtime validation)
  group_tag: "HighCap"  # HighCap|Alt|Meme (optional, metadata only, NO runtime validation)

windows:
  # Optional default date ranges (used when CLI --start-date/--end-date are NOT provided):
  # - If CLI provides dates, CLI takes precedence (windows are ignored)
  # - If CLI omits dates, these windows are used as defaults
  # Usage by command:
  #   - nnmultihead train: uses windows.train (if --start-date/--end-date not provided)
  #   - nnmultihead predict/eval: uses windows.oos > windows.holdout > windows.train (if --start-date/--end-date not provided)
  #   - nnmultihead build-feature-store: uses windows.train (if --start-date/--end-date not provided)
  # See: src/cli/main.py for actual usage logic
  train:
    start: "2024-01-01"
    end: "2025-04-30"
  holdout:
    start: "2025-11-01"
    end: "2025-12-31"
    # frozen=true means: acceptance-only window (CI gate / promotion decision)
    # - This window is STRICTLY ISOLATED (no tuning allowed)
    # - No feature search / threshold tuning / parameter iteration allowed using this window
    # - If you break this rule, the experiment is no longer auditable
    # - Purpose: Final acceptance test, promotion decision, audit trail
    frozen: true
  oos:
    start: "2025-05-01"
    end: "2025-10-31"
    # Optional ad-hoc OOS (Out-of-Sample) window for post-hoc evaluation
    # - No frozen restriction (can be used for experimental evaluation)
    # - More flexible than holdout (can iterate/experiment on this window)
    # - Purpose: Post-hoc analysis, experimental evaluation, ad-hoc testing
    # Difference from holdout:
    #   - holdout: Strict acceptance-only (frozen), for final validation/audit
    #   - oos: Flexible evaluation window, for experimentation/analysis

enforcement:
  # Runtime enforcement contracts (injected into pipeline for validation):
  # - These are NOT optional metadata; they are ACTUALLY USED by code for validation
  # - Constitution: hard runtime constraints (kill-switch, slots, add-position policy)
  # - KPI Gate: performance metrics validation (hard_fail/warn thresholds for CI/acceptance)
  # See: docs/architecture/ARCH_UPGRADE_TASKSPEC_CONSTITUTION_V1_CN.md for detailed explanation
  constitution_yaml: "config/constitution/constitution.yaml"
  # Constitution (宪法): Non-negotiable runtime contract
  # - Kill-switch: daily/weekly/monthly loss limits, max_dd, max_turnover, max_cost
  # - Slots: low-freedom position structure (slot_count, risk_per_slot)
  # - Add-position policy: trend-only, max_add_times, require_locked_profit
  # - Execution whitelist: hard allow-list per regime
  # - Used by: ConstitutionExecutor.validate_drawdown(), reserve_slot(), etc.
  # - Purpose: Prevent system from violating survival constraints
  kpi_gate_yaml: ""
  # KPI Gate: Performance metrics validation (hard-fail CI gate)
  # - hard_fail: Metrics that cause CI to fail (e.g., trade_rate, mode_entropy, mismatch)
  # - warn: Metrics that trigger warnings (e.g., max_dd, switch_rate)
  # - Used by: scripts/rl_counterfactual_eval_3action.py for acceptance decision
  # - Purpose: Ensure system meets performance thresholds before promotion
  # - Note: Do NOT use Sharpe here (use router-level legal KPIs instead)

feature_plan_ref: "config/nnmultihead/path_primitives_4h_80h_min/feature_plan.yaml"

feature_plan_overrides:
  optional_blocks_enabled: []  # Auto-detected from execution_archetypes.yaml (volume_profile_block, vpin_block)

entrypoints:
  nnmultihead_predict: "scripts/predict_path_primitives_mlp.py"
  rule_mode_3action: "scripts/rule_mode_3action.py"
  rl_build_logs_3action: "scripts/rl_build_logs_3action.py"
  rl_counterfactual_eval_3action: "scripts/rl_counterfactual_eval_3action.py"
  cli_pipeline_3action_e2e: "src/cli/main.py (nnmultihead pipeline-3action-e2e)"

model_plan:
  kind: "nnmultihead_path_primitives"
  base_config_dir: "config/nnmultihead/path_primitives_4h_80h_min"
  device: "auto"
  training:
    epochs: 10
    batch_size: 512
    lr: 0.0002
    seed: 42
    emit_evidence_quantiles: true
    evidence_quantiles_keys: "vpin,cvd_change_5"
    evidence_quantiles_prefixes: ""
    evidence_quantiles: "0.1,0.5,0.9"
    evidence_quantiles_global: false
    warm_start:
      enabled: false
      init_model_path: null

