    batch_size: 512
    lr: 0.0002
    seed: 42
    emit_evidence_quantiles: true
    evidence_quantiles_keys: "vpin,cvd_change_5"
    evidence_quantiles_prefixes: ""
    evidence_quantiles: "0.1,0.5,0.9"
    evidence_quantiles_global: false
    warm_start:
      enabled: false
      init_model_path: null

