# Feature-group-search candidate groups for SR Reversal (regression mainline).
#
# Rationale:
# - `sr_reversal_rr_reg_long_mainline` already includes a kline+SR-distance base.
# - For efficient search, we only test incremental "semantic / scene semantic" blocks that
#   are plausibly reversal-friendly, plus a few context blocks.
#
groups:
  liquidity_void:
    - liquidity_void_f

  compression:
    - compression_score_f
    - compression_energy_f

  liquidity_void_scene:
    - liquidity_void_scene_semantic_scores_f

  vpin_scene:
    - vpin_scene_semantic_scores_f

  trade_cluster_scene:
    - trade_cluster_scene_semantic_scores_f

  wpt_scene:
    - wpt_scene_semantic_scores_f

  volume_profile_scene:
    - volume_profile_scene_semantic_scores_f

  wick_scene:
    - wick_scene_semantic_scores_f

  fp_scene:
    - fp_imbalance_scene_semantic_scores_f

  market_cap_norm:
    - market_cap_normalized_orderflow_f

  funding_scene:
    - funding_scene_semantic_scores_f

  # DTW 语义化场景组（新增）
  dtw_scene:
    - dtw_scene_semantic_scores_f
