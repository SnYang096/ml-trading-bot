# Feature-group-search candidate groups for Trend Following.
#
# Base strategy already includes trend-centric WPT/Hurst/Hilbert/Spectrum + some ticks blocks.
# We test incremental scene semantic blocks that may improve regime robustness.
groups:
  kline_core:
    - macd_f
    - rsi_f
    - trend_r2_20_f
    - bb_width_f
    - wick_ratios_f
    - volume_ratio_f

  trend_core:
    - trend_r2_50_f
    - slope_consistency_score_f
    - trend_volatility_alignment_f

  vpin_scene:
    - vpin_scene_semantic_scores_f

  liquidity_void_scene:
    - liquidity_void_scene_semantic_scores_f

  wpt_scene:
    - wpt_scene_semantic_scores_f

  volume_profile_scene:
    - volume_profile_scene_semantic_scores_f

  wick_scene:
    - wick_scene_semantic_scores_f

  trade_cluster_scene:
    - trade_cluster_scene_semantic_scores_f

  fp_scene:
    - fp_imbalance_scene_semantic_scores_f

  market_cap_norm:
    - market_cap_normalized_orderflow_f

  funding_scene:
    - funding_scene_semantic_scores_f


