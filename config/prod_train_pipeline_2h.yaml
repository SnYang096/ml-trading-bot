          min_trades_target: 55
          trade_penalty: 0.0025
          atr_lower_values: 0.45,0.55
          atr_upper_values: 0.88,0.92
          me_accel_abs_min_values: 0.10,0.14
          me_cvd_min_values: 0.55,0.65
          target_trades_min: 30
          target_trades_max: 200
          trade_penalty_low: 0.0022
          trade_penalty_high: 0.0013
          stability_penalty: 0.0
        scoring_method_fallbacks:
