# A1 — v6_ema_only × 6币 × 2024-07~2026-05 holdout（v4 smoke 之外的全部 holdout）
#
# 目的：把 BTC+ETH×2024H2 上 9 trade 的样本扩到 100+ trade，判断
#       「holdout 上 Mean R 全负」是 6-trade 噪声还是 true regime drift。
# 预计耗时：6 币 × 22 个月 ≈ 30-45 分钟。
#
# 跑法：
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260528_me_direction/me_direction_v6_holdout_grid.yaml --quiet-signal-logs

experiment_id: me_direction_v6_holdout_20260528
strategy: me
symbols:
  - BTCUSDT
  - ETHUSDT
  - BNBUSDT
  - ADAUSDT
  - SOLUSDT
  - XRPUSDT

runs:
  - variant: v6_ema_only_holdout_full
    strategies_root: config/experiments/20260528_me_direction/variants/me_direction_v6_ema_only_strategies
    start_date: "2024-07-01"
    end_date: "2026-05-01"
    output_dir: results/me/experiments/direction_holdout/v6_ema_only_full
