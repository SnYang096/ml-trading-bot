# CompressionBreakout — Prefilter v3: v2 + atr_percentile 放宽到 [0.55, 0.95]
#
# 数据诊断 (2026-05-28):
#   atr_percentile plateau (chop subset) 在 0.50-0.75 区间 succ 平稳；
#   prod [0.65, 0.92] 较窄，v3 放宽到 [0.55, 0.95] 看是否带来更多有效样本同时维持 R。

rules:
  - feature: atr_percentile
    operator: ">="
    value: 0.55
    locked: false
    lock_reason: "实验：放宽下界到 0.55"

  - feature: atr_percentile
    operator: "<="
    value: 0.95
    locked: false
    lock_reason: "实验：放宽上界到 0.95"

  - feature: recent_compression_decay
    operator: ">="
    value: 0.02
    locked: true
    lock_reason: "压缩突破：要求近期确实经历压缩释放"

  - feature: recent_compression_decay
    operator: "<="
    value: 0.20
    locked: true
    lock_reason: "压缩突破：限制在释放早段，避免中后段衰竭"

  - feature: oi_compression_score
    operator: "<="
    value: 0.10
    locked: false
    lock_reason: "实验：oi 拥挤度低位带（与 v2 一致）"

last_evaluation:
  timestamp: "2026-05-28"
  data_source: "results/train_final/me/train_final_20260519_133835_rr_extreme/me/features_labeled.parquet"
  n_rows: 59592
  notes: "v3 — v2 基础上放宽 atr_percentile 带宽；与 v1/v2 对照样本量与 R"
