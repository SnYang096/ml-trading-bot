# CRF execution — 震荡区边缘短打，ATR 风控，近端固定 R 止盈。
#
# 设计要点：
#   1. 2022-2026Q1 诊断：240 大盒 + 对边止盈不稳定；120 + edge_chop 短打更稳。
#   2. stop_loss / take_profit 用 ATR fixed：跨期 120 + edge_chop + ATR fixed 5/5 时期为正。
#   3. box_mid 作为 research 候选保留在诊断脚本中；生产先不用，因 2023 稳定性不足。
#   4. max_holding_bars 缩短：短打不等完整对边，迟迟不回归说明信号弱。
#   5. add_position 关闭：CRF 做的是"边缘吃回归"，加仓逻辑与趋势加仓矛盾

add_position:
  # CRF 不支持加仓：均值回归语义下，越走越远=失败，不应加码
  max_add_times: 0
  sizing_mode: fixed_multiplier
  add_size_multipliers: [1]
  inherit_parent_stop: true
  min_current_r_by_add: []
  min_current_r_unit: atr
  trigger:
    type: disabled

execution_constraints:
  allow_add_on: false
  min_order_interval_minutes: 15

holding:
  # 与 time_stop 二选一：time_stop_bars: 0 时仍用 max_holding_bars（事件回测/实盘公共生成器，见 generic_live_strategy.ExecutionParamGenerator）
  max_holding_bars: 60        # 2H 柱 60 根（wall-time 约 5 天；短打不等完整对边）
  time_stop_bars: 0           # 0=表示不由该字段主控；有 max 则采用 max

stop_loss:
  breakeven:
    enabled: false
    trigger_r: 2.0
    lock_level_r: 0.5
    measure: atr
  guardrails:
    max_stop_pct: 0.06
    min_stop_pct: 0.005
  initial_r: 1.5
  structural_exit: null         # 短打版主控 ATR stop；box 仅用于 target/方向
  trailing:
    enabled: false
    activation_r: 2.0
    trail_r: 1.0
  type: fixed                   # stop = initial_r × ATR；短打统计上比盒外止损更稳
  box_window: 120
  box_buffer_frac: 0.25

take_profit:
  enabled: true
  type: fixed                   # target = target_r × ATR；短打统计稳定性优于 box_mid
  target_r: 1.2
  box_window: 120
  edge_frac: 0.15
  partial:
    enabled: false              # partial 目前不参与通用 position_logic，避免配置误导
    first_tp_fraction: 0.5
    first_tp_r: 1.0              # 到对边中点前先落袋一半

version: 1
