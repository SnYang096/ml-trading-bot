# Chop grid prefilter — A1 combined: low stability + pos480 range
# Combines Phase 1 IC scan findings for A1 and A1b

rules:
  - feature: box_pos_60
    operator: ">="
    value: 0.40
    locked: true
    lock_reason: chop_grid box_pos_60 lower bound (OOS stack ablation 2026-06-04)
  - feature: box_pos_60
    operator: <=
    value: 0.60
    locked: true
    lock_reason: chop_grid box_pos_60 upper bound (OOS stack ablation 2026-06-04)

  # A1: low stability filter
  - feature: box_stability_240
    operator: <
    value: 0.40
    rationale: "IC@1=-0.040, Q1(low) mean_rr=+0.60 vs Q4(high)=-0.46."

  # A1b: box_pos_480 range
  - feature: box_pos_480
    operator: ">="
    value: 0.30
    rationale: "IC@1=+0.027 for box_pos_480."
  - feature: box_pos_480
    operator: <=
    value: 0.70
    rationale: "IC@1=+0.027 for box_pos_480."
