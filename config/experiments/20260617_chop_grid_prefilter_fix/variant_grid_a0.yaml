# A0: chop_grid 基线回测 — P0 prefilter fix 验证
#
# 直接调用 backtest_multileg_timeline.py（--no-trend）测试 chop_grid 独立表现。
# P0 fix: _lookup 现在传递完整 box windowed 列（与 live 一致）。
#
# Run:
#   bash config/experiments/20260617_chop_grid_prefilter_fix/run_a0_baseline.sh

engine: multileg_joint
experiment_id: chop_grid_prefilter_fix_a0_baseline_20260617

chop_config: config/experiments/20260617_chop_grid_prefilter_fix/variants/baseline/meta.yaml
# trend_config required by multileg_joint but unused (--no-trend)
trend_config: config/experiments/20260613_multileg_sizing_validate/variants/trend_prod/meta.yaml

symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - XRPUSDT

timeframe: 2h
execution_timeframe: 1min
initial_capital: 10000
equity: 10000

market_segment_path: config/market_segment.yaml
constitution_yaml: live/highcap/config/constitution/constitution.yaml

segments:
  - bear_2022
  - bull_2023_2024
  - recent_range_to_bear
  - recent_6m_oos

output_dir: results/chop_grid/experiments/prefilter_fix_20260617/a0_baseline
