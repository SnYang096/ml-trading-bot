# MSR strategy-level execution (fallback for any runner that reads top-level execution.yaml)
# archetype-specific execution lives in archetypes/execution.yaml (权威)

version: 1

execution_constraints:
  allow_add_on: false
  min_order_interval_minutes: 30

stop_loss:
  type: fixed
  initial_r: 1.2

take_profit:
  enabled: true
  target_r: 3.0

holding:
  max_holding_bars: null
  time_stop_bars: 60
