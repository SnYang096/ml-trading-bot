# E1_bull_or — E1 depth 带 + E2_or entry（gate 无 PE）
# E2_or — vol>=0.45 OR delta>=0.15（两条 filter，combination_mode: or）
# 同一 filter 内 conditions 仍为 AND；并联 OR 靠多个 enabled filter 实现

filters:
- id: tpc_long_absorption_follow_trend
  enabled: false
  description: prod entry（实验替换）
  conditions:
  - feature: tpc_cvd_absorption
    operator: '>='
    value: 0.629
  - feature: tpc_recovery_strength
    operator: '>='
    value: 0.039
- id: tpc_short_absorption_follow_trend
  enabled: false
  description: prod entry（实验替换）
  conditions:
  - feature: tpc_cvd_absorption
    operator: '>='
    value: 0.629
  - feature: tpc_recovery_strength
    operator: '>='
    value: 0.039
- id: tpc_deep_pullback_vol_confirm
  enabled: true
  description: 缩量回踩确认（量能维度）
  conditions:
  - feature: tpc_vol_pullback_confirm
    operator: '>='
    value: 0.45
  tier: EXPERIMENT
- id: tpc_deep_pullback_delta_absorb
  enabled: true
  description: 回踩段 delta 吸收（订单流维度）
  conditions:
  - feature: bpc_pullback_delta_absorption
    operator: '>='
    value: 0.15
  tier: EXPERIMENT
combination_mode: or
