# TPC「深回撤 + 吸收」离线证明（Phase 1）
#
# Phase 0 parquet（6 币 2023-01-01 → 2026-04-01）跑完后，把下方 PARQUET 换成新 RUN_ID 路径。
# 默认沿用最近 train_final（与 bull 段重叠；holdout recent 另跑 calendar_window 时可加 scan）。
#
# 跑法:
#   PYTHONPATH=src:scripts python scripts/rd_loop.py \
#     --hypothesis-yaml config/experiments/20260530_tpc_deep_pullback/rd_loop_tpc_deep_pullback.yaml
#
# Phase 0 示例:
#   RUN_ID=train_final_tpc_deep_$(date +%Y%m%d_%H%M%S)
#   mlbot train final --no-docker --prepare-only \
#     -c config/strategies/tpc -t 120T \
#     --symbol BTCUSDT,ETHUSDT,BNBUSDT,ADAUSDT,SOLUSDT,XRPUSDT \
#     --start-date 2023-01-01 --end-date 2026-04-01 \
#     --output-root results/train_final/tpc/${RUN_ID}

topic: tpc_deep_pullback
strategy: tpc
output_dir: results/rd_loop/tpc_deep_pullback

# 替换为 Phase 0 产出；当前为占位（可先做 smoke scan）
features_parquet: &parquet results/train_final/tpc/train_final_20260523_122438_rr_extreme/tpc/features_labeled.parquet

bull_filter: &bull_filter
  - ema_1200_position>=0.10
  - tpc_semantic_chop<=0.40

quick_layer_scans:
  # H1：深回踩 plateau（bull long 诊断）
  - mode: feature-plateau
    features_parquet: *parquet
    label: success_no_rr_extreme
    layer: prefilter
    feature: tpc_pullback_depth
    operator: ">="
    grid: "0.15,0.25,0.35,0.45,0.55,0.65"
    filter: *bull_filter
    out: quick_scan/depth_plateau.md

  # H2：反延续（划界 BPC）
  - mode: feature-plateau
    features_parquet: *parquet
    label: success_no_rr_extreme
    feature: path_efficiency_pct
    operator: "<="
    grid: "0.35,0.45,0.55,0.65,0.75"
    filter: *bull_filter
    out: quick_scan/pe_plateau.md

  # H3：深吸收 vs prod entry
  - mode: condition-set
    features_parquet: *parquet
    label: success_no_rr_extreme
    filter: *bull_filter
    condition:
      - "deep_absorb: tpc_pullback_depth>=0.35 AND tpc_cvd_absorption>=0.85 AND tpc_vol_pullback_confirm>=0.5 AND path_efficiency_pct<=0.55"
      - "prod_entry: tpc_cvd_absorption>=0.629 AND tpc_recovery_strength>=0.039"
    out: quick_scan/entry_compare.md

  # H1/H2/H3 符号一致性
  - mode: ic-decay
    features_parquet: *parquet
    label: success_no_rr_extreme
    features: >-
      tpc_pullback_depth,path_efficiency_pct,tpc_cvd_absorption,tpc_vol_pullback_confirm,
      tpc_score_pullback,tpc_score_continuation,bpc_pullback_delta_absorption
    horizons: "1,3,6,12,24"
    target: forward_rr
    filter: *bull_filter
    out: quick_scan/ic_decay.md

  # short 对称（bear side）
  - mode: feature-plateau
    features_parquet: *parquet
    label: success_no_rr_extreme
    layer: prefilter
    feature: tpc_pullback_depth
    operator: ">="
    grid: "0.15,0.25,0.35,0.45,0.55,0.65"
    filter:
      - ema_1200_position<=-0.10
      - tpc_semantic_chop<=0.40
    out: quick_scan/depth_plateau_short.md

# Phase 3 建好 E0–E5 树后再取消注释
# variant_grid: config/experiments/20260530_tpc_deep_pullback/tpc_deep_pullback_ablation_grid.yaml

decision_doc:
  topic: tpc_deep_pullback
  topic_template: default
  experiment_index: results/tpc/experiments/EXPERIMENT_INDEX.json
  out: decision_doc_skeleton.md
