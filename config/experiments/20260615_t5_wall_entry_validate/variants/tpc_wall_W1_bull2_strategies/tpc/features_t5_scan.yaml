# TPC × T5 Phase 1 scan — minimal feature set (BTC/ETH IC + label scan)
name: tpc_t5_scan
description: |
  T5β liquidation proxy + T5α wall features + TPC pullback/regime context.

feature_pipeline:
  exclude_columns:
    - atr
  requested_features:
    - atr_f
    - atr_percentile_f
    - oi_features_f
    - oi_scene_semantic_scores_f
    - funding_rate_features_f
    - funding_oi_crowding_f
    - liquidation_cluster_proxy_f
    - wall_features_f
    - tpc_soft_phase_f
    - ema_1200_value_f
    - ema_1200_position_f
  ensure_signal_column:
    name: signal
    default_value: 0
