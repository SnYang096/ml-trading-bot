version: 1
name: Constitution_v1
created_at: '2026-01-12'
kill_switch:
  enabled: true
  daily_loss_limit: 0.06
  weekly_loss_limit: 0.08
  monthly_loss_limit: 0.12
  monthly_soft_loss_limit: 0.08
  derated_risk_per_slot: 0.005
  cooldown_minutes: 720
  daily_reset_timezone: UTC
  max_dd: 0.2
  max_turnover_mean: 0.35
  max_turnover_p95: 1.0
  max_cost_mean: 0.002
  max_cost_p95: 0.01
  kill_on_any_hard_violation: true
safety_state:
  persist_to: data/order_management.db
slots:
  enabled: true
  slot_count: 10
  risk_per_slot: 0.01
  allow_replacement: true
  evidence_min_score: 0.0
  evidence_position_scale: true
  slot_state_tracking:
    persist_to: data/order_management.db
resource_allocation:
  enabled_archetypes:
  - tpc
  slot_policy:
    trend_group: trend
    min_trend_slots_per_symbol: 1
    max_trend_slots_per_symbol: 1
    trend_pool_guard:
      enabled: true
      max_unprotected_symbols: 1
      unlock_on: breakeven_locked
      max_symbols_after_unlock: 3
      symbol_correlation_guard:
        enabled: true
        threshold: 0.8
        same_direction_only: true
        pairs:
          BTCUSDT:
            ETHUSDT: 0.9
            SOLUSDT: 0.85
            BNBUSDT: 0.82
          ETHUSDT:
            SOLUSDT: 0.88
            BNBUSDT: 0.84
          SOLUSDT:
            BNBUSDT: 0.82
  account_risk_limits:
    enabled: true
    max_gross_leverage: 3.0
    margin_stress_leverage: 5.0
    max_projected_initial_margin_pct: 0.65
    min_projected_available_margin_pct: 0.3
    fail_closed: true
  per_strategy_limits:
    tpc:
      max_risk_per_trade: 0.01
      allow_add_position: true
      max_add_times: 3
      require_locked_profit: true
multi_leg:
  strategies:
  - chop_grid
  - trend_scalp
  sizing:
    chop_grid:
      segment_dd_target: 0.072
      max_loss_per_grid: 0.03
      max_levels_per_side: 3
    trend_scalp:
      segment_dd_target: 0.072
      max_loss_per_segment: 0.02
      max_gross_exposure_units: 4
  account:
    equity_usdt: 500
    max_drawdown_pct: 0.2
  account_risk_limits:
    enabled: true
    max_gross_leverage: 3.0
    margin_stress_leverage: 5.0
    max_projected_initial_margin_pct: 0.65
    min_projected_available_margin_pct: 0.3
    fail_closed: true
  risk_limits:
    max_gross_notional_pct: 1.4
    max_net_notional_pct: 0.85
    max_symbol_gross_notional_pct: 1.3
    max_symbol_net_notional_pct: 0.45
    max_concurrent_multi_leg_symbols: 6
    max_resting_orders: 60
spot:
  strategies:
  - spot_accum_simple
  account:
    account_label: spot_accum
    equity_source: remote_live_account
    equity_usdt: 12500
  accumulation:
    target_deploy_pct: 1.0
    min_order_interval_minutes: 360
    symbol_budgets_usdt:
      BTCUSDT: 5000.0
      BNBUSDT: 2500.0
      SOLUSDT: 2500.0
      ETHUSDT: 2500.0
    tranches_per_symbol: 20
    symbol_unit_notional_usdt:
      BTCUSDT: 250.0
      BNBUSDT: 125.0
      SOLUSDT: 125.0
      ETHUSDT: 125.0
  strategy_limits:
    spot_accum_simple:
      allow_add_position: false
      require_locked_profit: false
      max_new_entries_per_day: 1
  risk_limits:
    max_gross_notional_pct: 1.0
    max_daily_deploy_pct: 1.0
    max_resting_orders: 12
