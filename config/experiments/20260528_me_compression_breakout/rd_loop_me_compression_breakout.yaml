# CompressionBreakout（slug me）— 压缩突破 vs 动量延续 + prefilter 瓶颈扫描
#
# 工具复用（不新增脚本）：
#   - condition-set + label=success_no_rr_extreme → 置信度（好单率 Δpp + |z|）
#   - condition-set + label=forward_rr           → R 质量（每 bar 平均 R）
#   - feature-plateau + label=success/forward_rr → 阈值 plateau
#   - ic-decay                                   → 特征 × horizon Spearman IC
#   - event_backtest --variant-grid              → total_r / maxDD / Sharpe（最终判据）
#
# Parquet（gate 标签，59592 行）:
#   results/train_final/me/train_final_20260519_133835_rr_extreme/me/features_labeled.parquet
#
# 跑法:
#   PYTHONPATH=src:scripts python scripts/rd_loop.py \
#     --hypothesis-yaml config/experiments/20260528_me_compression_breakout/rd_loop_me_compression_breakout.yaml

topic: me_compression_breakout_layers
strategy: me
output_dir: results/rd_loop/me_compression_breakout

parquet: &me_pq results/train_final/me/train_final_20260519_133835_rr_extreme/me/features_labeled.parquet
chop_filter: &chop tpc_semantic_chop<=0.40
hypotheses: &hypos
  - "locked_prefilter: atr_percentile>=0.65 AND atr_percentile<=0.92 AND recent_compression_decay>=0.02 AND recent_compression_decay<=0.20 AND compression_duration>=0.05 AND oi_compression_score>=0.45"
  - "compression_core: recent_compression_decay>=0.02 AND compression_duration>=0.05 AND oi_compression_score>=0.35"
  - "compression_loose: recent_compression_decay>=0.01 AND compression_duration>=0.03"
  - "momentum_accel_hi: me_accel_5k>=0.5"
  - "momentum_accel_lo: me_accel_5k<=-0.5"
  - "momentum_macd_pos: macd_atr>0"
  - "momentum_macd_neg: macd_atr<0"
  - "compression_not_high_accel: recent_compression_decay>=0.02 AND compression_duration>=0.05 AND me_accel_5k>-0.3 AND me_accel_5k<0.3"

quick_layer_scans:
  # ── 1a) 置信度：success_no_rr_extreme（好单率 Δpp / |z|）──
  - mode: condition-set
    features_parquet: *me_pq
    label: success_no_rr_extreme
    filter:
      - *chop
    condition: *hypos
    out: quick_scan/hypothesis_confidence_success.md

  # ── 1b) R 质量：forward_rr（每 bar 平均 R）──
  # condition-set 用 forward_rr 作 label 时 succ_in 列即 mean R per bar；用于回答
  # 「压缩突破 vs 动量」哪个 mean R 更高（与笔数无关）。
  - mode: condition-set
    features_parquet: *me_pq
    label: forward_rr
    filter:
      - *chop
    condition: *hypos
    out: quick_scan/hypothesis_quality_forward_rr.md

  # ── 2) IC（forward_rr = R 质量，非笔数）──
  - mode: ic-decay
    features_parquet: *me_pq
    target: forward_rr
    features: recent_compression_decay,compression_duration,oi_compression_score,atr_percentile,me_accel_5k,me_accel_persistence,macd_atr,roc_5,roc_10,me_soft_phase
    horizons: "1,3,5,10,20,50"
    filter:
      - *chop
    out: quick_scan/ic_prefilter_momentum.md

  - mode: ic-decay
    features_parquet: *me_pq
    target: forward_rr
    features: ema_1200_position,ema_1200_slope_10
    horizons: "1,3,5,10,20"
    filter:
      - *chop
    out: quick_scan/ic_regime_ema.md

  # ── 3) Prefilter plateau（当前瓶颈；扫松阈值）──
  - mode: feature-plateau
    features_parquet: *me_pq
    label: success_no_rr_extreme
    feature: atr_percentile
    operator: ">="
    grid: "0.50,0.55,0.60,0.65,0.70,0.75"
    filter:
      - *chop
    out: quick_scan/prefilter_atr_percentile.md

  - mode: feature-plateau
    features_parquet: *me_pq
    label: success_no_rr_extreme
    feature: atr_percentile
    operator: "<="
    grid: "0.85,0.88,0.92,0.95,0.98"
    filter:
      - *chop
    out: quick_scan/prefilter_atr_percentile_upper.md

  - mode: feature-plateau
    features_parquet: *me_pq
    label: success_no_rr_extreme
    feature: recent_compression_decay
    operator: ">="
    grid: "0.005,0.01,0.015,0.02,0.03,0.05"
    filter:
      - *chop
    out: quick_scan/prefilter_compression_decay_lower.md

  - mode: feature-plateau
    features_parquet: *me_pq
    label: success_no_rr_extreme
    feature: recent_compression_decay
    operator: "<="
    grid: "0.10,0.15,0.20,0.25,0.30"
    filter:
      - *chop
    out: quick_scan/prefilter_compression_decay_upper.md

  - mode: feature-plateau
    features_parquet: *me_pq
    label: success_no_rr_extreme
    feature: compression_duration
    operator: ">="
    grid: "0.02,0.03,0.05,0.08,0.10"
    filter:
      - *chop
    out: quick_scan/prefilter_compression_duration.md

  - mode: feature-plateau
    features_parquet: *me_pq
    label: success_no_rr_extreme
    feature: oi_compression_score
    operator: ">="
    grid: "0.30,0.35,0.40,0.45,0.50,0.55"
    filter:
      - *chop
    out: quick_scan/prefilter_oi_compression.md

  # forward_rr plateau（质量，非 success 笔数）— 三个 prefilter 锚都扫一遍
  - mode: feature-plateau
    features_parquet: *me_pq
    label: forward_rr
    feature: recent_compression_decay
    operator: ">="
    grid: "0.005,0.01,0.02,0.03,0.05"
    filter:
      - *chop
    out: quick_scan/prefilter_decay_forward_rr.md

  - mode: feature-plateau
    features_parquet: *me_pq
    label: forward_rr
    feature: atr_percentile
    operator: ">="
    grid: "0.50,0.55,0.60,0.65,0.70,0.75"
    filter:
      - *chop
    out: quick_scan/prefilter_atr_forward_rr.md

  - mode: feature-plateau
    features_parquet: *me_pq
    label: forward_rr
    feature: oi_compression_score
    operator: ">="
    grid: "0.30,0.35,0.40,0.45,0.50,0.55"
    filter:
      - *chop
    out: quick_scan/prefilter_oi_forward_rr.md

variant_grid: config/experiments/20260528_me_compression_breakout/me_regime_no_box_grid.yaml

decision_doc:
  topic: me_compression_breakout_regime
  topic_template: default
  experiment_index: results/me/experiments/EXPERIMENT_INDEX.json
  out: decision_doc_skeleton.md
