# TPC Regime — 慢变量宏观带（EMA1200）+ 多空掩码
# 20260522：去掉 chop∧box（离线 AND pass≈9%、effect -1.72%）；仅用 EMA1200 离开中轴死区。
# 详见 docs/strategy/regime_layer.md
#
# NOTE: allowed_regimes (bull/bear/neutral) 仍为 schema 占位，运行时未接线；
#       分桶诊断见 regime_ablation_report.py 的 ema_1200_position 阈值。

allowed_regimes:
  - bull
  - bear
  - neutral

allowed_sides:
  - long
  - short

rules:
  # EMA1200 相对位置：|pos| > inner → 允许交易（不区分多空，只挡贴中轴震荡带）
  # 2h × 1200 bar ≈ 100 日级慢均线；仓库暂无 ema_2000_* 列，勿与 2000 混称。
  # 阈值 0.10：train_final_20260522 预测集 ablation |pos|>0.10 effect +0.91% p≈0.004（优于 0.03）
  - any_of:
      - feature: ema_1200_position
        operator: ">="
        value: 0.10
      - feature: ema_1200_position
        operator: "<="
        value: -0.10
    rationale: 离开 EMA1200 中轴死区 — 宏观 regime，不绑定多空
    locked: true
    lock_reason: Regime 慢变量 — EMA1200 宏观带（TPC 专用，替代原 chop+box）

last_calibration:
  timestamp: null
  data_source: null
  plateau_overlap: null
  notes: |
    20260522 迁移：移除 tpc_semantic_chop 与 box_pos_120/breakout 规则。
    chop 上限在 gate.yaml gate_tpc_semantic_chop_high（value_gt 0.40），不在 regime。
