# BPC entry 层 R&D（对标 TPC 实验 E 流程；gate/regime/prefilter 不动）
#
# Step 1: 本文件 quick_layer_scan
# Step 2: event_backtest --variant-grid config/experiments/20260527_bpc_entry_v2/bpc_entry_v2_grid.yaml
# Step 3: 人审 promote 前写 docs/decisions/bpc_entry_v2_*.md
#
# Parquet: results/train_final/bpc/train_final_20260519_123251_rr_extreme/bpc/features_labeled.parquet

topic: bpc_entry_validation
strategy: bpc
output_dir: results/rd_loop/bpc_entry

quick_layer_scans:
  # ── 生产 entry 锚（对照）──
  - mode: condition-set
    features_parquet: results/train_final/bpc/train_final_20260519_123251_rr_extreme/bpc/features_labeled.parquet
    label: success_no_rr_extreme
    filter:
      - tpc_semantic_chop<=0.40
    condition:
      - "prod_entry: bpc_cvd_absorption>=1.0 AND bpc_recovery_strength>=0.25"
    out: quick_scan/entry_baseline_condition.md

  - mode: feature-plateau
    features_parquet: results/train_final/bpc/train_final_20260519_123251_rr_extreme/bpc/features_labeled.parquet
    label: success_no_rr_extreme
    feature: bpc_cvd_absorption
    operator: ">="
    grid: "0.5,0.8,1.0,1.2,1.5"
    filter:
      - tpc_semantic_chop<=0.40
    out: quick_scan/entry_cvd_absorption_plateau.md

  # ── v2 候选（TPC E 结构：压缩 + 低 vol ratio）──
  - mode: feature-plateau
    features_parquet: results/train_final/bpc/train_final_20260519_123251_rr_extreme/bpc/features_labeled.parquet
    label: success_no_rr_extreme
    feature: bpc_vol_compression
    operator: ">="
    grid: "0.3,0.5,0.7,0.8,0.9"
    filter:
      - tpc_semantic_chop<=0.40
    out: quick_scan/entry_vol_compression_plateau.md

  - mode: feature-plateau
    features_parquet: results/train_final/bpc/train_final_20260519_123251_rr_extreme/bpc/features_labeled.parquet
    label: success_no_rr_extreme
    feature: bpc_vol_ratio
    operator: "<="
    grid: "0.8,1.0,1.08,1.2,1.5"
    filter:
      - tpc_semantic_chop<=0.40
    out: quick_scan/entry_vol_ratio_plateau.md

  - mode: condition-set
    features_parquet: results/train_final/bpc/train_final_20260519_123251_rr_extreme/bpc/features_labeled.parquet
    label: success_no_rr_extreme
    filter:
      - tpc_semantic_chop<=0.40
    condition:
      - "v2_combo: bpc_vol_compression>=0.5 AND bpc_vol_ratio<=1.08"
      - "v2_vp: vp_absorption_score<=0.11"
    out: quick_scan/entry_v2_conditions.md

  # ── IC（解释 label 与 R 是否分歧）──
  - mode: ic-decay
    features_parquet: results/train_final/bpc/train_final_20260519_123251_rr_extreme/bpc/features_labeled.parquet
    target: forward_rr
    features: bpc_cvd_absorption,bpc_recovery_strength,bpc_vol_compression,bpc_vol_ratio,vp_absorption_score
    horizons: "1,3,5,10,20"
    out: quick_scan/entry_ic_decay.md

variant_grid: config/experiments/20260527_bpc_entry_v2/bpc_entry_v2_grid.yaml

decision_doc:
  topic: bpc_entry_v2
  topic_template: default
  experiment_index: results/bpc/experiments/EXPERIMENT_INDEX.json
  out: decision_doc_skeleton.md
