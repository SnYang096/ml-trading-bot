# BPC Regime — 慢变量：chop 上限 + EMA1200 宏观带（对齐 TPC 思路，去掉 box）
#
# 20260527：移除 box_pos_120 / box_breakout_*（旧 parquet 无列、且为 TPC 历史结论迁移；
#   BPC 改测 EMA1200 位置 + 斜率，见 config_experiments/bpc_ema_plus_slope_strategies）。
# 离线 rd_loop（20260527）：BPC 在 |ema|>=0.10 上 label 与 TPC 相反（bull -5.7pp / bear +3.3pp）；
#   仍须 event_backtest 看 R-multiple 再 promote；斜率变体见 regime grid。
#
# 分工：
#   - regime.yaml   ：chop + EMA1200 离开中轴死区
#   - prefilter.yaml：BPC breakout / pullback / recovery 语义锚
#   - gate.yaml     ：vol / vpin 硬 veto

allowed_regimes:
  - bull
  - bear
  - neutral

allowed_sides:
  - long
  - short

rules:
  # Chop 上限（BPC gate 无 chop 规则，保留在 regime）
  - feature: tpc_semantic_chop
    operator: "<="
    value: 0.40
    locked: true
    lock_reason: Regime 慢变量 — 高 chop 不交易（与 TPC gate chop 口径一致）

  # EMA1200：离开中轴死区（与 TPC regime 同阈值 0.10）
  # train_final_20260522 TPC ablation：|pos|>0.10 优于 0.03；BPC 需单独双段 backtest 验证。
  - any_of:
      - feature: ema_1200_position
        operator: ">="
        value: 0.10
      - feature: ema_1200_position
        operator: "<="
        value: -0.10
    rationale: 离开 EMA1200 中轴死区 — 宏观 regime，不绑定多空
    locked: true
    lock_reason: Regime 慢变量 — EMA1200 宏观带（替代 box_pos_120 规则）

last_calibration:
  timestamp: null
  data_source: null
  plateau_overlap: null
  notes: |
    20260527：删除 box 边缘/突破 any_of；新增 EMA1200 |pos|>=0.10 带。
    斜率实验（|ema_1200_slope_10|>=0.002）仅在 bpc_ema_plus_slope_strategies，待 R 验证。
