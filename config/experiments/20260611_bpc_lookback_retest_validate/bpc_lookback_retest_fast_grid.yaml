# BPC lookback 120/240 + box-retest — fast 模式重跑（2026-06-11）
#
# 持仓更新用策略主周期 bar；R&D 筛 variant 用，promote 前建议再跑非 fast 对照。
#
# 跑法：
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260611_bpc_lookback_retest_validate/bpc_lookback_retest_fast_grid.yaml \
#     --quiet-signal-logs

experiment_id: bpc_lookback_retest_fast_20260611
decision_doc: config/experiments/20260611_bpc_lookback_retest_validate/DECISION.md
strategy: bpc
market_segment_path: config/market_segment.yaml
data_path: data/parquet_data
fast: true
trading_map: true
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - XRPUSDT
  - ADAUSDT

segment_matrix:
  segments:
    - bear_2022
    - bull_2023_2024
    - recent_range_to_bear
  variants:
    - suffix: B0_prod
      strategies_root: config/strategies
      output_dir: results/bpc/experiments/lookback_retest_fast_20260611/B0_prod

    - suffix: B0_retest
      strategies_root: config/experiments/20260611_bpc_lookback_retest_validate/variants/bpc_lb20_retest_strategies
      output_dir: results/bpc/experiments/lookback_retest_fast_20260611/B0_retest

    - suffix: B_L120
      strategies_root: config/experiments/20260611_bpc_lookback_retest_validate/variants/bpc_lb120_strategies
      output_dir: results/bpc/experiments/lookback_retest_fast_20260611/B_L120

    - suffix: B_L240
      strategies_root: config/experiments/20260611_bpc_lookback_retest_validate/variants/bpc_lb240_strategies
      output_dir: results/bpc/experiments/lookback_retest_fast_20260611/B_L240

    - suffix: B_L120_retest
      strategies_root: config/experiments/20260611_bpc_lookback_retest_validate/variants/bpc_lb120_retest_strategies
      output_dir: results/bpc/experiments/lookback_retest_fast_20260611/B_L120_retest
