# BPC lookback 120/240 + box-retest 反追高（2026-06-11）
#
# 变体树：config_experiments/bpc_lb*_strategies/（静态 feature_dependencies + prefilter）
#
# 跑法：
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260611_bpc_lookback_retest_validate/bpc_lookback_retest_grid.yaml \
#     --quiet-signal-logs

experiment_id: bpc_lookback_retest_validate_20260611
decision_doc: config/experiments/20260611_bpc_lookback_retest_validate/DECISION.md
strategy: bpc
market_segment_path: config/market_segment.yaml
data_path: data/parquet_data
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - XRPUSDT
  - ADAUSDT

segment_matrix:
  segments:
    - bear_2022
    - bull_2023_2024
    - recent_range_to_bear
  variants:
    - suffix: B0_prod
      strategies_root: config/strategies
      output_dir: results/bpc/experiments/lookback_retest_20260611/B0_prod

    - suffix: B_L120
      strategies_root: config_experiments/bpc_lb120_strategies
      output_dir: results/bpc/experiments/lookback_retest_20260611/B_L120

    - suffix: B_L240
      strategies_root: config_experiments/bpc_lb240_strategies
      output_dir: results/bpc/experiments/lookback_retest_20260611/B_L240

    - suffix: B_L120_retest
      strategies_root: config_experiments/bpc_lb120_retest_strategies
      output_dir: results/bpc/experiments/lookback_retest_20260611/B_L120_retest
