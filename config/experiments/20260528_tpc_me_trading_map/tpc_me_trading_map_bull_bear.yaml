# TPC / ME prod 交易地图 — 牛市 vs 熊市段（人工审开仓位置）
#
# bull_2024: 2024-01~2025-01（仓库标准牛市窗）
# bear_2025H1: 2025-01~2025-07（BTC 高位震荡/回落段，ME/TPC 多段回测偏弱）
#
# 跑法:
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260528_tpc_me_trading_map/tpc_me_trading_map_bull_bear.yaml

experiment_id: tpc_me_trading_map_bull_bear_20260528
trading_map: true
symbols:
  - BTCUSDT
  - ETHUSDT
  - BNBUSDT
  - ADAUSDT
  - SOLUSDT
  - XRPUSDT

runs:
  - variant: tpc_prod_bull_2024
    strategy: tpc
    strategies_root: config/strategies
    start_date: "2024-01-01"
    end_date: "2025-01-01"
    output_dir: results/strategy_maps/tpc_prod_bull_2024

  - variant: tpc_prod_bear_2025H1
    strategy: tpc
    strategies_root: config/strategies
    start_date: "2025-01-01"
    end_date: "2025-07-01"
    output_dir: results/strategy_maps/tpc_prod_bear_2025H1

  - variant: me_prod_bull_2024
    strategy: me
    strategies_root: config/strategies
    start_date: "2024-01-01"
    end_date: "2025-01-01"
    output_dir: results/strategy_maps/me_prod_bull_2024

  - variant: me_prod_bear_2025H1
    strategy: me
    strategies_root: config/strategies
    start_date: "2025-01-01"
    end_date: "2025-07-01"
    output_dir: results/strategy_maps/me_prod_bear_2025H1

  - variant: me_prod_holdout_full
    strategy: me
    strategies_root: config/strategies
    start_date: "2024-07-01"
    end_date: "2026-05-01"
    output_dir: results/strategy_maps/me_prod_holdout_full

  - variant: tpc_prod_recent
    strategy: tpc
    strategies_root: config/strategies
    start_date: "2025-04-01"
    end_date: "2026-04-01"
    output_dir: results/strategy_maps/tpc_prod_recent
