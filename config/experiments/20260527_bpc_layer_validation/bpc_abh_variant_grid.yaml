# BPC ABH + no_breakout — 六币双段（与 TPC gate_vol ABH 同日期）
#
#   A = config/strategies（生产 baseline，vol gates 全开）
#   B = bpc_B_vol_off_strategies（vol_persistence + vol_leverage_asymmetry disabled）
#   H = bpc_H_bull_vol_strategies（vol deny 仅 ema_1200_position>0.10）
#   no_breakout = bpc_no_breakout_strategies（去掉 bpc_recent_breakout_strength 锚）
#
# 跑法:
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260527_bpc_layer_validation/bpc_abh_variant_grid.yaml --quiet-signal-logs

experiment_id: bpc_gate_vol_ABH_20260527
strategy: bpc
promoted_variant: null
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - XRPUSDT
  - ADAUSDT

runs:
  # ── 2024 calendar bull ──
  - variant: A_bull_2024
    strategies_root: config/strategies
    start_date: "2024-01-01"
    end_date: "2025-01-01"
    output_dir: results/bpc/experiments/A_bull_2024

  - variant: B_bull_2024
    strategies_root: config/experiments/20260527_bpc_layer_validation/variants/bpc_B_vol_off_strategies
    start_date: "2024-01-01"
    end_date: "2025-01-01"
    output_dir: results/bpc/experiments/B_bull_2024

  - variant: H_bull_2024
    strategies_root: config/experiments/20260527_bpc_layer_validation/variants/bpc_H_bull_vol_strategies
    start_date: "2024-01-01"
    end_date: "2025-01-01"
    output_dir: results/bpc/experiments/H_bull_2024

  - variant: no_breakout_bull_2024
    strategies_root: config/experiments/20260527_bpc_layer_validation/variants/bpc_no_breakout_strategies
    start_date: "2024-01-01"
    end_date: "2025-01-01"
    output_dir: results/bpc/experiments/no_breakout_bull_2024

  # ── 2025-04 → 2026-04 recent ──
  - variant: A_recent
    strategies_root: config/strategies
    start_date: "2025-04-01"
    end_date: "2026-04-01"
    output_dir: results/bpc/experiments/A_recent

  - variant: B_recent
    strategies_root: config/experiments/20260527_bpc_layer_validation/variants/bpc_B_vol_off_strategies
    start_date: "2025-04-01"
    end_date: "2026-04-01"
    output_dir: results/bpc/experiments/B_recent

  - variant: H_recent
    strategies_root: config/experiments/20260527_bpc_layer_validation/variants/bpc_H_bull_vol_strategies
    start_date: "2025-04-01"
    end_date: "2026-04-01"
    output_dir: results/bpc/experiments/H_recent

  - variant: no_breakout_recent
    strategies_root: config/experiments/20260527_bpc_layer_validation/variants/bpc_no_breakout_strategies
    start_date: "2025-04-01"
    end_date: "2026-04-01"
    output_dir: results/bpc/experiments/no_breakout_recent
