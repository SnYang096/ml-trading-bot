# MSR 策略模型配置（LightGBM，复用 FBF 超参模板）
# 样本稀疏（L3 事件 ~0.01%/bar）→ 减小 n_estimators / learning_rate 以抑制过拟合

name: msr

trainer:
  module: src.time_series_model.strategies.models.strategy_trainer
  function: train_strategy_model
  params:
    model_type: lightgbm
    task_type: binary
    target_col: success_label
    n_splits: 5
    tscv_gap: 24
    use_gpu: false
    model_params:
      n_estimators: 500
      learning_rate: 0.04
      num_leaves: 31
      max_depth: -1
      feature_fraction: 0.8
      bagging_fraction: 0.8
      bagging_freq: 5
      min_data_in_leaf: 30
      seed: 42

prediction:
  method: ensemble_mean
  model_type: lightgbm

output:
  save_results: true
  filename: results.json

volatility_model:
  enabled: false
  config_path: null
  target_column: future_volatility
