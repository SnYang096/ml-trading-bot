rules:
- feature: bpc_volume_compression_pct
  operator: '>='
  value: 0.9295
  rationale: meta-algorithm, KS=0.1055, return_uplift=+1.6074, robustness=100%, holdout验证通过
# bpc_recent_breakout_strength 锚已移除 — 实验「no_breakout」对照 rd_loop label 反向发现
- feature: bpc_pullback_depth
  operator: <=
  value: 0.55
  rationale: 语义锁定：回撤不能过深，过深更接近结构失败或反转语义；放宽到既有候选上沿以保留牛熊单边里的深回踩肥尾
  locked: true
  lock_reason: BPC 语义锚点 2/3：Pullback 受控（未破结构，允许较深但仍有效的趋势回踩）
- feature: bpc_recovery_strength
  operator: '>='
  value: 0.5
  rationale: 语义锁定：回踩后必须有恢复力度，确认 continuation 的可执行性
  locked: true
  lock_reason: BPC 语义锚点 3/3：Continuation 确认
