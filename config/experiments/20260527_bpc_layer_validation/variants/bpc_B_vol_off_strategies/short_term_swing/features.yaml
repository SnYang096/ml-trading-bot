# short_term_swing features — only columns whose IC peaks at lag ∈ {10,20} bars.
#
# Validation smoke (2026-05-26): ic-decay on SYNTHETIC parquet had no |IC|>0.02;
# wpt_scene_* columns missing until feature pipeline adds them.
#
# Populate this list ONLY after running:
#   mlbot analyze factor-eval --strategy short_term_swing --ic-decay-lags 1,3,5,10,20,50
# and keeping features with best_lag ∈ [10,20] AND |rank_ic| > 0.015 on holdout.
#
# Below is the starting hypothesis (must be refined by IC table before training).

feature_groups:
  trend_baseline:
    - ema_1200_position
    - ema_1200_slope_10
    - trend_confidence
    - hurst_long
    - bb_width_normalized_pct
    - macd_atr
  wpt_scene:
    - wpt_scene_trend_a
    - wpt_scene_trend_b
    - wpt_scene_chop
  volatility:
    - vol_persistence
    - vol_leverage_asymmetry
    - atr_percentile
