# BPC Return Tree 标签配置
# 🟢 Phase 2: 在 GOOD 样本空间中学习"如何让 RR 更大"
#
# 核心变化：
# - 从 Failure-first（避免失败）切换到 Return-amplification（放大成功）
# - 只在 GOOD 样本（~failure_any）上训练
# - 目标是 forward_rr（连续值），不是 failure_label（二值）
#
# GOOD 样本定义：
# - ~failure_rr_extreme: forward_rr >= -0.8R
# - ~failure_no_opportunity: 有机会的交易
#
# 参考文档：docs/architecture/FAILURE_TO_RETURN_PIPELINE.md

name: bpc_return_tree
target_column: forward_rr

label_generator:
  module: src.time_series_model.strategies.labels.failure_first_label
  function: compute_bpc_return_tree_label
  params:
    direction: long  # base direction (used when direction_aware=false)
    horizon: 50
    filter_good_only: true  # 只返回 GOOD 样本
    direction_aware: true  # per-bar direction from direction.yaml
    strategy: bpc  # load config/strategies/bpc/archetypes/direction.yaml

# 标签元信息
label_meta:
  label_type: regression
  semantic: |
    forward_rr = (MFE - MAE) / ATR
    范围: 约 [-5, 5]
    正值 = 有盈利空间
    负值 = 亏损
  sample_space: |
    GOOD = ~failure_any
    GOOD = ~(failure_rr_extreme | failure_no_opportunity)
    大约占全部样本的 70-80%
  horizon: 50 bars
  description: |
    Return Tree 连续标签：
    - 目标是 forward_rr
    - 只在 GOOD 样本上训练
    - 学习"在什么条件下 RR 更高"

filters:
  - column: forward_rr
    notna: true

# 模型配置（回归任务）
model_hints:
  task_type: regression
  objective: regression
  metric: mae
  # Return Tree 推荐参数
  max_depth: 5
  min_data_in_leaf: 100
  n_estimators: 100

# Return Tree 专属 KPI 定义
# 注意：Return Tree 的核心目标不是 lift，而是排序能力和语义集中度
kpi_definition:
  # 1️⃣ 排序能力 KPI
  ranking_ability:
    description: "模型是否能区分高 RR 和低 RR 样本"
    metrics:
      - name: spearman_corr
        description: "Spearman 相关系数 (pred vs actual)"
        target: ">= 0.15"  # 正相关即可
        critical: true
      - name: quantile_monotonicity
        description: "分位单调性: Q5_RR > Q4_RR > ... > Q1_RR"
        target: ">= 0.8"  # 80% 的分位组满足单调
        critical: true
      - name: q5_q1_spread
        description: "Q5 和 Q1 的 RR 差距"
        target: ">= 0.3R"  # Q5 比 Q1 高至少 0.3R
        critical: true
  
  # 2️⃣ 语义集中度 KPI
  semantic_concentration:
    description: "特征重要性是否集中在少数特征上"
    metrics:
      - name: top10_importance_ratio
        description: "Top10 特征的累计重要性占比"
        target: "30% - 60%"  # 太低=没学到，太高=过拟合
        critical: false
      - name: feature_family_interpretable
        description: "重要特征是否可解释（Evidence 类特征）"
        target: ">= 70%"  # 70% 重要特征是 Evidence 类
        critical: false
  
  # 3️⃣ 稳定性 KPI
  stability:
    description: "模型在不同时段/符号上的稳定性"
    metrics:
      - name: holdout_vs_train_gap
        description: "Holdout 与 Train 的 Spearman 差距"
        target: "<= 0.1"  # 差距不超过 0.1
        critical: false
      - name: symbol_consistency
        description: "跨符号的排序能力一致性"
        target: ">= 60%"  # 60% 的符号都有正向排序能力
        critical: false

  # lift 只是辅助指标，不变差即可
  lift_constraint:
    description: "lift 不作为主 KPI，只要没明显变差"
    target: ">= 0.85x"  # lift 不低于 0.85x
    critical: false

post_label_filters: []
