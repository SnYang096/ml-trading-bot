# ME direction 优化 — 对齐 BPC/TPC rd_loop + 双段 event_backtest
#
# 生产 direction (config/strategies/me/archetypes/direction.yaml):
#   signal_match_position_band 全栈 = me_accel_5k.sign + me_cvd_alignment + macd_atr.sign
#   + ema_1200_position band [|p|>0.03] + ema_1200_slope_10 同向
#
# 关键证据 (2026-05-28 rd_loop_me_compression_breakout ic-decay, n=13437 on chop subset):
#   macd_atr  H=1 IC = -0.092 (sig_flip H=10 +0.03 → H=20 +0.08)
#   roc_5     H=1 IC = -0.045
#   roc_10    H=1 IC = -0.065
#   me_accel_5k H=1 IC = -0.007 (近似零)
#   me_accel_persistence H=3 IC = -0.029
#   → 当前 direction 用 macd_atr.sign / me_accel.sign 同向作 trigger 在 1-3 bar 视角是 **反向**
#
# 候选研究方向（待 condition-set + ic 后 promote）：
#   (1) macd_only_reversed   — TPC 风格但 sign 取反（macd_atr<0 → long）
#   (2) accel_persistence_neg— 用 me_accel_persistence<0 + EMA band
#   (3) ema_band_only        — 仅靠 ema_1200_position 方向（移除动量级联）
#   (4) accel_stack_original — 保留生产配置作 baseline 对照
#
# 跑法:
#   PYTHONPATH=src:scripts python scripts/rd_loop.py \
#     --hypothesis-yaml config/experiments/me/rd_loop_me_direction.yaml
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/me/me_direction_grid.yaml --quiet-signal-logs

topic: me_direction_optimization
strategy: me
output_dir: results/rd_loop/me_direction

parquet: &me_pq results/train_final/me/train_final_20260519_133835_rr_extreme/me/features_labeled.parquet
# v3 prefilter mask（修复 compression_duration / oi 反向后）作为 condition-set 的 base
prefilter_v3_filter: &v3_filter
  - tpc_semantic_chop<=0.40
  - atr_percentile>=0.55
  - atr_percentile<=0.95
  - recent_compression_decay>=0.02
  - recent_compression_decay<=0.20
  - oi_compression_score<=0.10

quick_layer_scans:
  # 1) condition-set on success_no_rr_extreme — direction trigger 候选信号方向比较
  - mode: condition-set
    features_parquet: *me_pq
    label: success_no_rr_extreme
    filter: *v3_filter
    condition:
      # 单变量方向
      - "macd_sign_pos: macd_atr>0"
      - "macd_sign_neg: macd_atr<0"
      - "accel_sign_pos: me_accel_5k>0"
      - "accel_sign_neg: me_accel_5k<0"
      - "accel_persistence_pos: me_accel_persistence>0"
      - "accel_persistence_neg: me_accel_persistence<0"
      - "ema_pos_bull: ema_1200_position>0.03"
      - "ema_pos_bear: ema_1200_position<-0.03"
      - "slope_up: ema_1200_slope_10>0.002"
      - "slope_down: ema_1200_slope_10<-0.002"
      # 联合方向（候选 trigger）
      - "align_bull_orig: ema_1200_position>0.03 AND ema_1200_slope_10>0.002 AND me_accel_5k>0"
      - "align_bear_orig: ema_1200_position<-0.03 AND ema_1200_slope_10<-0.002 AND me_accel_5k<0"
      - "reversed_bull: ema_1200_position>0.03 AND macd_atr<0"
      - "reversed_bear: ema_1200_position<-0.03 AND macd_atr>0"
      - "ema_band_only_bull: ema_1200_position>0.03"
      - "ema_band_only_bear: ema_1200_position<-0.03"
    out: quick_scan/direction_condition_set_success.md

  # 1b) 同样 condition-set on forward_rr — R 质量（注意 scan.py 会把 label 转 bool，
  #     succ_in 列对 forward_rr 实际无意义；保留这条但等待 scan 支持 continuous label 再用）
  # TODO: rd_loop 升级 scan.py 支持 continuous label 后激活

  # 2) IC decay — 看候选 trigger 在不同 horizon 上的 IC 方向 / 是否 sign-flip
  - mode: ic-decay
    features_parquet: *me_pq
    target: forward_rr
    features: me_accel_5k,me_accel_persistence,me_cvd_alignment,macd_atr,roc_5,roc_10,ema_1200_position,ema_1200_slope_10
    horizons: "1,3,5,10,20,50"
    subset: tpc_semantic_chop<=0.40 AND atr_percentile>=0.55 AND atr_percentile<=0.95 AND recent_compression_decay>=0.02 AND recent_compression_decay<=0.20 AND oi_compression_score<=0.10
    out: quick_scan/ic_direction_features_v3base.md

  # 2b) IC on chop only（更宽 base，避免 v3 prefilter 太严 sample 不足）
  - mode: ic-decay
    features_parquet: *me_pq
    target: forward_rr
    features: me_accel_5k,me_accel_persistence,me_cvd_alignment,macd_atr,roc_5,roc_10,ema_1200_position,ema_1200_slope_10
    horizons: "1,3,5,10,20,50"
    subset: tpc_semantic_chop<=0.40
    out: quick_scan/ic_direction_features_chop_only.md

variant_grid: config/experiments/me/me_direction_grid.yaml

decision_doc:
  topic: me_direction_optimization
  topic_template: default
  experiment_index: results/me/experiments/EXPERIMENT_INDEX.json
  out: decision_doc_skeleton.md
