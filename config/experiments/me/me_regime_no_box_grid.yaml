# ME regime：生产（无 box）vs box_legacy 对照 — 双段 holdout
#
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/me/me_regime_no_box_grid.yaml --quiet-signal-logs

experiment_id: me_regime_no_box_20260528
strategy: me
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - XRPUSDT
  - ADAUSDT

runs:
  - variant: no_box_holdout
    strategies_root: config/strategies
    start_date: "2024-03-01"
    end_date: "2026-05-01"
    output_dir: results/me/experiments/no_box_holdout

  - variant: box_legacy_holdout
    strategies_root: config_experiments/me_regime_box_legacy_strategies
    start_date: "2024-03-01"
    end_date: "2026-05-01"
    output_dir: results/me/experiments/box_legacy_holdout

  - variant: no_box_bull_2024
    strategies_root: config/strategies
    start_date: "2024-01-01"
    end_date: "2025-01-01"
    output_dir: results/me/experiments/no_box_bull_2024

  - variant: box_legacy_bull_2024
    strategies_root: config_experiments/me_regime_box_legacy_strategies
    start_date: "2024-01-01"
    end_date: "2025-01-01"
    output_dir: results/me/experiments/box_legacy_bull_2024
