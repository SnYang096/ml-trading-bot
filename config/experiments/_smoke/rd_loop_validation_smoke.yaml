topic: validation_smoke_rd_loop
strategy: tpc
output_dir: results/validation_smoke/rd_loop

quick_layer_scans:
  - mode: condition-set
    features_parquet: results/validation_smoke/tpc/features_labeled.parquet
    label: success_no_rr_extreme
    filter:
      - tpc_semantic_chop<=0.4
    condition:
      - "H: abs(ema_1200_position)>0.10"
    bucket_by: ema:ema_1200_position@0.10
    out: quick_scan/rd_loop_condition.md

variant_grid: config/experiments/_smoke/tpc_variant_grid_smoke.yaml

decision_doc:
  topic: validation_smoke_rd_loop
  topic_template: default
  experiment_index: results/tpc/experiments/EXPERIMENT_INDEX.json
  out: decision_doc_skeleton.md
