# chop_grid entry-% emergency STOP — variant grid (per-leg entry × trigger_pct)
#
# Run:
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260615_chop_grid_emergency_sl/chop_grid_emergency_sl_entry_pct_grid.yaml

engine: chop_grid
strategy: chop_grid
experiment_id: chop_grid_emergency_sl_entry_pct_20260615

symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - XRPUSDT
  - ADAUSDT

timeframe: 2h
execution_timeframe: 1min
initial_capital: 10000

market_segment_path: config/market_segment.yaml

segment_matrix:
  segments:
    - bear_2022
    - bull_2023_2024
    - recent_range_to_bear
    - recent_6m_oos
  variants:
    - suffix: baseline
      config: config/experiments/20260615_chop_grid_emergency_sl/variants/baseline/meta.yaml
      output_dir: results/chop_grid/experiments/emergency_sl_entry_pct_20260615/baseline

    - suffix: em_12
      config: config/experiments/20260615_chop_grid_emergency_sl/variants/em_12/meta.yaml
      output_dir: results/chop_grid/experiments/emergency_sl_entry_pct_20260615/em_12

    - suffix: em_15
      config: config/experiments/20260615_chop_grid_emergency_sl/variants/em_15/meta.yaml
      output_dir: results/chop_grid/experiments/emergency_sl_entry_pct_20260615/em_15

    - suffix: em_20
      config: config/experiments/20260615_chop_grid_emergency_sl/variants/em_20/meta.yaml
      output_dir: results/chop_grid/experiments/emergency_sl_entry_pct_20260615/em_20
