# TPC Regime — 慢变量宏观带（EMA1200）+ 多空掩码
# 20260522：去掉 chop∧box（离线 AND pass≈9%、effect -1.72%）；仅用 EMA1200 离开中轴死区。
# 详见 docs/strategy/regime_layer.md
#
# NOTE: allowed_regimes (bull/bear/neutral) 仍为 schema 占位，运行时未接线；
#       分桶诊断见 regime_ablation_report.py 的 ema_1200_position 阈值。

allowed_regimes:
  - bull
  - bear
  - neutral

allowed_sides:
  - long
  - short

rules:
  # F' 变体（实验，20260526）：
  #   在 H（|ema_1200_position|>=0.10）基础上叠加 |ema_1200_slope_10|>=0.002，
  #   只允许"宏观带 + 斜率非平"的真趋势 regime 进入。
  #   离线 label scan: F' succ=57.49% (vs base 56.48%, Δ+1.01pp, |z|=2.03)，
  #   显著优于单纯调 EMA 阈值（H Δ+0.06, F Δ+0.11）。
  - any_of:
      - feature: ema_1200_position
        operator: ">="
        value: 0.10
      - feature: ema_1200_position
        operator: "<="
        value: -0.10
    rationale: 离开 EMA1200 中轴死区 — 宏观 regime，不绑定多空
    locked: true
    lock_reason: Regime 慢变量 — EMA1200 宏观带（TPC 专用，替代原 chop+box）
  - any_of:
      - feature: ema_1200_slope_10
        operator: ">="
        value: 0.002
      - feature: ema_1200_slope_10
        operator: "<="
        value: -0.002
    rationale: F' 变体：要求 EMA1200 斜率非平 — 排除横盘
    locked: false
    lock_reason: 实验阶段；待 backtest R-multiple 验证后决定 promote 或 drop

last_calibration:
  timestamp: null
  data_source: null
  plateau_overlap: null
  notes: |
    20260522 迁移：移除 tpc_semantic_chop 与 box_pos_120/breakout 规则。
    chop 上限在 gate.yaml gate_tpc_semantic_chop_high（value_gt 0.40），不在 regime。
