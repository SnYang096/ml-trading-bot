schema:
  phases:
  - system_safety
  - hard_gate
  - guardrail
  evaluation_order: system_safety -> hard_gate -> guardrail
  governance:
    selection_method: gate_score (Youden's J = tail_capture - good_deny_rate)
    min_gate_score: 0.0
    alert_threshold: 0.25
hard_gates:
- id: gate_tpc_semantic_chop_high
  tag: HARD_TPC_SEMANTIC_CHOP
  phase: hard_gate
  priority: 6
  reason: 高 chop 不追趋势回调（与 BPC/ME/SRB regime chop 口径 0.40 对齐）
  when:
    tpc_semantic_chop:
      value_gt: 0.4
  then:
    action: deny
  locked: true
  promote_never_disable: true
  lock_reason: 波动区过滤 — 高 chop bar 上虚假回调/来回扫（TPC gate；宏观带由 regime EMA1200）
guardrails: []
system_safety:
- id: gate_evt_var_99_evt_var_99
  tag: HARD_EVT_VAR_99_EVT_VAR_99
  phase: system_safety
  priority: 10
  reason: 统计验证规则 (lift=1.54)
  when:
    all_of:
    - evt_var_99:
        value_gt: 0.6706
    - evt_var_99:
        value_lt: 0.7976
  then:
    action: deny
  comment: 窄 EVT 分位带易在趋势/回调段过杀；主风险由 semantic_chop + prefilter 承担时默认关闭
  locked: true
  lock_reason: EVT 左尾风险强度：中高风险拖泥带水区间对趋势策略表现最差
  disabled: true
  disabled_reason: 放开大级别多空回调；需要尾部统计带时再打开并重跑优化
- id: gate_vol_persistence_mid_all_regimes
  tag: HARD_VOL_PERSISTENCE_VOL_PERSISTENCE
  phase: system_safety
  priority: 12
  reason: '20260601: 复验 bull-only — 同带在 bear label 也 -7pp'
  when:
    all_of:
    - vol_persistence:
        value_gt: 0.0029
    - vol_persistence:
        value_lt: 0.0616
  then:
    action: deny
  comment: 'G9: 去掉 ema>0.10，对照 variant H'
  locked: true
  lock_reason: 波动率持久性：低波噪声切换/拖泥带水期对趋势策略不利（仅 bull 段）
- id: gate_tpc_vol_leverage_asymmetry_mid_bull_only
  tag: HARD_TPC_VOL_LEVERAGE_ASYMMETRY
  phase: system_safety
  priority: 13
  reason: 与 BPC/ME/SRB 对齐：波动杠杆非对称严重时趋势容易被拖垮；regime-conditional：仅 bull 段启用
  when:
    all_of:
    - vol_leverage_asymmetry:
        value_gt: 0.0558
    - vol_leverage_asymmetry:
        value_lt: 0.1482
    - ema_1200_position:
        value_gt: 0.1
  then:
    action: deny
  locked: true
  promote_never_disable: true
  lock_reason: 波动杠杆非对称安全门（仅 bull 段）
