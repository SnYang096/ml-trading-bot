# TPC regime 斜率 — 补测「有符号」条件（回应 F' 只验了 |slope| 对称腿）
#
# 背景：recent 上 ema_1200_position IC 为负 ≠ 特征无用，可能表示
#   - 高 position 段平均 R 更低 → 应对称规则或分 side 再验
#   - 或 bull 段应禁多 / 仅允许 bear slope
#
# 本文件仅 quick_layer_scan；event_backtest 变体见 tpc_regime_slope_signed_grid.yaml（可选跑）
#
# Parquet: results/train_final/tpc/train_final_20260523_122438_rr_extreme/tpc/features_labeled.parquet

topic: tpc_regime_slope_signed
strategy: tpc
output_dir: results/rd_loop/tpc_slope_signed

quick_layer_scans:
  - mode: condition-set
    features_parquet: results/train_final/tpc/train_final_20260523_122438_rr_extreme/tpc/features_labeled.parquet
    label: success_no_rr_extreme
    filter:
      - tpc_semantic_chop<=0.4
    condition:
      - "H: abs(ema_1200_position)>0.10"
      - "Fp_sym: abs(ema_1200_position)>0.10 AND abs(ema_1200_slope_10)>0.002"
      - "bull_pos: ema_1200_position>0.10"
      - "bear_pos: ema_1200_position<-0.10"
      - "slope_up: ema_1200_slope_10>0.002"
      - "slope_down: ema_1200_slope_10<-0.002"
      - "bull_trend: ema_1200_position>0.10 AND ema_1200_slope_10>0.002"
      - "bear_trend: ema_1200_position<-0.10 AND ema_1200_slope_10<-0.002"
      - "bull_pos_bear_slope: ema_1200_position>0.10 AND ema_1200_slope_10<-0.002"
      - "bear_pos_bull_slope: ema_1200_position<-0.10 AND ema_1200_slope_10>0.002"
    out: quick_scan/regime_slope_signed.md

  - mode: ic-decay
    features_parquet: results/train_final/tpc/train_final_20260523_122438_rr_extreme/tpc/features_labeled.parquet
    target: forward_rr
    features: ema_1200_position,ema_1200_slope_10
    horizons: "1,3,5,10,20"
    calendar_window: "2024-01-01,2025-01-01"
    out: quick_scan/ic_ema_bull_window.md

  - mode: ic-decay
    features_parquet: results/train_final/tpc/train_final_20260523_122438_rr_extreme/tpc/features_labeled.parquet
    target: forward_rr
    features: ema_1200_position,ema_1200_slope_10
    horizons: "1,3,5,10,20"
    calendar_window: "2025-04-01,2026-04-01"
    out: quick_scan/ic_ema_recent_window.md

# variant_grid: config/experiments/20260527_tpc_regime_slope_signed/tpc_regime_slope_signed_grid.yaml  # 待 F'/分符号变体 yaml 建好后取消注释
