# fast_scalp tree channel: IC → fit/plateau → variant-grid (see 短期树 doc §3-4)
topic: fast_scalp_ic_plateau
strategy: fast_scalp
output_dir: results/rd_loop/fast_scalp_ic_plateau

research_scans:
  - mode: ic-decay
    strategy: fast_scalp
    features_parquet: results/train_final/fast_scalp/train_final_latest/fast_scalp/features_labeled.parquet
    features: macd_atr,bb_width_normalized_pct,bpc_semantic_chop,cvd_change,vpin_zscore
    horizons: "1,3,5,10,20"
    target: forward_rr
    out: quick_scan/ic_decay.md

  - mode: snotio-plateau
    strategy: fast_scalp
    layer: entry
    features_parquet: results/train_final/fast_scalp/train_final_latest/fast_scalp/features_labeled.parquet
    feature: macd_atr
    operator: "<="
    grid: "0,1,0.1"
    snotio_mode: proxy
    out: quick_scan/entry_tau_plateau.json

variant_grid: config/experiments/20260529_fast_scalp/fast_scalp_direction_grid.yaml

decision_doc:
  topic: fast_scalp_ic_plateau
