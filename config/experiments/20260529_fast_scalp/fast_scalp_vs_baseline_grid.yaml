experiment_id: fast_scalp_vs_tpc_dual_period
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - XRPUSDT
  - ADAUSDT
runs:
  - variant: fast_scalp_recent
    strategies_root: config/strategies/tree_strategies
    strategy: fast_scalp
    start_date: "2025-10-01"
    end_date: "2026-04-01"
    output_dir: results/fast_scalp/experiments/fast_scalp_recent
  - variant: fast_scalp_bull_2024
    strategies_root: config/strategies/tree_strategies
    strategy: fast_scalp
    start_date: "2024-01-01"
    end_date: "2024-06-30"
    output_dir: results/fast_scalp/experiments/fast_scalp_bull_2024
  - variant: tpc_baseline_recent
    strategies_root: config/strategies
    strategy: tpc
    start_date: "2025-10-01"
    end_date: "2026-04-01"
    output_dir: results/fast_scalp/experiments/tpc_baseline_recent
  - variant: tpc_baseline_bull_2024
    strategies_root: config/strategies
    strategy: tpc
    start_date: "2024-01-01"
    end_date: "2024-06-30"
    output_dir: results/fast_scalp/experiments/tpc_baseline_bull_2024
