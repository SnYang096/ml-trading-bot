# Phase 3 E3b — adverse gate on G3 (short + regime_off)
#
#   PYTHONPATH=src:scripts python scripts/research/train_tree_adverse_gate.py ...
#   PYTHONPATH=src:scripts python scripts/research/prepare_fast_scalp_alpha_snapshots.py --only fast_scalp_alpha_G8_short_regimeoff_gate_strategies
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260530_fast_scalp_alts_majors/fast_scalp_gate_validate.yaml

experiment_id: fast_scalp_gate_validate_20260602
strategy: fast_scalp
data_path: data/parquet_data

runs:
  - variant: alts_short_regimeoff_gate
    strategy: fast_scalp
    strategies_root: config_experiments/fast_scalp_alpha_G8_short_regimeoff_gate_strategies
    symbols: [SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    inject_scores: results/rd_loop/fast_scalp_ic_plateau/event_confirm/scores/alts_holdout.parquet
    output_dir: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/gate/alts_event

  - variant: majors_short_regimeoff_gate
    strategy: fast_scalp
    strategies_root: config_experiments/fast_scalp_alpha_G8_short_regimeoff_gate_strategies
    symbols: [BTCUSDT, ETHUSDT]
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    inject_scores: results/rd_loop/fast_scalp_ic_plateau/event_confirm/scores/majors_holdout.parquet
    output_dir: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/gate/majors_event
