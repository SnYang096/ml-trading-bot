# Track A — dual binary head validation (G7)
#
#   PYTHONPATH=src:scripts python scripts/rd_loop.py \
#     --hypothesis-yaml config/experiments/20260530_fast_scalp_alts_majors/rd_loop_track_dual_head.yaml

experiment_id: fast_scalp_track_dual_head_20260602
topic: fast_scalp_track_dual_head
strategy: fast_scalp
output_dir: results/rd_loop/fast_scalp_ic_plateau/track_dual_head
timeframe: "120T"
feature_store_layer: features_tree_core_120T_c005db49f7
data_path: data/parquet_data

holdout: &holdout
  start: "2025-10-01"
  end: "2026-04-01"

symbols_6: &symbols_6 BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT
symbols_alts: &symbols_alts SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT
train_dates: &train_dates
  start_date: "2024-01-01"
  end_date: "2026-04-01"
  holdout_start_date: "2025-10-01"
  holdout_end_date: "2026-04-01"

# Canonical template — NOT fast_scalp_dual_head slug
config: &config config/strategies/tree_strategies/fast_scalp

tree_steps:
  - mode: prepare-only
    config: *config
    symbols: *symbols_6
    <<: *train_dates
    output_root: results/train_final/fast_scalp/prepare_baseline

  - mode: ic-prune
    config: *config
    features_parquet: results/train_final/fast_scalp/prepare_baseline/fast_scalp/features_labeled.parquet
    out: ic_prune
    holdout_start: "2025-10-01"
    holdout_end: "2026-04-01"

  - mode: train
    config: *config
    symbols: *symbols_6
    <<: *train_dates
    output_root: results/train_final/fast_scalp/train_baseline_h3

  - mode: shell
    cmd: |
      PYTHONPATH=src:scripts python scripts/research/train_tree_dual_head.py \
        --config config/strategies/tree_strategies/fast_scalp \
        --predictions results/train_final/fast_scalp/train_baseline_h3/fast_scalp/predictions.parquet \
        --symbols SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT \
        --output-dir results/rd_loop/fast_scalp_ic_plateau/track_dual_head/alts \
        --train-end-date 2026-01-01

  - mode: shell
    cmd: |
      PYTHONPATH=src:scripts python scripts/research/prepare_fast_scalp_alpha_snapshots.py \
        --only fast_scalp_alpha_G7_dual_head_strategies

  - mode: shell
    cmd: |
      PYTHONPATH=src:scripts python -m scripts.event_backtest \
        --variant-grid config/experiments/20260530_fast_scalp_alts_majors/fast_scalp_dual_head_validate.yaml

research_scans: []
