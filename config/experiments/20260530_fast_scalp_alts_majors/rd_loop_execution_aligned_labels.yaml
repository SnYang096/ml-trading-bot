train_g10: &train_g10 results/train_final/fast_scalp_realized_g10/train_execution_aligned

tree_steps:
  - mode: shell
    cmd: |
      PYTHONPATH=src:scripts python scripts/research/prepare_fast_scalp_alpha_snapshots.py \
        --only fast_scalp_alpha_G14_g5label_g5exec_strategies \
               fast_scalp_alpha_G15_g10label_g10exec_strategies \
               fast_scalp_alpha_G16_g5label_g5exec_gate_strategies

  - mode: prepare-only
    config: config/strategies/tree_strategies/fast_scalp_realized_g5
    symbols: *symbols_6
    <<: *train_dates
    output_root: *prepare_g5

  - mode: ic-prune
    config: config/strategies/tree_strategies/fast_scalp_realized_g5
    features_parquet: results/train_final/fast_scalp_realized_g5/prepare_execution_aligned/fast_scalp_realized_g5/features_labeled.parquet
    out: ic_prune_g5
    holdout_start: "2025-10-01"
    holdout_end: "2026-04-01"

  - mode: train
    config: config/strategies/tree_strategies/fast_scalp_realized_g5
    symbols: *symbols_6
    <<: *train_dates
    output_root: *train_g5

  - mode: tau-scan
    config: config/strategies/tree_strategies/fast_scalp_realized_g5
    predictions: results/train_final/fast_scalp_realized_g5/train_execution_aligned/fast_scalp_realized_g5/predictions.parquet
    out: tau_scan_g5
    segment_label: recent_6m_oos
    quantile_grid: "0.05,0.08,0.10,0.12,0.15,0.20,0.25,0.30"
    filter_split: holdout

  - mode: prepare-only
    config: config/strategies/tree_strategies/fast_scalp_realized_g10
    symbols: *symbols_6
    <<: *train_dates
    output_root: *prepare_g10

  - mode: ic-prune
    config: config/strategies/tree_strategies/fast_scalp_realized_g10
    features_parquet: results/train_final/fast_scalp_realized_g10/prepare_execution_aligned/fast_scalp_realized_g10/features_labeled.parquet
    out: ic_prune_g10
    holdout_start: "2025-10-01"
    holdout_end: "2026-04-01"

  - mode: train
    config: config/strategies/tree_strategies/fast_scalp_realized_g10
    symbols: *symbols_6
    <<: *train_dates
    output_root: *train_g10

  - mode: tau-scan
    config: config/strategies/tree_strategies/fast_scalp_realized_g10
    predictions: results/train_final/fast_scalp_realized_g10/train_execution_aligned/fast_scalp_realized_g10/predictions.parquet
