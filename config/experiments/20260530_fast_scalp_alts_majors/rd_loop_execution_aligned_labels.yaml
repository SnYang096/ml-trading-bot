        --output results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/execution_aligned/labels_1min_ablation_g5.parquet

  - mode: shell
    cmd: |
      PYTHONPATH=src:scripts python -m scripts.event_backtest \
        --variant-grid config/experiments/20260530_fast_scalp_alts_majors/fast_scalp_execution_aligned_segment.yaml

  - mode: shell
    cmd: |
      PYTHONPATH=src:scripts python -m scripts.event_backtest \
        --variant-grid config/experiments/20260530_fast_scalp_alts_majors/fast_scalp_g16_gate_exec.yaml

