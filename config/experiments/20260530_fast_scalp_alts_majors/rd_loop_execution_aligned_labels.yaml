      PYTHONPATH=src:scripts python scripts/research/export_execution_aligned_labels_1min_ablation.py \
        --features-parquet results/train_final/fast_scalp_realized_g5/prepare_execution_aligned/fast_scalp_realized_g5/features_labeled.parquet \
        --exec-profile g5_tight \
        --start-date 2025-10-01 --end-date 2026-04-01 \
