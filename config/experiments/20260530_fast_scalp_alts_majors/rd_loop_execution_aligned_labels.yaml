experiment_id: fast_scalp_execution_aligned_labels_20260602
topic: fast_scalp_execution_aligned_labels
strategy: fast_scalp
output_dir: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/execution_aligned
timeframe: "120T"
feature_store_layer: features_tree_core_120T_c005db49f7
data_path: data/parquet_data

holdout: &holdout
  start: "2025-10-01"
  end: "2026-04-01"

symbols_6: &symbols_6 BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT
