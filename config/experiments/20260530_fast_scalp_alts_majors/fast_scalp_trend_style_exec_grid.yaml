# Phase 5 — tree entry + trend_scalp-inspired execution (wide SL / tight TP)
#
# Compare G5 (tight scalp) vs G9/G10 (wide protect + tight TP) on recent_6m_oos.
# Uses valid v2 score injection parquet.
#
#   PYTHONPATH=src:scripts:. python scripts/research/prepare_fast_scalp_alpha_snapshots.py \
#     --only fast_scalp_alpha_G9_short_wide_tight_regimeon_strategies \
#            fast_scalp_alpha_G10_short_wide_tight_regimeoff_strategies
#
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260530_fast_scalp_alts_majors/fast_scalp_trend_style_exec_grid.yaml

experiment_id: fast_scalp_trend_style_exec_20260602
strategy: fast_scalp
data_path: data/parquet_data

runs:
  - variant: alts_g5_tight_baseline
    strategy: fast_scalp
    strategies_root: config/experiments/20260530_fast_scalp_alts_majors/variants/fast_scalp_alpha_G5_short_regimeoff_tight_exec_strategies
    symbols: [SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    inject_scores: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/scores/alts_full_history_v2.parquet
    output_dir: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/phase5_trend_style/alts_g5_tight

  - variant: alts_g9_wide_tight_regimeon
    strategy: fast_scalp
    strategies_root: config/experiments/20260530_fast_scalp_alts_majors/variants/fast_scalp_alpha_G9_short_wide_tight_regimeon_strategies
    symbols: [SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    inject_scores: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/scores/alts_full_history_v2.parquet
    output_dir: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/phase5_trend_style/alts_g9_wide_tight_regimeon

  - variant: alts_g10_wide_tight_regimeoff
    strategy: fast_scalp
    strategies_root: config/experiments/20260530_fast_scalp_alts_majors/variants/fast_scalp_alpha_G10_short_wide_tight_regimeoff_strategies
    symbols: [SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    inject_scores: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/scores/alts_full_history_v2.parquet
    output_dir: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/phase5_trend_style/alts_g10_wide_tight_regimeoff
