# Track B — execution-aligned g5-label + IC-prune adverse gate (G14/G16)
#
#   PYTHONPATH=src:scripts python scripts/rd_loop.py \
#     --hypothesis-yaml config/experiments/20260530_fast_scalp_alts_majors/rd_loop_track_exec_aligned_gate.yaml
#
# Replaces rd_loop_execution_aligned_labels.yaml (deprecated realized_g5/g10 slugs).

experiment_id: fast_scalp_track_exec_aligned_gate_20260602
topic: fast_scalp_track_exec_aligned_gate
strategy: fast_scalp
output_dir: results/rd_loop/fast_scalp_ic_plateau/track_exec_aligned
timeframe: "120T"
feature_store_layer: features_tree_core_120T_c005db49f7
data_path: data/parquet_data

holdout: &holdout
  start: "2025-10-01"
  end: "2026-04-01"

symbols_6: &symbols_6 BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT
symbols_alts: &symbols_alts SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT
train_dates: &train_dates
  start_date: "2024-01-01"
  end_date: "2026-04-01"
  holdout_start_date: "2025-10-01"
  holdout_end_date: "2026-04-01"

config: &config config/strategies/tree_strategies/fast_scalp
labels_g5: &labels_g5 config/experiments/20260530_fast_scalp_alts_majors/overrides/labels_execution_aligned_g5.yaml
features_gate: &features_gate config/experiments/20260530_fast_scalp_alts_majors/overrides/features_gate_candidates.yaml

tree_steps:
  - mode: shell
    cmd: |
      PYTHONPATH=src:scripts python scripts/train_strategy_pipeline.py \
        --config config/strategies/tree_strategies/fast_scalp \
        --labels config/experiments/20260530_fast_scalp_alts_majors/overrides/labels_execution_aligned_g5.yaml \
        --symbol BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT --timeframe 120T \
        --start-date 2024-01-01 --end-date 2026-04-01 \
        --holdout-start-date 2025-10-01 --holdout-end-date 2026-04-01 \
        --feature-store-layer features_tree_core_120T_c005db49f7 \
        --output-root results/train_final/fast_scalp/prepare_exec_aligned_g5 \
        --prepare-only

  - mode: ic-prune
    config: *config
    features_parquet: results/train_final/fast_scalp/prepare_exec_aligned_g5/fast_scalp/features_labeled.parquet
    out: ic_prune_g5
    holdout_start: "2025-10-01"
    holdout_end: "2026-04-01"

  - mode: shell
    cmd: |
      PYTHONPATH=src:scripts python scripts/train_strategy_pipeline.py \
        --config config/strategies/tree_strategies/fast_scalp \
        --labels config/experiments/20260530_fast_scalp_alts_majors/overrides/labels_execution_aligned_g5.yaml \
        --symbol BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT --timeframe 120T \
        --start-date 2024-01-01 --end-date 2026-04-01 \
        --holdout-start-date 2025-10-01 --holdout-end-date 2026-04-01 \
        --feature-store-layer features_tree_core_120T_c005db49f7 \
        --output-root results/train_final/fast_scalp/train_exec_aligned_g5

  - mode: tau-scan
    config: *config
    predictions: results/train_final/fast_scalp/train_exec_aligned_g5/fast_scalp/predictions.parquet
    out: tau_scan_g5
    segment_label: recent_6m_oos
    quantile_grid: "0.05,0.08,0.10,0.12,0.15,0.20,0.25,0.30"
    filter_split: holdout

  - mode: shell
    cmd: |
      PYTHONPATH=src:scripts python scripts/train_strategy_pipeline.py \
        --config config/strategies/tree_strategies/fast_scalp \
        --features config/experiments/20260530_fast_scalp_alts_majors/overrides/features_gate_candidates.yaml \
        --symbol BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT --timeframe 120T \
        --start-date 2024-01-01 --end-date 2026-04-01 \
        --output-root results/train_final/fast_scalp/gate_features_wide \
        --prepare-only

  - mode: shell
    cmd: |
      PYTHONPATH=src:scripts python scripts/research/train_tree_adverse_gate.py \
        --config config/strategies/tree_strategies/fast_scalp \
        --predictions results/train_final/fast_scalp/train_exec_aligned_g5/fast_scalp/predictions.parquet \
        --gate-features results/train_final/fast_scalp/gate_features_wide/fast_scalp/features_labeled.parquet \
        --features-gate-yaml config/experiments/20260530_fast_scalp_alts_majors/overrides/features_gate_candidates.yaml \
        --symbols SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT \
        --start-date 2022-01-01 --end-date 2026-04-01 \
        --train-end-date 2025-10-01 \
        --min-abs-ic 0.03 --min-lift 0.05 --top-k 8 \
        --output-dir results/rd_loop/fast_scalp_ic_plateau/track_exec_aligned/gate/ic_prune_v2

  - mode: shell
    cmd: |
      PYTHONPATH=src:scripts python scripts/research/export_tree_scores_from_artifact.py \
        --artifact-dir results/train_final/fast_scalp/train_exec_aligned_g5/fast_scalp \
        --config config/strategies/tree_strategies/fast_scalp \
        --symbols SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT \
        --start-date 2022-01-01 --end-date 2026-04-01 \
        --validate-short-entry -0.39530742466452556 \
        --include-gate-features \
        --output results/rd_loop/fast_scalp_ic_plateau/track_exec_aligned/scores/alts_g5label_full_history.parquet

  - mode: shell
    cmd: |
      PYTHONPATH=src:scripts python scripts/research/prepare_fast_scalp_alpha_snapshots.py \
        --only fast_scalp_alpha_G14_g5label_g5exec_strategies \
               fast_scalp_alpha_G16_g5label_g5exec_gate_strategies

  - mode: shell
    cmd: |
      PYTHONPATH=src:scripts python -m scripts.event_backtest \
        --variant-grid config/experiments/20260530_fast_scalp_alts_majors/fast_scalp_g14_g16_revalidation.yaml

research_scans: []
