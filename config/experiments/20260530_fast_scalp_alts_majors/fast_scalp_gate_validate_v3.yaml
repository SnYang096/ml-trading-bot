# G8 OOS gate validation (train entries < 2025-10-01, eval recent_6m_oos)
#
# Prerequisites:
#   1. export_tree_scores_from_artifact.py → alts_full_history.parquet
#   2. train_tree_adverse_gate.py --train-end-date 2025-10-01 → adverse_gate_oos/
#   3. prepare_fast_scalp_alpha_snapshots.py --only fast_scalp_alpha_G8_short_regimeoff_gate_strategies
#
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260530_fast_scalp_alts_majors/fast_scalp_gate_validate_v3.yaml

experiment_id: fast_scalp_gate_validate_v3_20260602
strategy: fast_scalp
data_path: data/parquet_data

runs:
  - variant: alts_g3_short_regimeoff
    strategy: fast_scalp
    strategies_root: config/experiments/20260530_fast_scalp_alts_majors/variants/fast_scalp_alpha_G3_short_regime_off_strategies
    symbols: [SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    inject_scores: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/scores/alts_full_history_v2.parquet
    output_dir: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/gate_v3/alts_g3_baseline

  - variant: alts_g8_short_regimeoff_gate_oos
    strategy: fast_scalp
    strategies_root: config/experiments/20260530_fast_scalp_alts_majors/variants/fast_scalp_alpha_G8_short_regimeoff_gate_strategies
    symbols: [SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    inject_scores: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/scores/alts_full_history_v2.parquet
    output_dir: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/gate_v3/alts_g8_gate_oos
