# fast_scalp_majors: BTC/ETH deployment with dedicated majors model + τ.

strategy:
  name: fast-scalp-tree-majors-120T
  description: |
    Majors-only tree trained on BTC/ETH. Holdout q=0.08 beats pooled 6-coin
    model on the same segment (mean Sharpe 0.89 vs 0.62 @ best q).
  owner: quant_team
  archetype: TreeDirectionFast
  timeframe: "120T"
  symbol_include:
    - BTCUSDT
    - ETHUSDT
  symbol_exclude: []
  deployment:
    enabled: true
    live_slug: fast_scalp_majors
  macro_tp_vwap_anchor:
    enabled: false
    symbol: BTCUSDT
  model_artifact:
    train_run: results/train_final/fast_scalp_majors/train_final_latest/fast_scalp_majors
