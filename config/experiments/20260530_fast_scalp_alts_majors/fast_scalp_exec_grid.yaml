# Phase 2 — event execution grid (TPC-style frozen trees; event KPI)
#
# 前置：prepare_fast_scalp_alpha_snapshots.py
#
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260530_fast_scalp_alts_majors/fast_scalp_exec_grid.yaml

experiment_id: fast_scalp_exec_grid_20260601
strategy: fast_scalp
data_path: data/parquet_data

runs:
  - variant: alts_exec_timeout
    strategy: fast_scalp
    strategies_root: config_experiments/fast_scalp_alpha_G4_exec_timeout_strategies
    symbols: [SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    inject_scores: results/rd_loop/fast_scalp_ic_plateau/event_confirm/scores/alts_holdout.parquet
    output_dir: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/exec_grid/alts_timeout

  - variant: alts_exec_tight
    strategy: fast_scalp
    strategies_root: config_experiments/fast_scalp_alpha_G5_short_regimeoff_tight_exec_strategies
    symbols: [SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    inject_scores: results/rd_loop/fast_scalp_ic_plateau/event_confirm/scores/alts_holdout.parquet
    output_dir: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/exec_grid/alts_short_regimeoff_tight

  - variant: alts_exec_trail
    strategy: fast_scalp
    strategies_root: config_experiments/fast_scalp_alpha_G6_short_regimeoff_trail_exec_strategies
    symbols: [SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    inject_scores: results/rd_loop/fast_scalp_ic_plateau/event_confirm/scores/alts_holdout.parquet
    output_dir: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/exec_grid/alts_short_regimeoff_trail

  - variant: majors_exec_tight
    strategy: fast_scalp
    strategies_root: config_experiments/fast_scalp_alpha_G5_short_regimeoff_tight_exec_strategies
    symbols: [BTCUSDT, ETHUSDT]
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    inject_scores: results/rd_loop/fast_scalp_ic_plateau/event_confirm/scores/majors_holdout.parquet
    output_dir: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/exec_grid/majors_short_regimeoff_tight
