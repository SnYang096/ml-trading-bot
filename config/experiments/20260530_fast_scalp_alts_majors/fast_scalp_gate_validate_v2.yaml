# G8 adverse gate re-validation (gate feature parity via enriched injection parquet)
#
#   PYTHONPATH=src:scripts python scripts/research/export_tree_scores_for_event_backtest.py \
#     --predictions results/train_final/fast_scalp/train_final_20260530_141451_ic_top35/fast_scalp/predictions.parquet \
#     --output results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/gate/alts_injection_enriched.parquet \
#     --symbols SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT --split none \
#     --extra-cols atr,trend_confidence,bpc_semantic_chop_ts_q,me_accel_5k,vol_accel,macro_tp_vwap_1200_position
#
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260530_fast_scalp_alts_majors/fast_scalp_gate_validate_v2.yaml

experiment_id: fast_scalp_gate_validate_v2_20260602
strategy: fast_scalp
data_path: data/parquet_data

runs:
  - variant: alts_g3_short_regimeoff
    strategy: fast_scalp
    strategies_root: config_experiments/fast_scalp_alpha_G3_short_regime_off_strategies
    symbols: [SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    inject_scores: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/gate/alts_injection_enriched.parquet
    output_dir: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/gate/alts_g3_baseline

  - variant: alts_g8_short_regimeoff_gate
    strategy: fast_scalp
    strategies_root: config_experiments/fast_scalp_alpha_G8_short_regimeoff_gate_strategies
    symbols: [SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    inject_scores: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/gate/alts_injection_enriched.parquet
    output_dir: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/gate/alts_g8_gate
