# G8 OOS gate × G5/G10 execution (recent_6m_oos, v2 scores)
#
#   PYTHONPATH=src:scripts:. python scripts/research/prepare_fast_scalp_alpha_snapshots.py \
#     --only fast_scalp_alpha_G12_short_regimeoff_gate_tight_exec_strategies \
#            fast_scalp_alpha_G13_short_regimeoff_gate_wide_tight_exec_strategies
#
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260530_fast_scalp_alts_majors/fast_scalp_gate_exec_combo.yaml

experiment_id: fast_scalp_gate_exec_combo_20260602
strategy: fast_scalp
data_path: data/parquet_data

runs:
