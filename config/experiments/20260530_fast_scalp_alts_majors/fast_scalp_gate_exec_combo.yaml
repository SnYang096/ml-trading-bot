    strategy: fast_scalp
    strategies_root: config/experiments/20260530_fast_scalp_alts_majors/variants/fast_scalp_alpha_G5_short_regimeoff_tight_exec_strategies
    symbols: [SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    inject_scores: results/rd_loop/fast_scalp_ic_plateau/alpha_rebuild/scores/alts_full_history_v2.parquet
