# TPC macro + depth 叠加 prefilter（2026-06-10 follow-up）
#
# 假设：macro≥τ 提供大级别回撤背景，prod depth<=0.85 约束当根仍在回踩区；
#       相对 E0_prod 改善 bull R，且优于 M_replace（仅 macro、无 depth）。
#
# 变体树：config/experiments/20260610_tpc_macro_pullback_replace/variants/tpc_macro_add_L15_S12_strategies/
#
# 跑法：
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260610_tpc_macro_pullback_replace/tpc_macro_pullback_add_grid.yaml \
#     --quiet-signal-logs

experiment_id: tpc_macro_pullback_add_20260610
decision_doc: config/experiments/20260610_tpc_macro_pullback_replace/DECISION.md
strategy: tpc
market_segment_path: config/market_segment.yaml
data_path: data/parquet_data
trading_map: true
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - XRPUSDT
  - ADAUSDT

segment_matrix:
  segments:
    - bear_2022
    - bull_2023_2024
    - recent_range_to_bear
  variants:
    - suffix: E0_prod
      strategies_root: config/strategies
      output_dir: results/tpc/experiments/macro_pullback_add_20260610/E0_prod

    - suffix: M_add_L15_S12
      strategies_root: config/experiments/20260610_tpc_macro_pullback_replace/variants/tpc_macro_add_L15_S12_strategies
      output_dir: results/tpc/experiments/macro_pullback_add_20260610/M_add_L15_S12
