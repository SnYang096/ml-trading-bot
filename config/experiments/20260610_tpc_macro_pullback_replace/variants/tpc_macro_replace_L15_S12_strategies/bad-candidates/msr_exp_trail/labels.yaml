# MSR 策略标签配置（复用 FBF label generator，语义一致：方向性 RR 标签）

name: msr
target_column: rr_label

label_generator:
  module: src.time_series_model.strategies.labels.failure_first_label
  function: compute_bpc_label
  params:
    direction: long
    horizon: 60

filters:
  - column: rr_label
    notna: true

post_label_filters: []
