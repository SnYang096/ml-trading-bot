# TPC macro_pullback_pct 替代 depth prefilter（2026-06-10）
#
# 变体树：variants/tpc_macro_replace_*_strategies/（静态 prefilter，无 prepare 脚本）
#
# 跑法：
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260610_tpc_macro_pullback_replace/tpc_macro_pullback_replace_grid.yaml \
#     --quiet-signal-logs

experiment_id: tpc_macro_pullback_replace_20260610
decision_doc: config/experiments/20260610_tpc_macro_pullback_replace/DECISION.md
strategy: tpc
market_segment_path: config/market_segment.yaml
data_path: data/parquet_data
trading_map: true
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - XRPUSDT
  - ADAUSDT

segment_matrix:
  segments:
    - bear_2022
    - bull_2023_2024
    - recent_range_to_bear
  variants:
    - suffix: E0_prod
      strategies_root: config/strategies
      output_dir: results/tpc/experiments/macro_pullback_replace_20260610/E0_prod

    - suffix: M_replace_L15_S12
      strategies_root: config/experiments/20260610_tpc_macro_pullback_replace/variants/tpc_macro_replace_L15_S12_strategies
      output_dir: results/tpc/experiments/macro_pullback_replace_20260610/M_replace_L15_S12

    - suffix: M_replace_L20_S15
      strategies_root: config/experiments/20260610_tpc_macro_pullback_replace/variants/tpc_macro_replace_L20_S15_strategies
      output_dir: results/tpc/experiments/macro_pullback_replace_20260610/M_replace_L20_S15
