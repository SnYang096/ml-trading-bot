# TPC macro 三变体 bull 段 trading map（segment grid 内嵌 map，不重跑全窗）
#
# E0 / M_replace / M_add 仅 bull_2023_2024 × trading_map → 3 runs
# 地图路径：results/tpc/experiments/.../<variant>/bull_2023_2024/trading_map_tpc_event.html
#
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260610_tpc_macro_pullback_replace/tpc_macro_pullback_bull_maps_grid.yaml \
#     --quiet-signal-logs

experiment_id: tpc_macro_pullback_bull_maps_20260610
decision_doc: config/experiments/20260610_tpc_macro_pullback_replace/DECISION.md
strategy: tpc
market_segment_path: config/market_segment.yaml
data_path: data/parquet_data
trading_map: true
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - XRPUSDT
  - ADAUSDT

segment_matrix:
  segments:
    - bull_2023_2024
  variants:
    - suffix: E0_prod
      strategies_root: config/strategies
      output_dir: results/tpc/experiments/macro_pullback_replace_20260610/E0_prod

    - suffix: M_replace_L15_S12
      strategies_root: config/experiments/20260610_tpc_macro_pullback_replace/variants/tpc_macro_replace_L15_S12_strategies
      output_dir: results/tpc/experiments/macro_pullback_replace_20260610/M_replace_L15_S12

    - suffix: M_add_L15_S12
      strategies_root: config/experiments/20260610_tpc_macro_pullback_replace/variants/tpc_macro_add_L15_S12_strategies
      output_dir: results/tpc/experiments/macro_pullback_add_20260610/M_add_L15_S12
