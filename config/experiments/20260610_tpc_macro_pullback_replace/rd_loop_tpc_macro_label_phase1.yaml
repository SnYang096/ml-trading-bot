# TPC macro_pullback_pct label scan — Phase 1b（parquet 上 mlbot research scan）
#
# 前置：含 tpc_macro_pullback_pct_long/short 的 features_labeled.parquet
#
#   PYTHONPATH=src:scripts python scripts/rd_loop.py \
#     --hypothesis-yaml config/experiments/20260610_tpc_macro_pullback_replace/rd_loop_tpc_macro_label_phase1.yaml

topic: tpc_macro_label_20260610
strategy: tpc
output_dir: results/rd_loop/tpc_macro_label_20260610

# 跑 prepare 后替换为实际路径（rd_loop 启动前更新）
features_parquet: &parquet results/train_final/tpc/train_final_20260604_rd_rerun/tpc/features_labeled.parquet
label: &label success_no_rr_extreme

bull_filter: &bull_filter
  - ema_1200_position>=0.10
  - tpc_semantic_chop<=0.40

bear_filter: &bear_filter
  - ema_1200_position<=-0.10
  - tpc_semantic_chop<=0.40

quick_layer_scans:
  - mode: feature-plateau
    features_parquet: *parquet
    label: *label
    layer: prefilter
    feature: tpc_macro_pullback_pct_long
    operator: ">="
    grid: "0.10,0.12,0.15,0.18,0.20,0.22,0.25"
    filter: *bull_filter
    out: quick_scan/macro_long_plateau_bull.md

  - mode: feature-plateau
    features_parquet: *parquet
    label: *label
    layer: prefilter
    feature: tpc_macro_pullback_pct_short
    operator: ">="
    grid: "0.10,0.12,0.15,0.18,0.20,0.22,0.25"
    filter: *bear_filter
    out: quick_scan/macro_short_plateau_bear.md

  - mode: feature-plateau
    features_parquet: *parquet
    label: *label
    layer: prefilter
    feature: tpc_pullback_depth
    operator: "<="
    grid: "0.55,0.65,0.75,0.85,0.95"
    filter: *bull_filter
    out: quick_scan/depth_plateau_bull_baseline.md

  - mode: condition-set
    features_parquet: *parquet
    label: *label
    layer: prefilter
    filter: *bull_filter
    condition:
      - "prod_depth: tpc_pullback_depth<=0.85"
      - "macro_L15: tpc_macro_pullback_pct_long>=0.15"
      - "macro_L20: tpc_macro_pullback_pct_long>=0.20"
    out: quick_scan/macro_vs_depth_bull.md

  - mode: condition-set
    features_parquet: *parquet
    label: *label
    layer: prefilter
    filter: *bear_filter
    condition:
      - "macro_S12: tpc_macro_pullback_pct_short>=0.12"
      - "macro_S15: tpc_macro_pullback_pct_short>=0.15"
    out: quick_scan/macro_short_bear.md

  - mode: ic-decay
    features_parquet: *parquet
    target: forward_rr
    features: tpc_macro_pullback_pct_long,tpc_macro_pullback_pct_short,tpc_pullback_depth,path_efficiency_pct,ema_1200_position
    horizons: "1,3,5,10,20"
    filter: *bull_filter
    out: quick_scan/ic_decay_macro_bull.md
