# TPC Gate — A1: chop 阈值放宽 0.4→0.3
# 假设：当前 0.4 对 trend swing 太严，过滤了正常回撤中的 mild chop
schema:
  phases:
    - hard_gate
    - guardrail
  evaluation_order: hard_gate -> guardrail
  governance:
    selection_method: gate_score (Youden's J = tail_capture - good_deny_rate)
    min_gate_score: 0.0
    alert_threshold: 0.25
hard_gates:
  - id: gate_tpc_semantic_chop_high
    tag: HARD_TPC_SEMANTIC_CHOP
    phase: hard_gate
    priority: 6
    reason: "A1: chop 0.4→0.3 放宽，允许更多 mild chop 入场"
    when:
      tpc_semantic_chop:
        value_gt: 0.3
    then:
      action: deny
    locked: false
guardrails: []
system_safety: []
