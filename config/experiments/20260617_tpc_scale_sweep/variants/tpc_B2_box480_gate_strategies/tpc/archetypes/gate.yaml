# TPC Gate — B2: 加 box_stability_480 gate（40天箱体过滤）
# 假设：40天级稳定箱体是更保守的过滤，只过滤真正的长期箱体
schema:
  phases:
    - hard_gate
    - guardrail
  evaluation_order: hard_gate -> guardrail
  governance:
    selection_method: gate_score (Youden's J = tail_capture - good_deny_rate)
    min_gate_score: 0.0
    alert_threshold: 0.25
hard_gates:
  - id: gate_tpc_semantic_chop_high
    tag: HARD_TPC_SEMANTIC_CHOP
    phase: hard_gate
    priority: 6
    reason: 高 chop 不追趋势回调
    when:
      tpc_semantic_chop:
        value_gt: 0.4
    then:
      action: deny
    locked: true
  - id: gate_box_stable_480
    tag: HARD_BOX_STABLE_480
    phase: hard_gate
    priority: 7
    reason: "B2: 40天级稳定箱体内不做趋势回调（480-bar window，更保守）"
    when:
      box_stability_480:
        value_gte: 0.85
    then:
      action: deny
    locked: false
guardrails: []
system_safety: []
