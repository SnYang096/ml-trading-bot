# 多腿联合回测 — chop_grid + trend_scalp 同一账户 timeline (LiveEngine)
#
#   python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260613_multileg_sizing_validate/variant_grid.yaml
#
# 自动：4 segments × backtest_multileg_timeline（共享账户、MockBinanceAPI）

engine: multileg_joint
experiment_id: multileg_sizing_072_20260613_timeline

chop_config: config/experiments/20260613_multileg_sizing_validate/variants/chop_prod/meta.yaml
trend_config: config/experiments/20260613_multileg_sizing_validate/variants/trend_prod/meta.yaml

symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - XRPUSDT
  # HYPEUSDT: trend_scalp 支持；chop_grid 缺 FeatureStore layer，待 compute

timeframe: 2h
execution_timeframe: 1min
initial_capital: 10000
equity: 10000

market_segment_path: config/market_segment.yaml
constitution_yaml: live/highcap/config/constitution/constitution.yaml

segments:
  - bear_2022
  - bull_2023_2024
  - recent_range_to_bear
  - recent_6m_oos

output_dir: results/multileg_joint/sizing_072_20260613_timeline
