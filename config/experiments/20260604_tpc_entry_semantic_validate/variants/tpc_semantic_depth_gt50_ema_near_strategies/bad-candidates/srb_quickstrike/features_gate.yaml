name: srb_gate
description: |
  SRB Gate 特征白名单：SRB 是"关键 SR 成功突破 → 顺势延续"策略,
  结构层留给 prefilter；gate 只放 EMA1200 2b / 执行风险。

feature_pipeline:
  allowed_gate_deny_features:
    # 2b 宏观确认
    - "srb_l3_breakout_ema_*"
    - "srb_l3_breakout_2b_score"
    # 波动率稳定性
    - "vol_persistence"
    - "vol_leverage_asymmetry"
    - "vol_regime_shift*"
    # 尾部风险
    - "stat_evt_var_*"
    - "stat_evt_tail_shape*"
    - "stat_evt_expected_shortfall*"
    - "stat_evt_excess_vol*"
    # Chop / 震荡噪声 (SR 区间内窄 BB 是噪声环境)
    - "bb_width_normalized_pct"
    - "range_compression_*"
