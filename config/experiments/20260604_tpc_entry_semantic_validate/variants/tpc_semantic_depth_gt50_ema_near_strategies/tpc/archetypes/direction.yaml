description: 'TPC 方向 — MACD sign + EMA1200 position band 同侧对齐 | S51: inner_abs=-0.10
  允许 ema_1200 略下方做多'
direction_rules:
- id: tpc_macd_ema1200_align
  method: signal_match_position_band
  description: MACD sign；long pos>-0.10，short pos<0.10（S51 宏回踩带）
  signal_rules:
  - feature: macd_atr
    transform: sign
  position_band:
    feature: ema_1200_position
    inner_abs: -0.1
    outer_abs: 1
