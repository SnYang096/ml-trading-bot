# T5α wall entry v2 — OR tier ablation
#
#   PYTHONPATH=src:scripts python scripts/research/prepare_t5_wall_entry_v2_snapshots.py
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260616_t5_wall_entry_v2_validate/t5_wall_entry_v2_grid.yaml \
#     --quiet-signal-logs

experiment_id: t5_wall_entry_v2_20260616
strategy: tpc
market_segment_path: config/market_segment.yaml
data_path: data/parquet_data
symbols:
  - BTCUSDT
  - ETHUSDT

segment_matrix:
  segments:
    - bear_2022
    - bull_2023_2024
    - recent_range_to_bear
  variants:
    - suffix: E0_prod
      strategies_root: config/strategies
      output_dir: results/tpc/experiments/t5_wall_entry_v2_20260616/E0_prod

    - suffix: W5_or_long2
      strategies_root: config/experiments/20260616_t5_wall_entry_v2_validate/variants/tpc_wall_W5_or_long2_strategies
      output_dir: results/tpc/experiments/t5_wall_entry_v2_20260616/W5_or_long2

    - suffix: W6_or_bull_pullback
      strategies_root: config/experiments/20260616_t5_wall_entry_v2_validate/variants/tpc_wall_W6_or_bull_pullback_strategies
      output_dir: results/tpc/experiments/t5_wall_entry_v2_20260616/W6_or_bull_pullback

    - suffix: W7_or_regime_asym
      strategies_root: config/experiments/20260616_t5_wall_entry_v2_validate/variants/tpc_wall_W7_or_regime_asym_strategies
      output_dir: results/tpc/experiments/t5_wall_entry_v2_20260616/W7_or_regime_asym
