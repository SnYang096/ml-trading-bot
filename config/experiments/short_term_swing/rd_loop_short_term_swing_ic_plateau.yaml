# short_term_swing tree channel rd_loop (mirror fast_scalp pattern)
topic: short_term_swing_ic_plateau
strategy: short_term_swing
output_dir: results/rd_loop/short_term_swing_ic_plateau

research_scans:
  - mode: ic-decay
    strategy: short_term_swing
    features_parquet: results/train_final/short_term_swing/train_final_latest/short_term_swing/features_labeled.parquet
    features: pulse_z,ema_1200_position,vol_persistence
    horizons: "1,3,5,10,20,50"
    target: forward_rr
    out: quick_scan/ic_decay.md

  - mode: snotio-plateau
    strategy: short_term_swing
    layer: entry
    features_parquet: results/train_final/short_term_swing/train_final_latest/short_term_swing/features_labeled.parquet
    feature: pulse_z
    operator: "<="
    grid: "0,1,0.1"
    snotio_mode: proxy
    out: quick_scan/entry_tau_plateau.json

decision_doc:
  topic: short_term_swing_ic_plateau
