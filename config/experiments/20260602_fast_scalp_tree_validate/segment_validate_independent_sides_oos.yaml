# G21 independent long/short trees vs G3 / G7 (OOS only)

experiment_id: fast_scalp_independent_sides_oos_20260604
strategy: fast_scalp
data_path: data/parquet_data
market_segment_path: config/market_segment.yaml

segment_matrix:
  segments: [recent_6m_oos]
  variants:
    - suffix: g3_short_baseline
      strategy: fast_scalp
      strategies_root: config/experiments/20260602_fast_scalp_tree_validate/variants/fast_scalp_alpha_G3_short_regime_off_strategies
      symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
      inject_scores: results/rd_loop/fast_scalp_tree_validate/track_a/scores/h3_baseline_full_history.parquet
      output_dir: results/rd_loop/fast_scalp_tree_validate/segment/independent_sides_oos/g3_short_baseline

    - suffix: g7_dual_head_baseline
      strategy: fast_scalp
      strategies_root: config/experiments/20260602_fast_scalp_tree_validate/variants/fast_scalp_alpha_G7_dual_head_strategies
      symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
      inject_scores: results/rd_loop/fast_scalp_tree_validate/track_a/dual_head/dual_head_event_scores.parquet
      output_dir: results/rd_loop/fast_scalp_tree_validate/segment/independent_sides_oos/g7_dual_head

    - suffix: g21_independent_sides
      strategy: fast_scalp
      strategies_root: config/experiments/20260602_fast_scalp_tree_validate/variants/fast_scalp_alpha_G21_independent_sides_strategies
      symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
      inject_scores: results/rd_loop/fast_scalp_tree_validate/track_a/independent_sides/scores/independent_sides_event_scores.parquet
      output_dir: results/rd_loop/fast_scalp_tree_validate/segment/independent_sides_oos/g21_independent_sides
