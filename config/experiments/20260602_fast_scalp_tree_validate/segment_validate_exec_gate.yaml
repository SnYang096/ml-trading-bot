# Track B — G5 baseline vs G14 g5-label vs G16 g5-label+gate, pooled 6 coin
#
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260602_fast_scalp_tree_validate/segment_validate_exec_gate.yaml

experiment_id: fast_scalp_tree_validate_exec_gate_20260602
strategy: fast_scalp
data_path: data/parquet_data
market_segment_path: config/market_segment.yaml

segment_matrix:
  segments: [bear_2022, bull_2023_2024, recent_range_to_bear, recent_6m_oos]
  variants:
    - suffix: g5_h3_baseline
      strategy: fast_scalp
      strategies_root: config/experiments/20260602_fast_scalp_tree_validate/variants/fast_scalp_alpha_G5_short_regimeoff_tight_exec_strategies
      symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
      output_dir: results/rd_loop/fast_scalp_tree_validate/segment/track_b/g5_baseline

    - suffix: g14_g5label
      strategy: fast_scalp
      strategies_root: config/experiments/20260602_fast_scalp_tree_validate/variants/fast_scalp_alpha_G14_g5label_g5exec_strategies
      symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
      inject_scores: results/rd_loop/fast_scalp_tree_validate/track_b/scores/g5label_full_history.parquet
      output_dir: results/rd_loop/fast_scalp_tree_validate/segment/track_b/g14_g5label

    - suffix: g16_g5label_gate
      strategy: fast_scalp
      strategies_root: config/experiments/20260602_fast_scalp_tree_validate/variants/fast_scalp_alpha_G16_g5label_g5exec_gate_strategies
      symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
      inject_scores: results/rd_loop/fast_scalp_tree_validate/track_b/scores/g5label_full_history.parquet
      output_dir: results/rd_loop/fast_scalp_tree_validate/segment/track_b/g16_g5label_gate
