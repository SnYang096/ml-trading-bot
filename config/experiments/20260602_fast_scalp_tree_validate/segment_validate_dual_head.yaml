# Track A — dual head G7 vs short-only G3, pooled 6 coin, four segments
#
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260602_fast_scalp_tree_validate/segment_validate_dual_head.yaml

experiment_id: fast_scalp_tree_validate_dual_head_20260602
strategy: fast_scalp
data_path: data/parquet_data
market_segment_path: config/market_segment.yaml

segment_matrix:
  segments: [bear_2022, bull_2023_2024, recent_range_to_bear, recent_6m_oos]
  variants:
    - suffix: g3_short_regimeoff_baseline
      strategy: fast_scalp
      strategies_root: config_experiments/fast_scalp_alpha_G3_short_regime_off_strategies
      symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
      inject_scores: results/rd_loop/fast_scalp_tree_validate/track_a/scores/h3_baseline_full_history.parquet
      output_dir: results/rd_loop/fast_scalp_tree_validate/segment/track_a/g3_baseline

    - suffix: g7_dual_head
      strategy: fast_scalp
      strategies_root: config_experiments/fast_scalp_alpha_G7_dual_head_strategies
      symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
      inject_scores: results/rd_loop/fast_scalp_tree_validate/track_a/dual_head/dual_head_event_scores.parquet
      output_dir: results/rd_loop/fast_scalp_tree_validate/segment/track_a/g7_dual_head
