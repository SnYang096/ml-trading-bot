# OOS-only quick read for G19/G20 vs G3 (run while full matrix continues).

experiment_id: fast_scalp_tree_validate_both_sides_oos
strategy: fast_scalp
data_path: data/parquet_data
market_segment_path: config/market_segment.yaml

segment_matrix:
  segments: [recent_6m_oos]
  variants:
    - suffix: g3_short_baseline
      strategy: fast_scalp
      strategies_root: config_experiments/fast_scalp_alpha_G3_short_regime_off_strategies
      symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
      inject_scores: results/rd_loop/fast_scalp_tree_validate/track_a/scores/h3_baseline_full_history.parquet
      output_dir: results/rd_loop/fast_scalp_tree_validate/segment/both_sides_oos/g3_short_baseline

    - suffix: g19_h3_both_sides
      strategy: fast_scalp
      strategies_root: config_experiments/fast_scalp_alpha_G19_h3_both_sides_strategies
      symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
      inject_scores: results/rd_loop/fast_scalp_tree_validate/track_a/scores/h3_baseline_full_history.parquet
      output_dir: results/rd_loop/fast_scalp_tree_validate/segment/both_sides_oos/g19_h3_both_sides

    - suffix: g20_h3_both_ema_regime
      strategy: fast_scalp
      strategies_root: config_experiments/fast_scalp_alpha_G20_h3_both_sides_ema_regime_strategies
      symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
      inject_scores: results/rd_loop/fast_scalp_tree_validate/track_a/scores/h3_baseline_full_history.parquet
      output_dir: results/rd_loop/fast_scalp_tree_validate/segment/both_sides_oos/g20_h3_both_ema_regime
