# Single-leg execution driven directly by tree `score`.
# Promote τ_long / τ_short from holdout plateau (see
# docs/strategy/短期树独立策略_设计与落地_CN.md §5.3) — do NOT optimize here.

backtest:
  enabled: true
  params:
    price_col: close
    freq: "120T"
    use_signal_direction: true
    # Holdout τ scan (6 coins, 2025-10→2026-04): best Sharpe at q=0.05
    # pred long≥~0.375, short≤~-0.002 (signed forward-RR score, not 0–1 proba)
    top_quantile: 0.05
    bottom_quantile: 0.05
    entry_mode: cross
    entry_exit_conflict: block_entry_on_exit
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
    max_holding_bars: 6             # ≈ 2× H to give the regressor room
    allow_flip: false
    use_trailing_stop: true
    trailing_atr_mult: 1.5
    atr_col: atr
    atr_window: 14
    pyramiding:
      enabled: false
    position_sizing:
      type: atr_risk
      risk_pct: 0.005               # tighter than B (0.01)
      atr_col: atr
      atr_window: 14
      max_size_cap: 5
