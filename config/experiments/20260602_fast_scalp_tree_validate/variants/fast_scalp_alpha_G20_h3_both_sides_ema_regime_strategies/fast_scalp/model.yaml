# Shallow LightGBM regressor — BTC/ETH-only majors slug.

name: fast_scalp_majors

trainer:
  module: src.time_series_model.strategies.models.strategy_trainer
  function: train_strategy_model
  params:
    model_type: lightgbm
    task_type: regression
    target_col: label
    n_splits: 5
    tscv_gap: 6
    use_gpu: false
    model_params:
      objective: regression_l1
      n_estimators: 400
      learning_rate: 0.03
      num_leaves: 15
      max_depth: 4
      min_data_in_leaf: 200
      feature_fraction: 0.7
      bagging_fraction: 0.7
      bagging_freq: 5
      seed: 42

prediction:
  method: ensemble_mean
  model_type: lightgbm

output:
  save_results: true
  filename: results.json

volatility_model:
  enabled: false
