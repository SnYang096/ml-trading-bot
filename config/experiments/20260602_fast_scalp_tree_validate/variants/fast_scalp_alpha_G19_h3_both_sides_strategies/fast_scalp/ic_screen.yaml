# =============================================================================
# IC screen — fast_scalp (holdout feature selection)
# =============================================================================
# Used by:  mlbot research ic-prune --strategy fast_scalp
#           rd_loop tree_steps mode=ic-prune (defaults from this file)
#
# Human rule (design doc §5.1):
#   1. Scan rank IC at every horizon in `horizons`
#   2. Keep column only if |rank_ic| PEAK is in allowed_best_lags
#   3. Require |IC| >= min_ic
#   4. Reject if peak lands on reject_peak_at (slow trend → wrong slug)
#
# Label alignment (labels.yaml): signed forward RR @ H=3 bars
# Prepare pool: features.yaml requested_features (before ic-prune writeback)
# =============================================================================

ic_screen:
  target: label
  label_horizon_bars: 3

  horizons: [1, 2, 3, 4, 5, 10, 20, 50]
  allowed_best_lags: [1, 3, 5]
  max_lag: 5
  min_ic: 0.02
  min_n: 200
  reject_peak_at: 50

  writeback:
    mode: columns
    top_n_columns: 20
    always_include: [atr_f]
    invert_mode: none
