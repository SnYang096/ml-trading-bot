# G7 dual-head only — fast path (G3 baseline is trade-heavy/slow, run separately)
#
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/20260602_fast_scalp_tree_validate/segment_validate_g7_only.yaml

experiment_id: fast_scalp_tree_validate_g7_only_20260602
strategy: fast_scalp
data_path: data/parquet_data
market_segment_path: config/market_segment.yaml

segment_matrix:
  segments: [bear_2022, bull_2023_2024, recent_range_to_bear, recent_6m_oos]
  variants:
    - suffix: g7_dual_head
      strategy: fast_scalp
      strategies_root: config_experiments/fast_scalp_alpha_G7_dual_head_strategies
      symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
      inject_scores: results/rd_loop/fast_scalp_tree_validate/track_a/dual_head/dual_head_event_scores.parquet
      output_dir: results/rd_loop/fast_scalp_tree_validate/segment/track_a/g7_dual_head_fast
