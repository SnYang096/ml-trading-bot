name: lottery100

# 占位模型配置：当前 lottery100 主流程不走 NN/SHAP，
# 保留此文件仅为与常规策略目录结构一致，降低认知切换成本。
trainer:
  module: src.time_series_model.strategies.models.strategy_trainer
  function: train_strategy_model
  params:
    model_type: lightgbm
    task_type: binary
    target_col: success_label
    n_splits: 5
    tscv_gap: 24
    use_gpu: false
    model_params:
      n_estimators: 400
      learning_rate: 0.05
      num_leaves: 31
      max_depth: -1
      feature_fraction: 0.8
      bagging_fraction: 0.8
      bagging_freq: 5
      seed: 42

prediction:
  method: ensemble_mean
  model_type: lightgbm

output:
  save_results: true
  filename: results.json
