# RMR Entry Filter: 位置远离中轴 × 动能衰竭 × 订单流吸收反转（OR 两个对称分支）
#
# 与 FBF 的区别：
#   - FBF 必须有 fer_sr_failed_breakout_score ≥ 阈值（事件门）。
#   - RMR **不要求**任何突破事件；只要「位置极端 + 动能已翻向中轴 + 订单流吸收反转」即可。
#
# v2 (2026-04-20): 首跑 baseline 实现 R:R 只有 1.22:1（目标 1.88:1），胜率 40.7%
# 低于盈亏平衡线 45%。追加两条订单流吸收反转条件提高入场质量：
#   • dual_exhaustion_score：fer × vpin 双源力竭共振
#   • cvd_divergence_score_pct：极值处 CVD 背离（订单流吸收信号）

filters:
  - id: rmr_short_from_upper
    enabled: true
    locked: true
    description: "做空回中轴：价格区间高位 + 动能转弱 + 订单流在顶部吸收多单"
    conditions:
      - feature: fer_range_pos_20
        operator: ">="
        value: 0.70
      - feature: macd_atr
        operator: "<="
        value: 0.0
      - feature: rsi
        operator: "<="
        value: 68
      - feature: bars_since_local_high
        operator: ">="
        value: 0.08
      - feature: dual_exhaustion_score
        operator: ">="
        value: 0.12
      - feature: cvd_divergence_score_pct
        operator: ">="
        value: 0.45
    notes: "semantic anchor: price high in range + momentum roll-over + orderflow absorption → revert to center"

  - id: rmr_long_from_lower
    enabled: true
    locked: true
    description: "做多回中轴：价格区间低位 + 动能转强 + 订单流在底部吸收空单"
    conditions:
      - feature: fer_range_pos_20
        operator: "<="
        value: 0.30
      - feature: macd_atr
        operator: ">="
        value: 0.0
      - feature: rsi
        operator: ">="
        value: 32
      - feature: bars_since_local_low
        operator: ">="
        value: 0.08
      - feature: dual_exhaustion_score
        operator: ">="
        value: 0.12
      - feature: cvd_divergence_score_pct
        operator: ">="
        value: 0.45
    notes: "semantic anchor: price low in range + momentum roll-up + orderflow absorption → revert to center"

combination_mode: or
