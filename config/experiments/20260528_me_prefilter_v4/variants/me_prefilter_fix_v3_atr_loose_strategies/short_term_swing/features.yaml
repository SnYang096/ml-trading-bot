# short_term_swing features — only columns whose IC peaks at lag ∈ {10,20} bars.
#
# Validation smoke (2026-05-26): ic-decay on SYNTHETIC parquet had no |IC|>0.02;
# wpt_scene_trend_a/b/chop are not separate pipeline outputs — use wpt_scene_semantic_scores_f.
#
# Populate this list ONLY after running:
#   mlbot analyze factor-eval --strategy short_term_swing --ic-decay-lags 1,3,5,10,20,50
# and keeping features with best_lag ∈ [10,20] AND |rank_ic| > 0.015 on holdout.
#
# Below is the starting hypothesis (must be refined by IC table before training).

name: short_term_swing
description: |
  Medium-horizon direction tree (lag 10–20). wpt_scene_* hypothesis columns collapse to
  wpt_scene_semantic_scores_f until independent nodes exist.

feature_pipeline:
  exclude_columns:
    - atr
  requested_features:
    - ema_1200_position_f
    - ema_1200_slope_f
    - trend_confidence_f
    - hurst_price_f
    - bb_width_normalized_pct_f
    - macd_atr_f
    - wpt_scene_semantic_scores_f
    - volatility_regime_f
    - atr_percentile_f
