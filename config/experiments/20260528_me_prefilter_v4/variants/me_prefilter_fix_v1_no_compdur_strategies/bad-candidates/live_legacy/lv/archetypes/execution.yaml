version: 2
execution_constraints:
  allow_add_on: false
  min_order_interval_minutes: 5
stop_loss:
  type: trailing
  initial_r: 0.5
  trailing:
    activation_r: 0.3
    trail_r: 0.3
    step_r: 0.3
take_profit:
  enabled: true
  target_r: 2.5
holding:
  max_holding_bars: 20
  time_stop_bars: 20
tiers:
  enabled: true
  levels:
  - name: 强证据
    evidence_min: 0.7
    stop_loss:
      initial_r: 0.6
      trailing:
        activation_r: 0.3
        trail_r: 0.3
    size_multiplier: 1.2
    time_stop_bars: 30
  - name: 中等证据
    evidence_min: 0.5
    stop_loss:
      initial_r: 0.8
      trailing:
        activation_r: 0.5
        trail_r: 0.5
    size_multiplier: 1.0
    time_stop_bars: 20
  - name: 弱证据
    evidence_min: 0.3
    stop_loss:
      initial_r: 1.0
      trailing:
        activation_r: 0.8
        trail_r: 0.8
    size_multiplier: 0.7
    time_stop_bars: 15
optimization:
  enabled: true
  params:
    stop_loss.initial_r:
      range:
      - 0.5
      - 1.5
      step: 0.25
    stop_loss.trailing.activation_r:
      range:
      - 0.3
      - 1.0
      step: 0.25
    stop_loss.trailing.trail_r:
      range:
      - 0.3
      - 1.0
      step: 0.25
