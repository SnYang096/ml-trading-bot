# CDR strategy-level execution fallback.
# archetypes/execution.yaml is the authoritative runtime preset.

version: 1

execution_constraints:
  allow_add_on: false
  min_order_interval_minutes: 30

stop_loss:
  type: fixed
  initial_r: 1.35

take_profit:
  enabled: true
  target_r: 3.2

holding:
  max_holding_bars: null
  time_stop_bars: 72
