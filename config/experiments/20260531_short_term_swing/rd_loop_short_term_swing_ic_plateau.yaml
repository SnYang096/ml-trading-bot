# short_term_swing: slow-IC pool + best_lag ∈ {10,20} → train → holdout τ
#
#   PYTHONPATH=src:scripts python scripts/rd_loop.py \
#     --hypothesis-yaml config/experiments/20260531_short_term_swing/rd_loop_short_term_swing_ic_plateau.yaml

topic: short_term_swing_ic_plateau
strategy: short_term_swing
output_dir: results/rd_loop/short_term_swing_ic_plateau
timeframe: "120T"
feature_store_layer: features_tree_full_120T_958f665062
data_path: data/parquet_data

holdout: &holdout
  start: "2025-10-01"
  end: "2026-04-01"

symbols_6: &symbols_6 BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT
train_dates: &train_dates
  start_date: "2024-01-01"
  end_date: "2026-04-01"
  holdout_start_date: "2025-10-01"
  holdout_end_date: "2026-04-01"

prepare_root: &prepare_root results/train_final/short_term_swing/prepare_wide_all_20260531
train_root: &train_root results/train_final/short_term_swing/train_ic_screen_6cols_20260531

tree_steps:
  - mode: prepare-only
    enabled: false
    config: config/strategies/tree_strategies/short_term_swing
    features: config/strategies/_shared/features_all.yaml
    symbols: *symbols_6
    <<: *train_dates
    output_root: *prepare_root

  - mode: ic-prune
    config: config/strategies/tree_strategies/short_term_swing
    features_parquet: results/train_final/short_term_swing/prepare_wide_all_20260531/short_term_swing/features_labeled.parquet
    out: ic_prune_ic_screen_h50_6cols
    # IC rules → ic_screen.yaml (horizons incl. H=50 → 6 cols pass)

  - mode: train
    config: config/strategies/tree_strategies/short_term_swing
    symbols: *symbols_6
    <<: *train_dates
    output_root: *train_root

  - mode: tau-scan
    config: config/strategies/tree_strategies/short_term_swing
    predictions: results/train_final/short_term_swing/train_ic_screen_6cols_20260531/short_term_swing/predictions.parquet
    out: holdout_rr_ic_screen_6cols
    segment_label: recent_holdout
    quantile_grid: "0.05,0.08,0.10,0.15,0.20,0.25,0.30"
    filter_split: holdout

# Run after prepare exists (rd_loop runs research_scan before tree_pipeline):
# research_scans:
#   - mode: ic-decay
#     ...
