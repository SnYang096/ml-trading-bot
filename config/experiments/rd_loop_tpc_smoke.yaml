# Example hypothesis for scripts/rd_loop.py (smoke / documentation).
topic: tpc_rd_loop_smoke
strategy: tpc
output_dir: results/rd_loop/tpc_smoke

quick_layer_scans:
  - mode: condition-set
    features_parquet: results/train_final/tpc/features_labeled.parquet
    label: success_no_rr_extreme
    filter:
      - tpc_semantic_chop<=0.4
    condition:
      - "H: abs(ema_1200_position)>0.10"
    bucket_by: ema:ema_1200_position@0.10
    out: quick_scan/condition_set_bucketed.md

variant_grid: config/experiments/tpc_variant_grid_smoke.yaml

decision_doc:
  topic: tpc_rd_loop_smoke
  topic_template: default
  experiment_index: results/tpc/experiments/EXPERIMENT_INDEX.json
  out: decision_doc_skeleton.md
