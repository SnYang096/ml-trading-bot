# TPC direction-EMA align promote 验证 — 6 币 bull + recent 双段
#
# 跑法:
#   PYTHONPATH=src:scripts python -m scripts.event_backtest \
#     --variant-grid config/experiments/tpc/tpc_direction_align_promote_6coin.yaml \
#     --quiet-signal-logs

experiment_id: tpc_direction_align_promote_6coin_20260529
strategy: tpc
symbols:
  - BTCUSDT
  - ETHUSDT
  - BNBUSDT
  - ADAUSDT
  - SOLUSDT
  - XRPUSDT
trading_map: true

runs:
  - variant: align_bull_2023_2024_6coin
    strategies_root: config/strategies
    start_date: "2023-01-01"
    end_date: "2025-01-01"
    output_dir: results/tpc/experiments/direction_align_promote/bull_2023_2024

  - variant: align_recent_6coin
    strategies_root: config/strategies
    start_date: "2025-04-01"
    end_date: "2026-04-01"
    output_dir: results/tpc/experiments/direction_align_promote/recent
