# TPC Gate — G10 variant (G1 base + vol_leverage low-tail monotonic test)
# Purpose: Final validation of single-sided vol_leverage_asymmetry < 0.03 (bull only)
# Base: G1 (both bull vol mid-band rules disabled) + re-enable vol_lev as low-tail only
# This tree is ONLY for the 20260601_1130_tpc_gate_final_lock experiment.

schema:
  phases:
  - system_safety
  - hard_gate
  - guardrail
  evaluation_order: system_safety -> hard_gate -> guardrail
  governance:
    selection_method: gate_score (Youden's J = tail_capture - good_deny_rate)
    min_gate_score: 0.0
    alert_threshold: 0.25
# chop 上限在 gate（方向之后 veto）；宏观 EMA1200 见 archetypes/regime.yaml。
hard_gates:
- id: gate_tpc_semantic_chop_high
  tag: HARD_TPC_SEMANTIC_CHOP
  phase: hard_gate
  priority: 6
  reason: "高 chop 不追趋势回调（与 BPC/ME/SRB regime chop 口径 0.40 对齐）"
  when:
    tpc_semantic_chop:
      value_gt: 0.4
  then:
    action: deny
  locked: true
  promote_never_disable: true
  lock_reason: "波动区过滤 — 高 chop bar 上虚假回调/来回扫（TPC gate；宏观带由 regime EMA1200）"
guardrails: []
system_safety:
- id: gate_vol_persistence_vol_persistence_bull_only
  tag: HARD_VOL_PERSISTENCE_VOL_PERSISTENCE
  phase: system_safety
  priority: 12
  reason: "统计验证规则 (lift=1.24)；regime-conditional：仅在 ema_1200_position>0.10 强多头时启用，bear 段允许通过以避免误杀"
  when:
    all_of:
    - vol_persistence:
        value_gt: 0.0029
    - vol_persistence:
        value_lt: 0.0616
    - ema_1200_position:
        value_gt: 0.10
  then:
    action: deny
  comment: 'G10 tree: kept disabled (G1 baseline)'
  locked: true
  lock_reason: "波动率持久性：低波噪声切换/拖泥带水期对趋势策略不利（仅 bull 段）"
  disabled: true
  disabled_reason: 'G1 baseline — vol_persist mid-band rejected (label + backtest)'

- id: gate_tpc_vol_leverage_asymmetry_low_tail_bull
  tag: HARD_TPC_VOL_LEVERAGE_ASYMMETRY
  phase: system_safety
  priority: 13
  reason: "Final monotonic candidate (20260601): vol_leverage extreme low tail in strong bull — last chance for any vol_* gate"
  when:
    all_of:
    - vol_leverage_asymmetry:
        value_lt: 0.03
    - ema_1200_position:
        value_gt: 0.10
  then:
    action: deny
  locked: true
  promote_never_disable: true
  lock_reason: "波动杠杆非对称极低尾单边（仅 bull 段）"
  comment: 'G10: vol_leverage < 0.03 + ema_strong_bull only. If this beats G1 on total R across all three market segments, promote as final gate rule; else delete ALL remaining vol_* gates from TPC.'
  disabled: false
