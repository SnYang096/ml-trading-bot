version: 1
name: "ood_config"

# OOD Head / Survival Head outputs are treated as *safety controls*:
# - They MUST NOT directly decide direction.
# - They MAY affect: NOTRADE, size_cap, cooldown, kill/revive state machine.
#
# This config is used by:
# - research counterfactual report (prove kill/revive reduces extinction risk)
# - live MetaRouterStrategy (same semantics; fail-closed)

labels:
  # Horizon definition for supervised labels (bars of the decision timeframe).
  # Example: 10-min timer on 15T bars -> horizon_bars=20 ~ 5 hours.
  ood_horizon_bars: 20
  survival_horizon_bars: 50

aggregation:
  # Combine multiple weak supervision sources into a single binary y_ood label.
  # y_ood = OR(source_i)
  y_ood_or_sources:
    - domain_time_split
    - extinction_replay
    - synthetic_shift

thresholds:
  # These are *operating points* on the learned ood_score/survival_prob.
  # They can be plateau-tuned later, but should form a wide, stable safety plateau.
  ood_degrade_ge: 0.60
  ood_halt_ge: 0.80

  survival_degrade_le: 0.40
  survival_halt_le: 0.25

revive:
  # Revive thresholds are stricter than kill thresholds (hysteresis).
  # If score is below these for long enough -> revive.
  ood_revive_le: 0.35
  survival_revive_ge: 0.60

  # Phase-based revive schedule (size caps).
  phases:
    phase1:
      size_multiplier: 0.3
      duration_bars: 20
    phase2:
      size_multiplier: 0.6
      duration_bars: 20
    phase3:
      size_multiplier: 1.0
      duration_bars: 0

size_cap:
  # Mapping from (ood_score, survival_prob) -> size_cap multiplier.
  # Must be monotone: higher ood => lower cap; higher survival => higher cap.
  #
  # Default formula used in research docs:
  #   size = base_size * router_conf * survival^2 * (1-ood)^2
  use_power_formula: true
  survival_power: 2.0
  ood_power: 2.0

  # Hard clamp (safety)
  min_cap: 0.0
  max_cap: 1.0

dashboard:
  # LiveDashboard "enhanced 5 numbers" contract keys.
  keys:
    - ood_score
    - top_archetype_survival_prob
    - active_archetype
    - size_cap
    - kill_switch_state

