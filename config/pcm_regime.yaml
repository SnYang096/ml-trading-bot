# ================================================================
# PCM Regime Configuration — 单一优先级制 (v2)
# ================================================================
# v2 变更: 移除 Override 层，统一为每个 Regime 一个确定性优先级
#
# 变更原因 (v1 → v2):
#   v1 同时有 Layer 2 (Regime 优先级) 和 Layer 3 (Override 覆盖)，
#   两层对同一冲突给出相反结论:
#     - NORMAL Layer 2: BPC > ME > FER
#     - Override Layer 3: FER 覆盖 ME, ME 覆盖 BPC (即 FER > ME > BPC)
#   代码先查 Override 再走 Layer 2，Override 条件宽松 (FER evidence ≥ 0.6)，
#   实际上 Layer 2 排序在大多数冲突场景下被 Override 架空。
#   v2 合并为单一优先级，消除语义矛盾。
#
# 设计原则 (v2):
#   1. 每个 Regime 只有一个确定性优先级列表
#   2. 优先级按"信号条件严格性"排序（越严格越优先）
#      LV (liquidation cluster + OI 异常) > FER (均衡偏离反转) > ME (动能扩张) > BPC (趋势延续)
#   3. BPC 作为"骨架"靠触发频率 (94% 交易来自 BPC/FER)，不靠冲突优先级
#   4. 冲突率仅 5.52%，绝大部分时间只有一个信号触发，优先级不影响
#
# Archetype 角色:
#   - BPC = equity 曲线骨架（稳定现金流，高频触发）
#   - ME  = 收益分布右尾增强器
#   - FER = 均衡偏离反转
#   - LV  = 中断型信号（最高优先级，最严格条件）
#
# 状态机:
#   NORMAL       → 常态，按条件严格性排序
#   HIGH_VOL     → 高波动扩张期，ME 提升至 FER 之上
#   HIGH_LEVERAGE → 高杠杆脆弱期，与 NORMAL 相同（LV 已在首位）
# ================================================================

version: 2

# ── 3 个 Regime 的优先级定义 ──
# 列表顺序 = 优先级（索引越小越优先）
# 决策依据: 信号条件严格性（越严格的 archetype 触发越稀有，冲突时应被尊重）
regimes:
  NORMAL:
    description: "常态：按条件严格性排序"
    priority: ["LV", "FER", "ME", "BPC"]

  HIGH_VOL:
    description: "高波动扩张：ME 擅长的环境，提升至 FER 之上"
    priority: ["LV", "ME", "FER", "BPC"]

  HIGH_LEVERAGE:
    description: "高杠杆脆弱：LV 最高优先（与 NORMAL 相同，语义强调）"
    priority: ["LV", "FER", "ME", "BPC"]

# ── 默认 Regime ──
default_regime: "NORMAL"

# ── Regime 检测阈值 ──
# 检测顺序：HIGH_LEVERAGE → HIGH_VOL → NORMAL（优先匹配严格条件）
detection:
  HIGH_LEVERAGE:
    # OI 异常高 + 资金费率极端 → 清算风险
    conditions:
      - feature: "oi_zscore"
        operator: ">"
        threshold: 1.5
      - feature: "funding_rate_abs_zscore"
        operator: ">"
        threshold: 2.0
    # 所有条件必须同时满足
    logic: "AND"

  HIGH_VOL:
    # ATR 百分位高 → 波动扩张期
    conditions:
      - feature: "atr_percentile"
        operator: ">"
        threshold: 0.7
    logic: "AND"

# ── Regime 切换防抖 ──
# 防止频繁切换（至少保持 N 根 bar 才允许切换）
min_bars_in_regime: 3

# ── Slot 配置 ──
max_slots: 2

# ── 各 Archetype 固定风险参数（不随 regime 变化）──
archetype_risk:
  BPC:
    max_risk_per_trade: 0.015   # 1.5% 每笔
    max_concurrent: 2
  ME:
    max_risk_per_trade: 0.015
    max_concurrent: 2
  FER:
    max_risk_per_trade: 0.015
    max_concurrent: 2
  LV:
    max_risk_per_trade: 0.010   # LV 低 budget, 1.0% 每笔
    max_concurrent: 1           # LV 快进快出，最多 1 个
