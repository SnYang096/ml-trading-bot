# Portfolio Assets v1 (YAML-first)
#
# Goal: Portfolio layer allocates capital to a small number of "distribution assets",
# not to the cartesian product of (symbol x strategy).
#
# This file defines:
# - the 5 portfolio assets
# - deterministic mapping from Router aggregate signals -> asset weights
# - TREND ZERO LAW (hard rules forcing GLOBAL_TREND weight to 0)
#
# Note: current system may not produce all router signals (crowding/regime_entropy/etc).
# Missing fields should be treated conservatively (i.e., disable risky assets).

version: 1
name: "portfolio_assets_v1"

assets:
  GLOBAL_TREND:
    max_weight: 0.40
    can_be_zero: true
    distribution: "right_skewed"
    risk_type: "regime_sensitive"
  GLOBAL_MEAN:
    max_weight: 0.35
    min_weight: 0.20
    can_be_zero: false
    distribution: "compact"
    risk_type: "trend_crowding"
  GLOBAL_CASH:
    min_weight: 0.10
    max_weight: 1.00
    distribution: "zero_return"
    risk_type: "opportunity_cost"
  HIGH_BETA_OVERLAY:
    max_weight: 0.10
    can_be_zero: true
    distribution: "extreme_right_tail"
    risk_type: "crash"
  DEFENSIVE_MEAN:
    max_weight: 0.25
    can_be_zero: true
    distribution: "low_vol"
    risk_type: "slow_bleed"

router_to_weights:
  # Inputs expected (0..1 unless otherwise noted):
  # - p_trend, p_mean, p_notrade (sum ~ 1)
  # - confidence (0..1)
  # - regime_entropy (0..1) where higher means more uncertain / mixed regime
  # - crowding_score (0..1) where higher means more crowded / microstructure risk

  global_trend:
    p_trend_min: 0.60
    regime_entropy_max: 0.40
    max_weight: 0.40
    crowding_penalty: true

  global_mean:
    base_floor: 0.20
    max_weight: 0.35

  global_cash:
    min_weight: 0.10

  high_beta_overlay:
    p_trend_min: 0.75
    crowding_max: 0.30
    confidence_min: 0.70
    max_weight: 0.10

  defensive_mean:
    regime_entropy_min: 0.50
    max_weight: 0.25

trend_zero_law:
  # Any satisfied rule => GLOBAL_TREND weight is forced to 0.
  rules:
    - name: "uncertainty_high"
      regime_entropy_gt: 0.45
    - name: "cross_symbol_trend_inconsistent"
      # If key symbols disagree on trend, force cash (avoid classic blow-up condition).
      require_key_symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT"]
    - name: "gate_veto"
      gate_veto_required: true
    - name: "portfolio_dd_protection"
      portfolio_drawdown_gt: 0.12

