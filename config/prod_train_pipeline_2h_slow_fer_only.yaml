# ============================================================
# 上线前训练流水线 (2H, FER-only, 慢模式 / slow_realistic)
# 底稿: prod_train_pipeline_2h_slow_fbf_only.yaml 的 rolling / SHAP / 快环契约
#       + prod_train_pipeline_2h_turbo_2024bull_thresholds_only_fer_only.yaml 的 strategies.fer
#
# FER 语义说明（与仓库实现一致）:
#   - 代码层 archetype 仍是 FailureExhaustionReversal（单边推进失败 → 反向清算）。
#   - 「偏离长期均线 → 推进无力 → 反转」在配置层见 archetypes/prefilter.yaml：
#     sma_200_position、fer_momentum_efficiency_decay、fer_efficiency_flip 与 locked FER 原子 AND。
#
# 示例:
#   mlbot pipeline run --all --config config/prod_train_pipeline_2h_slow_fer_only.yaml --stage rolling_sim
#   mlbot pipeline run --all --config config/prod_train_pipeline_2h_slow_fer_only.yaml --stage rolling_sim --skip-shap
#   mlbot pipeline run --all --config config/prod_train_pipeline_2h_slow_fer_only.yaml --stage fast_month --month 2024-11
#
# locked_threshold_tuning: 对 archetypes/prefilter.yaml 中带 locked 的 4 条 FER 原子规则
# 用 search_space + writeback_bindings 网格搜索（见 strategies.fer.kpi_gates.prefilter）。
# 调参子进程固定带 --skip-shap，避免每个 case 全量 SHAP。
# ============================================================

dates:
  start_date: "2022-08-01"
  end_date: "2026-03-31"
  # end=2026-03-31, holdout=26 → holdout_start=2024-01-01；rolling 月约 202401～202603（与 TPC 管线对齐）
  holdout_months: 26
  validation_months: 3

training:
  seeds:
    - 42
  seed_selection: best_sharpe

global_toggles:
  locked_threshold_tuning_enabled: true

strategy_scope:
  direction: all

rolling:
  mode: slow_realistic
  windows:
    calibration_months: 3
    structure_lookback_months: 12
  slow_realistic:
    cadence_months: 3
    triggered_retrain_enabled: true
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    disable_feature_search: true

fast_loop:
  step_months: 1
  threshold_calibration:
    enabled: true
  prefilter:
    optimize: true
  symbol_threshold_calibration:
    enabled: true
  execution_opt:
    enabled: false
  pcm_eval:
    enabled: false
  direction_tuning:
    enabled: true
    compare_features: true
    promote_after_validate: true

symbol_policy:
  mode: hybrid_carry_forward
  carry_forward_ttl_months: 2
  enable_threshold: 0.0
  min_symbol_trades_soft: 10
  carry_forward_hard_fail_rules:
    min_sharpe_r: -0.25

direction_stack:
  mode: ema200
  ema_debounce_bars: 3
  vwap_window_days: 20

slot_allocation:
  mode: quality_ranked
  max_symbols_per_side: 2
  reserve_slots_for_secondary_symbols: 1
  slot_opportunity_penalty: 0.001
  quality_score_weights:
    history_edge: 0.55
    now_strength: 0.45
  quality_lookback_months: 3

stitching:
  enabled: true
  metrics: [sharpe, max_drawdown, total_r, near_stop_rate, slot_full_rate]
  export_trade_map_html: true

event_backtest:
  enabled: true
  promote: true
  map_extra_months: 4
  sym_r_default: "1.0:1:6.0"
  sym_r_by_family:
    fer: "2:1:4"
  exec_objective_default: sharpe
  exec_objective_params:
    near_stop_threshold_r: -0.9
    near_stop_penalty: 0.0
    max_dd_penalty: 0.0
    min_trades_soft: 0
    undertrade_penalty: 0.0

pcm_slot_grid:
  enabled: false
  plateau_delta: 0.03
  min_trades_soft: 80
  penalties:
    max_dd_penalty: 0.02
    slot_full_rate_penalty: 0.20
    undertrade_penalty: 0.001
  cases: []

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap

data_path: data/parquet_data

download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data

strategies:
  fer:
    config: config/strategies/fer
    features_gate: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.05
        min_rows: 300
        target_trades_min: 40
        target_trades_max: 140
        trade_penalty_low: 0.0021
        trade_penalty_high: 0.0014
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: true
          mode: auto_if_locked
          skip_if_cached: true
          # 0 = 不截断，枚举完 search_space 笛卡尔积（下方 2×2×2×2 = 16 组）
          max_cases: 0
          min_trades_target: 70
          trade_penalty: 0.0025
          # 当前 prefilter 为 impulse/absorption/OLS/SR 语义，不用旧版 fer_signed_efficiency 网格
          fer_eff_pct_lower_values: 0.0,0.05
          fer_eff_pct_upper_values: 0.30,0.40
          sr_strength_min_values: 0.45,0.55
          dist_to_sr_atr_max_values: 0.8,1.0
          sqs_quality_min_values: 0.50,0.60
          writeback_bindings:
            - { param: fer_imp_min, feature: fer_impulse_failure_score, operator: ">=" }
            - { param: fer_abs_min, feature: fer_aggressor_absorption, operator: ">=" }
            - { param: fer_ols_w_min, feature: fer_ols_width_norm, operator: ">=" }
            - { param: sr_min_bound, feature: sr_strength_max, operator: ">=" }
          search_space:
            fer_imp_min: [0.09, 0.11]
            fer_abs_min: [0.34, 0.40]
            fer_ols_w_min: [0.18, 0.24]
            sr_min_bound: [0.32, 0.36]
          writeback_strict: true
          target_trades_min: 40
          target_trades_max: 140
          trade_penalty_low: 0.0021
          trade_penalty_high: 0.0014
          stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
      entry_filter:
        meta_algorithm: false
        archetype_plateau: true
        significance_p: 0.10
        significance_min_trades: 4
        plateau_window: 4
        archetype_scoring_method: distribution_ks
        target_trades_min: 40
        target_trades_max: 140
        trade_penalty_low: 0.0021
        trade_penalty_high: 0.0014
        stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        min_score_improvement: 0.008
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.38
        stat_fallback_on_empty: true
        stat_fallback_max_rules: 3
        stat_fallback_min_source_features: 2
      backtest:
        min_trades: 50
      deploy:
        min_trades: 50
    simple_execution:
      sl_r: 3.0
      tp_r: 6.0
      timeout_bars: 120

shap_feature_selection:
  enabled: true
  n_folds: 8
  top_k: 20
  stability_threshold: 0.8
  min_stable_features: 1
  protected_nodes:
    - atr_f
  apply_to:
    - features.yaml

comparison:
  min_trades: 10
  sharpe_adopt_ratio: 0.7
  sharpe_reject_floor: 0.0
  threshold_drift_warn: 1.0

retrain_triggers:
  schedule_days: 90
  sharpe_decay_ratio: 0.5
  consecutive_losses: 8
  max_data_age_days: 120
  leading_indicator_decay: 0.5

deploy_gate:
  trigger_sharpe_improve: 0.05
  trigger_drift_level: HIGH
  min_sharpe_change: 0.03
  require_adopt: true
  min_trades: 50
  require_human_confirm: true

data_flow:
  model_predictions: predictions.parquet
  gated_logs: logs_gated.parquet
  step_inputs:
    prefilter: predictions.parquet
    gate_train: predictions.parquet
    gate_apply: predictions.parquet
    execution: logs_gated.parquet
    backtest: logs_gated.parquet

output:
  history_dir: results/fer/slow-rolling-sim
