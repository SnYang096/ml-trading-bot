# ============================================================
# 自动研究流水线 + 实盘监控重训 统一配置
# ============================================================
# 用法:
#   python scripts/auto_research_pipeline.py --strategy bpc
#   python scripts/auto_research_pipeline.py --all
#   python scripts/monitor_retrain.py  (cron 定时 / 手动触发)

# ── 时间窗口规则 ──────────────────────────────────────────────
dates:
  start_date: "2024-01-01"     # Regime窗口起点: 覆盖2024牛市+震荡+2025熊市转换, 贴近当前市场
  # start_date: "2023-01-01"   # 全量历史模式 (备用)
  holdout_months: 6           # Holdout 固定窗口 (月)
  # end_date: auto             # 默认自动检测 data/parquet_data 最新日期
  # holdout_start: auto        # = end_date - holdout_months

# ── 训练确定性 ─────────────────────────────────────────────
training:
  seeds: [42]                  # gate/evidence seed=42 固定 + imodels蒸馏确定性 → 多seed无意义
  seed_selection: best_sharpe   # 选优标准: sharpe_per_trade 最高 (需满足 min_trades)

# ── Token Universe ────────────────────────────────────────────
# 通过 universe_group 指定，自动展开为 USDT 合约列表，不需再在命令行传 --symbols
universe_group:
  file: "config/download/crypto_4h_token_universe_groups.yaml"
  universe_set: starter_a
  group: highcap
# symbols: "BTCUSDT,..."  # 已由 universe_group 替代
data_path: "data/parquet_data"

# ── 数据下载 (Step 0) ─────────────────────────────────────────
# 训练链开头自动下载 + 转换最新月度数据 (增量, 已有月份自动跳过)
download:
  enabled: true                  # false 则跳过下载, 直接用本地数据
  data_dir: "data/agg_data"      # Binance aggTrades ZIP 存放目录
  parquet_dir: "data/parquet_data" # 转换后的 parquet 输出目录
  # start_year/month 使用 dates.start_date 自动推算
  # end_year/month 使用 end_date 自动推算

# ── 策略定义 ──────────────────────────────────────────────────
strategies:
  bpc:
    config: config/strategies/bpc
    timeframe: "240T"
    features_gate: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    # Per-strategy KPI gates: 每个策略独立的优化约束参数
    # 避免全局硬编码导致“调好一个另一个坏”
    kpi_gates:
      prefilter:
        min_pass_rate: 0.15          # prefilter 后至少保留 15% bars
        min_rows: 500                # plateau 检测绝对下限
      gate:
        require_positive_effect: true # gate 效果必须为正
        min_combined_pass_rate: 0.30  # gate AND 累积 pass rate 下限
      backtest:
        min_trades: 30               # holdout 最低 30 笔交易
      deploy:
        min_trades: 10               # 4H 高选择性策略, 10 笔/6月 已足够


  fer:
    config: config/strategies/fer
    timeframe: "240T"
    features_gate: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.08          # FER 可以稍严格
        min_rows: 500
      gate:
        require_positive_effect: true # 当前 FER gate 效果为负，这会触发警告
        min_combined_pass_rate: 0.30  # gate AND 累积 pass rate 下限
      backtest:
        min_trades: 10
      deploy:
        min_trades: 10               # 4H 策略, 同 BPC


  me:
    config: config/strategies/me
    timeframe: "60T"
    features_gate: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: false   # direction_aware: false, 方向固定为 long (见 labels_rr_extreme.yaml)
    kpi_gates:
      prefilter:
        min_pass_rate: 0.20
        min_rows: 200
        scoring_method: positive_rr   # 新分支: LightGBM 二分类 rr>0.8R, pass区大赢集中度
        min_positive_lift: 1.20       # pass 区 rr>0.8R 比例 >= 全量基线 × 1.2
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.20
      backtest:
        min_trades: 50
      deploy:
        min_trades: 50
    shap_override:
      stability_threshold: 0.50
      top_k: 25

  me-short:
    config: config/strategies/me-short
    timeframe: "60T"
    features_gate: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: false   # direction_aware: false, 方向固定为 short (见 labels_rr_extreme.yaml)
    kpi_gates:
      prefilter:
        min_pass_rate: 0.20
        min_rows: 200
        scoring_method: positive_rr   # 新分支: LightGBM 二分类 rr>0.8R
        min_positive_lift: 1.20
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.20
      backtest:
        min_trades: 50
      deploy:
        min_trades: 50
    shap_override:
      stability_threshold: 0.50
      top_k: 25

  lv:
    config: config/strategies/lv
    timeframe: "15T"
    features_gate: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.10
        min_rows: 500
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.30
      backtest:
        min_trades: 50
      deploy:
        min_trades: 50               # 15min 频率高, 保留 50 笔要求

# ── SHAP 特征筛选 (Step 2.5) ───────────────────────────────────
# Walk-Forward SHAP 稳定性筛选: 自动裁剪不稳定特征, 减少过拟合
# --skip-shap 可跳过此步骤 (快速迭代用)
shap_feature_selection:
  enabled: true
  n_folds: 8                         # 时间窗口数
  top_k: 20                          # 每个 fold 取 Top-K
  stability_threshold: 0.75          # 特征在 >= 75% fold 出现才算稳定
  min_stable_features: 1             # 稳定特征不足则跳过裁剪
  protected_nodes:                   # 永远保留的节点
    - atr_f
    - fer_failure_signals_f          # FER prefilter 依赖此节点 (fer_trapped_longs/shorts_score)
  apply_to:                          # 裁剪哪些 features YAML
    - features.yaml

# ── 对比决策规则 (全确定性, 无人工判断) ────────────────────────
comparison:
  min_trades: 10               # < 此值 → ERROR, 数据或配置有问题
  sharpe_adopt_ratio: 0.7      # new / prev >= 0.7 → ADOPT (正常漂移)
  sharpe_reject_floor: 0.0     # new_sharpe <= 0 → KEEP + ALERT (策略失效)
  threshold_drift_warn: 1.0    # 单个阈值变化 > 100% → WARNING (仍可 adopt)

  # 决策优先级 (从高到低):
  # 1. new_trades < min_trades        → ERROR
  # 2. new_sharpe <= sharpe_reject_floor → KEEP + ALERT
  # 3. new_sharpe / prev >= adopt_ratio → ADOPT
  # 4. new_sharpe / prev < adopt_ratio  → KEEP + ALERT (显著衰减)
  # 5. 首次运行 (无 prev)               → ADOPT

# ── 重训触发条件 (monitor_retrain.py 使用) ────────────────────
retrain_triggers:
  schedule_days: 90            # 定期重训间隔 (天)
  sharpe_decay_ratio: 0.5      # 实盘滚动Sharpe / 回测Sharpe < 50% → 触发
  consecutive_losses: 8        # 连续亏损次数 >= 8 → 触发
  max_data_age_days: 120       # 上次训练距今 > 120 天 → 触发
  leading_indicator_decay: 0.5 # P5: Gate hit_rate 或 Evidence IC 衰减超 50% → 触发

# ── Deploy 门禁 (config/ → live/ 的前置条件) ────────────────────
# 触发场景: 不是每次研究变了就 deploy, 而是:
#   A. 新版本显著优于旧版本 (Sharpe 提升 >= trigger_sharpe_improve)
#   B. 参数大幅漂移 + 性能有变 (漂移 >= HIGH 且 |Sharpe变化| > min_sharpe_change)
# 即: "旧的不行了, 新的更好" 才 deploy
deploy_gate:
  # ── 触发条件 (OR, 至少一个满足才值得 deploy) ──
  trigger_sharpe_improve: 0.05    # new/old - 1 >= 5% → 有实质性改善
  trigger_drift_level: "HIGH"     # 漂移 >= HIGH → 参数大幅变动
  min_sharpe_change: 0.03         # 漂移触发的前提: |Sharpe变化| > 3% (防止自然漂移误触发)

  # ── 安全门禁 (AND, 全部满足才允许 deploy) ──
  require_adopt: true              # pipeline 决策必须 = ADOPT (新版不比旧版差)
  min_trades: 50                   # 全局默认, 可被 kpi_gates.deploy.min_trades 覆盖
  require_human_confirm: true      # 强制人工确认 (deploy --yes 跳过, 仅限 CI)

  # 决策矩阵:
  # │ 漂移\Sharpe变化 │ 提升>=5%    │ |变化|>3%   │ |变化|<=3%  │
  # │ HIGH            │ ✅ DEPLOY    │ ✅ DEPLOY    │ ❌ SKIP     │  漂移大但性能没变→不动
  # │ < HIGH          │ ✅ DEPLOY    │ ❌ SKIP      │ ❌ SKIP     │  小漂移只有大提升才动

# ── 管线数据流 (Step 间 I/O 约束) ───────────────────────
# Gate 输出 logs_gated.parquet 后, 所有下游步骤必须读取此文件.
# 原因: Entry Filter / Evidence / Execution 的阈值必须在 gate 过滤后的
# 分布上优化, 否则会产生 distribution mismatch.
# 典型错误: 回测时用 predictions.parquet (无 gate_decision) → entry filter 100% pass.
data_flow:
  # 文件名 (Step 输出产物, 相对于 run_dir/{strategy}/)
  model_predictions: "predictions.parquet"   # Step 1 输出: 模型预测
  gated_logs: "logs_gated.parquet"           # Step 5 输出: 含 gate_decision 列

  # 各步骤输入源
  step_inputs:
    prefilter: "predictions.parquet"           # 全量预测上做 prefilter
    gate_train: "predictions.parquet"          # 全量预测上训练 gate
    gate_apply: "predictions.parquet"          # Gate apply → 产出 logs_gated.parquet
    evidence_optimize: "logs_gated.parquet"    # gate 后人群上优化
    entry_filter: "logs_gated.parquet"         # gate 后人群上发现 timing
    execution: "logs_gated.parquet"            # gate 后人群上优化止损
    backtest: "logs_gated.parquet"             # gate 后人群上回测

# ── 输出 ──────────────────────────────────────────────────────
output:
  history_dir: "results/research_history"
  # 每次运行产出:
  #   {history_dir}/{strategy}/{YYYYMMDD_HHMMSS}/
  #     ├── report.json          # 结构化指标 + 阈值 + 对比决策
  #     ├── archetypes/          # 配置快照 (gate/evidence/entry_filters/execution)
  #     ├── pipeline.log         # 完整运行日志
  #     └── comparison.json      # 与上次运行的对比详情
