version: 1
name: Constitution_v1
created_at: '2026-01-12'
kill_switch:
  enabled: true
  daily_loss_limit: 0.04
  weekly_loss_limit: 0.08
  monthly_loss_limit: 0.12
  cooldown_minutes: 240
  daily_reset_timezone: UTC
  max_dd: 0.2
  max_turnover_mean: 0.35
  max_turnover_p95: 1.0
  max_cost_mean: 0.002
  max_cost_p95: 0.01
  kill_on_any_hard_violation: true
safety_state:
  persist_to: data/db/order_management.db
slots:
  enabled: true
  slot_count: 4
  risk_per_slot: 0.01
  allow_replacement: true
  evidence_min_score: 0.0
  evidence_position_scale: true
  slot_state_tracking:
    persist_to: data/db/order_management.db
resource_allocation:
  enabled_archetypes:
  - bpc-long-120T
  - bpc-short-120T
  - fer-long-120T
  - fer-short-120T
  - me-long-120T
  - me-short-120T
  per_strategy_limits:
    bpc-long:
      max_slots: 1
      max_risk_per_trade: 0.02
      allow_add_position: true
      max_add_times: 5
    bpc-short:
      max_slots: 1
      max_risk_per_trade: 0.02
      allow_add_position: true
      max_add_times: 5
    me-long:
      max_slots: 1
      max_risk_per_trade: 0.0035
      allow_add_position: true
      max_add_times: 2
    me-short:
      max_slots: 1
      max_risk_per_trade: 0.003
      allow_add_position: true
      max_add_times: 2
    fer-long:
      max_slots: 1
      max_risk_per_trade: 0.0035
      allow_add_position: false
    fer-short:
      max_slots: 1
      max_risk_per_trade: 0.0035
      allow_add_position: false
    lv:
      max_slots: 0
      max_risk_per_trade: 0.0025
      allow_add_position: false
  add_position_rules:
    max_add_times: 1
    require_locked_profit: true
    lock_profit_breakeven_trigger_r: 1.0
    state_tracking:
      persist_to: data/db/order_management.db
  dynamic_slot_policy:
    total_risk_cap: 0.1
    bpc:
      enabled: true
      base_slots: 1
      max_slots: 3
      step2:
        max_drawdown: 0.08
        max_daily_loss: 0.03
        min_active_bpc_slots: 1
      step3:
        max_drawdown: 0.05
        max_daily_loss: 0.02
        min_active_bpc_slots: 2
  intent_selection_policy:
    archetype_priority:
    - bpc
    - me
    - fer
  direction_policy:
    enabled: true
    mode: ema200_single_direction
    close_feature: close
    ema_feature: ema_200
    debounce_bars: 3
    default_side: both
    fer_reverse_allowed: true
    reverse_exempt_families:
    - fer
  notional_policy:
    enabled: true
    soft_max_total_notional_pct: 4.5
    hard_max_total_notional_pct: 6.0
    max_symbol_notional_pct: 2.5
    max_family_notional_pct: 3.5
    winner_priority:
      enabled: true
      allow_families:
      - bpc
      require_breakeven_locked: true
      require_min_current_r: 1.0
      block_new_slots_when_soft_cap_hit: true
