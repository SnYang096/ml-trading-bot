# Constitution v1 (YAML-first)
# This is a non-negotiable contract: the system must NEVER violate it.
# It encodes the "freedom limits" and "survival + controlled escalation" philosophy.

version: 1 # Schema version; bump only when constitution semantics change incompatibly.
name: "Constitution_v1" # Human-readable constitution id (logs, reports, audit).
created_at: "2026-01-12" # Document creation date (informational; not used at runtime).

# -----------------------------------------------------------------------------
# 1) Kill-switch (hard stops)
# -----------------------------------------------------------------------------
kill_switch:
  enabled: true # Master switch; false disables constitutional halt evaluation (not recommended live).
  # Account-level loss limits (fraction of equity).
  daily_loss_limit: 0.06 # -6% => stop new risk for the day (was 4%; raised to accommodate 5-slot ME)
  weekly_loss_limit: 0.08 # -8% => stop new risk for the week
  monthly_loss_limit: 0.12 # -12% => stop new risk for the month
  monthly_soft_loss_limit: 0.08 # -8% => keep trading but cap effective risk per slot.
  derated_risk_per_slot: 0.005 # 0.5% risk after monthly soft limit until month reset.
  # Cooldown after a hard stop (minutes). Recovery requires cooldown + metrics OK.
  cooldown_minutes: 720 # 12h = 6x 2h bars (was 240min; extended for ME 2h decision cycle)
  # Daily loss reset is evaluated in this timezone.
  daily_reset_timezone: "UTC" # IANA timezone for daily_loss_limit day boundary reset.

  # Execution / data sanity caps (must match execution control checks when used)
  # Note: Currently only max_dd is enforced at runtime; others are checked in offline evaluation
  # See: src/time_series_model/core/constitution/constitution_executor.py:validate_drawdown() for max_dd
  # See: src/time_series_model/rl/exec_control.py for turnover/cost checks (offline only)
  max_dd: 0.20 # Peak-to-trough drawdown hard stop (fraction of equity); enforced at runtime.
  # Max drawdown (peak-to-trough): 20% hard limit
  # - Runtime check: YES (in enforce_before_order() safety gate)
  # - Implementation: src/time_series_model/core/constitution/safety_runtime.py
  # - Live usage: src/time_series_model/live/enforcement.py
  max_turnover_mean: 0.35 # Mean |Δexposure| per step cap (offline eval; see block comment below).
  # Mean turnover per step: 35% (fraction of equity)
  # - Runtime check: NO (offline evaluation only, but SHOULD be checked online)
  # - Implementation: src/time_series_model/rl/exec_control.py:121-128
  # - Usage: scripts/rl_exec_control_check.py, counterfactual evaluation
  # - Definition: turnover = abs(target_exposure - prev_exposure) per step
  # - Example: If prev_exposure=0.5 (50% long), target=0.8 (80% long), then turnover = |0.8-0.5| = 0.3 (30%)
  # - Example: If prev_exposure=0.0 (flat), target=1.0 (100% long), then turnover = |1.0-0.0| = 1.0 (100%)
  # - Why check: High turnover = excessive trading = high transaction costs = poor execution
  # - Recommendation: Should add runtime check to prevent excessive position changes
  max_turnover_p95: 1.00 # P95 |Δexposure| per step cap (offline eval).
  # 95th percentile turnover: 100% (fraction of equity)
  # - Runtime check: NO (offline evaluation only, but SHOULD be checked online)
  # - Implementation: src/time_series_model/rl/exec_control.py:122-129
  # - Definition: 95% of all steps have turnover <= 1.0 (100%)
  # - Example: If 95% of steps have turnover <= 1.0, but 5% exceed it, this is a violation
  # - Why check: Prevents extreme position swings that indicate unstable strategy
  max_cost_mean: 0.002 # Mean cost per step cap, fraction of equity (offline eval).
  # Mean cost per step: 0.2% (20 bps = 0.002)
  # - Runtime check: NO (offline evaluation only, but SHOULD be checked online)
  # - Implementation: src/time_series_model/rl/exec_control.py:123-130
  # - Definition: cost = cost_per_turnover * turnover + slippage_bps * abs(target_exposure)
  # - Example: If turnover=0.3, cost_per_turnover=0.0002, slippage=0.0001, target=0.8:
  #            cost = 0.0002 * 0.3 + 0.0001 * 0.8 = 0.00006 + 0.00008 = 0.00014 (1.4 bps)
  # - Why check: High mean cost = strategy is eating into profits with excessive trading
  # - Recommendation: Should add runtime check to prevent cost accumulation
  #
  # Binance BTCUSDT Perpetual Contract Cost Calculation:
  # 1. Trading Fee (per turnover):
  #    - Maker: 0.02% (2 bps) - if you provide liquidity (limit orders)
  #    - Taker: 0.04% (4 bps) - if you take liquidity (market orders)
  #    - With BNB discount (25%): Maker 0.015%, Taker 0.03%
  #    - cost_per_turnover = 0.0002 (2 bps) assumes mostly maker orders
  #    - For taker-heavy: cost_per_turnover = 0.0004 (4 bps)
  #
  # 2. Funding Rate (per 8 hours, applied to exposure):
  #    - Typically: -0.01% to 0.01% per 8h (-10 bps to +10 bps)
  #    - For 4H timeframe (2 funding periods per step): ~0.0002 to 0.0002 (2-2 bps)
  #    - If long: pay funding (cost); if short: receive funding (negative cost)
  #    - slippage_bps can include funding: slippage_bps = 0.0001 (1 bps) for funding
  #
  # 3. Slippage (per exposure, depends on order size):
  #    - Small orders (< 1 BTC): < 0.01% (1 bps) on BTCUSDT
  #    - Medium orders (1-10 BTC): 0.01-0.05% (1-5 bps)
  #    - Large orders (> 10 BTC): 0.05-0.2% (5-20 bps) or more
  #    - slippage_bps = 0.0001 (1 bps) assumes small-medium orders
  #
  # Example for Binance BTCUSDT:
  # - Scenario: Change from 0% to 50% long position (turnover = 0.5)
  # - Trading fee (maker): 0.0002 * 0.5 = 0.0001 (1 bps)
  # - Funding (long, 4H): 0.0001 * 0.5 = 0.00005 (0.5 bps)
  # - Slippage (small order): 0.0001 * 0.5 = 0.00005 (0.5 bps)
  # - Total cost: 0.0001 + 0.00005 + 0.00005 = 0.0002 (2 bps)
  #
  # - If using market orders (taker): 0.0004 * 0.5 = 0.0002 (2 bps) just for trading fee
  # - Total cost (taker): 0.0002 + 0.00005 + 0.00005 = 0.0003 (3 bps)
  max_cost_p95: 0.010 # P95 cost per step cap (offline eval).
  # 95th percentile cost: 1.0% (100 bps = 0.01)
  # - Runtime check: NO (offline evaluation only, but SHOULD be checked online)
  # - Implementation: src/time_series_model/rl/exec_control.py:124-131
  # - Definition: 95% of all steps have cost <= 0.01 (100 bps)
  # - Example: If 95% of steps have cost <= 0.01, but 5% exceed it, this is a violation
  # - Why check: Prevents extreme cost spikes that indicate execution problems or excessive trading
  #
  # Binance BTCUSDT: When would cost exceed 1.0% (100 bps)?
  # - Extreme turnover: 100% position flip with taker orders = 0.0004 * 1.0 = 0.0004 (4 bps)
  # - High slippage: Large order (10+ BTC) with poor timing = 0.002 (20 bps) or more
  # - Extreme funding: Rare but possible funding rate spikes = 0.01 (100 bps) per 8h
  # - Combined: 4 bps (fee) + 20 bps (slippage) + 100 bps (funding) = 124 bps > 100 bps limit
  # - This threshold catches execution problems, not normal trading

  # Kill-switch policy: If true, ANY hard violation => global_pause (force NO_TRADE for new entries)
  # - When enabled: Any violation (max_dd, daily_loss_limit, weekly_loss_limit, monthly_loss_limit,
  #   data_bad, hard_violation) will trigger ConstitutionViolation exception
  # - Effect: System enters global pause state, all new trades forced to NO_TRADE
  # - Implementation: src/time_series_model/core/constitution/constitution_executor.py:586-591
  # - Usage: Prevents system from continuing to trade when critical limits are breached
  # - Recommendation: Keep enabled for production (safety first)
  # - If false: Violations are logged but don't stop trading (dangerous, not recommended)
  kill_on_any_hard_violation: true # Any hard breach => global_pause (block all new entries).

# -----------------------------------------------------------------------------
# 1.1) Safety state persistence (for restart-safe halts)
# -----------------------------------------------------------------------------
safety_state:
  # SQLite path for persisted halt / kill-switch / safety flags (survives process restarts).
  persist_to: "data/order_management.db"

# -----------------------------------------------------------------------------
# 2) Slots (low freedom position structure)
# -----------------------------------------------------------------------------
slots:
  enabled: true # Master switch for PCM slot pool (false => slot limits not applied).
  slot_count: 10 # Max concurrent trend/fat-tail positions across all symbols (global hard cap).
  # Risk budget per slot (fraction of equity). This is NOT "cash allocation".
  # 每笔交易风险占 equity 的比例 (1% = 0.01)
  # 用于反算仓位: risk_usd = equity × risk_per_slot
  #              qty = risk_usd / (stop_loss_r × ATR)
  risk_per_slot: 0.01 # Max risk per PCM slot as fraction of equity (1% default).
  # If not enough margin/slots, replacement policy decides what to close/replace.
  allow_replacement: true # When slots full, PCM may evict weaker position for stronger intent.

  # Evidence 仓位缩放 (由 discover_evidence_candidates.py 自动生成 evidence.yaml)
  evidence_min_score: 0.0 # Min evidence score [0,1] to apply scaling; 0 = no floor.
  evidence_position_scale: true # Scale intent size by evidence score when evidence.yaml present.

  # Slot state tracking (for live / restart safety).
  slot_state_tracking:
    persist_to: "data/order_management.db" # SQLite path for open-slot / PCM state snapshots.

# -----------------------------------------------------------------------------
# 3) Resource Allocation — 唯一权威源
# -----------------------------------------------------------------------------
# 所有硬约束数值的唯一定义位置。
# PCM (pcm_regime.yaml) 在此约束内自由分配优先级和缩放。
#
# 权威层级:
#   Layer 0: slots.slot_count = 全局绝对上限
#   Layer 0: slots.risk_per_slot = 每 slot 最大风险 (宪法硬上限)
#   Layer 1: slot_policy = trend/fat-tail 账户池的 symbol 级 slot 规则
#   Layer 1: per_strategy_limits = 每策略风险/加仓/日内节流上限 (max_risk_per_trade ≤ risk_per_slot)
#   Layer 2: pcm_regime.yaml 的仲裁策略在这些限制内运行
#
# 约束规则:
#   per_strategy_limits.*.max_risk_per_trade 省略时 = risk_per_slot, 显式设置时必须 ≤ risk_per_slot
#   运行时实际风险 = min(risk_per_slot, strategy.max_risk_per_trade)
resource_allocation:
  # trend/fat-tail LivePCM 注册 + Step 9.5 PCM 联合回测白名单（与 pipeline strategy_scope 交集）唯一来源
  # 列表顺序 = 同 bar 多 archetype 时 PCM 仲裁优先级（除非另写 intent_selection_policy.archetype_priority）
  enabled_archetypes:
    - tpc # Trend Pullback Continuation (primary production trend archetype).
    - bpc # Breakout Pullback Continuation (research PCM candidate).
    - me # Momentum Expansion (research PCM candidate).
    - srb # Structural Range Breakout (research PCM candidate).

  # trend/fat-tail 账户池 slot 规则（仅作用于 run_live.py + LivePCM）。
  # 运行时 trend 槽成员 = archetype_groups.trend ∩ enabled_archetypes（见 constitution_config）。
  slot_policy:
    trend_group: trend # Key into archetype_groups; names the slot-sharing pool.
    min_trend_slots_per_symbol: 1 # At least one trend slot may target each symbol when signals compete.
    max_trend_slots_per_symbol: 1 # At most one trend archetype position per symbol at a time.
    # Optional tail-risk guard for trend/fattail pool:
    # - Before any winner is protected, cap concurrent symbols across trend_group.
    # - After unlock_on condition is met on an existing symbol, allow controlled expansion.
    trend_pool_guard:
      enabled: true # Cap concurrent symbols until at least one position is risk-reduced.
      max_unprotected_symbols: 1 # Max symbols with open trend risk before any has breakeven/stop protection.
      unlock_on: breakeven_locked # Condition to widen symbol cap: breakeven_locked | stop_risk_nonnegative.
      max_symbols_after_unlock: 2 # Max concurrent trend symbols after unlock_on satisfied on one position.
      symbol_correlation_guard:
        enabled: true # Block new same-direction trend symbols that are effectively the same crypto beta.
        threshold: 0.8
        same_direction_only: true
        pairs:
          BTCUSDT:
            ETHUSDT: 0.9
            SOLUSDT: 0.85
            BNBUSDT: 0.82
          ETHUSDT:
            SOLUSDT: 0.88
            BNBUSDT: 0.84
          SOLUSDT:
            BNBUSDT: 0.82

  archetype_groups:
    trend: # Named pool for slot_policy.trend_group; members share per-symbol slot rules.
      - tpc
      - bpc
      - me
      - srb

  per_strategy_limits:
    # ── TPC（Trend Pullback Continuation）──
    # 未配置时 ConstitutionExecutor.validate_add_position 对未知策略将 max_add_times 默认=1，
    # 会导致「每母仓只能加仓一次」。须与 execution.add_position.max_add_times 对齐。
    tpc:
      max_risk_per_trade: 0.01
      allow_add_position: true
      max_add_times: 2
      require_locked_profit: true
    bpc:
      max_risk_per_trade: 0.01
      allow_add_position: true
      max_add_times: 2
      require_locked_profit: true
    me:
      max_risk_per_trade: 0.01
      allow_add_position: true
      max_add_times: 2
      require_locked_profit: true
    srb:
      max_risk_per_trade: 0.01
      allow_add_position: true
      max_add_times: 2
      require_locked_profit: true

  # 未配置 direction_policy 时 LivePCM 不做事：方向由各策略 / gate 决定。
  # 若要在 PCM 层用 BTC close vs ema_200 再挡逆势单，可恢复 resource_allocation.direction_policy.enabled

# -----------------------------------------------------------------------------
# 4) Multi-leg account (separate Binance API keys; run_multi_leg_live.py)
# -----------------------------------------------------------------------------
# Trend/fat-tail live uses slots/per_strategy_limits above; hedge multi-leg uses a separate account budget here.
# Notional caps are exposure ceilings for the dedicated multi-leg account, not trend/fat-tail risk slots.
# hedge multi-leg 合约约束：同一 symbol 同时最多 1 个 multi-leg 策略占用（chop_grid / trend_scalp 互斥）。
multi_leg:
  strategies:
    - chop_grid # C-layer chop grid (mean-reversion inventory); mutually exclusive per symbol with trend_scalp.
    - trend_scalp # C-layer regime trend scalp legs; mutually exclusive per symbol with chop_grid.
  # Per-order / per-leg USDT notional used by multi-leg engines.
  # - chop_grid: each grid level places qty = unit_notional / current_price.
  # - trend_scalp: each seed/add leg places qty = unit_notional / order_price.
  # Portfolio/symbol caps below can still reject orders after this sizing step.
  #
  # Default 100.0 is a conservative live starting point, not a tuned strategy knob.
  # With account.equity_usdt: 10000, one leg is ~1% of notional anchor; together
  # with max_symbol_gross_notional_pct / max_gross_notional_pct caps, inventory
  # can grow in layers without immediately hitting account ceilings (e.g.
  # chop_grid max_open_levels_total=6 -> ~600 USDT/symbol vs 8% -> ~800 USDT;
  # trend_scalp max_gross_exposure_units=4 -> ~400 USDT gross footprint before caps).
  # Scale unit_notional when equity changes (e.g. 2000 -> ~20, 5000 -> ~50);
  # rule of thumb: start around 0.5%–1.0% equity per leg and keep hard limits below.
  unit_notional: 200.0 # USDT quote per grid level / dual-add leg before portfolio caps (see block comment above).
  account:
    # Offline budget anchor for pct-based risk_limits and validation reports.
    # In live trading, actual equity/drawdown should come from account sync / exchange
    # state; this value is not a replacement for real account balance.
    equity_usdt: 10000 # Offline anchor for pct caps (same key as spot.account; live uses exchange sync).
    # Live/shadow kill-switch threshold; checked against synced or supplied drawdown.
    # trend_scalp ablation portfolio_cum_dd ~3.9% (docs/strategy/trend_scalp_翻转reseed实验.md); 5% headroom.
    max_drawdown_pct: 0.05 # Halt new multi-leg risk if account drawdown from peak exceeds 5%.
  risk_limits:
    # Pct limits are resolved against account.equity_usdt unless absolute notional
    # limits are supplied. Example: 0.20 * 10000 = 2000 USDT max gross exposure.
    max_gross_notional_pct: 0.20 # Sum |leg notionals| / equity_usdt ceiling (long+short legs).
    max_net_notional_pct: 0.10 # |net long-short notional| / equity_usdt ceiling.
    max_symbol_gross_notional_pct: 0.08 # Per-symbol gross notional / equity_usdt ceiling.
    max_symbol_net_notional_pct: 0.04 # Per-symbol net notional / equity_usdt ceiling.
    # Maximum number of resting open orders across all multi-leg strategies.
    max_resting_orders: 60 # Cap on open limit orders (grid + dual-add combined).

# -----------------------------------------------------------------------------
# 5) Spot accumulator account (separate spot account; not a classic PCM slot pool)
# -----------------------------------------------------------------------------
spot:
  # Spot accumulator is a separate Binance spot account; not counted in PCM trend slots.
  strategies:
    - spot_accum_simple # Weekly EMA200 deep-bear DCA + profit-multiple ladder sell (A-layer).
  account:
    account_label: spot_accum # Label for logs, reports, and account routing (informational).
    equity_source: remote_live_account # Live equity from exchange sync; offline anchor is equity_usdt below.
    equity_usdt: 10000 # Starting cash (USDT) for spot backtest / deploy pct (same key as multi_leg.account).
  accumulation:
    target_deploy_pct: 1.00 # Fraction of equity_usdt intended for spot deploy cap (1.0 = full anchor).
    min_order_interval_minutes: 360 # Min minutes between deploy legs on same symbol (6h on 120T ≈ 3 bars).
    # Per-symbol hard budgets + fixed tranche size (recharge = raise budget, not unit size).
    symbol_budgets_usdt:
      BTCUSDT: 5000.0 # 50% of 10k deploy cap (20 × 250 USDT).
      BNBUSDT: 2500.0 # 25%
      SOLUSDT: 2500.0 # 25%
    tranches_per_symbol: 20 # Planned slice count per symbol; used with budgets to derive unit size.
    symbol_unit_notional_usdt:
      BTCUSDT: 250.0
      BNBUSDT: 125.0
      SOLUSDT: 125.0
  strategy_limits:
    spot_accum_simple:
      allow_add_position: false
      require_locked_profit: false
      max_new_entries_per_day: 1
  risk_limits:
    max_gross_notional_pct: 1.00 # Portfolio-wide spot gross cap vs equity (1.0 = up to full anchor).
    max_daily_deploy_pct: 1.00 # Per-UTC-day deploy cap vs equity; 1.0 = may deploy full anchor in one day.
    max_resting_orders: 12 # Cap on open spot limit orders (live OMS; informational for research).
