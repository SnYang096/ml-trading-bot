version: 1
name: "execution_whitelist_v1"

# ExecutionWhitelist is a hard contract:
# - Router decides regime (NO_TRADE/MEAN/TREND)
# - Execution can ONLY pick a strategy archetype from the allowed list of that regime
# - Any forbidden keyword is a HARD violation (prevents "strategy creep" and hidden overfitting)

regimes:
  TREND:
    allowed_strategies:
      - "BreakoutPullbackContinuation"
      - "MomentumExpansion"
      - "HTFBiasLTFEntry"
    forbidden_keywords:
      - "RSI"
      - "Stoch"
      - "CCI"
      - "ZScore"
      - "Boll"
      - "VWAP_fade"
      - "news_fade"
      - "mid_range_chase"
      - "chase"
      - "unlimited_add"
    strategy_requirements:
      BreakoutPullbackContinuation:
        required_evidence: ["has_orderflow", "has_trend_context", "has_volatility"]
      MomentumExpansion:
        required_evidence: ["has_orderflow", "has_volatility"]
      HTFBiasLTFEntry:
        required_evidence: ["has_orderflow", "has_trend_context"]

  MEAN:
    allowed_strategies:
      - "FailedBreakoutFade"
      - "LiquiditySweepRejection"
      - "AuctionExhaustionReversal"
    forbidden_keywords:
      - "RSI"
      - "Stoch"
      - "CCI"
      - "ZScore"
      - "Boll"
      - "VWAP_fade"
      - "news_fade"
      - "chase"
      - "mid_range_chase"
      - "unlimited_add"
    strategy_requirements:
      FailedBreakoutFade:
        required_evidence: ["has_orderflow", "has_sr_quality"]
      LiquiditySweepRejection:
        required_evidence: ["has_orderflow", "has_wick"]
      AuctionExhaustionReversal:
        required_evidence: ["has_orderflow", "has_volume_profile"]

  NO_TRADE:
    allowed_strategies: []
    forbidden_keywords: []

