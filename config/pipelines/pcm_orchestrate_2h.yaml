# PCM 多策略编排（2H）：联合 PCM joint 等；每 symbol 单 owning 策略时不维护 pcm_slot_grid 扫描。
# 多腿编排见 multileg_orchestrate_*.yaml。单策略研究入口见 config/strategies/<slug>/research/。
# 校准节奏与研究侧 turbo 对齐：config/strategies/{bpc,tpc,me}/research/calibrate_roll.default.yaml
# （与同结构的 chop_grid turbo 骨架一致：fixed features + parquet_plateau + static_holdout）。
# ============================================================
# PCM 联合训练流水线 (2H) — turbo_fixed_features（与月度 calibrate_roll 对齐）
# ============================================================

dates:
  # 与 research calibrate_roll.default（bpc/tpc/me）、chop_grid turbo 对齐
  start_date: "2022-01-01"
  end_date: "2026-05-01"
  holdout_months: 26
  calibration_months: 6

training:
  seeds:
    - 42
  seed_selection: best_sharpe
global_toggles:
  locked_threshold_tuning_enabled: true
strategy_scope:
  # all | long | short
  # 控制 --all 时参与训练/回测的策略方向范围
  direction: all

# 与 calibrate_roll 一致：阈值链关闭树模型训练；rolling_sim / load_pipeline_config 汇总到 rolling_calibration.*
threshold_calibration:
  enable_model_training: false
  prefilter:
    optimize: true
  gate:
    optimize: true
  entry_filter:
    optimize: true
  execution_opt:
    enabled: true
  pcm_eval:
    enabled: false
  direction_tuning:
    enabled: true

rolling:
  mode: turbo_fixed_features
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    # true 表示禁用 SHAP/特征搜索, 仅调阈值（亦为 turbo 默认语义）
    disable_feature_search: true

rolling_calibration:
  step_months: 1
  threshold_calibration:
    enabled: true
  symbol_threshold_calibration:
    enabled: true
  prefilter:
    optimize: true
  gate:
    optimize: true
  entry_filter:
    optimize: true
  execution_opt:
    enabled: true
  pcm_eval:
    enabled: true
event_backtest:
  enabled: true
  promote: true
  map_extra_months: 4
  # Fallback when exec_grid_by_family 缺失某策略时使用
  sym_r_default: "1.0:1:6.0"
  exec_grid_by_family:
    # 与各策略 calibrate_roll.default.yaml 完全一致（trailing 三轴网格）
    bpc:
      initial_r: "4.0:0.5:7.0"
      activation_r: "3.5:0.5:6.0"
      trail_r: "6.0:1.0:15.0"
    tpc:
      initial_r: "4.0:0.5:7.0"
      activation_r: "3.5:0.5:6.0"
      trail_r: "6.0:1.0:15.0"
    me:
      initial_r: "4.0:0.5:7.0"
      activation_r: "3.5:0.5:6.0"
      trail_r: "6.0:1.0:15.0"
  exec_objective_default: total_r_over_dd
  exec_objective_params:
    near_stop_threshold_r: -0.9
    near_stop_penalty: 5.0
    max_dd_penalty: 0.15
    min_trades_soft: 0
    undertrade_penalty: 0.0
universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap
data_path: data/parquet_data
download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data
strategies:
  bpc:
    config: config/strategies/bpc
    timeframe: 120T
    prepare_features: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.05
        min_rows: 10
        target_trades_min: 10
        target_trades_max: 50
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: true
          skip_if_cached: false
          search_mode: parquet_plateau
          plateau_scan_points: 25
          plateau_coord_rounds: 3
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
          - tail_bad_rate_ratio
          - upside_positive_rate_ratio
      entry_filter:
        meta_algorithm: false
        archetype_plateau: true
        significance_p: 0.10
        significance_min_trades: 4
        plateau_window: 4
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
          - tail_bad_rate_ratio
          - upside_positive_rate_ratio
        target_trades_min: 10
        target_trades_max: 50
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        min_score_improvement: 0.005
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.05
        max_hard_gates: 4
        max_system_safety: 2
        target_trades_min: 0
        trade_penalty_low: 0.0
        trade_penalty_high: 0.0
        stability_penalty: 0.0
      backtest:
        min_trades: 0
      deploy:
        min_trades: 0
  tpc:
    config: config/strategies/tpc
    timeframe: 120T
    prepare_features: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.05
        min_rows: 10
        target_trades_min: 10
        target_trades_max: 50
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: true
          skip_if_cached: false
          search_mode: parquet_plateau
          plateau_scan_points: 25
          plateau_coord_rounds: 3
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
          - tail_bad_rate_ratio
          - upside_positive_rate_ratio
      entry_filter:
        meta_algorithm: false
        archetype_plateau: true
        significance_p: 0.10
        significance_min_trades: 4
        plateau_window: 4
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
          - tail_bad_rate_ratio
          - upside_positive_rate_ratio
        target_trades_min: 10
        target_trades_max: 50
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        min_score_improvement: 0.005
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.05
        max_hard_gates: 4
        max_system_safety: 2
        target_trades_min: 0
        trade_penalty_low: 0.0
        trade_penalty_high: 0.0
        stability_penalty: 0.0
      backtest:
        min_trades: 0
      deploy:
        min_trades: 0
  me:
    config: config/strategies/me
    timeframe: 120T
    prepare_features: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.05
        min_rows: 10
        target_trades_min: 10
        target_trades_max: 50
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: true
          skip_if_cached: false
          search_mode: parquet_plateau
          plateau_scan_points: 25
          plateau_coord_rounds: 3
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
          - tail_bad_rate_ratio
          - upside_positive_rate_ratio
      entry_filter:
        meta_algorithm: false
        archetype_plateau: true
        significance_p: 0.10
        significance_min_trades: 4
        plateau_window: 4
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
          - tail_bad_rate_ratio
          - upside_positive_rate_ratio
        target_trades_min: 10
        target_trades_max: 50
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        min_score_improvement: 0.005
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.05
        max_hard_gates: 4
        max_system_safety: 2
        target_trades_min: 0
        trade_penalty_low: 0.0
        trade_penalty_high: 0.0
        stability_penalty: 0.0
      backtest:
        min_trades: 0
      deploy:
        min_trades: 0
shap_feature_selection:
  enabled: false
  n_folds: 8
  top_k: 20
  stability_threshold: 0.8
  min_stable_features: 1
  protected_nodes:
    - atr_f
    - fer_failure_signals_f
  apply_to:
    - features.yaml
comparison:
  min_trades: 30
  sharpe_adopt_ratio: 0.7
  sharpe_reject_floor: 0.0
retrain_triggers:
  schedule_days: 90
  sharpe_decay_ratio: 0.5
  consecutive_losses: 8
  max_data_age_days: 120
  leading_indicator_decay: 0.5
deploy_gate:
  trigger_sharpe_improve: 0.05
  trigger_drift_level: HIGH
  min_sharpe_change: 0.03
  require_adopt: true
  min_trades: 50
  require_human_confirm: true
data_flow:
  model_predictions: predictions.parquet
  gated_logs: logs_gated.parquet
  step_inputs:
    prefilter: predictions.parquet
    gate_train: predictions.parquet
    gate_apply: predictions.parquet
    execution: logs_gated.parquet
    backtest: logs_gated.parquet
output:
  history_dir: results/120T/prod_train_history
