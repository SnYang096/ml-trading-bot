dates:
  start_date: "2022-01-01"
  holdout_months: 12
  validation_months: 3

rolling:
  mode: slow_realistic
  windows:
    calibration_months: 3
    structure_lookback_months: 12
  slow_realistic:
    cadence_months: 3
    triggered_retrain_enabled: true
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    disable_feature_search: true

constitution:
  path: config/constitution/constitution.yaml

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap

data_path: data/parquet_data

download:
  enabled: false
  data_dir: data/agg_data
  parquet_dir: data/parquet_data

strategies:
  chop_grid:
    strategy_type: grid
    config: config/strategies/chop_grid
    timeframe: 120T
    prepare_features: features.yaml
    has_prefilter: true
    kpi_gates:
      backtest:
        min_trades: 100
        max_forced_exit_rate: 0.35
        max_drawdown_floor: -0.08
  dual_add_trend:
    strategy_type: dual_add_trend
    config: config/strategies/dual_add_trend
    timeframe: 120T
    prepare_features: features.yaml
    has_prefilter: true
    kpi_gates:
      backtest:
        min_trades: 60
        max_forced_exit_rate: 0.05
        max_drawdown_floor: -0.08

threshold_calibration:
  enable_model_training: false
  prefilter:
    optimize: true
  execution_opt:
    enabled: false

rolling_calibration:
  step_months: 1
  threshold_calibration:
    enabled: true
  execution_opt:
    enabled: false
  pcm_eval:
    enabled: false

event_backtest:
  enabled: false

grid_backtest:
  enabled: true
  start_date: "2022-01-01"
  end_date: "2026-03-31"
  same_bar_entry_exit: false
  costs:
    fee_bps: 20.0
    maker_fee_bps: 20.0
    taker_fee_bps: 20.0
    forced_exit_slippage_bps: 20.0
    funding_cost_bps_per_8h: 20.0
  map_symbols: BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT
  continuous_map_symbols: BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT

dual_add_backtest:
  enabled: true
  start_date: "2022-01-01"
  end_date: "2026-03-31"
  symbols: BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT
  timeframe: 2h
  # Default multi-leg execution replay: signal on timeframe above, inventory on 1m OHLC.
  execution_timeframe: 1min
  scale_max_loser_hold_to_signal: true
  regime: trend
  add_mode: trend
  flip_action: close_offside_all
  exclude_box: true
  step_atr_mult: 1.00
  tp_atr_mult: 0.75
  tp_pct: 0.0015
  max_loss_per_segment: 0.02
  risk_stop_mode: regime_only
  max_gross_exposure: 4
  max_net_exposure: 2
  max_adds_per_side: 3
  costs:
    fee_bps: 20.0
    market_exit_slippage_bps: 5.0
    intrabar_touch_buffer_bps: 5.0
  map_symbols: BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT
  continuous_map_symbols: BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT

multi_leg_gate:
  min_total_trades: 120
  min_total_r: 0.5
  max_drawdown_r: 0.08
  max_forced_rate: 0.50
  max_risk_stop_rate: 0.10
  min_segment_win_rate: 0.45

multi_leg_monitor:
  max_drawdown_r: 0.10
  drift_forced_rate_delta: 0.10
  drift_trade_ratio_floor: 0.60
  threshold_total_r_floor: -0.10
  drift_risk_stop_rate_delta: 0.05
  drift_segment_win_rate_delta: 0.08
  regime_trend_shift_max: 0.15
  regime_chop_shift_max: 0.15

output:
  history_dir: results/multi_leg/rolling-sim
  latest_dir: results/multi_leg/latest
