dates:
  start_date: "2022-01-01"
  end_date: "2026-05-01"
  holdout_months: 26
  calibration_months: 6

training:
  seeds:
    - 42
  seed_selection: best_sharpe

rolling:
  mode: turbo_fixed_features
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    disable_feature_search: true

threshold_calibration:
  enable_model_training: false
  prefilter:
    optimize: true
  gate:
    optimize: true
  entry_filter:
    optimize: true
  execution_opt:
    enabled: true
  pcm_eval:
    enabled: true
  direction_tuning:
    enabled: true

strategy_scope:
  direction: all

data_path: data/parquet_data

event_backtest:
  enabled: true
  promote: false
  map_extra_months: 4
  exec_grid_by_family:
    bpc_swing:
      initial_r: "2.0:0.5:4.0"
      activation_r: "1.5:0.5:3.0"
      trail_r: "2.0:0.5:4.0"
    tpc_swing:
      initial_r: "2.0:0.5:4.0"
      activation_r: "1.5:0.5:3.0"
      trail_r: "2.0:0.5:4.0"
    me_swing:
      initial_r: "1.5:0.5:3.5"
      activation_r: "1.0:0.5:2.5"
      trail_r: "1.5:0.5:3.5"
    spot_ft:
      initial_r: "4.0:0.5:7.0"
      activation_r: "6.0:1.0:10.0"
      trail_r: "4.0:1.0:8.0"
  exec_objective_default: total_r_over_dd
  exec_objective_params:
    near_stop_threshold_r: -0.9
    near_stop_penalty: 5.0
    max_dd_penalty: 0.15
    min_trades_soft: 0
    undertrade_penalty: 0.0

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap

strategies:
  bpc_swing:
    config: config/strategies/bpc_swing
    timeframe: 120T
    prepare_features: features.yaml
    labels_gate: labels.yaml
    has_prefilter: true
    has_direction: true
  tpc_swing:
    config: config/strategies/tpc_swing
    timeframe: 120T
    prepare_features: features.yaml
    labels_gate: labels.yaml
    has_prefilter: true
    has_direction: true
  me_swing:
    config: config/strategies/bad-candidates/me_swing
    timeframe: 120T
    prepare_features: features.yaml
    labels_gate: labels.yaml
    has_prefilter: true
    has_direction: true
  spot_ft:
    config: config/strategies/spot_ft
    timeframe: 120T
    prepare_features: features.yaml
    labels_gate: labels.yaml
    has_prefilter: true
    has_direction: true
  spot_accum:
    config: config/strategies/spot_accum
    timeframe: 120T
    prepare_features: features.yaml
    labels_gate: labels.yaml
    has_prefilter: true
    has_direction: true

output:
  history_dir: results/120T/abc_v1_history
