# LV Failure 子标签：failure_rr_extreme（踩大坑）
# 🟥 只学习识别"路径极端不利"的结构条件
# - failure_rr_extreme = forward_rr < -0.8R
# - 目标：识别哪些条件下 "清算信号" 是假的（实际不发生强迫移动）
# 
# LV 特有语义：
# - 杠杆脆弱性信号触发，但市场消化了（不触发清算瀑布）
# - OI 异常但有对手盘承接
# - Funding 极端但流动性充足

name: lv_rr_extreme
target_column: success_no_rr_extreme  # invert=True

label_generator:
  module: src.time_series_model.strategies.labels.failure_first_label
  function: compute_bpc_failure_rr_extreme_label
  params:
    direction: long
    horizon: 20       # 15min × 20 = 5小时 (LV 快进快出)
    invert: true  # 1=好机会（不会踩坑），0=踩坑

# 标签元信息
label_meta:
  label_type: binary
  failure_subtype: rr_extreme
  semantic: |
    success_no_rr_extreme = 1 - failure_rr_extreme
    1 = 不会踩大坑（forward_rr >= -0.8R）
    0 = 踩大坑（forward_rr < -0.8R）
  failure_definition: |
    failure_rr_extreme = forward_rr < -0.8R
  horizon: 20 bars (= 5h at 15min)
  description: |
    LV Failure 子标签训练：
    - 只学习识别"踩大坑"的结构条件
    - 高预测值 = 安全（清算信号是真的，不会反向踩坑）

filters:
  - column: success_no_rr_extreme
    notna: true

# Gate 模型专属 KPI 定义
kpi_definition:
  # 1️⃣ Veto 能力 KPI（核心）
  veto_ability:
    description: "Gate 是否能有效降低 failure_rr_extreme 发生率"
    metrics:
      - name: lift_at_70pct
        description: "Top 70% 覆盖时的 Lift (failure rate reduction)"
        target: "<= 0.90x"  # 至少降低 10% 失败率
        critical: true
      - name: lift_at_50pct
        description: "Top 50% 覆盖时的 Lift"
        target: "<= 0.85x"  # 降低 15% 失败率
        critical: true
      - name: plateau_stability
        description: "Lift 在 50%-80% 覆盖区间的稳定性"
        target: "std <= 0.05"
        critical: false

  # 2️⃣ 覆盖率-精度权衡 KPI
  coverage_precision:
    description: "在保持覆盖率的同时提高精度"
    metrics:
      - name: auc_roc
        description: "ROC AUC (辅助指标)"
        target: ">= 0.55"
        critical: false
      - name: precision_at_recall_70
        description: "Recall=70% 时的 Precision"
        target: ">= 0.70"
        critical: false

  # 3️⃣ 跨符号一致性 KPI
  stability:
    description: "Gate 在不同符号上的 veto 能力一致性"
    metrics:
      - name: symbol_lift_consistency
        description: "各符号 lift < 1.0 的比例"
        target: ">= 60%"
        critical: false

post_label_filters: []
