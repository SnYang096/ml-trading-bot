# LV Direction Determination
# 版本: 1.0
#
# 职责: 确定 LV archetype 的交易方向
# 原则: 方向来自"杠杆偏向的反方向"（清算方向）
#
# 语义:
#   LV = Leverage Vulnerability
#   如果空头杠杆过度 → 做多（逼空）
#   如果多头杠杆过度 → 做空（清算瀑布）
#   方向 = -sign(杠杆偏向)

version: 1

# 方向因果来源
causal_source: leverage_bias  # 杠杆偏向的反方向

# 方向确定规则 (按优先级从高到低)
direction_rules:
  # 规则 1: Funding Rate 符号的反方向
  # funding_rate > 0 → 多头付费 → 多头拥挤 → 做空清算
  # funding_rate < 0 → 空头付费 → 空头拥挤 → 做多逼空
  - method: feature_column
    feature: funding_rate
    description: "Funding rate sign: positive=多头拥挤→做空, negative=空头拥挤→做多"
    transform: negate_sign  # direction = -sign(funding_rate)

  # 规则 2: OI delta + price sign 反方向 (兜底)
  - method: feature_column
    feature: oi_delta_price_sign
    description: "OI-price divergence: -1=OI涨价跌→可能反转"
    transform: negate  # divergence direction

# 方向验证
validation:
  require_nonzero: true
  allowed_values: [-1, 1]

# 适合的特征 (供参考)
semantic_features:
  - funding_rate_sign
  - long_short_ratio
  - oi_delta_price_divergence
  - orderbook_depth_asymmetry
