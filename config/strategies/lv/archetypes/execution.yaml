# LV Execution 配置
# 版本: 1.0
# 15分钟粒度 — 快进快出

version: 1

# ============================================================
# 📌 基础执行结构
# ============================================================

execution_constraints:
  allow_add_on: false           # LV 不加仓 (清算型一次性)
  min_order_interval_minutes: 5

# 止损配置
stop_loss:
  type: trailing
  initial_r: 0.8               # 紧止损 (清算型波动大，错了要快跑)
  trailing:
    activation_r: 0.5          # 盈利 0.5R 即激活
    trail_r: 0.5               # 紧跟 0.5R
    step_r: 0.3                # 每上涨 0.3R 收紧

# 止盈配置
take_profit:
  enabled: true                # LV 设固定止盈 (清算瀑布有上限)
  target_r: 2.5                # 2.5R 止盈

# 持仓约束
holding:
  max_holding_bars: 20         # 15min × 20 = 5小时
  time_stop_bars: 20           # 超时即平

# ============================================================
# 🎯 Tiers: 按 evidence_score 分档
# ============================================================
tiers:
  enabled: true
  levels:
    - name: 强证据
      evidence_min: 0.70
      stop_loss:
        initial_r: 0.6
        trailing:
          activation_r: 0.3
          trail_r: 0.3
      size_multiplier: 1.2
      time_stop_bars: 30

    - name: 中等证据
      evidence_min: 0.50
      stop_loss:
        initial_r: 0.8
        trailing:
          activation_r: 0.5
          trail_r: 0.5
      size_multiplier: 1.0
      time_stop_bars: 20

    - name: 弱证据
      evidence_min: 0.30
      stop_loss:
        initial_r: 1.0
        trailing:
          activation_r: 0.8
          trail_r: 0.8
      size_multiplier: 0.7
      time_stop_bars: 15

# ============================================================
# 🔧 网格搜索参数范围
# ============================================================
optimization:
  enabled: true
  params:
    stop_loss.initial_r:
      range: [0.5, 1.5]
      step: 0.25
    stop_loss.trailing.activation_r:
      range: [0.3, 1.0]
      step: 0.25
    stop_loss.trailing.trail_r:
      range: [0.3, 1.0]
      step: 0.25
