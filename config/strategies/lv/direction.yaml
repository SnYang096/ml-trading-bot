# LV 方向特征候选声明
# 职责: 声明待验证的方向候选特征 (--compare-features 的输入)
# 对应生产配置: config/strategies/lv/archetypes/direction.yaml (选中的规则)
#
# 用法:
#   python z实验_005_统一研究/direction_strict_validation.py \
#       --logs results/train_final_xxx/lv/features_labeled.parquet \
#       --strategy lv --compare-features
#
#   # 发现模式: 扫描全部数值特征
#   ... --compare-features --all-features
#
#   # 加 --temporal 查看时间稳定性
#   ... --compare-features --temporal

description: "LV 方向特征候选 — 清算方向 (结构反转 + 杠杆偏向)"

# ════════════════════════════════════════════════════════════════
# 候选特征 (输入) — 脚本从这里读取待评估的特征列表
# ════════════════════════════════════════════════════════════════
# 每个条目: feature (必须), transform (可选, 自动检测)
# transform: sign | center_sign | negate_sign | raw
#
# 语义约束:
#   LV = Leverage Vulnerability, 方向 = "清算瀑布方向"
#   清算方向由结构决定: 价格在阻力被拒→做空, 在支撑被拒→做多
#   LV 本质是 15min 级别的 FER + 杠杆放大器
#   funding_rate 等杠杆指标属于 prefilter/gate (有没有脆弱性),
#   不属于 direction (往哪个方向清算)

candidates:
  # ── 结构反转方向 (核心: 清算往哪个方向走) ──
  - feature: fer_impulse_failure_direction  # 失败脉冲方向 → 取反
    transform: negate_sign
  - feature: oi_delta_price_sign            # OI × 价格同向 → 取反 (追仓反转)
    transform: negate_sign
  - feature: roc_20                         # 动量方向 → 取反 (动能耗尽)
    transform: negate_sign
  - feature: macd_atr                       # MACD/ATR → 取反
    transform: negate_sign

  # ── 杠杆偏向反方向 (辅助: 谁更拥挤) ──
  - feature: funding_rate                   # 正=多头付费 → 做空
    transform: negate_sign
  - feature: vpin_signed_imbalance_max      # VPIN 签名不平衡 → 取反
    transform: negate_sign
  - feature: fp_volume_skew                 # Footprint 成交量偏斜 → 取反
    transform: negate_sign

  # ── 结构位置 (价格在 SR 的哪一侧) ──
  - feature: price_position                 # 价格位置 [0,1] → 高位做空低位做多
    transform: center_sign
  - feature: sma_200_position               # SMA200 相对位置
    transform: negate_sign
  - feature: cvd_change_5_normalized        # CVD 短周期 → 取反 (失败推进)
    transform: negate_sign

# ════════════════════════════════════════════════════════════════
# 上次评估结果 (输出) — 由 --compare-features 自动生成
# ════════════════════════════════════════════════════════════════
# 尚未评估, 运行上方命令后此处会自动填充
