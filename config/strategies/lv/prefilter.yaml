# LV 语义预筛选候选特征
# 职责: 声明待验证的 pre-filter 候选特征 (Step 2 分位数分层分析的输入)
# 脚本通过 feature_dependencies.yaml 的 output_columns 解析出实际列名
#
# 用法:
#   python scripts/analyze_archetype_feature_stratification.py \
#       --logs results/train_final_xxx/lv/predictions.parquet \
#       --strategy lv \
#       --config config/strategies/lv/prefilter.yaml

description: "LV 语义预筛选候选特征 — 杠杆脆弱性 (OI + Funding + 流动性)"

candidates:
  # ========== LV 核心: OI 持仓量 (清算燃料) ==========
  - oi_features_f

  # ========== LV 核心: 资金费率 (单边拥挤) ==========
  - funding_rate_features_f

  # ========== 触发位置: 价格在 SR/流动性聚集区附近 ==========
  # → dist_to_nearest_sr (距最近 SR 的 ATR 倍数, 值小=价格贴近止损堆积区)
  - sr_strength_max_f
  # → poc, hal_high, hal_low (成交量分布边界, 值小=价格接近 POC/VA 边缘)
  - poc_hal_features_close_f
  # → vp_poc_deviation, vp_lv_ratio, vp_hv_ratio (流动性真空结构)
  - volume_profile_volatility_features_f
  # → wick_upper_ratio, wick_lower_ratio (影线拒绝 = 止损猎杀信号)
  - wick_ratios_f
  # → bars_since_local_high/low (swing high/low 距离, 值小=刚触及极值)
  - bars_since_extreme_f

  # ========== 通用候选 (验证跨策略区分力) ==========
  - vol_regime_features_f
  - atr_percentile_f
  - garch_features_f
