# LV Evidence 训练特征配置
# 目标：量化"清算发生后能走多远"的证据强度
# 时间粒度：15分钟

name: lv_evidence
description: |
  LV Evidence 特征集：训练 Evidence 模型，评估"清算瀑布"的收益期望。
  
  核心证据维度：
  1. OI 堆积量级 → 清算燃料多寡
  2. Funding 偏离极端度 → 单边拥挤程度
  3. 流动性深度 → 价格移动阻力
  4. 订单流不平衡 → 已开始的流动
  5. 波动率状态 → 放大因子

feature_pipeline:
  exclude_columns:
    - atr
  requested_features:
    # ========== 必需的 scale 列 ==========
    - atr_f

    # ========== LV 核心：OI + Funding (一级因果) ==========
    - oi_features_f                        # oi_usd, oi_change_pct, oi_zscore, oi_delta_price_sign
    - oi_scene_semantic_scores_f           # OI 场景语义
    - funding_rate_features_f              # funding_rate, funding_rate_zscore_50
    - funding_scene_semantic_scores_f      # 资金费率场景语义

    # ========== 流动性深度/真空 (二级因果) ==========
    - liquidity_void_f
    - liquidity_void_scene_semantic_scores_f

    # ========== 订单流 (二级因果) ==========
    - footprint_basic_f
    - fp_imbalance_scene_semantic_scores_f
    - vpin_features_f
    - vpin_scene_semantic_scores_f
    - volume_ratio_pct_f
    - ofci_pct_f
    - shd_pct_f
    - cvd_change_5_pct_f
    - cvd_divergence_v2_f
    - price_momentum_divergence_f
    - terminal_risk_score_f
    - volume_participation_score_f

    # ========== 波动率 ==========
    - atr_percentile_f
    - bb_width_normalized_pct_f
    - vol_regime_features_f
    - vol_trend_features_f
    - vol_mom_features_f
    - garch_features_f

    # ========== 趋势/方向 ==========
    - trend_r2_20_f
    - rsi_f
    - macd_atr_f
    - roc_5_f
    - path_efficiency_pct_f
    - path_length_pct_f
    - price_dir_consistency_pct_f

    # ========== 风险/极端 ==========
    - evt_features_f
    - jump_risk_pct_f
    - wick_scene_semantic_scores_f
    - wpt_scene_semantic_scores_f

    # ========== SR ==========
    - sr_strength_max_f
    - sma_200_f

    # ========== Volume Profile ==========
    - volume_profile_volatility_features_f
    - volume_profile_scene_semantic_scores_f

    # ========== 数学特征 ==========
    - hurst_price_f
    - spectrum_features_f
    - hilbert_phase_f
    - wpt_price_fluctuation_f

    # ========== VWAP ==========
    - vwap_position_f

    # ========== Trade Cluster ==========
    - trade_cluster_entropy_zscore_features_f
    - trade_cluster_imbalance_zscore_features_f
    - trade_cluster_net_runs_zscore_features_f
    - trade_cluster_max_buy_run_zscore_features_f
    - trade_cluster_max_sell_run_zscore_features_f

    # ========== 交叉特征 ==========
    - exhaustion_at_liquidity_void_f
    - dual_compression_f
    - dual_ignition_f
    - dual_exhaustion_f
    - funding_oi_crowding_f                # Funding×OI拥挤度 (LV核心: 拥挤+高波动=清算瀑布)

  ensure_signal_column:
    name: signal
    default_value: 0
