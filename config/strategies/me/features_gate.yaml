name: me_gate
description: |
  ME Gate 特征白名单：gate 作为"执行风险层"只允许 deny 以下可防御特征.
  ME 的"late-entry above/below EMA1200" 保护是有意的策略层决策,
  因此 ema_1200_position 显式允许进 gate (与 BPC 不同).

feature_pipeline:
  allowed_gate_deny_features:
    # ME 专属: late-entry 保护 (价已远离 EMA1200 时拒绝追入)
    # 这是 ME 的核心策略层决策, 不是"无脑趋势过滤"
    - "ema_1200_position"
    # ME 专属 chop 语义
    - "me_semantic_chop"
    # 订单流
    - "vpin_*"
    # 波动率稳定性 / 杠杆非对称
    - "vol_persistence"
    - "vol_leverage_asymmetry"
    - "vol_regime_shift*"
    # 尾部风险
    - "evt_var_99"
    - "evt_var_99_*"
    - "stat_evt_var_*"
    - "stat_evt_tail_shape*"
    - "stat_evt_expected_shortfall*"
    - "stat_evt_excess_vol*"
    # Chop / 震荡噪声
    - "bb_width_normalized_pct"
    - "range_compression_*"
