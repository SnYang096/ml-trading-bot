# ============================================================
# 上线前训练流水线 (2H, ME-only, 慢模式 / slow_realistic)
# 底稿: prod_train_pipeline_2h_slow_bpc_only.yaml → 策略换为 me + 输出目录分离
#
# 示例:
#   mlbot pipeline run --all --config config/prod_train_pipeline_2h_slow_me_only.yaml --stage rolling_sim
#   mlbot pipeline run --all --config config/prod_train_pipeline_2h_slow_me_only.yaml --stage fast_month --month 2024-09
#
# ── 回测月份要落在 2024-01 ~ 2024-12（12 个自然月）时 dates 怎么设 ──
#   • rolling_sim 枚举的月份 = holdout_start 所在月 ～ end_date 所在月（见 docs/z实验_005_统一研究/ROLLING_SIM_TIME_WINDOWS_CN.md）
#   • end_date 用年末: "2024-12-31"
#   • holdout_months 须为 11（不是 12）: compute_holdout_start(2024-12-31, 11) → 2024-01-01；
#     若写成 12 会得到 2023-12-01，多滚一个月 2023-12。
#   • start_date: 须早于 holdout，供训练/结构快照用历史（示例 2021-01-01）。
#   • validation_months: 0 表示 holdout 内不再切 Val/Test，Gate 等 cutoff 与 holdout 对齐；
#     若写 3，则纯 OOS「Test」段为 2024-04～2024-12，但 rolling_sim 仍会逐月滚过 2024 全年 12 个月。
# ============================================================

dates:
  start_date: "2022-08-01"
  end_date: "2026-03-31"
  # end=2026-03-31, holdout=26 → holdout_start=2024-01-01；rolling 月约 202401～202603（与 TPC 管线对齐）
  holdout_months: 26
  validation_months: 3

training:
  seeds:
    - 42
  seed_selection: best_sharpe
global_toggles:
  locked_threshold_tuning_enabled: true
strategy_scope:
  direction: all
rolling:
  mode: slow_realistic
  # 下列三者语义不同，不能合并成一个 calibration_months：
  # - calibration_months：每个自然月 M 的「快变量标定窗」长度（M 之前连续 N 个月，不含 M）。
  # - structure_lookback_months：触发慢结构快照时，从锚点往回取多少个月历史跑 SHAP/特征搜索等。
  # - slow_realistic.cadence_months：每隔几个月才跑一次慢结构快照；其余月份复用上次冻结的 strategies。
  windows:
    calibration_months: 3
    structure_lookback_months: 12
  slow_realistic:
    cadence_months: 3
    triggered_retrain_enabled: true
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    disable_feature_search: true

fast_loop:
  threshold_calibration:
    enabled: true
  symbol_threshold_calibration:
    enabled: true
  execution_opt:
    # 关闭执行层网格：事件回测使用 archetypes/execution.yaml 手写止损/跟踪，不再每月 sym_r promote 覆盖
    enabled: false
  pcm_eval:
    enabled: false
  direction_tuning:
    enabled: true
    compare_features: true
    promote_after_validate: true
symbol_policy:
  mode: hybrid_carry_forward
  carry_forward_ttl_months: 2
  enable_threshold: 0.0
  min_symbol_trades_soft: 10
  carry_forward_hard_fail_rules:
    min_sharpe_r: -0.25
direction_stack:
  mode: ema200
  ema_debounce_bars: 3
  vwap_window_days: 20
slot_allocation:
  mode: quality_ranked
  max_symbols_per_side: 2
  reserve_slots_for_secondary_symbols: 1
  slot_opportunity_penalty: 0.001
  quality_score_weights:
    history_edge: 0.55
    now_strength: 0.45
  quality_lookback_months: 3
stitching:
  enabled: true
  metrics: [sharpe, max_drawdown, total_r, near_stop_rate, slot_full_rate]
  export_trade_map_html: true
event_backtest:
  enabled: true
  promote: true
  no_kill_switch: false
  map_extra_months: 4
  sym_r_default: "1.0:1:6.0"
  sym_r_by_family:
    me: "3.0:1:6.0"
  # execution_opt 关闭时不在滚动里用 sym_r；保留供单独跑 optimize / event-backtest CLI 时参考
  exec_objective_default: sharpe
  exec_objective_params:
    near_stop_threshold_r: -0.9
    near_stop_penalty: 0.0
    max_dd_penalty: 0.0
    min_trades_soft: 0
    undertrade_penalty: 0.0
pcm_slot_grid:
  enabled: false
  plateau_delta: 0.03
  min_trades_soft: 80
  penalties:
    max_dd_penalty: 0.02
    slot_full_rate_penalty: 0.20
    undertrade_penalty: 0.001
  cases: []
universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap
data_path: data/parquet_data
download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data
strategies:
  me:
    config: config/strategies/me
    timeframe: 120T
    dates:
      holdout_months: 11
      validation_months: 0
    prepare_features: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        # 收紧单条 meta 规则的 deny 上限，避免标定窗里「极窄 OI 区间」进 prefilter 后在 OOS 急涨段整月失效
        # （与从 features_prefilter 去掉 oi_scene 语义分配合；见 diagnose_me_rolling_month_funnel）
        deny_rate_max: 0.89
        min_pass_rate: 0.05
        min_rows: 10
        target_trades_min: 35
        target_trades_max: 260
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: false
          mode: auto_if_locked
          skip_if_cached: false
          max_cases: 12
          min_trades_target: 60
          trade_penalty: 0.0025
          bpc_recent_breakout_strength_min_values: 0.40,0.45,0.50
          bpc_pullback_depth_max_values: 0.55,0.60,0.65
          bpc_recovery_strength_min_values: 0.50,0.55,0.60
          target_trades_min: 35
          target_trades_max: 260
          trade_penalty_low: 0.002
          trade_penalty_high: 0.0011
          stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
      entry_filter:
        meta_algorithm: false
        archetype_plateau: true
        significance_p: 0.10
        significance_min_trades: 4
        plateau_window: 4
        archetype_scoring_method: distribution_ks
        target_trades_min: 35
        target_trades_max: 260
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        min_score_improvement: 0.005
      gate:
        require_positive_effect: true
        # 多条 hard_gate 叠加时 allow 比例下限；chop gate 收紧到 0.60 后，chop 月
        # combined allow 可能降到 5-10%，0.15 会把 chop gate 当作"过严"裁掉 → 降到 0.05
        min_combined_pass_rate: 0.05
        # ME Top-N gate cap. base/archetypes/gate.yaml 当前 locked=3 (chop_high +
        # late_long/short_above_ema1200)+0。cap=3/2 即:
        #   hard_gates 锁死 3 条 locked，不让 slow 再加新条;
        #   system_safety 允许 slow 最多补 2 条（例如 vol_persistence / evt_tail）。
        # 需要放宽时先改 base gate.yaml 的 locked 集再提 cap。
        max_hard_gates: 3
        max_system_safety: 2
        # 防御性：显式写 0 trade_penalty，允许 gate 在整月 chop 时把该月归零
        # 与 prefilter.trade_penalty=0.002 形成对比：prefilter 宽松、gate 敢严
        target_trades_min: 0
        trade_penalty_low: 0.0
        trade_penalty_high: 0.0
        stability_penalty: 0.0
      backtest:
        min_trades: 50
      deploy:
        min_trades: 50
    simple_execution:
      sl_r: 4.0
      tp_r: 8.0
      timeout_bars: 500

shap_feature_selection:
  enabled: false
  n_folds: 8
  top_k: 20
  stability_threshold: 0.8
  min_stable_features: 1
  protected_nodes:
    - atr_f
    - bpc_soft_phase_f # bpc_bb_compression: 假动量最强区分特征 (AUC=0.941, p=0.018)
    - footprint_basic_f # fp_delta_poc: 订单流POC delta (AUC=0.952, p=0.020)
    - vpin_features_f # vpin_trend: VPIN毒性流趋势 (AUC=0.922, p=0.026)
  apply_to:
    - features.yaml
comparison:
  min_trades: 30
  sharpe_adopt_ratio: 0.7
  sharpe_reject_floor: 0.0
  threshold_drift_warn: 1.0
retrain_triggers:
  schedule_days: 90
  sharpe_decay_ratio: 0.5
  consecutive_losses: 8
  max_data_age_days: 120
  leading_indicator_decay: 0.5
deploy_gate:
  trigger_sharpe_improve: 0.05
  trigger_drift_level: HIGH
  min_sharpe_change: 0.03
  require_adopt: true
  min_trades: 50
  require_human_confirm: true
data_flow:
  model_predictions: predictions.parquet
  gated_logs: logs_gated.parquet
  step_inputs:
    prefilter: predictions.parquet
    gate_train: predictions.parquet
    gate_apply: predictions.parquet
    execution: logs_gated.parquet
    backtest: logs_gated.parquet
output:
  history_dir: results/me/slow-rolling-sim
