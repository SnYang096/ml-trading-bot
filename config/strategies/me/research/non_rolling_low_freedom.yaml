# ME · low-freedom non_rolling
#
# Purpose: validate the current archetype with a narrower search surface.
# It keeps Prefilter semantics, Direction, and Execution fixed, then only
# recalibrates Gate and Entry Filter on the 6m validation tail before testing
# the latest 6m OOS window.

extends: non_rolling.yaml

validation:
  primary_backtest: full_exec

threshold_calibration:
  enable_model_training: false
  prefilter:
    optimize: false
  gate:
    optimize: true
  entry_filter:
    optimize: true
  execution_opt:
    enabled: false
  direction_tuning:
    enabled: false

shap_feature_selection:
  enabled: false

event_backtest:
  enabled: true
  promote: false
  validation_window: test
  validation_gate:
    enabled: true
    min_event_trades: 10
    min_event_sharpe_r: 0.0
    min_event_total_r: 0.0
    max_event_drawdown_r: 30.0
    downgrade_to: ALERT

strategies:
  me:
    kpi_gates:
      prefilter:
        locked_threshold_tuning:
          enabled: true
          skip_if_cached: false
          search_mode: parquet_plateau
          plateau_scan_points: 25
          plateau_coord_rounds: 3
          max_cases: 12
