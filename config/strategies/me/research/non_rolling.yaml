# =============================================================================
# ME · non_rolling — 目的与节奏
# -----------------------------------------------------------------------------
# 目的
#   - 非滚动、静态 holdout；整段样本上一次全周期研究（典型 ``--stage full``）。
# 建议节奏
#   - 按需，常见 1–3 个月或慢管线/漂移触发。
# 执行注意
#   - extends slow：与 slow 相同 entry meta、阈值 optimize、SHAP；仅 rolling / output 独立。
# -----------------------------------------------------------------------------
# 覆写 dates / rolling / output；其余与同目录 slow.yaml 一致。

extends: slow.yaml

dates:
  validation_months: 3

rolling:
  mode: non_rolling
  time_split_policy: static_holdout

output:
  history_dir: results/me/non-rolling-sim
