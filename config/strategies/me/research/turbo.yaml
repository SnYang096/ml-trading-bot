# ME · turbo_fixed_features — 执行参数均在下列键；文件名仅区分策略包入口。
# [INDEX] dates → rolling → threshold_calibration → data → strategies.me → event_backtest → output

dates:
  start_date: "2022-08-01"
  end_date: "2026-03-31"
  holdout_months: 26
  calibration_months: 6

rolling:
  mode: turbo_fixed_features
  turbo_fixed_features:
    fixed_strategies_root: config/strategies

threshold_calibration:
  enable_model_training: false
  step_months: 1
  prefilter:
    optimize: true
  gate:
    optimize: true
  entry_filter:
    optimize: true
  execution_opt:
    enabled: true
  pcm_eval:
    enabled: false
  direction_tuning:
    enabled: true

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap

data_path: data/parquet_data

download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data

strategies:
  me:
    config: config/strategies/me
    timeframe: 120T
    prepare_features: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.05
        min_rows: 10
        target_trades_min: 35
        target_trades_max: 260
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: false
          skip_if_cached: false
          # ME：writeback 可省略，由 archetypes/prefilter.yaml 推导；子句可用 tune_param 覆盖键名
          search_mode: parquet_plateau
          plateau_scan_points: 25
          plateau_coord_rounds: 3
          # label_col 默认与 labels_gate.target_column 一致（如 labels_rr_extreme.yaml）；仅当离线代理与管线标签不一致时再覆盖
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
      entry_filter:
        meta_algorithm: false
        archetype_plateau: true
        significance_p: 0.10
        significance_min_trades: 4
        plateau_window: 4
        archetype_scoring_method: distribution_ks
        target_trades_min: 35
        target_trades_max: 260
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        min_score_improvement: 0.005
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.05
        max_hard_gates: 4
        max_system_safety: 2
        target_trades_min: 0
        trade_penalty_low: 0.0
        trade_penalty_high: 0.0
        stability_penalty: 0.0
      backtest:
        min_trades: 50
      deploy:
        min_trades: 50

event_backtest:
  enabled: true
  map_extra_months: 4
  exec_grid_by_family:
    me:
      initial_r: "4.0:0.5:7.0"
      activation_r: "3.5:0.5:6.0"
      trail_r: "6.0:1.0:15.0"
  exec_objective_default: total_r_over_dd
  exec_objective_params:
    near_stop_threshold_r: -0.9
    near_stop_penalty: 5.0
    max_dd_penalty: 0.15
    min_trades_soft: 0
    undertrade_penalty: 0.0

output:
  history_dir: results/me/turbo-rolling-sim
