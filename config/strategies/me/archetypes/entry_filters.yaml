filters:
  # ── VPIN / 点火实验（默认关）：与上文同款几何 + 订单流语义；逐项 enabled 对照 event_backtest
  #    列来自 ME 同源：vpin_scene_semantic_scores_f、dual_ignition_f、vpin_features_f（见 semantic_polarity / gate_me_vpin_ma20_high）
  - id: ef_me_box_edge_low_vpin_scene_ignite
    enabled: true
    description: "下沿点火区 + VPIN scene ignition（压低噪声点火）"
    conditions:
      - feature: box_pos_120
        operator: "<="
        value: 0.15
      - feature: vpin_ignition_score
        operator: ">="
        value: 0.45
      - feature: vpin_quantile_rank_20
        operator: "<="
        value: 0.82
  - id: ef_me_box_edge_high_vpin_scene_ignite
    enabled: true
    description: "上沿点火区 + VPIN scene ignition"
    conditions:
      - feature: box_pos_120
        operator: ">="
        value: 0.85
      - feature: vpin_ignition_score
        operator: ">="
        value: 0.45
      - feature: vpin_quantile_rank_20
        operator: "<="
        value: 0.82
  - id: ef_me_breakout_up_vpin_dual_confirm
    enabled: true
    description: "上破 + VPIN scene ignition + funding×footprint 双源点火（更严确认）"
    conditions:
      - feature: box_breakout_up
        operator: ">="
        value: 0.5
      - feature: vpin_ignition_score
        operator: ">="
        value: 0.4
      - feature: dual_ignition_score
        operator: ">="
        value: 0.35
      - feature: vpin_quantile_rank_20
        operator: "<="
        value: 0.82
  - id: ef_me_breakout_down_vpin_dual_confirm
    enabled: true
    description: "下破 + VPIN scene ignition + 双源点火"
    conditions:
      - feature: box_breakout_down
        operator: ">="
        value: 0.5
      - feature: vpin_ignition_score
        operator: ">="
        value: 0.4
      - feature: dual_ignition_score
        operator: ">="
        value: 0.35
      - feature: vpin_quantile_rank_20
        operator: "<="
        value: 0.82
  - id: ef_me_breakout_up_vpin_ma_not_extreme
    enabled: true
    description: "上破 + VPIN MA20 分位不高（类比 gate_me_vpin_ma20_high 单侧：避免追高噪声）"
    conditions:
      - feature: box_breakout_up
        operator: ">="
        value: 0.5
      - feature: vpin_quantile_rank_20
        operator: "<="
        value: 0.78

# Disabled filters do not contribute to live_fc auto-detect; list columns here so
# VPIN/ignition metrics are still computed while experiments stay off.
prefetch_columns:
  - vpin_quantile_rank_20
  - vpin_ignition_score
  - dual_ignition_score
combination_mode: or
