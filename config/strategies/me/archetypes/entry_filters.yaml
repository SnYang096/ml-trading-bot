# ME Entry Filter Archetype
# 优化结果: 未找到有效的 Entry Filter 规则
# 训练时间: 2026-02-16
# 说明: ME策略不需要额外的 Entry Filter，Gate和Evidence已经足够

# Entry Filter 规则（优化后为空）
# 用于判断“现在是否入场”
# === Entry Filters: 入场时机筛选 ===
# 语义: 现在不是最佳入场时机 → 暂时等待（可以做但等更好时机）
# 位置: Execution 阶段（gate 放行之后）
#
# 参考 BPC 的 bb 和 liquidity_silence filter，
# ME 的 Entry Filter 应该检测：
# 1. 订单流一致性：VPIN 活跃 + CVD 方向性
# 2. 空间确认：距离 SR 有足够空间

filters:
  # Entry Filter 1: 订单流确认
  # 检测 VPIN 活跃度，确保订单流支持突破方向
  - id: orderflow_confirm
    description: "订单流一致性确认"
    enabled: true
    conditions:
      - feature: vpin
        operator: ">="
        value: 0.50  # VPIN >= P50 表示订单流活跃
    priority: 1
    comment: |
      ME 策略需要订单流支持。VPIN 过低表示订单流不活跃，
      突破可能缺乏后续动能。
      参考: BPC liquidity_silence filter (snotio 18.29, stop% 42.2%)

  # Entry Filter 2: 空间确认
  # 检测到最近 SR 的距离，确保有足够的盈利空间
  - id: space_confirm
    description: "盈利空间确认"
    enabled: false  # 默认禁用，需要回测验证
    conditions:
      - feature: distance_to_nearest_sr
        operator: ">="
        value: 2.0  # 距离 SR >= 2.0 ATR
    priority: 2
    comment: |
      ME 突破需要空间。如果离最近 SR 太近（< 2 ATR），
      盈利空间不足，风报比不佳。
      参考: BPC bb filter (snotio 16.43, stop% 40.3%)

# OR 逻辑组合
# 多个 filter 之间用 OR：任一满足即入场
combination_mode: or
