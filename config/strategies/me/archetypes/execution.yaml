add_position:
  add_size_multipliers:
    - 0.5
    - 0.35
    - 0.25
    - 0.2
    - 0.15
  inherit_parent_stop: true
  max_add_times: 5
  min_current_r_by_add:
    - 0.5
    - 1.0
    - 1.5
    - 2
    - 2.5
  min_current_r_unit: atr
  sizing_mode: fixed_multiplier
  trigger:
    # float_r_ladder_only = 浮盈 R 阶梯（事件回测）；bpc_follow_signal = 仅 PCM 再次意图时加仓
    type: float_r_ladder_only
execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15
holding:
  max_holding_bars: null
  time_stop_bars: 0
stop_loss:
  breakeven:
    enabled: true
    lock_profit_atr: 1
    trigger_r: 9
  guardrails:
    max_stop_pct: 0.1
    min_stop_pct: 0.01
  initial_r: 4.0
  trailing:
    enabled: true
    activation_r: 9
    trail_r: 4
  type: trailing
take_profit:
  enabled: false
version: 56
