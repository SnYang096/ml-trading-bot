# ME execution — 爆发段猎手（无 VWAP 结构出场）
#
# 设计要点（与 direction/gate 的「扩张段」一致）：
# 1) initial_r 偏宽：扛住爆发前洗盘与假突破，避免在火箭点火前被扫。
# 2) 延后 activation trailing；trail_r 刻意拉大（配合关 execution_opt），肥尾尽量扛回踩再出场。
# 3) breakeven 默认关：避免过早抬到盈亏附近后被正常回调洗出；加仓仍受 min_current_r_by_add 约束。
# 4) take_profit / time_stop 关：靠 trailing + 硬止损 + 回测结束强平；若需封顶可另开 target_r。
#
add_position:
  add_size_multipliers:
    - 0.8
    - 0.5
    - 0.3
  inherit_parent_stop: true
  max_add_times: 3
  min_current_r_by_add:
    - 0.5
    - 1.0
    - 1.5
  min_current_r_unit: atr
  sizing_mode: fixed_multiplier
  trigger:
    # float_r_ladder_only = 浮盈 R 阶梯（事件回测）；bpc_follow_signal = 仅 PCM 再次意图时加仓
    type: float_r_ladder_only
execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15
holding:
  max_holding_bars: null
  time_stop_bars: 0
stop_loss:
  # 2026-04-22 统一 breakeven 口径（见 position_logic.py）：
  # measure=atr 保持历史语义；lock_level_r 等价于旧 lock_profit_atr（ATR 单位）。
  breakeven:
    enabled: false
    trigger_r: 9
    lock_level_r: 1.0
    measure: atr
  guardrails:
    max_stop_pct: 0.1
    min_stop_pct: 0.01
  initial_r: 4.0
  trailing:
    enabled: true
    expand_with_primary_atr: true
    # 浮盈 ≥ activation_r×ATR 后启用跟踪；宜与 initial_r 同量级或略小，避免「刚浮盈就跟踪」被洗
    activation_r: 4.0
    # 从极值回撤 trail_r×ATR 平仓；极大 ≈ 主要靠硬止损/时间/强平，跟踪极宽
    trail_r: 15.0
  type: trailing
  # 无 structural_exit（不设 vwap1200）；出场序：时间(若配) → breakeven(若开) → trailing → 硬止损 → 固定止盈(若开)
take_profit:
  enabled: false
version: 60
