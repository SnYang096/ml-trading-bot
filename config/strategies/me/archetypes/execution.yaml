# ME execution — 动量扩张 / 冲段（ATR 大、假突破多）
#
# 执行档相对关系（与 TPC 回撤、BPC 延续区分）：
#   ME > BPC > TPC  于 initial / activation / trail 默认量纲，避免「冲段」用得过紧被洗。
# 退出：structural_exit EMA1200 作结构保底 + trailing + expand_with_primary_atr 随 ATR 扩带；不设 breakeven。

add_position:
  add_size_multipliers:
    - 0.8
    - 0.5
    - 0.3
  inherit_parent_stop: true
  max_add_times: 3
  min_current_r_by_add:
    - 0.5
    - 1.0
    - 1.5
  min_current_r_unit: atr
  sizing_mode: fixed_multiplier
  trigger:
    # float_r_ladder_only = 浮盈 R 阶梯（事件回测）；bpc_follow_signal = 仅 PCM 再次意图时加仓
    type: float_r_ladder_only
execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15
holding:
  # 时间强平只认 max_holding_bars（与 ExecutionParamGenerator 一致）。0 = 禁用，由 SL / trailing / 结构出场决定持仓长度。
  max_holding_bars: 0
stop_loss:
  breakeven:
    enabled: false
    trigger_r: 9
    lock_level_r: 1.0
    measure: atr
  guardrails:
    max_stop_pct: 0.1
    min_stop_pct: 0.01
  initial_r: 4.0
  structural_exit: ema1200
  trailing:
    enabled: true
    expand_with_primary_atr: true
    activation_r: 4.0
    trail_r: 12.0
  type: trailing
take_profit:
  enabled: false
version: 61
