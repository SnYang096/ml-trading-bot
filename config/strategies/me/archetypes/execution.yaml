version: 27
execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15
stop_loss:
  type: trailing
  initial_r: 3.5
  trailing:
    activation_r: 1.0
    trail_r: 0.5
    step_r: 0.5
take_profit:
  enabled: false
holding:
  max_holding_bars: null
  time_stop_bars: 0        # fat tail: 禁用时间止损，trailing stop 是唯一退出机制
optimization:
  enabled: true
  params:
    stop_loss.initial_r:
      range:
      - 1.0
      - 4.0
      step: 0.5
    stop_loss.trailing.activation_r:
      range:
      - 0.5
      - 5.0
      step: 0.5
    stop_loss.trailing.trail_r:
      range:
      - 0.5
      - 3.0
      step: 0.5
