# CompressionBreakout Prefilter — v3（2026-05-28 promote）
#
# 职责: archetype 前置 — 压缩释放 + 波动带 + OI 低位（与 regime chop 分工）
# 来源: config_experiments/me_prefilter_fix_v3_atr_loose_strategies
# 诊断: 移除 compression_duration（与 atr>=0.65 互斥）；oi 反向改为 <=0.10

rules:
  - feature: atr_percentile
    operator: ">="
    value: 0.55
    locked: true
    lock_reason: "压缩突破：中高波扩张区（v3 放宽下界）"

  - feature: atr_percentile
    operator: "<="
    value: 0.95
    locked: true
    lock_reason: "压缩突破：避免极端尾段过热"

  - feature: recent_compression_decay
    operator: ">="
    value: 0.02
    locked: true
    lock_reason: "压缩突破：要求近期确实经历压缩释放"

  - feature: recent_compression_decay
    operator: "<="
    value: 0.20
    locked: true
    lock_reason: "压缩突破：限制在释放早段，避免中后段衰竭"

  - feature: oi_compression_score
    operator: "<="
    value: 0.10
    locked: true
    lock_reason: "OI 压缩低位带（prod oi>=0.45 已证反向）"

last_evaluation:
  timestamp: "2026-05-28"
  data_source: "results/train_final/me/train_final_20260519_133835_rr_extreme/me/features_labeled.parquet"
  notes: "v3 promote; v4 event_backtest + v6 direction holdout Mean R +0.25 (49 trades)"
