# ME 方向 — 「爆发段猎手」变体：仅动能/参与/趋势兜底级联，不要求 macro_tp_vwap_1200_position。
# 与 BPC 式「方向须与 VWAP 带通同号」脱钩，避免启动前洗盘时价在 VWAP 另一侧导致 direction=0。
#
# 级联：第一条给出非零 ±1 即采用（与 GenericLiveStrategy DirectionEvaluator 一致）。
# - me_accel_5k + sign：扩张加速度方向（ME 核心）
# - me_cvd_alignment + center_sign：价流一致（>0.5 多、<0.5 空）
# - macd_atr + sign：慢速兜底

description: "ME 方向（爆发段）— accel → CVD 对齐 → MACD；无 VWAP 带约束"

direction_rules:
  - id: me_burst_accel
    feature: me_accel_5k
    transform: sign
    description: "扩张加速度符号定主方向"
  - id: me_burst_cvd
    feature: me_cvd_alignment
    transform: center_sign
    description: "价流短期一致方向"
  - id: me_burst_macd
    feature: macd_atr
    transform: sign
    description: "MACD/ATR 符号兜底"
