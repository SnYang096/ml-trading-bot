# CompressionBreakout 方向 — v6_ema_only（2026-05-28 promote）
#
# holdout 2024-07~2026-05（6 币）: 49 trades, Mean R +0.25, Total R +12.46
# 来源: config_experiments/me_direction_v6_ema_only_strategies
#
# 优化流程:
#   1) rd_loop_me_direction.yaml → condition-set / IC
#   2) me_direction_smoke_grid / me_direction_v6_holdout_grid → event_backtest
#   3) 人审 → promote direction.yaml

description: "CompressionBreakout 方向 — me_accel + EMA1200 带（双向）"

direction_rules:
  - id: me_v6_accel_ema_only
    method: signal_match_position_band
    description: "me_accel.sign 同 EMA1200_position 同侧（|p|>inner），且 slope 同向"
    signal_rules:
      - feature: me_accel_5k
        transform: sign
    position_band:
      feature: ema_1200_position
      inner_abs: 0.03
      outer_abs: 1
    require_sign_agreement:
      feature: ema_1200_slope_10
      deadband: 0.0
