# ME Direction Determination
# 版本: 1.0
# 创建时间: 2026-02-16
#
# 职责: 确定 ME archetype 的交易方向 (long/short)
# 原则: 方向来自"动能方向"，是 deterministic 的，不让模型学
#
# Pipeline 位置:
#   Direction (本文件) → Gate → Entry Filter → Evidence → Execution
#
# 语义:
#   ME = Momentum Expansion
#   方向 = 动能方向 (钱在加速进来的方向)
#   "跟钱走"
#
# 禁止使用的特征 (会导致语义污染):
#   - SR 方向 (结构逻辑, 属于 BPC)
#   - HTF MA 方向
#   - 结构 break 方向 (属于 BPC)

version: 1

# 方向因果来源
causal_source: momentum  # 动能

# 方向确定规则 (按优先级从高到低)
# 命中第一个可用 method 后停止
#
# 选型依据: direction_strict_validation.py --compare-features
#   me_delta_net_flow: Median Lift +0.0778, Short=43.4%
#   price_velocity_pct: 兜底 (百分位数, 需 center_sign)
direction_rules:
  # 规则 1: ME 资金净流向 — "跟钱走" 核心语义
  - method: feature_sign
    feature: me_delta_net_flow
    description: "sign(me_delta_net_flow): 资金净流向方向"
    transform: sign  # [-1, 1] 范围, Long=56.6% Short=43.4%

  # 规则 2: 价格动量方向 (兜底)
  #   price_velocity_pct 是百分位数 [0,1], 不可用 sign()
  #   center_sign = sign(value - 0.5)
  - method: feature_sign
    feature: price_velocity_pct
    description: "sign(price_velocity_pct - 0.5): 百分位居中方向"
    transform: center_sign  # Long=50.5% Short=49.5%

# 方向验证
validation:
  require_nonzero: true
  allowed_values: [-1, 1]

# 候选特征研究: config/strategies/me/direction.yaml
# 重新评估命令:
#   python z实验_005_统一研究/direction_strict_validation.py \
#       --logs results/train_final_xxx/me/features_labeled.parquet \
#       --strategy me --compare-features
