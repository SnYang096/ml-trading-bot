# ME 方向 — 与 BPC/TPC/SRB 对齐：候选方向须与 EMA1200 相对位置同号。
# ME 为 short-only archetype：方向规则正常评估，但最终仅放行空头信号。
# 本轮上线前对照不使用 VWAP1200 绕行，确保牛熊/趋势 regime 口径一致。

description: "ME 方向 — 动量级联与 EMA1200 相对位置同号（signal_match_position_band）"
direction_filter: short

direction_rules:
  - id: me_accel_cvd_macd_ema1200_align
    method: signal_match_position_band
    description: "动量级联；须价在 EMA1200 单侧带（|p|>inner 死区），且与斜率同向"
    signal_rules:
      - feature: me_accel_5k
        transform: sign
      - feature: me_cvd_alignment
        transform: center_sign
      - feature: macd_atr
        transform: sign
    position_band:
      feature: ema_1200_position
      inner_abs: 0.03
      outer_abs: 1
    require_sign_agreement:
      feature: ema_1200_slope_10
      deadband: 0.0
