# ME 方向 — EMA1200 带通（主路径）+ 结构绕行（备路径）
#
# 2026-04 改进：VWAP1200 → EMA1200，与 BPC 对齐。
# 统计依据：VWAP/EMA 方向分歧时 (6.4% bars)，EMA 正确率显著优于 VWAP
#   VWAP>0 & EMA<0 → medRR=-1.52 (VWAP 放行了坏交易)
#   VWAP<0 & EMA>0 → medRR=+2.54 (VWAP 拦截了好交易)
#
# 评估顺序：先 strict EMA 级联；若不成立再试备路径。
#
# 1) 主规则：me_accel_5k → me_cvd_alignment → macd_atr 级联，须与
#    ema_1200_position 多头带 / 空头带 同号。
# 2) 备规则：me_vwap_structure_bypass_direction（极强 accel 或三连 K 同侧）

description: "ME 方向 — EMA1200 带通级联为主；极强 accel 或三连 VWAP 侧绕行"

direction_rules:
  - id: me_accel_cvd_macd_ema1200_align
    method: signal_match_position_band
    description: "me_accel_5k → me_cvd_alignment → macd_atr；须落在 EMA1200 多/空带通内"
    signal_rules:
      - feature: me_accel_5k
        transform: sign
      - feature: me_cvd_alignment
        transform: center_sign
      - feature: macd_atr
        transform: sign
    position_band:
      feature: ema_1200_position
      inner_abs: 0
      outer_abs: 1

  - id: me_vwap_bypass_accel_or_3bar_pierce
    feature: me_vwap_structure_bypass_direction
    transform: raw
    description: "极强 accel 或三连 K 在 VWAP 同侧时绕过带通（依赖 me_vwap_structure_bypass_f）"
