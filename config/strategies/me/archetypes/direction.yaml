# ME Direction Determination
# 版本: 1.0
# 创建时间: 2026-02-16
#
# 职责: 确定 ME archetype 的交易方向 (long/short)
# 原则: 方向来自"动能方向"，是 deterministic 的，不让模型学
#
# Pipeline 位置:
#   Direction (本文件) → Gate → Entry Filter → Evidence → Execution
#
# 语义:
#   ME = Momentum Expansion
#   方向 = 动能方向 (钱在加速进来的方向)
#   "跟钱走"
#
# 禁止使用的特征 (会导致语义污染):
#   - SR 方向 (结构逻辑, 属于 BPC)
#   - HTF MA 方向
#   - 结构 break 方向 (属于 BPC)

version: 1

# 方向因果来源
causal_source: momentum  # 动能

# 方向确定规则 (按优先级从高到低)
# 命中第一个可用 method 后停止
direction_rules:
  # 规则 1: WPT 能量方向 — 最符合文档语义
  - method: feature_sign
    feature: wpt_volume_energy_f
    description: "sign(wpt_energy): 小波变换能量方向"
    transform: sign  # direction = sign(feature_value)

  # 规则 2: Delta rolling sum 方向
  - method: feature_sign
    feature: delta_rolling_sum
    description: "sign(delta_rolling_sum): 资金流方向"
    transform: sign

  # 规则 3: 已有 entry_direction 列 (训练产出)
  - method: feature_column
    feature: entry_direction
    description: "训练产出的方向列"
    transform: raw

  # 规则 4: 价格速度方向 (兜底)
  - method: feature_sign
    feature: price_velocity_pct
    description: "sign(price_velocity): 价格速度方向"
    transform: sign

# 方向验证
validation:
  require_nonzero: true
  allowed_values: [-1, 1]

# 适合的特征 (供参考)
semantic_features:
  - wpt_energy_slope
  - directional_cluster_consecutive
  - imbalance_direction_consecutive
  - delta_rolling_sum
  - price_velocity_percentile
