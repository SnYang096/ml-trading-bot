# ME Holding 配置 (momentum_hold profile)
# 版本: 3.0
# 更新时间: 2026-03-05
#
# ╔═══════════════════════════════════════════════════════════╗
# ║  ME = 微结构动量策略 → momentum_hold profile              ║
# ║  主退出: 紧 trailing stop (activation=1R, trail=0.5ATR)   ║
# ║  无 EMA200 限制 (ME 可逆 EMA200 交易)                     ║
# ╚═══════════════════════════════════════════════════════════╝
#
# ── Multi-Alpha Holding ──────────────────────────────────
#
#   BPC → trend_hold    → EMA200 exit + 极宽灾难 trailing
#   ME (本文件) → momentum_hold → 紧 trailing (快进快出)
#
#   两种 fat-tail 范式互补:
#     趋势型 (BPC): 缓涨 2-6 个月, 单笔 15-50R, 穿越盘整
#     动量型 (ME):  急涨 2-5 天, 单笔 3-8R, 盘整即退
#

# 最大持仓时间
max_holding_bars: 0   # fat tail: 禁用时间止损，紧 trailing stop 是唯一退出机制

# 时间止损
time_stop:
  enabled: false
  bars: 0                 # trailing stop 是唯一退出机制

# 盈利保护
profit_protection:
  enabled: true
  min_profit_r: 0.5  # 盈利超过 0.5R 后启用保护
  trailing_stop_r: 1.0  # 回撤 1R 则止损

# 加仓规则
add_on:
  enabled: true   # ME 动能策略允许加仓，放大动量型 fat tail

# ── 与 BPC trend_hold 的关键区别 ──
#
#   ME momentum_hold:
#     - trail_r=0.5 (紧, 盘整即退)
#     - activation_r=1.0 (快速激活)
#     - 无 structural_exit (无 EMA200 限制)
#     - 无 regime filter (ME 可逆 EMA200 方向交易)
#
#   BPC trend_hold:
#     - trail_r=7.0 (极宽, 仅灾难保护)
#     - structural_exit=ema200 (主退出)
#     - EMA200 regime filter (只顺 EMA200 方向交易)
