# ME Gate (optimized, auto-promoted)
# 来源: config/strategies/me/archetypes/gate.yaml
# 优化规则: 1/4 条通过优化, 3 条已移除

schema:
  phases:
  - system_safety
  - hard_gate
  - guardrail
  evaluation_order: system_safety -> hard_gate -> guardrail
  governance:
    selection_method: gate_score (Youden's J = tail_capture - good_deny_rate)
    min_gate_score: 0.0
    alert_threshold: 0.25
hard_gates:
- id: prefilter_oi_trend_bpc_bb
  tag: PREFILTER_OI_TREND_BPC_BB
  phase: hard_gate
  priority: 1
  reason: 'prefilter OR: oi_trend_divergence_score<0.2534 OR bpc_bb_compression_state>0.1299'
  when:
    all_of:
    - oi_trend_divergence_score:
        value_lt: 0.2534
    - bpc_bb_compression_state:
        value_gt: 0.1299
  then:
    action: deny
  frozen: true
  comment: prefilter条件 (训练-推理一致性, frozen=true)
- id: gate_evt_tail_shape
  tag: HARD_EVT_TAIL_SHAPE
  phase: hard_gate
  priority: 10
  reason: 统计验证规则 (lift=1.35)
  when:
    evt_tail_shape:
      value_gt: 0.304
  then:
    action: deny
  comment: 'optimizer: no_stable_plateau, threshold=0.3040, lift=0.115'
guardrails: []
