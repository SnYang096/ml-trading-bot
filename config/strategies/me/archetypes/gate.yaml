# ME-SHORT Gate
# 结构对齐 BPC（EVT 尾形 / VPIN 分位 / 宏观 VWAP 锚 / vol persistence），保留 ME 原统计优化 VPIN 规则。
# 语义：与 BPC 同属趋势骑乘，ME 更偏「短期强动量」；宏观标尺与噪声过滤仍沿用同一套 anchor，细节由 entry/evidence 收紧。
# 来源 ME 专有规则: results/research_history/me-short/20260313_234144/strategies/me-short/gate_draft.yaml
schema:
  phases:
    - system_safety
    - hard_gate
    - guardrail
  evaluation_order: system_safety -> hard_gate -> guardrail
  governance:
    selection_method: gate_score (Youden's J = tail_capture - good_deny_rate)
    min_gate_score: 0.0
    alert_threshold: 0.25
hard_gates:
  - id: gate_evt_var_99_evt_var_99
    tag: HARD_EVT_VAR_99_EVT_VAR_99
    phase: hard_gate
    priority: 10
    reason: 与 BPC 对齐 — EVT 左尾风险拖泥带水区对趋势/动量延续不利
    when:
      all_of:
        - evt_var_99:
            value_gt: 0.6706
        - evt_var_99:
            value_lt: 0.7976
    then:
      action: deny
    comment: "aligned_with_bpc: stable_plateau_found (bpc reference thresholds)"
    locked: true
    lock_reason: EVT 左尾风险强度中高区间：动量扩张易被假突破/回撤打断
  - id: gate_evt_tail_shape_right_evt_tail_shape_right
    tag: HARD_EVT_TAIL_SHAPE_RIGHT_EVT_TAIL_SHAPE_RIGHT
    phase: hard_gate
    priority: 12
    reason: 与 BPC 对齐 — 右尾形状偏「假强势」时对顺势策略不利
    when:
      all_of:
        - evt_tail_shape_right:
            value_gt: 0.3373
        - evt_tail_shape_right:
            value_lt: 0.5317
    then:
      action: deny
    comment: "aligned_with_bpc: stable_plateau_found (bpc reference thresholds)"
    locked: true
    lock_reason: EVT 右尾形状：上冲下砸结构下不宜追短期强动量
  - id: gate_vpin_quantile_rank_20_high
    tag: HARD_VPIN_QUANTILE_RANK_20
    phase: hard_gate
    priority: 11
    reason: 与 BPC 对齐 — VPIN 分位过高 = 持续信息不对称
    when:
      vpin_quantile_rank_20:
        value_gt: 0.8
    then:
      action: deny
    comment: "aligned_with_bpc: deny when informed-flow rank extreme"
    locked: true
    lock_reason: VPIN 分位过高：知情侧过强时短线动量信号噪声大
  - id: gate_macro_tp_vwap_1200_deadzone
    tag: HARD_MACRO_TP_VWAP_1200_DEADZONE
    phase: hard_gate
    priority: 13
    reason: 宏观 VWAP 近场死区（与 BPC 同阈；锚定见 meta macro_tp_vwap_anchor）
    when:
      all_of:
        - macro_tp_vwap_1200_position:
            value_gt: -0.005
        - macro_tp_vwap_1200_position:
            value_lt: 0.005
    then:
      action: deny
    comment: "semantic_anchor: ME 仍需避开近 VWAP 弱趋势带，强动量应在带外确认"
    locked: true
    lock_reason: VWAP1200 近场噪声区，不利于「干净」的短期动量扩张
  - id: gate_macro_tp_vwap_1200_overlong
    tag: HARD_MACRO_TP_VWAP_1200_OVERLONG
    phase: hard_gate
    priority: 14
    reason: 宏观 VWAP 上侧过度偏离（追涨性价比差）
    when:
      macro_tp_vwap_1200_position:
        value_gt: 0.9
    then:
      action: deny
    comment: "semantic_anchor: 与 BPC 一致，避免极端拉伸后接力"
    locked: true
    lock_reason: VWAP1200 上侧过度偏离，追短动量盈亏比差
  - id: gate_macro_tp_vwap_1200_overshort
    tag: HARD_MACRO_TP_VWAP_1200_OVERSHORT
    phase: hard_gate
    priority: 15
    reason: 宏观 VWAP 下侧极端偏离
    when:
      macro_tp_vwap_1200_position:
        value_lt: -0.9
    then:
      action: deny
    comment: "semantic_anchor: 结构异常阶段不做动量入场"
    locked: true
    lock_reason: VWAP1200 下侧极端偏离区，结构异常阶段不做入场
  - id: gate_stat_vol_persistence_vol_persistence
    tag: HARD_STAT_VOL_PERSISTENCE
    phase: system_safety
    priority: 22
    reason: 与 BPC 对齐 — 波动率持久性「噪声切换」区间
    when:
      all_of:
        - vol_persistence:
            value_gt: 0.0275
        - vol_persistence:
            value_lt: 0.0616
    then:
      action: deny
    comment: "aligned_with_bpc: vol_persistence band from bpc gate"
    locked: true
    lock_reason: 波动率持久性：噪声切换期对短周期动量策略同样不利
  # ── ME 原统计优化规则（VPIN 峰值区间 + 均值过高）──
  - id: gate_vpin_max20_vpin_max20
    tag: HARD_VPIN_MAX20_VPIN_MAX20
    phase: hard_gate
    priority: 16
    reason: ME 统计验证规则 (lift=1.46)
    when:
      all_of:
        - vpin_max20:
            value_gt: 0.2037
        - vpin_max20:
            value_lt: 0.2952
    then:
      action: deny
    comment: "optimizer: stable_plateau_found, threshold=0.3250, lift=0.678"
    locked: true
    lock_reason: VPIN 峰值区间：突发知情流与短动量信号容易背离
  - id: gate_vpin_ma20
    tag: HARD_VPIN_MA20
    phase: hard_gate
    priority: 17
    reason: ME 统计验证规则 (lift=1.15)
    when:
      vpin_ma20:
        value_gt: 0.3
    then:
      action: deny
    comment: "optimizer: no_stable_plateau, threshold=0.3000, lift=0.206"
    locked: true
    lock_reason: VPIN 均值持续偏高：信息不对称环境下不宜做 ME 扩张
guardrails: []
