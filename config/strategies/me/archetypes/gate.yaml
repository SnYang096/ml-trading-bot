schema:
  phases:
  - system_safety
  - hard_gate
  - guardrail
  evaluation_order: system_safety -> hard_gate -> guardrail
  governance:
    selection_method: gate_score (Youden's J = tail_capture - good_deny_rate)
    min_gate_score: 0.0
    alert_threshold: 0.25
hard_gates:
- id: prefilter_me_atr_pct
  tag: PREFILTER_ME_ATR_PCT
  phase: hard_gate
  priority: 1
  reason: 'prefilter: me_atr_pct < 0.06'
  when:
    me_atr_pct:
      value_lt: 0.06
  then:
    action: deny
  frozen: true
  comment: prefilter条件 (训练-推理一致性, frozen=true)
- id: bell_or_pass_prefilter_me_cvd_alignment_prefilter_oi_trend_divergence_score
  tag: BELL_OR_PASS_1
  phase: hard_gate
  priority: 1
  reason: 'Bell Partition OR-pass: prefilter_me_cvd_alignment ∨ prefilter_oi_trend_divergence_score'
  when:
    all_of:
    - me_cvd_alignment:
        value_ge: 1.0
    - oi_trend_divergence_score:
        value_lt: 0.0011
  then:
    action: deny
  comment: 'OR-pass: deny only when ALL of [prefilter_me_cvd_alignment, prefilter_oi_trend_divergence_score] deny simultaneously'
  frozen: true
- id: gate_evt_tail_shape
  tag: HARD_EVT_TAIL_SHAPE
  phase: hard_gate
  priority: 10
  reason: 统计验证规则 (lift=1.35)
  when:
    evt_tail_shape:
      value_gt: 0.854
  then:
    action: deny
  comment: 'optimizer: stable_plateau_found, threshold=0.8540, lift=0.110'
- id: bell_or_pass_prefilter_atr_percentile_gate_atr_percentile_atr_percentile_fp_val_fp_val
  tag: BELL_OR_PASS_3
  phase: hard_gate
  priority: 1
  reason: 'Bell Partition OR-pass: prefilter_atr_percentile ∨ gate_atr_percentile_atr_percentile_fp_val_fp_val'
  when:
    all_of:
    - atr_percentile:
        value_ge: 0.8167
    - atr_percentile:
        value_gt: 0.2019
    - atr_percentile:
        value_lt: 0.2704
    - fp_val:
        value_gt: 603.2735
    - fp_val:
        value_lt: 87986.1673
