# ME (MomentumExpansion) 策略特征配置
# 语义：压缩后波动/区间扩张，放量突破

name: me
description: |
  MomentumExpansion archetype: 压缩后波动/区间扩张，放量突破。
  核心特征：compression → expansion (atr/range/volume)。

feature_pipeline:
  exclude_columns:
    - atr
  requested_features:
    # ----- MomentumExpansion 核心特征 -----
    # Safety: reflexivity
    - shd_pct_f
    - ofci_pct_f
    # Exclusions / preconditions: jump_risk, atr_percentile, bb_width
    - jump_risk_pct_f
    - atr_percentile_f
    - bb_width_normalized_pct_f
    # Evidence: vpin, volume_ratio_pct
    - volume_ratio_pct_f
    - vpin_features_f
    # Structure / path
    - path_efficiency_pct_f
    - path_length_pct_f
    - price_dir_consistency_pct_f
    # ----- Compression / WPT / spectrum -----
    - macd_atr_f
    - rsi_f
    - sma_200_f
    - atr_f
    - trend_r2_20_f
    - sr_strength_max_f
    - volume_profile_volatility_features_f
    - wpt_price_reconstructed_f
    - wpt_price_fluctuation_f
    - wpt_volume_energy_f
    - wpt_cvd_fluctuation_f
    - spectrum_features_compression_breakout_f
    - liquidity_void_f
    - hilbert_phase_f
    - hurst_price_f
    - hurst_cvd_f
    - footprint_basic_f
    - liquidity_void_x_wpt_risk_rank_f
    - compression_energy_x_ofi_short_rank_f
    - vpin_x_compression_rank_f
    - vpin_zscore_x_trade_cluster_max_buy_run_rank_f
    - vpin_x_trade_cluster_entropy_rank_f
    - dtw_features_compression_f
  ensure_signal_column:
    name: signal
    default_value: 0
