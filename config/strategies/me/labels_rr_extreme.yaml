# CompressionBreakout Gate 子标签：success_no_rr_extreme（不踩大坑）
#
# direction_aware=true：按 direction.yaml 逐 bar 方向翻转 forward_rr，
#   多空样本均按「该方向」评估是否踩 < -0.8R 大坑（与 RMR/FER 同口径）。

name: me_rr_extreme
target_column: success_no_rr_extreme

label_generator:
  module: src.time_series_model.strategies.labels.failure_first_label
  function: compute_bpc_failure_rr_extreme_label
  params:
    direction: long
    horizon: 50
    invert: true
    direction_aware: true
    strategy: me

label_meta:
  label_type: binary
  failure_subtype: rr_extreme
  semantic: |
    success_no_rr_extreme = 1 - failure_rr_extreme
    1 = 不会踩大坑（该 bar 方向上的 forward_rr >= -0.8R）
    0 = 踩大坑（该 bar 方向上的 forward_rr < -0.8R）
  failure_definition: |
    failure_rr_extreme = forward_rr_directional < -0.8R
    direction_aware 时 forward_rr = forward_rr_long × per-bar direction
  horizon: 50 bars
  description: |
    ME / CompressionBreakout Gate 训练：
    - 识别压缩突破后「沿信号方向」是否会路径极端不利
    - 高预测值 = 安全（该方向不会踩大坑）

filters:
  - column: success_no_rr_extreme
    notna: true

kpi_definition:
  veto_ability:
    description: "Gate 是否能有效降低 failure_rr_extreme 发生率（多空 direction_aware）"
    metrics:
      - name: lift_at_70pct
        description: "Top 70% 覆盖时的 Lift (failure rate reduction)"
        target: "<= 0.90x"
        critical: true
      - name: lift_at_50pct
        description: "Top 50% 覆盖时的 Lift"
        target: "<= 0.85x"
        critical: true

post_label_filters: []
