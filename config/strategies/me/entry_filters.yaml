#   volume_participation:   边际 snotio=20.96, Stop=35.8% — ✅ 较好
#   wick_compression_high:  边际 snotio=19.25, Stop=37.1% — ✅ 较好
#   vpin_spike:             边际 snotio=18.39, Stop=14.3% — ✅ (极少独有)
