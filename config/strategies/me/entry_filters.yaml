#   price_dir_consistency:  边际 snotio=17.44, Stop=44.5% — ⚠️ 边际
#   accel_burst_vol_regime: 边际 snotio=12.86, Stop=35.8% — ❌ 无效
#   vp_absorption:          边际 snotio=12.66, Stop=37.7% — ❌ 无效
