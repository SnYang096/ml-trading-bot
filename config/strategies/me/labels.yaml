# ME (MomentumExpansion) 策略标签配置
# 语义：压缩后波动/区间扩张，放量突破

name: me
target_column: rr_label

label_generator:
  module: src.time_series_model.strategies.labels.me_label
  function: compute_me_label
  params:
    price_col: close
    max_holding_bars: 50
    take_profit_r: 2.0
    stop_loss_r: 1.0
    # 压缩检测参数
    compression_lookback: 20
    compression_percentile: 30
    # 突破检测参数
    breakout_lookback: 10
    volume_mult: 1.2
    combine_mode: long_only

filters:
  - column: rr_label
    notna: true

post_label_filters: []
