# CompressionBreakout（slug me）策略标签 — 压缩后双向扩张突破
# 语义：压缩蓄势 → 向上/向下突破，顺势 forward RR

name: me
target_column: rr_label

label_generator:
  module: src.time_series_model.strategies.labels.me_label
  function: compute_me_label
  params:
    price_col: close
    max_holding_bars: 50
    take_profit_r: 2.0
    stop_loss_r: 1.0
    breakout_lookback: 10
    volume_mult: 1.2
    combine_mode: any_success  # 双向：breakout_up + breakout_down，按突破方向赋 sign

filters:
  - column: rr_label
    notna: true

post_label_filters: []
