name: trend_following
target_column: label

label_generator:
  module: src.time_series_model.strategies.labels.trend_following_label
  function: compute_trend_following_label
  params:
    price_col: close
    horizon: 50
    rank_window: 200
    min_periods: 50

filters:
  - column: label
    notna: true

post_label_filters:
  - ensure_feature_non_null: true

