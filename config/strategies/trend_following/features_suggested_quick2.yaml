name: trend_following__suggested
description: 'Trend-following strategy leveraging WPT trend, Hurst persistence, Hilbert
  phase stability, and multi-timeframe context features.

  '
feature_pipeline:
  requested_features:
  - atr_f
  invert_features: []
feature_group_search:
  base_strategy_dir: config/strategies/trend_following
  objective: Sharpe_mean
  min_trades: 5
  seeds:
  - 1
  selected_groups: []
  stop_reason: no_improvement
  base_features:
  - atr_f
  final_features:
  - atr_f
  groups_source: groups_yaml:auto:config/feature_groups_trend_following_semantic.yaml
  groups_yaml_auto: true
  pool_b_yaml: /dev/null
  pool_b_merged_singletons: true
  feature_blacklist:
  - vpin_scene_semantic_scores_f
  - market_cap_normalized_orderflow_f
