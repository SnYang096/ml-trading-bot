# LV Labels 配置
# 清算型策略标签：识别"强迫移动"机会

name: lv_failure_first
target_column: success_label

label_generator:
  module: src.time_series_model.strategies.labels.failure_first_label
  function: compute_bpc_failure_label  # 复用通用 failure label (RR-based)
  params:
    direction: long
    horizon: 20        # 15min × 20 = 5小时 (LV 快进快出)
    expected_stop_atr: 0.8    # 更紧的止损 (清算型波动大)
    expected_target_atr: 2.0  # 高 R:R (清算瀑布利润空间大)
    invert: true  # 1=好机会，0=失败

label_meta:
  label_type: binary
  semantic: |
    success_label = 1 - failure_label
    1 = 好机会（清算瀑布确实发生）
    0 = 失败（假信号，清算未触发或已消化）
  failure_definition: |
    failure = (forward_rr < -0.8) OR (mae > 1.0*stop AND mfe < 0.3*target)
  horizon: 20 bars (= 5h at 15min)
  expected_stop: 0.8 ATR
  expected_target: 2.0 ATR
  audit_mode: true
  description: |
    LV Failure-first 二值标签:
    - 1 = 好机会（清算瀑布发生，R:R达标）
    - 0 = 失败（清算未触发/快速消化）

filters:
  - column: success_label
    notna: true

post_label_filters: []
