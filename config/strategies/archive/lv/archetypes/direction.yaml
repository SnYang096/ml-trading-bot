# LV Direction Determination
# 版本: 1.1
#
# 职责: 确定 LV archetype 的交易方向
# 原则: 方向来自结构反转 (清算瀑布方向), 不是杠杆偏向
#
# 语义:
#   LV = Leverage Vulnerability
#   LV 本质是 15min 级别的 FER + 杠杆放大器
#   方向由结构决定: 价格在阻力被拒→做空, 在支撑被拒→做多
#   funding_rate 等杠杆指标属于 prefilter/gate (有没有脆弱性),
#   不属于 direction (往哪个方向清算)
#
# ⚠️ 以下为临时规则, 待 direction_strict_validation.py --promote 自动替换
#     管线跑完后会用 permutation test 验证并选最优候选

version: 1

# 方向确定规则 (按优先级从高到低)
# 临时方案: 用 FER 的失败脉冲方向作为主规则, macd 兜底
# 管线 Step 4 (--promote) 会自动用 permutation test 选最优
direction_rules:
  # 规则 1: 失败脉冲方向的反向 (如果 FER 特征可用)
  # fer_impulse_failure_direction 在 15min 可能覆盖率低, 需要兜底
  - method: feature_sign
    feature: fer_impulse_failure_direction
    description: "失败脉冲方向的反向: 清算瀑布方向"
    transform: negate_sign

  # 规则 2: 动量反向 (兜底)
  - method: feature_sign
    feature: roc_20
    description: "20-bar ROC 反向: 动能耗尽 → 清算方向"
    transform: negate_sign

  # 规则 3: MACD 反向 (最终兜底)
  - method: feature_sign
    feature: macd_atr
    description: "MACD/ATR 反向 (最终兜底)"
    transform: negate_sign

# 方向验证
validation:
  require_nonzero: true
  allowed_values: [-1, 1]

# 适合的特征 (供参考)
semantic_features:
  - funding_rate_sign
  - long_short_ratio
  - oi_delta_price_divergence
  - orderbook_depth_asymmetry
