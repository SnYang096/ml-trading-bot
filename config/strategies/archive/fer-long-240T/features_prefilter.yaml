# FER Prefilter 特征配置 (Meta-Algorithm)
# 职责: 定义 FER archetype 语义边界的特征候选池
# 仅含 FER 专属 + 交叉 + 场景语义特征 — 排除通用特征 (RSI/MACD/ATR/SMA)
#
# 设计理念:
#   Prefilter 回答: "这个 bar 是不是 FER (Failure-Exhaustion-Reversal)?"
#   如果用通用特征, 所有 archetype 会选到相同特征, 失去区分度
#
# 用法 (Meta-Algorithm 模式):
#   python scripts/analyze_archetype_feature_stratification.py \
#       --logs results/.../fer/features_labeled.parquet \
#       --strategy fer \
#       --config config/strategies/fer/prefilter.yaml \
#       --features-prefilter config/strategies/fer/features_prefilter.yaml \
#       --meta-algorithm --promote

name: fer_prefilter
description: |
  FER Prefilter 特征: 单边博弈失败/反转信号的因果前提特征。
  SHAP∩Gain 在这些特征上训练 LightGBM, 发现 archetype 边界。

feature_pipeline:
  requested_features:
    # ========== FER 专属: 因果失败信号 ==========
    # → fer_signed_efficiency, fer_efficiency_flip, fer_aggressor_absorption,
    #   fer_trapped_longs_score, fer_trapped_shorts_score, fer_impulse_failure_score,
    #   fer_momentum_efficiency_decay, fer_volume_price_divergence, ...
    - fer_failure_signals_f

    # ========== FER 交叉特征 ==========
    # 资金+VPIN 双源力竭 (FER 核心交叉)
    - dual_exhaustion_f

    # ========== 触发位置: 失败发生在 SR 边界更有意义 ==========
    # → sr_strength_max (距最近 SR 的 ATR 倍数, 值小=失败发生在关键位)
    - sr_strength_max_f
    # → sqs_hal_low_pct (支撑位质量百分位, 用于过滤弱结构噪声触发)
    - sqs_hal_low_pct_f
    # → poc, hal_high, hal_low (成交量分布边界, 值小=失败发生在 VA 边缘)
    - poc_hal_features_close_f
    # → vp_poc_deviation, vp_lv_ratio (流动性真空结构)
    - volume_profile_volatility_features_f

    # ========== 压缩状态 (FER 在压缩后反转效果更好) ==========
    - recent_compression_decay_f    # 压缩衰减记忆: 最近是否经历过压缩 (baseline 模块)
    - compression_duration_f        # 压缩持续时间 (ATR 百分位连续 bar 数)

    # ========== 触发信号: 影线拒绝 + 极値距离 ==========
    # → wick_upper_ratio, wick_lower_ratio (影线拒绝 = 止损猎杀/失败信号)
    - wick_ratios_f
    # → bars_since_local_high/low (swing 距离, 值小=刚在极值处失败)
    - bars_since_extreme_f

    # ========== 场景语义 (FER 相关) ==========
    # OI 场景语义 (exhaustion 与 FER 的力竭反转语义对应)
    - oi_scene_semantic_scores_f
    # Wick 力竭场景语义
    - wick_scene_semantic_scores_f
    - market_cap_normalized_orderflow_f
