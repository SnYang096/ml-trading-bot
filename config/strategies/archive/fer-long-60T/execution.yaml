# FER Execution 研究配置 (初始/手工版)
# 版本: 2.0
# 创建时间: 2026-02-20
#
# ┌──────────────────────────────────────────────────────┐
# │  本文件是 execution 的初始研究版，手工设定。            │
# │  优化后的版本由 optimize_execution_grid.py --promote  │
# │  自动写入 archetypes/execution.yaml。                 │
# └──────────────────────────────────────────────────────┘
#
# FER = 反转策略，特点：
#   - 设固定止盈（反转空间有上限）
#   - 止损比趋势策略更紧（反转失败要快跑）
#   - 持仓时间较短（反转行情窗口有限）

version: 2

# ============================================================
# 📌 基础执行结构
# ============================================================

execution_constraints:
  allow_add_on: false          # 反转策略不加仓
  min_order_interval_minutes: 15

# 止损配置 (初始手工值，待 grid search 优化)
stop_loss:
  type: trailing
  initial_r: 1.5              # 反转策略中等止损
  trailing:
    activation_r: 1.5         # 盈利 1.5R 后激活移动止损
    trail_r: 1.0              # 移动止损距离 1.0R
    step_r: 0.5               # 每上涨 0.5R 收紧

# 止盈配置
take_profit:
  enabled: true               # 反转策略设固定止盈（反转空间有上限）
  target_r: 3.0               # 3.0R 止盈

# 持仓约束
holding:
  max_holding_bars: null
  time_stop_bars: 40           # 反转策略持仓时间较短

# ============================================================
# 🎯 Tiers: 按 evidence_score 分档执行参数
# ============================================================
# 用法: python scripts/backtest_execution_layer.py --tiers
#
# evidence_score 由 evidence.yaml 中特征加权计算。
# 每个入场信号根据 score 落入对应 tier，使用该 tier 的执行参数。
# 未启用 --tiers 时，所有入场使用上方全局 stop_loss 参数。

tiers:
  enabled: true
  # 从高到低匹配（第一个 score >= evidence_min 的 tier 生效）
  levels:
    - name: 强证据
      evidence_min: 0.70
      stop_loss:
        initial_r: 1.0
        trailing:
          activation_r: 1.0
          trail_r: 0.8
      size_multiplier: 1.3
      time_stop_bars: 60

    - name: 中等证据
      evidence_min: 0.50
      stop_loss:
        initial_r: 1.5
        trailing:
          activation_r: 1.5
          trail_r: 1.0
      size_multiplier: 1.0
      time_stop_bars: 40

    - name: 弱证据
      evidence_min: 0.30
      stop_loss:
        initial_r: 2.0
        trailing:
          activation_r: 2.0
          trail_r: 1.5
      size_multiplier: 0.7
      time_stop_bars: 30

    - name: 边缘证据
      evidence_min: 0.10
      stop_loss:
        initial_r: 2.5
        trailing:
          activation_r: 2.5
          trail_r: 2.0
      size_multiplier: 0.5
      time_stop_bars: 20

# ============================================================
# 🔧 网格搜索参数范围
# ============================================================
# 用法: python scripts/optimize_execution_grid.py --strategy fer --promote
#
# 注意: Grid Search 优化全局参数（不按 tier 分别优化）。
#       --tiers 和 --grid-search 不同时使用。

optimization:
  enabled: true
  params:
    stop_loss.initial_r:
      range: [0.8, 2.5]
      step: 0.5
    stop_loss.trailing.activation_r:
      range: [0.5, 2.5]
      step: 0.5
    stop_loss.trailing.trail_r:
      range: [0.5, 2.0]
      step: 0.5
