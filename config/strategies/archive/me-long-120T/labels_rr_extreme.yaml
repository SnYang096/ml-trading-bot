# ME-Short Failure 子标签：failure_rr_extreme（踩大坑）
# 🟥 只学习识别"路径极端不利"的结构条件（做空视角）
# - failure_rr_extreme = forward_rr_short < -0.8R
#   即价格大幅上涨（对空头是亏损）
# - 目标：识别哪些条件下做空会踩大坑

name: me_short_rr_extreme
target_column: success_no_rr_extreme  # invert=True

label_generator:
  module: src.time_series_model.strategies.labels.failure_first_label
  function: compute_bpc_failure_rr_extreme_label
  params:
    direction: short
    horizon: 50
    invert: true  # 1=好机会（不会踩坑），0=踩坑
    direction_aware: false

# 标签元信息
label_meta:
  label_type: binary
  failure_subtype: rr_extreme
  semantic: |
    success_no_rr_extreme = 1 - failure_rr_extreme
    1 = 不会踩大坑（forward_rr_short >= -0.8R，即价格未大幅上涨）
    0 = 踩大坑（forward_rr_short < -0.8R，即价格大幅上涨，空头亏损）
  failure_definition: |
    failure_rr_extreme = forward_rr_short < -0.8R
    forward_rr_short = -forward_rr_long （价格上涨 = 空头亏损）
  horizon: 50 bars
  description: |
    ME-Short Failure 子标签训练：
    - 只学习识别做空"踩大坑"的结构条件
    - ME-Short 专注于向下动量扩张后的失败模式（价格反向上涨）
    - 高预测值 = 安全（做空不会踩坑）

filters:
  - column: success_no_rr_extreme
    notna: true

# Gate 模型专属 KPI 定义
kpi_definition:
  veto_ability:
    description: "Gate 是否能有效降低 failure_rr_extreme 发生率（做空方向）"
    metrics:
      - name: lift_at_70pct
        description: "Top 70% 覆盖时的 Lift (failure rate reduction)"
        target: "<= 0.90x"
        critical: true
      - name: lift_at_50pct
        description: "Top 50% 覆盖时的 Lift"
        target: "<= 0.85x"
        critical: true

post_label_filters: []
