# ME-Short Entry Filters (seeded)
# 职责: "现在该入场做空吗?" → 硬二值控制
# 这是一组偏保守的初始规则，目标是限制在扩张早段。

filters:
  - id: me_short_first_expansion_seed
    enabled: true
    description: "扩张初段种子过滤器（保守）"
    conditions:
      - feature: atr_percentile
        operator: ">="
        value: 0.72
      - feature: atr_percentile
        operator: "<="
        value: 0.92
      - feature: recent_compression_decay
        operator: "<="
        value: 0.20
      - feature: compression_duration
        operator: ">="
        value: 0.05
      - feature: evt_var_99_right
        operator: "<="
        value: 0.90
      - feature: vpin_max20
        operator: "<="
        value: 0.35
    notes: "只在中高波扩张早段且微观结构未失真时允许开仓"

combination_mode: or
