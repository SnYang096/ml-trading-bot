# ME Prefilter 特征配置 (Meta-Algorithm)
# 职责: 定义 ME archetype 语义边界的特征候选池
# 仅含 ME 专属 + 交叉 + 场景语义特征 — 排除通用特征 (RSI/MACD/ATR/SMA)
#
# 设计理念:
#   Prefilter 回答: "这个 bar 是不是 ME (Momentum Expansion)?"
#   如果用通用特征, 所有 archetype 会选到相同特征, 失去区分度
#
# 用法 (Meta-Algorithm 模式):
#   python scripts/analyze_archetype_feature_stratification.py \
#       --logs results/.../me/features_labeled.parquet \
#       --strategy me \
#       --config config/strategies/me-long/prefilter.yaml \
#       --features-prefilter config/strategies/me-long/features_prefilter.yaml \
#       --meta-algorithm --promote

# 分层设计的哲学就是这样——各层回答不同的问题，组合起来才是完整的 ME archetype：
# 层	回答的问题	ME 扩张语义的体现
# Prefilter	这个 bar 的市场背景适合 ME 出现吗？	oi_trend_divergence_score < 0.25（OI 无背离）OR bpc_bb_compression_state > 0.13（有压缩基础）
# Gate	当下 ME 的能量条件是否达标？	me_atr_pct >= 0.06（有扩张能量），me_cvd_alignment >= 1.0（资金方向对齐）—— 扩张语义在这里
# Direction	往哪边扩张？	me_cvd_alignment、me_cvd_strength 判断方向
# Evidence	这次扩张的置信度有多高？	me_atr_pct × me_accel_5k × me_volume_surge 乘法组合（见 compute_me_evidence_from_series）
# Entry	微观触发时机是否到位？	me_accel_2k 瞬时加速 + 订单流爆发
# Prefilter 不需要包含扩张语义——它的职责是"圈出数据空间"，排除掉 Gate 永远过不了的市场背景（比如 OI 严重背离时，动能很快会反转），减少 Gate 的噪声样本。Gate 里 me_atr_pct < 0.06 → deny 和 me_cvd_alignment ≥ 1.0 已经在做扩张语义的守门工作了。这两层是互补关系，不是重复关系。

name: me_prefilter
description: |
  ME Prefilter 特征: Energy × Acceleration × Participation 三因子的因果前提特征。
  SHAP∩Gain 在这些特征上训练 LightGBM, 发现 archetype 边界。

feature_pipeline:
  requested_features:
    # ========== ATR 波动率百分位 (Prefilter 核心) ==========
    # 语义: 当前 ATR 处于历史百分位, 判断扩张/压缩 regime
    # atr_percentile: 0=极度压缩, 1=极度扩张
    - atr_percentile_f

    # ========== ME 压缩衰减记忆 (Prefilter 核心) ==========
    # 语义: 最近是否经历过压缩? 压缩结束后指数衰减
    # ME 需要先蓄势(压缩)再扩张, 此特征捕捉"刚从压缩出来"的状态
    # 与 atr_percentile 配合: atr_pct > 0.7 AND recent_compression_decay > 0.3
    #   = "当前正在扩张 + 最近刚从压缩出来"
    # decay_rate=0.97, 半衰期 ~23 bars (60T 约1天)
    - recent_compression_decay_f # 输出: recent_compression_decay [0,1]

    # ========== ME 压缩持续时长 ==========
    # 语义: 入场前 ATR percentile 连续低于阈值的 bars 数 (归一化 [0,1])
    # compression_duration 越高 = 当前正在压缩中 (与 recent_compression_decay 互补)
    - compression_duration_f     # 输出: compression_duration (ATR pct < 20% 的连续bars数/540)

    # ========== ME 当前能量状态 (Energy) ==========
    # 语义: 当前时刻扩张状态和 ATR 处于高位区
    # me_atr_pct, me_vol_regime, me_accel_2k/5k, me_multi_tf_alignment,
    # me_cvd_alignment, me_cvd_strength, me_volume_surge, me_volume_accel, me_delta_net_flow
    - me_soft_phase_f

    # ========== ME 上下文 ==========
    # 语义: 跳空风险适合度、反身性风险
    - me_context_f

    # ========== ME 失败信号 ==========
    # 语义: 当前动能是否已衰竭 (否否则过滤)
    - me_failure_f

    # ========== ME 交叉特征 ==========
    # 语义: 资金+FP 双源点火 (ME 核心交叉)
    - dual_ignition_f

    # ========== 场景语义 (ME 相关) ==========
    # OI 场景语义 (ignition 与 ME 能量扩张语义对应)
    - oi_scene_semantic_scores_f
