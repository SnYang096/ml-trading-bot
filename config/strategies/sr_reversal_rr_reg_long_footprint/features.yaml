name: sr_reversal_rr_reg_long_footprint
description: "Ablation: mainline + footprint_basic_f (ticks)"
feature_pipeline:
  requested_features:
  # Mainline (kline + minimal SR-distance features)
  - macd_f
  - rsi_f
  - sma_200_f
  - atr_f
  - roc_5_f
  - mom_10_f
  - bbands_f
  - bb_width_f
  - trend_r2_20_f
  - trend_r2_50_f
  - acceleration_3_f
  - wick_ratios_f
  - price_range_symmetry_f
  - poc_hal_features_close_f
  - sqs_hal_high_f
  - sqs_hal_low_f
  - sr_strength_max_close_f
  # Footprint subgroup: single-bar footprint (delta/imbalance/POC etc.)
  - footprint_basic_f
  ensure_signal_column:
    name: signal
    default_value: 0
notes: |
  Identical to sr_reversal_rr_reg_long except it adds footprint_basic_f.
  This is intended to capture absorption/imbalance patterns more aligned with reversals.


