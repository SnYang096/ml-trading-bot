name: eml_gate
description: |
  Gate 优化允许的特征列名（与 gate.yaml 中 when 键一致）。

feature_pipeline:
  exclude_columns:
    - atr
  requested_features:
    - atr_f
    - ema_1200_position_f
    - ema_1200_slope_f
    - jump_risk_pct_f
    - tpc_soft_phase_f
    - box_structure_f
  allowed_gate_deny_features:
    - "ema_1200_position"
    - "jump_risk_pct"
    - "tpc_semantic_chop"
    - "box_width_pct_120"
