# ============================================================
# 上线前训练流水线 (2H, RMR-only, 慢模式 / slow_realistic)
# DEPRECATED — RMR 已归档至 config/strategies/bad-candidates/rmr（见 FBF_RMR_HubRebound_verdict_20260420.md）。
# RMR = RangeMeanRevert（纯波动区向中轴回归），MVP 见 bad-candidates/rmr/meta.yaml
#
# 语义与 FBF（事件驱动的假破反手）/ SRB（真破延续）正交；与 TPC/BPC/ME（趋势/动量）相反。
#
# 示例:
#   mlbot pipeline run --all --config config/prod_train_pipeline_2h_slow_rmr_only.yaml --stage rolling_sim
#   mlbot pipeline run --all --config config/prod_train_pipeline_2h_slow_rmr_only.yaml --stage train_final
#
# 家族对照: docs/z实验_005_统一研究/strategy_families_BPC_TPC_ME_FBF_SRB_RMR.md
# ============================================================

dates:
  start_date: "2022-08-01"
  end_date: "2024-12-31"
  holdout_months: 15
  validation_months: 3

training:
  seeds:
    - 42
  seed_selection: best_sharpe

global_toggles:
  locked_threshold_tuning_enabled: true

strategy_scope:
  direction: all

rolling:
  mode: slow_realistic
  windows:
    calibration_months: 3
    structure_lookback_months: 12
  slow_realistic:
    cadence_months: 3
    triggered_retrain_enabled: true
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    disable_feature_search: true

threshold_calibration:
  pcm_eval:
    enabled: false

rolling_calibration:
  step_months: 1
  threshold_calibration:
    enabled: true
  prefilter:
    # RMR 研究：首轮固定 meta/locked 规则，先量化语义基线
    # 上线前若要 re-optimize，改 true 并在报告中标注
    optimize: false
  symbol_threshold_calibration:
    enabled: true
  direction_tuning:
    # 当前 direction.yaml 是 MVP（negate_sign(macd_atr) fade momentum）
    # 开启 tuning 可让管线从 features_direction 候选池中挑更稳定的 signed 组合
    enabled: true
    compare_features: true
    promote_after_validate: true

direction_stack:
  mode: ema200
  ema_debounce_bars: 3
  vwap_window_days: 20

stitching:
  enabled: true
  metrics: [sharpe, max_drawdown, total_r, near_stop_rate, slot_full_rate]
  export_trade_map_html: true

event_backtest:
  enabled: true
  promote: true
  map_extra_months: 4
  # RMR archetype SL/TP 小而紧（initial_r=0.8, target_r=1.5），事件优化网格也走小尺度
  sym_r_default: "0.6:0.2:1.2"
  sym_r_by_family:
    rmr: "0.6:0.2:1.2"
  exec_objective_default: sharpe
  exec_objective_params:
    near_stop_threshold_r: -0.9
    near_stop_penalty: 0.0
    max_dd_penalty: 0.0
    min_trades_soft: 0
    undertrade_penalty: 0.0

pcm_slot_grid:
  enabled: false

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap

data_path: data/parquet_data

download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data

strategies:
  rmr:
    config: config/strategies/bad-candidates/rmr
    prepare_features: features.yaml
    # labels_gate 用 rr_extreme 子标签（success_no_rr_extreme），与 SRB/TPC/FBF 保持一致
    # 策略模型自身训练仍用 labels.yaml 的 success_label
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        # 均值回归触发相对丰富（非事件驱动），pass_rate 门槛可略高
        min_pass_rate: 0.05
        min_rows: 150
        target_trades_min: 20
        target_trades_max: 150
        trade_penalty_low: 0.0021
        trade_penalty_high: 0.0014
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: false
          mode: auto_if_locked
          skip_if_cached: false
          max_cases: 12
          min_trades_target: 40
          trade_penalty: 0.0025
          target_trades_min: 20
          target_trades_max: 150
          trade_penalty_low: 0.0021
          trade_penalty_high: 0.0014
          stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
      entry_filter:
        meta_algorithm: false
        archetype_plateau: true
        significance_p: 0.10
        significance_min_trades: 3
        plateau_window: 4
        archetype_scoring_method: distribution_ks
        target_trades_min: 20
        target_trades_max: 150
        trade_penalty_low: 0.0021
        trade_penalty_high: 0.0014
        stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        min_score_improvement: 0.008
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.30
        stat_fallback_on_empty: true
        stat_fallback_max_rules: 3
        stat_fallback_min_source_features: 2
      backtest:
        min_trades: 20
      deploy:
        min_trades: 20
    simple_execution:
      # 与 rmr/archetypes/execution.yaml 对齐：initial_r=0.8, target_r=1.5
      sl_r: 0.8
      tp_r: 1.5
      timeout_bars: 48

shap_feature_selection:
  enabled: false
  n_folds: 8
  top_k: 20
  stability_threshold: 0.8
  min_stable_features: 1
  protected_nodes:
    - atr_f
  apply_to:
    - features.yaml

comparison:
  min_trades: 15
  sharpe_adopt_ratio: 0.7
  sharpe_reject_floor: 0.0
  threshold_drift_warn: 1.0

retrain_triggers:
  schedule_days: 90
  sharpe_decay_ratio: 0.5
  consecutive_losses: 8
  max_data_age_days: 120
  leading_indicator_decay: 0.5

deploy_gate:
  trigger_sharpe_improve: 0.05
  trigger_drift_level: HIGH
  min_sharpe_change: 0.03
  require_adopt: true
  min_trades: 20
  require_human_confirm: true

data_flow:
  model_predictions: predictions.parquet
  gated_logs: logs_gated.parquet
  step_inputs:
    prefilter: predictions.parquet
    gate_train: predictions.parquet
    gate_apply: predictions.parquet
    execution: logs_gated.parquet
    backtest: logs_gated.parquet

output:
  history_dir: results/rmr/slow-rolling-sim
