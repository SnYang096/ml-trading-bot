name: box_pullback_trend

trainer:
  module: src.time_series_model.strategies.models.strategy_trainer
  function: train_strategy_model
  params:
    model_type: lightgbm
    task_type: binary
    target_col: success_label
    n_splits: 5
    tscv_gap: 24
    use_gpu: false
    model_params:
      n_estimators: 800
      learning_rate: 0.05
      num_leaves: 63
      max_depth: -1
      feature_fraction: 0.8
      bagging_fraction: 0.8
      bagging_freq: 5
      seed: 42

prediction:
  method: ensemble_mean
  model_type: lightgbm

output:
  save_results: true
  filename: results.json

volatility_model:
  enabled: false
  config_path: null
  target_column: future_volatility
