# SRB prefilter — 20260422_212338 slow-good 风格：结构强度 + 突破频谱能量 + continuation
# tpc_semantic_chop_ts_q 仅在 gate（gate_srb_tpc_semantic_chop_high），避免与 gate 双拦。

rules:
  - feature: sr_strength_max
    operator: ">="
    value: 0.42
    locked: true
    lock_reason: SRB 语义锚点：关键位需有足够结构强度

  - feature: spectrum_price_high_freq_ratio
    operator: ">="
    value: 0.22
    locked: true
    lock_reason: SRB 占位：突破邻域频谱能量（复刻 20260422_212338）
  - feature: tpc_score_continuation
    operator: ">="
    value: 0.2
    locked: true
    lock_reason: MVP：沿用 TPC continuation 分作为延续倾向占位
  - feature: bpc_impulse_direction_match
    operator: ">="
    value: 0.35
    locked: true
    lock_reason: anti-chop：突破后需要有同向 impulse，避免只在 SR 附近来回扫
