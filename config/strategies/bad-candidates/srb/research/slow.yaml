# ============================================================
# 上线前训练流水线 (2H, SRB-only, 慢模式 / slow_realistic)
# SRB = Structural Range Breakout（关键位成功突破后延续）；配置已归档至 config/strategies/bad-candidates/srb
#
# 示例:
#   mlbot pipeline run --all --config config/prod_train_pipeline_2h_slow_srb_only.yaml --stage rolling_sim
#   mlbot pipeline run --all --config config/prod_train_pipeline_2h_slow_srb_only.yaml --stage train_final
#
# 家族对照: docs/z实验_005_统一研究/strategy_families_BPC_TPC_ME_FBF_SRB_RMR.md
# ============================================================

dates:
  start_date: "2022-08-01"
  end_date: "2024-12-31"
  holdout_months: 15
  validation_months: 3

training:
  seeds:
    - 42
  seed_selection: best_sharpe

global_toggles:
  locked_threshold_tuning_enabled: true

strategy_scope:
  direction: all

rolling:
  mode: slow_realistic
  windows:
    calibration_months: 3
    structure_lookback_months: 12
  slow_realistic:
    cadence_months: 3
    triggered_retrain_enabled: true
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    disable_feature_search: true

threshold_calibration:
  pcm_eval:
    enabled: false

rolling_calibration:
  step_months: 1
  threshold_calibration:
    enabled: true
  prefilter:
    # SRB 研究：关闭每月 prefilter 重优化，固定 meta/locked 规则 →
    # 方向决策不会在月份之间漂移，SL/trailing/加仓 改动才可被独立评估。
    # 上线前若要 re-optimize，改 true 并在报告中标注。
    optimize: false
  symbol_threshold_calibration:
    enabled: true
  direction_tuning:
    enabled: true
    compare_features: true
    promote_after_validate: true

symbol_policy:
  mode: hybrid_carry_forward
  carry_forward_ttl_months: 2
  enable_threshold: 0.0
  min_symbol_trades_soft: 10
  carry_forward_hard_fail_rules:
    min_sharpe_r: -0.25

direction_stack:
  mode: ema200
  ema_debounce_bars: 3
  vwap_window_days: 20

slot_allocation:
  mode: quality_ranked
  max_symbols_per_side: 2
  reserve_slots_for_secondary_symbols: 1
  slot_opportunity_penalty: 0.001
  quality_score_weights:
    history_edge: 0.55
    now_strength: 0.45
  quality_lookback_months: 3

stitching:
  enabled: true
  metrics: [sharpe, max_drawdown, total_r, near_stop_rate, slot_full_rate]
  export_trade_map_html: true

event_backtest:
  enabled: true
  promote: true
  map_extra_months: 4
  sym_r_default: "1.0:1:6.0"
  sym_r_by_family:
    # 与更宽的 archetype SL 对齐，事件优化网格略放大
    srb: "4.0:1:9.0"
  exec_objective_default: sharpe
  exec_objective_params:
    near_stop_threshold_r: -0.9
    near_stop_penalty: 0.0
    max_dd_penalty: 0.0
    min_trades_soft: 0
    undertrade_penalty: 0.0

pcm_slot_grid:
  enabled: false

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap

data_path: data/parquet_data

download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data

strategies:
  srb:
    config: config/strategies/bad-candidates/srb
    prepare_features: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.03
        min_rows: 150
        target_trades_min: 15
        target_trades_max: 120
        trade_penalty_low: 0.0021
        trade_penalty_high: 0.0014
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: false
          mode: auto_if_locked
          skip_if_cached: false
          max_cases: 12
          min_trades_target: 40
          trade_penalty: 0.0025
          target_trades_min: 15
          target_trades_max: 120
          trade_penalty_low: 0.0021
          trade_penalty_high: 0.0014
          stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
      entry_filter:
        meta_algorithm: false
        archetype_plateau: true
        significance_p: 0.10
        significance_min_trades: 3
        plateau_window: 4
        archetype_scoring_method: distribution_ks
        target_trades_min: 15
        target_trades_max: 120
        trade_penalty_low: 0.0021
        trade_penalty_high: 0.0014
        stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        min_score_improvement: 0.008
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.30
        stat_fallback_on_empty: true
        stat_fallback_max_rules: 3
        stat_fallback_min_source_features: 2
        # SRB Top-N gate cap：base 含 1 条 locked chop + 最多 2 条 stat hard；
        # cap=3 与 archetypes/gate.yaml 对齐。stat_fallback_max_rules 也会被压到 ≤ max_hard_gates。
        max_hard_gates: 3
        max_system_safety: 2
      backtest:
        min_trades: 20
      deploy:
        min_trades: 20
    simple_execution:
      # 宽 SL / 远 TP，与 srb archetypes/execution 大带宽一致（2:1 RR）
      sl_r: 6.0
      tp_r: 12.0
      timeout_bars: 600

shap_feature_selection:
  enabled: false
  n_folds: 8
  top_k: 20
  stability_threshold: 0.8
  min_stable_features: 1
  protected_nodes:
    - atr_f
  apply_to:
    - features.yaml

comparison:
  min_trades: 15
  sharpe_adopt_ratio: 0.7
  sharpe_reject_floor: 0.0
  threshold_drift_warn: 1.0

retrain_triggers:
  schedule_days: 90
  sharpe_decay_ratio: 0.5
  consecutive_losses: 8
  max_data_age_days: 120
  leading_indicator_decay: 0.5

deploy_gate:
  trigger_sharpe_improve: 0.05
  trigger_drift_level: HIGH
  min_sharpe_change: 0.03
  require_adopt: true
  min_trades: 20
  require_human_confirm: true

data_flow:
  model_predictions: predictions.parquet
  gated_logs: logs_gated.parquet
  step_inputs:
    prefilter: predictions.parquet
    gate_train: predictions.parquet
    gate_apply: predictions.parquet
    execution: logs_gated.parquet
    backtest: logs_gated.parquet

output:
  history_dir: results/srb/slow-rolling-sim
