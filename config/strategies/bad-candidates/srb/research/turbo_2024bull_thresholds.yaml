# ============================================================
# 上线前训练流水线 (2H only, SRB-only, turbo / 固定特征 + 阈值链)
# SRB 已迁入 bad-candidates；预过滤见 config/strategies/bad-candidates/srb/features_prefilter.yaml
#
# 示例:
#   mlbot pipeline run --all --config config/prod_train_pipeline_2h_turbo_2024bull_thresholds_only_srb_only.yaml --stage rolling_sim --skip-shap
# ============================================================

dates:
  start_date: "2022-08-01"
  end_date: "2026-03-31"
  holdout_months: 26
  validation_months: 3

global_toggles:
  locked_threshold_tuning_enabled: true
rolling:
  mode: turbo_fixed_features
  windows:
    calibration_months: 6
    structure_lookback_months: 12
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    disable_feature_search: true

fast_loop:
  disable_model_training: true
  step_months: 1
  threshold_calibration:
    enabled: true
  prefilter:
    optimize: true
  symbol_threshold_calibration:
    enabled: true
  execution_opt:
    enabled: true
  pcm_eval:
    enabled: false
  direction_tuning:
    enabled: true
    compare_features: false
    promote_after_validate: false

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap
data_path: data/parquet_data
download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data
strategies:
  srb:
    config: config/strategies/bad-candidates/srb
    timeframe: 120T
    prepare_features: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.03
        min_rows: 150
        target_trades_min: 15
        target_trades_max: 120
        trade_penalty_low: 0.0021
        trade_penalty_high: 0.0014
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: false
          mode: auto_if_locked
          skip_if_cached: false
          max_cases: 12
          min_trades_target: 40
          trade_penalty: 0.0025
          target_trades_min: 15
          target_trades_max: 120
          trade_penalty_low: 0.0021
          trade_penalty_high: 0.0014
          stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
      entry_filter:
        meta_algorithm: false
        archetype_plateau: true
        significance_p: 0.10
        significance_min_trades: 3
        plateau_window: 4
        archetype_scoring_method: distribution_ks
        target_trades_min: 15
        target_trades_max: 120
        trade_penalty_low: 0.0021
        trade_penalty_high: 0.0014
        stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        min_score_improvement: 0.008
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.30
        stat_fallback_on_empty: true
        stat_fallback_max_rules: 3
        stat_fallback_min_source_features: 2
        max_hard_gates: 3
        max_system_safety: 2
      backtest:
        min_trades: 20
      deploy:
        min_trades: 20

event_backtest:
  enabled: true
  map_extra_months: 4
  exec_grid_by_family:
    srb:
      initial_r: "2.5:0.5:4.5"
      activation_r: "2.0:0.5:4.5"
      trail_r: "2.0:0.5:6.0"
  exec_objective_default: total_r_over_dd
  exec_objective_params:
    near_stop_threshold_r: -0.9
    near_stop_penalty: 5.0
    max_dd_penalty: 0.15
    min_trades_soft: 0
    undertrade_penalty: 0.0

output:
  history_dir: results/srb/turbo-rolling-sim
