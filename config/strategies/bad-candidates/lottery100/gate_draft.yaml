# L3 彩票 — 宏观门 + 特征门（草案）
# 杠杆容量 **v4** 的宏观牛门已迁至专用 YAML（单一数据源）：
#   config/strategies/bad-candidates/lottery100/leverage_capacity_v4.yaml  ← analyze_leverage_capacity_v4.py
# v3 仍为脚本内默认周线门；特征复合门仍以本文件为备忘，尚未被脚本自动读取。
#
# 符号：默认仅 BTCUSDT（见 v2/v3 报告）
# 周期：与 feature store 一致，默认 120T（2H）

schema:
  description: L3 lottery gate — bull regime + leverage-capacity semantics
  version: draft-20260418

# ── 宏观牛熊门（anchor：BTC 周线收盘价 vs 周线 EMA）────────────────────────────
bull_regime:
  anchor_symbol: BTCUSDT
  weekly_rule: close_gt_ema
  ema_span_weeks: 50
  weekly_anchor: W-FRI
  # 周线信号滞后一周应用到 bar（避免当周五收盘前偷看当周收盘）
  lag_weeks: 1

# ── 可选硬过滤（仅 bull 样本上做彩票统计时用）────────────────────────────────
filters:
  require_bull_regime: true
  sides_allowed:
    - long   # v2/v3：牛市高杠杆彩票以做多为主；短侧留给 FER/SRB

# ── 特征复合门（来自 v2 报告 §6，可按回测再调）────────────────────────────────
feature_gates_long:
  me_atr_pct_quantile_max: 0.10   # 低波压缩（全样本分位）
  funding_rate_zscore_50_max: 0.0    # funding 不显偏多（空头拥挤一侧）
  ema_1200_position:
    min: 0.0
    max: 0.07                        # 刚站上长均线，未极致拉伸
  macro_tp_vwap_1200_position:
    min: -0.14
    max: 0.06                        # VWAP1200 折扣到微溢价
  cvd_roll60:
    min: 0.0
    max: 50000.0                     # 轻度净买（量级依赖合约口径，需随数据校准）

# ── 决策树排序（离线选 top-K 用；线上可用模型文件替代）───────────────────────
ranking:
  model: shallow_tree             # sklearn DecisionTreeClassifier，见 reports/
  top_frac_candidates:
    - 0.01
    - 0.03
    - 0.05

# ── 风险（与 constitution 独立子预算配合）──────────────────────────────────────
risk:
  notes: 单仓风险、子账户、隔离保证金见实施文档；此处不重复数值
