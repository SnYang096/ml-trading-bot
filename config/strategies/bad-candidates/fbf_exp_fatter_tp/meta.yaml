# FBF 实验根：仅 execution 与基线不同（TP 3R / time_stop 48 bar），其余与 fbf 同步复制

strategy:
  name: fbf-exp-fatter-tp-120T
  description: |
    FailedBreakoutFailure（实验）：与 config/strategies/fbf 同语义，止盈加肥（target_r=3R），略延长 time_stop。

  owner: quant_team
  archetype: FailedBreakoutFailure

  timeframe: "120T"

  decision_alignment:
    enabled: true
    mode: prefilter_recent_window
    window_bars: 3
    layers_allow_recent_window: [prefilter]
    layers_required_same_bar: [direction, gate, entry_filter]

  macro_tp_vwap_anchor:
    enabled: false
    symbol: BTCUSDT
