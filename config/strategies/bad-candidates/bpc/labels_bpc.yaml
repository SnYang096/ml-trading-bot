# BPC (BreakoutPullbackContinuation) 策略标签配置
# 语义：趋势中先回踩再延续原方向

name: bpc
target_column: rr_label

label_generator:
  module: src.time_series_model.strategies.labels.bpc_label
  function: compute_bpc_label
  params:
    price_col: close
    max_holding_bars: 50
    take_profit_r: 2.0
    stop_loss_r: 1.0
    # 回踩检测参数
    pullback_lookback: 10
    pullback_threshold: 0.3
    # 趋势过滤
    trend_col: trend_sign
    use_trend_filter: true
    combine_mode: long_only

filters:
  - column: rr_label
    notna: true

post_label_filters: []

notes: |
  BreakoutPullbackContinuation archetype:
  - 在趋势中检测回踩信号
  - 回踩位置计算顺趋势方向的 forward RR
  - 连续 RR 标签用于回归模型
