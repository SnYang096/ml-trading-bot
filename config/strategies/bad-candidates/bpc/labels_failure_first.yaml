# BPC Failure-first 标签配置
# 🟥 用于 Failure-first Tree 训练
#
# ⚠️ 核心语义变化：
# - 之前：forward_rr（连续值）→ 树学习"哪里收益低"
# - 现在：failure_label（二值）→ 树学习"哪里会系统性失败"
#
# 失败定义：
# failure = (
#     forward_rr < -0.8R  # 路径极端不利
#     OR (
#         mae > 1.2 * expected_stop  # 被打穿止损 1.2 倍
#         AND mfe < 0.3 * expected_target  # 几乎没有达到目标
#     )
# )
#
# 参考文档：docs/architecture/OUTCOME_BASED_TREE_LABELING.md

name: bpc_failure_first
target_column: failure_label

label_generator:
  module: src.time_series_model.strategies.labels.failure_first_label
  function: compute_bpc_failure_label
  params:
    direction: long
    horizon: 50
    expected_stop_atr: 1.0
    expected_target_atr: 2.0

# 标签元信息
label_meta:
  label_type: binary
  failure_definition: |
    failure = (forward_rr < -0.8) OR (mae > 1.2*stop AND mfe < 0.3*target)
  horizon: 50 bars
  expected_stop: 1.0 ATR
  expected_target: 2.0 ATR
  audit_mode: true
  description: |
    Failure-first 二值标签：
    - 1 = 不可接受的失败
    - 0 = 可接受或正常
    - 树学习"在什么结构条件下 BPC 会系统性失败"

filters:
  - column: failure_label
    notna: true

# 模型配置（使用二分类）
model_hints:
  task_type: binary
  objective: binary
  metric: auc
  # Failure-first 树的推荐参数
  max_depth: 4
  min_data_in_leaf: 100
  n_estimators: 50

post_label_filters: []
