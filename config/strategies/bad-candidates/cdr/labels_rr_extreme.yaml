# CDR RR Extreme 子标签：用于 gate 判断是否能降低反转失败尾部。

name: cdr_rr_extreme
target_column: success_no_rr_extreme

label_generator:
  module: src.time_series_model.strategies.labels.failure_first_label
  function: compute_bpc_failure_rr_extreme_label
  params:
    direction: short
    horizon: 72
    invert: true
    direction_aware: false

filters:
  - column: success_no_rr_extreme
    notna: true

kpi_definition:
  veto_ability:
    description: "Gate 是否能有效降低 CDR 反转失败尾部"
    metrics:
      - name: lift_at_70pct
        description: "Top 70% 覆盖时的 Lift"
        target: "<= 0.90x"
        critical: true
      - name: lift_at_50pct
        description: "Top 50% 覆盖时的 Lift"
        target: "<= 0.85x"
        critical: true

post_label_filters: []
