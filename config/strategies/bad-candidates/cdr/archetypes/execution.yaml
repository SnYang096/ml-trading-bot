# CDR execution：比普通 fade 宽、比肥尾趋势短；单发反转，不加仓。

execution_constraints:
  allow_add_on: false
  min_order_interval_minutes: 30

holding:
  max_holding_bars: null
  time_stop_bars: 72

stop_loss:
  type: fixed
  initial_r: 1.35
  trailing:
    enabled: true
    activation_r: 2.5
    step_r: 0.5
    trail_r: 1.4

take_profit:
  enabled: true
  target_r: 3.2

breakeven:
  enabled: true
  trigger_r: 1.6
  lock_level_r: 0.0
  measure: atr

version: 1
