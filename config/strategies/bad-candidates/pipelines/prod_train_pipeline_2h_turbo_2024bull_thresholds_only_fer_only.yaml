# ============================================================
# 上线前训练流水线 (2H, FER-only, turbo / 阈值链)
# 基于 prod_train_pipeline_2h_turbo_2024bull_thresholds_only
#
# 本版相对「宽区间」turbo 的调整（压信号密度、打开执行层 R 网格）：
# - prefilter / entry_filter：收窄 target_trades_max，略抬高 trade_penalty，与 prod FER 对齐 min_rows
# - gate：提高 min_combined_pass_rate，并启用 prod FER 的 stat_fallback 门控
# - rolling_calibration.execution_opt：true → 月度对称 R 网格（依赖下方 event_backtest.sym_r_by_family.fer）
# - 周期：仅以 config/strategies/fer/meta.yaml 为准（此处不写 timeframe）
#
# 加仓：FER archetypes/execution 已为 allow_add_on: false；若 PCM 仍出现 add 意图，查 constitution /
#       live 侧 intent，不在本 YAML 内覆盖。
# ============================================================

dates:
  start_date: "2023-01-01"
  end_date: "2024-12-31"
  holdout_months: 15
  validation_months: 3

global_toggles:
  locked_threshold_tuning_enabled: true
rolling:
  mode: turbo_fixed_features
  windows:
    calibration_months: 6
    structure_lookback_months: 12
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    disable_feature_search: true

rolling_calibration:
  enable_model_training: false
  step_months: 1
  threshold_calibration:
    enabled: true
  prefilter:
    optimize: true
  symbol_threshold_calibration:
    enabled: true
  execution_opt:
    enabled: true
  pcm_eval:
    enabled: false
  direction_tuning:
    enabled: true
    compare_features: false
    promote_after_validate: false

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap
data_path: data/parquet_data
download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data
strategies:
  fer:
    config: config/strategies/fer
    prepare_features: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.05
        min_rows: 300
        # 收窄上限，校准器会更惩罚「过密」样本（原 260 易偏多笔）
        target_trades_min: 40
        target_trades_max: 140
        trade_penalty_low: 0.0021
        trade_penalty_high: 0.0014
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: false
          mode: auto_if_locked
          skip_if_cached: false
          max_cases: 12
          min_trades_target: 70
          trade_penalty: 0.0025
          fer_eff_pct_lower_values: 0.0,0.05
          fer_eff_pct_upper_values: 0.30,0.40
          sr_strength_min_values: 0.45,0.55
          dist_to_sr_atr_max_values: 0.8,1.0
          sqs_quality_min_values: 0.50,0.60
          target_trades_min: 40
          target_trades_max: 140
          trade_penalty_low: 0.0021
          trade_penalty_high: 0.0014
          stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
      entry_filter:
        meta_algorithm: false
        archetype_plateau: true
        significance_p: 0.10
        significance_min_trades: 4
        plateau_window: 4
        archetype_scoring_method: distribution_ks
        target_trades_min: 40
        target_trades_max: 140
        trade_penalty_low: 0.0021
        trade_penalty_high: 0.0014
        stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        min_score_improvement: 0.008
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.38
        stat_fallback_on_empty: true
        stat_fallback_max_rules: 3
        stat_fallback_min_source_features: 2
      backtest:
        min_trades: 50
      deploy:
        min_trades: 50
    simple_execution:
      sl_r: 3.0
      tp_r: 6.0
      timeout_bars: 120

event_backtest:
  enabled: true
  promote: true
  map_extra_months: 4
  sym_r_default: "1.0:1:6.0"
  sym_r_by_family:
    bpc: "2.0:1:6.0"
    fer: "2:1:4"
    me: "2:1:4"
  exec_objective_default: sharpe
  exec_objective_params:
    near_stop_threshold_r: -0.9
    near_stop_penalty: 0.0
    max_dd_penalty: 0.0
    min_trades_soft: 0
    undertrade_penalty: 0.0

output:
  history_dir: results/fer/calibrate_roll.default
