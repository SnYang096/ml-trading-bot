# ME-Short (MomentumExpansion Short) 策略标签配置
# 语义：向下流动性加速 + 波动扩张驱动（做空）

name: me-short
target_column: rr_label

label_generator:
  module: src.time_series_model.strategies.labels.me_label
  function: compute_me_label
  params:
    price_col: close
    max_holding_bars: 50
    take_profit_r: 2.0
    stop_loss_r: 1.0
    # 突破检测参数
    breakout_lookback: 10
    volume_mult: 1.2
    combine_mode: short_only  # 只计算向下突破信号

filters:
  - column: rr_label
    notna: true

post_label_filters: []
