# Stage B: EMA1200 + AB-B loosen + gate
# Only key thresholds are loosened and left unlocked for optimizer:
# - cvd_divergence_score_pct (0.40)
# - dist_to_nearest_sr bounds (+/-0.55)
filters:
  - id: fbf_short_upper_fail
    enabled: true
    locked: false
    description: "做空: AB-B 放宽 + EMA1200 同向"
    conditions:
      - feature: fer_sr_failed_breakout_direction_signed
        operator: "<="
        value: -1
      - feature: fer_range_pos_20
        operator: ">="
        value: 0.56
      - feature: bars_since_local_high
        operator: "<="
        value: 0.30
      - feature: fer_sr_failed_breakout_score
        operator: ">="
        value: 0.38
      - feature: fer_ols_pos
        operator: ">="
        value: 0.55
      - feature: fer_ols_pos
        operator: "<="
        value: 0.90
      - feature: dist_to_nearest_sr
        operator: "<="
        value: 0.55
      - feature: dist_to_nearest_sr
        operator: ">="
        value: -0.55
      - feature: rsi
        operator: ">="
        value: 55
      - feature: cvd_divergence_score_pct
        operator: ">="
        value: 0.40
      - feature: ema_1200_position
        operator: "<="
        value: 0.0

  - id: fbf_long_lower_fail
    enabled: true
    locked: false
    description: "做多: AB-B 放宽 + EMA1200 同向"
    conditions:
      - feature: fer_sr_failed_breakout_direction_signed
        operator: ">="
        value: 1
      - feature: fer_range_pos_20
        operator: "<="
        value: 0.44
      - feature: bars_since_local_low
        operator: "<="
        value: 0.30
      - feature: fer_sr_failed_breakout_score
        operator: ">="
        value: 0.38
      - feature: fer_ols_pos
        operator: "<="
        value: 0.45
      - feature: fer_ols_pos
        operator: ">="
        value: 0.10
      - feature: dist_to_nearest_sr
        operator: "<="
        value: 0.55
      - feature: dist_to_nearest_sr
        operator: ">="
        value: -0.55
      - feature: rsi
        operator: "<="
        value: 45
      - feature: cvd_divergence_score_pct
        operator: ">="
        value: 0.40
      - feature: ema_1200_position
        operator: ">="
        value: 0.0

combination_mode: or
