# HTF (HTFBiasLTFEntry) 策略特征配置
name: htf
description: |
  HTFBiasLTFEntry archetype: 大周期定方向，小周期定入场。
  核心：多时间框架对齐 + LTF 入场时机。

feature_pipeline:
  exclude_columns:
    - atr
  requested_features:
    # ----- HTF 趋势特征 -----
    - sma_200_f
    - trend_r2_20_f
    - path_efficiency_pct_f
    - price_dir_consistency_pct_f
    # ----- LTF 入场信号 -----
    - vpin_features_f
    - volume_ratio_pct_f
    - ofci_pct_f
    - shd_pct_f
    # ----- 波动 -----
    - atr_percentile_f
    - bb_width_normalized_pct_f
    - atr_f
    # ----- SR -----
    - sr_strength_max_f
    - dist_to_nearest_sr_f
    # ----- 动量 -----
    - macd_atr_f
    - rsi_f
    # ----- 高级 -----
    - hurst_price_f
    - hilbert_phase_f
  ensure_signal_column:
    name: signal
    default_value: 0
