# HTF (HTFBiasLTFEntry) 策略标签配置
# 语义：大周期定方向，小周期定入场

name: htf
target_column: rr_label

label_generator:
  module: src.time_series_model.strategies.labels.htf_label
  function: compute_htf_label
  params:
    price_col: close
    max_holding_bars: 50
    take_profit_r: 2.0
    stop_loss_r: 1.0
    # HTF 趋势参数
    htf_trend_col: htf_trend_sign
    sma_col: sma_200
    # LTF 入场信号
    use_wick_rejection: true
    wick_atr_mult: 0.5
    combine_mode: long_only

filters:
  - column: rr_label
    notna: true

post_label_filters: []
