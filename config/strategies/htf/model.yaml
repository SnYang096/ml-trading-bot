# HTF (HTFBiasLTFEntry) 策略模型配置
name: htf

trainer:
  module: src.time_series_model.strategies.models.strategy_trainer
  function: train_strategy_model
  params:
    model_type: lightgbm
    task_type: regression
    target_col: rr_label
    n_splits: 5
    tscv_gap: 24
    use_gpu: true
    model_params:
      n_estimators: 800
      learning_rate: 0.05
      num_leaves: 63
      max_depth: -1
      feature_fraction: 0.8
      bagging_fraction: 0.8
      bagging_freq: 5
      seed: 42

prediction:
  method: ensemble_mean
  model_type: lightgbm

output:
  save_results: true
  filename: results.json

volatility_model:
  enabled: false
