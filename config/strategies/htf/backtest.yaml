backtest:
  enabled: true
  params:
    price_col: close
    freq: 4H
    regression:
      entry_mode: top_quantile
      entry_quantile: 0.90
      quantile_mode: expanding
      quantile_min_periods: 50
      direction_from_prediction: true
    max_holding_bars: 50
    use_rr_exit: true
    rr:
      atr_window: 14
      max_holding_bars: 50
      stop_loss_r: 1.0
      take_profit_r: 2.0
      entry_offset: 1
      use_time_exit: true
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
