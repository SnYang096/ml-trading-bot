add_position:
  trigger:
    type: disabled
execution_constraints:
  accumulate_same_archetype: true
  allow_add_on: false
  # Must be <= spacing of decision bars (strategy meta timeframe 120T) or merges never fire between bars.
  min_order_interval_minutes: 120
holding:
  max_holding_bars: 0
  time_stop_bars: 0
stop_loss:
  type: fixed
  initial_r: 0.0
  structural_exit: weekly_macro_cycle
  breakeven:
    enabled: false
    trigger_r: 0.0
    lock_level_r: 0.0
    measure: initial_risk
  trailing:
    enabled: false
    activation_r: 0.0
    trail_r: 0.0
take_profit:
  enabled: false
version: 1
