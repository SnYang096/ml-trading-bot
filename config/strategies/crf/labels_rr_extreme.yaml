# CRF RR-extreme label (copy of default; kept separate for slow-pipeline).

name: crf_rr_extreme
target_column: success_label

label_generator:
  module: src.time_series_model.strategies.labels.failure_first_label
  function: compute_bpc_failure_label
  params:
    direction: "auto"
    horizon: 50
    expected_stop_atr: 1.0
    expected_target_atr: 1.5
    invert: true

label_meta:
  label_type: binary
  audit_mode: true

filters:
  - column: success_label
    notna: true
