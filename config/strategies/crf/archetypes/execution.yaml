# CRF execution — 盒子内双向波段，配合 stop = box 外一段 / target = 对边 edge
#
# 设计要点：
#   1. stop_loss 基于 box 结构：盒子一边距离 0.25 * box_width 作为止损（破盒即出）
#      — 对应 P2 诊断里的 stop_mult=0.25，hit 率很低
#   2. take_profit 以对边 edge 为目标（edge_frac=0.15）
#   3. max_holding_bars 放长：波段级不是 scalping（120 bars = 240h ≈ 10 天）
#   4. add_position 关闭：CRF 做的是"边缘吃回归"，加仓逻辑与趋势加仓矛盾

add_position:
  # CRF 不支持加仓：均值回归语义下，越走越远=失败，不应加码
  max_add_times: 0
  sizing_mode: fixed_multiplier
  add_size_multipliers: [1]
  inherit_parent_stop: true
  min_current_r_by_add: []
  min_current_r_unit: atr
  trigger:
    type: disabled

execution_constraints:
  allow_add_on: false
  min_order_interval_minutes: 30

holding:
  max_holding_bars: 120       # 10 天（2H × 120）
  time_stop_bars: 0

stop_loss:
  breakeven:
    enabled: false
    trigger_r: 2.0
    lock_level_r: 0.5
    measure: atr
  guardrails:
    max_stop_pct: 0.06
    min_stop_pct: 0.005
  initial_r: 1.5
  structural_exit: box          # 专用：破盒即出（由 position_logic 解析）
  trailing:
    enabled: false
    activation_r: 2.0
    trail_r: 1.0
  type: box_edge                # 专用：stop = 进入边沿 - 0.25 × box_width（外侧）

take_profit:
  enabled: true
  type: opposite_edge           # 专用：target = 对边 edge - 0.15 × box_width
  partial:
    enabled: true
    first_tp_fraction: 0.5       # 对边半仓平
    first_tp_r: 1.0              # 到对边中点前先落袋一半

version: 1
