# Outcome Audit 策略模型配置
# 浅树配置，用于提取可解释规则

name: outcome_audit

model_type: lightgbm
task_type: regression

hyperparameters:
  # 浅树配置，便于解释
  n_estimators: 50
  max_depth: 3  # 浅树，便于提取规则
  num_leaves: 8  # 2^3 = 8
  learning_rate: 0.1
  min_data_in_leaf: 500  # 确保每个叶节点有足够样本
  feature_fraction: 0.8
  bagging_fraction: 0.8
  bagging_freq: 5
  lambda_l1: 0.1
  lambda_l2: 1.0
  random_state: 42
  n_jobs: -1
  verbose: -1

training:
  early_stopping_rounds: 20
  eval_metric: rmse
  verbose: false

cross_validation:
  n_splits: 5
  method: time_series
  gap: 50

# 审计专用配置
audit:
  # 负规则提取条件
  negative_rule_criteria:
    delta_rr_threshold: -0.2
    min_coverage: 0.02
    min_samples: 100
  
  # 稳定性检验
  stability_test:
    time_splits: 5
    min_consistent_periods: 3
    perturbation_pct: 0.05
    n_perturbations: 10
