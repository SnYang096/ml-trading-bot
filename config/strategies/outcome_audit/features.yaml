# Outcome Audit 策略特征配置
# 全特征集，用于发现哪些特征导致负收益

name: outcome_audit
description: |
  Outcome-Based 审计策略。
  使用浅树学习 forward_rr，提取负规则，
  反推哪些条件下应该避免交易。

feature_pipeline:
  exclude_columns:
    - atr
  requested_features:
    # ----- 波动特征 -----
    - atr_percentile_f
    - bb_width_normalized_pct_f
    - atr_f
    - bar_range_to_atr_f
    
    # ----- 成交量特征 -----
    - volume_ratio_pct_f
    - vpin_features_f
    - ofci_pct_f
    
    # ----- 动量特征 -----
    - macd_atr_f
    - rsi_f
    - trend_r2_20_f
    - path_efficiency_pct_f
    - price_dir_consistency_pct_f
    
    # ----- SR 特征 -----
    - sr_strength_max_f
    - dist_to_nearest_sr_f
    - sr_zone_position_f
    
    # ----- 影线特征 -----
    - shd_pct_f
    - wick_ratio_f
    
    # ----- 高级特征 -----
    - hurst_price_f
    - hilbert_phase_f
    
    # ----- 时间特征 -----
    - hour_of_day_f
    - day_of_week_f
    
  ensure_signal_column:
    name: signal
    default_value: 0
