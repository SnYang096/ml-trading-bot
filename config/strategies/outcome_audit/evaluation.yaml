# Outcome Audit 策略评估配置
name: outcome_audit

evaluation:
  # 审计指标（与普通策略不同）
  metrics:
    # 规则质量
    - n_negative_rules
    - mean_delta_rr
    - coverage_pct
    
    # 稳定性
    - time_stability_rate
    - perturb_stability_rate
    
    # veto 分级统计
    - n_veto_hard
    - n_veto_soft
    - n_discard

  # 审计阈值
  audit_thresholds:
    delta_rr_threshold: -0.2
    min_coverage: 0.02
    min_samples: 100
    
    # 稳定性要求
    min_time_consistent_pct: 0.6
    min_perturb_consistent_pct: 0.8

  # 负规则提取配置
  negative_rule_extraction:
    enabled: true
    max_rules: 20
    sort_by: delta_rr
    
  # 稳定性检验配置
  stability_validation:
    time_robustness:
      enabled: true
      n_splits: 5
      min_consistent: 3
    perturbation_robustness:
      enabled: true
      perturbation_pct: 0.05
      n_iterations: 10
      max_auc_drop: 0.1

reporting:
  output_dir: reports/audit/outcome_audit
  generate_plots: true
  plot_types:
    - leaf_distribution
    - delta_rr_histogram
    - rule_stability_matrix
    - veto_level_summary
