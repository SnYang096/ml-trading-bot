# Outcome Audit 策略元信息
name: outcome_audit
display_name: "Outcome-Based Audit"
version: "1.0.0"
archetype: audit

description: |
  Outcome-Based 审计策略。
  用于发现「哪些条件下不该交易」而非「什么时候该交易」。

purpose: |
  1. 使用纯未来结果（forward_rr）训练浅树
  2. 提取负规则（mean_rr < 0 且 delta_rr < -0.2）
  3. 验证规则稳定性（时间 + 扰动）
  4. 生成 veto gate 配置

methodology: |
  - forward_rr = (MFE - MAE) / ATR
  - delta_rr = mean_rr_leaf - mean_rr_global
  - veto_hard: 时间+扰动双通过
  - veto_soft: 仅时间通过

output:
  - negative_rules: 负规则列表
  - veto_gates: 可用于 gate 的规则
  - audit_report: 审计报告

tags:
  - audit
  - outcome_based
  - rule_extraction
  - veto
