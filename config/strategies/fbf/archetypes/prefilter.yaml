# FBF Prefilter: SR 失败突破语义锚点 + 制度闸
# FBF 是区间边界反转策略，强趋势中不应交易
# trend_r2_20 <= 0.55 过滤强趋势环境（p70 分位），只在横盘/弱趋势中寻找失败突破

rules:
  - feature: fer_sr_failed_breakout_score
    operator: ">="
    value: 0.30
    locked: true
    lock_reason: FBF 语义锚点：失败突破强度（先保留中等强度以保证样本密度）
  - feature: sr_strength_max
    operator: ">="
    value: 0.45
    locked: true
    lock_reason: FBF 语义锚点：关键结构强度（避免弱结构噪声）
  - feature: fer_ols_width_norm
    operator: ">="
    value: 0.18
    locked: true
    lock_reason: 结构锚点：避免过窄区间噪声（不过度收紧）
  - feature: trend_r2_20
    operator: "<="
    value: 0.55
    locked: true
    lock_reason: 制度闸：限制强趋势区（p70），FBF 只在横盘/弱趋势做区间边界反转
