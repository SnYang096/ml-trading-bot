# FBF Entry: 仅保留上下沿失败突破两条主分支

filters:
  - id: fbf_short_upper_fail
    enabled: true
    locked: true
    description: "做空: 上沿失败突破 + 高位极值邻近"
    conditions:
      - feature: fer_sr_failed_breakout_direction_signed
        operator: "<="
        value: -1
      - feature: fer_range_pos_20
        operator: ">="
        value: 0.56
      - feature: bars_since_local_high
        operator: "<="
        value: 0.30
      - feature: fer_sr_failed_breakout_score
        operator: ">="
        value: 0.30

  - id: fbf_long_lower_fail
    enabled: true
    locked: true
    description: "做多: 下沿失败突破 + 低位极值邻近"
    conditions:
      - feature: fer_sr_failed_breakout_direction_signed
        operator: ">="
        value: 1
      - feature: fer_range_pos_20
        operator: "<="
        value: 0.44
      - feature: bars_since_local_low
        operator: "<="
        value: 0.30
      - feature: fer_sr_failed_breakout_score
        operator: ">="
        value: 0.30

combination_mode: or
