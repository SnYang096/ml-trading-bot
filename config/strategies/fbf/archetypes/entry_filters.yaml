# FBF Entry Filter: 4 核心条件版（与 turbo plateau 验证对齐）
# 去掉 v2 的 5 个额外 AND 条件（fer_ols_pos band, dist_to_nearest_sr band, rsi），
# 恢复 auto-disable 行为：plateau 扫不到有效阈值时 all entries pass（turbo 2023-09/11 即此模式）

filters:
  - id: fbf_short_upper_fail
    enabled: true
    locked: true
    description: "做空: 上沿失败突破 + 高位极值邻近"
    conditions:
      - feature: fer_sr_failed_breakout_direction_signed
        operator: "<="
        value: -1
      - feature: fer_range_pos_20
        operator: ">="
        value: 0.56
      - feature: bars_since_local_high
        operator: "<="
        value: 0.30
      - feature: fer_sr_failed_breakout_score
        operator: ">="
        value: 0.30

  - id: fbf_long_lower_fail
    enabled: true
    locked: true
    description: "做多: 下沿失败突破 + 低位极值邻近"
    conditions:
      - feature: fer_sr_failed_breakout_direction_signed
        operator: ">="
        value: 1
      - feature: fer_range_pos_20
        operator: "<="
        value: 0.44
      - feature: bars_since_local_low
        operator: "<="
        value: 0.30
      - feature: fer_sr_failed_breakout_score
        operator: ">="
        value: 0.30

combination_mode: or
