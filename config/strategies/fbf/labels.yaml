# FBF (FailedBreakoutFade) 策略标签配置
# 语义：假突破后反手 fade

name: fbf
target_column: rr_label

label_generator:
  module: src.time_series_model.strategies.labels.fbf_label
  function: compute_fbf_label
  params:
    price_col: close
    max_holding_bars: 50
    take_profit_r: 2.0
    stop_loss_r: 1.0
    # 假突破检测参数
    breakout_lookback: 20
    confirm_bars: 2
    combine_mode: long_only

filters:
  - column: rr_label
    notna: true

post_label_filters: []
