# ==========================================================================
# Dual Add Trend — Semantic Polarity
# ==========================================================================
# Purpose: keep threshold/range sweeps aligned with trend-inventory semantics.
# Loaded by strategy-level selector tooling via:
#   config/strategies/{strategy}/semantic_polarity.yaml

polarity:
  # Primary trend eligibility anchor.
  trend_confidence: higher_is_better

  # Trend continuation context.
  ema_1200_position: higher_is_better
  ema_1200_slope: higher_is_better

  # Trend strategy prefers lower chop/friction.
  bpc_semantic_chop: lower_is_better
  atr_percentile: lower_is_better
  bb_width_normalized_pct: lower_is_better

  # Box stability usually implies range mean reversion, not trend continuation.
  box_stability: lower_is_better

  # Trend persistence / ignition confirmation.
  hurst_price_rolling: higher_is_better
  hurst_cvd_rolling: higher_is_better
  wpt_ignition_score: higher_is_better
  wpt_compression_score: lower_is_better
  wpt_exhaustion_score: lower_is_better
  vpin_ignition_score: higher_is_better
  vpin_compression_score: lower_is_better
  vpin_exhaustion_scene_score: lower_is_better

  # Leave these as unknown (range-scan) for now:
  # volatility_regime
  # box_width_pct
  # wpt_absorption_score
  # vpin_absorption_score
  # hilbert_*
  # cvd_change_*
  # trade_cluster_*_zscore_*
