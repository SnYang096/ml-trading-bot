name: sr_reversal_rr_reg_long_kline_plus
target_column: rr_label

label_generator:
  module: src.time_series_model.strategies.labels.sr_reversal_label
  function: compute_sr_reversal_rr_continuous_label
  params:
    max_holding_bars: 50
    take_profit_r: 2.0
    stop_loss_r: 1.0
    combine_mode: long_only

filters:
  - column: rr_label
    notna: true

post_label_filters: []

notes: |
  Regression + kline-only (+volume) feature ablation stage (no SR/orderflow/ticks).

