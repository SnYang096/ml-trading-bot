name: sr_reversal_rr_reg_long_of_cvd
description: "Orderflow ablation: mainline + CVD-only (no ticks)"
feature_pipeline:
  requested_features:
  # Mainline (kline + minimal SR-distance features)
  - macd_f
  - rsi_f
  - sma_200_f
  - atr_f
  - roc_5_f
  - mom_10_f
  - bbands_f
  - bb_width_f
  - trend_r2_20_f
  - trend_r2_50_f
  - acceleration_3_f
  - wick_ratios_f
  - price_range_symmetry_f
  - poc_hal_features_close_f
  - sqs_hal_high_f
  - sqs_hal_low_f
  - sr_strength_max_close_f
  # Orderflow subgroup: CVD-only (bar-level)
  - cvd_slope_5_f
  - hurst_cvd_f
  - wpt_cvd_fluctuation_f
  ensure_signal_column:
    name: signal
    default_value: 0
notes: |
  This strategy is identical to sr_reversal_rr_reg_long except it adds bar-level CVD features:
  - cvd_slope_5_f: rolling linear-regression slope of CVD
  - hurst_cvd_f: rolling Hurst of CVD changes
  - wpt_cvd_fluctuation_f: wavelet packet fluctuation on CVD


