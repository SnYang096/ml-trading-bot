# FER-Long (FailureExhaustionReversal Long) 策略元信息

strategy:
  name: fer-long
  description: |
    FailureExhaustionReversal Long archetype: 单边博弈失败→反向清算（做多方向）。
    识别空头impulse推进失败后的做多反转清算机会。
    核心：空头还在冲，但价格不再配合。
  tags:
    - reversal
    - exhaustion
    - failure
    - trapped
    - liquidation
    - long
  owner: quant_team
  archetype: FailureExhaustionReversalLong

  # 默认时间粒度（研发 + 实盘统一）
  timeframe: "240T"  # 4小时，与 BPC 保持一致

  # PCM仲裁优先级
  pcm_priority: 0  # 最高优先级（条件最严格）

  # 方向声明
  direction: long
