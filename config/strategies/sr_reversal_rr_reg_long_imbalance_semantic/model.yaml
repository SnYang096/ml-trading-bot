name: sr_reversal_rr_reg_long_imbalance_semantic

trainer:
  module: src.time_series_model.strategies.models.strategy_trainer
  function: train_strategy_model
  params:
    model_type: lightgbm
    task_type: regression
    target_col: rr_label
    weight_col: sample_weight
    n_splits: 5
    tscv_gap: 24
    use_gpu: false
    model_params:
      num_leaves: 63
      learning_rate: 0.05
      n_estimators: 600
      subsample: 0.8
      colsample_bytree: 0.8
      seed: 42

prediction:
  method: ensemble_mean
  model_type: lightgbm

output:
  save_results: true
  filename: results.json

volatility_model:
  enabled: false
  config_path: null
  target_column: future_volatility


