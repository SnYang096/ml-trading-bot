name: sr_reversal_rr_reg_long_imbalance_semantic
description: "Mainline + bar-level imbalance semantic scores (taker_buy_ratio)"
feature_pipeline:
  requested_features:
  # Mainline (kline + minimal SR-distance features)
  - macd_f
  - rsi_f
  - sma_200_f
  - atr_f
  - roc_5_f
  - mom_10_f
  - bbands_f
  - bb_width_f
  - trend_r2_20_f
  - trend_r2_50_f
  - acceleration_3_f
  - wick_ratios_f
  - price_range_symmetry_f
  - poc_hal_features_close_f
  - sqs_hal_high_f
  - sqs_hal_low_f
  - sr_strength_max_close_f
  # semantic imbalance (no ticks required if taker_buy_ratio exists in bars)
  - compression_score_f
  - tbr_imbalance_semantic_scores_f
  ensure_signal_column:
    name: signal
    default_value: 0
notes: |
  Uses taker_buy_ratio as a bar-level imbalance proxy:
  - imbalance_ratio = (tbr-0.5)*2
  - exhaustion = |imbalance| high but displacement low, gated by compression_score


