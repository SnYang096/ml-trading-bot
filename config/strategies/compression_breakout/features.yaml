name: compression_breakout
description: 'Compression breakout strategy combining compression strength, trigger,
  and direction confirmation signals across WPT/VPVR/Spectrum domains.

  '
feature_pipeline:
  # Keep label/backtest-required columns (like raw `atr`) in the dataframe, but do NOT feed them into the model.
  exclude_columns:
  - atr
  requested_features:
  # Core kline features (required for feature-group-search)
  - macd_f
  - rsi_f
  - sma_200_f
  - atr_f
  - trend_r2_20_f
  # Strategy-specific features
  - wpt_price_reconstructed_f
  - wpt_price_fluctuation_f
  - wpt_volume_energy_f
  - wpt_cvd_fluctuation_f
  - spectrum_features_compression_breakout_f
  - liquidity_void_f
  - hilbert_phase_f
  - hurst_price_f
  - hurst_cvd_f
  - vpin_features_f
  - footprint_basic_f
  - liquidity_void_x_wpt_risk_f
  - compression_energy_x_ofi_short_f
  - vpin_x_compression_f
  - vpin_zscore_x_trade_cluster_max_buy_run_f
  - vpin_x_trade_cluster_entropy_f
  - dtw_features_compression_f
  ensure_signal_column:
    name: signal
    default_value: 0
