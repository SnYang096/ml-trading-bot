# fast_scalp features — only columns whose IC peaks at lag ∈ {1,3,5} bars.
#
# Population this list ONLY after running:
#   mlbot analyze factor-eval --strategy fast_scalp --ic-decay-lags 1,3,5,10,20
# and keeping features with best_lag ≤ 5 AND |rank_ic| > 0.02 on holdout.
#
# Below is the starting hypothesis (must be refined by IC table before training).

feature_groups:
  baseline:
    - macd_atr
    - bb_width_normalized_pct
    - tpc_semantic_chop
    - cvd_short_normalized
    - vpin_short
    - atr_percentile
    - hurst_short
    - vol_persistence
    - vol_leverage_asymmetry
  regime_context:
    # Shared with B; the tree sees regime as input but does not gate on it.
    - ema_1200_position
    - chop
