# fast_scalp features — only columns whose IC peaks at lag ∈ {1,3,5} bars.
#
# Validation smoke (2026-05-26): ic-decay on SYNTHETIC parquet had no |IC|>0.02;
# re-freeze this list after real `mlbot train final` + factor-eval on holdout.
#
# Population this list ONLY after running:
#   mlbot analyze factor-eval --strategy fast_scalp --ic-decay-lags 1,3,5,10,20
# and keeping features with best_lag ≤ 5 AND |rank_ic| > 0.02 on holdout.
#
# Below is the starting hypothesis (must be refined by IC table before training).

name: fast_scalp
description: |
  Short-horizon direction tree (lag 1–5). Hypothesis columns mapped to compute nodes;
  IC freeze still required before training.

feature_pipeline:
  exclude_columns:
    - atr
  requested_features:
    - macd_atr_f
    - bb_width_normalized_pct_f
    - bpc_soft_phase_f
    - cvd_change_features_f
    - vpin_scene_semantic_scores_f
    - atr_percentile_f
    - hurst_price_f
    - volatility_regime_f
    - ema_1200_position_f
