name: sr_reversal_rr_reg_long_vpin_semantic
description: "Mainline + VPIN semantic scores (stress/pressure/exhaustion)"
feature_pipeline:
  requested_features:
  # Mainline (kline + minimal SR-distance features)
  - macd_f
  - rsi_f
  - sma_200_f
  - atr_f
  - roc_5_f
  - mom_10_f
  - bbands_f
  - bb_width_f
  - trend_r2_20_f
  - trend_r2_50_f
  - acceleration_3_f
  - wick_ratios_f
  - price_range_symmetry_f
  - poc_hal_features_close_f
  - sqs_hal_high_f
  - sqs_hal_low_f
  - sr_strength_max_close_f
  # VPIN semantic (depends on vpin_zscore + signed_zscore; requires ticks)
  - vpin_semantic_scores_f
  ensure_signal_column:
    name: signal
    default_value: 0
notes: |
  Tests whether VPIN becomes useful for SR reversal after semantic mapping:
  - stress (toxicity)
  - directional pressure
  - exhaustion (high stress + low displacement, SR-weighted)


