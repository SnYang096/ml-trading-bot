name: sr_reversal_rr_reg_long
description: "Regression mainline (best-known): CORE+ kline + minimal SR-distance features (stable, no ticks)"
feature_pipeline:
  requested_features:
  - macd_f
  - rsi_f
  - sma_200_f
  - atr_f
  - roc_5_f
  - mom_10_f
  - bbands_f
  - bb_width_f
  - trend_r2_20_f
  - trend_r2_50_f
  - acceleration_3_f
  - wick_ratios_f
  - price_range_symmetry_f
  # Minimal SR-distance features (needed for dist_to_nearest_sr)
  - poc_hal_features_close_f
  - sqs_hal_high_f
  - sqs_hal_low_f
  - sr_strength_max_close_f
  ensure_signal_column:
    name: signal
    default_value: 0
notes: |
  Best-known regression mainline feature set (stable, no ticks).
  If you want the full factor-eval feature pool again, keep a separate strategy dir to avoid mixing experiments.
