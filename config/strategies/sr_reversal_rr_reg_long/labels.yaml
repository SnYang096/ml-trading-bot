name: sr_reversal_rr_reg_long
target_column: rr_label

label_generator:
  module: src.time_series_model.strategies.labels.sr_reversal_label
  function: compute_sr_reversal_rr_continuous_label
  params:
    max_holding_bars: 50
    take_profit_r: 2.0
    stop_loss_r: 1.0
    combine_mode: long_only  # 确保策略方向为 long_only，用于 use_rr_exit
    # 不使用SR过滤，使用全量样本

filters:
  - column: rr_label
    notna: true

post_label_filters:
  []

notes: |
  连续 R/R 标签（MFE/MAE 比例），全量扫描，不进行SR过滤。

