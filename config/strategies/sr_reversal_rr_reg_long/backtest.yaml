backtest:
  enabled: true
  params:
    price_col: close
    top_quantile: 0.05
    entry_mode: cross
    entry_exit_conflict: block_entry_on_exit
    max_holding_bars: 50
    force_close_on_end: true
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
    freq: 4H
    use_rr_exit: true
    rr:
      max_holding_bars: 50
      stop_loss_r: 1.0
      take_profit_r: 2.0
      atr_window: 14
      entry_offset: 1
      entry_price_col: open
      use_breakeven_stop: false
      use_time_exit: false
      use_trailing_stop: true
      trailing_atr_mult: 1.0
    sr_fuse:
      enabled: false
      dist_col: dist_to_nearest_sr
      atr_col: atr
      max_dist_atr: 3.0
      dist_is_pct: true
      on_missing: skip
    # Persist df_test+preds to disk so we can replay backtests (sr_fuse/breakeven sweeps)
    # without retraining/recomputing features.
    save_artifacts: true
    debug: true
