# Rolling Trend Prefilter — 入场环境过滤
# 入场条件:
#   1. 价格在周线EMA200下方 (weekly_ema_200_position < 0)
#   2. EMA1200金叉VWAP1200 (由模拟器检测交叉点)
# prefilter 仅做 regime 层面的杠杆允许判断
rules:
  - feature: weekly_ema_200_position
    operator: <
    value: 0.0
    rationale: 周线EMA200下方才允许杠杆仓位（深熊吸筹区）
    locked: false
  - feature: ema_1200_position
    operator: '>='
    value: -0.15
    rationale: EMA1200附近或上方（避免深度水下入场）
    locked: false
