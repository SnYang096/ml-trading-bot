# Rolling Trend Execution Config — 🏆 R5-v4 方案
# 高杠杆 + 底仓保护 + 上涨才卖 + 第二波重入
version: 4

# ── 杠杆管理 ──
leverage:
  initial: 2.0
  max: 5.0 # R5: 步进2x→3x→4x→5x
  step: 1.0
  max_position_notional: 500000 # 仓位上限$500k

# ── 入场条件 (AND) — 冠军三重过滤 ──
entry:
  weekly_ema_200_position_lt: -0.05 # 价格低于周线EMA200至少5%
  ema1200_cross_above_vwap1200: true # EMA1200金叉VWAP1200
  require_momentum: true # roc_5>0 AND roc_20>0

# ── 滚仓触发 (AND) — VWAP支撑位滚仓 ──
roll_trigger:
  price_drawdown_from_peak_pct: 0.20 # 价格从峰值跌≥20%
  require_profitable: true # 当前浮盈>0
  near_vwap1200_pct: 0.05 # 价格在VWAP1200 ±5%范围内（主力成本区支撑）
  rationale: "只在VWAP1200支撑位附近升级杠杆，避免半山腰加杠杆"

# ── 止盈 (equity-based 阶梯) ──
take_profit:
  type: equity_profit_ladder
  trigger_multiple: 5.0 # 权益达5x初始本金触发
  base_daily_sell_fraction: 0.05 # R5: 基础卖出比例5%
  acceleration:
    type: power
    exponent: 1.0
    max_speed_multiplier: 5.0
  full_exit_at_multiple: 15.0
  # ── v4: 上涨过滤 ──
  uptrend_filter:
    enabled: true
    require_above_ema1200: true # 价格 > EMA1200
    max_pullback_from_peak: 0.15 # 离峰值回撤 < 15%
  # ── v4: 底仓保护 ──
  residual_position:
    enabled: true
    min_fraction: 0.20 # 保留20%底仓永不卖出

# ── 风控 ──
risk_management:
  equity_dd_stop_pct: 0.35 # R5: 紧风控35%
  price_dd_stop_pct: 0.60
  risk_cooldown_bars: 336 # 28天(2h bar)
  max_concurrent_symbols: 3
  max_position_pct: 0.30

# ── 第二波重入 (v4) ──
reentry:
  standard_cooldown_bars: 720 # 60天标准冷却
  wave2_enabled: true
  wave2_min_cooldown_bars: 48 # 4天最短冷却
  wave2_pullback_from_peak: 0.12 # 从峰值回撤≥12%
  wave2_require_roc5_positive: true

# ── 信号源 ──
signal:
  source: indicator
  entry_indicators:
    - weekly_ema_200_position
    - ema1200
    - vwap1200

# ── 退出 ──
exit:
  type: profit_ladder
  structural: none
  time_stop_bars: 0

# ── 标准执行参数 (兼容 backtester) ──
stop_loss:
  type: none
  initial_r: 0.0
  structural_exit: trend_rolling_profit_ladder
  trailing:
    enabled: false
  breakeven:
    enabled: false
  profit_take_ladder:
    enabled: true
    min_profit_multiple: 5.0
    base_daily_sell_fraction: 0.05
    acceleration:
      type: power
      exponent: 0.75
      max_speed_multiplier: 4.0
    never_full_exit: true

add_position:
  trigger:
    type: disabled

holding:
  max_holding_bars: 0
  time_stop_bars: 0

execution_constraints:
  allow_add_on: false
