# Rolling Trend Execution Config
# Portfolio-level leverage compounding using TPC entry signals
version: 1

# ── 杠杆管理 ──
leverage:
  initial: 2.0            # 初始杠杆倍数
  max: 3.0                # 最大杠杆上限 (推荐 2-3x)
  step: 1.0               # 每次滚仓加杠杆步长

# ── 滚仓触发 ──
roll_trigger:
  drawdown_pct: 0.20      # 从 peak equity 回撤 ≥20%
  price_above_ema1200: true  # 价格回到 EMA1200 上方 (确认趋势未破)

# ── 止盈 ──
take_profit:
  target_1_multiple: 5.0  # entry 价格 ×5 → 平 50% 仓位
  target_2_multiple: 10.0 # entry 价格 ×10 → 全平

# ── 风控 ──
risk_management:
  equity_hard_stop_pct: 0.50  # 总 equity 回撤 50% → 全平
  max_concurrent_symbols: 3   # 最多同时持仓币种数
  max_position_pct: 0.30      # 单币种最大仓位占比

# ── 信号源 ──
signal:
  source: tpc                 # 复用 TPC 策略
  entry_config: E13_structural  # ema1200 结构退出, 无 trailing
  # 信号过滤: 仅在趋势市场使用杠杆
  regime_filter:
    enabled: true
    min_ema1200_position: 0.10  # |pos| >= 0.10 才允许杠杆仓位

# ── 退出 ──
exit:
  structural: ema1200           # EMA1200 穿越 → 全部平仓
  time_stop_bars: 0             # 不启用时间止损
