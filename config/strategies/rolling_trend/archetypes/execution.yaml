# Rolling Trend Execution Config
# Portfolio-level leverage compounding using TPC entry signals
version: 1

# ── 杠杆管理 ──
leverage:
  initial: 2.0
  max: 3.0
  step: 1.0

# ── 滚仓触发 (AND 条件) ──
roll_trigger:
  drawdown_pct: 0.20
  price_above_ema1200: true

# ── 止盈 ──
take_profit:
  target_1_multiple: 5.0
  target_2_multiple: 10.0

# ── 风控 ──
risk_management:
  equity_hard_stop_pct: 0.50
  max_concurrent_symbols: 3
  max_position_pct: 0.30

# ── 信号源 ──
signal:
  source: tpc
  entry_config: E13_structural

# ── 退出 ──
exit:
  structural: ema1200
  time_stop_bars: 0

# ── 标准执行参数 (兼容 backtester) ──
stop_loss:
  initial_r: 4.0
  structural_exit: ema1200
  trailing:
    enabled: false
  breakeven:
    enabled: true
    trigger_r: 6.0
    lock_level_r: 2
    measure: atr

add_position:
  add_size_multipliers: [0.25, 0.5, 1.0]
  trigger:
    type: float_r_ladder_only
  min_current_r_by_add: [0.5, 1, 1.5]
  min_current_r_unit: atr

holding:
  max_holding_bars: 0
  time_stop_bars: 0

execution_constraints:
  allow_add_on: true
