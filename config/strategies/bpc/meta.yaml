# BPC (BreakoutPullbackContinuation) 策略元信息

strategy:
  name: bpc
  description: |
    BreakoutPullbackContinuation archetype: 趋势中回踩后延续。
    在已确认的趋势中，识别健康的回踩并在回踩位置顺势入场。
  tags:
    - pullback
    - continuation
    - trend
    - breakout
  owner: quant_team
  archetype: BreakoutPullbackContinuation

  # 默认时间粒度（研发 + 实盘统一）
  timeframe: "240T"  # 4小时，对应 backtest.yaml 的 freq: 4H

# 语义核心规则现已直接在 archetypes/prefilter.yaml 中以 locked: true 声明
# 无需在 meta.yaml 中维护平行列表
