# BPC (BreakoutPullbackContinuation) 策略特征配置
# 语义：趋势中先回踩再延续原方向
# 设计理念：Price tells you WHAT, Volume tells you IF, Order flow tells you WHO
#
# 注意：数学特征（Hilbert/WPT/Hurst/Spectrum/EVT）已移至此处
# 它们只用于 execution_noise_penalty，不参与 BPC 的“做不做”判断

name: bpc
description: |
  BreakoutPullbackContinuation archetype: 趋势中回踩后延续。
  核心特征：软阶段概率 + 成交量确认 + 订单流验证。

  BPC 三阶段语义：
  - Breakout: 突破压缩区/前高，放量+CVD同向
  - Pullback: 回踩但不破结构，缩量+CVD吸收
  - Continuation: 重新启动，再次放量+CVD恢复

feature_pipeline:
  exclude_columns:
    - atr
  requested_features:
    # ========== 必需的 scale 列（用于 label 计算，不参与模型训练）==========
    - atr_f                       # ATR（label 计算必需，通过 exclude_columns 排除模型输入）

    # ========== BPC 核心：软阶段分数 ==========
    - bpc_soft_phase_f  # 输出: bpc_score_breakout/pullback/continuation/neutral
    - tpc_soft_phase_f  # 统一 chop 口径：为 gate 提供 tpc_semantic_chop

    # ========== BPC 结构特征 ==========
    - bpc_pullback_depth_pct_f    # 回踩深度 (side-aware)
    - bpc_pullback_duration_f     # 回踩持续时间
    - bpc_pullback_speed_f        # 回踩速度 = depth/(duration+1)
    - bpc_impulse_return_atr_f    # impulse 收益/ATR (带方向)

    # ========== BPC 方向一致性 ==========
    - bpc_dir_consistency_multi_f # 多尺度方向一致性 (short/mid/long)
    - bpc_dir_flip_count_f        # 方向翻转次数

    # ========== BPC 量能/订单流 ==========
    - bpc_volume_compression_pct_f    # 成交量压缩百分位
    - bpc_pullback_delta_absorption_f # 回踩期间 delta 吸收

    - roc_5_f
    - roc_10_f
    - roc_20_f
    - cvd_divergence_v2_f           # CVD 背离
    - price_momentum_divergence_f  # 价格-动量背离（与 CVD 背离正交）
    - terminal_risk_score_f        # 末端风险评分（Execution 层追单风险）
    - volume_participation_score_f # 市场参与度评分（Execution 层活跃度）

    # ========== 趋势强度 ==========
    - trend_r2_20_f
    - path_efficiency_pct_f
    - path_length_pct_f
    - price_dir_consistency_pct_f

    # ========== 动量 ==========
    - macd_atr_f
    - rsi_f

    # ========== 波动 ==========
    - atr_percentile_f
    - bb_width_normalized_pct_f  # 自包含：内部计算 BB width/ATR 再转百分位

    # ========== ⭐ Volatility Regime (新增) ==========
    # 识别"踩大坑"的波动率状态
    - vol_regime_features_f       # vol_zscore, vol_percentile_approx
    - vol_trend_features_f        # vol_slope, vol_accel (波动率趋势)
    - vol_mom_features_f          # vol_mom_5/10/20 (波动率动量)

    # ========== ⭐ Trend Exhaustion (新增) ==========
    # 识别趋势衰竭/反转信号
    - wick_scene_semantic_scores_f   # wick_exhaustion_score (影线衰竭)
    - wpt_scene_semantic_scores_f    # wpt_exhaustion_score (小波变换衰竭)
    - volume_profile_scene_semantic_scores_f  # vp_exhaustion_score (成交量分布衰竭)
    - liquidity_void_scene_semantic_scores_f  # 流动性真空场景语义 (V2 连续化)

    # ========== SR 相关 ==========
    - sr_strength_max_f  # 输出包含 sr_strength_max 和 dist_to_nearest_sr

    # ========== Box structure (regime layer 依赖) ==========
    # regime.yaml 用 box_pos_120 + box_breakout_up/down 判断"非箱体中部"，
    # 避免在 box mid 区域反复扫单。
    - box_structure_f

    # ========== 订单流 ==========
    - vpin_features_f
    - volume_ratio_pct_f      # 自包含：内部计算 volume/rolling_mean 再转百分位
    - ofci_pct_f              # 自包含：内部加载tick数据计算OFCI再转百分位
    - shd_pct_f               # 自包含：内部计算rolling_corr(ΔCVD, returns)再转百分位
    - cvd_change_features_f           # CVD 变化特征

    # ========== Trade Cluster 归一化版本 (zscore) ==========
    - trade_cluster_entropy_zscore_features_f
    - trade_cluster_imbalance_zscore_features_f
    - trade_cluster_net_runs_zscore_features_f
    - trade_cluster_max_buy_run_zscore_features_f
    - trade_cluster_max_sell_run_zscore_features_f

    # ========== 基础 ==========
    - sma_200_f
    - ema_1200_position_f     # 宏观 EMA1200 相对位置 (direction 级联)
    - ema_1200_slope_f        # 10-bar EMA1200 斜率；slope × side 对齐，aligned 多赚 +1.6R/trade
    - macro_tp_vwap_1200_position_f  # 典型价滚动 VWAP 1200 根 (direction 级联)
    - jump_risk_pct_f         # 跳空风险分位

    # ========== Volume Profile ==========
    - volume_profile_volatility_features_f
    - liquidity_void_f

    # ========== Footprint ==========
    - footprint_basic_f

    # ========== 资金费率 (期货独有情绪/拥挤度) ==========
    - funding_rate_features_f              # funding_rate, funding_rate_zscore_50 等
    - funding_scene_semantic_scores_f      # 资金费率场景语义 (compression/ignition/absorption/exhaustion)

    # ========== OI (期货持仓量) ==========
    - oi_features_f                        # oi_usd, oi_change_pct, oi_zscore, oi_delta_price_sign
    - oi_scene_semantic_scores_f           # OI 场景语义 (compression/ignition/absorption/exhaustion)

    # ========== GARCH 波动率建模 ==========
    # - garch_features_f                     # garch_volatility, garch_persistence, garch_leverage_gamma
    - volatility_regime_f                    # vol_persistence(≈α+β), vol_leverage_asymmetry(≈γ), vol_clustering_strength

    # ========== 场景语义 (补充) ==========
    - fp_imbalance_scene_semantic_scores_f # Footprint 不平衡场景语义
    - vpin_scene_semantic_scores_f         # VPIN 场景语义

    # ========== VWAP ==========
    - vwap_position_f                      # 价格相对 VWAP 位置 (日内锚点)

    # ========== 交叉特征 ==========
    - exhaustion_at_liquidity_void_f       # 力竭 × 流动性真空
    - dual_compression_f                   # 资金+VPIN双源压缩 (BPC核心)
    - dual_ignition_f                      # 资金+FP双源点火 (ME核心)
    - dual_exhaustion_f                    # 资金+VPIN双源力竭 (FER核心)
    - funding_oi_crowding_f                # Funding×OI拥挤度 (真拥挤=高费率+高持仓)
    - liquidity_void_x_wpt_risk_rank_f
    - vpin_zscore_x_trade_cluster_max_buy_run_rank_f
    - vpin_x_trade_cluster_entropy_rank_f

    # ========== 数学特征（实验性，观察是否被选中） ==========
    #     每个特征都有明确的物理语义：
    # 特征	物理含义	对 Gate 的价值
    # EVT	"当前尾部有多肥？极端事件概率多大？"	直接衡量"踩大坑"的概率分布形态
    # Spectrum	"这次动量是真趋势(低频)还是噪音(高频)？"	ME 核心：区分真突破 vs 假扩张
    # Hurst	"当前行情是持续性的还是均值回归？"	H>0.5=趋势延续，H<0.5=即将反转
    # WPT	"能量集中在哪个时间尺度？"	多尺度能量分布揭示结构稳定性
    - hurst_price_f           # Hurst 指数（时序记忆性）
    - spectrum_features_f     # 频谱特征
    - hilbert_phase_f         # Hilbert 变换（包络+相位）
    - wpt_price_fluctuation_f # 小波包变换（多尺度分解）
    - evt_features_f          # EVT 极值理论（尾部风险/黑天鹅检测）
    - wpt_price_reconstructed_f
    - wpt_volume_energy_f
    - wpt_cvd_fluctuation_f
    - hurst_cvd_f

    # ========== 跨 archetype 全量候选 (SHAP 自动裁剪) ==========
    - fer_failure_signals_f        # FER 专属
    - me_soft_phase_f              # ME 专属
    - me_failure_f                 # ME 专属
    - me_context_f                 # ME 专属

    # ========== Session & Microstructure ==========
    - session_features_f           # session_id, hour_sin/cos, is_session_overlap
    - bars_since_extreme_f         # bars_since_local_high/low (避免追单)

    - market_cap_normalized_orderflow_f
  ensure_signal_column:
    name: signal
    default_value: 0
