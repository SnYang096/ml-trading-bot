# BPC (BreakoutPullbackContinuation) 策略特征配置
# 语义：趋势中先回踩再延续原方向

name: bpc
description: |
  BreakoutPullbackContinuation archetype: 趋势中回踩后延续。
  核心特征：趋势强度 + 回踩深度 + 结构完整性。

feature_pipeline:
  exclude_columns:
    - atr
  requested_features:
    # ----- BPC 核心特征：趋势 + 回踩 -----
    - trend_r2_20_f
    - path_efficiency_pct_f
    - path_length_pct_f
    - price_dir_consistency_pct_f
    # ----- 动量 -----
    - macd_f
    - rsi_f
    # ----- 波动 -----
    - atr_percentile_f
    - bb_width_normalized_pct_f
    - atr_f
    # ----- SR 相关 -----
    - sr_strength_max_f
    - dist_to_nearest_sr_f
    # ----- 订单流 -----
    - vpin_features_f
    - volume_ratio_pct_f
    - ofci_pct_f
    - shd_pct_f
    # ----- 基础 -----
    - sma_200_f
    # ----- 高级特征 -----
    - hurst_price_f
    - hilbert_phase_f
  ensure_signal_column:
    name: signal
    default_value: 0
