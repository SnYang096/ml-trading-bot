# =============================================================================
# BPC · non_rolling — 目的与节奏
# -----------------------------------------------------------------------------
# 目的
#   - 非滚动、静态 holdout（time_split_policy: static_holdout）：在整段样本上做一次「全周期」
#     研究产出（典型 CLI：--stage full），用于上线新的配置与阈值组合。
#   - 适合：slow（或监控）发现特征 / 规则结构变化大、需要在整段历史上重新对齐 features、
#     gate、entry、execution 等后再 adopt；不仅是当月阈值微调。
# 建议节奏
#   - 按需触发，常见 1–3 个月一次，或慢管线/漂移告警触发；频率低于 turbo 月度、可与 slow 季度对齐。
# 执行注意
#   - extends slow：与 slow 相同地开启 entry meta、各层阈值 optimize、SHAP 特征筛选；
#     仅 rolling 改为 non_rolling + static_holdout，output 单独目录。
#   - 全周期 run 的对比与上线建议写在 report.json（comparison / deploy_gate），无单独 HTML。
# -----------------------------------------------------------------------------
# 覆写 dates / rolling / output；其余与同目录 research_roll.features_on.yaml 一致。

extends: research_roll.features_on.yaml

dates:
  # non_rolling/static_holdout 专用窗口，区别于 turbo/slow 的月度 rolling calibration。
  # Train: 更早历史；Val: 最近测试窗之前 6 个月调阈值；Test: 最近 6 个月纯 OOS 验收。
  nonrolling_validation_months: 6
  nonrolling_test_months: 6

rolling:
  mode: non_rolling
  time_split_policy: static_holdout

# 单次全周期结束后的 compare_runs vs 上期 history（rolling 快照不在此语义下使用）。
comparison:
  min_trades: 0
  sharpe_adopt_ratio: 0.7
  sharpe_reject_floor: 0.0

# 与 compare_runs 输出配合；结果写入该次 run 的 report.json → deploy_gate（终端亦打印）。
deploy_gate:
  trigger_sharpe_improve: 0.05
  trigger_drift_level: HIGH
  min_sharpe_change: 0.03
  require_adopt: true
  min_trades: 0
  require_human_confirm: true

output:
  history_dir: results/bpc/non-rolling-sim
