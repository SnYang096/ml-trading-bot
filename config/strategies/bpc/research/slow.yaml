# =============================================================================
# BPC · slow（slow_realistic）— 目的与节奏
# -----------------------------------------------------------------------------
# 目的
#   - 相对真实的滚动：结构快照 + 较长 lookback；允许 entry_filter 等层做 meta 搜索，
#     同时保留 locked 阈值调参与 execution / direction 等，用于同时观察「特征相关行为 +
#     阈值」的渐进漂移（非单次改特征的「大改版」）。
# 建议节奏
#   - 约每 1–3 个月：与 rolling.slow_realistic.cadence_months: 3 同量级；可按季度跑慢滚，
#     作为 turbo 月度之外的体检。（实盘重训触发阈值见 config/pipelines/pcm_orchestrate_*.yaml。）
# 术语说明
#   - turbo = fixed features + rolling calibration：固定生产特征/结构，只做月度阈值与执行层标定。
#   - slow = structural refresh / feature search + rolling calibration：定期刷新结构与特征搜索，再接月度标定。
# 与 turbo / non_rolling 的分工
#   - turbo：固定特征、偏阈值微调。
#   - slow：定期特征+阈值联合体检；若此处暴露大漂移，再触发 non_rolling 全量刷新。
#   - SHAP（shap_feature_selection）开启：在实验 workspace 上筛特征写入 features.yaml 系产物。
# -----------------------------------------------------------------------------
# 下列仅慢管线相对 turbo 的差量。

extends: turbo.yaml

dates:
  calibration_months: 6

training:
  seeds:
    - 42
    # 可以多seed比较，只有一个seed，seed_selection，没用
  seed_selection: best_sharpe

# 历史上曾经想把多空分开，来测试是不是更能稳定找出特征，但是分开以后维护很麻烦，且没有体现出更稳定，反而是同一个方向多了很多错误开仓，放在一起更简单
# 保留这个，防止未来想分开测试
strategy_scope:
  direction: all

rolling:
  mode: slow_realistic
  windows:
    # full_history：慢快照 struct_start = dates.start_date（跨牛熊更长样本）；rolling_window 时仍用下方 lookback 月数。
    structure_train_window: full_history
    structure_lookback_months: 24
  slow_realistic:
    # 在 rolling_sim 且 rolling.mode == slow_realistic 时，会用 cadence_months 决定 隔几个月跑一次慢结构快照
    cadence_months: 3
    # triggered_retrain_enabled：为 true 时按 cadence_months 执行慢结构快照并刷新滚动使用的 strategies_root；为 false 时整段 rolling 不跑快照、始终用仓库 config/strategies。每月阈值标定与当月 test 仍照常进行，与该项无关。
    triggered_retrain_enabled: true
    # adoption_gate：慢快照新旧结构采纳门禁。「下面键顺序 = 运行时优先级」（早判定的块写在上面；YAML 解析不依赖书写顺序，但人读配置时应按此顺序理解）。
    #   P1 契约：semantic_guard（locked prefilter merge + locked gate 缺失/禁用 → 可不采纳）。
    #   P2 prefilter：prefilter_drift_guard（非 locked 数值阈值相对漂移 red → 不采纳候选快照）。
    #   P3 业绩分：先用 score_weights + undertrade + cash_score_when_no_trades 得 old/new 综合分；
    #   P4 硬砍：hard_reject 检查 new 的原始 Sharpe / max_dd；
    #   P5 比较：adopt_ratio + min_improvement 决定 new 分是否压倒 old。
    adoption_gate:
      enabled: true
      validation_months: 1
      # ── P1 契约 veto（先于业绩比较；见 _evaluate_semantic_contract_for_strategy）。
      semantic_guard:
        enabled: true
        on_prefilter_locked_missing: repair_and_continue
        on_gate_locked_violation: red_no_adopt
      # ── P2 prefilter 数值漂移 veto（在 repaired candidate 上；见 _evaluate_prefilter_drift_for_strategy）。
      prefilter_drift_guard:
        enabled: true
        on_red_drift: previous_accepted
        warn_relative_change: 0.20
        max_relative_change: 0.35
      # ── P3 业绩综合分项（仅在未被 P1/P2 强制否决后继续；见 _score_slow_adoption_candidate）。
      score_weights:
        sharpe_r: 1.0
        max_drawdown_r: 0.15
        near_stop_rate: 0.5
      undertrade:
        target_trades_soft: 10
        penalty: 0.15
      cash_score_when_no_trades: 0.0
      # ── P4 对 new 侧的硬否决（在用 P3 算分之后、P5 之前；见 _decide_slow_adoption_for_strategy）。
      hard_reject:
        sharpe_floor: -0.5
      # ── P5 old vs new 采纳门槛。
      adopt_ratio: 1.0
      min_improvement: 0.0

      # === 分项说明（与上面对应）===
      # enabled：false → 不设门禁，慢快照候选 root 直接使用。
      # validation_months：eval 月为当前 rolling 月 M 往前移 K 个月，仅用该月 old/candidate 各跑的快月产物做判别（因果）。
      # semantic_guard：先 merge locked prefilter；on_gate_locked_violation=red_no_adopt 时 gate locked 缺失/disabled→不采纳；
      #   on_prefilter_locked_missing：merge 后仍缺 locked 时 repair_and_continue 不单独升 red，red_no_adopt 则语义红。
      # prefilter_drift_guard：可选 watched_features / max_absolute_change_by_feature（见源码）；不参与 drift：locked / skip_parquet_tune。
      # score_weights / undertrade：Sharpe − 加权 dd/stop − 低交易软罚。
      # cash_score_when_no_trades：eval 月 n_trades=0 时该侧用这种「现金基准分」占位。
      # hard_reject：new 的 Sharpe ≤ floor（或可选 max_dd 超限）直接不采纳；与 adopt_ratio 无先后语义冲突——实现上先打分再硬砍再比 P5。
      # adopt_ratio / min_improvement：new_score 须不低于 old 经 adopt_ratio/min 抬升后的门槛。

threshold_calibration:
  # slow 要跑完整特征寻找链：允许 prefilter/gate 树模型训练、SHAP/分裂点打分，再叠加阈值调整。
  enable_model_training: true
  # execution_opt / pcm_eval / direction_tuning 与 extends 的 turbo 一致，不写则继承。


pcm_slot_grid:
  enabled: false

strategies:
  bpc:
    kpi_gates:
      prefilter:
        locked_threshold_tuning:
          enabled: true
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
          - tail_bad_rate_ratio
          - upside_positive_rate_ratio
      entry_filter:
        meta_algorithm: true
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
          - tail_bad_rate_ratio
          - upside_positive_rate_ratio
      gate:
        # archetypes/gate.yaml：inside_box + compression + chop + vpin = 4，须 ≥ 规则数以避免 optimize 截断
        max_hard_gates: 4
    simple_execution:
      sl_r: 4.0
      tp_r: 8.0
      timeout_bars: 500

shap_feature_selection:
  enabled: true
  n_folds: 8
  top_k: 20
  stability_threshold: 0.8
  min_stable_features: 1
  # protected_nodes：SHAP/稳定性筛选时强制保留的依赖图节点，避免误删跨品种可比尺度等基础列。
  # 三趋势策略对齐为仅 atr_f；确需钉死更多节点时在对应策略 slow 中覆写。
  protected_nodes:
    - atr_f
  apply_to:
    - features.yaml

data_flow:
  model_predictions: predictions.parquet
  gated_logs: logs_gated.parquet
  step_inputs:
    prefilter: predictions.parquet
    gate_train: predictions.parquet
    gate_apply: predictions.parquet
    execution: logs_gated.parquet
    backtest: logs_gated.parquet

event_backtest:
  enabled: true
  promote: true
  no_kill_switch: false
  map_extra_months: 4
  sym_r_default: "1.0:1:6.0"
  sym_r_by_family:
    bpc: "2.0:1:6.0"
  exec_objective_default: sharpe
  exec_objective_params:
    near_stop_threshold_r: -0.9
    near_stop_penalty: 0.0
    max_dd_penalty: 0.0
    min_trades_soft: 0
    undertrade_penalty: 0.0

output:
  history_dir: results/bpc/slow-rolling-sim
