# =============================================================================
# BPC · turbo（turbo_fixed_features）— 目的与节奏
# -----------------------------------------------------------------------------
# 目的
#   - 生产特征集固定（fixed_strategies_root → 与线上一致的 archetypes / features）。
#   - 主要做「阈值漂移」：在 locked 规则与 parquet_plateau 等口径下重标定 prefilter / gate /
#     entry_filter / execution；threshold_calibration 关闭树模型训练，不做 SHAP 式特征发现。
#   - 适合：线上例行轻量重校准、rolling_sim 或 fast_month 按月推进。
# 建议节奏
#   - 约每月：rolling_sim 在 holdout 内逐日历月重放（详见 docs/workflow/ROLLING_SIM_TIME_WINDOWS_CN.md）。
# 术语说明
#   - turbo = fixed features + rolling calibration：固定生产特征/结构，只做月度阈值与执行层标定。
#   - slow = structural refresh / feature search + rolling calibration：定期刷新结构与特征搜索，再接月度标定。
# 何时不要用 turbo
#   - 需要改特征定义 / archetype 结构、或 slow 显示特征层漂移很大 → 改用 slow 或 non_rolling。
# -----------------------------------------------------------------------------
# [INDEX] dates → rolling → threshold_calibration → data → strategies.bpc → event_backtest → output
# slow / non_rolling：extends 本文件并覆写差量（见各自文件）。

dates:
  # 与 slow（structure_train_window: full_history）struct_start = start_date 对齐；略早以留 feature warmup。
  start_date: "2022-01-01"
  end_date: "2026-05-01"
  # 2024-03 起滚到 2026-05
  holdout_months: 26
  calibration_months: 6

rolling:
  mode: turbo_fixed_features
  turbo_fixed_features:
    fixed_strategies_root: config/strategies

threshold_calibration:
  # enable_model_training: false → 阈值-only（不做 prefilter/gate 树模型训练与 SHAP/分裂点特征发现）。
  # 权威口径：本段 threshold_calibration.*；load_pipeline_config 再汇总成 rolling_calibration.* 供月度 replay；可选顶层 rolling_calibration 做小范围覆写（如 step_months）。
  enable_model_training: false
  prefilter:
    optimize: true
  gate:
    optimize: true
  entry_filter:
    optimize: true
  execution_opt:
    enabled: true
  pcm_eval:
    enabled: false
  direction_tuning:
    enabled: true

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap

data_path: data/parquet_data

download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data

strategies:
  bpc:
    config: config/strategies/bpc
    timeframe: 120T
    prepare_features: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.05
        min_rows: 10
        target_trades_min: 10
        target_trades_max: 50
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: true
          skip_if_cached: false
          # Parquet 高原；换列：locked_threshold_tuning.label_col: your_binary_col
          search_mode: parquet_plateau
          plateau_scan_points: 25
          plateau_coord_rounds: 3
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
          - tail_bad_rate_ratio
          - upside_positive_rate_ratio
      entry_filter:
        # 关闭 meta 多法 Sharpe 择优与特征发现式 entry 搜索；仍可用 archetype_plateau + scoring_method_fallbacks 的统计口径。
        meta_algorithm: false
        archetype_plateau: true
        significance_p: 0.10
        significance_min_trades: 4
        plateau_window: 4
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
          - tail_bad_rate_ratio
          - upside_positive_rate_ratio
        target_trades_min: 10
        target_trades_max: 50
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        min_score_improvement: 0.005
      gate:
        require_positive_effect: true
        min_combined_pass_rate: 0.05
        max_hard_gates: 4
        max_system_safety: 2
        target_trades_min: 0
        trade_penalty_low: 0.0
        trade_penalty_high: 0.0
        stability_penalty: 0.0
      backtest:
        min_trades: 0
      deploy:
        min_trades: 0

event_backtest:
  enabled: true
  map_extra_months: 4
  exec_grid_by_family:
    bpc:
      initial_r: "4.0:0.5:7.0"
      activation_r: "3.5:0.5:6.0"
      trail_r: "6.0:1.0:15.0"
  exec_objective_default: total_r_over_dd
  exec_objective_params:
    near_stop_threshold_r: -0.9
    near_stop_penalty: 5.0
    max_dd_penalty: 0.15
    min_trades_soft: 0
    undertrade_penalty: 0.0

output:
  history_dir: results/bpc/turbo-rolling-sim
