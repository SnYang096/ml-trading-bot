# BPC (BreakoutPullbackContinuation) 回测配置
# 专门用于 failure_no_opportunity 模型（入场即反）
# 
# Failure-first 模型（invert=true）：预测 success_has_opportunity（有机会的概率）
# 入场逻辑：success_prob 高于阈值时入场（高置信度的好机会）
#
# ⚠️  与 labels_rr_extreme 的区别：
# - failure_no_opportunity 只占 4.4%（大部分情况都"有机会"）
# - 模型预测平均值 95.6%，最小值 85.4%
# - 需要使用更高的 threshold（0.95）才能筛选出优质机会

backtest:
  enabled: true
  params:
    price_col: close
    freq: 4H
    use_signal_direction: false
    # Failure-first (invert=true): 模型输出 success_has_opportunity
    # long_entry_threshold: 0.95 表示 success_prob >= 0.95 时做多
    # 值越高 = 越保守 = 只在高置信度的"不会入场即反"时入场
    # 
    # 预期效果（threshold=0.95）：
    #   - 约 50% 的点入场（1700/3447）
    #   - 筛选出"几乎肯定有机会"的场景
    long_entry_threshold: 0.95
    exit_mode: none
    entry_mode: level
    strategy_direction: long_only
    max_holding_bars: 50
    use_rr_exit: true
    rr:
      atr_window: 14
      max_holding_bars: 50
      stop_loss_r: 1.0
      take_profit_r: 2.0
      entry_offset: 1
      use_time_exit: true
      use_trailing_stop: true
      trailing_atr_mult: 1.5
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
