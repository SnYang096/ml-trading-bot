name: bpc
description: 'BPC Evidence 特征配置：用于机会质量评估和执行决策。


  Evidence/Execution 职责：

  - 评估 alpha 质量（Evidence score）

  - 订单流支持程度（VPIN/Cluster/CVD）

  - 末端/衰竭风险（Terminal Risk）

  - 执行环境质量（Volume Participation/Noise）


  与 Gate 的分工：

  - Gate 决定"做不做"（硬 veto）

  - Evidence 决定"有多好"（软排序）

  - Execution 决定"怎么做"（size/stop/delay）

  '
