# BPC 方向特征候选声明
# 职责: 声明待验证的方向候选特征 (--compare-features 的输入)
# 对应生产配置: config/strategies/bpc/archetypes/direction.yaml (选中的规则)
#
# 用法:
#   # 默认模式: 只对比本文件 candidates 中的特征
#   python z实验_005_统一研究/direction_strict_validation.py \
#       --logs results/train_final_xxx/bpc/features_labeled.parquet \
#       --strategy bpc --compare-features
#
#   # 发现模式: 扫描全部数值特征, 用于发现新候选
#   python z实验_005_统一研究/direction_strict_validation.py \
#       --logs results/train_final_xxx/bpc/features_labeled.parquet \
#       --strategy bpc --compare-features --all-features
#
#   # 加 --temporal 查看时间稳定性
#   ... --compare-features --temporal

description: "BPC 方向特征候选 — 结构突破方向 (跟结构走)"

# ════════════════════════════════════════════════════════════════
# 候选特征 (输入) — 脚本从这里读取待评估的特征列表
# ════════════════════════════════════════════════════════════════
# 每个条目: feature (必须), transform (可选, 自动检测)
# transform: sign (有正负的特征) | center_sign (百分位数 [0,1]) | raw (直接用) | negate_sign (取反)
#
# 语义约束:
#   BPC = Breakout Pullback Continuation, 方向 = "跟结构走"
#   禁止: 瞬时 delta/wick/absorption (属 ME 语义)
#   禁止: funding_rate (属 LV 语义)

candidates:
  # ── BPC 核心: 结构突破方向 ──
  - feature: bpc_breakout_direction    # Donchian 突破方向 [-1, 0, +1]
    transform: raw
  - feature: bpc_direction_confidence  # 突破方向置信度 [0,1]
    transform: center_sign

  # ── BPC 软阶段分数 (方向隐含) ──
  - feature: bpc_score_breakout        # 突破阶段分数 [0,1]
    transform: center_sign
  - feature: bpc_score_continuation    # 延续阶段分数 [0,1]
    transform: center_sign

  # ── BPC 方向一致性 ──
  - feature: bpc_dir_consistency_short  # 短期方向一致性
  - feature: bpc_dir_consistency_mid    # 中期方向一致性
  - feature: bpc_dir_consistency_long   # 长期方向一致性

  # ── 通用动量方向 ──
  - feature: roc_20                    # 20 期 ROC (有正负)
  - feature: macd_atr                  # MACD/ATR (有正负)
  - feature: sma_200_position          # SMA200 相对位置

  # ── 订单流方向 ──
  - feature: oi_delta_price_sign       # OI 变化 × 价格方向
  - feature: fp_volume_skew            # Footprint 成交量偏斜

# ════════════════════════════════════════════════════════════════
# 上次评估结果 (输出) — 由 --compare-features 自动生成
# ════════════════════════════════════════════════════════════════
# 尚未评估, 运行上方命令后此处会自动填充

# ── direction_rules (手动指定, 匹配实盘) ──
# BPC 方向 = 结构突破方向, 不应被统计优化
# bpc_score_continuation (center_sign) 被拒绝: short%=89% > 80% 常数偏差护栏
direction_rules:
  - method: feature_sign
    feature: bpc_breakout_direction
    transform: raw
    description: "Donchian 20-bar 突破方向 [-1/+1], BPC 核心方向信号"
  - method: feature_sign
    feature: macd_atr
    transform: sign
    description: "MACD/ATR 动量方向 (兜底, 覆盖 breakout_direction=0 的样本)"

