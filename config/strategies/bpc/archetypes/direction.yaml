# 生产方向 — 由 BPC 语义信号决定方向；VWAP1200 区域过滤改由 gate 处理。
# 候选与评估见 ../features_direction.yaml

description: "BPC 方向 — breakout 主导 + macd 兜底（VWAP 过滤在 gate）"

direction_rules:
  - method: feature_sign
    feature: bpc_breakout_direction
    transform: raw
    description: "Donchian 20-bar 突破方向 [-1/+1], BPC 核心方向信号"
  - method: feature_sign
    feature: macd_atr
    transform: sign
    description: "MACD/ATR 动量方向 (兜底, 覆盖 breakout_direction=0 的样本)"
