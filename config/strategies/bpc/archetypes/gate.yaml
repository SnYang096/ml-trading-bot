schema:
  phases:
  - system_safety
  - hard_gate
  - guardrail
  evaluation_order: system_safety -> hard_gate -> guardrail
  governance:
    selection_method: gate_score (Youden's J = tail_capture - good_deny_rate)
    min_gate_score: 0.0
    alert_threshold: 0.25

# ==========================================================================
# BPC gate.yaml —— 2026-04-22 "回归早期" 精简版
# --------------------------------------------------------------------------
# 历史教训（诊断 2024-04~06 崩盘的回溯）：
#   早期 BPC (20260413_144115) run 2024-04~06 累计 +1086R，hard_gates = []。
#   之后的 "chop-gate hardening" 引入了 9 条 locked hard_gates，结果同期变 -157R。
#   元凶 gate：
#     - gate_bpc_late_long_above_ema1200 (ema_1200_position > 0.10 deny)
#       → 强势牛市期价远高于 EMA1200，等于把所有肥尾月多头入场一票否决
#     - gate_ema_1200_position_* / gate_bpc_late_short_below_ema1200 / gate_fer_ols_pos_*
#       / gate_macro_tp_vwap_1200_deadzone / gate_evt_* 等，全样本 KS 看似合理，
#       但在 BPC 肥尾子集上会批量挡掉真信号。
# 设计约束（用户 2026-04-22）：system_safety 最多 2 条。
# hard_gate：语义 chop + VPIN +（由原 prefilter 迁入的）箱体/压缩结构拦截。
# ==========================================================================

hard_gates:
- id: gate_bpc_inside_box_no_breakout
  tag: HARD_BPC_INSIDE_BOX_NO_BREAKOUT
  phase: hard_gate
  priority: 8
  reason: box 中部且上下均未确认突破 → 拒开仓（原 prefilter any_of，语义属于 gate）
  when:
    all_of:
    - box_pos_120:
        value_gt: 0.15
    - box_pos_120:
        value_lt: 0.85
    - box_breakout_up:
        value_lt: 0.5
    - box_breakout_down:
        value_lt: 0.5
  then:
    action: deny
  comment: "等价原 prefilter：仅在 box 中部且无任一侧 breakout≥0.5 时拦截"
  locked: true
  lock_reason: BPC 只做突破后的边缘回踩，不在箱体中部来回扫区开仓
- id: gate_bpc_box_compression_runaway
  tag: HARD_BPC_BOX_COMPRESSION_RUNAWAY
  phase: hard_gate
  priority: 7
  reason: 短期波动窗显著宽于长期窗 → 扩张期回踩，非 consolidation→breakout→pullback 语义
  when:
    box_compression_score:
      value_gt: 1.50
  then:
    action: deny
  comment: "原 prefilter box_compression_score<=1.50；此处 deny 当值>1.50"
  locked: true
  lock_reason: Box-structure gate（扩张期过滤）；须 locked 以免 gate promote 在 max_hard_gates 较小时裁掉本规则
- id: gate_bpc_semantic_chop_high
  tag: HARD_BPC_SEMANTIC_CHOP
  phase: hard_gate
  priority: 6
  reason: BPC 专用：同品种 semantic_chop_ts_q 过高 → 拒开仓；低分位放行（与 TPC/ME 同构）
  when:
    bpc_semantic_chop_ts_q:
      value_gte: 0.40
  then:
    action: deny
  comment: "deny iff ts_q>=0.40（放行 ts_q<0.40）。上阈可扫 0.25/0.30/0.35/0.40（改 value_gte）"
  locked: true
  frozen: true
  promote_never_disable: true
  lock_reason: 高 chop 分位拒单；低分位放行；与 TPC/ME 对齐
- id: gate_vpin_ma20
  tag: HARD_VPIN_MA20
  phase: hard_gate
  priority: 11
  reason: 统计验证规则 (lift=1.15)
  when:
    vpin_quantile_rank_20:
      value_gt: 0.8
  then:
    action: deny
  comment: 'optimizer: no_stable_plateau, threshold=0.2959, lift=0.287'
  locked: true
  lock_reason: VPIN 知情交易活跃度：信息不对称过高时入场胜率下降

guardrails: []

system_safety:
- id: gate_vol_persistence_vol_persistence
  tag: HARD_VOL_PERSISTENCE_VOL_PERSISTENCE
  phase: system_safety
  priority: 12
  reason: 统计验证规则 (lift=1.24)
  when:
    all_of:
    - vol_persistence:
        value_gt: 0.0029
    - vol_persistence:
        value_lt: 0.0616
  then:
    action: deny
  comment: 'merged: (0.0029,0.0299) + stat_fallback (0.0275,0.0616) → full deny zone. MeanRR=-0.60, BadRate=51.8%'
  locked: true
  lock_reason: 波动率持久性：低波噪声切换/拖泥带水期对趋势策略不利
- id: gate_vol_leverage_asymmetry_vol_leverage_asymmetry
  tag: HARD_VOL_LEVERAGE_ASYMMETRY_VOL_LEVERAGE_ASYMMETRY
  phase: system_safety
  priority: 13
  reason: 统计验证规则 (lift=1.08)
  when:
    all_of:
    - vol_leverage_asymmetry:
        value_gt: 0.0558
    - vol_leverage_asymmetry:
        value_lt: 0.1482
  then:
    action: deny
  comment: 'optimizer: stable_plateau_found, threshold=0.1259, lift=0.119'
  locked: true
  lock_reason: 波动杠杆非对称：α/γ 严重失衡期趋势容易被拖垮
