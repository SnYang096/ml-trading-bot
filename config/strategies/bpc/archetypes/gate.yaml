# BPC Gate Archetype
# 基于 optimize_gate_unified.py 评估结果整理
# 评估时间: 2026-02-08
# ❗ 规则方向已根据数据实际相关性修正

# 语义说明（基于特征与 RR 的实际相关性）：
# - 高 wpt_ignition_score → 低 RR（实际负相关）
# - 低 wpt_exhaustion_score → 低 RR（实际负相关）
# - 高 sr_strength_max → 低 RR（实际负相关）
# - 高 vp_absorption_score → 低 RR（实际负相关）
# - 高 bpc_dir_consistency_long → 低 RR（实际负相关）

schema:
  phases:
    - system_safety
    - hard_gate
    - guardrail        # 策略一致性护栏（不参与优化）
    - soft_filter
    - preconditions
    - evidence
    - decision
  evaluation_order: system_safety -> hard_gate -> guardrail -> soft_filter -> preconditions -> evidence -> decision
  governance:
    soft_filter_floor:
      enabled: true
      min_cumulative_weight: 0.25
    failure_budget:
      max_hard_deny_rate: 0.50
      alert_threshold: 0.45

# ============================================================
# 🔴 Hard Gates (必要条件 - 不满足则拒绝)
# ============================================================
hard_gates:
  # ✅ Lift=11.4% | PassRate=74.3% | 方向已修正
  - id: gate_direction_not_committed
    tag: HARD_DIRECTION_NOT_COMMITTED
    phase: hard_gate
    priority: 0
    reason: "[HARD] 方向结构过强 — 过度拥挤"
    when:
      bpc_dir_consistency_long:
        value_gt: 0.55
    then:
      action: deny

  # ✅ Lift=21.2% | PassRate=35.8% | 方向已修正
  - id: gate_wpt_ignition_fail
    tag: HARD_WPT_IGNITION_FAIL
    phase: hard_gate
    priority: 1
    reason: "[HARD] WPT 点火过强 — 小波动能过度"
    when:
      wpt_ignition_score:
        value_gt: 0.209
    then:
      action: deny

  # ✅ Lift=562% | PassRate=44.4% | 方向已修正
  - id: gate_wpt_exhaustion
    tag: HARD_WPT_EXHAUSTION
    phase: hard_gate
    priority: 2
    reason: "[HARD] WPT 未力竭 — 小波动能未释放"
    when:
      wpt_exhaustion_score:
        value_lt: 0.309
    then:
      action: deny

# ============================================================
# 🟡 Soft Filters (增强条件 - 不满足则降权)
# ============================================================
soft_filters:
  # ✅ Lift=23.9% | PassRate=31.6% | Stable Plateau
  - id: filter_sr_strength_high
    tag: SOFT_SR_STRENGTH_HIGH
    phase: soft_filter
    priority: 1
    reason: "[SOFT] SR强度过高 — 支撑/阻力过强"
    when:
      sr_strength_max:
        value_gt: 3.204
    then:
      action: downweight
      weight: 0.7

  # ✅ Lift=1288% | PassRate=30.0% | Robustness=0.74
  - id: filter_vp_absorption_high
    tag: SOFT_VP_ABSORPTION_HIGH
    phase: soft_filter
    priority: 2
    reason: "[SOFT] VP 吸收度过高 — 订单簿流动性过强"
    when:
      vp_absorption_score:
        value_gt: 0.051
    then:
      action: downweight
      weight: 0.7

  # 🔄 重新评估: VPIN 极端
  - id: filter_vpin_extreme
    tag: SOFT_VPIN_EXTREME
    phase: soft_filter
    priority: 3
    reason: "[SOFT] VPIN 极端 — 信息不对称过高"
    when:
      vpin_max20:
        value_gt: 0.7
    then:
      action: downweight
      weight: 0.7

  # 🔄 重新评估: CVD 参与度低
  - id: filter_cvd_participation_low
    tag: SOFT_CVD_PARTICIPATION_LOW
    phase: soft_filter
    priority: 4
    reason: "[SOFT] CVD 参与度低 — 订单流不活跃"
    when:
      cvd_change_5_normalized:
        value_lt: 0.1
    then:
      action: downweight
      weight: 0.7

  # 🔄 重新评估: BB 压缩缺失
  - id: filter_bb_compression_missing
    tag: SOFT_BB_COMPRESSION_MISSING
    phase: soft_filter
    priority: 5
    reason: "[SOFT] BB 压缩缺失 — 波动率未收窄"
    when:
      bpc_bb_compression:
        value_lt: 0.3
    then:
      action: downweight
      weight: 0.7

  # ============================================================
  # 🆕 新增规则 (2026-02-08 rr_extreme 训练产出)
  # ============================================================

  # 🆕 Lift=7.98 | SMA200位置
  - id: filter_sma_200_position_low
    tag: SOFT_SMA_200_POSITION_LOW
    phase: soft_filter
    priority: 12
    reason: "[SOFT] SMA200位置过低 — 价格距200均线过远"
    when:
      sma_200_position:
        value_lt: -0.0019
    then:
      action: downweight
      weight: 0.8

  # 🆕 分裂4次 | EVT右尾尺度
  - id: filter_evt_scale_right_low
    tag: SOFT_EVT_SCALE_RIGHT_LOW
    phase: soft_filter
    priority: 14
    reason: "[SOFT] EVT右尾尺度低 — 极值风险结构异常"
    when:
      evt_scale_right:
        value_lt: 0.3433
    then:
      action: downweight
      weight: 0.8

  # 🆕 Stable Plateau | EVT VaR99
  - id: filter_evt_var_99_low
    tag: SOFT_EVT_VAR_99_LOW
    phase: soft_filter
    priority: 16
    reason: "[SOFT] EVT VaR99低 — 尾部风险估计异常"
    when:
      evt_var_99:
        value_lt: 0.8917
    then:
      action: downweight
      weight: 0.8

  # 🆕 Stable Plateau | EVT左尾形状
  - id: filter_evt_tail_shape_left_low
    tag: SOFT_EVT_TAIL_SHAPE_LEFT_LOW
    phase: soft_filter
    priority: 20
    reason: "[SOFT] EVT左尾形状低 — 左尾风险结构异常"
    when:
      evt_tail_shape_left:
        value_lt: 0.5298
    then:
      action: downweight
      weight: 0.8

# ============================================================
# 🛡️ Strategy Guardrails (策略一致性护栏 - 不参与 Lift 优化)
# ============================================================
# 这些规则不是 Alpha 信号，而是策略语义约束。
# 它们的 Lift 异常高，但这是“同义反复”的结果，不是预测信息。
# 固定宽松阈值，防止 execution 违背策略前提。
guardrails:
  # 🛡️ 价格位置护栏
  # 语义：BPC = 低位压缩→突破，不应在极端高位追单
  # 固定阈值 0.9（不参与优化）
  - id: guardrail_price_position_extreme_high
    tag: GUARDRAIL_PRICE_POSITION_EXTREME_HIGH
    phase: guardrail
    priority: 0
    reason: "[GUARDRAIL] 价格位置极端高 — 违背 BPC 低位压缩语义"
    when:
      price_position:
        value_gt: 0.9
    then:
      action: deny
    meta:
      is_alpha: false
      rationale: |
        price_position 的高 Lift 是“同义反复”的结果：
        BPC 策略本身就是低位压缩→突破，模型发出信号时，
        价格大概率就在低位。这不是预测信息，是策略定义的显式化。
        作为 Guardrail 保留，防止 execution 犯常识错误。

  # 🛡️ BPC 成交量压缩护栏
  # 语义：BPC 核心语义是“缩量压缩”，不应在缩量不足时做单
  # 固定阈值 0.3（不参与优化）
  - id: guardrail_bpc_volume_compression_missing
    tag: GUARDRAIL_BPC_VOLUME_COMPRESSION_MISSING
    phase: guardrail
    priority: 1
    reason: "[GUARDRAIL] BPC缩量不足 — 违背 BPC 压缩语义"
    when:
      bpc_volume_compression_pct:
        value_lt: 0.3
    then:
      action: deny
    meta:
      is_alpha: false
      rationale: |
        bpc_volume_compression_pct 是 BPC 策略的核心语义特征。
        它在 Gate 层会产生假阳性的高 Lift，因为模型本身就依赖它。
        作为 Guardrail 保留，确保不在“完全没有压缩”的情况下做单。

# ============================================================
# ⚫ System Safety (系统安全 - 不做 lift 优化)
# ============================================================
system_safety:
  - id: safety_reflexivity_crowded
    tag: SYSTEM_REFLEXIVITY_CROWDED
    phase: system_safety
    priority: 0
    reason: "[SYSTEM] 反身性拥挤 — 市场单边过度"
    when:
      ofci_pct:
        quantile_gt: 0.85
    then:
      action: deny

# ============================================================
# 📋 移除的无效规则
# ============================================================
# no_valid_threshold (无法找到有效阈值):
#   - vol_slope_20, vp_compression_score, wpt_absorption_score
#   - liquidity_void_compression_score
# Lift < 0.1 (几乎无效):
#   - vpin_ma20 (0.06), wpt_compression_score (0.06)
#   - spectrum_price_high_freq_ratio (0.06)
#   - spectrum_volume_high_freq_ratio (0.07)
#   - spectrum_cvd_low_freq_ratio (0.10)
