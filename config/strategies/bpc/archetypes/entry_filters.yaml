# BPC entry filter — 突破回踩后：CVD 吸收 + 恢复力度（多空共用同一阈值；方向由上游 entry_direction 决定）
filters:
  - id: bpc_orderflow_continuation
    enabled: true
    locked: true
    promote_never_disable: true
    description: "回踩后 CVD 吸收 + 恢复力度（BPC 订单流确认），适用于 long/short"
    conditions:
      - feature: bpc_cvd_absorption
        operator: ">="
        value: 1.0
      - feature: bpc_recovery_strength
        operator: ">="
        value: 0.25

combination_mode: or
