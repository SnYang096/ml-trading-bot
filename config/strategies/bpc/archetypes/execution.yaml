execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15
holding:
  max_holding_bars: null
  time_stop_bars: 0
optimization:
  enabled: true
  # ── 参数合理性约束 (防止退化高 WR) ──
  constraints:
    max_sl_activation_ratio: 3.0
    min_win_r: 0.0
  params:
    stop_loss.initial_r:
      range:
      - 1.0
      - 4.0
      step: 0.5
    stop_loss.trailing.activation_r:
      range:
      - 0.5
      - 5.0
      step: 0.5
    stop_loss.trailing.trail_r:
      range:
      - 0.5
      - 3.0
      step: 0.5
# ── 旧值 initial_r=3.0/activation_r=0.5 是退化组合 (ratio=6, random WR=86%) ──
stop_loss:
  initial_r: 2.0
  trailing:
    activation_r: 1.0
    step_r: 0.5
    trail_r: 0.5
  type: trailing
take_profit:
  enabled: false
version: 47
