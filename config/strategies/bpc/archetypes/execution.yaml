# BPC Execution 配置（统一版）
# 版本: 4.0
# 更新时间: 2026-02-08
#
# 职责:
#   1. 定义基础执行结构（止损/止盈类型）
#   2. 定义执行档位（基于 Evidence 综合分数）
#   3. 定义 Evidence 语义标签 → 参数调整
#   4. 定义噪声惩罚
#
# 配置文件关系:
#   evidence.yaml  → 定义 Evidence 特征列表和分位数映射
#   本文件         → 定义所有执行相关配置

version: 4

# ============================================================
# 📌 基础执行结构
# ============================================================
# 趋势跟踪策略：移动止损，无固定止盈，让利润奔跑

execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15

# 止损配置
stop_loss:
  type: trailing              # trailing = 移动止损, fixed = 固定止损
  initial_r: 2.0              # 初始止损距离 (R倍数)
  trailing:
    activation_r: 1.0         # 盈利达到 1R 后激活移动止损
    trail_r: 1.5              # 移动止损距离最高点 1.5R
    step_r: 0.5               # 每上涨 0.5R 收紧一次止损

# 止盈配置
take_profit:
  enabled: false              # 趋势策略不设固定止盈

# 持仓约束
holding:
  max_holding_bars: null      # 不限制，由市场和止损决定
  time_stop_bars: 50          # 时间止损 (超过50根K线未达目标则平仓)

# 方向策略
direction_policy:
  direction_source: structure
  structure_direction:
    method: trend_sign
    lookback_bars: 5
    min_consistency: 0.6

# ============================================================
# 📊 执行档位（基于 Evidence 综合分数）
# ============================================================

tiers:
  - name: "强证据"
    score_min: 0.70
    params:
      sl_r: 0.8
      tp_r: 3.0
      size_multiplier: 1.2
      max_hold_time: 200
      trailing_enabled: true
      trailing_threshold: 0.1
      trailing_distance: 0.05
  
  - name: "中等证据"
    score_min: 0.50
    params:
      sl_r: 1.0
      tp_r: 2.5
      size_multiplier: 1.0
      max_hold_time: 150
      trailing_enabled: true
      trailing_threshold: 0.15
      trailing_distance: 0.08
  
  - name: "弱证据"
    score_min: 0.30
    params:
      sl_r: 1.2
      tp_r: 2.0
      size_multiplier: 0.8
      max_hold_time: 100
      trailing_enabled: false
  
  - name: "边缘证据"
    score_min: 0.10
    params:
      sl_r: 1.5
      tp_r: 1.8
      size_multiplier: 0.5
      max_hold_time: 80
      trailing_enabled: false

# ============================================================
# 📐 Evidence 语义标签 → 参数调整（乘法因子）
# ============================================================

evidence_adjustments:
  suppress:
    semantic: "强烈不利 - 极度限制仓位/信心"
    size_multiplier: 0.3
    tp_r_multiplier: 0.8
    sl_r_multiplier: 1.3

  downweight:
    semantic: "不利 - 降低信心/仓位"
    size_multiplier: 0.6
    tp_r_multiplier: 0.9
    sl_r_multiplier: 1.15

  neutral:
    semantic: "中性 - 标准执行"
    size_multiplier: 1.0
    tp_r_multiplier: 1.0
    sl_r_multiplier: 1.0

  favor:
    semantic: "有利 - 提高信心/仓位"
    size_multiplier: 1.15
    tp_r_multiplier: 1.1
    sl_r_multiplier: 0.95

  amplify:
    semantic: "强烈有利 - 最大化执行"
    size_multiplier: 1.3
    tp_r_multiplier: 1.2
    sl_r_multiplier: 0.85

# ============================================================
# 🎯 多 Evidence 聚合规则
# ============================================================

aggregation:
  method: weighted_geometric_mean
  weight_source: bad_suppression
  constraints:
    max_size_multiplier: 1.5
    min_size_multiplier: 0.1
    max_tp_stretch: 1.3
    min_sl_tightening: 0.7

# ============================================================
# 📉 噪声惩罚配置
# ============================================================

noise_penalty:
  enabled: true
  short_window: 20
  long_window: 120
  weights:
    wpt_entropy: 0.35
    spectrum_width: 0.30
    hilbert_phase_var: 0.20
    hurst_inverse: 0.15
  max_penalty: 0.8

# ============================================================
# 🛡️ 安全约束
# ============================================================

constraints:
  min_size_multiplier: 0.1
  min_position_value: 100

# ============================================================
# 📋 快速查询表
# ============================================================

quick_lookup:
  suppress:    [0.30, 0.80, 1.30]
  downweight:  [0.60, 0.90, 1.15]
  neutral:     [1.00, 1.00, 1.00]
  favor:       [1.15, 1.10, 0.95]
  amplify:     [1.30, 1.20, 0.85]

# ============================================================
# 🔧 回测优化参数范围
# ============================================================

optimization:
  enabled: true
  params:
    stop_loss.initial_r:
      range: [1.0, 3.0]
      step: 0.5
    stop_loss.trailing.activation_r:
      range: [0.5, 2.0]
      step: 0.5
    stop_loss.trailing.trail_r:
      range: [1.0, 2.5]
      step: 0.5
