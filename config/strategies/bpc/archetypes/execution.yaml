add_position:
  add_size_multipliers:
    # 这里越加越多是因为根据数据统计，越后面成功率越高
    - 1
    - 2
    - 3
  inherit_parent_stop: true
  max_add_times: 3
  min_current_r_by_add:
    - 1
    - 2
    - 3
  min_current_r_unit: atr
  sizing_mode: fixed_multiplier
  trigger:
    type: float_r_ladder_only
execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15
holding:
  max_holding_bars: 360
  time_stop_bars: 0
stop_loss:
  breakeven:
    enabled: false
    lock_profit_atr: 1.0
    trigger_r: 9
  guardrails:
    max_stop_pct: 0.1
    min_stop_pct: 0.01
  initial_r: 2.0
  # 统计依据: EMA1200 零点穿越比 VWAP1200 更可靠；
  # 两者分歧时 (6.4% bars) EMA 方向正确率显著更高 (medRR +2.5 vs -1.5)
  structural_exit: ema1200
  trailing:
    activation_r: 2.0
    enabled: false
    trail_r: 2.0
  type: fixed
take_profit:
  enabled: false
version: 59
