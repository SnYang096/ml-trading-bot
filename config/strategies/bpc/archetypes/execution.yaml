# BPC — 趋势延续；执行档与 ME/TPC 对齐（同一套 initial_r / trailing / 加仓阶梯）。
# 原则：三策略共宽止损带，风险靠初始仓位与 sizing 收，避免 SL/trailing 过紧被噪声扫出；
# EMA1200 结构保底；不设 breakeven。

add_position:
  add_size_multipliers:
    # 这里越加越多是因为根据数据统计，越后面成功率越高
    - 1
    - 2
    - 3
  inherit_parent_stop: true
  max_add_times: 3
  min_current_r_by_add:
    - 1
    - 2
    - 3
  min_current_r_unit: atr
  sizing_mode: fixed_multiplier
  trigger:
    type: float_r_ladder_only
execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15
holding:
  # 仅 max_holding_bars；0 = 无墙钟时间强平（与 ME/TPC 对齐）。
  max_holding_bars: 0
stop_loss:
  # 2026-04-22 统一 breakeven 口径（见 src/time_series_model/live/position_logic.py）：
  #   trigger_r: MFE 阈值
  #   lock_level_r: SL 锁到 entry + lock_level_r × R（0=纯保本，>0=锁利润）
  #   measure: "initial_risk" | "atr"（BPC 历史口径用 atr，保持原语义）
  # 对应旧配置：lock_profit_atr=1.0, trigger_r=9, measure=atr → 新配置不变。
  breakeven:
    enabled: false
    trigger_r: 9
    lock_level_r: 1.0
    measure: atr
  guardrails:
    max_stop_pct: 0.1
    min_stop_pct: 0.01
  # initial_r 与 TPC/ME 一致；延续段防震出靠宽止损，仓位侧再收风险。
  initial_r: 4.0
  # 统计依据: EMA1200 零点穿越比 VWAP1200 更可靠；
  # 两者分歧时 (6.4% bars) EMA 方向正确率显著更高 (medRR +2.5 vs -1.5)
  structural_exit: ema1200
  trailing:
    activation_r: 4.0
    enabled: true
    expand_with_primary_atr: true
    trail_r: 12.0
  type: trailing
take_profit:
  enabled: false
version: 59
