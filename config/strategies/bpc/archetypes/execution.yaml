# BPC Execution 配置
# 趋势跟踪策略：移动止损，无固定止盈，让利润奔跑

execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15

# 止损配置
stop_loss:
  type: trailing              # trailing = 移动止损, fixed = 固定止损
  initial_r: 2.0              # 初始止损距离 (R倍数)
  # 移动止损参数 (type=trailing 时生效)
  trailing:
    activation_r: 1.0         # 盈利达到 1R 后激活移动止损
    trail_r: 1.5              # 移动止损距离最高点 1.5R
    step_r: 0.5               # 每上涨 0.5R 收紧一次止损

# 止盈配置
take_profit:
  enabled: false              # 趋势策略不设固定止盈
  # 可选: 分批止盈
  # partial:
  #   - at_r: 2.0
  #     close_pct: 0.3
  #   - at_r: 4.0
  #     close_pct: 0.5

# 持仓约束
holding:
  max_holding_bars: null      # 不限制，由市场和止损决定
  time_stop_bars: 50          # 可选: 时间止损 (超过50根K线未达目标则平仓)

direction_policy:
  direction_source: structure  # 从结构推断，不是从模型预测
  structure_direction:
    method: trend_sign         # 根据 trend_sign 特征决定方向
    lookback_bars: 5
    min_consistency: 0.6       # 至少 60% 的 bar 方向一致

# 回测优化参数范围
optimization:
  enabled: true
  params:
    stop_loss.initial_r:
      range: [1.0, 3.0]
      step: 0.5
    stop_loss.trailing.activation_r:
      range: [0.5, 2.0]
      step: 0.5
    stop_loss.trailing.trail_r:
      range: [1.0, 2.5]
      step: 0.5
