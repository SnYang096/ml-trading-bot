add_position:
  add_size_multipliers:
    - 0.5
    - 0.35
    - 0.25
    - 0.2
    - 0.15
  inherit_parent_stop: true
  max_add_times: 5
  min_current_r_by_add:
    - 0.5
    - 1.0
    - 1.5
    - 2
    - 2.5
  min_current_r_unit: atr
  sizing_mode: fixed_multiplier
  trigger:
    # float_r_ladder_only = 浮盈 R 阶梯（事件回测）；bpc_follow_signal = 仅 PCM 再次意图时加仓
    type: bpc_follow_signal
execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15
holding:
  max_holding_bars: null
  time_stop_bars: 0
stop_loss:
  breakeven:
    enabled: true
    lock_profit_atr: 1.0
    trigger_r: 9
  guardrails:
    max_stop_pct: 0.1
    min_stop_pct: 0.01
  initial_r: 4.0
  structural_exit: vwap1200
  structural_exit_config:
    exit_inner_abs: 0.005
    # 相对 1200×2H 典型价 VWAP：macro position = (close-vwap)/close。
    # 多仓 pv <= -exit_break_abs 时空头弱势破位平仓（解决「长期在 VWAP 下方却只等宽止损」）。
    exit_break_abs: 0.02
  trailing:
    enabled: false
    activation_r: 9.0
    trail_r: 18.0
  type: trailing
take_profit:
  enabled: false
version: 55
