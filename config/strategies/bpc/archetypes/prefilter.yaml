rules:
- feature: bpc_volume_compression_pct
  operator: '>='
  value: 0.9295
  rationale: meta-algorithm, KS=0.1055, return_uplift=+1.6074, robustness=100%, holdout验证通过
- feature: bpc_recent_breakout_strength
  operator: '>='
  value: 0.4
  rationale: 语义锁定：近 lookback_breakout 根内确实出现过突破（bpc_score_breakout rolling max），排除纯横盘里的
    pullback
  locked: true
  lock_reason: BPC 语义锚点 1/3：Breakout 成立
- feature: bpc_pullback_depth
  operator: <=
  value: 0.55
  rationale: 语义锁定：回撤不能过深，过深更接近结构失败或反转语义；放宽到既有候选上沿以保留牛熊单边里的深回踩肥尾
  locked: true
  lock_reason: BPC 语义锚点 2/3：Pullback 受控（未破结构，允许较深但仍有效的趋势回踩）
- feature: bpc_recovery_strength
  operator: '>='
  value: 0.5
  rationale: 语义锁定：回踩后必须有恢复力度，确认 continuation 的可执行性
  locked: true
  lock_reason: BPC 语义锚点 3/3：Continuation 确认
- any_of:
    - feature: box_pos_120
      operator: <=
      value: 0.15
    - feature: box_pos_120
      operator: ">="
      value: 0.85
    - feature: box_breakout_up
      operator: ">="
      value: 0.5
    - feature: box_breakout_down
      operator: ">="
      value: 0.5
  rationale: box 中部且未突破不开仓：20260425 TPC inside_box_no_breakout n=154, R=-425
  locked: true
  lock_reason: TPC 只交易趋势回调/边缘突破，不在箱体中部来回扫区开仓
