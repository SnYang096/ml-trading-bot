# BPC prefilter — 三层语义锚点：Breakout → Pullback → Continuation
# 全部使用原子特征，不依赖 bpc_score_* 组合分数。
# - bpc_volume_compression_pct: 非锁定 prior（突破前蓄势），允许 pipeline 调阈值/移除
# - bpc_recent_breakout_strength: 锚点 1/3，确认最近确实出现过 Donchian 突破
# - bpc_pullback_depth: 锚点 2/3，回撤受控、未破结构
# - bpc_recovery_strength: 锚点 3/3，回撤后恢复力度到位（Continuation 可执行）
rules:
- any_of:
  - feature: ema_1200_position
    operator: <=
    value: -0.03
  - feature: ema_1200_position
    operator: '>='
    value: 0.03
  rationale: 近 EMA1200 中轴无趋势优势：20260425 BPC |ema_1200_position|<0.05 的交易 n=11, R=-41
  locked: true
  lock_reason: BPC 必须离开 EMA1200 噪声中轴后才允许 breakout-pullback-continuation
- feature: bpc_volume_compression_pct
  operator: '>='
  value: 0.8905
  rationale: meta-algorithm, KS=0.1325, return_uplift=+1.2660, robustness=100%（非锁定，作为 prior 保留，可被 pipeline 调）
- feature: bpc_recent_breakout_strength
  operator: '>='
  value: 0.25
  rationale: 语义锁定：近 lookback_breakout 根内确实出现过突破（bpc_score_breakout rolling max），排除纯横盘里的 pullback
  locked: true
  lock_reason: BPC 语义锚点 1/3：Breakout 成立
- feature: bpc_pullback_depth
  operator: <=
  value: 0.65
  rationale: 语义锁定：回撤不能过深，过深更接近结构失败或反转语义；放宽到既有候选上沿以保留牛熊单边里的深回踩肥尾
  locked: true
  lock_reason: BPC 语义锚点 2/3：Pullback 受控（未破结构，允许较深但仍有效的趋势回踩）
- feature: bpc_recovery_strength
  operator: '>='
  value: 0.6
  rationale: 语义锁定：回踩后必须有恢复力度，确认 continuation 的可执行性
  locked: true
  lock_reason: BPC 语义锚点 3/3：Continuation 确认
# Box-structure prefilter upgrade for BPC:
# BPC is "breakout → pullback → continuation". The semantic requirement is:
# the *pre-breakout* window was a consolidation (compressed range). Since the
# rule evaluator sees only the current bar's features, we proxy this via
# box_compression_score = width_60 / width_240. Values <=1.0 mean the short-
# term window is not wider than the long-term window, i.e. no wild late-stage
# expansion before the pullback. This filters out "pullbacks inside a runaway
# widening range" which are low-quality BPC signals.
- feature: box_compression_score
  operator: '<='
  value: 1.50
  rationale: Short-term width must not be significantly wider than long-term (keeps BPC semantic of consolidation → breakout → pullback)
  locked: false
  lock_reason: Box prefilter upgrade
- any_of:
  - feature: box_pos_120
    operator: <=
    value: 0.15
  - feature: box_pos_120
    operator: '>='
    value: 0.85
  - feature: box_breakout_up
    operator: '>='
    value: 0.5
  - feature: box_breakout_down
    operator: '>='
    value: 0.5
  rationale: box 中部且未突破不开仓：20260425 BPC inside_box_no_breakout n=31, R=-86
  locked: true
  lock_reason: BPC 只做突破后的边缘回踩，不在箱体中部来回扫区开仓
last_evaluation:
  timestamp: '2026-04-20'
  data_source: features_labeled.parquet
  n_rows: 53486
  baseline_bad_rate: 0.0
  baseline_median_rr: -0.0486
  positive_signals: []
  anti_signals: []
  absence_signals: []
