rules:
- any_of:
  - feature: ema_1200_position
    operator: <=
    value: -0.03
  - feature: ema_1200_position
    operator: '>='
    value: 0.03
  rationale: 近 EMA1200 中轴无趋势优势：20260425 BPC |ema_1200_position|<0.05 的交易 n=11, R=-41
  locked: true
  skip_parquet_tune: true
  lock_reason: BPC 必须离开 EMA1200 噪声中轴后才允许 breakout-pullback-continuation
- feature: box_compression_score
  operator: <=
  value: 1.5
  rationale: 短期波动窗不应显著宽于长期窗；过度扩张不符合 consolidation→breakout→pullback 语义
  locked: true
  skip_parquet_tune: true
  lock_reason: BPC 形态锚点（box 结构）：扩张期回踩噪声高，拒绝非压缩段触发
- any_of:
  - feature: box_pos_120
    operator: <=
    value: 0.15
  - feature: box_pos_120
    operator: '>='
    value: 0.85
  - feature: box_breakout_up
    operator: '>='
    value: 0.5
  - feature: box_breakout_down
    operator: '>='
    value: 0.5
  rationale: box 中部且未突破不开仓，仅保留边缘或已确认突破区
  locked: true
  skip_parquet_tune: true
  lock_reason: BPC 形态锚点（突破后边缘回踩），不在箱体中部来回扫区开仓
- feature: bpc_recent_breakout_strength
  operator: '>='
  value: 0.25
  rationale: 语义锁定：近 lookback_breakout 根内确实出现过突破（bpc_score_breakout rolling max），排除纯横盘里的
    pullback
  locked: true
  lock_reason: BPC 语义锚点 1/3：Breakout 成立
- feature: bpc_pullback_depth
  operator: <=
  value: 0.65
  rationale: 语义锁定：回撤不能过深，过深更接近结构失败或反转语义；放宽到既有候选上沿以保留牛熊单边里的深回踩肥尾
  locked: true
  lock_reason: BPC 语义锚点 2/3：Pullback 受控（未破结构，允许较深但仍有效的趋势回踩）
- feature: bpc_recovery_strength
  operator: '>='
  value: 0.6
  rationale: 语义锁定：回踩后必须有恢复力度，确认 continuation 的可执行性
  locked: true
  lock_reason: BPC 语义锚点 3/3：Continuation 确认
