# BPC (BreakoutPullbackContinuation) 回测配置
# Failure-first 模型（invert=true）：预测 success_prob（不会踩坑的概率）
# 入场逻辑：success_prob 高于阈值时入场（高置信度的好机会）

backtest:
  enabled: true
  params:
    price_col: close
    freq: 4H
    use_signal_direction: false
    # Failure-first (invert=true): 模型输出 success_prob
    # long_entry_threshold: 0.8 表示 success_prob >= 0.8 时做多
    # 值越高 = 越保守 = 只在高置信度的"不会踩坑"时入场
    long_entry_threshold: 0.8
    exit_mode: none
    entry_mode: level
    strategy_direction: long_only
    max_holding_bars: 50
    use_rr_exit: true
    rr:
      atr_window: 14
      max_holding_bars: 50
      stop_loss_r: 1.0
      take_profit_r: 2.0
      entry_offset: 1
      use_time_exit: true
      use_trailing_stop: true
      trailing_atr_mult: 1.5
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
