# BPC (BreakoutPullbackContinuation) 回测配置
# Failure-first 模型：预测 failure_prob，低值 = 好机会

backtest:
  enabled: true
  params:
    price_col: close
    freq: 4H
    use_signal_direction: false
    # Failure-first: 低 failure_prob 入场
    # long_entry_threshold: 0.3 表示 failure_prob <= 0.3 时做多
    long_entry_threshold: 0.3
    exit_mode: none
    entry_mode: level
    strategy_direction: long_only
    max_holding_bars: 50
    use_rr_exit: true
    rr:
      atr_window: 14
      max_holding_bars: 50
      stop_loss_r: 1.0
      take_profit_r: 2.0
      entry_offset: 1
      use_time_exit: true
      use_trailing_stop: true
      trailing_atr_mult: 1.5
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
