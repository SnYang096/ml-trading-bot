# ============================================================
# 🛡️ BPC RISK_GATE: 从树模型高频分裂条件抽象的「交易宪法条款」
# ============================================================
# 版本: 1.0
# 来源: bpc_tree_rules.md 高频分裂条件
# 目标: 过滤 failure_rr_extreme（踩大坑）的 70%+ 可避免部分
# 哲学: "不是选好交易，是禁止在危险结构下交易"
# ============================================================

schema:
  # 设计原则：
  # - Hard Gate: 结构性失败（语义根本不成立）→ deny
  # - Soft Filter: 经济性失败（性价比差但不是不能做）→ downweight
  # - 避免过度防御导致系统僵化
  
  phases:
    - system_safety     # 系统性风险（反身性） → Hard Deny
    - hard_gate         # 结构性失败（语义不成立） → Hard Deny
    - soft_filter       # 经济性失败（性价比差） → Downweight
    - preconditions     # 前置条件 → Require
    - evidence          # 正面证据 → Require/Prefer
    - decision          # 最终决策
  
  evaluation_order: system_safety -> hard_gate -> soft_filter -> preconditions -> evidence -> decision
  
  # 治理机制：防止系统僵化
  governance:
    soft_filter_floor:
      enabled: true
      min_cumulative_weight: 0.25  # 即使全部 soft 触发，最低置信度也是 25%
    failure_budget:
      max_hard_deny_rate: 0.50     # Hard Gate 最多拒绝 50%
      alert_threshold: 0.45        # 超过 45% 发告警

# ============================================================
# 🔴 HARD GATES: 结构性失败（语义根本不成立）→ deny
# ============================================================
# 只保留 2 条规则，Hard Gate 要"少而狠"，宁可漏，不可错杀

hard_gates:
  - id: gate_vpin_vacuum
    tag: HARD_VPIN_VACUUM
    phase: hard_gate
    priority: 0
    reason: "[HARD] 订单流真空 — 没有信息交易者在定价"
    when:
      vpin_ma20:
        value_lt: 0.15  # 树模型分裂 39 次，用更保守的阈值
    then:
      action: deny
    note: |
      树模型在 vpin_ma20 <= 0.23~0.24 区间分裂了 39 次
      VPIN < 0.15 是真正的"订单流真空"，此时突破/续行信号大概率是"假动作"
      人话：市场没有真金白银在说话，别跟风

  - id: gate_direction_not_committed
    tag: HARD_DIRECTION_NOT_COMMITTED
    phase: hard_gate
    priority: 0
    reason: "[HARD] 方向结构不稳 — BPC 语义不成立"
    when:
      any_of:
        - bpc_dir_consistency_long:
            value_lt: 0.45
        - bpc_breakout_direction:
            value_lte: 0
    then:
      action: deny
    note: |
      树模型在 dir_consistency/breakout_direction 上分裂超过 40 次
      方向没站稳时续行语义根本不成立
      人话：方向还没站稳，别急着跟

# ============================================================
# 🟡 SOFT FILTERS: 经济性失败（性价比差）→ downweight
# ============================================================
# 5 条规则，weight ∈ [0.5, 0.85]
# "性价比差但不是不能做" → 降权而不是禁止

soft_filters:
  - id: filter_vpin_low
    tag: SOFT_VPIN_LOW
    phase: soft_filter
    priority: 1
    reason: "[SOFT] VPIN 偏低 — 信息交易者参与不足"
    when:
      all_of:
        - vpin_ma20:
            value_gte: 0.15
        - vpin_ma20:
            value_lt: 0.28
    then:
      action: downweight
      weight: 0.7
    note: 不是真空，但信心不足

  - id: filter_volume_not_expanding
    tag: SOFT_VOLUME_NOT_EXPANDING
    phase: soft_filter
    priority: 1
    reason: "[SOFT] 成交量未扩张 — 续行置信度下降"
    when:
      all_of:
        - bpc_volume_compression_pct:
            value_lt: 0.40
        - volume_ratio_pct:
            value_lt: 0.25
    then:
      action: downweight
      weight: 0.6
    note: |
      树模型分裂 19 次，量能不足不代表必败，只是胜率下降
      BPC 续行需要"放量确认"，缩量续行 = 假突破高发区
      人话：量没跟上，结构不可信

  - id: filter_price_awkward_zone
    tag: SOFT_PRICE_AWKWARD_ZONE
    phase: soft_filter
    priority: 1
    reason: "[SOFT] 价格在尴尬区 — RR 不理想"
    when:
      all_of:
        - sma_200_position:
            value_gt: -0.10
        - sma_200_position:
            value_lt: 0.10
    then:
      action: downweight
      weight: 0.5
    note: |
      树模型分裂 32 次，尴尬区胜率下降但不是完全不能交易
      sma_200_position ∈ [-0.1, +0.1] 是"无人区"：趋势做不出，反转没确认
      人话：价格在中枢附近犹豫，别掺和

  - id: filter_cvd_momentum_negative
    tag: SOFT_CVD_MOMENTUM_NEGATIVE
    phase: soft_filter
    priority: 1
    reason: "[SOFT] CVD 动量负向 — 反向力量在积累"
    when:
      all_of:
        - cvd_change_5_normalized:
            value_lt: 0
        - bpc_cvd_momentum:
            value_lte: 0
    then:
      action: downweight
      weight: 0.65
    note: |
      树模型分裂 12 次，反向积累不等于反转确认
      人话：订单流在反向积累，别逆着来

  - id: filter_direction_flip_frequent
    tag: SOFT_DIRECTION_FLIP_FREQUENT
    phase: soft_filter
    priority: 1
    reason: "[SOFT] 方向翻转频繁 — RR 预期下降"
    when:
      bpc_dir_flip_count:
        value_gt: 0.65
    then:
      action: downweight
      weight: 0.7
    note: |
      flip 多 ≠ 语义不成立，flip 多 = execution / RR 变差
      在某些高波动趋势初期，flip 反而是"洗盘"
      人话：市场在犹豫，仓位要轻

# ============================================================
# 🔵 SYSTEM SAFETY: 系统性风险（反身性）
# ============================================================

system_safety:
  - id: safety_reflexivity_crowded
    tag: SYSTEM_REFLEXIVITY_CROWDED
    phase: system_safety
    priority: 0
    reason: "[SYSTEM] 反身性拥挤 — 市场单边过度"
    when:
      ofci_pct:
        quantile_gt: 0.85
    then:
      action: deny
    note: 这是系统性风险，不是策略问题

# ============================================================
# 🏷️ ATTRIBUTION TAGS: 归因标签定义
# ============================================================
# 用于月度复盘和"哪条规则在爱上失败证据"分析

attribution_tags:
  hard_gate_tags:
    - tag: HARD_VPIN_VACUUM
      rule_id: gate_vpin_vacuum
      category: structural_failure
      description: "订单流真空，没有信息交易者"

    - tag: HARD_DIRECTION_NOT_COMMITTED
      rule_id: gate_direction_not_committed
      category: structural_failure
      description: "方向结构不稳，BPC 语义不成立"

  soft_filter_tags:
    - tag: SOFT_VPIN_LOW
      rule_id: filter_vpin_low
      category: economic_failure
      description: "VPIN 偏低，信息交易者参与不足"

    - tag: SOFT_VOLUME_NOT_EXPANDING
      rule_id: filter_volume_not_expanding
      category: economic_failure
      description: "成交量未扩张，续行置信度下降"

    - tag: SOFT_PRICE_AWKWARD_ZONE
      rule_id: filter_price_awkward_zone
      category: economic_failure
      description: "价格在尴尬区，RR 不理想"

    - tag: SOFT_CVD_MOMENTUM_NEGATIVE
      rule_id: filter_cvd_momentum_negative
      category: economic_failure
      description: "CVD 动量负向，反向力量在积累"

    - tag: SOFT_DIRECTION_FLIP_FREQUENT
      rule_id: filter_direction_flip_frequent
      category: economic_failure
      description: "方向翻转频繁，RR 预期下降"

  system_safety_tags:
    - tag: SYSTEM_REFLEXIVITY_CROWDED
      rule_id: safety_reflexivity_crowded
      category: system_risk
      description: "反身性拥挤，市场单边过度"

# ============================================================
# 📊 规则总览
# ============================================================
# 
# | 类型          | 规则数 | 作用         | 阈值策略         |
# |---------------|--------|--------------|------------------|
# | Hard Gate     | 2      | deny         | 保守（少而狠）   |
# | Soft Filter   | 5      | downweight   | 适中             |
# | System Safety | 1      | deny         | 严格             |
# 
# 预期效果：
# - failure_rr_extreme 过滤率: ~70%+
# - 保留 trade 的 lift: 0.36x
# - 剩余 ~8% 不可预测风险: 属于 news/liquidity shock
