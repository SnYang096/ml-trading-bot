# BPC Gate 特征配置
# 职责：只用于 failure_* / gate 模型的"做不做"硬否决
# 设计理念：Regime × Direction × Structure × Extreme Risk
# 
# Gate 只回答："这是一个明显不该碰的市场状态吗？"
# 不判断强弱、不判断好不好赚、不判断执行细节

name: bpc
description: |
  BPC Gate 特征配置：专门用于 failure_rr_extreme / failure_no_opportunity 的 veto 学习。
  
  Gate 宪法级职责：
  - Regime: 确保不逆大趋势
  - Direction: 确保方向成型、不在 chop
  - Structure: 确保是合法的 BPC 模式
  - Extreme Risk: 防止黑天鹅/事故场景
  
  不包含的（全部下放给 Evidence/Execution）：
  - 订单流细节 (VPIN/Cluster/CVD细节)
  - 波动率 Regime (Vol相关)
  - 末端/衰竭信号 (Exhaustion/Terminal Risk)
  - 执行质量/噪声 (数学特征)

feature_pipeline:
  exclude_columns:
    - atr
  
  requested_features:
    # ========== 必需的 scale 列（用于 label 计算，不参与模型训练）==========
    - atr_f                       # ATR（label 计算必需，通过 exclude_columns 排除模型输入）
    
    # ========== 结构合法性（BPC 身份证）==========
    - bpc_pullback_depth_pct_f    # 回踩深度 (side-aware)
    - bpc_pullback_duration_f     # 回踩持续时间
    
    # ========== 方向一致性（防 chop/微趋势幻觉）==========
    - bpc_dir_consistency_multi_f # 多尺度方向一致性 (short/mid/long)
    - bpc_dir_flip_count_f        # 方向翻转次数
    - price_dir_consistency_pct_f # price 自身方向一致性
    
    # ========== 趋势清晰度 / Regime ==========
    - trend_r2_20_f               # 趋势拟合优度
    - path_efficiency_pct_f       # 走势路径效率（防极度绕行）
    
    # ========== 极端风险 / 事故场景 ==========
    - jump_risk_pct_f             # 跳空风险分位

  ensure_signal_column:
    name: signal
    default_value: 0
