name: sr_reversal_rr_reg_long_orderflow
description: "Feature-set variant: mainline kline+SR + order_flow/ticks features (A/B vs sr_reversal_rr_reg_long)"
feature_pipeline:
  requested_features:
    # mainline kline+SR
    - macd_f
    - rsi_f
    - sma_200_f
    - atr_f
    - roc_5_f
    - mom_10_f
    - bbands_f
    - bb_width_f
    - trend_r2_20_f
    - trend_r2_50_f
    - acceleration_3_f
    - wick_ratios_f
    - price_range_symmetry_f
    - poc_hal_features_close_f
    - sqs_hal_high_f
    - sqs_hal_low_f
    - sr_strength_max_close_f
    # order flow / tick-dependent (optional but expected to add edge if real)
    - order_flow_all_features_f
  ensure_signal_column:
    name: signal
    default_value: 0

