# AER (AuctionExhaustionReversal) 策略标签配置
# 语义：趋势末端衰竭（量/波动极值）后反转

name: aer
target_column: rr_label

label_generator:
  module: src.time_series_model.strategies.labels.exhaustion_reversal_label
  function: compute_exhaustion_reversal_label
  params:
    price_col: close
    max_holding_bars: 50
    take_profit_r: 2.0
    stop_loss_r: 1.0
    # 衰竭条件
    atr_percentile_col: atr_percentile
    atr_percentile_min: 0.7  # ATR 百分位 >= 70%（高波动）
    path_efficiency_col: path_efficiency_pct
    path_efficiency_max: 0.5  # 路径效率 <= 50%（效率下降）
    # SR 过滤
    dist_to_sr_col: dist_to_nearest_sr
    dist_atr_mult: 1.5
    combine_mode: long_only

filters:
  - column: rr_label
    notna: true

post_label_filters: []

notes: |
  AuctionExhaustionReversal archetype:
  - 趋势末端衰竭信号：ATR 处于高百分位 + 路径效率下降
  - 在 SR 附近寻找反转机会
  - 连续 RR 标签用于回归模型
