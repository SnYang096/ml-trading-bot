# AER (AuctionExhaustionReversal) 回测配置

backtest:
  enabled: true
  params:
    price_col: close
    freq: 4H
    regression:
      # 回归模型使用 top_quantile 选择交易信号
      entry_mode: top_quantile
      entry_quantile: 0.90
      quantile_mode: expanding
      quantile_min_periods: 50
      # 方向由 RR 值符号决定（正=做多，负=做空）
      direction_from_prediction: true
    max_holding_bars: 50
    use_rr_exit: true
    rr:
      atr_window: 14
      max_holding_bars: 50
      stop_loss_r: 1.0
      take_profit_r: 2.0
      entry_offset: 1
      use_time_exit: true
      use_trailing_stop: false
      trailing_atr_mult: 1.0
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
