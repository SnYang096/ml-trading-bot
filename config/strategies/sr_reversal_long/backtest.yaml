backtest:
  enabled: true
  params:
    price_col: close
    long_entry_threshold: 0.2
    long_exit_threshold: 0.1
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
    freq: "4H"
    use_signal_direction: true   # SR Reversal：方向由 signal 决定
    use_rr_exit: true            # SR Reversal：平仓完全走 1R/2R 逻辑
    rr:
      max_holding_bars: 50       # 与 compute_sr_reversal_label 默认一致
      stop_loss_r: 1.0
      take_profit_r: 2.0
      atr_window: 14
      entry_offset: 1
      entry_price_col: open
    signal_col: signal           # 默认就是 signal，可改名
    debug: true