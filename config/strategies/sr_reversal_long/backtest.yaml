backtest:
  enabled: true
  params:
    price_col: close
    # Direction-fixed probability gating:
    # - sr_reversal_long is long_only => `pred` is P(success of a long trade)
    # - enter when pred is in the top quantile (dynamic threshold on test set preds)
    #   q90 = only take the top 10% most confident bars
    entry_quantile: 0.9
    # No-lookahead quantile threshold:
    # - expanding: threshold at time t is computed from predictions up to t-1
    # - rolling: use a rolling window up to t-1
    quantile_mode: expanding
    quantile_min_periods: 50
    # Entry mode:
    # - level: allow entry as long as pred >= threshold (useful when crossings are rare)
    # - cross: only on rising edge from <threshold to >=threshold
    entry_mode: level
    # Resolve entry/exit same-bar conflicts (common with level entries + RR exits)
    # - none: legacy behavior
    # - block_entry_on_exit: mask entries on exit bars so exits can take effect
    entry_exit_conflict: block_entry_on_exit
    # Note: time-based exits are disabled (see rr.use_time_exit=false). This field is kept for compatibility.
    max_holding_bars: 50
    force_close_on_end: true
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
    freq: "4H"
    # Keep RR exits ON (primary exit mechanism)
    use_rr_exit: true
    rr:
      max_holding_bars: 50       # 标签侧可用；回测侧已禁用 time-exit（use_time_exit=false）
      stop_loss_r: 1.0
      take_profit_r: 2.0
      atr_window: 14
      entry_offset: 1
      entry_price_col: open
      use_breakeven_stop: false  # 与回归一致：breakeven 往往会截断赢家并被费用/滑点吃掉
      # Backtest exits: RR + trailing stop (no time-exit)
      use_time_exit: false
      use_trailing_stop: true
      trailing_atr_mult: 1.0
    # Optional safety fuse: when too far from SR (normalized by ATR), do not trade.
    sr_fuse:
      enabled: true
      dist_col: dist_to_nearest_sr
      atr_col: atr
      max_dist_atr: 3.0
      dist_is_pct: true
      on_missing: skip   # skip|block
    debug: true