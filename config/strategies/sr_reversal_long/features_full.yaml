name: sr_reversal
description: 'SR reversal strategy feature pipeline. Focuses on SR strength, liquidity
  confirmation, and volatility state using WPT/VPRR/Hilbert derived signals.

  '
feature_pipeline:
  requested_features:
  - sr_strength_max_f
  - sqs_hal_high_f
  - sqs_hal_low_f
  - rsi_f
  - wpt_price_reconstructed_f
  - wpt_price_fluctuation_f
  - wpt_cvd_fluctuation_f
  - hilbert_advanced_f
  - hurst_price_rolling
  - hurst_cvd_rolling
  - cvd_slope_5_f
  - atr_ratio_f
  - tbr_ma_5_f
  - tbr_spike_f
  ensure_signal_column:
    name: signal
    default_value: 0
  notes: '1. 强调 WPT 低频 POC 与 SR 结构

    2. 结合 Hilbert + CVD 做流动性确认

    3. 通过 ZigZag/SQS/VPVR 建立 SR 反转上下文

    '


