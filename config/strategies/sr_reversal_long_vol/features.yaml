name: sr_reversal_long
description: 'SR reversal strategy feature pipeline (baseline / minimal).

  This file is intentionally kept small for ablation/baseline runs.
  The previous richer feature set has been preserved in features_full.yaml.
  '
feature_pipeline:
  requested_features:
  # Baseline-only feature set (keep this list strictly in baseline_features.py)
  - atr_f
  - rsi_f
  - macd_f
  - bbands_f
  - bb_width_f
  - roc_5_f
  - acceleration_3_f
  - trend_r2_20_f
  - trend_r2_50_f
  - atr_percentile_f
  - range_ratio_5bar_f
  - price_range_symmetry_f
  - wick_ratios_f
  - volume_anomaly_f
  # SR structure (baseline compute funcs; may pull dependencies like POC/HAL)
  - poc_hal_features_close_f
  - sqs_hal_high_f
  - sqs_hal_low_f
  - sr_strength_max_close_f
  ensure_signal_column:
    name: signal
    default_value: 0
  notes: 'Baseline set:

    - Baseline-only: indicators + simple structure features (no WPT/Hilbert/DTW/VPIN/etc in requested_features)
    - Use this as the baseline for ablation / sanity checks

    Tip: use features_full.yaml when you want the richer WPT/Hilbert/Hurst set.
    '
