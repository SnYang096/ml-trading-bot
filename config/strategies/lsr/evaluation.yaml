# LSR (LiquiditySweepRejection) 策略评估配置
name: lsr

evaluation:
  metrics:
    # 基础性能
    - sharpe_ratio
    - sortino_ratio
    - max_drawdown
    - win_rate
    - profit_factor
    - expectancy
    
    # RR 相关
    - mean_rr
    - rr_hit_rate
    - risk_adjusted_return
    
    # 稳定性
    - monthly_consistency
    - regime_stability
  
  thresholds:
    min_sharpe: 0.5
    max_drawdown: 0.2
    min_win_rate: 0.35
    min_profit_factor: 1.2

  # Outcome-Based 审计指标
  outcome_audit:
    delta_rr_threshold: -0.2
    time_robustness:
      enabled: true
      test_periods: [2019, 2020, 2021, 2022, 2023]
      min_consistent_periods: 3
    perturbation_robustness:
      enabled: true
      perturbation_pct: 0.05
      max_auc_drop: 0.1

reporting:
  output_dir: reports/strategies/lsr
  generate_plots: true
  plot_types:
    - equity_curve
    - drawdown
    - monthly_returns
    - rr_distribution
    - feature_importance
