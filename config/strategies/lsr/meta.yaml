# LSR (LiquiditySweepRejection) 策略元信息
name: lsr
display_name: "Liquidity Sweep Rejection"
version: "1.0.0"
archetype: LSR

description: |
  流动性扫损后拒绝反向策略。
  当价格扫过关键位置（猎杀止损）后被拒绝，反向入场。

market_hypothesis: |
  流动性扫损后拒绝意味着:
  1. 止损盘已被清扫（流动性被吸收）
  2. 大资金在此位置反向入场
  3. 价格将向相反方向运动

entry_logic: |
  1. 检测 sweep：wick 扫过前高/前低
  2. 检测 rejection：收盘反向（未停留在 sweep 区域）
  3. 反向入场：sweep_high → 做空，sweep_low → 做多

exit_logic: |
  基于 ATR 的固定止损止盈：
  - 止损：1.0 ATR
  - 止盈：2.0 ATR

label_type: outcome_based
label_meta:
  rr_type: path_extreme
  horizon: 50 bars
  exit_model: fixed_rr_atr
  risk_unit: ATR

tags:
  - mean_reversion
  - liquidity_sweep
  - rejection
  - stop_hunt
  - counter_trend
