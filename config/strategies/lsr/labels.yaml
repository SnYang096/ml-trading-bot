# LSR (LiquiditySweepRejection) 策略标签配置
# 语义：流动性扫损后 rejection 反向入场

name: lsr
target_column: rr_label

label_generator:
  module: src.time_series_model.strategies.labels.lsr_label
  function: compute_lsr_label
  params:
    price_col: close
    max_holding_bars: 50
    take_profit_r: 2.0
    stop_loss_r: 1.0
    # Sweep 检测参数
    sweep_lookback: 20
    sweep_atr_mult: 0.3
    combine_mode: long_only

filters:
  - column: rr_label
    notna: true

post_label_filters: []
