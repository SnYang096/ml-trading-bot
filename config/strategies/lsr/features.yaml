# LSR (LiquiditySweepRejection) 策略特征配置
name: lsr
description: |
  LiquiditySweepRejection archetype: 流动性扫损后 rejection 反向入场。
  核心：扫损检测 + rejection 确认 + 反向入场。

feature_pipeline:
  exclude_columns:
    - atr
  requested_features:
    # ----- SR / 流动性位置 -----
    - sr_strength_max_f
    - dist_to_nearest_sr_f
    - sr_zone_position_f
    # ----- Rejection 特征 -----
    - shd_pct_f  # 影线深度，核心 rejection 信号
    - bar_range_to_atr_f
    - wick_ratio_f
    # ----- 波动 -----
    - atr_percentile_f
    - bb_width_normalized_pct_f
    - atr_f
    # ----- 成交量 -----
    - volume_ratio_pct_f
    - vpin_features_f
    - ofci_pct_f
    # ----- 动量 -----
    - macd_f
    - rsi_f
    # ----- 趋势 -----
    - trend_r2_20_f
    - path_efficiency_pct_f
    - price_dir_consistency_pct_f
    # ----- 高级 -----
    - hurst_price_f
  ensure_signal_column:
    name: signal
    default_value: 0
