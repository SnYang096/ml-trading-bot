# LSR (LiquiditySweepRejection) 策略模型配置
name: lsr

model_type: xgboost
task_type: regression

hyperparameters:
  n_estimators: 300
  max_depth: 5
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 5
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1

training:
  early_stopping_rounds: 30
  eval_metric: rmse
  verbose: false

cross_validation:
  n_splits: 5
  method: time_series
  gap: 50

class_weight: null
