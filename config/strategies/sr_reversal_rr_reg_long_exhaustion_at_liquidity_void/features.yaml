name: sr_reversal_rr_reg_long_exhaustion_at_liquidity_void
description: "Composite semantic: exhaustion_at_liquidity_void + mainline features"
feature_pipeline:
  requested_features:
  # Mainline (kline + minimal SR-distance features)
  - macd_f
  - rsi_f
  - sma_200_f
  - atr_f
  - roc_5_f
  - mom_10_f
  - bbands_f
  - bb_width_f
  - trend_r2_20_f
  - trend_r2_50_f
  - acceleration_3_f
  - wick_ratios_f
  - price_range_symmetry_f
  - poc_hal_features_close_f
  - sqs_hal_high_f
  - sqs_hal_low_f
  - sr_strength_max_close_f
  # semantics ingredients (no raw trade_cluster block)
  - liquidity_void_f
  - trade_cluster_semantic_scores_f
  - exhaustion_at_liquidity_void_f
  ensure_signal_column:
    name: signal
    default_value: 0
notes: |
  Adds a single composite semantic score built from:
  - trade_cluster_exhaustion_score
  - liquidity_void_detected (+ optional false_breakout_risk)


