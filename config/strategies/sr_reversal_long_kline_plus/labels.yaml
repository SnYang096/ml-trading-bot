name: sr_reversal_long_kline_plus
target_column: label

label_generator:
  module: src.time_series_model.strategies.labels.sr_reversal_label
  function: compute_sr_reversal_label_full_scan
  params:
    max_holding_bars: 50
    take_profit_r: 2.0
    stop_loss_r: 1.0
    combine_mode: long_only

filters:
  - column: label
    notna: true

post_label_filters: []

notes: |
  Kline-only (+volume) feature ablation stage (no SR/orderflow/ticks).

