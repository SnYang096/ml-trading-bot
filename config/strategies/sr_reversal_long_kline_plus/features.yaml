name: sr_reversal_long_kline_plus
description: "Kline-only (+volume) features for staged ablation (no SR/ticks)"
feature_pipeline:
  requested_features:
    # core indicators
    - atr_f
    - rsi_f
    - macd_f
    - bbands_f
    - bb_width_f
    - roc_5_f
    - roc_20_f
    - mom_10_f
    - mom_14_f
    - sma_200_f
    # price action
    - wick_ratios_f
    - price_range_symmetry_f
    - acceleration_3_f
    - trend_r2_20_f
    - trend_r2_50_f
    # volume (still kline-derived)
    - volume_anomaly_f
  ensure_signal_column:
    name: signal
    default_value: 0

