backtest:
  enabled: true
  params:
    price_col: close
    long_entry_threshold: 0.6
    long_exit_threshold: 0.45
    short_entry_threshold: 0.4
    short_exit_threshold: 0.55
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
    freq: "4H"
    use_signal_direction: true   # SR Reversal 推荐开启
    signal_col: signal           # 默认就是 signal，可改名
    debug: true