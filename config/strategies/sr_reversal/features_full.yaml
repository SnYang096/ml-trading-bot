name: sr_reversal
description: >
  SR reversal strategy feature pipeline. Focuses on SR strength, liquidity
  confirmation, and volatility state using WPT/VPRR/Hilbert derived signals.

feature_pipeline:
  requested_features:
    - wpt_price_reconstructed
    - sr_strength_max
    - sqs_hal_high
    - sqs_hal_low
    - vpvr_pvp
    - vpvr_hvn_count
    - hilbert_phase
    # hilbert_cvd_leads: This feature is not defined in feature_dependencies.yaml
    # Use hilbert_cvd_env_slope or hilbert_cvd_price_env_ratio from hilbert_phase instead
    - wpt_cvd_fluctuation
    - atr
    - rsi
    - acceleration_3
    - macd
    # - dl_sequence_features
  # 注意：post_processors 和 selector 已移除，特征选择通过 YAML 中的精确特征定义完成
  # 所有特征通过统一的 feature_dependencies.yaml 加载，不需要策略特定的处理函数
  ensure_signal_column:
    name: signal
    default_value: 0
  notes: |
    1. 强调 WPT 低频 POC 与 SR 结构
    2. 结合 Hilbert + CVD 做流动性确认
    3. 通过 ZigZag/SQS/VPVR 建立 SR 反转上下文

