name: sr_reversal
description:
  "SR reversal strategy feature pipeline. Focuses on SR strength, liquidity
  confirmation, and volatility state using WPT/VPRR/Hilbert derived signals.

  "
feature_pipeline:
  requested_features:
    - wpt_price_reconstructed_f
    - sr_strength_max_f
    - sqs_hal_high_f
    - sqs_hal_low_f
    - hilbert_phase_f
    - wpt_cvd_fluctuation_f
    - liquidity_void_f
    - wpt_volume_energy_f
    - atr_f
    - rsi_f
    - acceleration_3_f
    - macd_f
  ensure_signal_column:
    name: signal
    default_value: 0
  notes: "1. 强调 WPT 低频 POC 与 SR 结构

    2. 结合 Hilbert + CVD 做流动性确认

    3. 通过 ZigZag/SQS/VPVR 建立 SR 反转上下文

    4. 新增流动性真空特征 (liquidity_void_f) - 包含 price_impact 指标

    5. 新增 WPT 量价能量特征 (wpt_volume_energy_f)

    "
