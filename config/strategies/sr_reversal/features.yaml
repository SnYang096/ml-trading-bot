name: sr_reversal
description: 'SR reversal strategy feature pipeline. Focuses on SR strength, liquidity
  confirmation, and volatility state using WPT/VPRR/Hilbert derived signals.

  '
feature_pipeline:
  requested_features:
  - sr_strength_max_f
  - sqs_hal_high_f
  - sqs_hal_low_f
  - rsi_f
  - wpt_price_reconstructed_f
  - wpt_price_fluctuation_f
  - wpt_cvd_fluctuation_f
  - hilbert_phase_f
  - hilbert_price_env
  - hilbert_cvd_env
  - hilbert_cvd_price_env_ratio
  - hilbert_volume_env
  - hilbert_env_price_vol_ratio
  - hilbert_triple_divergence
  - hilbert_price_env_qnorm
  - hilbert_cvd_env_qnorm
  - hurst_price_f
  - hurst_cvd_f
  - volume_profile_vpvr_f
  - garch_features_f
  - extended_volatility_features_f
  - spectrum_features_sr_reversal_f
  - dtw_features_reversal_f
  - evt_features_f
  - cvd_slope_5_f
  - atr_ratio_f
  - tbr_ma_5_f
  - tbr_spike_f
  ensure_signal_column:
    name: signal
    default_value: 0
  notes: '1. 强调 WPT 低频 POC 与 SR 结构

    2. 结合 Hilbert + CVD 做流动性确认

    3. 通过 ZigZag/SQS/VPVR 建立 SR 反转上下文

    '
