backtest:
  enabled: true
  params:
    price_col: close
    # For regression tasks (continuous RR prediction), use top quantile selection:
    # - Select top N% of predicted RR values as entry signals
    # - This is more adaptive than fixed thresholds and naturally adjusts to market conditions
    top_quantile: 0.1  # Top 10% of predicted RR values (more selective)
    # Entry mode:
    # - level: allow entry as long as pred >= quantile threshold (useful when crossings are rare)
    # - cross: only on rising edge from <threshold to >=threshold
    # Entry mode:
    # - level: 只要 pred >= 分位阈值 就持续为 True（容易重复“追涨式”连续入场信号）
    # - cross: 仅在 pred 从 <阈值 上穿到 >=阈值 的那一根产生入场（减少重复入场）
    entry_mode: cross
    # Resolve entry/exit same-bar conflicts (common with level entries + RR exits)
    # - none: legacy behavior
    # - block_entry_on_exit: mask entries on exit bars so exits can take effect
    entry_exit_conflict: block_entry_on_exit
    max_holding_bars: 50
    force_close_on_end: true
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
    freq: "4H"
    # Keep RR exits ON (primary exit mechanism)
    use_rr_exit: true
    rr:
      max_holding_bars: 50       # 与 compute_sr_reversal_label 默认一致
      stop_loss_r: 1.0
      take_profit_r: 2.0
      atr_window: 14
      entry_offset: 1
      entry_price_col: open
    # Optional safety fuse: when too far from SR (normalized by ATR), do not trade.
    # SR fuse：回测端的“安全阀”，限制离 SR 太远不允许入场。
    # 这里要与标签的 SR 过滤保持一致：labels.yaml 中 dist_atr_mult=1.5
    sr_fuse:
      enabled: true
      dist_col: dist_to_nearest_sr
      atr_col: atr
      max_dist_atr: 1.5
      on_missing: skip   # skip|block
    debug: true