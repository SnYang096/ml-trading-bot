name: sr_reversal_rr_reg_long_sr_filter
target_column: rr_label

# 回归（无权重，SR过滤）
label_generator:
  module: src.time_series_model.strategies.labels.sr_reversal_label
  function: compute_sr_reversal_rr_continuous_label_with_weights
  params:
    max_holding_bars: 50
    take_profit_r: 2.0
    stop_loss_r: 1.0
    combine_mode: long_only
    # 使用 dist_to_sr_col（推荐，无需额外特征计算）
    dist_to_sr_col: dist_to_nearest_sr
    dist_atr_mult: 1.5
    # 不使用样本权重
    compute_weights: false

filters:
  - column: rr_label
    notna: true

post_label_filters:
  []

notes: |
  连续 R/R 标签（MFE/MAE 比例），仅 SR 附近保留，其他置 NaN。
  
  与 sr_reversal_rr_reg_long 的区别：
  - 添加了 SR 过滤（只在 SR 附近保留标签）
  - 不使用样本权重（所有样本权重 = 1.0）

