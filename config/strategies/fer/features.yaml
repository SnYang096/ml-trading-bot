# FER (FailureExhaustionReversal) 策略特征配置
# 语义：单边博弈失败→反向清算
# V2: 加入 FER 专属因果特征

name: fer
description: |
  FailureExhaustionReversal archetype: 单边博弈失败→反向清算。
  核心：识别单边impulse推进失败后的反向清算机会。

feature_pipeline:
  exclude_columns:
    - atr
  requested_features:
    # ===== FER 专属特征 (核心) =====
    - fer_failure_signals_f

    # ----- 核心：反转/衰竭相关 -----
    - exhaustion_score_f
    - path_efficiency_pct_f
    - atr_percentile_f

    # ----- 订单流 -----
    - vpin_features_f
    - volume_ratio_pct_f
    - volume_imbalance_f
    - cvd_change_features_f

    # ----- 价格动量 -----
    - rsi_f
    - macd_atr_f

    # ----- 波动率 -----
    - atr_f
    - bb_width_normalized_pct_f
    - volatility_regime_f

    # ----- 趋势/方向 -----
    - trend_strength_f
    - trend_r2_20_f

    # ----- 支撑阻力 (sr_strength_max_f 移除: 计算太慢, 非FER核心) -----

    # ----- 多周期 -----
    - sma_200_f

    # ----- 辅助特征 -----
    - jump_risk_pct_f
    - shd_pct_f
    - ofci_pct_f
    - path_length_pct_f
    - price_dir_consistency_pct_f

  ensure_signal_column:
    name: signal
    default_value: 0
