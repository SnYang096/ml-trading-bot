rules:
  - feature: sr_strength_max
    operator: ">="
    value: 0.55
    rationale: "heuristic: 要求触发位具备足够SR强度，避免弱结构噪声反转"
    locked: true
    lock_reason: A组基线：SR强度约束
  - feature: dist_to_nearest_sr
    operator: ">="
    value: -1.2
    rationale: "heuristic: 距最近SR不超过1.2ATR（下界），限制远离关键位追单"
    locked: true
    lock_reason: A组基线：SR邻域约束
  - feature: dist_to_nearest_sr
    operator: <=
    value: 1.2
    rationale: "heuristic: 距最近SR不超过1.2ATR（上界），限制远离关键位追单"
    locked: true
    lock_reason: A组基线：SR邻域约束
