# FER Gate (optimized, auto-promoted)
# 来源: config/strategies/fer/gate_draft.yaml
# 优化规则: 1/10 条通过优化, 9 条已移除
# ✅ 方向已由数据验证: shd_pct 低值收益更高 (6.13 vs 4.17), deny 高值

schema:
  phases:
  - system_safety
  - hard_gate
  - guardrail
  evaluation_order: system_safety -> hard_gate -> guardrail
  governance:
    failure_budget:
      max_hard_deny_rate: 0.5
      alert_threshold: 0.45
hard_gates:
- id: gate_shd_pct
  tag: HARD_SHD_PCT
  phase: hard_gate
  priority: 11
  reason: shd_pct 触发树分裂条件 (分裂 1 次)
  when:
    shd_pct:
      value_gt: 0.25
  then:
    action: deny
  comment: 'optimizer: stable_plateau_found, threshold=0.2500 | 方向修正: deny high (data_verified)'
guardrails: []
