# FER Gate Archetype
# 训练后需根据 optimize_gate_unified.py 结果填充
# 职责：硬veto，过滤"假反转"（单边尚未失败）

schema:
  phases:
    - hard_gate      # 硬门禁：识别假反转
    - guardrail      # 护栏：极端风险

# ==============================================================
# 🚫 HARD GATE: 使用模型预测（Lift=0.94x）
# ==============================================================
# 由于FER的RR extreme本质是"路径性失败"（因果链在未来），
# 无法找到sharp cut的硬规则，因此使用Gate模型的概率预测
#
# 策略：使用Top 30% (p70) 作为阈值
# - Lift = 0.94x (降低6%失败率)
# - 覆盖率 = 29.9%
# - 失败率: 43.2% (vs baseline 46.1%)

hard_gate:
  - id: gate_model_filter
    tag: GATE_MODEL
    phase: hard_gate
    priority: 0
    reason: "[GATE] Gate模型预测失败概率过高"
    when:
      gate_pred:  # 使用Gate模型预测
        value_gt: 0.70  # Top 30% 阈值（p70分位数）
    then:
      action: deny
    model_info:
      model_path: results/train_final_20260216_182917_rr_extreme/fer/model.pkl
      preprocessor_path: results/train_final_20260216_182917_rr_extreme/fer/preprocessor.pkl
      lift: 0.94
      coverage: 0.299
      threshold_percentile: 70

# ==============================================================
# 🛡️ GUARDRAIL: 极端风险护栏
# ==============================================================
# 补充规则：过滤极端市场环境

guardrail:
  # 波动率过高时不做反转
  - id: guardrail_extreme_volatility
    tag: GUARDRAIL_VOLATILITY
    phase: guardrail
    priority: 0
    reason: "[GUARDRAIL] 极端波动环境不适合反转"
    when:
      volatility_regime:
        value_gt: 2.5  # 波动率regime > 2.5
    then:
      action: deny
  
  # 流动性过低时不做反转
  - id: guardrail_low_liquidity
    tag: GUARDRAIL_LIQUIDITY
    phase: guardrail
    priority: 1
    reason: "[GUARDRAIL] 流动性过低"
    when:
      bid_ask_spread_ratio:
        value_gt: 0.05  # bid-ask spread > 5%
    then:
      action: deny
