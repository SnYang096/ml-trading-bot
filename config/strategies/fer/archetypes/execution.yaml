version: 34
execution_constraints:
  allow_add_on: false
  min_order_interval_minutes: 15
stop_loss:
  type: trailing
  initial_r: 4.0
  trailing:
    activation_r: 0.5
    trail_r: 0.5
    step_r: 0.5
take_profit:
  enabled: true
  target_r: 3.0
holding:
  max_holding_bars: null
  time_stop_bars: 40
optimization:
  enabled: true
  params:
    stop_loss.initial_r:
      range:
      - 1.0
      - 4.0
      step: 0.5
    stop_loss.trailing.activation_r:
      range:
      - 0.5
      - 5.0
      step: 0.5
    stop_loss.trailing.trail_r:
      range:
      - 0.5
      - 3.0
      step: 0.5
