# FER Execution 配置
# 版本: 33
# 更新时间: 2026-03-01
#
# ┌─────────────────────────────────────────────────────────┐
# │  Grid Search auto-promoted                              │
# │  NOTE: previous initial_r=1.0 was compensating for      │
# │  evidence direction bug. Reverted to safe defaults.     │
# │  Re-run grid search after evidence fix to get optimal.  │
# └─────────────────────────────────────────────────────────┘
