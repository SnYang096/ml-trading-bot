# FER Entry Filter 候选配置 (研究文件)
# 入场时机过滤器 — 控制"反转信号是否可信？"
#
# 文件定位:
#   config/strategies/fer/entry_filters.yaml       ← 研究候选 (本文件, 含 disabled)
#   config/strategies/fer/archetypes/entry_filters.yaml ← 生产文件 (optimize 后 promote)
#
# 职责定位:
#   Prefilter:    "环境是否有人被套?"     → 训练前过滤
#   Gate:         "这笔交易能做吗?"       → 硬二值过滤坏交易
#   Entry Filter: "现在该入场做反转吗?"   → 硬二值控制入场时机
#   Evidence:     "入场后下多少注?"       → 软连续值调整执行参数
#
# FER 语义: 单边推进失败 → 力竭 → 反转入场
# Entry Filter 应确认以下条件之一:
#   A. 推进已到极端 (RSI/BB 超买超卖)
#   B. 力竭信号出现 (影线/小波/CVD 背离)
#   C. 有足够波动空间给反转利润
#   D. 成交量确认反转 (放量/吸收)
#
# 设计原则:
#   1. 每个 filter 是一组 AND 条件
#   2. enabled: true/false 控制是否参与评估
#   3. 多个 enabled=true 的 filter 之间是 OR 关系
#   4. 阈值待 optimize_entry_filter_plateau.py 扫描优化
#
# 评估方法:
#   # snotio 全扫描排名
#   python scripts/optimize_entry_filter_snotio.py --all \
#     --logs ${RESULT_DIR}/predictions.parquet --strategy fer
#
#   # plateau 稳定性验证
#   python scripts/optimize_entry_filter_plateau.py \
#     --logs ${RESULT_DIR}/predictions.parquet --strategy fer --research

# ============================================================
# ✅ 已启用 (snotio > baseline, 待 plateau + promote 分级)
# ============================================================
filters:

  # ----------------------------------------------------------------
  # A1. RSI 超买 → 空头反转时机
  # snotio #2: snotio=1.47, Loss=29.9%, Win=70.1%, Trades=678
  # ----------------------------------------------------------------
  - id: rsi_overbought
    enabled: true
    description: "RSI 超买: 多头推进过度，空头反转机会"
    conditions:
      - feature: rsi
        operator: ">="
        value: 47
      - feature: price_position
        operator: ">="
        value: 0.70
    notes: "snotio #2, trades=678"

  # ----------------------------------------------------------------
  # B1. 影线力竞exhaustion — 反转 K 线形态确认
  # snotio #5: snotio=1.34, Trades=107
  # ----------------------------------------------------------------
  - id: wick_exhaustion
    enabled: true
    description: "影线力竭: 大影线 K 线确认推进受阻"
    conditions:
      - feature: wick_exhaustion_score
        operator: ">="
        value: 0.5
    notes: "snotio #5, trades=107"

  # ----------------------------------------------------------------
  # B4. 动量力竭 — MACD/ROC 确认动量衰减
  # snotio #4: snotio=1.39, Trades=103
  # ----------------------------------------------------------------
  - id: momentum_exhaustion
    enabled: true
    description: "动量力竭: 价格推进但动量衰减"
    conditions:
      - feature: momentum_exhaustion_score
        operator: ">="
        value: 0.5
    notes: "snotio #4, trades=103"

  # ----------------------------------------------------------------
  # E3. 影线占比低 — 实体 K 线确认方向
  # snotio #3: snotio=1.40, Trades=158
  # ----------------------------------------------------------------
  - id: shd_reversal_candle
    enabled: true
    description: "低影线实体 K 线: 方向明确的反转动作"
    conditions:
      - feature: shd_pct
        operator: "<="
        value: 0.15
    notes: "snotio #3, trades=158"

  # ----------------------------------------------------------------
  # E1. FER 吸收信号 — aggressor 被吸收
  # snotio #1: snotio=2.22, Trades=23 (样本少但信号极强)
  # ----------------------------------------------------------------
  - id: fer_absorption
    enabled: true
    description: "FER 吸收: 激进方被对手方吸收"
    conditions:
      - feature: fer_aggressor_absorption
        operator: ">="
        value: 0.5
    notes: "snotio #1, trades=23, 样本少但信号极强"

  # ----------------------------------------------------------------
  # F1. RSI 超买 + 力竭组合
  # snotio #6: snotio=1.33, Trades=156
  # ----------------------------------------------------------------
  - id: rsi_plus_exhaustion
    enabled: true
    description: "RSI 超买 + 力竭双重确认"
    conditions:
      - feature: rsi
        operator: ">="
        value: 55
      - feature: wick_exhaustion_score
        operator: ">="
        value: 0.3
    notes: "snotio #6, trades=156"

  # ----------------------------------------------------------------
  # A2. RSI 超卖 → 多头反转时机
  # snotio: 仅 3 笔 (样本不足), 需更多数据验证
  # 语义: RSI 超卖 + BB 下轨 → 空头推进过度，多头反转概率高
  # ----------------------------------------------------------------
  - id: rsi_oversold
    enabled: false
    description: "RSI 超卖: 空头推进过度，多头反转机会"
    conditions:
      - feature: rsi
        operator: "<="
        value: 27
      - feature: price_position
        operator: "<="
        value: 0.30
    notes: "样本不足, 待更多数据验证"

# ============================================================
# 🔬 待验证候选 (disabled, 供 --all 扫描)
# ============================================================
disabled_filters:

  # ----------------------------------------------------------------
  # B2. 小波力竭 — 多尺度价格结构衰竭
  # 语义: WPT 力竭信号 → 趋势在多个时间尺度同时衰竭
  # ----------------------------------------------------------------
  - id: wpt_exhaustion
    enabled: false
    description: "小波力竭: 多尺度趋势衰竭信号"
    conditions:
      - feature: wpt_exhaustion_score
        operator: ">="
        value: 0.5
    notes: "候选: wpt_exhaustion_score = 多尺度力竭"

  # ----------------------------------------------------------------
  # B3. 成交量分布力竭 — Volume Profile 确认推进终结
  # 语义: VP 力竭 → 成交量分布显示推进动力耗尽
  # ----------------------------------------------------------------
  - id: vp_exhaustion
    enabled: false
    description: "成交量分布力竭: VP 确认推进动力耗尽"
    conditions:
      - feature: vp_exhaustion_score
        operator: ">="
        value: 0.5
    notes: "候选: vp_exhaustion_score"

  # ----------------------------------------------------------------
  # B5. 双源力竭 — Funding + VPIN 双重力竭 (FER 核心交叉特征)
  # 语义: 资金费率 + VPIN 同时显示力竭 → 强反转信号
  # ----------------------------------------------------------------
  - id: dual_exhaustion
    enabled: false
    description: "双源力竭: Funding+VPIN 同时力竭"
    conditions:
      - feature: dual_exhaustion_score
        operator: ">="
        value: 0.5
    notes: "候选: FER 核心交叉特征 dual_exhaustion_score"

  # ----------------------------------------------------------------
  # C1. CVD 背离 — 订单流与价格背离
  # 语义: 价格新高但 CVD 未跟 → 买方力竭，空头反转
  # ----------------------------------------------------------------
  - id: cvd_divergence
    enabled: false
    description: "CVD 背离: 价格与订单流方向背离"
    conditions:
      - feature: cvd_divergence_score
        operator: ">="
        value: 0.5
    notes: "候选: cvd_divergence_score 高值 = 价格-CVD 背离"

  # ----------------------------------------------------------------
  # C2. 价格-动量背离
  # 语义: 价格创新高/低但动量(MACD)未跟 → 趋势衰竭
  # ----------------------------------------------------------------
  - id: price_momentum_divergence
    enabled: false
    description: "价格-动量背离: 价格与 MACD 背离"
    conditions:
      - feature: price_momentum_div_score
        operator: ">="
        value: 0.5
    notes: "候选: price_momentum_div_score"

  # ----------------------------------------------------------------
  # D1. 波动扩张 — 有足够空间给反转利润
  # snotio #2: snotio=1.20, Loss=36.6%, Trades=1111
  # 语义: BB 宽度大 + ATR 高 → 市场有空间做反转
  # ----------------------------------------------------------------
  - id: volatility_expansion
    enabled: false
    description: "波动率扩张: 有足够空间给反转获利"
    conditions:
      - feature: bb_width_normalized_pct
        operator: ">="
        value: 0.50
      - feature: atr_percentile
        operator: ">="
        value: 0.30
    notes: "snotio #2, 微弱改善"

  # ----------------------------------------------------------------
  # D2. 放量确认 — 成交量支撑反转
  # snotio ≈ baseline (无效果)
  # 语义: 反转需要成交量确认，缩量反转不可靠
  # ----------------------------------------------------------------
  - id: volume_confirm
    enabled: false
    description: "放量确认: 反转在接近均量环境"
    conditions:
      - feature: volume_ratio_pct
        operator: ">="
        value: 0.40
    notes: "snotio ≈ baseline, 单独无效"

  # ----------------------------------------------------------------
  # E2. FER 效率翻转 — 推进效率下降
  # 语义: fer_efficiency_flip > 0 → 推进效率从正转负
  # ----------------------------------------------------------------
  - id: fer_efficiency_flip
    enabled: false
    description: "FER 效率翻转: 推进效率从正转负"
    conditions:
      - feature: fer_efficiency_flip
        operator: ">="
        value: 0.5
    notes: "候选: fer_efficiency_flip 高值 = 明确效率翻转"

  # ----------------------------------------------------------------
  # F2. 背离 + 力竭组合
  # 语义: CVD 背离 + 动量力竭 → 双重确认
  # ----------------------------------------------------------------
  - id: divergence_plus_exhaustion
    enabled: false
    description: "CVD 背离 + 动量力竭双重确认"
    conditions:
      - feature: cvd_divergence_score
        operator: ">="
        value: 0.3
      - feature: momentum_exhaustion_score
        operator: ">="
        value: 0.3
    notes: "候选: 组合 C+B 确认"

combination_mode: or
