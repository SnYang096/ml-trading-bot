# FER 语义预筛选候选特征
# 职责: 声明待验证的 pre-filter 候选特征 (Step 2 分位数分层分析的输入)
# 脚本通过 feature_dependencies.yaml 的 output_columns 解析出实际列名
#
# 用法:
#   python scripts/analyze_archetype_feature_stratification.py \
#       --logs results/train_final_xxx/fer/predictions.parquet \
#       --strategy fer \
#       --config config/strategies/fer/prefilter.yaml

description: "FER 语义预筛选候选特征 — 单边博弈失败/反转信号"

candidates:
  # ========== FER 核心: 因果失败信号 ==========
  # → fer_signed_efficiency, fer_signed_efficiency_pct, fer_efficiency_flip,
  #   fer_efficiency_flip_strength, fer_aggressor_absorption, fer_absorption_streak,
  #   fer_trapped_longs_score, fer_trapped_shorts_score, fer_impulse_failure_score,
  #   fer_impulse_failure_direction, fer_momentum_efficiency_decay,
  #   fer_volume_price_divergence
  - fer_failure_signals_f

  # ========== 波动 / 风险 ==========
  # → vol_zscore, vol_percentile_approx
  - vol_regime_features_f
  # → atr_percentile
  - atr_percentile_f
  # → vol_slope_5, vol_slope_10, vol_slope_20, vol_accel
  - vol_trend_features_f

  # ========== 趋势位置 ==========
  # → sma_200_position (全扫描最强单信号 -12.5%)
  - sma_200_position_f
  # → roc_20
  - roc_20_f
  # → path_length_pct
  - path_length_pct_f

  # ========== 动量 / 技术指标 ==========
  # → macd_atr, macd_signal_atr
  - macd_atr_f
  # → rsi
  - rsi_f

  # ========== 订单流 ==========
  # → vpin, vpin_signed_imbalance, ...
  - vpin_features_f
  # → cvd_change_5_normalized, ...
  - cvd_change_features_f

  # ========== 支撑阻力 ==========
  # → sr_strength_max, dist_to_nearest_sr
  - sr_strength_max_f

  # ========== OI 场景语义 ==========
  # → oi_compression_score, oi_ignition_score, ...
  - oi_scene_semantic_scores_f

  # ========== 数学特征 (全扫描验证有效) ==========
  # → evt_var_99, evt_es_99, evt_scale_right, ...
  - evt_features_f
  # → hilbert_price_env, hilbert_cvd_price_env_ratio, ...
  - hilbert_phase_f
  # → spectrum_volume_high_freq_ratio, spectrum_volume_centroid, ...
  - spectrum_volume_features_f

