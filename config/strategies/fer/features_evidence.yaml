# FER Evidence 训练特征配置
# 目标：在 GOOD 样本中区分高 RR 和低 RR
# V2: 加入 FER 专属因果特征 + 扩展特征

feature_pipeline:
  requested_features:
    # ===== FER 专属因果特征 (核心) =====
    - fer_failure_signals_f

    # ===== 包含 Gate 所有特征 =====
    - exhaustion_score_f
    - path_efficiency_pct_f
    - atr_percentile_f
    - vpin_features_f
    - cvd_change_features_f
    - volume_imbalance_f
    - rsi_f
    - macd_atr_f
    - atr_f
    - bb_width_normalized_pct_f
    - volatility_regime_f
    - trend_strength_f
    - trend_r2_20_f
    # sr_strength_max_f 移除: 计算太慢, 非FER核心
    - ofci_pct_f
    - price_dir_consistency_pct_f

    # ===== Evidence 扩展特征 =====
    - volume_ratio_pct_f
    - bb_position_pct_f
    # liquidity_void_f 移除: 依赖sr, 计算太慢
    - jump_risk_pct_f
    - shd_pct_f
    - path_length_pct_f
    - sma_200_f

  scaling_method: robust
  handle_nan: median_fill
  clip_outliers: 5.0
