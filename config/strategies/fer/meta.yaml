# FER (FailureExhaustionReversal) 策略元信息

strategy:
  name: fer
  description: |
    FailureExhaustionReversal archetype: 单边博弈失败→反向清算。
    识别单边impulse推进失败后的反向清算机会。
    核心：钱还在冲，但价格不再配合。
  tags:
    - reversal
    - exhaustion
    - failure
    - trapped
    - liquidation
  owner: quant_team
  archetype: FailureExhaustionReversal

  # 默认时间粒度（研发 + 实盘统一）
  timeframe: "240T"  # 4小时，与 BPC 保持一致

  # PCM仲裁优先级
  pcm_priority: 0  # 最高优先级（条件最严格）

