# FER-Long (FailureExhaustionReversal Long) 策略元信息

strategy:
  name: fer-long-120T
  description: |
    FailureExhaustionReversal Long archetype: 单边博弈失败→反向清算（做多方向）。
    识别多头impulse推进失败后的做空反转清算机会。
    核心：多头还在冲，但价格不再配合。

  owner: quant_team
  archetype: FailureExhaustionReversalLong

  # 默认时间粒度（研发 + 实盘统一）
  timeframe: "120T" # 1小时

  # 跨 bar 对齐（先仅放宽 prefilter，direction/gate/entry 仍要求同 bar）
  decision_alignment:
    enabled: true
    mode: prefilter_recent_window
    window_bars: 3
    layers_allow_recent_window: [prefilter]
    layers_required_same_bar: [direction, gate, entry_filter]

  macro_tp_vwap_anchor:
    enabled: false
    symbol: BTCUSDT
