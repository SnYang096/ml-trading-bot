# ============================================================
# 上线前训练流水线 (2H only, TPC-only)
# 基于 prod_train_pipeline_2h_turbo_2024bull_thresholds_only_bpc_only
# 仅保留 tpc-short-120T / tpc-long-120T
# ============================================================

dates:
  start_date: "2022-08-01"
  end_date: "2026-03-31"
  holdout_months: 26
  validation_months: 3

global_toggles:
  locked_threshold_tuning_enabled: true
rolling:
  mode: turbo_fixed_features
  windows:
    calibration_months: 6
    structure_lookback_months: 12
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    disable_feature_search: true

fast_loop:
  disable_model_training: true
  step_months: 1
  threshold_calibration:
    enabled: true
  prefilter:
    optimize: true
  symbol_threshold_calibration:
    enabled: true
  execution_opt:
    enabled: true
  pcm_eval:
    enabled: false
  direction_tuning:
    enabled: true
    compare_features: false
    promote_after_validate: false

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap
data_path: data/parquet_data
download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data
strategies:
  tpc:
    config: config/strategies/tpc
    timeframe: 120T
    prepare_features: features.yaml
    labels_gate: labels_rr_extreme.yaml
    has_prefilter: true
    has_direction: true
    kpi_gates:
      prefilter:
        min_pass_rate: 0.05
        min_rows: 10
        target_trades_min: 10
        target_trades_max: 50
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        enforce_locked_rules_in_experiment: true
        locked_rules_source: production_prefilter
        locked_threshold_tuning:
          enabled: false
          mode: auto_if_locked
          skip_if_cached: false
          max_cases: 12
          min_trades_target: 60
          trade_penalty: 0.0025
          target_trades_min: 10
          target_trades_max: 50
          trade_penalty_low: 0.002
          trade_penalty_high: 0.0011
          stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
      entry_filter:
        meta_algorithm: true
        archetype_plateau: true
        significance_p: 0.10
        significance_min_trades: 4
        plateau_window: 4
        archetype_scoring_method: distribution_ks
        target_trades_min: 10
        target_trades_max: 50
        trade_penalty_low: 0.002
        trade_penalty_high: 0.0011
        stability_penalty: 0.0
        scoring_method_fallbacks:
          - distribution_ks
          - mean_effect
        min_score_improvement: 0.005
      gate:
        require_positive_effect: true
        # 与 prod_train_pipeline_2h_slow_tpc_only 对齐：chop 月 combined allow 很低时仍保留硬门，
        # 避免 min_combined_pass_rate=0.3 把 semantic_chop 等裁掉后横盘开仓暴增。
        min_combined_pass_rate: 0.05
        # optimize_gate_unified 默认 max_hard_gates=2；放宽到 4 以容纳更多 hard_gate（仍低于 slow 的 7）。
        max_hard_gates: 4
        max_system_safety: 2
        # 与 slow 一致：gate 阶段不强推成交量 KPI，敢在整月 chop 时把该月压到接近 0 trade。
        target_trades_min: 0
        trade_penalty_low: 0.0
        trade_penalty_high: 0.0
        stability_penalty: 0.0
      backtest:
        min_trades: 50
      deploy:
        min_trades: 50

event_backtest:
  enabled: true
  map_extra_months: 4
  # 趋势族统一宽执行档：与 ME 对齐；更宽止损由 sizing 自动降低仓位。
  exec_grid_by_family:
    tpc:
      initial_r: "4.0:0.5:7.0"
      activation_r: "3.5:0.5:6.0"
      trail_r: "6.0:1.0:15.0"
  exec_objective_default: total_r_over_dd
  exec_objective_params:
    near_stop_threshold_r: -0.9
    near_stop_penalty: 5.0
    max_dd_penalty: 0.15
    min_trades_soft: 0
    undertrade_penalty: 0.0

output:
  history_dir: results/tpc/turbo-rolling-sim
