# =============================================================================
# TPC · non_rolling — 目的与节奏
# -----------------------------------------------------------------------------
# 目的
#   - 非滚动、静态 holdout；整段样本全周期研究（典型 ``--stage full``）。
# 执行注意
#   - extends slow：与 slow 相同 entry meta、SHAP、阈值 optimize；仅 rolling / output 独立。
# -----------------------------------------------------------------------------
# 覆写 dates / rolling / output；其余与同目录 slow.yaml 一致。

extends: slow.yaml

dates:
  validation_months: 3

rolling:
  mode: non_rolling
  time_split_policy: static_holdout

output:
  history_dir: results/tpc/non-rolling-sim
