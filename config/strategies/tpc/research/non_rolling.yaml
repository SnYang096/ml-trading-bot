# =============================================================================
# TPC · non_rolling — 目的与节奏
# -----------------------------------------------------------------------------
# 目的
#   - 非滚动、静态 holdout；整段样本全周期研究（典型 ``--stage full``）。
# 执行注意
#   - extends slow：与 slow 相同 entry meta、SHAP、阈值 optimize；仅 rolling / output 独立。
# -----------------------------------------------------------------------------
# 覆写 dates / rolling / output；其余与同目录 slow.yaml 一致。
# 全周期 run 的 report.json 含 comparison / deploy_gate。

extends: slow.yaml

dates:
  validation_months: 3

rolling:
  mode: non_rolling
  time_split_policy: static_holdout

# 单次全周期结束后的 compare_runs vs 上期 history（rolling 快照不在此语义下使用）。
comparison:
  min_trades: 30
  sharpe_adopt_ratio: 0.7
  sharpe_reject_floor: 0.0

deploy_gate:
  trigger_sharpe_improve: 0.05
  trigger_drift_level: HIGH
  min_sharpe_change: 0.03
  require_adopt: true
  min_trades: 50
  require_human_confirm: true

output:
  history_dir: results/tpc/non-rolling-sim
