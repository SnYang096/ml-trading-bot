# TPC gate: 与 BPC 相同的安全/硬性门控
# 这些规则不依赖突破语义，对趋势策略通用
schema:
  phases:
  - system_safety
  - hard_gate
  - guardrail
  evaluation_order: system_safety -> hard_gate -> guardrail
  governance:
    selection_method: gate_score (Youden's J = tail_capture - good_deny_rate)
    min_gate_score: 0.0
    alert_threshold: 0.25
hard_gates:
# --- TPC 语义门控（非统计挖掘）：压波动区、压 EMA1200 过度拉伸追涨杀跌 ---
- id: gate_tpc_semantic_chop_high
  tag: HARD_TPC_SEMANTIC_CHOP
  phase: hard_gate
  priority: 6
  reason: TPC 专用：BB 偏窄且方向置信低 → 典型震荡来回扫区
  when:
    tpc_semantic_chop:
      value_gt: 0.60
  then:
    action: deny
  comment: 'semantic: tpc_semantic_chop = f(bb_compression, 1-direction_confidence); 0.60 对应全局 deny≈25%'
  locked: true
  promote_never_disable: true
  lock_reason: 波动区过滤（标准）：与 BPC/ME 三策略同构，避免 chop bar 上的虚假回调
- id: gate_tpc_late_long_above_ema1200
  tag: HARD_TPC_LATE_LONG_EMA1200
  phase: hard_gate
  priority: 7
  reason: TPC 专用：价远高于 EMA1200（动量末端追涨），与语义 extension 对齐
  when:
    ema_1200_position:
      value_gt: 0.10
  then:
    action: deny
  comment: 'semantic: unified on ema_1200_position stretch (long side)'
  locked: true
  lock_reason: 弱化延续语义：高位远离 EMA1200 时不追多
- id: gate_tpc_late_short_below_ema1200
  tag: HARD_TPC_LATE_SHORT_EMA1200
  phase: hard_gate
  priority: 7
  reason: TPC 专用：价远低于 EMA1200（动量末端追空），与语义 extension 对齐
  when:
    ema_1200_position:
      value_lt: -0.10
  then:
    action: deny
  comment: 'semantic: symmetric late chase on ema_1200_position'
  locked: true
  lock_reason: 弱化延续语义：低位远离 EMA1200 时不追空
- id: gate_evt_var_99_evt_var_99
  tag: HARD_EVT_VAR_99_EVT_VAR_99
  phase: hard_gate
  priority: 10
  reason: 统计验证规则 (lift=1.54)
  when:
    all_of:
    - evt_var_99:
        value_gt: 0.6706
    - evt_var_99:
        value_lt: 0.7976
  then:
    action: deny
  comment: 'optimizer: stable_plateau_found, threshold=0.4698, lift=0.230'
  locked: true
  lock_reason: EVT 左尾风险强度：中高风险拖泥带水区间对趋势策略表现最差
- id: gate_evt_tail_shape_right_evt_tail_shape_right
  tag: HARD_EVT_TAIL_SHAPE_RIGHT_EVT_TAIL_SHAPE_RIGHT
  phase: hard_gate
  priority: 12
  reason: 统计验证规则 (lift=1.33)
  when:
    all_of:
    - evt_tail_shape_right:
        value_gt: 0.3373
    - evt_tail_shape_right:
        value_lt: 0.5317
  then:
    action: deny
  comment: 'optimizer: stable_plateau_found, threshold=0.2290, lift=0.582'
  locked: true
  lock_reason: EVT 右尾形状：假强势/上冲下砸结构对趋势策略不利
- id: gate_vpin_ma20
  tag: HARD_VPIN_MA20
  phase: hard_gate
  priority: 11
  reason: 统计验证规则 (lift=1.15)
  when:
    vpin_quantile_rank_20:
      value_gt: 0.8
  then:
    action: deny
  comment: 'optimizer: no_stable_plateau, threshold=0.2959, lift=0.287'
  locked: true
  lock_reason: VPIN 知情交易活跃度：信息不对称过高时入场胜率下降
# NOTE: gate_macro_tp_vwap_1200_deadzone / gate_ema_1200_position_ema_1200_position
# 已按语义（prefilter=先划分数据）上提到 archetypes/prefilter.yaml 中
# 以 any_of 形式表达（不在死区一侧），此处不再重复过滤。
- id: gate_fer_ols_pos_fer_ols_pos
  tag: HARD_FER_OLS_POS_FER_OLS_POS
  phase: hard_gate
  priority: 15
  reason: 统计验证规则 (lift=1.08)
  when:
    all_of:
    - fer_ols_pos:
        value_gt: 0.063
    - fer_ols_pos:
        value_lt: 0.5188
  then:
    action: deny
  comment: 'from gate_draft(20260410_190624): medRR=-0.61, bad=52.9%, deny=25%'
  locked: true
  lock_reason: FER OLS 定位：资金费率正溢价中等区间对做多入场不利
guardrails: []
system_safety:
- id: gate_vol_persistence_vol_persistence
  tag: HARD_VOL_PERSISTENCE_VOL_PERSISTENCE
  phase: system_safety
  priority: 12
  reason: 统计验证规则 (lift=1.24)
  when:
    all_of:
    - vol_persistence:
        value_gt: 0.0029
    - vol_persistence:
        value_lt: 0.0616
  then:
    action: deny
  comment: 'merged: (0.0029,0.0299) + stat_fallback (0.0275,0.0616) → full deny zone. MeanRR=-0.60, BadRate=51.8%'
  locked: true
  lock_reason: 波动率持久性：低波噪声切换/拖泥带水期对趋势策略不利
- id: gate_vol_leverage_asymmetry_vol_leverage_asymmetry
  tag: HARD_VOL_LEVERAGE_ASYMMETRY_VOL_LEVERAGE_ASYMMETRY
  phase: system_safety
  priority: 13
  reason: 统计验证规则 (lift=1.08)
  when:
    all_of:
    - vol_leverage_asymmetry:
        value_gt: 0.0558
    - vol_leverage_asymmetry:
        value_lt: 0.1482
  then:
    action: deny
  comment: 'optimizer: stable_plateau_found, threshold=0.1259, lift=0.119'
