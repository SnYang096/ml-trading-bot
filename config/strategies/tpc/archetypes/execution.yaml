# TPC execution: 与 BPC 相同（EMA1200 structural exit, 增量加仓）
add_position:
  add_size_multipliers:
    - 1
    - 2
  inherit_parent_stop: true
  min_current_r_by_add:
    - 2
    - 4
  min_current_r_unit: atr
  sizing_mode: fixed_multiplier
  trigger:
    type: float_r_ladder_only
execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 60
holding:
  max_holding_bars: 0
  time_stop_bars: 0
stop_loss:
  # 2026-04-22 统一 breakeven 口径（见 position_logic.py）：
  # measure=atr 保持历史语义；lock_level_r 等价于旧 lock_profit_atr（ATR 单位）。
  breakeven:
    enabled: true
    trigger_r: 10.0
    lock_level_r: 2
    measure: atr
  guardrails:
    max_stop_pct: 0.2
    min_stop_pct: 0.01
  initial_r: 10.0
  structural_exit: ema1200
  trailing:
    activation_r: 10.0
    enabled: true
    expand_with_primary_atr: true
    trail_r: 10.0
  type: trailing
take_profit:
  enabled: false
version: 1
