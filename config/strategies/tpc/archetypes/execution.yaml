# TPC execution: 与 BPC 相同（EMA1200 structural exit, 增量加仓）
add_position:
  add_size_multipliers:
    - 1
    - 2
    - 3
  inherit_parent_stop: true
  max_add_times: 3
  min_current_r_by_add:
    - 1
    - 2
    - 3
  min_current_r_unit: atr
  sizing_mode: fixed_multiplier
  trigger:
    type: float_r_ladder_only
execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15
holding:
  max_holding_bars: 360
  time_stop_bars: 0
stop_loss:
  breakeven:
    enabled: false
    lock_profit_atr: 1.0
    trigger_r: 9
  guardrails:
    max_stop_pct: 0.1
    min_stop_pct: 0.01
  initial_r: 2.0
  structural_exit: ema1200
  trailing:
    activation_r: 2.0
    enabled: false
    trail_r: 2.0
  type: fixed
take_profit:
  enabled: false
version: 1
