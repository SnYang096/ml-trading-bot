name: tpc_gate
description: |
  TPC Gate 特征白名单：与 ME 类似, TPC 的 ema_1200_position late-entry 保护
  是有意的策略层决策, 显式允许. 其余按执行风险/订单流/波动稳定性白名单.

feature_pipeline:
  allowed_gate_deny_features:
    # TPC late-entry 保护 (策略层决策, 保留)
    - "ema_1200_position"
    # TPC 专属 chop 语义
    - "tpc_semantic_chop"
    # 订单流
    - "vpin_*"
    # 波动率稳定性
    - "vol_persistence"
    - "vol_leverage_asymmetry"
    - "vol_regime_shift*"
    # 尾部风险
    - "stat_evt_var_*"
    - "stat_evt_tail_shape*"
    - "stat_evt_expected_shortfall*"
    - "stat_evt_excess_vol*"
    # Chop / 震荡噪声
    - "bb_width_normalized_pct"
    - "range_compression_*"
