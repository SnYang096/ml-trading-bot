# Dual Add Trend feature configuration.
# Research-only multi-leg strategy using trend confidence plus box/chop filters.

name: dual_add_trend
description: |
  Initial dual-open inventory in non-chop / non-box regimes. Add-ons follow the
  current trend direction only, with explicit gross/net exposure caps.

feature_pipeline:
  exclude_columns:
    - atr
  requested_features:
    # Volatility for add spacing and dynamic net-profit targets.
    - atr_f
    - atr_percentile_f
    - volatility_regime_f
    - bb_width_normalized_pct_f

    # semantic_chop source: avoid broad no-trend regimes.
    - bpc_soft_phase_f

    # Shared box function; price-unit hi/lo outputs are globally excluded via raw_scale_columns.
    - box_structure_f

    # Trend context for add direction and flip detection.
    - ema_1200_position_f
    - ema_1200_slope_f
    - trend_confidence_f

    # Experimental trend/order-flow confirmation candidates. These are consumed
    # by research selectors only; archetypes keep the locked trend anchor.
    - wpt_scene_semantic_scores_f
    - hurst_price_f
    - hurst_cvd_f
    - hilbert_phase_f
    - vpin_scene_semantic_scores_f
    - cvd_change_features_f
    - trade_cluster_imbalance_zscore_features_f
    - trade_cluster_net_runs_zscore_features_f
    - trade_cluster_max_buy_run_zscore_features_f
    - trade_cluster_max_sell_run_zscore_features_f
