# dual_add_trend В· turbo_fixed_features вҖ” [INDEX] datesвҶ’rollingвҶ’tcвҶ’dataвҶ’strategiesвҶ’eventвҶ’dual_add_backtestвҶ’output

status: research

dates:
  # Align with BPC turbo: fixed features, same highcap universe, same rolling window.
  start_date: "2022-01-01"
  end_date: "2026-05-01"
  holdout_months: 26
  calibration_months: 6

rolling:
  mode: turbo_fixed_features
  turbo_fixed_features:
    fixed_strategies_root: config/strategies

threshold_calibration:
  # enable_model_training: false вҶ’ йҳҲеҖј-onlyпјҲдёҺ BPC turbo иҜӯд№үдёҖиҮҙпјүгҖӮ
  # жқғеЁҒеҸЈеҫ„пјҡжң¬ж®ө threshold_calibrationпјӣжңҲеәҰ replay з”ұ load_pipeline_config жұҮжҖ»дёә rolling_calibration.*пјҲеҸҜиҜ»йЎ¶еұӮ rolling_calibration иҰҶеҶҷиҠӮеҘҸзӯүпјүгҖӮ
  enable_model_training: false
  prefilter:
    optimize: true
  execution_opt:
    enabled: true

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap

data_path: data/parquet_data

download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data

strategies:
  dual_add_trend:
    strategy_type: dual_add_trend
    config: config/strategies/dual_add_trend
    timeframe: 120T
    prepare_features: features.yaml
    has_prefilter: true
    kpi_gates:
      prefilter:
        min_rows: 10
      backtest:
        min_trades: 60
        max_forced_exit_rate: 0.05
        max_drawdown_floor: -0.08

event_backtest:
  enabled: false

dual_add_backtest:
  enabled: true
  output_dir: results/dual_add_trend/turbo-full-cycle
  # Research/report cost assumption. Live execution should use exchange fills
  # and fees from the adapter, not this static diagnostic default.
  costs:
    fee_bps: 20.0
  timeframe: 2h
  regime: trend
  add_mode: trend
  flip_action: close_offside_all
  exclude_box: true
  step_atr_mult: 1.00
  tp_atr_mult: 0.75
  tp_pct: 0.0015
  max_loss_per_segment: 0.02
  risk_stop_mode: regime_only
  max_gross_exposure: 4
  max_net_exposure: 2
  max_adds_per_side: 3

output:
  history_dir: results/dual_add_trend/turbo-rolling-sim
  latest_dir: results/dual_add_trend/latest
