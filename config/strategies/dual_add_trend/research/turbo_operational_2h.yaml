# ============================================================
# Dual Add Trend standalone research pipeline (2H, turbo fixed features)
# ============================================================

dates:
  start_date: "2022-01-01"
  end_date: "2026-03-31"
  holdout_months: 26
  validation_months: 3

rolling:
  mode: turbo_fixed_features
  windows:
    calibration_months: 6
    structure_lookback_months: 12
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    disable_feature_search: true

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap

data_path: data/parquet_data

download:
  enabled: false
  data_dir: data/agg_data
  parquet_dir: data/parquet_data

strategies:
  dual_add_trend:
    strategy_type: dual_add_trend
    config: config/strategies/dual_add_trend
    timeframe: 120T
    features_gate: features.yaml
    has_prefilter: false

event_backtest:
  enabled: false

dual_add_backtest:
  enabled: true
  # output_dir: omit to write under output.history_dir / _rolling_sim/<run_id>/dual_add_full_window/
  costs:
    fee_bps: 20.0
    market_exit_slippage_bps: 5.0
    intrabar_touch_buffer_bps: 5.0
  execution_timeframe: 1min
  scale_max_loser_hold_to_signal: true
  start_date: "2022-01-01"
  end_date: "2026-03-31"
  symbols: BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT
  timeframe: 2h
  regime: trend
  add_mode: trend
  flip_action: close_offside_all
  exclude_box: true
  step_atr_mult: 1.00
  tp_atr_mult: 0.75
  tp_pct: 0.0015
  max_loss_per_segment: 0.02
  risk_stop_mode: regime_only
  max_gross_exposure: 4
  max_net_exposure: 2
  max_adds_per_side: 3
  map_symbols: BTCUSDT
  continuous_map_symbols: BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT

output:
  history_dir: results/dual_add_trend/turbo_operational_2h
  latest_dir: results/dual_add_trend/latest
