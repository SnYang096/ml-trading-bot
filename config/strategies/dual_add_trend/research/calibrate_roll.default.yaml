# dual_add_trend · turbo_fixed_features — [INDEX] dates→rolling→tc→data→strategies→event→dual_add_backtest→output

status: research

dates:
  # Align with BPC turbo: fixed features, same highcap universe, same rolling window.
  start_date: "2022-01-01"
  end_date: "2026-05-01"
  holdout_months: 26
  calibration_months: 6

rolling:
  mode: turbo_fixed_features
  turbo_fixed_features:
    fixed_strategies_root: config/strategies

threshold_calibration:
  # enable_model_training: false → 阈值-only（与 BPC turbo 语义一致）。
  # 权威口径：本段 threshold_calibration；月度 replay 由 load_pipeline_config 汇总为 rolling_calibration.*（可读顶层 rolling_calibration 覆写节奏等）。
  enable_model_training: false
  prefilter:
    optimize: true
  execution_opt:
    enabled: true

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap

data_path: data/parquet_data

download:
  enabled: true
  data_dir: data/agg_data
  parquet_dir: data/parquet_data

strategies:
  dual_add_trend:
    strategy_type: dual_add_trend
    config: config/strategies/dual_add_trend
    timeframe: 120T
    prepare_features: features.yaml
    has_prefilter: true
    kpi_gates:
      prefilter:
        min_rows: 10
      backtest:
        min_trades: 60
        max_forced_exit_rate: 0.05
        max_drawdown_floor: -0.08
    multileg_calibration:
      # Keep explicit 3-tier candidates in YAML (instead of implicit fallback in code),
      # so risk tiers are auditable and easy to tune during non_rolling / slow_snapshot.
      candidates:
        # Conservative: stricter trend entry + wider add spacing + slightly larger TP.
        - entry_min: 0.85
          exit_below: 0.55
          max_semantic_chop_entry: 0.20
          max_semantic_chop_hold: 0.35
          step_atr_mult: 1.25
          tp_atr_mult: 0.90
          tp_pct: 0.0018
        # Baseline: moderate thresholds and spacing.
        - entry_min: 0.75
          exit_below: 0.45
          max_semantic_chop_entry: 0.20
          max_semantic_chop_hold: 0.35
          step_atr_mult: 1.00
          tp_atr_mult: 0.75
          tp_pct: 0.0015
        # Aggressive: looser entry and tighter add spacing, higher turnover.
        - entry_min: 0.70
          exit_below: 0.40
          max_semantic_chop_entry: 0.25
          max_semantic_chop_hold: 0.40
          step_atr_mult: 0.75
          tp_atr_mult: 0.60
          tp_pct: 0.0012

event_backtest:
  enabled: false

dual_add_backtest:
  enabled: true
  output_dir: results/dual_add_trend/turbo-full-cycle
  # Research/report cost assumption. Live execution should use exchange fills
  # and fees from the adapter, not this static diagnostic default.
  costs:
    fee_bps: 20.0
    # Conservative 2h-bar execution assumptions for momentum-style exits/fills.
    market_exit_slippage_bps: 5.0
    intrabar_touch_buffer_bps: 5.0
  timeframe: 2h
  execution_timeframe: 1min
  scale_max_loser_hold_to_signal: true
  regime: trend
  add_mode: trend
  flip_action: close_offside_all
  exclude_box: true
  step_atr_mult: 0.75
  tp_atr_mult: 0.60
  tp_pct: 0.0012
  max_loss_per_segment: 0.02
  risk_stop_mode: regime_only
  max_gross_exposure: 4
  max_net_exposure: 2
  max_adds_per_side: 3

output:
  history_dir: results/dual_add_trend/turbo-rolling-sim
  latest_dir: results/dual_add_trend/latest
