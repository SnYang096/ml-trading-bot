# Dual Add Trend engine manifest.
# Runtime values are resolved as:
#   dual_add.yaml (this file) + archetypes/prefilter.yaml + archetypes/execution.yaml.
# This file remains the stable backtest/live entrypoint.

strategy_type: dual_add_trend
status: research

archetypes:
  prefilter: archetypes/prefilter.yaml
  execution: archetypes/execution.yaml

# Same semantics as chop_grid/grid.yaml chop_series (build_features / regime masks).
chop_series:
  chop_signal: raw
  chop_ts_window: 1200
  chop_ts_min_periods: 150

validation:
  script: scripts/diagnose_dual_add_trend.py
  baseline_symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
  baseline_periods: [2022, 2023, 2024, 2025, 2026Q1]
