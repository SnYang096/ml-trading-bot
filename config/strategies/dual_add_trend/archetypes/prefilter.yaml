# Multi-leg prefilter: defines regime eligibility for inventory-style engines.
#
# The external loader/validation contract is shared with other strategies, but
# this internal schema stays specific to dual_add_trend's trend inventory logic.
regime: # Regime-level eligibility gate for starting/holding a trend inventory segment.
  entry_feature: trend_confidence # Feature column used as the primary trend signal.
  entry_min: 0.80 # Enter only when trend confidence is at or above this level.
  exit_below: 0.50 # Exit/stop adding when trend confidence falls below this level.
  max_semantic_chop_entry: 0.25 # Do not enter trend inventory in high-chop conditions.
  max_semantic_chop_hold: 0.40 # Exit/stop holding if chop rises above this level.
  exclude_box_prefilter: true # Avoid stable box regimes; trend-only adds need movement.
  box_window: 120 # Lookback bars used by the auxiliary box structure detector.
  box_prefilter: # Optional box-quality thresholds used only when box filtering is evaluated.
    stability_min: 0.85 # Minimum range stability score for a detected box.
    width_min: 0.04 # Minimum normalized box width to avoid micro ranges.
    width_max: 0.30 # Maximum normalized box width to avoid loose/noisy ranges.
    touches_min: 5 # Minimum boundary touches required for a credible box.
