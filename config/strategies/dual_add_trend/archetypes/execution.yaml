# Multi-leg execution layer: inventory/add/tp and risk controls.
inventory:
  # Trend-only seeding avoids paying for an initial offside anchor. Basket TP
  # still exits the full inventory together after trend adds.
  initial_legs: [TREND]
  add_mode: trend
  trend_direction_source: dynamic_bar
  flip_action: close_offside_all
  max_adds_per_side: 3
  max_gross_exposure_units: 4
  max_net_exposure_units: 2
  max_loser_hold_bars: 24

add_spacing:
  primary: atr
  atr_mult: 1.00

take_profit:
  # Basket mode exits current inventory together once aggregate net PnL covers
  # fees and target distance. This avoids one initial leg taking profit while
  # the other remains as an unbounded loss anchor.
  mode: basket
  # Exit only after round-trip fee is covered and this net-profit distance is hit.
  fee_aware: true
  distance: max
  atr_mult: 0.75
  min_pct: 0.0015
  min_abs: 0.0

risk:
  min_segment_bars: 6
  max_segment_bars: 120
  force_exit_on_regime_loss: true
  # Main exits are semantic (trend/chop regime loss) plus basket TP. Segment
  # loss is a deployment gate / optional research guard, not the daily stop.
  risk_stop_mode: regime_only
  max_loss_per_segment: 0.02
  protection_stop_mode: catastrophic
  catastrophic_stop_atr_mult: 8.0
  catastrophic_stop_tp_mult: 8.0
  maker_fee_bps: 2.0
  taker_fee_bps: 5.0
  diagnostic_fee_bps: 4.0
  forced_exit_slippage_bps: 0.0
  funding_cost_bps_per_8h: 0.0
