# FER (FailureExhaustionReversal) 策略标签配置
# 语义：单边博弈失败→反向清算
# V1版本：复用BPC标签函数

name: fer
target_column: rr_label

label_generator:
  module: src.time_series_model.strategies.labels.failure_first_label
  function: compute_bpc_label
  params:
    direction: long
    horizon: 50
    # 复用BPC标签计算逻辑

filters:
  - column: rr_label
    notna: true

post_label_filters: []
