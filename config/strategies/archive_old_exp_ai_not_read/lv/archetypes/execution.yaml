execution_constraints:
  allow_add_on: false
  min_order_interval_minutes: 5
holding:
  max_holding_bars: 20
  time_stop_bars: 20
optimization:
  enabled: true
  params:
    stop_loss.initial_r:
      range:
      - 0.5
      - 1.5
      step: 0.25
    stop_loss.trailing.activation_r:
      range:
      - 0.3
      - 1.0
      step: 0.25
    stop_loss.trailing.trail_r:
      range:
      - 0.3
      - 1.0
      step: 0.25
stop_loss:
  initial_r: 0.5
  trailing:
    activation_r: 0.3
    step_r: 0.3
    trail_r: 0.3
  type: trailing
take_profit:
  enabled: true
  target_r: 2.5
tiers:
  enabled: true
  levels:
  - evidence_min: 0.7
    name: 强证据
    size_multiplier: 1.2
    stop_loss:
      initial_r: 0.6
      trailing:
        activation_r: 0.3
        trail_r: 0.3
    time_stop_bars: 30
  - evidence_min: 0.5
    name: 中等证据
    size_multiplier: 1.0
    stop_loss:
      initial_r: 0.8
      trailing:
        activation_r: 0.5
        trail_r: 0.5
    time_stop_bars: 20
  - evidence_min: 0.3
    name: 弱证据
    size_multiplier: 0.7
    stop_loss:
      initial_r: 1.0
      trailing:
        activation_r: 0.8
        trail_r: 0.8
    time_stop_bars: 15
version: 4
