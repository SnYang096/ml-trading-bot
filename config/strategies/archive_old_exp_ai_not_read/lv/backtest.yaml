# LV 回测配置
# 15分钟粒度，快进快出

backtest:
  enabled: true
  params:
    price_col: close
    freq: 15T
    use_signal_direction: false
    
    long_entry_threshold: 0.60
    exit_mode: none
    entry_mode: level
    strategy_direction: long_only  # 初始只做多方向清算 (空头清算=做多)
    max_holding_bars: 20          # 15min × 20 = 5小时
    use_rr_exit: true
    rr:
      atr_window: 14
      max_holding_bars: 20
      stop_loss_r: 0.8
      take_profit_r: 2.0
      entry_offset: 1
      use_time_exit: true
      use_trailing_stop: true
      trailing_atr_mult: 1.0     # 更紧的移动止损 (LV 动作快)
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
