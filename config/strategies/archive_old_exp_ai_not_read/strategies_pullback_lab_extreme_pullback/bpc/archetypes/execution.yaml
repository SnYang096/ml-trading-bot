# 极致 pullback lab — Execution（实体文件，勿 symlink 到主线）
# ---------------------------------------------------------------------------
# 入场语义在 prefilter/entry：breakout 后 pullback 内、次级别吸收、压低 continue。
# 执行层不改「第一根信号 bar」，仅用 structural_exit: vwap1200 与宏观 pv 标尺一致，
# 与 direction 中 macro_tp_vwap_1200_position 带通、gate 死区策略同一套坐标系。
# ---------------------------------------------------------------------------
add_position:
  add_size_multipliers:
    - 0.8
    - 0.5
    - 0.3
  inherit_parent_stop: true
  max_add_times: 3
  min_current_r_by_add:
    - 1
    - 2
    - 3
  # 父仓 initial_r≈4（4×ATR 止损宽），第 1 档 0.5（ATR）≈ 要求 current_r ≥ 0.5/4 = 0.125R。
  min_current_r_unit: atr
  sizing_mode: fixed_multiplier
  trigger:
    type: float_r_ladder_only
execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15
holding:
  max_holding_bars: null
  time_stop_bars: 0
stop_loss:
  breakeven:
    enabled: false
    lock_profit_atr: 1.0
    trigger_r: 9
  guardrails:
    max_stop_pct: 0.1
    min_stop_pct: 0.01
  initial_r: 4.0
  structural_exit: vwap1200
  trailing:
    enabled: false
    activation_r: 9.0
    trail_r: 18.0
  type: trailing
take_profit:
  enabled: false
version: 58
