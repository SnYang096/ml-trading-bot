# 极致 pullback lab — Direction 层语义（实体文件，勿 symlink 到主线）
# ---------------------------------------------------------------------------
# 与 prefilter/entry 分工：
# - Prefilter + entry 已约束「breakout 后 → pullback 内 → 吸收、弱化 continue」。
# - 本层只做「方向与宏观带通一致」：bpc_breakout_direction（Donchian 突破方向）为主、macd_atr 兜底，
#   且须与 macro_tp_vwap_1200_position 全带通同号 — 保证大级别上仍在 VWAP 标尺的「可辩护」一侧，
#   与 execution structural_exit vwap1200 对齐。
# ---------------------------------------------------------------------------

description: "BPC 方向 — breakout 信号与 VWAP1200 带通同号（lab：承接 pullback 吸收叙事）"

direction_rules:
  - id: bpc_breakout_macd_vwap1200_align
    method: signal_match_position_band
    description: "Donchian 突破方向优先，MACD 兜底；须落在 VWAP 多/空带通内"
    signal_rules:
      - feature: bpc_breakout_direction
        transform: raw
      - feature: macd_atr
        transform: sign
    position_band:
      feature: macro_tp_vwap_1200_position
      inner_abs: 0
      outer_abs: 1
