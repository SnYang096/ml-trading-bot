# BPC 极致 lab — Entry：四条 OR 路径（delta / CVD / VPIN / 压缩），语境在 prefilter + gate
#
# 与各层分工：
# - Prefilter：breakout 语境 + pullback 分 + 深度/continuation 粗上限 + recovery 等
# - Direction：bpc_breakout_direction + VWAP 带通同号
# - Gate：风控 + VWAP 死区等
# - Entry（本文件）：四条 OR（delta / CVD / VPIN / dual_compression 各单键），语境在 prefilter+gate
#
# 特征约定（本文件实际用到的键）：
# - bpc_pullback_delta_absorption：回踩窗内 delta 吸收（OR 臂 1）
# - bpc_cvd_absorption：CVD 原子（OR 臂 2）
# - vpin_absorption_score：VPIN 吸收（OR 臂 3）
# - dual_compression_score：压缩结构（OR 臂 4；与 delta 解耦；顶层 OR 任一臂过即可过 entry）

filters:
  # --- OR 臂 1：仅 delta 吸收（与 CVD 解耦，避免双键 AND）---
  - id: ef_pb_intact_delta_absorption
    enabled: true
    promote_never_disable: false
    skip_plateau: false
    locked: true
    lock_reason: extreme_pullback_semantic_chain
    description: 仅 bpc_pullback_delta_absorption；语境由 prefilter/gate 负责
    conditions:
      - feature: bpc_pullback_delta_absorption
        operator: ">="
        value: 0.54
    notes: 与其余三条 OR 臂并列；要强确认可同时满足 CVD 臂，但 entry 层不强制 AND

  # --- OR 臂 2：仅 CVD 原子吸收 ---
  - id: ef_pb_intact_cvd_absorption
    enabled: true
    promote_never_disable: false
    skip_plateau: false
    locked: true
    lock_reason: extreme_pullback_semantic_chain
    description: 仅 bpc_cvd_absorption；与 delta 臂分工，避免同质化 AND
    conditions:
      - feature: bpc_cvd_absorption
        operator: ">="
        value: 0.5
    notes: 与其余三条 OR 臂并列；≈0/1 原子，>=0.5 表成立

  # --- OR 臂 3：仅 VPIN 吸收 ---
  - id: ef_pb_intact_shallow_orderflow
    enabled: true
    promote_never_disable: false
    skip_plateau: false
    locked: true
    lock_reason: extreme_pullback_semantic_chain
    description: 仅 vpin_absorption_score；参与/拥挤度若需要由 prefilter 或 gate 表达
    conditions:
      - feature: vpin_absorption_score
        operator: ">="
        value: 0.38
    notes: 与其余三条 OR 臂并列

  # --- OR 臂 4：仅 dual_compression（已与 delta 拆开；delta 见 OR 臂 1）---
  - id: ef_pb_intact_compression_absorption
    enabled: true
    promote_never_disable: false
    skip_plateau: false
    locked: true
    lock_reason: extreme_pullback_semantic_chain
    description: 仅 dual_compression_score；delta 吸收由 ef_pb_intact_delta_absorption 承担
    conditions:
      - feature: dual_compression_score
        operator: ">="
        value: 0.52
    notes: 与其余三条 OR 臂并列；仅压缩即可过本臂。若要「压缩且 delta」同 bar 强制 AND，需单 filter 内写回或放 prefilter


combination_mode: or
