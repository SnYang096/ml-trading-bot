# BPC-SHORT-120T Entry Filter Archetype
# Curated locked pool (strong semantics first, reduced collinearity).
# OR mode with few high-quality enabled filters; redundant variants kept locked+disabled.

filters:
- id: ef_trend_confirm_tier_a
  enabled: true
  locked: true
  lock_reason: bpc_short_entry_trend_confirm_priority
  description: 'trend-confirm core (AND): orderflow + participation + derivatives expansion + anti-crowding'
  conditions:
  - feature: ofci_pct
    operator: '>='
    value: 0.70
  - feature: volume_ratio_pct
    operator: '>='
    value: 0.70
  - feature: oi_zscore
    operator: '>='
    value: 1.3451
  - feature: shd_pct
    operator: <=
    value: 0.0965
  notes: strict trend confirmation, reduce compression-zone false entries
- id: ef_trend_confirm_tier_b
  enabled: true
  locked: true
  lock_reason: bpc_short_entry_trend_confirm_priority
  description: 'trend-confirm with VPIN guard (AND): orderflow + participation + derivatives + vpinsanity'
  conditions:
  - feature: ofci_pct
    operator: '>='
    value: 0.70
  - feature: volume_ratio_pct
    operator: '>='
    value: 0.70
  - feature: oi_zscore
    operator: '>='
    value: 1.3451
  - feature: vpin_max20
    operator: <=
    value: 0.3458
  notes: keep a volatility/stress guard while preserving trend continuation
- id: ef_shd_pct_crowded
  enabled: false
  locked: true
  lock_reason: bpc_short_entry_orderflow_core_cross_tf
  description: 'pct: shd_pct <= 0.0965'
  conditions:
  - feature: shd_pct
    operator: <=
    value: 0.0965
  notes: single-condition legacy fallback
- id: ef_ofci_pct_high
  enabled: false
  locked: true
  lock_reason: bpc_short_entry_orderflow_core_cross_tf
  description: 'pct: ofci_pct >= 0.70'
  conditions:
  - feature: ofci_pct
    operator: '>='
    value: 0.70
  notes: single-condition legacy fallback
- id: ef_oi_zscore_high
  enabled: false
  locked: true
  lock_reason: bpc_short_entry_orderflow_core_cross_tf
  description: 'normalized: oi_zscore >= 1.3451'
  conditions:
  - feature: oi_zscore
    operator: '>='
    value: 1.3451
  notes: single-condition legacy fallback
- id: ef_vpin_max20_low
  enabled: false
  locked: true
  lock_reason: bpc_short_entry_orderflow_core_cross_tf
  description: 'normalized: vpin_max20 <= 0.3458'
  conditions:
  - feature: vpin_max20
    operator: <=
    value: 0.3458
  notes: single-condition legacy fallback
- id: ef_volume_ratio_pct_high
  enabled: false
  locked: true
  lock_reason: bpc_short_entry_orderflow_core_cross_tf
  description: 'pct: volume_ratio_pct >= 0.70'
  conditions:
  - feature: volume_ratio_pct
    operator: '>='
    value: 0.70
  notes: pct feature retained but disabled by default to control OR pass-through
- id: ef_vpin_ma20_low
  enabled: false
  locked: true
  lock_reason: bpc_short_entry_orderflow_core_cross_tf
  description: 'normalized: vpin_ma20 <= 0.2431'
  conditions:
  - feature: vpin_ma20
    operator: <=
    value: 0.2431
  notes: collinear with vpin_max20; keep locked for threshold retune
- id: ef_vpin_ma5_low
  enabled: false
  locked: true
  lock_reason: bpc_short_entry_orderflow_core_cross_tf
  description: 'normalized: vpin_ma5 <= 0.2278'
  conditions:
  - feature: vpin_ma5
    operator: <=
    value: 0.2278
  notes: collinear with vpin_max20; keep locked for threshold retune
- id: ef_vpin_zscore_20_high
  enabled: false
  locked: true
  lock_reason: bpc_short_entry_orderflow_core_cross_tf
  description: 'normalized: vpin_zscore_20 >= 0.60'
  conditions:
  - feature: vpin_zscore_20
    operator: '>='
    value: 0.60
  notes: VPIN alternative representation; disabled to avoid redundancy
combination_mode: or
