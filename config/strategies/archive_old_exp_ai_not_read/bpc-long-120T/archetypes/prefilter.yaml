rules:
  - feature: bpc_volume_compression_pct
    operator: ">="
    value: 0.78
  - feature: bpc_dir_flip_count
    operator: ">="
    value: 0.50
    rationale: meta-algorithm, KS=0.1477, return_uplift=+2.1389, robustness=100%, holdout验证通过
  - feature: bpc_score_pullback
    operator: ">="
    value: 0.30
    rationale: 语义锁定：必须出现可识别的回踩阶段，而非纯 breakout 追空
    locked: true
    lock_reason: BPC 语义锚点：回踩阶段成立
  - feature: bpc_pullback_depth
    operator: <=
    value: 0.75
    rationale: 语义锁定：回撤不能过深，过深更接近结构失败或反转语义
    locked: true
    lock_reason: BPC 语义锚点：回踩深度受控
  - feature: bpc_recovery_strength
    operator: ">="
    value: 0.40
    rationale: 语义锁定：回踩后必须有恢复力度，确认 continuation 的可执行性
    locked: true
    lock_reason: BPC 语义锚点：恢复强度确认
