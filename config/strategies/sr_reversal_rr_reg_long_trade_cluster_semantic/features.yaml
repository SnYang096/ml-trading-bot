name: sr_reversal_rr_reg_long_trade_cluster_semantic
description: "TradeCluster semantics (exhaustion/absorption) + mainline features"
feature_pipeline:
  requested_features:
  # Mainline (kline + minimal SR-distance features)
  - macd_f
  - rsi_f
  - sma_200_f
  - atr_f
  - roc_5_f
  - mom_10_f
  - bbands_f
  - bb_width_f
  - trend_r2_20_f
  - trend_r2_50_f
  - acceleration_3_f
  - wick_ratios_f
  - price_range_symmetry_f
  - poc_hal_features_close_f
  - sqs_hal_high_f
  - sqs_hal_low_f
  - sr_strength_max_close_f
  # TradeCluster (semantic only; returns only semantic cols)
  - trade_cluster_semantic_scores_f
  ensure_signal_column:
    name: signal
    default_value: 0
notes: |
  This is designed to test the hypothesis:
  - Raw trade_cluster_* is negative for reversals because it proxies "trend not exhausted"
  - Semantic scores separate exhaustion (reversal-friendly) vs absorption (breakout-friendly)


