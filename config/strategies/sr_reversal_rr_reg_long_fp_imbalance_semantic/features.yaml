name: sr_reversal_rr_reg_long_fp_imbalance_semantic
description: "Mainline + footprint imbalance exhaustion semantic"
feature_pipeline:
  requested_features:
  # Mainline (kline + minimal SR-distance features)
  - macd_f
  - rsi_f
  - sma_200_f
  - atr_f
  - roc_5_f
  - mom_10_f
  - bbands_f
  - bb_width_f
  - trend_r2_20_f
  - trend_r2_50_f
  - acceleration_3_f
  - wick_ratios_f
  - price_range_symmetry_f
  - poc_hal_features_close_f
  - sqs_hal_high_f
  - sqs_hal_low_f
  - sr_strength_max_close_f
  # ticks-based footprint + semantic
  - fp_imbalance_exhaustion_f
  ensure_signal_column:
    name: signal
    default_value: 0
notes: |
  Uses footprint ticks-based imbalance as raw material, but feeds only the semantic score:
  fp_imbalance_exhaustion_score = high fp_max_imbalance_ratio + low displacement + near SR.


