name: chop_grid_prefilter
description: |
  Candidate features for chop_grid regime eligibility tuning.
  This file aligns with the unified prefilter stage contract, while
  output is still written to archetypes/prefilter.yaml as regime fields.

feature_pipeline:
  requested_features:
    - bpc_soft_phase_f
    # Shared box function; price-unit hi/lo outputs are globally excluded via raw_scale_columns.
    - box_structure_f
    - atr_f
    - atr_percentile_f
    - volatility_regime_f
    - bb_width_normalized_pct_f

    # Math/regime candidates for chop eligibility:
    # WPT scene scores capture compression / ignition / absorption / exhaustion.
    # Hurst separates mean-reverting chop from persistent trend.
    # Hilbert envelopes expose cyclic amplitude without using raw price scale.
    - wpt_scene_semantic_scores_f
    - hurst_price_f
    - hurst_cvd_f
    - hilbert_phase_f
