# =============================================================================
# Chop Grid · non_rolling — full-window grid validation
# -----------------------------------------------------------------------------
# 与 BPC non_rolling 对齐：整段静态 holdout 上做一次全周期验收/上线候选评估。
# 多腿不走 BPC compare_runs/deploy_gate；上线判断由 mlbot multileg gate 读取
# grid metrics / segment 风险 / constitution.multi_leg 风控后给出结论。
# -----------------------------------------------------------------------------

extends: turbo.yaml

dates:
  # Align with BPC non_rolling: first holdout slice is validation/calibration,
  # final report/backtest is pure OOS test after this split.
  validation_months: 3

rolling:
  mode: non_rolling
  time_split_policy: static_holdout

grid_backtest:
  output_dir: results/chop_grid/non-rolling-full-cycle

output:
  history_dir: results/chop_grid/non-rolling-sim
