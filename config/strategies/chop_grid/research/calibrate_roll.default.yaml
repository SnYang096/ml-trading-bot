# chop_grid · turbo_fixed_features + grid_backtest — [INDEX] dates→rolling→tc→data→strategies→event/grid→output

status: research
# Live/dry-run adapter knobs (mode, order_adapter, state_path, YAML expected_costs) belong
# in a deployment strategy package, e.g. ``live/highcap/config/strategies/chop_grid/``.
# Pipeline/research merges should not duplicate them here.

dates:
  # Align with BPC turbo: fixed features, same highcap universe, same rolling window.
  start_date: "2022-01-01"
  end_date: "2026-05-01"
  holdout_months: 26
  calibration_months: 6

rolling:
  mode: turbo_fixed_features
  turbo_fixed_features:
    fixed_strategies_root: config/strategies

threshold_calibration:
  # enable_model_training: false → 阈值-only（与 BPC turbo 语义一致）。
  # 权威口径：本段 threshold_calibration；月度 replay 由 load_pipeline_config 汇总为 rolling_calibration.*（可读顶层 rolling_calibration 覆写节奏等）。
  enable_model_training: false
  prefilter:
    optimize: true
  execution_opt:
    enabled: true

universe_group:
  file: config/download/crypto_4h_token_universe_groups.yaml
  universe_set: starter_a
  group: highcap

data_path: data/parquet_data

download:
  enabled: false
  data_dir: data/agg_data
  parquet_dir: data/parquet_data

strategies:
  chop_grid:
    strategy_type: grid
    config: config/strategies/chop_grid
    timeframe: 120T
    prepare_features: features.yaml
    has_prefilter: true
    kpi_gates:
      prefilter:
        min_rows: 10
      backtest:
        min_segments: 30
        min_trades: 100
        max_forced_exit_rate: 0.35
        max_drawdown_floor: -0.08
    multileg_calibration:
      # Execution candidates intentionally include wider grid spacing for 20bps
      # stress costs. research_roll / validate_static inherit this list from calibrate_roll.default.yaml.
      candidates:
        - entry_chop_min: 0.35
          exit_chop_below: 0.22
          atr_mult: 0.50
          min_pct: 0.004
          exclude_box_prefilter: true
        - entry_chop_min: 0.40
          exit_chop_below: 0.25
          atr_mult: 0.50
          min_pct: 0.004
          exclude_box_prefilter: true
        - entry_chop_min: 0.45
          exit_chop_below: 0.30
          atr_mult: 0.65
          min_pct: 0.006
          max_levels_per_side: 3
          max_open_levels_total: 6
          exclude_box_prefilter: false
        - entry_chop_min: 0.45
          exit_chop_below: 0.30
          atr_mult: 0.80
          min_pct: 0.008
          max_levels_per_side: 3
          max_open_levels_total: 6
          exclude_box_prefilter: false
        - entry_chop_min: 0.50
          exit_chop_below: 0.32
          atr_mult: 1.00
          min_pct: 0.010
          max_levels_per_side: 2
          max_open_levels_total: 4
          exclude_box_prefilter: false
        - entry_chop_min: 0.50
          exit_chop_below: 0.32
          atr_mult: 1.00
          min_pct: 0.010
          max_levels_per_side: 3
          max_open_levels_total: 6
          exclude_box_prefilter: false
        - entry_chop_min: 0.55
          exit_chop_below: 0.35
          atr_mult: 1.25
          min_pct: 0.012
          max_levels_per_side: 2
          max_open_levels_total: 4
          exclude_box_prefilter: false
        - entry_chop_min: 0.55
          exit_chop_below: 0.35
          atr_mult: 1.25
          min_pct: 0.012
          max_levels_per_side: 3
          max_open_levels_total: 6
          exclude_box_prefilter: false
        - entry_chop_min: 0.55
          exit_chop_below: 0.35
          atr_mult: 1.50
          min_pct: 0.015
          max_levels_per_side: 2
          max_open_levels_total: 4
          exclude_box_prefilter: false
        - entry_chop_min: 0.55
          exit_chop_below: 0.35
          atr_mult: 1.50
          min_pct: 0.015
          max_levels_per_side: 3
          max_open_levels_total: 6
          exclude_box_prefilter: false

event_backtest:
  enabled: false

grid_backtest:
  enabled: true
  calibrate_execution: true
  # Keep research backtests on the same feature surface as the pipeline:
  # build FeatureStore from features.yaml first, then auto-detect the matching
  # latest chop_grid layer for raw/ts_quantile regime evaluation.
  feature_store_dir: feature_store
  feature_store_timeframe: 120T
  # output_dir intentionally omitted: auto_research_pipeline writes this stage under
  # output.history_dir/_rolling_sim/<timestamp>/grid_full_window, aligned with the
  # turbo rolling tree used by event_backtest-style artifacts.
  # Conservative intrabar path assumption for research/reports only.
  # Live execution exits when real fills/TP orders happen.
  same_bar_entry_exit: false
  # Research/report all-in cost assumptions. Binance round-trip/slippage/funding
  # drag is treated as ~10bps baseline; turbo stress tests use 2x (~20bps).
  # Live execution should use exchange fills/fees from the adapter.
  costs:
    fee_bps: 20.0
    maker_fee_bps: 20.0
    taker_fee_bps: 20.0
    forced_exit_slippage_bps: 20.0
    funding_cost_bps_per_8h: 20.0

output:
  history_dir: results/chop_grid/turbo-rolling-sim
