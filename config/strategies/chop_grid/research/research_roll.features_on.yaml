# ============================================================
# Chop Grid standalone pipeline (2H, slow_realistic rolling)
# ============================================================

extends: calibrate_roll.default.yaml

dates:
  start_date: "2022-01-01"
  end_date: "2026-05-01"
  holdout_months: 26

rolling:
  mode: slow_realistic
  windows:
    calibration_months: 6
    structure_lookback_months: 12
  slow_realistic:
    cadence_months: 3
    triggered_retrain_enabled: true
    adoption_gate:
      enabled: true
      validation_months: 1
      adopt_ratio: 1.0
      min_improvement: 0.0
      score_weights:
        sharpe_r: 1.0
        max_drawdown_r: 0.15
        near_stop_rate: 0.5
      undertrade:
        target_trades_soft: 10
        penalty: 0.15
      cash_score_when_no_trades: 0.0
      hard_reject:
        sharpe_floor: -0.5
  turbo_fixed_features:
    fixed_strategies_root: config/strategies
    disable_feature_search: false

threshold_calibration:
  enable_model_training: true

rolling_calibration:
  threshold_calibration:
    enabled: true

data_path: data/parquet_data

download:
  enabled: false
  data_dir: data/agg_data
  parquet_dir: data/parquet_data

strategies:
  chop_grid:
    strategy_type: grid
    config: config/strategies/chop_grid
    timeframe: 120T
    prepare_features: features.yaml
    has_prefilter: true
    multileg_feature_selection:
      enabled: true
      protected_nodes:
        - atr_f

event_backtest:
  enabled: false

grid_backtest:
  enabled: true
  output_dir: results/chop_grid/slow-full-cycle
  start_date: "2022-01-01"
  end_date: "2026-03-31"

output:
  history_dir: results/chop_grid/research_roll.features_on
