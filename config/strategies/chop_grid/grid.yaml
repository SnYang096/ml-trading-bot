# Chop Grid engine manifest.
# Runtime values are resolved as:
#   grid.yaml (this file) + archetypes/prefilter.yaml + archetypes/execution.yaml.
# This file remains the stable backtest/live entrypoint.

strategy_type: grid
status: research

archetypes:
  prefilter: archetypes/prefilter.yaml
  execution: archetypes/execution.yaml

# Regime chop series + ts-quantile window (read by merge_chop_grid_yaml / CLIs).
chop_series:
  chop_signal: raw
  chop_ts_window: 1200
  chop_ts_min_periods: 150
  # compute_semantic_chop_ts_q: false

live:
  mode: dry_run
  state_path: results/chop_grid/live_state.json
  order_adapter: dry_run
  cancel_orders_on_exit: true
  market_exit_on_regime_loss: true
