# Multi-leg execution layer: inventory spacing and risk controls.
# Backtest/report cost assumptions live in grid_backtest.costs, not here.
#
# Unlike dual_add_trend, there is no add_spacing: levels are symmetric around a
# center and capped by max_levels_per_side, not pyramid adds on trend drift.
#
# There is no take_profit block: engine semantics exit each filled cell toward
# the next grid step (effective per-cell TP distance is the same as spacing).
# Basket-style TP does not apply. Flattening still uses regime loss and caps
# under risk below.
inventory: # Inventory construction and order placement semantics.
  spacing: # Distance between adjacent grid prices; doubles as cell TP distance.
    primary: atr # Use ATR as the primary spacing unit.
    atr_mult: 1.00 # Grid spacing = ATR * this multiplier, subject to min_pct.
    min_pct: 0.010 # Minimum spacing as a fraction of price.
  max_levels_per_side: 2 # Maximum long levels and maximum short levels around center.
  max_replenish_per_level_per_segment: null # null=unlimited post-TP replenishes (research); 0=one fill per level (live default).
  order_type: limit # Intended order type for resting grid entries.

risk: # Runtime inventory limits and forced-exit rules, not report cost assumptions.
  min_segment_bars: 6 # Ignore very short chop segments below this length.
  max_segment_bars: 120 # Force segment end after this many signal bars.
  force_exit_on_regime_loss: true # Market-exit all inventory when chop regime is lost.
  max_loss_per_grid: 0.03 # Grid-level catastrophic loss cap, normalized by level notional.
  max_open_levels_total: 4 # Maximum total filled inventory levels across both sides.
