# Multi-leg execution — dense 3L (E7 four-segment validate @ live 2bps costs).
# Canonical research + live stack; synced with live/highcap/config/strategies/chop_grid/.
#
# Spacing min_pct binds (atr_mult low); grid fits inside chop box (~±1% per side).
# Backtest reference: config/experiments/20260604_chop_grid_stack_ablation/dense_3l_execution.yaml

inventory:
  spacing:
    primary: atr
    atr_mult: 0.01
    min_pct: 0.0033
  max_levels_per_side: 3
  max_replenish_per_level_per_segment: 1
  order_type: limit

risk:
  min_segment_bars: 6
  max_segment_bars: 120
  force_exit_on_regime_loss: true
  max_loss_per_grid: 0.03
  max_open_levels_total: 6
  per_leg_stop_loss: false
  # TP distance = spacing x mult; 2.0 keeps dense 3L entry layout while restoring
  # ~0.66% take-profit (backtest: best Sharpe, cost-robust vs mult=1).
  tp_spacing_mult: 2
