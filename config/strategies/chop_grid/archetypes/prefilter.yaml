# Multi-leg prefilter equivalent: define when grid regime is tradable.
regime:
  entry_feature: bpc_semantic_chop
  entry_chop_min: 0.40
  exit_chop_below: 0.25
  exclude_box_prefilter: true
  box_window: 120
  box_prefilter:
    stability_min: 0.85
    width_min: 0.04
    width_max: 0.30
    touches_min: 5
