add_position:
  add_size_multipliers:
    - 0.5
  inherit_parent_stop: true
  max_add_times: 1
  min_current_r_by_add:
    - 1.4
  min_current_r_unit: atr
  sizing_mode: fixed_multiplier
  trigger:
    type: float_r_ladder_only
execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 120
holding:
  max_holding_bars: 60
  time_stop_bars: 60
stop_loss:
  breakeven:
    enabled: true
    trigger_r: 1.4
    lock_level_r: 0.2
    measure: atr
  guardrails:
    max_stop_pct: 0.2
    min_stop_pct: 0.01
  initial_r: 2.3
  structural_exit: ema1200
  trailing:
    activation_r: 1.8
    enabled: true
    trail_r: 2.2
  type: trailing
take_profit:
  enabled: true
  target_r: 2.8
version: 1
