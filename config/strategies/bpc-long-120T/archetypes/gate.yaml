# BPC-LONG Gate (optimized, auto-promoted)
# 来源: /home/yin/trading/ml_trading_bot/results/research_history/bpc-long/20260314_015138/strategies/bpc-long/gate_draft.yaml
# 优化规则: 0/5 条通过优化, 1 条已移除
schema:
  phases:
    - system_safety
    - hard_gate
    - guardrail
  evaluation_order: system_safety -> hard_gate -> guardrail
  governance:
    selection_method: gate_score (Youden's J = tail_capture - good_deny_rate)
    min_gate_score: 0.0
    alert_threshold: 0.25
hard_gates:
  - id: gate_evt_var_99_evt_var_99
    tag: HARD_EVT_VAR_99_EVT_VAR_99
    phase: hard_gate
    priority: 10
    reason: 统计验证规则 (lift=1.54)
    when:
      all_of:
        - evt_var_99:
            value_gt: 0.6706
        - evt_var_99:
            value_lt: 0.7976
    then:
      action: deny
    comment: "optimizer: stable_plateau_found, threshold=0.4698, lift=0.230"
    locked: true
    lock_reason: EVT 左尾风险强度：中高风险拖泥带水区间对趋势策略表现最差
  - id: gate_evt_tail_shape_right_evt_tail_shape_right
    tag: HARD_EVT_TAIL_SHAPE_RIGHT_EVT_TAIL_SHAPE_RIGHT
    phase: hard_gate
    priority: 12
    reason: 统计验证规则 (lift=1.33)
    when:
      all_of:
        - evt_tail_shape_right:
            value_gt: 0.3373
        - evt_tail_shape_right:
            value_lt: 0.5317
    then:
      action: deny
    comment: "optimizer: stable_plateau_found, threshold=0.2290, lift=0.582"
    locked: true
    lock_reason: EVT 右尾形状：假强势/上冲下砸结构对趋势策略不利
  - id: gate_vpin_ma20
    tag: HARD_VPIN_MA20
    phase: hard_gate
    priority: 11
    reason: 统计验证规则 (lift=1.15)
    when:
      vpin_quantile_rank:
        value_gt: 0.8
    then:
      action: deny
    comment: "optimizer: no_stable_plateau, threshold=0.2959, lift=0.287"
    locked: true
    lock_reason: VPIN 知情交易活跃度：信息不对称过高时入场胜率下降
  - id: gate_stat_vol_persistence_vol_persistence
    tag: HARD_STAT_3
    phase: system_safety
    priority: 22
    reason: 统计法兜底规则（tree gate 为空）
    when:
      all_of:
        - vol_persistence:
            value_gt: 0.0275
        - vol_persistence:
            value_lt: 0.0616
    then:
      action: deny
    comment: stat_fallback gate_score=0.051, tail_capture=0.136, good_deny=0.085
    locked: true
    lock_reason: 波动率持久性：噪声切换/拖泥带水期对短线策略不利
guardrails: []

# ：locked = 慢变量上「这条 gate 规则不删、特征约束结构保留」；若分析/优化 给不出有效阈值，会 disabled: true 临时关掉执行，等下次优化成功会清掉 disabled（同文件里成功分支有 rule.pop("disabled", None)）。这和 prefilter 里「特征必须在数据里」是另一层，gate 的 locked 只管 gate 规则是否被优化器抹掉。
