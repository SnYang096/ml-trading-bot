# SRB (Structural Range Breakout) — MVP 特征：TPC 壳 + SR 突破频谱

name: srb
description: |
  StructuralRangeBreakout：成功突破延续。MVP 在 TPC 特征集上增加 spectrum_features_sr_breakout_f。

feature_pipeline:
  exclude_columns:
    - atr
  requested_features:
    - atr_f

    # ========== SRB：SR 突破频谱（占位语义锚） ==========
    - spectrum_features_sr_breakout_f

    # ========== 软阶段（与 TPC 共享管线，后续可换专用 phase） ==========
    - tpc_soft_phase_f  # 输出: tpc_score_breakout/pullback/continuation/neutral

    # ========== BPC 结构特征（不依赖突破，可复用） ==========
    - bpc_pullback_depth_pct_f
    - bpc_pullback_duration_f
    - bpc_pullback_speed_f
    - bpc_impulse_return_atr_f

    # ========== 方向一致性 ==========
    - bpc_dir_consistency_multi_f
    - bpc_dir_flip_count_f

    # ========== 量能/订单流 ==========
    - bpc_volume_compression_pct_f
    - bpc_pullback_delta_absorption_f

    - roc_5_f
    - roc_10_f
    - roc_20_f
    - cvd_divergence_v2_f
    - price_momentum_divergence_f
    - terminal_risk_score_f
    - volume_participation_score_f

    # ========== 趋势强度 ==========
    - trend_r2_20_f
    - path_efficiency_pct_f
    - path_length_pct_f
    - price_dir_consistency_pct_f

    # ========== 动量 ==========
    - macd_atr_f
    - rsi_f

    # ========== 波动 ==========
    - atr_percentile_f
    - bb_width_normalized_pct_f

    # ========== Volatility Regime ==========
    - vol_regime_features_f
    - vol_trend_features_f
    - vol_mom_features_f

    # ========== Trend Exhaustion ==========
    - wick_scene_semantic_scores_f
    - wpt_scene_semantic_scores_f
    - volume_profile_scene_semantic_scores_f
    - liquidity_void_scene_semantic_scores_f

    # ========== SR ==========
    - sr_strength_max_f
    # L3 大级别 SR（240 bar, anchor_shift=12；≈1 月视角，上下沿价格+距离/侧别/带宽）
    # 消费方：结构化 SL 对面锚点 fallback（true_sr_level.wide_fallback_atr）+ sr_wide_entry_guard
    - wide_sr_swing_f

    # ========== 订单流 ==========
    - vpin_features_f
    - volume_ratio_pct_f
    - ofci_pct_f
    - shd_pct_f
    - cvd_change_features_f

    # ========== Trade Cluster ==========
    - trade_cluster_entropy_zscore_features_f
    - trade_cluster_imbalance_zscore_features_f
    - trade_cluster_net_runs_zscore_features_f
    - trade_cluster_max_buy_run_zscore_features_f
    - trade_cluster_max_sell_run_zscore_features_f

    # ========== 基础 ==========
    - sma_200_f
    - ema_1200_position_f
    - macro_tp_vwap_1200_position_f
    - jump_risk_pct_f

    # ========== Volume Profile ==========
    - volume_profile_volatility_features_f
    - liquidity_void_f

    # ========== Footprint ==========
    - footprint_basic_f

    # ========== 资金费率 ==========
    - funding_rate_features_f
    - funding_scene_semantic_scores_f

    # ========== OI ==========
    - oi_features_f
    - oi_scene_semantic_scores_f

    # ========== 波动率建模 ==========
    - volatility_regime_f

    # ========== 场景语义 ==========
    - fp_imbalance_scene_semantic_scores_f
    - vpin_scene_semantic_scores_f

    # ========== VWAP ==========
    - vwap_position_f

    # ========== 交叉特征 ==========
    - exhaustion_at_liquidity_void_f
    - dual_compression_f
    - dual_ignition_f
    - dual_exhaustion_f
    - funding_oi_crowding_f
    - liquidity_void_x_wpt_risk_rank_f
    - vpin_zscore_x_trade_cluster_max_buy_run_rank_f
    - vpin_x_trade_cluster_entropy_rank_f

    # ========== 数学特征 ==========
    - hurst_price_f
    - spectrum_features_f
    - hilbert_phase_f
    - wpt_price_fluctuation_f
    - evt_features_f
    - wpt_price_reconstructed_f
    - wpt_volume_energy_f
    - wpt_cvd_fluctuation_f
    - hurst_cvd_f

    # ========== 跨 archetype ==========
    - fer_failure_signals_f
    - me_soft_phase_f
    - me_failure_f
    - me_context_f

    # ========== Session & Microstructure ==========
    - session_features_f
    - bars_since_extreme_f

    - market_cap_normalized_orderflow_f
  ensure_signal_column:
    name: signal
    default_value: 0
