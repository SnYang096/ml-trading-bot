name: srb_gate
description: |
  SRB Gate 特征白名单：SRB 是"宽 SR 区间 fake-break + 反转"策略,
  结构层 (wide_sr_*, fake_break_*) 留给 prefilter; gate 只管执行风险.

feature_pipeline:
  allowed_gate_deny_features:
    # 订单流 (fake-break 时订单流失衡是执行层风险)
    - "vpin_*"
    # 波动率稳定性
    - "vol_persistence"
    - "vol_leverage_asymmetry"
    - "vol_regime_shift*"
    # 尾部风险
    - "stat_evt_var_*"
    - "stat_evt_tail_shape*"
    - "stat_evt_expected_shortfall*"
    - "stat_evt_excess_vol*"
    # Chop / 震荡噪声 (SR 区间内窄 BB 是噪声环境)
    - "bb_width_normalized_pct"
    - "range_compression_*"
