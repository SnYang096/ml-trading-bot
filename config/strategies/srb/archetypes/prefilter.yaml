# SRB prefilter — **支撑/阻力关键位** + 决定性突破语境（非「盒统计」主语义）
#
# SRB = Structural Range Breakout：在 **有质量的 SR 结构** 上，价格处于 **突破/刚突破**
# 的典型语境（贴近 L3 swing 箱体的上沿或下沿之一 + L2 强度 + 突破频谱 + 单 bar impulse）。
#
# 与其它策略分工：
# - **BPC**：Donchian 突破 → **回踩** 深度/恢复（pullback continuation）。
# - **ME**：accel / VWAP 带（动量扩张），不强调「刚穿关键价位」。
# - **TPC**：EMA1200 + **pullback_depth**（大趋势回调不破）。
# - **SRB（本文件）**：**L3 关键带（wide swing 上/下沿）** + `sr_strength_max` + **SR 突破频谱**
#   + `bpc_impulse_return_atr`；用 **`tpc_score_breakout`** 只做「突破相 / 非回调相」软区分，不与 TPC 同源。
#
# 说明：`wide_sr_dist_atr` = min(|close−上沿|, |close−下沿|)/ATR，**小**表示贴近 **大级别阻力或支撑带之一**，
# 与 BPC 的「回踩链」、TPC 的「回调深度」不是同一套条件。

rules:
  - feature: sr_strength_max
    operator: ">="
    value: 0.42
    locked: true
    lock_reason: 关键位结构强度（L2 HAL/POC 语义），SRB 锚点

  - feature: spectrum_price_high_freq_ratio
    operator: ">="
    value: 0.22
    locked: true
    lock_reason: SR 突破专用频谱（策略内建语义，非泛趋势指标）

  # 贴近 L3 月度 swing 箱体的 **上沿或下沿**（关键阻力/支撑带），突破发生区
  - feature: wide_sr_dist_atr
    operator: "<="
    value: 1.25
    locked: false
    lock_reason: 距 wide SR 上/下沿较近（ATR）；避免在区间正中当 SRB 触发

  # 与 TPC 区分：偏突破相软分（非 pullback_depth / continuation 主逻辑）
  - feature: tpc_score_breakout
    operator: ">="
    value: 0.15
    locked: false
    lock_reason: SRB vs TPC 软分离，阈值可 rolling 重标定

  # 单 bar 上破/下破关键位常伴随可度量 impulse（与 BPC 整条 pullback 链不同）
  - feature: bpc_impulse_return_atr
    operator: ">="
    value: 0.04
    locked: false
    lock_reason: 突破动能标量门槛，非 Donchian 回踩语义
