# SRB prefilter — SRB archetype 入场形态本体：
#   - 结构强度 (sr_strength_max)
#   - 突破邻域频谱 (spectrum_price_high_freq_ratio)
#   - 真突破新鲜窗口 (srb_l3_breakout_age_decay)
# Box / chop / EMA 等慢变量数据空间约束在 archetypes/regime.yaml。
# 订单流确认在 archetypes/entry_filters.yaml。

rules:
  - feature: sr_strength_max
    operator: ">="
    value: 0.42
    locked: true
    lock_reason: SRB 结构锚点：关键位需有足够 L2 结构强度

  - feature: spectrum_price_high_freq_ratio
    operator: ">="
    value: 0.22
    locked: true
    lock_reason: SRB 结构锚点：突破邻域频谱能量

  - feature: srb_l3_breakout_age_decay
    operator: ">="
    value: 0.35
    locked: true
    lock_reason: SRB 结构锚点：只做 L3 真突破后的新鲜窗口，不追长趋势尾段
