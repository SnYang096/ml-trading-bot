# SRB Regime — 慢变量数据空间约束 + 多空掩码
# A/B/C 共用慢变量层；与 BPC/TPC/ME 同源 chop + box 约束。

allowed_regimes:
  - bull
  - bear
  - neutral

allowed_sides:
  - long
  - short

rules:
  # ── Chop 上限 (从 gate.yaml 迁移；与 BPC/TPC/ME 同源) ──
  - feature: tpc_semantic_chop
    operator: "<="
    value: 0.40
    locked: true
    lock_reason: Regime 慢变量 — 高 chop 不做 SR 突破延续（与 BPC/TPC/ME 同源）

  # ── Box 状态 (从 prefilter.yaml 迁移过来) ──
  - any_of:
      - feature: box_pos_120
        operator: "<="
        value: 0.15
      - feature: box_pos_120
        operator: ">="
        value: 0.85
      - feature: box_breakout_up
        operator: ">="
        value: 0.5
      - feature: box_breakout_down
        operator: ">="
        value: 0.5
    rationale: 非箱体中部约束 — SR 突破不在 box mid 反复扫单
    locked: true
    lock_reason: Regime 慢变量 — 只在 box 边缘或已突破时入场

last_calibration:
  timestamp: null
  data_source: null
  plateau_overlap: null
  notes: |
    初始引入：从历史 prefilter.yaml + gate.yaml 迁移现存阈值；
    首轮 Tier-0 calibrate 之前保持现值。
