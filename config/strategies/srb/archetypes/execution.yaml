# SRB execution — trailing 语义同 ME，但止损/回撤带宽更大（更耐洗）
#
# 浮盈阶梯加仓与 ME 对齐（float_r_ladder_only）；加仓前须经 srb_add_position_policy：
# ADX/ER bucket 白名单 + 压缩特征上限（事件回测 try_add_position 与 float ladder 共用）。



# 宽窗 SR (wide swing) — 注入特征 + 入场屏蔽 / 反手锚点 fallback（见 sr_wide_entry_guard / fake_break_reverse）
sr_feature_injection:
  swing_lookback_wide_bars: 96

# 宽窗 SR：距反向宽窗位 < min_distance_atr × ATR 时拒绝新开仓（与 live decide / event_backtest 对齐）
sr_wide_entry_guard:
  enabled: true
  min_distance_atr: 2.0
  apply_to_new_only: true
add_position:
  add_size_multipliers:
    - 0.8
    - 0.5
    - 0.3
  inherit_parent_stop: true
  max_add_times: 3
  min_current_r_by_add:
    - 0.5
    - 1.0
    - 1.5
  min_current_r_unit: atr
  sizing_mode: fixed_multiplier
  trigger:
    type: float_r_ladder_only

execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15

holding:
  max_holding_bars: null
  time_stop_bars: 0

stop_loss:
  breakeven:
    enabled: false
    lock_profit_atr: 1
    trigger_r: 9
  guardrails:
    max_stop_pct: 0.1
    min_stop_pct: 0.01
  initial_r: 6.0
  trailing:
    enabled: true
    # trailing 带宽 = trail_r × max(入场 ATR, 当前主周期 ATR)
    # 数据依据：baseline trailing_sl 交易里，出场 bar 的 ATR 中位数 = 入场 ATR 的 1.51×，
    # 53.8% trailing_sl 出场后沿原方向继续走 ≥ 2 ATR（"洗盘"） —— 见 z实验_005_统一研究/SRB_ablation_results_20260418.md
    expand_with_primary_atr: true
    activation_r: 6.0
    trail_r: 5.0
  type: trailing

take_profit:
  enabled: false

# ---------------------------------------------------------------------------
# SRB 加仓门控：仅当 regime_execution 未开时，用下列阈值算 bucket（与上表独立）
# ---------------------------------------------------------------------------
srb_add_position_policy:
  enabled: true
  allow_regime_buckets:
    - high_adx_low_er
    - high_adx_high_er
  max_volume_compression_pct: 0.55
  volume_compression_feature: bpc_volume_compression_pct
  regime_adx_period: 14
  regime_er_window_bars: 20
  regime_thresholds:
    adx_high: 40.0
    er_high: 0.36

# ---------------------------------------------------------------------------
# SRB 假突破反手：止损后如果价格回到 SR 正确侧 → 重新进场（原方向）
# 语义：主力砸坑扫止损后拉回 = 假动作，原方向才是真趋势
# ---------------------------------------------------------------------------
fake_break_reverse:
  enabled: true
  reclaim_k: 1                  # Stage 1: 脱离 stop-hunt extreme 的最小连续确认 bar 数
  confirm_k: 2                  # Stage 2: 回到 true SR level 正确侧后的连续确认 bar 数
  fake_lookahead: 10            # 止损后最多等多少根 primary bar
  stop_hunt_buffer_atr: 0.3     # extreme = sl_price ± atr * buffer
  max_reverse_per_level: 1      # 同一 SR 位只反手 1 次
  cooldown_bars: 10             # 反手后冷却多少 bar 不再产生新反手候选
  # 窄窗 SR 距入场 < N×ATR 时用宽窗 SR 作为 Stage 2 锚点（二期结构）
  true_sr_wide_fallback_atr: 2.0

# ---------------------------------------------------------------------------
# SRB 实验扩展（默认全关；事件回测在 primary TF 上注入 srb_regime_* / srb_sr_*）
# ---------------------------------------------------------------------------
sr_structural_exit:
  enabled: false
  lookback_bars: 20
  buffer_atr: 0.25

regime_execution:
  enabled: false
  adx_period: 14
  er_window_bars: 20
  thresholds:
    adx_high: 40.0
    er_high: 0.36
  buckets:
    default: {}
    high_adx_low_er:
      initial_r: 6.0
      activation_r: 6.0
      trail_r: 5.0
      size_multiplier: 1.0
    high_adx_high_er:
      initial_r: 4.5
      activation_r: 5.0
      trail_r: 4.5
      size_multiplier: 0.85
    low_adx_low_er:
      initial_r: 5.0
      activation_r: 5.5
      trail_r: 5.0
      size_multiplier: 1.0
    low_adx_high_er:
      initial_r: 5.0
      activation_r: 5.5
      trail_r: 5.0
      size_multiplier: 1.0
    unknown: {}

version: 3
