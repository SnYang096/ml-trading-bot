# SRB execution — trailing 语义同 ME，但止损/回撤带宽更大（更耐洗）
#
# 宽 initial_r、延后 activation trailing、无固定止盈、无结构出场；不加仓。

execution_constraints:
  allow_add_on: false
  min_order_interval_minutes: 15

holding:
  max_holding_bars: null
  time_stop_bars: 0

stop_loss:
  breakeven:
    enabled: false
    lock_profit_atr: 1
    trigger_r: 9
  guardrails:
    max_stop_pct: 0.1
    min_stop_pct: 0.01
  initial_r: 6.0
  trailing:
    enabled: true
    activation_r: 6.0
    trail_r: 5.0
  type: trailing

take_profit:
  enabled: false

version: 3
