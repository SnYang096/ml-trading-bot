# SRB execution MVP：固定 RR + EMA1200 结构出场，不加仓（与 TPC 加仓版区分）
execution_constraints:
  allow_add_on: false
  min_order_interval_minutes: 15

holding:
  max_holding_bars: 200
  time_stop_bars: 0

stop_loss:
  type: fixed
  initial_r: 2.0
  structural_exit: ema1200
  trailing:
    enabled: false
    activation_r: 2.0
    trail_r: 2.0

take_profit:
  enabled: true
  target_r: 4.0

breakeven:
  enabled: false
  trigger_r: 2

version: 1
