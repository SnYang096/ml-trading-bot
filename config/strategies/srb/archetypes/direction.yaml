# SRB 方向 — ROC(20) 速度符号 + EMA1200 宏观带通
#
# 与 BPC / TPC / ME 的区分：
# - **BPC**：Donchian 突破方向 × MACD × EMA1200。
# - **TPC / 旧 SRB**：MACD sign × EMA1200（同源拥挤）。
# - **ME**：accel / cvd / macd 级联 × VWAP1200。
# - **SRB（本文件）**：**roc_20 符号** 作为方向速度源，**ema_1200_position** 仅作宏观同向过滤；
#   与 MACD 解耦，减少与 TPC 同图「跟 MACD 抖动」的拥挤。

description: "SRB 方向 — ROC(20) sign 与 EMA1200 相对位置同号（signal_match_position_band）"

direction_rules:
  - id: srb_roc20_ema1200_align
    method: signal_match_position_band
    description: "20 根价格速度方向；须落在 EMA1200 多/空带通内"
    signal_rules:
      - feature: roc_20
        transform: sign
    position_band:
      feature: ema_1200_position
      inner_abs: 0
      outer_abs: 1
