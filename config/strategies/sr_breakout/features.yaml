name: sr_breakout
description: >
  SR breakout strategy focusing on breakout quality, momentum persistence,
  and liquidity void confirmation using WPT/Hilbert/Spectrum features.

feature_pipeline:
  requested_features:
    # WPT 特征（多尺度突破分析）
    - wpt_price_reconstructed  # 包含: wpt_price_trend, wpt_price_fluctuation, wpt_price_reconstructed
    - wpt_price_fluctuation    # 包含: wpt_price_energy_low_ratio, wpt_price_energy_mid_ratio, wpt_price_energy_high_ratio
    - wpt_volume_energy        # 包含: wpt_vper_low, wpt_vper_mid, wpt_vper_high, wpt_energy_cascade, wpt_multi_scale_consistency, wpt_breakout_confidence, wpt_false_breakout_risk
    - wpt_cvd_fluctuation      # CVD 波动（资金流去趋势，识别假突破）
    - hurst_price
    - hurst_cvd  # CVD 资金流的持续性（识别假突破）
    # 流动性特征
    - liquidity_void            # 包含: liquidity_void_detected, liquidity_void_speed, liquidity_void_volume_ratio, liquidity_void_retracement, liquidity_void_false_breakout_risk
    - wpt_vpvr                  # 包含: vpvr_pvp, vpvr_hvn_count, vpvr_lvn_count, vpvr_lvn_distance, vpvr_volume_density, vpvr_price_in_lvn
    # 频谱特征（精确选择）- 作为"环境传感器"，动态调节突破信号权重
    # 核心逻辑：频谱 ≠ 直接信号，而是"市场可交易性诊断器"
    # 
    # 使用方式（参考文档）：
    # 1. High-Freq Energy Ratio ↓ + Spectral Flatness ↓ → 允许突破（市场干净，噪声低）
    # 2. High-Freq Energy Ratio ↑ → 降低突破信号权重（高频噪声多，假突破泛滥）
    # 3. Spectral Flatness < 阈值 → 允许突破（市场有结构，非白噪声）
    # 
    # 注意：阈值由 LightGBM 模型自动学习，不需要硬编码
    # 上述阈值说明仅用于理解特征含义，实际使用中模型会根据数据自动学习最优阈值
    - spectrum_features_sr_breakout  # 精确选择：high_freq_ratio, flatness, low_freq_ratio, entropy
    # 交互特征（状态 × 动量）
    - liquidity_void_x_wpt_risk  # 流动性真空 × WPT 假突破风险（识别假突破）
    - hurst_x_trend_r2  # Hurst × 趋势 R²（确认突破质量）
    # Hilbert 特征（识别假突破 + 背离信号）
    - hilbert_phase
    - hilbert_price_env
    - hilbert_cvd_env
    - hilbert_cvd_price_env_ratio
    # Hilbert 高级功能：成交量融合（识别假突破）+ 三元背离信号
    - hilbert_volume_env
    - hilbert_env_price_vol_ratio
    - hilbert_triple_divergence
    # 订单流特征（VPIN + Trade Clustering）- 包含多维统计特征（关键改进：保留峰值信号）
    # 新增多维特征（自动包含，无需单独添加）：
    # - vpin: 均值（整体不平衡度，向后兼容）
    # - vpin_max: 峰值（捕捉极端知情交易，避免峰值被稀释，关键！推荐用于突破确认）
    # - vpin_last: 最新值（反映最新情绪）
    # - vpin_count: 事件数（代理流动性，区分突发事件vs持续活跃）
    # - vpin_signed_imbalance_max: Signed imbalance 峰值（最大买卖压力方向）
    # 推荐组合：vpin_max（峰值异常）+ vpin_count（流动性）+ vpin_zscore_20（异常检测）
    - vpin_features
    # 单根K线 Footprint 特征（POC/HVN/LVN/VAH/VAL + delta/imbalance/skew/exhaustion/divergence）
    - footprint_basic
    # VPIN × Trade Clustering 交叉特征（SR 突破策略）
    - vpin_zscore_x_trade_cluster_max_buy_run  # 异常订单流不平衡 × 连续买入（突破确认）
    - vpin_signed_imbalance_x_trade_cluster_imbalance  # 方向一致性（突破方向验证）
    # DTW 形态匹配特征（改进版：突破形态识别）
    # 专注于突破形态：头肩顶/底、双顶/底（突破确认）
    # 只包含突破形态及其反向模板，用于对比学习
    - dtw_features_breakout
  # 注意：post_processors 和 selector 已移除，特征选择通过 YAML 中的精确特征定义完成
  # 所有特征通过统一的 feature_dependencies.yaml 加载，不需要策略特定的处理函数
  ensure_signal_column:
    name: signal
    default_value: 0

