name: sr_breakout
description: 'SR breakout strategy focusing on breakout quality, momentum persistence,
  and liquidity void confirmation using WPT/Hilbert/Spectrum features.

  '
feature_pipeline:
  requested_features:
  # Recommended baseline (node-level) for rolling training
  #
  # Source:
  # - feature-group-search (semantic groups + Pool-B), tag=20260103_norm_full
  # - results json: results/feature_group_search/sr_breakout_greedy_poolb_semantic_20260103_norm_full/feature_group_search_result.json
  #
  # Notes:
  # - Keep this node-level baseline for stability and synergy.
  # - We also ran a singleton semantic-column ablation (tag=20260103_norm_full_singletons),
  #   but its final Sharpe_mean was lower for sr_breakout.
  # For multi-asset training, prefer scale-free volatility inputs:
  - atr_ratio_f
  - poc_hal_features_close_f
  - macd_f
  - rsi_f
  - trend_r2_20_f
  - bb_width_f
  - wick_ratios_f
  - volume_ratio_f
  - trade_cluster_scene_semantic_scores_f
  - sma_200_f
  ensure_signal_column:
    name: signal
    default_value: 0
