name: sr_breakout__suggested
description: 'SR breakout strategy focusing on breakout quality, momentum persistence,
  and liquidity void confirmation using WPT/Hilbert/Spectrum features.

  '
feature_pipeline:
  requested_features:
  - wpt_price_reconstructed_f
  - wpt_price_fluctuation_f
  - wpt_volume_energy_f
  - wpt_cvd_fluctuation_f
  - hurst_price_f
  - hurst_cvd_f
  - liquidity_void_f
  - volume_profile_vpvr_f
  - spectrum_features_sr_breakout_f
  - liquidity_void_x_wpt_risk_f
  - hurst_x_trend_r2_f
  - hilbert_phase_f
  - hilbert_price_env
  - hilbert_cvd_env
  - hilbert_cvd_price_env_ratio
  - hilbert_volume_env
  - hilbert_env_price_vol_ratio
  - hilbert_triple_divergence
  - vpin_features_f
  - footprint_basic_f
  - vpin_zscore_x_trade_cluster_max_buy_run_f
  - vpin_signed_imbalance_x_trade_cluster_imbalance_f
  - dtw_features_breakout_f
  - trade_cluster_scene_semantic_scores_f
  - wick_scene_semantic_scores_f
  ensure_signal_column:
    name: signal
    default_value: 0
  invert_features: []
feature_group_search:
  base_strategy_dir: config/strategies/sr_breakout
  objective: Sharpe_mean
  min_trades: 10
  seeds:
  - 1
  - 2
  - 3
  - 4
  - 5
  selected_groups:
  - trade_cluster_scene
  - wick_scene
  stop_reason: no_improvement
  base_features:
  - wpt_price_reconstructed_f
  - wpt_price_fluctuation_f
  - wpt_volume_energy_f
  - wpt_cvd_fluctuation_f
  - hurst_price_f
  - hurst_cvd_f
  - liquidity_void_f
  - volume_profile_vpvr_f
  - spectrum_features_sr_breakout_f
  - liquidity_void_x_wpt_risk_f
  - hurst_x_trend_r2_f
  - hilbert_phase_f
  - hilbert_price_env
  - hilbert_cvd_env
  - hilbert_cvd_price_env_ratio
  - hilbert_volume_env
  - hilbert_env_price_vol_ratio
  - hilbert_triple_divergence
  - vpin_features_f
  - footprint_basic_f
  - vpin_zscore_x_trade_cluster_max_buy_run_f
  - vpin_signed_imbalance_x_trade_cluster_imbalance_f
  - dtw_features_breakout_f
  final_features:
  - wpt_price_reconstructed_f
  - wpt_price_fluctuation_f
  - wpt_volume_energy_f
  - wpt_cvd_fluctuation_f
  - hurst_price_f
  - hurst_cvd_f
  - liquidity_void_f
  - volume_profile_vpvr_f
  - spectrum_features_sr_breakout_f
  - liquidity_void_x_wpt_risk_f
  - hurst_x_trend_r2_f
  - hilbert_phase_f
  - hilbert_price_env
  - hilbert_cvd_env
  - hilbert_cvd_price_env_ratio
  - hilbert_volume_env
  - hilbert_env_price_vol_ratio
  - hilbert_triple_divergence
  - vpin_features_f
  - footprint_basic_f
  - vpin_zscore_x_trade_cluster_max_buy_run_f
  - vpin_signed_imbalance_x_trade_cluster_imbalance_f
  - dtw_features_breakout_f
  - trade_cluster_scene_semantic_scores_f
  - wick_scene_semantic_scores_f
  groups_source: groups_yaml:auto:config/feature_groups_sr_breakout_semantic.yaml
  groups_yaml_auto: true
  pool_b_yaml: null
  pool_b_merged_singletons: false
  feature_blacklist: []
