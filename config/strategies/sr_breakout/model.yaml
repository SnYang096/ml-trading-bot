name: sr_breakout

trainer:
  module: src.time_series_model.strategies.models.strategy_trainer
  function: train_strategy_model
  params:
    model_type: xgboost
    task_type: regression
    target_col: label
    n_splits: 5
    tscv_gap: 24
    use_gpu: true
    model_params:
      max_depth: 6
      learning_rate: 0.05
      n_estimators: 600
      subsample: 0.8
      colsample_bytree: 0.8
      random_state: 42

prediction:
  method: ensemble_mean
  model_type: xgboost

output:
  save_results: true
  filename: results.json

