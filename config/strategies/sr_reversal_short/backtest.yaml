backtest:
  enabled: true
  params:
    price_col: close
    # Direction-fixed probability gating:
    # - sr_reversal_short is short_only => `pred` is P(success of a short trade)
    # - enter when pred >= entry_threshold
    entry_threshold: 0.6
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
    freq: "4H"
    use_signal_direction: false  # short_only: direction is fixed by strategy config (labels.combine_mode)
    use_rr_exit: true            # exits strictly follow 1R/2R simulation
    rr:
      max_holding_bars: 50       # 与 compute_sr_reversal_label 默认一致
      stop_loss_r: 1.0
      take_profit_r: 2.0
      atr_window: 14
      entry_offset: 1
      entry_price_col: open
    # Optional safety fuse: when too far from SR (normalized by ATR), do not trade.
    sr_fuse:
      enabled: true
      dist_col: dist_to_nearest_sr
      atr_col: atr
      max_dist_atr: 6.0
      on_missing: skip   # skip|block
    debug: true