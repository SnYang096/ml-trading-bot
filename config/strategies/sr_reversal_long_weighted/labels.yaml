name: sr_reversal_long_weighted
target_column: label

# 使用新的带权重的标签生成函数
label_generator:
  module: src.time_series_model.strategies.labels.sr_reversal_label
  function: compute_sr_reversal_label_with_weights
  params:
    max_holding_bars: 50
    take_profit_r: 4.0
    stop_loss_r: 1.0
    combine_mode: long_only
    # 可选：只在 SR 附近保留标签
    # 使用 dist_to_sr_col（推荐，无需额外特征计算）
    dist_to_sr_col: dist_to_nearest_sr
    dist_atr_mult: 1.5
    # 或者使用 sr_mask_col（需要先计算 is_near_sr 特征）
    # sr_mask_col: is_near_sr
    
    # 样本权重配置
    compute_weights: true
    return_weights: false  # 如果为 true，需要修改训练代码以接收 (labels, weights) 元组
    weight_strategy: result_based_rr  # 可选: uniform, result_based_rr, sr_strength, triple_resonance, cvd_confirmation, distance_based, composite
    
    # 权重策略配置（根据 weight_strategy 选择）
    weight_config:
      # 基于未来 RR 的结果驱动加权（推荐）
      logic_mode: triple_resonance  # 逻辑分模式：triple_resonance, sr_strength, cvd_only, none
      
      # 三重共振逻辑分配置
      vpin_col: vpin
      vpin_threshold: 0.7
      cvd_slope_col: cvd_slope_5_f
      cvd_slope_threshold: 0.0
      sr_strength_col: sr_strength_max
      sr_strength_threshold: 0.5
      logic_base: 1.0      # 基础逻辑分
      logic_boost: 1.5     # 三重共振时的加成
      
      # RR 计算参数
      max_holding_bars: 50
      stop_loss_r: 1.0
      take_profit_r: 4.0
      rr_ratio: 4.0
      
      # 权重计算参数（RR分级处理）
      min_rr_threshold: 1.0    # RR 低于此值视为亏损（已废弃，使用 medium_rr_threshold）
      medium_rr_threshold: 1.0  # 中等RR阈值（1.0 <= RR < high_rr_threshold）
      high_rr_threshold: 2.0    # 高RR阈值（RR >= 2.0 时使用高权重）
      high_rr_boost: 2.0        # 高RR加成倍数（RR >= 2.0 时权重 = log(1+RR) * high_rr_boost，盈利样本优先）
      loss_weight: 0.0          # 亏损样本的权重（RR < medium_rr_threshold）— 直接忽略
      min_total_weight: 1e-6    # 防止所有权重为0导致训练失败
      normalize_weights: true   # 归一化权重

filters:
  - column: label
    notna: true

post_label_filters:
  []

notes: |
  标签：TP 先于 SL → 1.0；SL 先于 TP → 0.0；超时 → NaN。
  
  样本权重（result_based_rr 策略）：
  - 权重公式：Logic_Score * log(1 + RR)
  - 逻辑成立且利润丰厚（RR > 1）：高权重
  - 逻辑成立但结果失败（RR < 1）：低权重（0.05）
  - 三重共振样本：逻辑分加成 1.5 倍
  
  权重策略说明：
  1. uniform: 统一权重 1.0
  2. result_based_rr: 基于未来 RR 的结果驱动加权（⭐ 推荐）
  3. sr_strength: 基于 SR 强度分级加权
  4. triple_resonance: VPIN + CVD + SR 三重共振加权
  5. cvd_confirmation: CVD 确认加权
  6. distance_based: 基于距离 SR 的远近加权
  7. composite: 组合多种策略的加权

