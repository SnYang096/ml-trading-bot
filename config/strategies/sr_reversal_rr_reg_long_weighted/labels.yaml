name: sr_reversal_rr_reg_long_weighted
target_column: rr_label

# 使用新的带权重的连续 RR 标签生成函数（回归任务）
label_generator:
  module: src.time_series_model.strategies.labels.sr_reversal_label
  function: compute_sr_reversal_rr_continuous_label_with_weights
  params:
    max_holding_bars: 50
    take_profit_r: 2.0
    stop_loss_r: 1.0
    combine_mode: long_only  # 确保策略方向为 long_only，用于 use_rr_exit
    # 使用 dist_to_sr_col（推荐，无需额外特征计算）
    dist_to_sr_col: dist_to_nearest_sr
    dist_atr_mult: 1.5
    # 或者使用 sr_mask_col（需要先计算 is_near_sr 特征）
    # sr_mask_col: is_near_sr
    
    # 样本权重配置
    compute_weights: true
    return_weights: false  # 如果为 true，需要修改训练代码以接收 (labels, weights) 元组
    weight_strategy: result_based_rr  # 基于未来 RR 的结果驱动加权（⭐ 推荐）
    
    # 权重策略配置
    weight_config:
      # 逻辑分模式：
      # - triple_resonance 更“窄”，容易过拟合/降低泛化（回测可能反而弱）
      # - none 更“软”，让 RR 结果主导权重（更稳更泛化）
      logic_mode: none
      
      # 三重共振逻辑分配置
      vpin_col: vpin
      vpin_threshold: 0.7
      cvd_slope_col: cvd_slope_5_f
      cvd_slope_threshold: 0.0
      sr_strength_col: sr_strength_max
      sr_strength_threshold: 0.5
      logic_base: 1.0      # 基础逻辑分
      logic_boost: 1.0     # logic_mode=none 时无效，保留为默认
      
      # 对于回归任务，可以直接使用计算好的 RR 值（通过 rr_col 指定）
      # 如果未指定 rr_col，会自动使用计算好的 rr_label
      # rr_col: rr_label  # 可选：显式指定，通常不需要
      
      # 权重计算参数（RR分级处理）
      min_rr_threshold: 1.0    # RR 低于此值视为亏损（已废弃，使用 medium_rr_threshold）
      medium_rr_threshold: 1.0  # 中等RR阈值（1.0 <= RR < high_rr_threshold）
      high_rr_threshold: 2.0    # 高RR阈值（RR >= 2.0 时使用高权重）
      high_rr_boost: 2.0        # 高RR加成倍数（RR >= 2.0 时权重 = log(1+RR) * high_rr_boost，盈利样本优先）
      # 关键：不要把亏损样本权重设为 0（会导致“有效样本骤减”，回归排序容易失真）
      loss_weight: 0.15
      min_total_weight: 1e-6    # 防止所有权重为0导致训练失败
      normalize_weights: true   # 归一化权重

filters:
  - column: rr_label
    notna: true

post_label_filters:
  []

notes: |
  连续 R/R 标签（MFE/MAE 比例），仅 SR 附近保留，其他置 NaN。
  
  样本权重（result_based_rr 策略）：
  - 权重公式：Logic_Score * log(1 + RR)
  - 逻辑成立且利润丰厚（RR > 1）：高权重
  - 逻辑成立但结果失败（RR < 1）：低权重（0.05）
  - 三重共振样本：逻辑分加成 1.5 倍
  
  回归模型优势：
  - 不需要调整 entry_threshold
  - 通过 top_quantile 选择交易信号（更自适应）
  - 模型预测连续 RR 值，更精确

