name: sr_breakout__suggested
description: 'SR breakout strategy focusing on breakout quality, momentum persistence,
  and liquidity void confirmation using WPT/Hilbert/Spectrum features.

  '
feature_pipeline:
  exclude_columns:
  - atr
  requested_features:
  - atr_f
  - poc_hal_features_close_f
  - trade_cluster_scene_semantic_scores_f
  - net_buy_usd_over_mcap
  - trade_cluster_absorption_scene_score
  ensure_signal_column:
    name: signal
    default_value: 0
  invert_features:
  - hal_mid
  - trade_cluster_compression_score
  - trade_cluster_exhaustion_scene_score
feature_group_search:
  base_strategy_dir: /workspaces/ml_trading_bot/config/strategies/sr_breakout
  objective: CV_mean
  min_trades: 10
  seeds:
  - 1
  - 2
  selected_groups:
  - poolb__trade_cluster_scene_semantic_scores_f
  - market_cap_norm__net_buy_usd_over_mcap
  - trade_cluster_scene__absorption
  stop_reason: completed
  base_features:
  - atr_f
  - poc_hal_features_close_f
  final_features:
  - atr_f
  - poc_hal_features_close_f
  - trade_cluster_scene_semantic_scores_f
  - net_buy_usd_over_mcap
  - trade_cluster_absorption_scene_score
  groups_source: groups_yaml:auto:config/feature_groups_sr_breakout_semantic.yaml
  groups_yaml_auto: true
  pool_b_yaml: /workspaces/ml_trading_bot/results/pools/sr_breakout/pool_b/20260108_best_abc/features_pool_b.yaml
  pool_b_merged_singletons: true
  feature_blacklist: []
