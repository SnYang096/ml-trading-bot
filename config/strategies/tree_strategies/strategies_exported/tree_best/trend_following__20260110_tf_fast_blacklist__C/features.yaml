name: trend_following__suggested
description: 'Trend-following strategy leveraging WPT trend, Hurst persistence, Hilbert
  phase stability, and multi-timeframe context features.

  '
feature_pipeline:
  exclude_columns:
  - atr
  requested_features:
  - atr_f
  - macd_atr_f
  - rsi_f
  - trend_r2_20_f
  - bb_width_f
  - wick_ratios_f
  - volume_ratio_f
  - funding_scene_semantic_scores_f
  invert_features:
  - atr
  - evt_x_trend_r2
feature_group_search:
  base_strategy_dir: /workspaces/ml_trading_bot/config/strategies/trend_following
  objective: Sharpe_mean
  min_trades: 10
  seeds:
  - 1
  - 2
  - 3
  - 4
  - 5
  selected_groups:
  - kline_core
  - trade_cluster_scene
  - poolb__wpt_cvd_fluctuation_f
  - funding_scene
  - poolb__atr_f
  stop_reason: completed
  base_features:
  - atr_f
  final_features:
  - atr_f
  - macd_atr_f
  - rsi_f
  - trend_r2_20_f
  - bb_width_f
  - wick_ratios_f
  - volume_ratio_f
  - trade_cluster_scene_semantic_scores_f
  - wpt_cvd_fluctuation_f
  - funding_scene_semantic_scores_f
  - atr_f
  groups_source: groups_yaml:/workspaces/ml_trading_bot/results/feature_group_search/trend_following_pipeline_poolb_semantic_20260110_tf_fast_blacklist_B/shortlist_groups_B.yaml
  groups_yaml_auto: false
  pool_b_yaml: /workspaces/ml_trading_bot/results/pools/trend_following/pool_b/20260110_tf_fast_blacklist/features_pool_b.yaml
  pool_b_merged_singletons: true
  feature_blacklist:
  - order_flow_all_features_f
  - footprint_basic_f
  - dtw_features_reversal_f
  - dtw_features_trend_f
  - spectrum_features_f
