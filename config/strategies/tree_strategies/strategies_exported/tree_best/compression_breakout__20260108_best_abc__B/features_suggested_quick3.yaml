name: compression_breakout__suggested
description: 'Compression breakout strategy combining compression strength, trigger,
  and direction confirmation signals across WPT/VPVR/Spectrum domains.

  '
feature_pipeline:
  requested_features:
  - compression_duration_f
  - atr_f
  ensure_signal_column:
    name: signal
    default_value: 0
  invert_features: []
feature_group_search:
  base_strategy_dir: config/strategies/compression_breakout
  objective: Sharpe_mean
  min_trades: 10
  seeds:
  - 1
  selected_groups: []
  stop_reason: no_improvement
  base_features:
  - compression_duration_f
  - atr_f
  final_features:
  - compression_duration_f
  - atr_f
  groups_source: groups_yaml:auto:config/feature_groups_compression_breakout_semantic.yaml
  groups_yaml_auto: true
  pool_b_yaml: /dev/null
  pool_b_merged_singletons: true
  feature_blacklist:
  - vpin_scene_semantic_scores_f
  - market_cap_normalized_orderflow_f
