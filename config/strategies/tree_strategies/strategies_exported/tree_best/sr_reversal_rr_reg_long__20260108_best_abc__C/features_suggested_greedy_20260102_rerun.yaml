notes: '基于 feature-group-search 列级别分析优化的配置。


  优化点：

  1. 移除 trend_r2_50_f（Sharpe -1.504，严重负面）

  2. 添加 volume_profile_volatility_features_f（Sharpe +18%）

  3. 保留 sqs_hal_high_f（Sharpe +36%，关键特征）


  预期 Sharpe: ~2.0+ (基于 feature-group-search 最佳组合)


  参考文档: docs/strategies/BEST_FEATURE_COLUMNS_BY_STRATEGY.md

  '
feature_group_search:
  base_strategy_dir: config/strategies/sr_reversal_rr_reg_long
  objective: Sharpe_mean
  min_trades: 10
  seeds:
  - 1
  - 2
  - 3
  - 4
  - 5
  selected_groups:
  - volume_profile_scene
  - volume_profile
  stop_reason: no_improvement
  base_features:
  - poc_hal_features_close_f
  - atr_f
  final_features:
  - poc_hal_features_close_f
  - atr_f
  - volume_profile_scene_semantic_scores_f
  - volume_profile_volatility_features_f
  groups_source: groups_yaml:auto:config/feature_groups.yaml
