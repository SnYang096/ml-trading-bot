name: sr_reversal_rr_reg_long__suggested
description: 'Regression mainline (optimized): 基于 feature-group-search 列级别分析优化'
feature_pipeline:
  requested_features:
  - poc_hal_features_close_f
  - atr_f
  - volume_profile_scene_semantic_scores_f
  - volume_profile_volatility_features_f
  ensure_signal_column:
    name: signal
