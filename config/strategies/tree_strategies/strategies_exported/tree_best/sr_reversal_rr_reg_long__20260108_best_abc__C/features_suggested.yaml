name: sr_reversal_rr_reg_long__suggested
description: 'Regression mainline (best-known): kline_core + vpin_scene + minimal
  SR-distance features (stable, no ticks)'
feature_pipeline:
  requested_features:
  - macd_atr_f
  - rsi_f
  - sma_200_f
  - atr_f
  - trend_r2_20_f
  - bb_width_f
  - wick_ratios_f
  - roc_5_f
  - mom_10_f
  - bbands_f
  - trend_r2_50_f
  - acceleration_3_f
  - price_range_symmetry_f
  - vpin_scene_semantic_scores_f
  - poc_hal_features_close_f
  - sqs_hal_high_f
  - sqs_hal_low_f
  - sr_strength_max_close_f
  - dtw_features_breakout_f
  - evt_features_f
  ensure_signal_column:
    name: signal
    default_value: 0
  invert_features:
  - direction_to_nearest_sr
  - dl_seq_f19
  - dl_seq_f31
  - dl_seq_f35
  - dl_seq_f40
  - dtw_bear_flag_dist_w45
  - dtw_decline_consolidation_dist_w40
  - dtw_decline_consolidation_dist_w50
  - dtw_double_bottom_dist_w50
  - dtw_hammer_dist_w30
  - dtw_head_shoulder_top_dist_w60
  - dtw_random_20_dist_w60
  - evt_scale_right
  - garch_alpha
  - garch_beta
  - garch_leverage_gamma
  - hurst_volume_rolling
  - sqs_hal_high
  - sqs_hal_low
  - sr_strength_max
  - trade_cluster_imbalance_zscore_50
  - trade_cluster_net_runs_ratio
  - trade_cluster_net_runs_zscore_20
  - trend_r2_50
  - vol_range_10
  - vp_poc_deviation
  - wpt_multi_scale_consistency
  - wpt_price_energy_low_ratio
notes: 'Best-known regression mainline feature set (stable, no ticks).

  Updated with best features from feature-group-search:

  - kline_core: macd_atr_f, rsi_f, sma_200_f, atr_f, trend_r2_20_f, bb_width_f, wick_ratios_f

  - vpin_scene: vpin_scene_semantic_scores_f

  Expected Sharpe: ~1.85 (from feature-group-search results)

  '
feature_group_search:
  base_strategy_dir: config/strategies/sr_reversal_rr_reg_long
  objective: Sharpe_mean
  min_trades: 10
  seeds:
  - 1
  - 2
  - 3
  - 4
  - 5
  selected_groups:
  - poolb__dtw_features_breakout_f
  - poolb__evt_features_f
  stop_reason: no_improvement
  base_features:
  - macd_atr_f
  - rsi_f
  - sma_200_f
  - atr_f
  - trend_r2_20_f
  - bb_width_f
  - wick_ratios_f
  - roc_5_f
  - mom_10_f
  - bbands_f
  - trend_r2_50_f
  - acceleration_3_f
  - price_range_symmetry_f
  - vpin_scene_semantic_scores_f
  - poc_hal_features_close_f
  - sqs_hal_high_f
  - sqs_hal_low_f
  - sr_strength_max_close_f
  final_features:
  - macd_atr_f
  - rsi_f
  - sma_200_f
  - atr_f
  - trend_r2_20_f
  - bb_width_f
  - wick_ratios_f
  - roc_5_f
  - mom_10_f
  - bbands_f
  - trend_r2_50_f
  - acceleration_3_f
  - price_range_symmetry_f
  - vpin_scene_semantic_scores_f
  - poc_hal_features_close_f
  - sqs_hal_high_f
  - sqs_hal_low_f
  - sr_strength_max_close_f
  - dtw_features_breakout_f
  - evt_features_f
  groups_source: groups_yaml:config/feature_groups_sr_reversal_semantic.yaml
  groups_yaml_auto: false
  pool_b_yaml: results/pools/sr_reversal_rr_reg_long/pool_b/features_pool_b.yaml
  pool_b_merged_singletons: true
  feature_blacklist: []
