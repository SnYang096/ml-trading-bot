# fast_scalp: 树通道——short-horizon 浅树直接给出开仓方向（H ≈ 3 bar）
#
# 设计文档：docs/strategy/短期树独立策略_设计与落地_CN.md
# 与 C 系统 trend_scalp 的节奏对标（单腿；不并入 B 的 evidence）。

strategy:
  name: fast-scalp-tree-120T
  description: |
    Single shallow tree predicts signed forward RR @ H=3; sign × |score| > τ
    triggers a single-leg entry. Regime layer is **shared** with B
    (|ema_1200_position| ≥ 0.10 and chop ≤ 0.4). No prefilter / no gate /
    no entry filter — the tree IS the decision.
  owner: quant_team
  archetype: TreeDirectionFast
  timeframe: "120T"
  symbol_include:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - BNBUSDT
    - XRPUSDT
    - ADAUSDT
  symbol_exclude: []
  macro_tp_vwap_anchor:
    enabled: false
    symbol: BTCUSDT
