# fast_scalp_majors — same single-leg RR execution as fast_scalp (H=3).

add_position:
  enabled: false

execution_constraints:
  allow_add_on: false
  min_order_interval_minutes: 0

holding:
  max_holding_bars: 6
  time_stop_bars: 6

stop_loss:
  type: trailing
  initial_r: 4.0
  atr_col: atr
  atr_window: 14
  trailing:
    enabled: true
    trail_r: 1.5
    activation_r: 0.0
    expand_with_primary_atr: true
  guardrails:
    min_stop_pct: 0.01
    max_stop_pct: 0.2

take_profit:
  enabled: false

position_sizing:
  type: atr_risk
  risk_pct: 0.005
  atr_col: atr
  atr_window: 14
  max_size_cap: 5
