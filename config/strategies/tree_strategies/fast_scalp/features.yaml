# fast_scalp R&D wide candidate pool — IC prune in-place before production train.
#
# Sources merged (deduped by *_f node name):
#   - config/strategies/_shared/features.yaml (B: bpc/tpc/me/srb union)
#   - config/strategies/chop_grid/features.yaml + trend_scalp/features.yaml (C)
#   - config/strategies/tree_strategies/trend_following/features_suggested_20260128.yaml (legacy nodes only)
#
# After factor-eval / research ic, keep columns with best_lag ∈ {1,3,5} AND |rank_ic| > 0.02.

name: fast_scalp
description: |
  Short-horizon direction tree (H=3, lag 1–5). Wide candidate pool for IC screening;
  prune requested_features to ≤30 columns after holdout IC table.

