# Invert Feature Candidates for sr_reversal_rr_reg_long
#
# 来源: feature-group-search 结果 (2026-01-01)
# 文档: docs/strategies/FEATURE_GROUP_SEARCH_INTERIM_RESULTS.md
# 结果目录: results/feature_group_search/sr_reversal_expanded/
#
# 这些特征在"正常"使用时拉低 Sharpe，
# 但 invert 后可能变成正向信号。
#
# 使用方法:
# 1. 从此列表选择特征加入 features.yaml 的 invert_features
# 2. 重新运行 feature-group-search 验证
# 3. 如果 Sharpe 提升，保留；否则踢掉

# ============================================
# 严重负面特征（优先尝试 invert）
# ============================================

tier_1_severe:
  # Sharpe = -1.504 (baseline = 1.529)
  - trend_r2_50_f
  
  # Sharpe = -0.866
  - dtw_features_reversal_f
  
  # Sharpe = -0.765
  - order_flow_all_features_f

# ============================================
# 中度负面特征
# ============================================

tier_2_moderate:
  # Sharpe = -0.714
  - dtw_features_trend_f
  
  # Sharpe = -0.397
  - extended_volatility_features_f

# ============================================
# 使用建议
# ============================================
# 
# 1. 先尝试 tier_1_severe 中的特征
# 2. 在 features.yaml 中添加:
#
#    feature_pipeline:
#      invert_features:
#        - trend_r2_50_f
#
# 3. 运行 feature-group-search 或 train 验证
# 4. 如果 Sharpe 提升，说明 invert 有效

