# Single-leg execution driven by tree `score`. Promote τ from holdout plateau.

backtest:
  enabled: true
  params:
    price_col: close
    freq: "120T"
    use_signal_direction: true
    long_entry_threshold: 0.55      # fill from holdout plateau
    long_exit_threshold: 0.50
    short_entry_threshold: 0.45
    short_exit_threshold: 0.50
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
    max_holding_bars: 40            # ≈ 2× H
    allow_flip: false
    use_trailing_stop: true
    trailing_atr_mult: 2.0
    atr_col: atr14
    atr_window: 14
    pyramiding:
      enabled: false
    position_sizing:
      type: atr_risk
      risk_pct: 0.01                # matches B swing risk
      atr_col: atr14
      atr_window: 14
      max_size_cap: 8
