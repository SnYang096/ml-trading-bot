# short_term_swing: 树通道——slow-horizon 浅树直接给出开仓方向（H ≈ 20 bar）
#
# 设计文档：docs/strategy/短期树独立策略_设计与落地_CN.md
# 与 B 系统所有 trend-swing 策略（BPC/TPC/ME/SRB）的节奏对标，但**独立** PCM
# 槽位，不并入 evidence 缩放。

strategy:
  name: short-term-swing-tree-120T
  description: |
    Single shallow tree predicts signed forward RR @ H=20; sign × |score| > τ
    triggers a single-leg entry. Regime layer shared with B; no prefilter /
    no gate / no entry filter. The tree's slow-IC feature pool overlaps B
    swing strategies but the slug runs independently in PCM.
  owner: quant_team
  archetype: TreeDirectionSwing
  timeframe: "120T"
  symbol_include:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - BNBUSDT
    - XRPUSDT
    - ADAUSDT
  symbol_exclude: []
  macro_tp_vwap_anchor:
    enabled: false
    symbol: BTCUSDT
