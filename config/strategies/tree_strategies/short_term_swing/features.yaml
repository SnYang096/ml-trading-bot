# short_term_swing features — only columns whose IC peaks at lag ∈ {10,20} bars.
#
# Populate via ic-prune with allowed_best_lags=10,20 on slow hypothesis prepare pool
# (NOT fast_scalp evt/box nodes). See docs/strategy/短期树独立策略_设计与落地_CN.md §4.2.

name: short_term_swing
description: 'IC-pruned @ holdout best_lag in {10,20}, |IC|>=0.015, target=label,
  top-20 columns (column singletons).

  '
feature_pipeline:
  exclude_columns:
  - atr
  requested_features:
  - atr_f
  - dtw_triangle_dist_w50
  - dtw_triangle_dist_w45
  - dtw_bullish_engulfing_dist_w40
  - box_pos_60
  - cvd_divergence_score
  - trend_div_alignment
  - bb_width_normalized_pct
  - bb_lower
  - dtw_double_top_inverse_dist_w50
  - bpc_impulse_return_atr
  - macd_atr
  - dtw_random_30_dist_w40
  - roc_20
  - cvd_divergence_score_pct
  - macdext_atr_norm
  - spectrum_cvd_low_freq_ratio
  - box_stability_60
  - macdext
  - dist_to_zz_high_atr
  - ppo
