# short_term_swing features — only columns whose IC peaks at lag ∈ {10,20} bars.
#
# Populate via ic-prune with allowed_best_lags=10,20 on slow hypothesis prepare pool
# (NOT fast_scalp evt/box nodes). See docs/strategy/短期树独立策略_设计与落地_CN.md §4.2.

name: short_term_swing
description: 'IC-pruned @ holdout best_lag in {10,20}, |IC|>=0.015, target=label,
  top-20 columns (column singletons).

  '
feature_pipeline:
  exclude_columns:
  - atr
  requested_features:
  - atr_f
  - bb_width_normalized_pct
  - macd_atr
  - wpt_ignition_score
  - wpt_absorption_score
  - wpt_exhaustion_score
  - wpt_compression_score
