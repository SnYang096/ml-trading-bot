# Signed forward RR over H=20 bars (ATR-normalized).

name: short_term_swing_signed_forward_rr_h20
target_column: label

label_generator:
  module: src.time_series_model.strategies.labels.forward_rr_signed_label
  function: compute_signed_forward_rr_label
  params:
    horizon: 20
    price_col: close
    atr_col: atr14
    rr_floor: 0.80

label_meta:
  label_type: continuous
  semantic: |
    label[t] = (close[t+20] - close[t]) / max(atr14[t], eps)
    Positive → LONG context; negative → SHORT context.
  horizon: 20 bars
  rr_floor: 0.80
  description: |
    Used by the short_term_swing single-tree direction model. Aligned with
    B-system trend swing horizon (≈ several days at 120T). Tree score → τ
    plateau on holdout → backtest.yaml long/short_entry_threshold.

filters:
  - column: label
    notna: true

post_label_filters: []
