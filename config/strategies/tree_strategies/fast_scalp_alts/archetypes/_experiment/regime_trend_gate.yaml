# Optional thin regime gates for trend ablation (实验 overlay，非 deploy 默认)
# 用法：复制/merge 到 regime.yaml 的 optional_rules 或 vector τ-scan regime_gate 参数

optional_rules:
  G1_trend_confidence:
    - feature: trend_confidence
      operator: ">="
      value: 0.7
      rationale: trend_scalp prefilter.entry_min 对齐
  G2_semantic_chop:
    - feature: bpc_semantic_chop_ts_q
      operator: "<="
      value: 0.25
      rationale: trend_scalp max_semantic_chop_entry 对齐
