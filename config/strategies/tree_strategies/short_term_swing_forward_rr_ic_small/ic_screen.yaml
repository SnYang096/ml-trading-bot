# =============================================================================
# IC screen — short_term_swing (holdout feature selection)
# =============================================================================
# Used by:  mlbot research ic-prune --strategy short_term_swing
#           rd_loop tree_steps mode=ic-prune (defaults from this file)
#
# Human rule (design doc §5.1):
#   1. Scan rank IC at every horizon in `horizons`
#   2. Keep column only if |rank_ic| PEAK is in allowed_best_lags {10, 20}
#   3. Require |IC| >= min_ic (swing tier threshold 0.015)
#   4. Reject if peak lands on reject_peak_at (H=50 slow trend)
#
# Label alignment (labels.yaml): signed forward RR @ H=20 bars
# Prepare pool: features.yaml slow hypothesis nodes (NOT fast_scalp evt/box)
# =============================================================================

ic_screen:
  target: forward_rr_h20
  label_horizon_bars: 20

  horizons: [1, 3, 5, 10, 15, 20, 50]
  allowed_best_lags: [10, 20]
  max_lag: 20
  min_ic: 0.015
  min_n: 200
  reject_peak_at: 50

  writeback:
    mode: columns
    top_n_columns: 20
    always_include: [atr_f]
    invert_mode: none
