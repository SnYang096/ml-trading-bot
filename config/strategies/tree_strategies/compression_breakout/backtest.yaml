backtest:
  enabled: true
  params:
    price_col: close
    freq: 4H
    multiclass:
      long_class: 2
      short_class: 0
      neutral_class: 1
      # Speed/robustness: avoid "predict all neutral => 0 trades" in highly imbalanced labels.
      # Use probability-threshold entries; exits are handled by RR (time-exit/SL/TP).
      entry_mode: prob_quantile
      entry_quantile: 0.90
      # No-lookahead quantile threshold (computed from proba history up to t-1)
      quantile_mode: expanding
      quantile_min_periods: 50
    # Structural safety: never hold forever if "neutral" is rarely predicted.
    max_holding_bars: 50
    # Prefer RR-consistent exits for multiclass as well (time-exit included).
    use_rr_exit: true
    # When using RR exits with direction='both' (default), direction must be defined by signal.
    # For multiclass models, entries already encode long/short via predicted class.
    use_signal_direction: true
    rr:
      atr_window: 14
      max_holding_bars: 50
      stop_loss_r: 1.0
      take_profit_r: 2.0
      entry_offset: 1
      use_time_exit: true
      # Optional (recommended for breakout-style): trailing stop to lock profit after impulse.
      # Keep pyramiding disabled (single-position). This only affects exit, not position sizing.
      use_trailing_stop: false
      trailing_atr_mult: 1.0
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001

