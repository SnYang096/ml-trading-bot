rules:
  - feature: sr_strength_max
    operator: ">="
    value: 3.259
    rationale:
      range lower, meta-algorithm, KS=0.1246, return_uplift=+1.7362, robustness=100%,
      holdout验证通过
  - feature: sr_strength_max
    operator: <=
    value: 3.771
    rationale:
      range upper, meta-algorithm, KS=0.1246, return_uplift=+1.7362, robustness=100%,
      holdout验证通过
  - feature: fer_signed_efficiency_pct
    operator: ">="
    value: 0.0
    rationale: A组基线：百分位语义下界（跨symbol可比）
    locked: true
    lock_reason: A组基线：FER失败效率百分位下界
  - feature: fer_signed_efficiency_pct
    operator: <=
    value: 0.25
    rationale: A组基线：低分位=失败效率区间，避免追随高效率趋势延续
    locked: true
    lock_reason: A组基线：FER失败效率百分位上界

  - feature: sqs_hal_high_pct
    operator: ">="
    value: 0.55
    rationale: "heuristic: short 仅在高质量阻力位触发（百分位语义），过滤弱阻力噪声"
    locked: true
    lock_reason: A组基线：阻力位质量百分位约束

  - feature: dist_to_nearest_sr
    operator: ">="
    value: -1.2
    rationale: "heuristic: 距最近SR不超过1.2ATR（下界），限制远离关键位追单"
    locked: true
    lock_reason: A组基线：SR邻域约束
  - feature: dist_to_nearest_sr
    operator: <=
    value: 1.2
    rationale: "heuristic: 距最近SR不超过1.2ATR（上界），限制远离关键位追单"
    locked: true
    lock_reason: A组基线：SR邻域约束
