name: sr_reversal_long_sr_filter
target_column: label

# 二分类（无权重，SR过滤）
label_generator:
  module: src.time_series_model.strategies.labels.sr_reversal_label
  function: compute_sr_reversal_label_full_scan
  params:
    max_holding_bars: 50
    take_profit_r: 4.0
    stop_loss_r: 1.0
    combine_mode: long_only
    # 使用 dist_to_sr_col（推荐，无需额外特征计算）
    dist_to_sr_col: dist_to_nearest_sr
    dist_atr_mult: 1.5

filters:
  - column: label
    notna: true

post_label_filters:
  []

notes: |
  标签：TP 先于 SL → 1.0；SL 先于 TP → 0.0；超时 → NaN。
  
  与 sr_reversal_long 的区别：
  - 添加了 SR 过滤（只在 SR 附近保留标签）
  - 不使用样本权重（所有样本权重 = 1.0）

