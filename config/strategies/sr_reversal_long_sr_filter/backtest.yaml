backtest:
  enabled: true
  params:
    price_col: close
    entry_threshold: 0.35
    entry_mode: level
    entry_exit_conflict: block_entry_on_exit
    max_holding_bars: 50
    force_close_on_end: true
    initial_cash: 10000
    fee: 0.0004
    slippage: 0.0001
    freq: "4H"
    use_rr_exit: true
    rr:
      max_holding_bars: 50
      stop_loss_r: 1.0
      take_profit_r: 4.0
      atr_window: 14
      entry_offset: 1
      entry_price_col: open
    sr_fuse:
      enabled: false
      dist_col: dist_to_nearest_sr
      atr_col: atr
      max_dist_atr: 6.0
      on_missing: skip
    debug: true

