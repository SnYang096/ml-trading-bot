# ME 方向 — VWAP1200 带通（主路径）+ 结构绕行（备路径）
#
# 评估顺序：先 strict VWAP 级联；若不成立（含「级联有方向但价不在带内」）再试备路径。
#
# 1) 主规则：与 BPC 同构 — me_accel_5k → me_cvd_alignment → macd_atr 级联，且须与
#    macro_tp_vwap_1200_position 多头带 / 空头带 同号。
#    outer_abs>1：归一化 p 顶到 1.0 时仍满足 strict inner<p<outer（原 outer=1 时 p==1 被挡）。
# 2) 备规则：me_vwap_structure_bypass_direction（me_vwap_structure_bypass_f）：
#    极强 accel 或三连 K 同侧 VWAP；transform: raw。
#
# 2026-04 验证: EMA1200 在 2024 中段 (May-Jul) 过于敏感，no_dir 拦截从 3→14，
# 导致 Jul 从 +29R 跌至 -0.83R。VWAP1200 对 ME 更稳定。

description: "ME 方向 — VWAP 带通级联为主；极强 accel 或三连 VWAP 侧绕行"

direction_rules:
  - id: me_accel_cvd_macd_vwap1200_align
    method: signal_match_position_band
    description: "me_accel_5k → me_cvd_alignment → macd_atr；须落在 VWAP 多/空带通内"
    signal_rules:
      - feature: me_accel_5k
        transform: sign
      - feature: me_cvd_alignment
        transform: center_sign
      - feature: macd_atr
        transform: sign
    position_band:
      feature: macro_tp_vwap_1200_position
      inner_abs: 0
      outer_abs: 1.001

  - id: me_vwap_bypass_accel_or_3bar_pierce
    feature: me_vwap_structure_bypass_direction
    transform: raw
    description: "极强 accel 或三连 K 在 VWAP 同侧时绕过带通（依赖 me_vwap_structure_bypass_f）"
