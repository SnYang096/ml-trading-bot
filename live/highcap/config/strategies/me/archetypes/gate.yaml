# ME Gate Archetype
# 训练结果: Lift RR Extreme = 0.4172x (目标 < 1.0) ✅
# 训练时间: 2026-02-16
# 更新: 2026-02-16 - 添加 ME 策略前提的 guardrail 规则

schema:
  phases:
    - system_safety
    - hard_gate
    - guardrail
    - soft_filter
    - preconditions
    - evidence
    - decision
  evaluation_order: system_safety -> hard_gate -> guardrail -> soft_filter -> preconditions -> evidence -> decision
  governance:
    soft_filter_floor:
      enabled: true
      min_cumulative_weight: 0.25
    failure_budget:
      max_hard_deny_rate: 0.50
      alert_threshold: 0.45

# ============================================================
# 🔴 Hard Gates (必要条件 - 不满足则拒绝)
# ============================================================
# 训练后 Gate 优化未找到有效规则
# Gate 模型本身有效（Lift=0.4172x），但无法提取出可解释的阈值规则
# Top特征: fp_exhaustion_price(105.84), vp_width_ratio(56.94)
hard_gates: []

# ============================================================
# 🟡 Soft Filters (增强条件 - 不满足则降权)
# ============================================================
# 用户要求: Soft gate应迁移到 Evidence 层评估，无效则丢弃
# 由于 Gate优化未产出 soft gate，此处保持为空
soft_filters: []

# ============================================================
# 🛡️ Strategy Guardrails (策略前提护栏)
# ============================================================
# ME 策略前提: ATR扩张 + 放量确认
# 语义: 不满足策略前提 → 永久否决（不该做）
guardrails:
  # Guardrail 1: ATR 扩张确认
  - id: me_guardrail_atr_expansion
    tag: ME_ATR_EXPANSION
    phase: guardrail
    priority: 1
    reason: "ME 策略前提: ATR扩张不足"
    when:
      atr_percentile:
        quantile_lt: 0.40  # ATR 百分位 < 40% 表示处于低波动状态
    then:
      action: deny
    comment: |
      ME 策略语义：压缩后扩张。如果 ATR 处于低位（< P40），
      说明没有充分的扩张，突破信号不成立。

  # Guardrail 2: 放量确认
  - id: me_guardrail_volume_surge
    tag: ME_VOLUME_SURGE
    phase: guardrail
    priority: 2
    reason: "ME 策略前提: 成交量不足"
    when:
      volume_ratio_pct:
        quantile_lt: 0.30  # 成交量比率 < 30% 表示缩量状态
    then:
      action: deny
    comment: |
      ME 策略语义：放量突破。如果 volume_ratio 处于低位（< P30），
      说明成交量不配合，突破可能是假突破。

# ============================================================
# 🔵 System Safety (市场级保护)
# ============================================================
system_safety:
  - id: safety_reflexivity
    tag: SYSTEM_REFLEXIVITY
    phase: system_safety
    priority: 0
    reason: "[SYSTEM] 反身性拥挤度过高"
    when:
      shd_pct:
        value_gt: 0.8
      ofci_pct:
        value_gt: 0.8
    then:
      action: deny

post_gate_filters: []
