execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15
holding:
  max_holding_bars: null
  time_stop_bars: 72 # ME 负责吃扩散加速段, 默认 3 天内兑现
optimization:
  enabled: true
  params:
    stop_loss.initial_r:
      range:
        - 1.0
        - 4.0
      step: 0.5
    stop_loss.trailing.activation_r:
      range:
        - 0.5
        - 5.0
      step: 0.5
    stop_loss.trailing.trail_r:
      range:
        - 0.5
        - 3.0
      step: 0.5
stop_loss:
  breakeven:
    enabled: true
    trigger_r: 2.5
    lock_level_r: 0.75
    measure: atr
  initial_r: 3.0
  guardrails:
    min_stop_pct: 0.006
    max_stop_pct: 0.10
  structural_exit: vwap1200
  trailing:
    enabled: true
    activation_r: 2.0
    trail_r: 2.5
  type: trailing
take_profit:
  enabled: false
add_position:
  max_add_times: 2
  sizing_mode: fixed_multiplier
  add_size_multipliers: [0.4, 0.25]
  target_leverage_by_add: [3.8, 5.0]
  max_total_leverage: 5.0
  max_add_notional_frac: 0.30
  min_add_notional_usd: 50.0
  max_add_leverage_step: [0.9, 0.7]
  min_current_r_by_add: [1.0, 2.0]
  trigger:
    type: float_r_ladder_only
version: 34
