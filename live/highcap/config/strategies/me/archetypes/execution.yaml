version: 19
execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15
stop_loss:
  type: trailing
  initial_r: 3.5
  trailing:
    activation_r: 1.5
    trail_r: 0.5
    step_r: 0.5
take_profit:
  enabled: false
holding:
  max_holding_bars: null
  time_stop_bars: 50
tiers:
  enabled: true
  levels:
  - name: 强证据
    evidence_min: 0.7
    stop_loss:
      initial_r: 0.8
      trailing:
        activation_r: 0.5
        trail_r: 0.5
    size_multiplier: 1.2
    time_stop_bars: 200
  - name: 中等证据
    evidence_min: 0.5
    stop_loss:
      initial_r: 1.0
      trailing:
        activation_r: 1.0
        trail_r: 0.8
    size_multiplier: 1.0
    time_stop_bars: 150
  - name: 弱证据
    evidence_min: 0.3
    stop_loss:
      initial_r: 1.2
      trailing:
        activation_r: 1.5
        trail_r: 1.0
    size_multiplier: 0.8
    time_stop_bars: 100
  - name: 边缘证据
    evidence_min: 0.1
    stop_loss:
      initial_r: 1.5
      trailing:
        activation_r: 2.0
        trail_r: 1.5
    size_multiplier: 0.5
    time_stop_bars: 80
optimization:
  enabled: true
  params:
    stop_loss.initial_r:
      range:
      - 1.0
      - 4.0
      step: 0.5
    stop_loss.trailing.activation_r:
      range:
      - 0.5
      - 5.0
      step: 0.5
    stop_loss.trailing.trail_r:
      range:
      - 0.5
      - 3.0
      step: 0.5
