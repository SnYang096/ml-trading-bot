# ME Execution 配置
# 版本: 1.1
# 优化结果: Sharpe=0.26 (annualized 11.8), 347 trades, 73.8% win rate
# 优化时间: 2026-02-16

version: 1

# ============================================================
# 📌 基础执行结构
# ============================================================

execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 15

# 止损配置（优化后）
stop_loss:
  type: trailing
  initial_r: 2.0          # 优化结果: 2.0 R
  trailing:
    activation_r: 0.5     # 优化结果: 0.5 R
    trail_r: 0.5          # 优化结果: 0.5 R
    step_r: 0.5

# 止盈配置
take_profit:
  enabled: false  # ME 动量策略不设固定止盈

# 持仓约束
holding:
  max_holding_bars: null
  time_stop_bars: 50

# 方向策略
# ME 使用 breakout_sign 判断方向
direction_policy:
  direction_source: structure
  structure_direction:
    method: breakout_sign  # 突破方向
    lookback_bars: 10
    min_consistency: 0.6

# ============================================================
# 🎯 Tiers: 按 evidence_score 分档执行参数
# ============================================================
# 训练后根据 Evidence 优化结果填充

tiers:
  enabled: true
  levels:
    - name: 强证据
      evidence_min: 0.70
      stop_loss:
        initial_r: 0.8
        trailing:
          activation_r: 0.5
          trail_r: 0.5
      size_multiplier: 1.2
      time_stop_bars: 200

    - name: 中等证据
      evidence_min: 0.50
      stop_loss:
        initial_r: 1.0
        trailing:
          activation_r: 1.0
          trail_r: 0.8
      size_multiplier: 1.0
      time_stop_bars: 150

    - name: 弱证据
      evidence_min: 0.30
      stop_loss:
        initial_r: 1.2
        trailing:
          activation_r: 1.5
          trail_r: 1.0
      size_multiplier: 0.8
      time_stop_bars: 100

    - name: 边缘证据
      evidence_min: 0.10
      stop_loss:
        initial_r: 1.5
        trailing:
          activation_r: 2.0
          trail_r: 1.5
      size_multiplier: 0.5
      time_stop_bars: 80

# ============================================================
# 🔧 网格搜索参数范围
# ============================================================

optimization:
  enabled: true
  params:
    stop_loss.initial_r:
      range: [1.0, 3.0]
      step: 0.5
    stop_loss.trailing.activation_r:
      range: [0.5, 3.0]
      step: 0.5
    stop_loss.trailing.trail_r:
      range: [0.5, 2.5]
      step: 0.5
