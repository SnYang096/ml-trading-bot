# TPC execution: EMA1200 structural exit, 金字塔加仓（2026-06-10 优化）
add_position:
  add_size_multipliers:
    - 0.25
    - 0.5
    - 1.0
  inherit_parent_stop: true
  min_current_r_by_add:
    - 0.5
    - 1
    - 1.5
  min_current_r_unit: atr
  sizing_mode: fixed_multiplier
  trigger:
    type: float_r_ladder_only
execution_constraints:
  allow_add_on: true
  min_order_interval_minutes: 60
holding:
  max_holding_bars: 0
  time_stop_bars: 0
stop_loss:
  # 2026-06-10: breakeven trigger_r 从 10.0→6.0 ATR（1.5R 锁仓）
  # 实验依据: Phase 3 breakeven ablation (E9_be_6atr 总R=31.55 vs E8_be_10atr 总R=9.32)
  breakeven:
    enabled: true
    trigger_r: 6.0
    lock_level_r: 2
    measure: atr
  guardrails:
    max_stop_pct: 0.2
    min_stop_pct: 0.01
  initial_r: 4.0
  structural_exit: ema1200
  trailing:
    activation_r: 3.5
    enabled: true
    expand_with_primary_atr: true
    trail_r: 6.0
  type: trailing
  # 2026-06-11 E22 promote: exit_by_regime — ADX(50) 分类决定 trailing 开关
  # bull (ADX>25 + EMA>0.1) → structural exit 不 trailing; bear/neutral → trailing 保护
  # E23 ablation 证明 bear 关 trailing = 灾难 (-6.14R)
  exit_by_regime:
    bull:
      trailing:
        enabled: false
    bear:
      trailing:
        enabled: true
    neutral:
      trailing:
        enabled: true
take_profit:
  enabled: false
version: 1
