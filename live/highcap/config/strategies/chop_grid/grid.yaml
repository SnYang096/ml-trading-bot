# Chop Grid execution configuration.
# This file is consumed by scripts/chop_grid_backtest.py and the dry-run live engine.

strategy_type: grid
status: research

regime:
  entry_feature: bpc_semantic_chop
  entry_chop_min: 0.40
  exit_chop_below: 0.25
  exclude_box_prefilter: true
  box_window: 120
  box_prefilter:
    stability_min: 0.85
    width_min: 0.04
    width_max: 0.30
    touches_min: 5

grid:
  spacing:
    primary: atr
    atr_mult: 0.50
    min_pct: 0.004
  max_levels_per_side: 3
  level_notional_mode: equal
  same_bar_entry_exit: false
  order_type: limit

risk:
  min_segment_bars: 6
  max_segment_bars: 120
  force_exit_on_regime_loss: true
  max_loss_per_grid: 0.03
  max_open_levels_total: 6
  # Legacy fallback for old reports. New accounting uses split maker/taker costs.
  fee_bps: 4.0
  maker_fee_bps: 2.0
  taker_fee_bps: 5.0
  forced_exit_slippage_bps: 5.0
  funding_cost_bps_per_8h: 1.0

# Regime chop series + ts-quantile window (read by merge_chop_grid_yaml / CLIs).
chop_series:
  chop_signal: raw
  chop_ts_window: 1200
  chop_ts_min_periods: 150
  # compute_semantic_chop_ts_q: false

live:
  mode: dry_run
  state_path: results/chop_grid/live_state.json
  order_adapter: dry_run
  cancel_orders_on_exit: true
  market_exit_on_regime_loss: true
