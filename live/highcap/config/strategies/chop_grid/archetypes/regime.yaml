# Chop grid regime — see config/strategies/chop_grid/archetypes/regime.yaml (research).

regime:
  lock: true
  entry_feature: bpc_semantic_chop
  entry_chop_min: 0.50
  exit_chop_below: 0.32
  exclude_box_prefilter: false
  box_prefilter:
    stability_min: 0.85
    width_min: 0.04
    width_max: 0.30
    touches_min: 5
