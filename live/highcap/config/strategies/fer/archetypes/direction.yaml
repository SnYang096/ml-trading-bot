# FER Direction Determination
# 版本: 1.0
# 创建时间: 2026-02-22
#
# 职责: 确定 FER archetype 的交易方向 (long/short)
# 原则: 方向来自"失败方向的反向"，是 deterministic 的，不让模型学
#
# Pipeline 位置:
#   Direction (本文件) → Gate → Entry Filter → Evidence → Execution
#
# 语义:
#   FER = Failed Extreme Reversal
#   方向 = -failed_impulse_direction (失败方向的反向)
#   "谁失败了，就做反方向"
#
# 数据验证 (features_labeled.parquet, 38,826 行, baseline bad_rate=45.4%):
#   fer_impulse_failure_direction (negate_sign):
#     dir=-1 (上行失败→做空): 9,930 样本, bad=44.5%(-0.9%), medRR=+0.00
#     dir=+1 (下行失败→做多): 1,310 样本, bad=50.2%(+4.8%), medRR=-0.81
#     dir= 0 (无失败信号):   24,519 样本 (68.6%) → 降级到规则2
#   cvd_change_5_normalized (negate_sign):
#     dir=+1 (CVD负→做多):  28,421 样本, bad=43.9%(-1.5%), medRR=+0.11 ✅
#     dir=-1 (CVD正→做空):  10,405 样本, bad=49.5%(+4.1%), medRR=-0.72
#
# ⚠️ FER 方向信号存在固有不对称性:
#   - 做多方向 (失败下行后反转) 在 CVD 信号中更有效
#   - 做空方向 (失败上行后反转) 在 impulse failure 信号中更有效
#   - 这与加密市场的「急跌慢涨」结构一致
#
# 禁止使用的特征 (会导致语义污染):
#   - HTF trend / SMA 方向 (趋势逻辑, 属于 BPC)
#   - WPT 当前值 (动能逻辑, 属于 ME)
#   - funding_rate (杠杆逻辑, 属于 LV)

version: 1

# 方向因果来源
causal_source: failure_reversal  # 失败反转

# 方向确定规则 (按优先级从高到低)
# 命中第一个可用 method 后停止
direction_rules:
  # 规则 1: FER 失败脉冲方向的反向 (最纯粹的 FER 信号)
  # fer_impulse_failure_direction: +1=上行失败, -1=下行失败, 0=无信号
  # 覆盖率 31.4%, 其余 68.6% 降级到规则 2
  - method: feature_sign
    feature: fer_impulse_failure_direction
    description: "失败脉冲方向的反向: -sign(impulse_failure_direction)"
    transform: negate_sign  # direction = -sign(feature_value)

  # 规则 2: CVD 短周期变化的反向 (最佳量化信号)
  # CVD 正 = 买方推进 → 如果推进失败 → 做空
  # CVD 负 = 卖方推进 → 如果推进失败 → 做多
  # 覆盖率 100%, bad_rate 差异 ±1.5%
  - method: feature_sign
    feature: cvd_change_5_normalized
    description: "CVD 5-bar 变化的反向: -sign(cvd), 失败推进的反向"
    transform: negate_sign

  # 规则 3: ROC 动量反向 (兜底)
  # 上涨 (roc>0) 失败 → 做空; 下跌 (roc<0) 失败 → 做多
  # 覆盖率 100%, bad_rate 差异 ±1.3%
  - method: feature_sign
    feature: roc_20
    description: "20-bar ROC 方向的反向: -sign(roc)"
    transform: negate_sign

# 方向验证 (direction == 0 视为无信号)
validation:
  require_nonzero: true
  allowed_values: [-1, 1]

# 候选特征研究: config/strategies/fer/direction.yaml (如果有)
# 重新评估命令:
#   python z实验_005_统一研究/direction_strict_validation.py \
#       --logs results/train_final_xxx/fer/features_labeled.parquet \
#       --strategy fer

