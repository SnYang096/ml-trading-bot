# FER Direction Determination
# 版本: 1.0
# 创建时间: 2026-02-22
#
# 职责: 确定 FER archetype 的交易方向 (long/short)
# 原则: 方向来自"失败方向的反向"，是 deterministic 的，不让模型学
#
# Pipeline 位置:
#   Direction (本文件) → Gate → Entry Filter → Evidence → Execution
#
# 语义:
#   FER = Failed Extreme Reversal
#   方向 = -failed_impulse_direction (失败方向的反向)
#   "谁失败了，就做反方向"
#
# 规则1 使用 fer_impulse_failure_direction_signed（离散 -1/0/+1）；decay 列勿做 negate_sign。
#   cvd_change_5_normalized (negate_sign):
#     dir=+1 (CVD负→做多):  28,421 样本, bad=43.9%(-1.5%), medRR=+0.11 ✅
#     dir=-1 (CVD正→做空):  10,405 样本, bad=49.5%(+4.1%), medRR=-0.72
#
# ⚠️ FER 方向信号存在固有不对称性:
#   - 做多方向 (失败下行后反转) 在 CVD 信号中更有效
#   - 做空方向 (失败上行后反转) 在 impulse failure 信号中更有效
#   - 这与加密市场的「急跌慢涨」结构一致
#
# 禁止使用的特征 (会导致语义污染):
#   - HTF trend / SMA 方向 (趋势逻辑, 属于 BPC)
#   - WPT 当前值 (动能逻辑, 属于 ME)
#   - funding_rate (杠杆逻辑, 属于 LV)

version: 1

# 方向确定规则 (按优先级从高到低)
# 命中第一个可用 method 后停止
direction_rules:
  # 规则 1: SR 子语义（边界失败突破）方向，命中时优先
  - method: feature_sign
    feature: fer_sr_failed_breakout_direction_signed
    description: "SR 边界失败突破方向（signed）"
    transform: raw

  # 规则 2: impulse 失败 → 交易方向（signed 列已是 ±1）
  - method: feature_sign
    feature: fer_impulse_failure_direction_signed
    description: "impulse 失败方向（signed）"
    transform: raw

  # 规则 3: CVD 短周期变化的反向 (最佳量化信号)
  # CVD 正 = 买方推进 → 如果推进失败 → 做空
  # CVD 负 = 卖方推进 → 如果推进失败 → 做多
  # 覆盖率 100%, bad_rate 差异 ±1.5%
  - method: feature_sign
    feature: cvd_change_5_normalized
    description: "CVD 5-bar 变化的反向: -sign(cvd), 失败推进的反向"
    transform: negate_sign

  # 规则 4: ROC 动量反向 (兜底)
  # 上涨 (roc>0) 失败 → 做空; 下跌 (roc<0) 失败 → 做多
  # 覆盖率 100%, bad_rate 差异 ±1.3%
  - method: feature_sign
    feature: roc_20
    description: "20-bar ROC 方向的反向: -sign(roc)"
    transform: negate_sign

# 方向验证 (direction == 0 视为无信号)
validation:
  require_nonzero: true
  allowed_values: [-1, 1]

# 候选特征研究: config/strategies/fer/direction.yaml (如果有)
# 重新评估命令:
#   python scripts/direction_strict_validation.py \
#       --logs results/train_final_xxx/fer/features_labeled.parquet \
#       --strategy fer

