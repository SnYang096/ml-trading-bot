# FER Evidence Archetype (auto-promoted)
# 来源: results/train_final_20260226_212459_return_tree/fer/evidence_candidates.yaml
# 优化规则: 3/8 条通过 plateau 验证
# ⚠️ direction:negative 的 labels 顺序已手动修正 (低值→amplify, 高值→suppress)
# 修正原因: 评分代码不读 direction 字段, labels 顺序直接决定分数
#           诊断发现 FER evidence Corr=-0.127 (反向), 翻转后预期转正

schema:
  label_semantics:
    suppress: 强烈不利 - 极度限制仓位/信心
    downweight: 不利 - 降低信心/仓位
    neutral: 中性 - 标准执行
    favor: 有利 - 提高信心/仓位
    amplify: 强烈有利 - 最大化执行
evidence:
- id: evidence_evt_scale
  feature: evt_scale
  rank: 3
  direction: negative
  usage_hint: 'evt_scale 低值 → 有利 (direction:negative)'
  affects:
  - tp_range
  - trailing_speed
  - scale_in_allowed
  - position_size
  quantile_mapping:
    bins:
    - 0.3
    - 0.5
    - 0.7
    - 0.9
    labels:
    - amplify
    - favor
    - neutral
    - downweight
    - suppress
  split_count: 1
- id: evidence_atr_percentile
  feature: atr_percentile
  rank: 4
  direction: negative
  usage_hint: 'atr_percentile 低值 → 有利 (direction:negative)'
  affects:
  - tp_range
  - trailing_speed
  - scale_in_allowed
  - position_size
  quantile_mapping:
    bins:
    - 0.25
    - 0.45
    - 0.65
    - 0.85
    labels:
    - amplify
    - favor
    - neutral
    - downweight
    - suppress
  split_count: 1
- id: evidence_shd_pct
  feature: shd_pct
  rank: 8
  direction: negative
  usage_hint: 'shd_pct 低值 → 有利 (direction:negative)'
  affects:
  - tp_range
  - trailing_speed
  - scale_in_allowed
  - position_size
  quantile_mapping:
    bins:
    - 0.2
    - 0.4
    - 0.6
    - 0.8
    labels:
    - amplify
    - favor
    - neutral
    - downweight
    - suppress
  split_count: 1
