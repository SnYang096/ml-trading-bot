# ============================================================
# 📊 Evidence 使用指南
# ============================================================
# 1. Evidence 不做硬 veto，只调整执行参数
# 2. direction=positive: 高值=好，标签顺序 [suppress...amplify]
# 3. direction=negative: 高值=坏，标签顺序 [amplify...suppress]
# 4. 根据 affects 字段，调整对应的 execution 参数
# 5. 排序依据: bad_suppression (P(score<0.3|bad) - P(score<0.3|good))
