# BPC Evidence Archetype
# 基于 optimize_evidence_plateau.py 评估结果
# 评估时间: 2026-02-09 (gate-conditioned quantile threshold 模式)
# 职责: 影响置信度/排序/仓位，不做硬 veto
# 排序依据: bad_suppression (主 KPI)

schema:
  label_semantics:
    suppress: 强烈不利 - 极度限制仓位/信心
    downweight: 不利 - 降低信心/仓位
    neutral: 中性 - 标准执行
    favor: 有利 - 提高信心/仓位
    amplify: 强烈有利 - 最大化执行

# ============================================================
# 🔍 EVIDENCE: 执行质量调节器
# ============================================================
# 这些特征不做硬 veto，只影响：
# - 置信度调整（confidence_boost/penalty）
# - 仓位大小（position_size multiplier）
# - TP/SL 动态调整（tp_range / trailing_speed）

# ============================================================
# 🎯 已验证 Evidence (按 bad_suppression 排序)
# ============================================================
evidence:
  # Rank 1: MACD Signal ATR - 动量确认 (bad_supp: 0.646, sharpness: 0.486)
  - id: evidence_macd_signal_atr
    feature: macd_signal_atr
    rank: 1
    sharpness: 0.486
    direction: positive  # 高值=好
    usage_hint: MACD 信号强度，影响 trailing 速度与仓位调整
    affects:
      - trailing_speed
      - position_size
    quantile_mapping:
      bins: [0.1, 0.3, 0.5, 0.7]
      labels: [suppress, downweight, neutral, favor, amplify]

  # Rank 2: VP Absorption Score - 订单簿吸收度 (bad_supp: 0.490, sharpness: 0.377)
  - id: evidence_vp_absorption
    feature: vp_absorption_score
    rank: 2
    sharpness: 0.377
    direction: negative  # 高值=坏，标签已反转
    usage_hint: 吸收度越高，RR 越差（流动性过强不利）
    affects:
      - confidence_boost
    quantile_mapping:
      bins: [0.25, 0.45, 0.65, 0.85]
      labels: [amplify, favor, neutral, downweight, suppress]  # 反转

  # Rank 3: WPT Exhaustion Score - 小波力竭 (bad_supp: 0.473, sharpness: 0.364)
  - id: evidence_wpt_exhaustion
    feature: wpt_exhaustion_score
    rank: 3
    sharpness: 0.364
    direction: positive  # 高值=好
    usage_hint: WPT 力竭越高，RR 越好（小波能量释放充分）
    affects:
      - confidence_boost
    quantile_mapping:
      bins: [0.2, 0.4, 0.6, 0.8]
      labels: [suppress, downweight, neutral, favor, amplify]

  # Rank 4: SMA 200 Position - 价格相对位置 (bad_supp: 0.432, sharpness: 0.309)
  - id: evidence_sma_200_position
    feature: sma_200_position
    rank: 4
    sharpness: 0.309
    direction: positive  # 高值=好
    usage_hint: 价格在 200MA 上方越远，TP 可拉得更远
    affects:
      - tp_range
    quantile_mapping:
      bins: [0.25, 0.45, 0.65, 0.85]
      labels: [suppress, downweight, neutral, favor, amplify]

  # Rank 5: VP Exhaustion Score - 订单簿力竭 (bad_supp: 0.387, sharpness: 0.293)
  - id: evidence_vp_exhaustion
    feature: vp_exhaustion_score
    rank: 5
    sharpness: 0.293
    direction: positive  # 高值=好
    usage_hint: VP 力竭越高，RR 越好（订单簿动能释放充分）
    affects:
      - confidence_boost
    quantile_mapping:
      bins: [0.2, 0.4, 0.6, 0.8]
      labels: [suppress, downweight, neutral, favor, amplify]

  # Rank 6: Dist to Nearest SR - SR 距离 (bad_supp: 0.350, sharpness: 0.279)
  - id: evidence_dist_to_sr
    feature: dist_to_nearest_sr
    rank: 6
    sharpness: 0.279
    direction: positive  # 高值=好
    usage_hint: 距离 SR 越远，RR 越好，可拉伸 TP
    affects:
      - tp_range
      - confidence_boost
    quantile_mapping:
      bins: [0.1, 0.3, 0.5, 0.7]
      labels: [suppress, downweight, neutral, favor, amplify]

  # Rank 7: BPC Volume Compression - 缩量程度 (bad_supp: 0.254, sharpness: 0.196)
  - id: evidence_vol_compression
    feature: bpc_volume_compression_pct
    rank: 7
    sharpness: 0.196
    direction: negative  # 高值=坏，标签已反转
    usage_hint: 缩量越高，RR 越差（过度缩量不利）
    affects:
      - position_size
    quantile_mapping:
      bins: [0.15, 0.35, 0.55, 0.75]
      labels: [amplify, favor, neutral, downweight, suppress]  # 反转

  # Rank 8: EVT Right-tail Scale - 右尾极值尺度 (bad_supp: 0.215, sharpness: 0.158)
  # 🆕 2026-02-09 从 soft gate 迁移，plateau 验证通过
  - id: evidence_evt_scale_right
    feature: evt_scale_right
    rank: 8
    sharpness: 0.158
    direction: positive  # 高值=好 (右尾尺度大=上行空间大)
    usage_hint: EVT右尾尺度越大，上行极值概率越高
    affects:
      - tp_range
      - confidence_boost
    quantile_mapping:
      bins: [0.15, 0.35, 0.55, 0.75]
      labels: [suppress, downweight, neutral, favor, amplify]

  # Rank 9: Spectrum Price Flatness - 价格谱平坦度 (bad_supp: 0.123, sharpness: 0.085)
  - id: evidence_spectrum_price_flatness
    feature: spectrum_price_flatness
    rank: 9
    sharpness: 0.085
    direction: negative  # 高平坦度 = 无结构 = 不利
    usage_hint: 价格谱越平坦，结构越差，应缩小仓位
    affects:
      - position_size
      - confidence_boost
    quantile_mapping:
      bins: [0.3, 0.5, 0.7, 0.9]
      labels: [amplify, favor, neutral, downweight, suppress]  # 反转

