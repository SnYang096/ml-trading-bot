# Archetype Edge 配置
# 
# 用于 SignalRouter 的 AOS (Archetype Opportunity Score) 计算
# AOS = Edge_archetype × Evidence_score
#
# Edge 定义：该 archetype 最近 N 个月的平均 R-multiple
# 
# 更新频率：建议每月滚动更新
# 更新方式：运行 compute_archetype_edges_from_trades() 统计历史交易数据
#
# 最后更新：2026-02-14
# 统计周期：2023-11-01 到 2026-02-14（示例）

# 各 archetype 的历史 Edge（平均 R-multiple）
archetype_edges:
  BPC: 0.62               # Breakout + Pullback + Continuation
  ME: 0.85                # Momentum Expansion  
  Reversal: 0.55          # 反转策略（FER/LSR/AER 合并）
  Shallow: 0.48           # Shallow Pullback
  
  # 如果有更多 archetype，在此添加：
  # TrendContinuationTC: 0.70
  # FailedBreakoutFade: 0.60

# 路由器配置
router_config:
  # capacity_limit / slot_count 从 constitution.yaml 读取，不在此重复定义
  default_edge: 0.50      # 未知 archetype 的默认 Edge

# 统计元数据（可选，用于追溯）
metadata:
  last_update: "2026-02-14"
  lookback_months: 3
  total_trades_analyzed: 0  # 实际使用时填写
  data_source: "backtest"   # backtest | live
  notes: "初始配置，需要根据实际交易数据更新"
