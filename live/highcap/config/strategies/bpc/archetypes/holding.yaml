# BPC Holding 配置 (trend_hold profile)
# 版本: 2.0
# 更新时间: 2026-03-05
#
# ╔═══════════════════════════════════════════════════════════╗
# ║  BPC = 结构趋势策略 → trend_hold profile                 ║
# ║  主退出: EMA200 structural exit (趋势结构破坏)            ║
# ║  灾难保护: 极宽 trailing (7ATR, 仅防黑天鹅闪崩)          ║
# ║  Holding is not optimized. It exists to prevent good      ║
# ║  paths from being ruined, not to create alpha.            ║
# ╚═══════════════════════════════════════════════════════════╝
#
# ── 职责边界 ──────────────────────────────────────────────
#
#   Execution = "那一刻该不该进、怎么进"（单点、静态、条件独立）
#   Holding   = "进了之后，怎么不把好交易玩坏"（多点、动态、路径依赖）
#
#   Alpha 来源: Gate → Evidence → Entry Filter → Execution
#   Holding 不是 Alpha 源，是 Alpha 保全层。
#
# ── Multi-Alpha Holding ──────────────────────────────────
#
#   BPC (本文件) → trend_hold   → EMA200 exit + 极宽灾难 trailing
#   ME           → momentum_hold → 紧 trailing (快进快出)
#
#   两种 fat-tail 范式互补:
#     趋势型: 缓涨 2-6 个月, 单笔 15-50R, 穿越盘整
#     动量型: 急涨 2-5 天, 单笔 3-8R, 盘整即退
#
# ── 与其他配置的关系 ─────────────────────────────────────
#
#   execution.yaml   → 开仓瞬间参数（SL 距离、trail_r=7.0、structural_exit=ema200）
#   本文件            → 持仓期间确定性规则（时间止损、保本锁、退出模式）
#   constitution.yaml → 系统底线（加仓政策、kill switch、slot 约束）
#

version: 2

# ============================================================
# 📌 参数 1: 时间止损（路径放弃条件）
# ============================================================
#
# fat tail 模式: 禁用时间止损
# EMA200 structural exit 是唯一的趋势退出机制
#
time_stop:
  default_bars: 0            # fat tail: 禁用时间止损
                             #
                             # 设计决策:
                             #   - EMA200 是主退出 (趋势结构破坏)
                             #   - 极宽 trailing (7ATR) 仅防黑天鹅闪崩
                             #   - 时间止损截断 fat tail，与"让利润奔跑"矛盾
                             #
                             # 注: 不做 grid search 优化
  allow_tier_override: true


# ============================================================
# 📌 参数 2: 保本锁定
# ============================================================
#
# 一旦市场证明你是对的，就不允许你再亏。
# 同时解锁 structural_exit 检查 (breakeven_locked 后才检查 EMA200)
#
breakeven_lock:
  enabled: true
  trigger_r: 1.0             # 浮盈达到 1R 后，SL 移至入场价
                              #
                              # 双重作用:
                              #   1. SL → entry price (保本)
                              #   2. 解锁 EMA200 structural exit 检查
                              #      (避免入场即被 EMA200 退出)
                              #   3. 解锁 constitution 加仓资格


# ============================================================
# 📌 参数 3: 移动止损执行模式
# ============================================================
#
# trend_hold: 极宽 trailing (仅灾难保护)
# 主退出由 execution.yaml 的 structural_exit: ema200 处理
#
trailing_stop:
  mode: fixed_r              # fixed_r = 固定 R 倍数
                              #
                              # trail_r=7.0 (execution.yaml):
                              #   极宽灾难保护, 仅在黑天鹅闪崩时触发
                              #   正常行情由 EMA200 退出
                              #
                              # vs ME (momentum_hold):
                              #   trail_r=0.5, 紧 trailing 快进快出


# ============================================================
# 📌 参数 4: 结构性退出 (EMA200)
# ============================================================
#
# BPC 独有: 价格穿越 EMA200 = 趋势结构破坏
# 配置在 execution.yaml 的 structural_exit: ema200
#
# 执行逻辑 (position_logic.py enforce_position Step 3b):
#   1. 仅在 breakeven_locked 后才检查
#   2. Long: close < EMA200 → 退出
#   3. Short: close > EMA200 → 退出
#   4. 优先级: breakeven → structural_exit → trailing → SL hit
#
structural_exit:
  type: ema200
  description: "价格穿越 EMA200 = 趋势结构破坏, 是 BPC 唯一的主动退出信号"


# ============================================================
# 🚫 明确排除（设计决策，非遗漏）
# ============================================================
#
# 以下功能明确不在 Holding 层:
#
#   ❌ 加仓/减仓比例优化
#      → 加仓政策由 constitution.yaml 管理 (max_add_times=5, require_locked_profit)
#
#   ❌ 动态减仓 (partial profit taking)
#      → 已分析: Partial TP 对 fat tail 系统是负面的
#
#   ❌ 紧 trailing stop (trail_r < 2.0)
#      → 紧 trailing 截断趋势型 fat tail
#      → 已移至 ME 的 momentum_hold profile
#
#   ❌ 波动率自适应退出 / Regime-aware holding
#      → 波动率/Regime 判断属于 Gate 层职责


# ============================================================
# 📊 Holding 层的 KPI（诊断用，不用于优化）
# ============================================================
#
#   1. giveback_ratio = (MFE - realized) / MFE
#      → 好的 trend_hold: giveback < 50% (比 momentum_hold 宽容)
#
#   2. structural_exit_hit_rate
#      → EMA200 退出占总退出的比例 (应该是主要退出方式)
#
#   3. catastrophic_sl_hit_rate
#      → 7ATR trailing 触发比例 (应该很低, <5%)
#
#   4. breakeven_lock_hit_rate
#      → 触发保本锁后，最终正 R 的比例 (应该 > 85%)
