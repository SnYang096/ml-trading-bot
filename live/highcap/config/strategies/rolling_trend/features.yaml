# Rolling Trend 特征配置 — 指标驱动版
# Entry: weekly_ema_200_position < 0 + ema1200 金叉 vwap1200
name: rolling_trend
description: |
  趋势滚仓：纯指标驱动，不依赖TPC模型信号。
  核心指标：周线EMA200、EMA1200、VWAP1200

feature_pipeline:
  signal_source_strategy: rolling_trend
  exclude_columns: []
  requested_features:
    - weekly_ema_200_position_f
    - ema_1200_position_f
    - ema_1200_slope_f
    - macro_tp_vwap_1200_position_f
    - atr_f
    - atr_percentile_f
