# Rolling Trend Entry Filters — 入场过滤器
# 
# 入场由模拟器检测EMA1200/VWAP1200金叉点
# entry_filters 仅做辅助过滤

filters:
  - id: ema1200_cross_above_vwap1200
    enabled: true
    conditions:
      - feature: ema_1200_position
        operator: '>='
        value: -0.20
        rationale: EMA1200附近（允许略低于EMA1200）
    description: EMA1200金叉VWAP1200入场信号（交叉检测由模拟器完成）

combination_mode: and
