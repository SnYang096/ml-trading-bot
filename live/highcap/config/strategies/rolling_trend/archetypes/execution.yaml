# Rolling Trend Execution Config — 🏆 R2 方案
# 冠军入场 + VWAP1200附近滚仓 (回撤仅-45%, 0次风控减仓)
version: 2

# ── 杠杆管理 ──
leverage:
  initial: 2.0
  max: 3.0
  step: 1.0

# ── 入场条件 (AND) — 冠军三重过滤 ──
entry:
  weekly_ema_200_position_lt: -0.05    # 价格低于周线EMA200至少5%
  ema1200_cross_above_vwap1200: true   # EMA1200金叉VWAP1200
  require_momentum: true               # roc_5>0 AND roc_20>0

# ── 滚仓触发 (AND) — VWAP支撑位滚仓 ──
roll_trigger:
  price_drawdown_from_peak_pct: 0.20   # 价格从峰值跌≥20%
  require_profitable: true             # 当前浮盈>0
  near_vwap1200_pct: 0.05              # 价格在VWAP1200 ±5%范围内（主力成本区支撑）
  rationale: "只在VWAP1200支撑位附近升级杠杆，避免半山腰加杠杆"

# ── 止盈 (equity-based 阶梯) ──
# 触发条件：权益 / 初始本金 ≥ trigger_multiple
take_profit:
  type: equity_profit_ladder
  trigger_multiple: 5.0 # 权益达5x初始本金触发
  base_daily_sell_fraction: 0.08 # 每次卖出基础比例
  acceleration:
    type: power
    exponent: 1.0 # 线性加速
    max_speed_multiplier: 5.0
  full_exit_at_multiple: 15.0 # 权益达15x时允许全平

# ── 风控 ──
risk_management:
  equity_dd_stop_pct: 0.50 # 权益从峰值回撤50% → 减半仓
  price_dd_stop_pct: 0.60 # 价格从入场跌60% → 减半仓
  max_concurrent_symbols: 3
  max_position_pct: 0.30

# ── 信号源 ──
signal:
  source: indicator
  entry_indicators:
    - weekly_ema_200_position
    - ema1200
    - vwap1200

# ── 退出 ──
exit:
  type: profit_ladder
  structural: none
  time_stop_bars: 0

# ── 标准执行参数 (兼容 backtester) ──
stop_loss:
  type: none
  initial_r: 0.0
  structural_exit: trend_rolling_profit_ladder
  trailing:
    enabled: false
  breakeven:
    enabled: false
  profit_take_ladder:
    enabled: true
    min_profit_multiple: 5.0
    base_daily_sell_fraction: 0.05
    acceleration:
      type: power
      exponent: 0.75
      max_speed_multiplier: 4.0
    never_full_exit: true

add_position:
  trigger:
    type: disabled

holding:
  max_holding_bars: 0
  time_stop_bars: 0

execution_constraints:
  allow_add_on: false
