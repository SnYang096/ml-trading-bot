# Rolling Trend Regime — 市场环境分类
# 
# 趋势滚仓的核心 regime 判断：价格是否在周线EMA200下方（深熊吸筹区）
# 只有在深熊区才允许杠杆入场

allowed_regimes:
  deep_bear:
    description: "周线EMA200下方 — 深熊吸筹区，允许杠杆入场"
    match: all
    rules:
      - feature: weekly_ema_200_position
        operator: '<'
        value: 0.0
  recovery:
    description: "周线EMA200附近 — 恢复区，谨慎入场"
    match: all
    rules:
      - feature: weekly_ema_200_position
        operator: '>='
        value: 0.0
      - feature: weekly_ema_200_position
        operator: '<='
        value: 0.10
  bull:
    description: "周线EMA200上方 — 牛市，不追高"
    match: all
    rules:
      - feature: weekly_ema_200_position
        operator: '>'
        value: 0.10

allowed_sides: [long]
