# Rolling Trend Gate — 硬门控
# 
# 门控规则：仅在周线EMA200下方（深熊）时允许入场
# 其他市场环境直接拒绝

schema:
  phases: [hard_gate]
  evaluation_order: hard_gate

hard_gates:
  - id: gate_deep_bear_only
    priority: 1
    regime_allow: [deep_bear]
    when:
      weekly_ema_200_position:
        value_lt: 0.0
    then:
      action: deny
    rationale: 非深熊区不允许杠杆滚仓入场
    locked: false
