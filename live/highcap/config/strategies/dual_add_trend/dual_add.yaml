# Dual Add Trend execution configuration.
# Consumed by research scripts; not yet wired into the generic TradeIntent engine.

strategy_type: dual_add_trend
status: research

regime:
  # Trade only when trend confidence is high and semantic chop is low.
  entry_feature: trend_confidence
  entry_min: 0.80
  exit_below: 0.50
  max_semantic_chop_entry: 0.25
  max_semantic_chop_hold: 0.40
  exclude_box_prefilter: true
  box_prefilter:
    stability_min: 0.85
    width_min: 0.04
    width_max: 0.30
    touches_min: 5

inventory:
  initial_legs: [LONG, SHORT]
  add_mode: trend
  trend_direction_source: dynamic_bar
  flip_action: close_offside_all
  max_adds_per_side: 3
  max_gross_exposure_units: 4
  max_net_exposure_units: 2
  max_loser_hold_bars: 24

add_spacing:
  primary: atr
  atr_mult: 0.50

take_profit:
  # Exit only after round-trip fee is covered and this net-profit distance is hit.
  fee_aware: true
  distance: max
  atr_mult: 0.25
  min_pct: 0.0005
  min_abs: 0.0

risk:
  min_segment_bars: 6
  max_segment_bars: 120
  force_exit_on_regime_loss: true
  max_loss_per_segment: 0.01
  maker_fee_bps: 20.0
  taker_fee_bps: 20.0
  diagnostic_fee_bps: 20.0
  forced_exit_slippage_bps: 20.0
  funding_cost_bps_per_8h: 20.0

# Same semantics as chop_grid chop_series (build_features / regime masks).
chop_series:
  chop_signal: raw
  chop_ts_window: 1200
  chop_ts_min_periods: 150

validation:
  script: scripts/diagnose_dual_add_trend.py
  baseline_symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, XRPUSDT, ADAUSDT]
  baseline_periods: [2022, 2023, 2024, 2025, 2026Q1]
