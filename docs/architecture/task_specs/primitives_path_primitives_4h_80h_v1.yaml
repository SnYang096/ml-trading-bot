task_id: primitives_path_primitives_4h_80h_v1
family: primitives
description: >
  NN multi-head path primitives task: predict dir/mfe/mae/ttm on 4H bars with 80H horizon.
  This TaskSpec is for nnmultihead/RL-side bookkeeping only (does not affect tree strategy pipeline).

data:
  timeframe: 240T
  bar_hours: 4

labels:
  horizon_hours: 80
  horizon_bars: 20
  entry_offset: 1
  entry_price_col: open
  high_col: high
  low_col: low
  close_col: close
  atr_col: atr

outputs:
  heads:
    - dir_logit
    - mfe_atr
    - mae_atr
    - t_to_mfe

evaluation:
  rolling_ic:
    enabled: true
    window: 300
    min_periods: 60
  conditional_slices:
    - near_sr
    - trend_high
    - compression_high

config_binding:
  nnmultihead_config_dir: config/nnmultihead/path_primitives_4h_80h_min
  feature_contract_path: config/nnmultihead/path_primitives_4h_80h_min/feature_contract.yaml


