# =============================================================
# 🚀 构建 Docker 镜像 → 推送 ghcr.io → 部署到腾讯云
# =============================================================
# 架构:
#   GitHub Actions build image
#     → push to ghcr.io (GitHub Container Registry)
#     → SSH to server: docker pull → tag → restart
#   服务器无需 GitHub 密钥，无需 Python/pip 环境
#
# GitHub Secrets 需要配置:
#   DEPLOY_HOST      — 服务器公网 IP
#   DEPLOY_USER      — SSH 用户名 (如 root 或 ubuntu)
#   DEPLOY_SSH_KEY   — SSH 私钥内容
#   GHCR_TOKEN       — GitHub PAT (需 read:packages + write:packages)
#   BINANCE_API_KEY  — Binance API Key
#   BINANCE_API_SECRET — Binance API Secret
#   （可选）多腿专用主网密钥（写入 binance_mainnet.env 末尾，优先于 BINANCE_*）:
#   MULTI_LEG_BINANCE_FUTURES_API_KEY / MULTI_LEG_BINANCE_FUTURES_API_SECRET
# =============================================================

name: 🚀 Build & Deploy

on:
  workflow_dispatch:
    inputs:
      restart_service:
        description: '部署后重启 quant-engine 服务'
        type: boolean
        default: true
      skip_build:
        description: '跳过构建，只重启服务（用于配置变更）'
        type: boolean
        default: false

  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'config/**'
      - 'live/highcap/config/**'
      - 'live/scripts/**'
      - 'docker/Dockerfile.live'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'
      - 'deploy/monitoring/grafana-provisioning/**'

# 同一时间只允许一个部署
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/quant-engine

jobs:
  # ============================================
  # Job 1: 构建并推送 Docker 镜像
  # ============================================
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_build != 'true' }}
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.live
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: 📊 Build summary
        run: |
          echo "### 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 2: 部署到服务器
  # ============================================
  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && (needs.build.result == 'success' || github.event.inputs.skip_build == 'true')
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Write API keys to server
        uses: appleboy/ssh-action@v1
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          MULTI_LEG_BINANCE_FUTURES_API_KEY: ${{ secrets.MULTI_LEG_BINANCE_FUTURES_API_KEY }}
          MULTI_LEG_BINANCE_FUTURES_API_SECRET: ${{ secrets.MULTI_LEG_BINANCE_FUTURES_API_SECRET }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: BINANCE_API_KEY,BINANCE_API_SECRET,MULTI_LEG_BINANCE_FUTURES_API_KEY,MULTI_LEG_BINANCE_FUTURES_API_SECRET
          script: |
            sudo mkdir -p /opt/quant-engine/live
            # 防止 Docker 将文件路径创建为目录（首次启动时 -v 会自动创建缺失路径为目录）
            sudo rm -rf /opt/quant-engine/live/binance_mainnet.env
            printf 'BINANCE_API_KEY=%s\nBINANCE_API_SECRET=%s\n' "${BINANCE_API_KEY}" "${BINANCE_API_SECRET}" | sudo tee /opt/quant-engine/live/binance_mainnet.env > /dev/null
            sudo chmod 600 /opt/quant-engine/live/binance_mainnet.env
            echo "✅ API keys written (binance_mainnet.env)"
            # 验证写入格式正确（行首无空格）
            sudo head -1 /opt/quant-engine/live/binance_mainnet.env | cut -c1-20
            if [ -n "${MULTI_LEG_BINANCE_FUTURES_API_KEY}" ] && [ -n "${MULTI_LEG_BINANCE_FUTURES_API_SECRET}" ]; then
              printf '\nMULTI_LEG_BINANCE_FUTURES_API_KEY=%s\nMULTI_LEG_BINANCE_FUTURES_API_SECRET=%s\n' \
                "${MULTI_LEG_BINANCE_FUTURES_API_KEY}" "${MULTI_LEG_BINANCE_FUTURES_API_SECRET}" \
                | sudo tee -a /opt/quant-engine/live/binance_mainnet.env > /dev/null
              echo "✅ Multi-leg dedicated mainnet keys appended to binance_mainnet.env"
            fi
            # 主网部署：不写入 testnet env；清理历史文件以免误用旧密钥
            sudo rm -f /opt/quant-engine/live/binance_multi_leg_testnet.env

      - name: 🚀 Pull image & restart service
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_FULL: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          IMAGE_SHA: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_FULL,IMAGE_SHA
          command_timeout: 5m
          script: |
            set -e

            echo "=== 🔐 登录 GHCR ==="
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo ""
            echo "=== 📥 拉取新镜像 ==="
            docker pull "$IMAGE_FULL"

            # 打 local tag（systemd 引用 quant-engine:latest）
            docker tag "$IMAGE_FULL" quant-engine:latest

            echo ""
            echo "=== 🧩 写入三进程 systemd units ==="
            sudo tee /etc/systemd/system/quant-feature-bus.service >/dev/null <<'EOF'
            [Unit]
            Description=Quant market feature publisher
            After=docker.service network-online.target
            Requires=docker.service

            [Service]
            Restart=always
            RestartSec=10
            Environment=MLBOT_LIVE_SYMBOLS=BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT
            ExecStartPre=-/usr/bin/docker rm -f quant-feature-bus
            ExecStart=/usr/bin/docker run --rm --name quant-feature-bus \
              -e MLBOT_LIVE_SYMBOLS \
              -v /opt/quant-engine/live:/app/live \
              -v /opt/quant-engine/data:/app/data \
              quant-engine:latest \
              bash -lc 'python scripts/run_market_feature_publisher.py \
                --symbols "$MLBOT_LIVE_SYMBOLS" \
                --feature-bus-root live/shared_feature_bus \
                --live-storage-base live/highcap/data \
                --strategies-root live/highcap/config/strategies \
                --warmup-days 0 \
                --max-rows 3000 \
                --fast-bar-threshold-pct 0.03 \
                --fast-bar-bucket-seconds 10'
            ExecStop=/usr/bin/docker stop quant-feature-bus

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo tee /etc/systemd/system/quant-engine.service >/dev/null <<'EOF'
            [Unit]
            Description=Quant classic live consumer
            After=docker.service network-online.target quant-feature-bus.service
            Requires=docker.service
            Wants=quant-feature-bus.service

            [Service]
            Restart=always
            RestartSec=10
            Environment=MLBOT_FEATURE_SOURCE=bus
            Environment=MLBOT_FEATURE_BUS_ROOT=live/shared_feature_bus
            Environment=MLBOT_FEATURE_BUS_POLL_SECONDS=5
            Environment=MLBOT_FEATURE_BUS_MAX_STALENESS_SECONDS=1800
            Environment=MLBOT_FEATURE_BUS_BARS_LOOKBACK=240
            Environment=MLBOT_LIVE_WARMUP_DAYS=0
            ExecStartPre=-/usr/bin/docker rm -f quant-engine
            ExecStart=/usr/bin/docker run --rm --name quant-engine \
              --env-file /opt/quant-engine/live/binance_mainnet.env \
              -e MLBOT_FEATURE_SOURCE \
              -e MLBOT_FEATURE_BUS_ROOT \
              -e MLBOT_FEATURE_BUS_POLL_SECONDS \
              -e MLBOT_FEATURE_BUS_MAX_STALENESS_SECONDS \
              -e MLBOT_FEATURE_BUS_BARS_LOOKBACK \
              -e MLBOT_LIVE_WARMUP_DAYS \
              -v /opt/quant-engine/live:/app/live \
              -v /opt/quant-engine/data:/app/data \
              quant-engine:latest \
              bash live/scripts/start_live.sh highcap
            ExecStop=/usr/bin/docker stop quant-engine

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo tee /etc/systemd/system/quant-multi-leg.service >/dev/null <<'EOF'
            [Unit]
            Description=Quant multi-leg feature-store consumer (mainnet)
            After=docker.service network-online.target quant-feature-bus.service
            Requires=docker.service
            Wants=quant-feature-bus.service

            [Service]
            Restart=always
            RestartSec=10
            Environment=MLBOT_MULTI_LEG_SYMBOLS=BTCUSDT
            ExecStartPre=-/usr/bin/docker rm -f quant-multi-leg
            ExecStart=/usr/bin/docker run --rm --name quant-multi-leg \
              --env-file /opt/quant-engine/live/binance_mainnet.env \
              -e MLBOT_MULTI_LEG_SYMBOLS \
              -v /opt/quant-engine/live:/app/live \
              -v /opt/quant-engine/data:/app/data \
              quant-engine:latest \
              bash -lc 'python scripts/run_multi_leg_live.py \
                --mode mainnet \
                --allow-shared-account \
                --strategies chop_grid,dual_add_trend \
                --symbols "$MLBOT_MULTI_LEG_SYMBOLS" \
                --bar-source feature-store \
                --feature-bus-root live/shared_feature_bus \
                --feature-store-timeframe 2h \
                --feature-store-execution-timeframe 1min \
                --poll-seconds 5'
            ExecStop=/usr/bin/docker stop quant-multi-leg

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo sed -i 's/^            //' /etc/systemd/system/quant-feature-bus.service /etc/systemd/system/quant-engine.service /etc/systemd/system/quant-multi-leg.service
            sudo systemctl daemon-reload
            sudo systemctl enable quant-feature-bus quant-engine quant-multi-leg

            echo ""
            echo "=== 🔄 重启服务 ==="
            sudo systemctl restart quant-feature-bus
            sudo systemctl restart quant-engine
            sudo systemctl restart quant-multi-leg
            sleep 8

            for svc in quant-feature-bus quant-engine; do
              if sudo systemctl is-active --quiet "$svc"; then
                echo "✅ $svc 运行中"
                sudo systemctl status "$svc" --no-pager | head -15
              else
                echo "❌ $svc 启动失败"
                sudo journalctl -u "$svc" --no-pager -n 30
                exit 1
              fi
            done
            if sudo systemctl is-active --quiet quant-multi-leg; then
              echo "✅ quant-multi-leg 运行中"
              sudo systemctl status quant-multi-leg --no-pager | head -15
            else
              echo "❌ quant-multi-leg 启动失败"
              sudo journalctl -u quant-multi-leg --no-pager -n 30
              exit 1
            fi

            echo ""
            echo "=== 🧹 清理旧镜像 ==="
            docker image prune -f
            docker logout ghcr.io

            echo ""
            echo "=== 📊 部署统计 ==="
            echo "Image: $IMAGE_FULL"
            echo "Container: $(docker ps --filter name=quant-engine --format '{{.Status}}')"
            echo "FeatureBus: $(docker ps --filter name=quant-feature-bus --format '{{.Status}}')"
            echo "MultiLeg: $(docker ps --filter name=quant-multi-leg --format '{{.Status}}')"
            echo "Disk: $(df -h / | tail -1 | awk '{print $4}') free"

      - name: 📊 Sync Grafana dashboards & restart
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/monitoring/grafana-provisioning/dashboards/*.json,deploy/monitoring/grafana-provisioning/dashboards/*.yml"
          target: "/tmp/grafana-sync"
          strip_components: 4

      - name: 🔄 Apply dashboards & restart Grafana
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            DASH_DIR=/opt/quant-engine/monitoring/grafana-provisioning/dashboards
            if [ -d "$DASH_DIR" ]; then
              cp /tmp/grafana-sync/dashboards/*.json "$DASH_DIR/"
              cp /tmp/grafana-sync/dashboards/*.yml  "$DASH_DIR/" 2>/dev/null || true
              rm -rf /tmp/grafana-sync
              if docker ps --format '{{.Names}}' | grep -q mlbot-grafana; then
                docker restart mlbot-grafana
                echo "✅ Grafana 已重启，面板已同步"
              else
                echo "⚠️ mlbot-grafana 容器未运行，跳过重启"
              fi
            else
              echo "⚠️ $DASH_DIR 不存在，跳过面板同步"
              rm -rf /tmp/grafana-sync
            fi
