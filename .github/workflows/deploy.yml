# =============================================================
# 🚀 构建 Docker 镜像 → 推送 ghcr.io → 部署到腾讯云
# =============================================================
# 架构:
#   GitHub Actions build image
#     → push to ghcr.io (GitHub Container Registry)
#     → SSH to server: docker pull → tag → restart
#   服务器无需 GitHub 密钥，无需 Python/pip 环境
#
# GitHub Secrets — 首个 Job 会校验「必填」非空，缺失则整单失败（不打印密钥值）。
#   必填: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, GHCR_TOKEN（远端 docker login + pull ghcr.io）,
#         BINANCE_API_KEY, BINANCE_API_SECRET
#   可选: GHCR_USERNAME — 与 GHCR_TOKEN 同属的 GitHub 用户名（生成 PAT 的账号）。
#         不设则用 github.actor；别人/Robot 点 Run 时 actor≠PAT 账号会导致拉包 403，建议设此项。
#   可选（成对）: MULTI_LEG_BINANCE_FUTURES_API_KEY / MULTI_LEG_BINANCE_FUTURES_API_SECRET
#   可选（成对）: BINANCE_SPOT_API_KEY / BINANCE_SPOT_API_SECRET — 写入 binance_spot_mainnet.env 并启用 quant-spot-accum
# 注意: TENCENTCLOUD_SECRET_ID/KEY 等若存在但本 workflow 未引用，不会触发校验（与 CD 无关则属正常）。
# 单机约 4G RAM: 三容器 cgroup 上限合计约 3.5G（余量给内核/Docker）；首启 feature-bus 做大窗 warmup 可能吃满一段时间。
# 「不重跑 warmup prepare」（Actions 勾选 skip_warmup_prepare）只适合 quant-warmup-prepare.service 已经成功跑过一次，
#     即 systemctl is-active quant-warmup-prepare == active（Type=oneshot RemainAfterExit）；全新宿主勿勾选，否则 Requires 链会卡住。
#   quant-macro-seed-prepare — oneshot：Vision spot 1d → weekly EMA200 seed（不阻塞 bus）
#   quant-macro-seed-prepare.timer — 每日刷新最近日 K + 重算 seed（trend/spot/多腿共用 bus 列时读同一份 parquet）
#   quant-feature-bus — 唯一行情 WS + warmup(≈180d)+GapFiller 补数 + 特征 + FeatureBus；`--skip-macro-warmup` 只读已有 seed
#   quant-trend-fattail — 方向性趋势 / fat-tail 账户，只读 bus。
#   quant-hedge-multileg — Hedge 多腿账户；`MLBOT_MULTI_LEG_SKIP_HEDGE_ON_START=1` 可临时跳过。
#   quant-spot-accum — 现货吸筹 A 层（spot_accum_simple）；需 BINANCE_SPOT_* Secrets，只读 feature-bus。
#     symbols 基底默认与 trend 同源：`live/{universe}/universe.yaml` keys（runner 不传 `--symbols`）；
#     可选 `MLBOT_MULTI_LEG_SYMBOLS` 仅在找不到 YAML 时兜底；各策略 meta 再与基底求交；`--bar-source feature-store` 读 shared_feature_bus parquet。
# Bind mount 约定（重要）：仅持久化 runtime 数据，config/scripts 必须来自镜像。
#   /opt/quant-engine/live/shared_feature_bus → /app/live/shared_feature_bus  (feature bus parquet)
#   /opt/quant-engine/live/highcap/data       → /app/live/highcap/data       (live storage / state / logs)
#   /opt/quant-engine/data                    → /app/data                    (parquet_data 等)
#   /opt/quant-engine/live/binance_mainnet.env → 通过 --env-file 注入（quant-trend-fattail / quant-hedge-multileg；feature-bus 无此文件）。
#   /opt/quant-engine/monitoring → CI 解压 deploy/monitoring，docker compose 拉起 Grafana :3000、Prometheus :9091、sqlite-web :8871-8873；
#   /opt/quant-engine/business-console → CI 解压 deploy/business-console，docker compose 拉起 Trade Map :8800（127.0.0.1，SSH 隧道/VPN）；
#   指标端口：quant-feature-bus 9192→9090，quant-trend-fattail 9190→9090，quant-hedge-multileg 9191→9090，quant-spot-accum 9193→9090。
#   注意：Prometheus 运行在 Docker 内，不能抓取只绑定宿主 127.0.0.1 的端口；端口发布需对 docker bridge 可达。
#   切勿挂 /opt/quant-engine/live → /app/live，会顶掉镜像内 highcap/config 与 scripts。
# =============================================================

name: 🚀 Build & Deploy

on:
  workflow_dispatch:
    inputs:
      restart_service:
        description: '部署后重启 live services'
        type: boolean
        default: true
      skip_build:
        description: '跳过构建，只重启服务（用于配置变更）'
        type: boolean
        default: false
      skip_warmup_prepare:
        description: '不重跑 Vision prepare（宿主 ticks/bars 已就绪 / prepare 已 active exited）。仍会 pull + 重启 bus 与 consumers。'
        type: boolean
        default: false

  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'config/**'
      - 'live/highcap/config/**'
      - 'live/scripts/**'
      - 'docker/Dockerfile.live'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'
      - 'deploy/monitoring/**'
      - 'deploy/business-console/**'
      - 'deploy/systemd/quant-business-console.service'

# 同一时间只允许一个部署
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/quant-engine

jobs:
  # ============================================
  # Job 0: 必填 Secrets 门禁（避免 SSH/币安/GHCR 未配却仍跑后续）
  # ============================================
  validate-secrets:
    name: 🔒 Validate required secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required repository secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${DEPLOY_HOST}" ] && missing+=(DEPLOY_HOST)
          [ -z "${DEPLOY_USER}" ] && missing+=(DEPLOY_USER)
          [ -z "${DEPLOY_SSH_KEY}" ] && missing+=(DEPLOY_SSH_KEY)
          [ -z "${GHCR_TOKEN}" ] && missing+=(GHCR_TOKEN)
          [ -z "${BINANCE_API_KEY}" ] && missing+=(BINANCE_API_KEY)
          [ -z "${BINANCE_API_SECRET}" ] && missing+=(BINANCE_API_SECRET)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::缺少必填 Repository Secret: ${missing[*]}"
            echo "请前往 Settings → Secrets and variables → Actions 配置后再运行本 workflow。"
            exit 1
          fi
          echo "OK: 必填 Secrets 均已非空（不在这里输出具体值）。"

      - name: Warn if optional multileg keys are incomplete
        env:
          MK: ${{ secrets.MULTI_LEG_BINANCE_FUTURES_API_KEY }}
          MS: ${{ secrets.MULTI_LEG_BINANCE_FUTURES_API_SECRET }}
        run: |
          if [ -n "${MK:-}" ] && [ -z "${MS:-}" ]; then
            echo "::warning::已配置 MULTI_LEG_BINANCE_FUTURES_API_KEY 但未配置 MULTI_LEG_BINANCE_FUTURES_API_SECRET，多腿专用密钥不会写入服务器。"
          elif [ -z "${MK:-}" ] && [ -n "${MS:-}" ]; then
            echo "::warning::已配置 MULTI_LEG_BINANCE_FUTURES_API_SECRET 但未配置 MULTI_LEG_BINANCE_FUTURES_API_KEY，多腿专用密钥不会写入服务器。"
          fi

      - name: Warn if optional spot keys are incomplete
        env:
          SK: ${{ secrets.BINANCE_SPOT_API_KEY }}
          SS: ${{ secrets.BINANCE_SPOT_API_SECRET }}
        run: |
          if [ -n "${SK:-}" ] && [ -z "${SS:-}" ]; then
            echo "::warning::已配置 BINANCE_SPOT_API_KEY 但未配置 BINANCE_SPOT_API_SECRET，现货服务不会部署。"
          elif [ -z "${SK:-}" ] && [ -n "${SS:-}" ]; then
            echo "::warning::已配置 BINANCE_SPOT_API_SECRET 但未配置 BINANCE_SPOT_API_KEY，现货服务不会部署。"
          elif [ -z "${SK:-}" ] && [ -z "${SS:-}" ]; then
            echo "::notice::未配置 BINANCE_SPOT_*，quant-spot-accum 将保持禁用。"
          fi

  # ============================================
  # Job 1: 构建并推送 Docker 镜像
  # ============================================
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: [validate-secrets]
    if: ${{ github.event.inputs.skip_build != 'true' }}
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.live
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: 📊 Build summary
        run: |
          echo "### 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 2: 部署到服务器
  # ============================================
  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    needs: [validate-secrets, build]
    if: |
      always() &&
      needs.validate-secrets.result == 'success' &&
      (needs.build.result == 'success' ||
        (needs.build.result == 'skipped' && github.event.inputs.skip_build == 'true'))
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Write API keys to server
        uses: appleboy/ssh-action@v1
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          MULTI_LEG_BINANCE_FUTURES_API_KEY: ${{ secrets.MULTI_LEG_BINANCE_FUTURES_API_KEY }}
          MULTI_LEG_BINANCE_FUTURES_API_SECRET: ${{ secrets.MULTI_LEG_BINANCE_FUTURES_API_SECRET }}
          BINANCE_SPOT_API_KEY: ${{ secrets.BINANCE_SPOT_API_KEY }}
          BINANCE_SPOT_API_SECRET: ${{ secrets.BINANCE_SPOT_API_SECRET }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: BINANCE_API_KEY,BINANCE_API_SECRET,MULTI_LEG_BINANCE_FUTURES_API_KEY,MULTI_LEG_BINANCE_FUTURES_API_SECRET,BINANCE_SPOT_API_KEY,BINANCE_SPOT_API_SECRET
          script: |
            sudo mkdir -p /opt/quant-engine/live
            # 防止 Docker 将文件路径创建为目录（首次启动时 -v 会自动创建缺失路径为目录）
            sudo rm -rf /opt/quant-engine/live/binance_mainnet.env
            printf 'BINANCE_API_KEY=%s\nBINANCE_API_SECRET=%s\n' "${BINANCE_API_KEY}" "${BINANCE_API_SECRET}" | sudo tee /opt/quant-engine/live/binance_mainnet.env > /dev/null
            sudo chmod 600 /opt/quant-engine/live/binance_mainnet.env
            echo "✅ API keys written (binance_mainnet.env)"
            # 验证写入格式正确（行首无空格）
            sudo head -1 /opt/quant-engine/live/binance_mainnet.env | cut -c1-20
            if [ -n "${MULTI_LEG_BINANCE_FUTURES_API_KEY}" ] && [ -n "${MULTI_LEG_BINANCE_FUTURES_API_SECRET}" ]; then
              printf '\nMULTI_LEG_BINANCE_FUTURES_API_KEY=%s\nMULTI_LEG_BINANCE_FUTURES_API_SECRET=%s\n' \
                "${MULTI_LEG_BINANCE_FUTURES_API_KEY}" "${MULTI_LEG_BINANCE_FUTURES_API_SECRET}" \
                | sudo tee -a /opt/quant-engine/live/binance_mainnet.env > /dev/null
              echo "✅ Multi-leg dedicated mainnet keys appended to binance_mainnet.env"
            fi
            sudo rm -f /opt/quant-engine/live/binance_spot_mainnet.env
            if [ -n "${BINANCE_SPOT_API_KEY}" ] && [ -n "${BINANCE_SPOT_API_SECRET}" ]; then
              printf 'BINANCE_SPOT_API_KEY=%s\nBINANCE_SPOT_API_SECRET=%s\n' \
                "${BINANCE_SPOT_API_KEY}" "${BINANCE_SPOT_API_SECRET}" \
                | sudo tee /opt/quant-engine/live/binance_spot_mainnet.env > /dev/null
              sudo chmod 600 /opt/quant-engine/live/binance_spot_mainnet.env
              echo "✅ Spot API keys written (binance_spot_mainnet.env)"
            else
              echo "::notice::BINANCE_SPOT_* 未配置或不成对，跳过 binance_spot_mainnet.env"
            fi
            # 主网部署：不写入 testnet env；清理历史文件以免误用旧密钥
            sudo rm -f /opt/quant-engine/live/binance_multi_leg_testnet.env
            # 仅持久化 runtime 数据目录；config/scripts 来自镜像（避免 bind mount 顶替 image 内容）
            sudo mkdir -p /opt/quant-engine/live/shared_feature_bus
            sudo mkdir -p /opt/quant-engine/live/highcap/data
            sudo mkdir -p /opt/quant-engine/data
            echo "✅ Runtime mount 目录就绪"

      - name: 🚀 Pull image & restart service
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          # PAT 与登录名必须同属一个 GitHub 账号；fine-grained PAT 仍以 github_pat_ 开头为正常。
          GHCR_USER: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          IMAGE_FULL: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          IMAGE_SHA: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          SKIP_WARMUP_PREPARE: ${{ github.event.inputs.skip_warmup_prepare == true && 'yes' || 'no' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_FULL,IMAGE_SHA,SKIP_WARMUP_PREPARE
          command_timeout: 20m
          script: |
            set -e

            echo "=== 🔐 登录 GHCR ==="
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo ""
            echo "=== 📥 拉取新镜像 ==="
            docker pull "$IMAGE_FULL"

            # 打 local tag（systemd 引用 quant-engine:latest）
            docker tag "$IMAGE_FULL" quant-engine:latest

            echo ""
            echo "=== 🧩 写入 systemd units（warmup oneshot → feature-bus → consumers）==="
            # Vision ZIP→parquet 只在 quant-warmup-prepare 跑，可与 engine/multi-leg 错峰占内存；
            # 小内存机器上避免三容器与转换同时进行。
            sudo tee /etc/systemd/system/quant-warmup-prepare.service >/dev/null <<'EOF'
            [Unit]
            Description=Quant Binance Vision warmup (download ZIP + convert to ticks/bars)
            After=docker.service network-online.target
            Requires=docker.service

            [Service]
            Type=oneshot
            RemainAfterExit=yes
            Environment=MLBOT_LIVE_SYMBOLS=BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT
            # Docker：--memory-swap 为「内存+swap」合计上限（MiB），且须 > --memory 才允许用 swap。
            # 实际能换出的量还受主机 swap/swapfile 大小限制；warmup 默认按日 Vision ZIP，峰值通常低于单月整包。
            ExecStartPre=-/usr/bin/docker rm -f quant-warmup-prepare
            ExecStart=/usr/bin/docker run --rm --name quant-warmup-prepare \
              --memory=3072m --memory-swap=32768m \
              -e MLBOT_LIVE_SYMBOLS \
              -v /opt/quant-engine/live/highcap/data:/app/live/highcap/data \
              -v /opt/quant-engine/data:/app/data \
              quant-engine:latest \
              python live/scripts/prepare_warmup_ticks.py \
                --universe highcap \
                --months 6 \
                --symbols ${MLBOT_LIVE_SYMBOLS} \
                --data-dir data/warmup_raw/highcap \
                --incremental

            [Install]
            WantedBy=multi-user.target
            EOF

            # Macro weekly EMA200 seed：独立 oneshot + 每日 timer（不阻塞 bus；与 tick 线路分离）。
            # seed 为按 symbol 的共享数据层；bus 写入 weekly_ema_200_position 后 trend/spot/多腿均可读 bus。
            sudo tee /etc/systemd/system/quant-macro-seed-prepare.service >/dev/null <<'EOF'
            [Unit]
            Description=Quant weekly EMA200 macro seed (Binance Vision spot 1d)
            After=docker.service network-online.target
            Requires=docker.service

            [Service]
            Type=oneshot
            Environment=MLBOT_LIVE_SYMBOLS=BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT
            ExecStartPre=-/usr/bin/docker rm -f quant-macro-seed-prepare
            ExecStart=/usr/bin/docker run --rm --name quant-macro-seed-prepare \
              --memory=1024m --memory-swap=4096m \
              -e MLBOT_LIVE_SYMBOLS \
              -v /opt/quant-engine/live/highcap/data:/app/live/highcap/data \
              quant-engine:latest \
              python scripts/prepare_spot_weekly_ema_seed.py \
                --symbols ${MLBOT_LIVE_SYMBOLS} \
                --kline-root live/highcap/data/macro/spot_klines \
                --seed-root live/highcap/data/macro/spot_weekly_ema200

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo tee /etc/systemd/system/quant-macro-seed-prepare.timer >/dev/null <<'EOF'
            [Unit]
            Description=Daily refresh of weekly EMA200 macro seed parquets

            [Timer]
            OnCalendar=*-*-* 02:00:00 UTC
            Persistent=true
            RandomizedDelaySec=300

            [Install]
            WantedBy=timers.target
            EOF

            sudo tee /etc/systemd/system/quant-feature-bus.service >/dev/null <<'EOF'
            [Unit]
            Description=Quant market feature publisher
            After=docker.service network-online.target quant-warmup-prepare.service
            Requires=docker.service quant-warmup-prepare.service
            Wants=quant-macro-seed-prepare.service

            [Service]
            Restart=always
            RestartSec=10
            Environment=MLBOT_LIVE_SYMBOLS=BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,ADAUSDT
            ExecStartPre=-/usr/bin/docker rm -f quant-feature-bus
            ExecStart=/usr/bin/docker run --rm --name quant-feature-bus \
              --memory=1536m --memory-swap=1536m \
              -p 9192:9090 \
              -e MLBOT_LIVE_SYMBOLS \
              -e MLBOT_WEEKLY_EMA_SEED_ROOT=/app/live/highcap/data/macro/spot_weekly_ema200 \
              -e MLBOT_SKIP_MACRO_WARMUP=1 \
              -e MLBOT_LIVE_STORAGE_BASE=/app/live/highcap/data \
              -e MLBOT_FEATURE_BUS_ROOT=/app/live/shared_feature_bus \
              -e MLBOT_PIPELINE_FEATURE_TFS=120T,240T \
              -v /opt/quant-engine/live/shared_feature_bus:/app/live/shared_feature_bus \
              -v /opt/quant-engine/live/highcap/data:/app/live/highcap/data \
              -v /opt/quant-engine/data:/app/data \
              quant-engine:latest \
              python scripts/run_market_feature_publisher.py \
                --symbols ${MLBOT_LIVE_SYMBOLS} \
                --feature-bus-root live/shared_feature_bus \
                --live-storage-base live/highcap/data \
                --strategies-root live/highcap/config/strategies \
                --warmup-months 6 \
                --warmup-raw-dir data/warmup_raw/highcap \
                --skip-warmup-prepare \
                --warmup-days 180 \
                --weekly-ema-seed-root live/highcap/data/macro/spot_weekly_ema200 \
                --macro-kline-root live/highcap/data/macro/spot_klines \
                --skip-macro-warmup \
                --max-rows 3000 \
                --fast-bar-threshold-pct 0.03 \
                --fast-bar-bucket-seconds 10
            ExecStop=/usr/bin/docker stop quant-feature-bus

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo tee /etc/systemd/system/quant-trend-fattail.service >/dev/null <<'EOF'
            [Unit]
            Description=Quant directional trend/fattail bus consumer
            After=docker.service network-online.target quant-feature-bus.service
            Requires=docker.service
            Wants=quant-feature-bus.service

            [Service]
            Restart=always
            RestartSec=10
            Environment=MLBOT_FEATURE_SOURCE=bus
            Environment=MLBOT_FEATURE_BUS_ROOT=live/shared_feature_bus
            Environment=MLBOT_FEATURE_BUS_POLL_SECONDS=5
            Environment=MLBOT_FEATURE_BUS_MAX_STALENESS_SECONDS=1800
            Environment=MLBOT_FEATURE_BUS_BARS_LOOKBACK=240
            Environment=MLBOT_LIVE_WARMUP_DAYS=0
            Environment=MLBOT_LIVE_STORAGE_BASE=data/live_storage
            ExecStartPre=-/usr/bin/docker rm -f quant-trend-fattail
            ExecStart=/usr/bin/docker run --rm --name quant-trend-fattail \
              --memory=1024m --memory-swap=1024m \
              -p 9190:9090 \
              --env-file /opt/quant-engine/live/binance_mainnet.env \
              -e MLBOT_FEATURE_SOURCE \
              -e MLBOT_FEATURE_BUS_ROOT \
              -e MLBOT_FEATURE_BUS_POLL_SECONDS \
              -e MLBOT_FEATURE_BUS_MAX_STALENESS_SECONDS \
              -e MLBOT_FEATURE_BUS_BARS_LOOKBACK \
              -e MLBOT_LIVE_WARMUP_DAYS \
              -e MLBOT_LIVE_STORAGE_BASE \
              -v /opt/quant-engine/live/shared_feature_bus:/app/live/shared_feature_bus \
              -v /opt/quant-engine/live/highcap/data:/app/live/highcap/data \
              -v /opt/quant-engine/data:/app/data \
              quant-engine:latest \
              bash live/scripts/start_live.sh highcap
            ExecStop=/usr/bin/docker stop quant-trend-fattail

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo tee /etc/systemd/system/quant-hedge-multileg.service >/dev/null <<'EOF'
            [Unit]
            Description=Quant hedge account multi-leg feature-store consumer (mainnet)
            After=docker.service network-online.target quant-feature-bus.service
            Requires=docker.service
            Wants=quant-feature-bus.service

            [Service]
            Restart=always
            RestartSec=5
            Environment=MLBOT_ACCOUNT_SCOPE=multi_leg
            ExecStartPre=-/usr/bin/docker rm -f quant-hedge-multileg
            ExecStart=/usr/bin/docker run --rm --name quant-hedge-multileg \
              --memory=1024m --memory-swap=1024m \
              -p 9191:9090 \
              --env-file /opt/quant-engine/live/binance_mainnet.env \
              -e MLBOT_ACCOUNT_SCOPE \
              -v /opt/quant-engine/live/shared_feature_bus:/app/live/shared_feature_bus \
              -v /opt/quant-engine/live/highcap/data:/app/live/highcap/data \
              -v /opt/quant-engine/data:/app/data \
              quant-engine:latest \
              bash -lc 'python scripts/run_multi_leg_live.py \
                --mode mainnet \
                --strategies chop_grid,trend_scalp \
                --universe highcap \
                --bar-source feature-store \
                --feature-bus-root live/shared_feature_bus \
                --feature-store-timeframe primary \
                --feature-store-execution-timeframe 1min \
                --poll-seconds 5 \
                --state-dir data/multi_leg_live/state'
            ExecStop=/usr/bin/docker stop quant-hedge-multileg

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo tee /etc/systemd/system/quant-spot-accum.service >/dev/null <<'EOF'
            [Unit]
            Description=Quant spot_accum_simple feature-bus consumer (mainnet)
            After=docker.service network-online.target quant-feature-bus.service
            Requires=docker.service
            Wants=quant-feature-bus.service
            ConditionPathExists=/opt/quant-engine/live/binance_spot_mainnet.env

            [Service]
            Restart=always
            RestartSec=10
            Environment=MLBOT_FEATURE_BUS_ROOT=live/shared_feature_bus
            Environment=MLBOT_SPOT_SHADOW_MODE=false
            Environment=MLBOT_METRICS_PORT=9090
            ExecStartPre=-/usr/bin/docker rm -f quant-spot-accum
            ExecStart=/usr/bin/docker run --rm --name quant-spot-accum \
              --memory=768m --memory-swap=768m \
              -p 9193:9090 \
              --env-file /opt/quant-engine/live/binance_spot_mainnet.env \
              -e MLBOT_FEATURE_BUS_ROOT \
              -e MLBOT_SPOT_SHADOW_MODE \
              -e MLBOT_METRICS_PORT \
              -v /opt/quant-engine/live/shared_feature_bus:/app/live/shared_feature_bus \
              -v /opt/quant-engine/live/highcap/data:/app/live/highcap/data \
              -v /opt/quant-engine/data:/app/data \
              quant-engine:latest \
              bash live/scripts/start_spot_live.sh highcap
            ExecStop=/usr/bin/docker stop quant-spot-accum

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo sed -i 's/^            //' /etc/systemd/system/quant-warmup-prepare.service /etc/systemd/system/quant-macro-seed-prepare.service /etc/systemd/system/quant-macro-seed-prepare.timer /etc/systemd/system/quant-feature-bus.service /etc/systemd/system/quant-trend-fattail.service /etc/systemd/system/quant-hedge-multileg.service /etc/systemd/system/quant-spot-accum.service
            sudo systemctl daemon-reload
            sudo systemctl disable --now quant-engine quant-multi-leg 2>/dev/null || true
            sudo rm -f /etc/systemd/system/quant-engine.service /etc/systemd/system/quant-multi-leg.service
            sudo systemctl daemon-reload
            docker rm -f quant-engine quant-multi-leg 2>/dev/null || true
            sudo systemctl enable quant-warmup-prepare quant-macro-seed-prepare quant-macro-seed-prepare.timer quant-feature-bus quant-trend-fattail quant-hedge-multileg
            if [ -f /opt/quant-engine/live/binance_spot_mainnet.env ]; then
              sudo systemctl enable quant-spot-accum
              echo "✅ quant-spot-accum enabled (binance_spot_mainnet.env present)"
            else
              sudo systemctl disable --now quant-spot-accum 2>/dev/null || true
              echo "::notice::quant-spot-accum 未 enable（缺少 binance_spot_mainnet.env）"
            fi

            echo ""
            echo "=== 🔄 拉起服务（异步，SSH 立即返回）==="
            # 开机顺序仍由 systemd：warmup oneshot → feature-bus Requires → consumers。
            # 部署时先停三容器再排队 warmup；warmup 可能数十分钟，勿在 CI 内同步等待（占用 Actions/Runner）。
            # --no-block：仅保证任务提交成功；失败需在主机 journalctl 查看。
            sudo systemctl stop quant-spot-accum quant-trend-fattail quant-hedge-multileg quant-feature-bus || true
            if printf '%s' "${SKIP_WARMUP_PREPARE:-no}" | grep -qi '^yes$\|^true$\|^1$'; then
              echo "=== ⏭️ 跳过 quant-warmup-prepare — skip_warmup_prepare 已勾选 ==="
              st=$(sudo systemctl is-active quant-warmup-prepare 2>/dev/null || true)
              echo "quant-warmup-prepare systemd: ${st:-unknown}（需为 active：此前须成功跑一次 prepare）"
            else
              if ! sudo systemctl start --no-block quant-warmup-prepare; then
                echo "::error::quant-warmup-prepare 未能排队启动"
                sudo systemctl status quant-warmup-prepare --no-pager || true
                sudo journalctl -u quant-warmup-prepare --no-pager -n 80 || true
                exit 1
              fi
            fi
            # Macro seed：restart 保证每次部署都会跑 oneshot；日常由 timer 每日 02:00 UTC 刷新。
            sudo systemctl enable --now quant-macro-seed-prepare.timer || true
            if ! sudo systemctl restart --no-block quant-macro-seed-prepare; then
              echo "::warning::quant-macro-seed-prepare 未能排队启动（可稍后: sudo systemctl restart quant-macro-seed-prepare）"
            fi
            # Requires=warmup：bus/consumers restart jobs 会在 warmup 成功完成后才实际拉起容器。
            sudo systemctl restart --no-block quant-feature-bus || true
            sudo systemctl restart --no-block quant-trend-fattail || true
            sudo systemctl restart --no-block quant-hedge-multileg || true
            if [ -f /opt/quant-engine/live/binance_spot_mainnet.env ]; then
              sudo systemctl restart --no-block quant-spot-accum || true
            fi

            echo ""
            echo "=== 📋 快照（warmup 进行中时容器未起属正常）==="
            sleep 5
            sudo systemctl list-jobs --no-pager 2>/dev/null || true
            docker ps -a --filter name=quant --format 'table {{.Names}}\t{{.Status}}\t{{.State}}' || true
            for svc in quant-warmup-prepare quant-macro-seed-prepare quant-macro-seed-prepare.timer quant-feature-bus quant-trend-fattail quant-hedge-multileg quant-spot-accum; do
              st=$(sudo systemctl is-active "$svc" 2>/dev/null || true)
              echo "   $svc: ${st:-unknown}"
            done
            echo "::notice::已异步提交 systemd 任务；warmup 完成后依赖服务会自动起。请在主机查看: journalctl -u quant-warmup-prepare -f  与  docker ps"

            echo ""
            echo "=== 🧹 清理旧镜像 ==="
            docker image prune -f
            docker logout ghcr.io

            echo ""
            echo "=== 📊 部署统计 ==="
            echo "Image: $IMAGE_FULL"
            echo "TrendFattail: $(docker ps --filter name=quant-trend-fattail --format '{{.Status}}')"
            echo "FeatureBus: $(docker ps --filter name=quant-feature-bus --format '{{.Status}}')"
            echo "HedgeMultileg: $(docker ps --filter name=quant-hedge-multileg --format '{{.Status}}')"
            echo "SpotAccum: $(docker ps --filter name=quant-spot-accum --format '{{.Status}}')"
            echo "Disk: $(df -h / | tail -1 | awk '{print $4}') free"

      - name: 📦 Pack monitoring stack (Grafana + Prometheus + sqlite-web)
        run: tar czf mlbot-monitoring.tgz -C deploy monitoring

      - name: 📤 Upload monitoring bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "mlbot-monitoring.tgz"
          target: "/tmp/"

      - name: 🔄 Install monitoring stack & start Grafana
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            sudo mkdir -p /opt/quant-engine
            sudo tar xzf /tmp/mlbot-monitoring.tgz -C /opt/quant-engine
            rm -f /tmp/mlbot-monitoring.tgz
            cd /opt/quant-engine/monitoring
            # sqlite-web 仅用本地 Dockerfile build，勿对 mlbot-sqlite-web:* 执行 pull（无远端仓库）
            docker compose -f docker-compose.monitoring.yml pull prometheus grafana
            docker compose -f docker-compose.monitoring.yml up -d --build --remove-orphans
            echo ""
            echo "=== 🧹 Cleanup old Grafana dashboard UIDs ==="
            if command -v curl >/dev/null 2>&1; then
              for i in $(seq 1 30); do
                if curl -fsS -u admin:admin http://localhost:3000/api/health >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              for uid in \
                quant-engine-main \
                quant-multi-leg \
                quant-multi-leg-symbol \
                quant-trend-strategy-symbol \
                quant-live-overview \
                quant-market-heat \
                quant-account-market \
                quant-feature-bus \
                quant-live-architecture \
                quant-trend-fattail-symbol \
                quant-hedge-multileg-symbol \
                quant-hedge-multileg \
                quant-strategy-explorer \
                quant-strategies-features \
                quant-signal-pipeline \
                quant-strategy-bpc \
                quant-strategy-me \
                quant-strategy-fer; do
                code="$(curl -sS -o "/tmp/grafana-delete-${uid}.json" -w '%{http_code}' -u admin:admin -X DELETE "http://localhost:3000/api/dashboards/uid/${uid}" || true)"
                case "$code" in
                  200|404)
                    echo "Grafana old uid ${uid}: cleaned (${code})"
                    ;;
                  401|403)
                    echo "::warning::Grafana old uid ${uid}: auth rejected (${code}); delete manually if old dashboard remains"
                    ;;
                  *)
                    echo "::warning::Grafana old uid ${uid}: cleanup returned HTTP ${code}"
                    ;;
                esac
              done
            else
              echo "::warning::curl not found; skip old Grafana dashboard UID cleanup"
            fi
            echo ""
            echo "=== 📊 Monitoring containers ==="
            docker ps --filter name=mlbot --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            echo ""
            echo "Grafana 默认 http://<主机>:3000 （compose 内 admin/admin，上线后请改密）；Prometheus :9091。"
            echo "SQLite 只读浏览器 sqlite-web：8871=live_monitor / 8872=order_management / 8873=multi_leg_order_management（无登录，勿对公网暴露）。"
            echo "Metrics: 宿主 9192=feature-bus / 9190=trend-fattail / 9191=hedge-multileg / 9193=spot-accum（Prometheus 经 host.docker.internal，见 deploy/monitoring/prometheus.yml）。"

      - name: 📦 Pack business console (Trade Map)
        run: tar czf mlbot-business-console.tgz -C deploy business-console systemd/quant-business-console.service

      - name: 📤 Upload business console bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "mlbot-business-console.tgz"
          target: "/tmp/"

      - name: 🔄 Install business console & start Trade Map
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            sudo mkdir -p /opt/quant-engine
            sudo tar xzf /tmp/mlbot-business-console.tgz -C /opt/quant-engine
            rm -f /tmp/mlbot-business-console.tgz
            if [ -f /opt/quant-engine/systemd/quant-business-console.service ]; then
              sudo cp /opt/quant-engine/systemd/quant-business-console.service /etc/systemd/system/
              sudo systemctl daemon-reload
            fi
            cd /opt/quant-engine/business-console
            docker compose up -d --build --remove-orphans
            echo ""
            echo "=== 📊 Business console ==="
            docker ps --filter name=mlbot-business-console --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            echo "Trade Map: http://127.0.0.1:8800/trade-map （仅本机或 SSH -L 8800:127.0.0.1:8800）"
            echo "可选 Basic Auth: 在 compose 环境变量中设置 MLBOT_CONSOLE_BASIC_AUTH_USER/PASSWORD 后 docker compose up -d"
