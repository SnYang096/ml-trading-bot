[pytest]
# Pytest configuration for ml_trading_bot
#
# Note: Project root is automatically added to sys.path via tests/conftest.py
# If you install the project via `pip install -e .`, you can import modules directly.
# The sys.path setup in conftest.py ensures tests work even without installation.

# Custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (require full data environment)
    unit: marks tests as unit tests (fast, no external dependencies)

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -ra
    --strict-markers
    --tb=short

# Minimum Python version
minversion = 6.0

