[pytest]
pythonpath = src .
testpaths = tests
addopts = -m "not slow and not integration"
markers =
    slow: expensive CPU/memory tests (skip in default dev runs)
    integration: needs external data, network, or long IO
# Do not retain every tmp_path under /tmp/pytest-of-* (was filling ~1TB on WSL).
tmp_path_retention_policy = failed
tmp_path_retention_count = 2
filterwarnings =
    ignore::DeprecationWarning
